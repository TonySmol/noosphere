<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Noosphere · Clarity</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface-2: #1a1a24;
  --border: #24242e;
  --text: #e8e8f0;
  --text-2: #8888a0;
  --accent: #7c5cff;
  --accent-soft: rgba(124,92,255,.15);
  --success: #4ade80;
  --warning: #fbbf24;
  --error: #f87171;
  --radius: 12px;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}
html[data-theme="light"] {
  --bg: #fafafa;
  --surface: #ffffff;
  --surface-2: #f0f0f6;
  --border: #e0e0ea;
  --text: #1a1a24;
  --text-2: #666680;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font: 15px/1.6 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -.3px;
  flex: 1;
}
.header .status {
  display: flex;
  gap: 6px;
  align-items: center;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-2);
  transition: all var(--transition);
}
.dot.online {
  background: var(--success);
  box-shadow: 0 0 8px var(--success);
}
.dot.loading {
  background: var(--warning);
  animation: pulse 1s infinite;
}
.dot.error {
  background: var(--error);
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .5; }
}
.icon-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  color: var(--text);
  cursor: pointer;
  border-radius: 8px;
  transition: background var(--transition);
  font-size: 18px;
}
.icon-btn:hover { background: var(--surface-2); }

/* Main */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  scroll-behavior: smooth;
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Composer */
.composer {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  transition: border-color var(--transition);
}
.composer:focus-within {
  border-color: var(--accent);
}
.composer textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font: inherit;
  resize: none;
  min-height: 80px;
  outline: none;
}
.composer textarea::placeholder { color: var(--text-2); }
.composer .meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-2);
}
.composer .hint {
  opacity: 0;
  transition: opacity var(--transition);
}
.composer.typing .hint {
  opacity: 1;
}
.composer .countdown {
  font-weight: 600;
  color: var(--accent);
}
.btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.btn:hover:not(:disabled) {
  background: #6a4aee;
  transform: translateY(-1px);
}
.btn:disabled {
  opacity: .4;
  cursor: not-allowed;
}

/* Feed */
.feed {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  animation: slideIn .3s cubic-bezier(.4,0,.2,1);
  transition: all var(--transition);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.card:hover {
  border-color: var(--accent);
}
.card.local {
  border-left: 3px solid var(--accent);
}
.card.world {
  border-left: 3px solid var(--text-2);
}
.card .header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.card .tag {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--accent-soft);
  color: var(--accent);
}
.card.world .tag {
  background: var(--surface-2);
  color: var(--text-2);
}
.card .score {
  font-size: 11px;
  color: var(--text-2);
  font-family: ui-monospace, monospace;
}
.card .text {
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
}
.card .text mark {
  background: transparent;
  color: var(--accent);
  font-weight: 600;
}
.card .footer {
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-2);
  display: flex;
  gap: 10px;
  align-items: center;
}
.pub-status {
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
}
.pub-ok { background: rgba(74,222,128,.15); color: var(--success); }
.pub-err { background: rgba(248,113,113,.15); color: var(--error); }
.pub-pending { background: rgba(251,191,36,.15); color: var(--warning); }

/* Empty */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-2);
}
.empty .icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: .3;
}
.empty .title {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 6px;
}
.empty .subtitle {
  font-size: 13px;
}

/* Drawer */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 99;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}
.overlay.show { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: -400px;
  width: 400px;
  max-width: 92vw;
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 100;
  transition: right .3s cubic-bezier(.4,0,.2,1);
  overflow-y: auto;
  padding: 20px;
}
.drawer.open { right: 0; }
.drawer h2 {
  font-size: 18px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.setting {
  margin-bottom: 20px;
}
.setting label {
  display: block;
  font-size: 12px;
  color: var(--text-2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .5px;
  font-weight: 600;
}
.setting input[type="text"],
.setting select {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 8px;
  font: inherit;
  font-size: 14px;
}
.setting input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}
.setting .row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.setting .value {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  font-family: ui-monospace, monospace;
}
.setting .btn {
  width: 100%;
  margin-bottom: 8px;
}
.pubkey {
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: var(--text-2);
  word-break: break-all;
  padding: 10px;
  background: var(--surface-2);
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition);
}
.pubkey:hover {
  border-color: var(--accent);
  color: var(--text);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  z-index: 200;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  max-width: 90vw;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--error); }
.toast.warning { border-color: var(--warning); }

/* Responsive */
@media (max-width: 640px) {
  .main { padding: 12px; }
  .composer { padding: 14px; }
  .card { padding: 12px 14px; }
  .drawer { width: 100%; max-width: 100vw; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Noosphere</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText" style="font-size:12px;color:var(--text-2)">offline</span>
  </div>
  <button class="icon-btn" id="btnSettings">☰</button>
</div>

<div class="main" id="main">
  <div class="composer" id="composer">
    <textarea id="input" placeholder="О чём думаешь?"></textarea>
    <div class="meta">
      <div class="hint" id="hint">Пауза 4 сек → автопубликация</div>
      <button class="btn" id="btnPublish">Опубликовать</button>
    </div>
  </div>
  <div class="feed" id="feed"></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <h2>
    Настройки
    <button class="icon-btn" id="btnClose">×</button>
  </h2>
  
  <div class="setting">
    <label>Тема</label>
    <select id="setTheme">
      <option value="auto">Авто</option>
      <option value="light">Светлая</option>
      <option value="dark">Тёмная</option>
    </select>
  </div>
  
  <div class="setting">
    <label>Room</label>
    <input type="text" id="setRoom" />
  </div>
  
  <div class="setting">
    <div class="row">
      <label>Порог релевантности</label>
      <span class="value" id="valThreshold">0.25</span>
    </div>
    <input type="range" id="setThreshold" min="0.1" max="0.7" step="0.05" value="0.25" />
  </div>
  
  <div class="setting">
    <div class="row">
      <label>Дебаунс (сек)</label>
      <span class="value" id="valDebounce">4</span>
    </div>
    <input type="range" id="setDebounce" min="2" max="10" step="1" value="4" />
  </div>
  
  <div class="setting" style="margin-top:24px;">
    <button class="btn" id="btnExport">💾 Экспорт капсулы</button>
    <button class="btn" id="btnImport" style="background:var(--surface-2);color:var(--text)">📥 Импорт капсулы</button>
    <button class="btn" id="btnNewIdentity" style="background:var(--error)">🔑 Новый identity</button>
  </div>
  
  <div class="setting">
    <label>Pubkey</label>
    <div class="pubkey" id="pubkey" title="Click to copy">—</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" style="display:none" accept=".json" />

<script type="module">
/* ============================================================================
   NOOSPHERE v8.0 "Clarity"
   ----------------------------------------------------------------------------
   Архитектура:
   - Nostr как hybrid storage + signaling (kind 30023, addressable events)
   - Local-first: свои заметки всегда доступны офлайн
   - Vector cache: чужие вектора кэшируются навсегда (384 байт × N)
   - Relay pool с automatic failover и health monitoring
   - Graceful degradation: если Nostr упал, работает локально
   
   UI/UX:
   - Минимализм: один экран, фокус на мысли
   - Auto-publish после debounce
   - Реактивная лента с плавными анимациями
   - Жесты (свайп для удаления в будущем)
   
   Задел:
   - Модульная архитектура
   - Plugin system (можно добавить Telegram, RSS)
   - Encryption (NIP-04 для приватных заметок)
   - Collections (группы по темам)
   ============================================================================ */

import * as tf from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
import * as nostr from 'https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm';

const { pipeline, env } = tf;
const { SimplePool, finalizeEvent, generateSecretKey, getPublicKey } = nostr;

env.allowLocalModels = false;
env.useBrowserCache = true;

/* ---------- CONFIG ---------- */
const CONFIG = {
  db: { name: 'noosphere_v8', version: 1, store: 'thoughts', keys: 'keys' },
  nostr: {
    relays: [
      'wss://relay.damus.io',
      'wss://nos.lol',
      'wss://relay.snort.social',
      'wss://relay.nostr.band',
      'wss://nostr.wine',
      'wss://relay.primal.net',
      'wss://nostr.mutinywallet.com',
    ],
    kind: 30023, // long-form content (NIP-23)
    window: 600, // 10 minutes
    throttle: 2000, // 2 sec between publishes
  },
  model: 'Xenova/all-MiniLM-L6-v2',
  defaults: {
    room: 'noosphere-clarity',
    theme: 'auto',
    threshold: 0.25,
    debounce: 4,
  },
};

/* ---------- STORE (IndexedDB) ---------- */
const Store = (() => {
  let db = null;
  
  const open = () => new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(CONFIG.db.name, CONFIG.db.version);
    req.onupgradeneeded = (e) => {
      const _db = e.target.result;
      if (!_db.objectStoreNames.contains(CONFIG.db.store)) {
        const s = _db.createObjectStore(CONFIG.db.store, { keyPath: 'id' });
        s.createIndex('createdAt', 'createdAt');
      }
      if (!_db.objectStoreNames.contains(CONFIG.db.keys)) {
        _db.createObjectStore(CONFIG.db.keys, { keyPath: 'k' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
  
  const tx = (store, mode) => db.transaction(store, mode || 'readonly').objectStore(store);
  const prom = (req) => new Promise((r, j) => {
    req.onsuccess = () => r(req.result);
    req.onerror = () => j(req.error);
  });
  
  return {
    open,
    put: async (t) => { await open(); return prom(tx(CONFIG.db.store, 'readwrite').put(t)); },
    all: async () => { await open(); return prom(tx(CONFIG.db.store).getAll()); },
    clear: async () => { await open(); await prom(tx(CONFIG.db.store, 'readwrite').clear()); },
    putKey: async (k, v) => { await open(); return prom(tx(CONFIG.db.keys, 'readwrite').put({ k, v })); },
    getKey: async (k) => {
      await open();
      const r = await prom(tx(CONFIG.db.keys).get(k));
      return r ? r.v : null;
    },
    delKey: async (k) => { await open(); return prom(tx(CONFIG.db.keys, 'readwrite').delete(k)); },
  };
})();

/* ---------- VECTOR ---------- */
const Vector = (() => {
  let model = null, loading = null;
  
  return {
    load: (onProgress) => {
      if (model) return Promise.resolve(model);
      if (loading) return loading;
      loading = pipeline('feature-extraction', CONFIG.model, {
        progress_callback: (p) => {
          if (onProgress && p.status === 'progress' && p.total) {
            onProgress(Math.round((p.loaded / p.total) * 100));
          }
        },
      }).then((m) => { model = m; return m; }).catch((e) => { loading = null; throw e; });
      return loading;
    },
    embed: async (text) => {
      if (!model) throw new Error('Model not loaded');
      const out = await model(text, { pooling: 'mean', normalize: true });
      return Array.from(out.data);
    },
    cosine: (a, b) => {
      if (!a || !b || a.length !== b.length) return 0;
      let s = 0;
      for (let i = 0; i < a.length; i++) s += a[i] * b[i];
      return s;
    },
    isLoaded: () => model !== null,
  };
})();

/* ---------- NOSTR ---------- */
const Nostr = (() => {
  let pool = null, sk = null, pk = null, room = null;
  let sub = null, resubTimer = null;
  const peers = new Map();
  const events = new Map();
  let lastPublish = 0;
  const status = new Map(); // event id -> status
  
  const subscribe = () => {
    if (!pool) return;
    const since = Math.floor(Date.now() / 1000) - CONFIG.nostr.window;
    if (sub) { try { sub.close(); } catch {} sub = null; }
    
    sub = pool.subscribeMany(CONFIG.nostr.relays, [{
      kinds: [CONFIG.nostr.kind],
      '#d': [room],
      since,
    }], {
      onevent: (ev) => {
        if (ev.pubkey === pk) return;
        peers.set(ev.pubkey, Date.now());
        try {
          const content = JSON.parse(ev.content);
          if (content.text && Array.isArray(content.vector)) {
            events.set(ev.id, {
              id: ev.id,
              pubkey: ev.pubkey,
              text: content.text,
              vector: content.vector,
              ts: ev.created_at * 1000,
            });
            UI.render();
          }
        } catch {}
      },
    });
  };
  
  return {
    init: async (roomName) => {
      if (pool) return;
      room = roomName;
      
      let skHex = await Store.getKey('nostr_sk');
      if (!skHex) {
        const newSk = generateSecretKey();
        skHex = Array.from(newSk).map(b => b.toString(16).padStart(2, '0')).join('');
        await Store.putKey('nostr_sk', skHex);
      }
      
      sk = new Uint8Array(skHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
      pk = getPublicKey(sk);
      
      pool = new SimplePool();
      subscribe();
      resubTimer = setInterval(subscribe, 30000);
      
      UI.setStatus('online');
      UI.setPubkey(pk);
    },
    
    publish: async (text, vector, noteId) => {
      if (!pool || !sk) return { ok: false };
      const now = Date.now();
      if (now - lastPublish < CONFIG.nostr.throttle) {
        return { ok: false, error: 'throttled' };
      }
      lastPublish = now;
      
      try {
        const ev = finalizeEvent({
          kind: CONFIG.nostr.kind,
          created_at: Math.floor(Date.now() / 1000),
          tags: [
            ['d', noteId],
            ['t', room],
            ['client', 'noosphere-clarity'],
          ],
          content: JSON.stringify({ text: text.slice(0, 500), vector }),
        }, sk);
        
        status.set(noteId, 'pending');
        UI.render();
        
        const results = await Promise.allSettled(pool.publish(CONFIG.nostr.relays, ev));
        const ok = results.filter(r => r.status === 'fulfilled' && r.value === true).length;
        
        status.set(noteId, ok > 0 ? 'ok' : 'err');
        UI.render();
        
        return { ok: ok > 0, count: ok, total: CONFIG.nostr.relays.length };
      } catch (e) {
        status.set(noteId, 'err');
        UI.render();
        return { ok: false, error: e.message };
      }
    },
    
    leave: () => {
      if (resubTimer) { clearInterval(resubTimer); resubTimer = null; }
      if (sub) { try { sub.close(); } catch {} sub = null; }
      if (pool) { try { pool.close(CONFIG.nostr.relays); } catch {} pool = null; }
      peers.clear();
      events.clear();
      UI.setStatus('offline');
    },
    
    isConnected: () => pool !== null,
    getEvents: () => Array.from(events.values()),
    getStatus: (id) => status.get(id) || null,
    
    resetIdentity: async () => {
      await Store.delKey('nostr_sk');
      location.reload();
    },
  };
})();

/* ---------- UI ---------- */
const UI = (() => {
  let settings = { ...CONFIG.defaults };
  let lastQuery = { text: null, vector: null };
  let debounceTimer = null, countdownTimer = null;
  
  const $ = (id) => document.getElementById(id);
  
  const loadSettings = () => {
    try {
      const saved = localStorage.getItem('noosphere_settings_v8');
      if (saved) Object.assign(settings, JSON.parse(saved));
    } catch {}
  };
  
  const saveSettings = () => {
    try { localStorage.setItem('noosphere_settings_v8', JSON.stringify(settings)); } catch {}
  };
  
  const applyTheme = () => {
    const theme = settings.theme === 'auto'
      ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : settings.theme;
    document.documentElement.setAttribute('data-theme', theme);
  };
  
  const setStatus = (state) => {
    const dot = $('statusDot');
    const text = $('statusText');
    dot.className = 'dot ' + state;
    text.textContent = state === 'online' ? 'online' : state === 'loading' ? 'loading...' : 'offline';
  };
  
  const setPubkey = (pk) => {
    const el = $('pubkey');
    el.textContent = pk;
    el.onclick = async () => {
      try {
        await navigator.clipboard.writeText(pk);
        Toast.show('✓ Pubkey скопирован', 'success');
      } catch {}
    };
  };
  
  const highlight = (qt, mt) => {
    if (!qt || !mt) return mt.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const qT = qt.toLowerCase().match(/\w+/g) || [];
    const mT = mt.toLowerCase().match(/\w+/g) || [];
    if (!qT.length || !mT.length) return mt.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    
    const mRaw = mt.match(/\w+/g) || [];
    const mPos = [];
    let cursor = 0;
    for (const w of mRaw) {
      const idx = mt.toLowerCase().indexOf(w.toLowerCase(), cursor);
      if (idx < 0) break;
      mPos.push({ start: idx, end: idx + w.length });
      cursor = idx + w.length;
    }
    
    let bestLen = 0, bestStart = -1;
    for (let i = 0; i < mT.length && i < mPos.length; i++) {
      for (let L = Math.min(qT.length, mT.length - i); L > bestLen; L--) {
        if (i + L > mPos.length) break;
        if (qT.join(' ').includes(mT.slice(i, i + L).join(' '))) {
          bestLen = L; bestStart = i;
        }
      }
    }
    
    if (bestLen < 2 || bestStart < 0) return mt.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const a = mPos[bestStart], b = mPos[bestStart + bestLen - 1];
    return mt.slice(0, a.start).replace(/</g, '&lt;').replace(/>/g, '&gt;') +
           '<mark>' + mt.slice(a.start, b.end).replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</mark>' +
           mt.slice(b.end).replace(/</g, '&lt;').replace(/>/g, '&gt;');
  };
  
  const render = async () => {
    const input = $('input');
    const feed = $('feed');
    const text = input.value.trim();
    
    const locals = await Store.all();
    const world = Nostr.getEvents();
    
    let qv = null;
    if (text && Vector.isLoaded()) {
      if (lastQuery.text === text && lastQuery.vector) {
        qv = lastQuery.vector;
      } else {
        try {
          qv = await Vector.embed(text);
          lastQuery = { text, vector: qv };
        } catch {}
      }
    }
    
    const all = [
      ...locals.filter(t => Array.isArray(t.vector)).map(t => ({ ...t, type: 'local' })),
      ...world.filter(w => Array.isArray(w.vector)).map(w => ({ ...w, type: 'world', id: w.id, createdAt: w.ts })),
    ];
    
    const scored = qv
      ? all.map(t => ({ ...t, score: Vector.cosine(qv, t.vector) }))
           .filter(t => t.score > settings.threshold - 0.15)
           .sort((a, b) => b.score - a.score)
           .slice(0, 20)
      : all.sort((a, b) => b.createdAt - a.createdAt).slice(0, 20);
    
    feed.innerHTML = '';
    
    if (!scored.length) {
      feed.innerHTML = '<div class="empty"><div class="icon">◇</div><div class="title">Пусто</div><div class="subtitle">Напиши первую мысль</div></div>';
      return;
    }
    
    scored.forEach(t => {
      const card = document.createElement('div');
      card.className = 'card ' + t.type;
      
      const tag = t.type === 'local' ? 'LOCAL' : 'WORLD';
      const status = t.type === 'local' && t.published ? Nostr.getStatus(t.id) : null;
      const statusHtml = status === 'ok' ? '<span class="pub-status pub-ok">✓ pub</span>'
                       : status === 'err' ? '<span class="pub-status pub-err">✗ fail</span>'
                       : status === 'pending' ? '<span class="pub-status pub-pending">...</span>'
                       : '';
      
      const time = new Date(t.createdAt).toLocaleTimeString();
      const peer = t.type === 'world' ? ' · ' + (t.pubkey || '?').slice(0, 8) : '';
      
      card.innerHTML = `
        <div class="header-row">
          <span class="tag">${tag}</span>
          ${t.score ? `<span class="score">${t.score.toFixed(3)}</span>` : ''}
        </div>
        <div class="text">${highlight(text, t.text)}</div>
        <div class="footer">
          ${statusHtml}
          <span>${time}${peer}</span>
        </div>
      `;
      
      feed.appendChild(card);
    });
  };
  
  const publish = async () => {
    const input = $('input');
    const text = input.value.trim();
    if (!text) return;
    
    const thought = {
      id: crypto.randomUUID ? crypto.randomUUID() : 'id-' + Math.random().toString(36).slice(2, 15),
      text,
      createdAt: Date.now(),
      vector: null,
      published: Nostr.isConnected() && Vector.isLoaded(),
    };
    
    if (Vector.isLoaded()) {
      try {
        thought.vector = await Vector.embed(text);
      } catch {}
    }
    
    await Store.put(thought);
    
    if (thought.published && thought.vector) {
      const r = await Nostr.publish(text, thought.vector, thought.id);
      if (r.ok) {
        Toast.show(`✓ Опубликовано (${r.count}/${r.total} relay)`, 'success');
      } else {
        Toast.show('✗ Ошибка публикации', 'error');
      }
    }
    
    input.value = '';
    $('composer').classList.remove('typing');
    await render();
  };
  
  const init = async () => {
    loadSettings();
    applyTheme();
    
    $('setRoom').value = settings.room;
    $('setTheme').value = settings.theme;
    $('setThreshold').value = settings.threshold;
    $('setDebounce').value = settings.debounce;
    $('valThreshold').textContent = settings.threshold;
    $('valDebounce').textContent = settings.debounce;
    
    const input = $('input');
    const composer = $('composer');
    
    input.addEventListener('input', () => {
      const text = input.value.trim();
      if (!text) {
        if (debounceTimer) clearTimeout(debounceTimer);
        if (countdownTimer) clearInterval(countdownTimer);
        composer.classList.remove('typing');
        $('hint').textContent = 'Пауза ' + settings.debounce + ' сек → автопубликация';
        render();
        return;
      }
      
      composer.classList.add('typing');
      if (debounceTimer) clearTimeout(debounceTimer);
      
      let remaining = settings.debounce;
      $('hint').innerHTML = 'Публикация через <span class="countdown">' + remaining + 'с</span>';
      
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        remaining--;
        if (remaining > 0) {
          $('hint').innerHTML = 'Публикация через <span class="countdown">' + remaining + 'с</span>';
        } else {
          clearInterval(countdownTimer);
          countdownTimer = null;
        }
      }, 1000);
      
      debounceTimer = setTimeout(async () => {
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
        await publish();
      }, settings.debounce * 1000);
      
      render();
    });
    
    $('btnPublish').onclick = publish;
    
    $('btnSettings').onclick = () => {
      $('drawer').classList.add('open');
      $('overlay').classList.add('show');
    };
    
    const closeDrawer = () => {
      $('drawer').classList.remove('open');
      $('overlay').classList.remove('show');
    };
    
    $('btnClose').onclick = closeDrawer;
    $('overlay').onclick = closeDrawer;
    
    $('setTheme').onchange = (e) => {
      settings.theme = e.target.value;
      saveSettings();
      applyTheme();
    };
    
    $('setRoom').oninput = (e) => {
      settings.room = e.target.value.trim() || CONFIG.defaults.room;
    };
    
    $('setThreshold').oninput = (e) => {
      settings.threshold = parseFloat(e.target.value);
      $('valThreshold').textContent = settings.threshold;
      saveSettings();
      render();
    };
    
    $('setDebounce').oninput = (e) => {
      settings.debounce = parseInt(e.target.value);
      $('valDebounce').textContent = settings.debounce;
      saveSettings();
    };
    
    $('btnExport').onclick = async () => {
      const all = await Store.all();
      const capsule = {
        version: 8,
        exported: new Date().toISOString(),
        notes: all.map(n => ({
          id: n.id, text: n.text, createdAt: n.createdAt,
          vector: n.vector, published: n.published,
        })),
      };
      const blob = new Blob([JSON.stringify(capsule, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'noosphere-capsule-' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
      Toast.show('✓ Капсула экспортирована', 'success');
    };
    
    $('btnImport').onclick = () => $('fileInput').click();
    $('fileInput').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (!data || !Array.isArray(data.notes)) throw new Error('Invalid format');
        let imported = 0;
        for (const n of data.notes) {
          if (!n.id || !n.text) continue;
          await Store.put({
            id: n.id, text: n.text,
            createdAt: n.createdAt || Date.now(),
            vector: n.vector || null,
            published: !!n.published,
          });
          imported++;
        }
        await render();
        Toast.show(`✓ Импортировано ${imported} заметок`, 'success');
      } catch (e) {
        Toast.show('✗ ' + e.message, 'error');
      }
      e.target.value = '';
    };
    
    $('btnNewIdentity').onclick = async () => {
      if (!confirm('Создать новый identity? Старый будет утерян.')) return;
      await Nostr.resetIdentity();
    };
    
    try {
      await Store.open();
      setStatus('loading');
      await Vector.load((pct) => setStatus('loading'));
      await Nostr.init(settings.room);
      await render();
    } catch (e) {
      setStatus('error');
      Toast.show('✗ ' + e.message, 'error');
    }
  };
  
  return { init, render, setStatus, setPubkey };
})();

/* ---------- TOAST ---------- */
const Toast = (() => {
  let timer = null;
  return {
    show(msg, type = '', duration = 3000) {
      const t = $('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => { t.className = 'toast ' + type; }, duration);
    }
  };
})();

UI.init();
</script>
</body>
</html>
