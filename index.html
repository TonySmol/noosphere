<style id="LOOM_CSS">

button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font:inherit;color:inherit;background:none;border:none;outline:none}

.topbar{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.brand{font:700 15px var(--mono);letter-spacing:.3px;background:linear-gradient(135deg,var(--accent),var(--world));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.icon-btn:hover{color:var(--fg);border-color:var(--dim)}

.status{display:flex;gap:10px;padding:6px 14px;border-bottom:1px solid var(--line);font:11px var(--mono);color:var(--dim);flex-shrink:0;flex-wrap:wrap}
.s{display:inline-flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.s.ok{color:var(--seren)}.s.warn{color:var(--warn)}.s.err{color:var(--err)}
.s.busy .dot{animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}

.tabs{display:flex;border-bottom:1px solid var(--line);flex-shrink:0}
.tab{flex:1;padding:11px;text-align:center;font:12px var(--mono);color:var(--dim);border-bottom:2px solid transparent;transition:.15s;text-transform:uppercase;letter-spacing:.5px;display:inline-flex;justify-content:center;align-items:center;gap:6px;cursor:pointer}

.tab .n{font-size:10px;padding:1px 5px;background:var(--line);border-radius:8px}

.work{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.view{display:none}.view.active{display:block}

.editor{border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:14px;position:relative;overflow:hidden}
.editor textarea{width:100%;min-height:72px;resize:vertical;font-size:15px;line-height:1.5;color:var(--fg)}
.editor textarea::placeholder{color:var(--dim)}
.editor-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font:11px var(--mono);color:var(--dim)}
.editor-btns{display:flex;gap:8px;margin-top:12px}
.btn{padding:10px 14px;border:1px solid var(--line);border-radius:6px;font:13px var(--sans);font-weight:500;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px;flex:1;cursor:pointer;color:var(--fg);background:none}
.btn:hover:not(:disabled){border-color:var(--dim)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.btn-primary:hover:not(:disabled){opacity:.9}

.progress-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--line);overflow:hidden;transition:opacity .5s}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--world));width:0;transition:width .3s}

.filters{display:flex;gap:2px;padding:3px;background:var(--line);border-radius:6px;margin-bottom:14px}
.fbtn{flex:1;padding:7px 8px;font:11px var(--mono);color:var(--dim);border-radius:4px;transition:.15s;text-transform:uppercase;letter-spacing:.3px;display:inline-flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;background:none;border:none}
.fbtn.active{background:var(--bg);color:var(--fg)}
.fbtn .n{font-size:10px;padding:1px 5px;background:var(--bg);border-radius:6px}
.fbtn.active .n{background:var(--line)}

.carousel{display:none}.carousel.active{display:block}
.track{display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;padding:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.track::-webkit-scrollbar{display:none}

.card{flex:0 0 calc(100% - 4px);scroll-snap-align:start;scroll-snap-stop:always;border:1px solid var(--line);border-radius:8px;padding:12px 12px 12px 16px;position:relative;overflow:hidden;min-width:280px;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}

.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.t-local::before{background:var(--accent)}
.card.t-world::before{background:var(--world)}
.card.t-seren::before{background:var(--seren)}
.card.t-seren{background:rgba(74,222,128,.03)}
.card.peer{opacity:.95}

.card-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0}
.card-tag{font:10px var(--mono);font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;background:var(--line);color:var(--dim)}
.t-local .card-tag{color:var(--accent)}
.t-world .card-tag{color:var(--world)}
.t-seren .card-tag{color:var(--seren)}
.card-score{font:11px var(--mono);color:var(--dim)}
.card-body{font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;max-height:160px;overflow-y:auto;flex:1}
.card-body mark{background:transparent;color:var(--accent);font-weight:600}
.card-foot{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px;flex-shrink:0}
.card-act{font:11px var(--mono);color:var(--dim);padding:5px 8px;border:1px solid var(--line);border-radius:4px;transition:.15s;min-height:28px;cursor:pointer;background:none}
.card-act:hover{color:var(--fg);border-color:var(--dim)}
.card-act.danger:hover{color:var(--err);border-color:var(--err)}
.card-hint{font:11px var(--mono);color:var(--dim);font-style:italic}

.empty{text-align:center;color:var(--dim);padding:40px 20px;font:12px var(--mono);width:100%}
.empty .hint{margin-top:8px;font-size:11px;opacity:.7}

.hist-bar{display:flex;gap:8px;margin-bottom:14px}
.hist-bar input{flex:1;padding:9px 12px;background:var(--line);border-radius:6px;min-height:40px;color:var(--fg)}
.hist-bar select{padding:9px 10px;background:var(--line);border-radius:6px;min-height:40px;font:12px var(--mono);color:var(--fg)}
.hist-bar select option{background:var(--bg)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(2px)}
.overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-400px;width:360px;max-width:100%;height:100%;background:var(--bg);border-left:1px solid var(--line);z-index:101;transition:.25s;padding:20px;overflow-y:auto}
.drawer.open{right:0}
.drawer h3{font:600 16px var(--sans);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.drawer .close{font-size:24px;color:var(--dim);min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:none;border:none}
.drawer .close:hover{color:var(--err)}

.field{margin-bottom:18px}
.field label{display:block;font:11px var(--mono);color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input[type="text"]{width:100%;padding:10px 12px;background:var(--line);border-radius:6px;min-height:40px;color:var(--fg)}
.field input[type="range"]{width:100%;accent-color:var(--accent)}
.field .row{display:flex;justify-content:space-between;align-items:center}
.field .val{font:12px var(--mono);color:var(--accent);font-weight:600}
.field .hint{font:11px var(--mono);color:var(--dim);margin-top:5px;line-height:1.4}

.section{font:11px var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}

.noo-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--fg);color:var(--bg);padding:10px 20px;border-radius:4px;font:12px var(--mono);z-index:1000;transition:.25s;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;pointer-events:none}
.noo-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.noo-toast.ok{background:var(--seren);color:#000}
.noo-toast.err{background:var(--err);color:#fff}
.noo-toast.info{background:var(--world);color:#000}

.copied-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--fg);color:var(--bg);padding:20px 40px;border-radius:8px;font:16px var(--mono);font-weight:600;z-index:2000;opacity:0;transition:all .3s;box-shadow:0 8px 40px rgba(0,0,0,.6);pointer-events:none}
.copied-flash.show{transform:translate(-50%,-50%) scale(1);opacity:1}

#loom-root{display:none}
body.show-app #app-root{display:flex;flex-direction:column;flex:1;min-height:0}
body.show-app #loom-root{display:none}

@media (max-width:600px){
  .topbar{padding:8px 10px}
  .tabs .tab{padding:9px 4px;font-size:11px}
  .editor{padding:10px}
  .drawer{width:100%}
}

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var log = ctx.require("Core.Logger");
  var store = ctx.require("Core.Store");
  var KEY = "noomium:cfg";

  var defaults = {
    room: "noomium-core",
    threshold: 0.30,
    serendipity: 0.15,
    relays: ["wss://relay.damus.io","wss://nos.lol","wss://relay.snort.social"],
    kQuery: 21000,
    kAnswer: 21001,
    model: "Xenova/all-MiniLM-L6-v2",
    dim: 384,
    debounce: 800,
    peerTTL: 60000,
    heartbeat: 30000,
    subWindow: 120,
    queryRateLimit: 2000
  };

  var state = Object.assign({}, defaults);
  try {
    var saved = store ? store.get(KEY, null) : null;
    if (saved && typeof saved === "object") Object.assign(state, saved);
  } catch(e){ if(log) log.warn("Config load failed", String(e)); }

  return {
    get: function(k, def){ return state.hasOwnProperty(k) ? state[k] : def; },
    set: function(k, v){ state[k] = v; },
    getAll: function(){ return Object.assign({}, state); },
    save: function(){
      try { if (store) store.set(KEY, state); }
      catch(e){ if(log) log.warn("Config save failed", String(e)); }
    },
    reset: function(){
      state = Object.assign({}, defaults);
      try { if (store) store.remove(KEY); } catch(_){}
    }
  };
}
</script>

<script type="text/loom-module" data-role="code">
function Module(ctx){
  function uuid(){
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c){
      var r = Math.random() * 16 | 0;
      return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }
  function fnv1a(s){
    var h = 2166136261;
    for (var i=0; i<s.length; i++){
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return "h" + (h >>> 0).toString(16);
  }
  function esc(s){
    return String(s==null ? "" : s).replace(/[&<>]/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;"})[c];
    });
  }
  function escRe(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  return { uuid:uuid, fnv1a:fnv1a, esc:esc, escRe:escRe };
}
</script>

<!-- LOOM:BEGIN_MODULE name="Core.NooDB" -->
<script type="application/json" data-role="manifest">
{"name":"Core.NooDB","type":"core","version":"1.0.0","dependsOn":["Core.NooConfig","Core.Logger"],"exports":["put","get","del","all","clear","reset"]}
</script>
<script type="application/json" data-role="contract">
{"$schema":"loom.contract/1","functions":{"put":{"args":[{"type":"object"}],"returns":{"type":"promise"}},"get":{"args":[{"type":"string"}],"returns":{"type":"promise"}},"del":{"args":[{"type":"string"}],"returns":{"type":"promise"}},"all":{"args":[],"returns":{"type":"promise"}},"clear":{"args":[],"returns":{"type":"promise"}},"reset":{"args":[],"returns":{"type":"promise"}}}}
</script>
<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg = ctx.require("Core.NooConfig");
  var log = ctx.require("Core.Logger");
  var DB_NAME = "noomium_v8";
  var STORE = "notes";
  var db = null;

  function open(){
    return new Promise(function(res, rej){
      if (db) return res(db);
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function(e){
        var d = e.target.result;
        if (!d.objectStoreNames.contains(STORE)){
          d.createObjectStore(STORE, { keyPath: "id" });
        }
      };
      req.onsuccess = function(e){ db = e.target.result; res(db); };
      req.onerror = function(){ rej(req.error); };
      req.onblocked = function(){ rej(new Error("DB blocked")); };
    });
  }

  function tx(mode, fn, retries){
    if (retries === undefined) retries = 3;
    return open().then(function(d){
      return new Promise(function(res, rej){
        function attempt(n){
          try {
            var t = d.transaction(STORE, mode);
            var s = t.objectStore(STORE);
            var r = fn(s);
            r.onsuccess = function(){ res(r.result); };
            r.onerror = function(){
              if (n > 0) setTimeout(function(){ attempt(n - 1); }, 100);
              else rej(r.error);
            };
          } catch(err){
            if (n > 0) setTimeout(function(){ attempt(n - 1); }, 100);
            else rej(err);
          }
        }
        attempt(retries);
      });
    });
  }

  return {
    put: function(note){ return tx("readwrite", function(s){ return s.put(note); }); },
    get: function(id){ return tx("readonly", function(s){ return s.get(id); }); },
    del: function(id){ return tx("readwrite", function(s){ return s.delete(id); }); },
    all: function(){ return tx("readonly", function(s){ return s.getAll(); }); },
    clear: function(){ return tx("readwrite", function(s){ return s.clear(); }); },
    reset: function(){
      if (db){ try{ db.close(); }catch(_){} db = null; }
      return new Promise(function(r){
        var req = indexedDB.deleteDatabase(DB_NAME);
        req.onsuccess = req.onerror = req.onblocked = function(){ r(); };
      });
    }
  };
}
</script>

{"$schema":"loom.contract/1","functions":{"load":{"args":[{"type":"function","optional":true}],"returns":{"type":"promise"}},"embed":{"args":[{"type":"string"}],"returns":{"type":"promise"}},"cosine":{"args":[{"type":"array"},{"type":"array"}],"returns":{"type":"number"}},"ready":{"args":[],"returns":{"type":"boolean"}},"getMode":{"args":[],"returns":{"type":"string"}},"onProgress":{"args":[{"type":"function"}],"returns":{"type":"void"}}}}

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg = ctx.require("Core.NooConfig");
  var log = ctx.require("Core.Logger");
  var bus = ctx.require("Core.Bus");
  var ext = null;
  var mode = "loading";
  var cache = Object.create(null);
  var progressFns = [];

  function hashEmbed(text){
    var DIM = cfg.get("dim", 384);
    var v = new Float32Array(DIM);
    var tokens = (text || "").toLowerCase().match(/[a-zа-яё0-9]+/gi) || [];
    for (var t=0; t<tokens.length; t++){
      var tok = tokens[t];
      var h = 2166136261;
      for (var i=0; i<tok.length; i++){
        h ^= tok.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      v[Math.abs(h) % DIM] += 1;
      var h2 = Math.imul(h ^ 0x9e3779b9, 2654435761);
      v[Math.abs(h2) % DIM] += 0.5;
    }
    var n = 0;
    for (var i=0; i<DIM; i++) n += v[i] * v[i];
    n = Math.sqrt(n) || 1;
    for (var i=0; i<DIM; i++) v[i] /= n;
    return Array.from(v);
  }

  return {
    ready: function(){ return ext !== null || mode === "demo"; },
    getMode: function(){ return mode; },
    onProgress: function(fn){ if (typeof fn === "function") progressFns.push(fn); },

    load: function(onProgress){
      if (ext || mode === "demo") return Promise.resolve();
      var MODEL = cfg.get("model", "Xenova/all-MiniLM-L6-v2");
      return Promise.resolve().then(function(){
        return import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2");
      }).then(function(mod){
        if (mod.env){
          mod.env.allowLocalModels = false;
          mod.env.useBrowserCache = true;
        }
        return mod.pipeline("feature-extraction", MODEL, {
          quantized: true,
          progress_callback: function(p){
            if (p.status === "progress" && p.total > 0){
              var pct = p.loaded / p.total * 100;
              if (typeof onProgress === "function") onProgress(pct);
              for (var i=0; i<progressFns.length; i++){
                try { progressFns[i](pct); } catch(_){}
              }
              if (bus && bus.emit) bus.emit("noo:ai:progress", { pct: pct });
            }
          }
        });
      }).then(function(pipe){
        ext = pipe;
        mode = "model";
        if (log) log.info("AI model loaded: " + MODEL);
      }).catch(function(err){
        if (log) log.warn("AI model load failed, fallback to hash", String(err && err.message || err));
        mode = "demo";
      });
    },

    embed: function(text){
      var t = (text || "").trim();
      if (!t) return Promise.resolve(null);
      if (cache[t]) return Promise.resolve(cache[t]);
      var p;
      if (ext){
        p = Promise.resolve().then(function(){
          return ext(t, { pooling: "mean", normalize: true });
        }).then(function(out){
          return Array.from(out.data);
        }).catch(function(err){
          if (log) log.warn("embed failed, fallback to hash", String(err && err.message || err));
          return hashEmbed(t);
        });
      } else {
        p = Promise.resolve(hashEmbed(t));
      }
      return p.then(function(v){ cache[t] = v; return v; });
    },

    cosine: function(a, b){
      if (!a || !b || a.length !== b.length) return 0;
      var s = 0;
      for (var i=0; i<a.length; i++) s += a[i] * b[i];
      return s;
    }
  };

{"name":"Core.NooNet","type":"core","version":"1.0.0","dependsOn":["Core.NooConfig","Core.NooDB","Core.NooAI","Core.Logger","Core.Bus"],"exports":["init","send","activeAnswers","peerCount","stop"]}

<script type="application/json" data-role="contract">
{"$schema":"loom.contract/1","functions":{"init":{"args":[{"type":"function","optional":true}],"returns":{"type":"promise"}},"send":{"args":[{"type":"array"}],"returns":{"type":"void"}},"activeAnswers":{"args":[],"returns":{"type":"array"}},"peerCount":{"args":[],"returns":{"type":"number"}},"stop":{"args":[],"returns":{"type":"void"}}}}

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg = ctx.require("Core.NooConfig");
  var DB  = ctx.require("Core.NooDB");
  var AI  = ctx.require("Core.NooAI");
  var log = ctx.require("Core.Logger");
  var bus = ctx.require("Core.Bus");

  var pool = null, sk = null, pk = null;
  var queryId = null;
  var peers = new Map();
  var answers = [];
  var onUpdate = null;
  var heartbeatTimer = null;
  var lastQueryTime = 0;
  var nostrMod = null;
  var sub = null;

  function validateEvent(ev){
    if (!ev || typeof ev !== "object") return false;
    if (typeof ev.id !== "string" || ev.id.length !== 64) return false;
    if (typeof ev.pubkey !== "string" || ev.pubkey.length !== 64) return false;
    if (typeof ev.kind !== "number") return false;
    if (!Array.isArray(ev.tags)) return false;
    return true;
  }

  function onEvent(ev){
    if (!validateEvent(ev)) return;
    if (ev.pubkey === pk) return;
    peers.set(ev.pubkey, Date.now());

    var K_QUERY = cfg.get("kQuery", 21000);
    var K_ANSWER = cfg.get("kAnswer", 21001);
    var room = cfg.get("room", "noomium-core");

    if (ev.kind === K_QUERY){
      try {
        var q = JSON.parse(ev.content);
        if (!q.vector || !Array.isArray(q.vector)) return;
        DB.all().then(function(all){
          var floor = cfg.get("threshold", 0.30) - cfg.get("serendipity", 0.15);
          var toSend = [];
          for (var i=0; i<all.length; i++){
            var n = all[i];
            if (!n.shared || !n.vector) continue;
            if (AI.cosine(q.vector, n.vector) >= floor) toSend.push(n);
          }
          toSend.forEach(function(n){
            try {
              var ans = nostrMod.finalizeEvent({
                kind: K_ANSWER,
                created_at: Math.floor(Date.now() / 1000),
                tags: [["t", room], ["e", ev.id]],
                content: JSON.stringify({ text: n.text, vector: n.vector })
              }, sk);
              pool.publish(cfg.get("relays", []), ans);
            } catch(e){ if(log) log.warn("answer publish failed", String(e)); }
          });
        });
      } catch(_){}
    }

    if (ev.kind === K_ANSWER){
      var eTag = null;
      for (var i=0; i<ev.tags.length; i++){
        if (ev.tags[i][0] === "e"){ eTag = ev.tags[i][1]; break; }
      }
      if (eTag && eTag === queryId){
        try {
          var d = JSON.parse(ev.content);
          if (d.text && d.vector){
            var dup = false;
            for (var j=0; j<answers.length; j++){ if (answers[j].id === ev.id){ dup = true; break; } }
            if (!dup){
              answers.push({
                id: ev.id,
                text: d.text,
                vector: d.vector,
                peer: ev.pubkey.slice(0, 8),
                fullPubkey: ev.pubkey,
                createdAt: Date.now()
              });
              if (typeof onUpdate === "function") onUpdate();
            }
          }
        } catch(_){}
      }
    }
  }

  function startHeartbeat(){
    if (heartbeatTimer) clearInterval(heartbeatTimer);
    var hb = cfg.get("heartbeat", 30000);
    var ttl = cfg.get("peerTTL", 60000);
    heartbeatTimer = setInterval(function(){
      var now = Date.now();
      var removed = 0;
      peers.forEach(function(ts, pubkey){
        if (now - ts > ttl){ peers.delete(pubkey); removed++; }
      });
      if (bus && bus.emit) bus.emit("noo:net:peers", { count: peers.size });
      if (removed > 0 && typeof onUpdate === "function") onUpdate();
    }, hb);
  }

  return {
    init: function(cb){
      onUpdate = cb;
      return Promise.resolve().then(function(){
        return import("https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm");
      }).then(function(mod){
        nostrMod = mod;
        var KEY = "noomium:sk";
        var keyHex = null;
        try { keyHex = localStorage.getItem(KEY); } catch(_){}
        if (!keyHex){
          var raw = mod.generateSecretKey();
          keyHex = Array.from(raw).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
          try { localStorage.setItem(KEY, keyHex); } catch(_){}
        }
        sk = new Uint8Array(keyHex.match(/.{1,2}/g).map(function(b){ return parseInt(b, 16); }));
        pk = mod.getPublicKey(sk);
        pool = new mod.SimplePool();

        var now = Math.floor(Date.now() / 1000);
        var room = cfg.get("room", "noomium-core");
        var K_QUERY = cfg.get("kQuery", 21000);
        var K_ANSWER = cfg.get("kAnswer", 21001);
        var subWindow = cfg.get("subWindow", 120);

        try {
          sub = pool.subscribeMany(cfg.get("relays", []), [{
            kinds: [K_QUERY, K_ANSWER],
            "#t": [room],
            since: now - subWindow
          }], { onevent: onEvent });
        } catch(e){ if(log) log.warn("subscribe failed", String(e)); }

        if (bus && bus.emit) bus.emit("noo:net:peers", { count: 0 });
        startHeartbeat();
        if (log) log.info("Nostr net started, room=" + room);
      }).catch(function(err){
        if (log) log.error("nostr-tools load failed", String(err && err.message || err));
        throw err;
      });
    },

    send: function(vector){
      if (!pool || !nostrMod) return;
      var now = Date.now();
      var rate = cfg.get("queryRateLimit", 2000);
      if (now - lastQueryTime < rate) return;
      lastQueryTime = now;

      answers.length = 0;
      try {
        var ev = nostrMod.finalizeEvent({
          kind: cfg.get("kQuery", 21000),
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", cfg.get("room", "noomium-core")]],
          content: JSON.stringify({ vector: vector })
        }, sk);
        queryId = ev.id;
        pool.publish(cfg.get("relays", []), ev);
      } catch(e){ if(log) log.warn("publish failed", String(e)); }
    },

    activeAnswers: function(){
      var out = [];
      for (var i=0; i<answers.length; i++){
        if (peers.has(answers[i].fullPubkey)) out.push(answers[i]);
      }
      return out;
    },

    peerCount: function(){ return peers.size; },

    stop: function(){
      if (heartbeatTimer){ clearInterval(heartbeatTimer); heartbeatTimer = null; }
      if (sub && typeof sub.close === "function"){ try{ sub.close(); }catch(_){} }
      if (pool && typeof pool.close === "function"){ try{ pool.close(); }catch(_){} }
    }
  };
}
</script>
<!-- LOOM:END_MODULE -->

{"$schema":"loom.contract/1","functions":{"card":{"args":[{"type":"object"},{"type":"string"},{"type":"string","optional":true}],"returns":{"type":"string"}},"render":{"args":[{"type":"any"},{"type":"array"},{"type":"string"},{"type":"string","optional":true}],"returns":{"type":"void"}},"empty":{"args":[{"type":"string"},{"type":"string"},{"type":"string","optional":true}],"returns":{"type":"void"}},"lookup":{"args":[{"type":"string"}],"returns":{"type":"object"}}}}

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var U = ctx.require("Core.NooUtils");
  var registry = Object.create(null);

  function card(item, type, query){
    registry[item.id] = item;
    var isPeer = !!item.peer;
    var label = isPeer ? ("peer · " + item.peer)
      : (item.shared ? "shared" : "private");
    var score = typeof item.score === "number"
      ? (item.score * 100).toFixed(0) + "%"
      : (item.createdAt ? new Date(item.createdAt).toLocaleDateString("ru-RU") : "");
    var html = U.esc(item.text);
    if (query){
      var words = query.toLowerCase().split(/\s+/).filter(function(w){ return w.length > 2; });
      for (var i=0; i<words.length; i++){
        html = html.replace(new RegExp("(" + U.escRe(words[i]) + ")", "gi"), "<mark>$1</mark>");
      }
    }
    var foot;
    if (isPeer){
      foot = '<div class="card-foot"><span class="card-hint">прочитать · понять · написать своё</span></div>';
    } else {
      foot = '<div class="card-foot">' +
        '<button class="card-act" data-act="toggle" data-id="'+item.id+'">'+(item.shared ? "скрыть" : "поделиться")+'</button>' +
        '<button class="card-act" data-act="copy" data-id="'+item.id+'">копировать</button>' +
        '<button class="card-act danger" data-act="del" data-id="'+item.id+'">удалить</button>' +
        '</div>';
    }
    return '<div class="card t-'+type+(isPeer?' peer':'')+'" data-id="'+item.id+'">' +
      '<div class="card-head"><span class="card-tag">'+U.esc(label)+'</span><span class="card-score">'+U.esc(score)+'</span></div>' +
      '<div class="card-body">'+html+'</div>' +
      foot +
      '</div>';
  }

  function render(id, items, type, query){
    var track = document.querySelector("#" + id + " .track");
    if (!track) return;
    if (!items.length){ track.innerHTML = '<div class="empty">пусто</div>'; return; }
    track.innerHTML = items.map(function(i){ return card(i, type, query); }).join("");
  }

  function empty(id, msg, hint){
    var track = document.querySelector("#" + id + " .track");
    if (!track) return;
    track.innerHTML = '<div class="empty">' + U.esc(msg) +
      (hint ? '<div class="hint">' + U.esc(hint) + '</div>' : '') +
      '</div>';
  }

  return { card:card, render:render, empty:empty, lookup:function(id){ return registry[id] || null; } };
}
</script>

function Module(ctx){

  var U = ctx.require("Core.NooUtils");
  var bus = ctx.require("Core.Bus");
  var root = null;

  function openDrawer(id){
    if (!root) return;
    var d = root.querySelector("#" + id);
    var o = root.querySelector("#overlay");
    if (d) d.classList.add("open");
    if (o) o.classList.add("open");
  }
  function closeDrawers(){
    if (!root) return;
    var ds = root.querySelectorAll(".drawer");
    for (var i=0; i<ds.length; i++) ds[i].classList.remove("open");
    var o = root.querySelector("#overlay");
    if (o) o.classList.remove("open");
  }

  return {
    mount: function(host){ root = host; },
    open: openDrawer,
    close: closeDrawers,
    bindSettings: function(onApply, onWipe, onToast){
      if (!root) return;
      var setRoom    = root.querySelector("#setRoom");
      var setThresh  = root.querySelector("#setThresh");
      var setSeren   = root.querySelector("#setSeren");
      var valThresh  = root.querySelector("#valThresh");
      var valSeren   = root.querySelector("#valSeren");

      if (setRoom)   setRoom.value   = cfg.get("room", "noomium-core");
      if (setThresh) setThresh.value = cfg.get("threshold", 0.30);
      if (setSeren)  setSeren.value  = cfg.get("serendipity", 0.15);
      if (valThresh) valThresh.textContent = Number(cfg.get("threshold", 0.30)).toFixed(2);
      if (valSeren)  valSeren.textContent  = Number(cfg.get("serendipity", 0.15)).toFixed(2);

      if (setThresh){
        setThresh.oninput = function(e){
          var v = parseFloat(e.target.value);
          cfg.set("threshold", v);
          if (valThresh) valThresh.textContent = v.toFixed(2);
        };
      }
      if (setSeren){
        setSeren.oninput = function(e){
          var v = parseFloat(e.target.value);
          cfg.set("serendipity", v);
          if (valSeren) valSeren.textContent = v.toFixed(2);
        };
      }

      var applyBtn = root.querySelector("#btnApply");
      if (applyBtn) applyBtn.onclick = function(){
        var roomVal = setRoom ? setRoom.value.trim() : "";
        cfg.set("room", roomVal || "noomium-core");
        cfg.save();
        if (typeof onApply === "function") onApply();
      };
      var wipeBtn = root.querySelector("#btnWipe");
      if (wipeBtn) wipeBtn.onclick = function(){
        if (typeof onWipe === "function") onWipe();
      };
    }
  };
}

        '<p style="color:var(--dim);font:12px var(--mono);margin-bottom:4px;">Ctrl+Enter — сохранить</p>' +
        '<p style="color:var(--dim);font:12px var(--mono);margin-bottom:4px;">Ctrl+Shift+Enter — поделиться</p>' +
        '<p style="color:var(--dim);font:12px var(--mono);margin-bottom:4px;">/ — в редактор</p>' +
        '<p style="color:var(--dim);font:12px var(--mono);">Esc — закрыть панели</p>' +
      '</aside>' +

      '<div class="copied-flash" id="copiedFlash">✓ скопировано</div>';
  }

  function search(){
    var input = document.querySelector("#input");
    var text = input ? input.value.trim() : "";
    if (!text || !AI.ready()){
      ["local","world","seren"].forEach(function(k){
        Renderer.empty("c-" + k, k === "local" ? "начните печатать" : "—");
        var c = document.querySelector("#cnt" + k.charAt(0).toUpperCase() + k.slice(1));
        if (c) c.textContent = "0";
      });
      return Promise.resolve();
    }
    return AI.embed(text).then(function(qv){
      if (!qv) return;
      if (!lastVec || AI.cosine(qv, lastVec) < 0.98){
        lastVec = qv;
        Net.send(qv);
      }
      return DB.all().then(function(all){
        var scored = [];
        for (var i=0; i<all.length; i++){
          var n = all[i];
          if (n.vector) scored.push(Object.assign({}, n, { score: AI.cosine(qv, n.vector) }));
        }
        var worldScored = Net.activeAnswers().map(function(a){
          return Object.assign({}, a, { score: AI.cosine(qv, a.vector) });
        });
        var TH = cfg.get("threshold", 0.30);
        var SD = cfg.get("serendipity", 0.15);
        var local = scored.filter(function(n){ return n.score >= TH; }).sort(function(a,b){ return b.score - a.score; });
        var world = worldScored.filter(function(n){ return n.score >= TH; }).sort(function(a,b){ return b.score - a.score; });
        var seren = scored.concat(worldScored)
          .filter(function(n){ return n.score >= (TH - SD) && n.score < TH; })
          .sort(function(a,b){ return b.score - a.score; });
        Renderer.render("c-local", local, "local", text);
        Renderer.render("c-world", world, "world", text);
        Renderer.render("c-seren", seren, "seren", text);
        function setC(id, v){ var el = document.querySelector("#" + id); if (el) el.textContent = String(v); }
        setC("cntLocal", local.length);
        setC("cntWorld", world.length);
        setC("cntSeren", seren.length);
      });
    });
  }

  function renderHistory(){
    return DB.all().then(function(all){
      var bc = document.querySelector("#baseCount");
      if (bc) bc.textContent = String(all.length);
      var sI = document.querySelector("#histSearch");
      var sS = document.querySelector("#histSort");
      var q = sI ? sI.value.trim().toLowerCase() : "";
      var sort = sS ? sS.value : "new";
      var list = all.slice();
      if (q) list = list.filter(function(n){ return n.text.toLowerCase().indexOf(q) >= 0; });
      if (sort === "old") list.sort(function(a,b){ return a.createdAt - b.createdAt; });
      else if (sort === "az") list.sort(function(a,b){ return a.text.localeCompare(b.text, "ru"); });
      else list.sort(function(a,b){ return b.createdAt - a.createdAt; });
      Renderer.render("c-history", list, "local", q || null);
    });
  }

  function sanitizeNote(raw){
    if (!raw || typeof raw !== "object") return null;
    if (typeof raw.text !== "string" || raw.text.length > 10000) return null;
    return {
      id: typeof raw.id === "string" ? raw.id : U.uuid(),
      text: raw.text.trim(),
      vector: Array.isArray(raw.vector) ? raw.vector : null,
      shared: !!raw.shared,
      createdAt: typeof raw.createdAt === "number" ? raw.createdAt : Date.now(),
      hash: typeof raw.hash === "string" ? raw.hash : U.fnv1a(raw.text)
    };
  }

  function saveNote(shared){
    var input = document.querySelector("#input");
    var text = input ? input.value.trim() : "";
    if (!text){ toast("пусто", "err"); return; }
    if (!AI.ready()){ toast("ИИ не готов", "err"); return; }
    AI.embed(text).then(function(vector){
      return DB.put({
        id: U.uuid(),
        text: text,
        vector: vector,
        shared: !!shared,
        createdAt: Date.now(),
        hash: U.fnv1a(text)
      });
    }).then(function(){
      if (input) input.value = "";
      lastVec = null;
      toast(shared ? "видно узлам" : "сохранено лично", "ok");
      search();
      renderHistory();
    }).catch(function(e){ toast("ошибка: " + (e && e.message || e), "err"); });
  }

  function onAction(act, id){
    if (act === "copy"){
      DB.get(id).then(function(n){
        if (!n) return;
        try {
          navigator.clipboard.writeText(n.text).then(flashCopied);
        } catch(e){ toast("не удалось скопировать", "err"); }
      });
    } else if (act === "del"){
      if (!confirm("удалить заметку?")) return;
      DB.del(id).then(function(){
        toast("удалено", "info");
        search();
        renderHistory();
      });
    } else if (act === "toggle"){
      DB.get(id).then(function(n){
        if (!n) return;
        n.shared = !n.shared;
        return DB.put(n).then(function(){
          toast(n.shared ? "видно миру" : "скрыто", "ok");
          search();
          renderHistory();
        });
      });
    }
  }

  function exportData(){
    DB.all().then(function(notes){
      if (!notes.length){ toast("нечего экспортировать", "err"); return; }
      var capsule = {
        app: "noomium", format: "noo", version: 1,
        exportedAt: Date.now(), notes: notes
      };
      var blob = new Blob([JSON.stringify(capsule, null, 2)], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "noomium-" + new Date().toISOString().slice(0,10) + ".noo";
      document.body.appendChild(a); a.click();
      URL.revokeObjectURL(url); a.remove();
      toast("экспорт: " + notes.length, "ok");
    });
  }

  function importData(file){
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var data = JSON.parse(String(reader.result || "{}"));
        var notes = Array.isArray(data) ? data : data.notes;
        if (!Array.isArray(notes)) throw new Error("неверный формат");
        DB.all().then(function(existing){
          var byHash = Object.create(null);
          var byId = Object.create(null);
          existing.forEach(function(n){
            if (n.hash) byHash[n.hash] = n;
            byId[n.id] = n;
          });
          var added = 0, skipped = 0;
          function step(i){
            if (i >= notes.length){
              toast("импорт: +" + added + " / ~" + skipped, "ok");
              search(); renderHistory();
              return;
            }
            var note = sanitizeNote(notes[i]);
            if (!note){ skipped++; return step(i+1); }
            if (byHash[note.hash]){ skipped++; return step(i+1); }
            if (byId[note.id] && byId[note.id].text === note.text){ skipped++; return step(i+1); }
            var p;
            if (AI.ready() && !note.vector){
              p = AI.embed(note.text).then(function(v){ note.vector = v; });
            } else {
              p = Promise.resolve();
            }
            p.then(function(){
              return DB.put(note);
            }).then(function(){
              if (note.hash) byHash[note.hash] = note;
              byId[note.id] = note;
              added++;
              step(i+1);
            }).catch(function(){ skipped++; step(i+1); });
          }
          step(0);
        });
      } catch(e){
        toast("импорт: " + e.message, "err");
      }
    };
    reader.readAsText(file);
  }

  function bind(root){
    if (bound) return;
    bound = true;

    Status.mount(root);
    Drawers.mount(root);

    Drawers.bindSettings(
      function(){ location.reload(); },
      function(){
        if (!confirm("стереть всю базу? это необратимо.")) return;
        DB.reset().then(function(){
          toast("база стёрта", "info");
          setTimeout(function(){ location.reload(); }, 500);
        });
      },
      toast
    );

    var tabs = root.querySelectorAll(".tab");
    for (var i=0; i<tabs.length; i++){
      tabs[i].onclick = function(e){
        var t = e.currentTarget;
        var ts = root.querySelectorAll(".tab");
        for (var j=0; j<ts.length; j++) ts[j].classList.remove("active");
        var vs = root.querySelectorAll(".view");
        for (var j=0; j<vs.length; j++) vs[j].classList.remove("active");
        t.classList.add("active");
        var v = root.querySelector("#view-" + t.getAttribute("data-view"));
        if (v) v.classList.add("active");
        if (t.getAttribute("data-view") === "history") renderHistory();
      };
    }
    var fbtns = root.querySelectorAll(".fbtn");
    for (var i=0; i<fbtns.length; i++){
      fbtns[i].onclick = function(e){
        var f = e.currentTarget;
        var fs = root.querySelectorAll(".fbtn");
        for (var j=0; j<fs.length; j++) fs[j].classList.remove("active");
        var cs = root.querySelectorAll(".carousel");
        for (var j=0; j<cs.length; j++) cs[j].classList.remove("active");
        f.classList.add("active");
        var c = root.querySelector("#c-" + f.getAttribute("data-filter"));
        if (c) c.classList.add("active");
      };
    }

    var input = root.querySelector("#input");
    if (input){
      input.addEventListener("input", function(){
        var text = input.value;
        var charCount = root.querySelector("#charCount");
        var debounce = root.querySelector("#debounce");
        if (charCount) charCount.textContent = String(text.length);
        if (text === lastText) return;
        lastText = text;
        if (searchTimer) clearTimeout(searchTimer);
        if (debounce) debounce.textContent = "...";
        searchTimer = setTimeout(function(){
          if (debounce) debounce.textContent = "";
          search();
        }, cfg.get("debounce", 800));
      });
    }

    var bsp = root.querySelector("#btnSavePrivate"); if (bsp) bsp.onclick = function(){ saveNote(false); };
    var bss = root.querySelector("#btnSaveShared"); if (bss) bss.onclick = function(){ saveNote(true); };

    var hs = root.querySelector("#histSearch");
    if (hs) hs.addEventListener("input", function(){
      if (histTimer) clearTimeout(histTimer);
      histTimer = setTimeout(renderHistory, 200);
    });
    var hsort = root.querySelector("#histSort");
    if (hsort) hsort.onchange = renderHistory;

    root.querySelector(".work").addEventListener("click", function(e){
      var el = e.target.closest("[data-act]");
      if (el) onAction(el.getAttribute("data-act"), el.getAttribute("data-id"));
    });

    var bs = root.querySelector("#btnSettings"); if (bs) bs.onclick = function(){ Drawers.open("drawer"); };
    var bh = root.querySelector("#btnHelp");     if (bh) bh.onclick = function(){ Drawers.open("helpDrawer"); };
    var bc = root.querySelector("#btnClose");     if (bc) bc.onclick = function(){ Drawers.close(); };
    var bch= root.querySelector("#btnCloseHelp"); if (bch)bch.onclick= function(){ Drawers.close(); };
    var ov = root.querySelector("#overlay");      if (ov) ov.onclick = function(){ Drawers.close(); };

    var be = root.querySelector("#btnExport"); if (be) be.onclick = exportData;
    var bi = root.querySelector("#btnImport");
    var fi = root.querySelector("#importFile");
    if (bi) bi.onclick = function(){ if (fi) fi.click(); };
    if (fi) fi.onchange = function(e){
      if (e.target.files && e.target.files[0]) importData(e.target.files[0]);
      e.target.value = "";
    };

    keyHandler = function(e){
      if (e.key === "Escape") Drawers.close();
      if (e.key === "/" && document.activeElement !== input &&
          !/^(INPUT|TEXTAREA|SELECT)$/.test((document.activeElement && document.activeElement.tagName) || "")){
        e.preventDefault();
        if (input) input.focus();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter"){
        e.preventDefault();
        if (document.activeElement === input) saveNote(e.shiftKey);
      }
    };
    document.addEventListener("keydown", keyHandler);

    AI.onProgress(function(pct){
      var bar = root.querySelector("#modelProgress");
      if (bar) bar.style.width = pct + "%";
      Status.set("stAI", "AI " + Math.round(pct) + "%", "busy");
    });
  }

  function boot(root){
    DB.all().then(function(){
      Status.set("stDB", "DB", "ok");
    }).catch(function(e){
      if (log) log.error("DB", String(e && e.message || e));
      Status.set("stDB", "DB", "err");
    });

    AI.load().then(function(){
      var bar = root.querySelector("#modelProgress");
      if (bar){
        bar.style.width = "100%";
        setTimeout(function(){ bar.style.opacity = "0"; }, 500);
      }
      Status.set("stAI", AI.getMode() === "model" ? "AI" : "AI·demo", "ok");
    }).catch(function(e){
      if (log) log.error("AI", String(e && e.message || e));
      Status.set("stAI", "AI", "err");
    });

    Net.init(function(){ search(); }).then(function(){
      Status.set("stNet", "NET", "ok");
    }).catch(function(e){
      if (log) log.error("Net", String(e && e.message || e));
      Status.set("stNet", "NET", "err");
    });

    Renderer.empty("c-local", "начните печатать", "первые результаты через ~1 сек");
    Renderer.empty("c-world", "—");
    Renderer.empty("c-seren", "—");
    renderHistory();
    if (log) log.info("NOOmium ready");
  }

  return {
    mount: function(){
      var root = document.getElementById("app-root");
      if (!root) return;
      root.innerHTML = markup();
      bind(root);
      boot(root);
    },
    unmount: function(){
      if (keyHandler){ document.removeEventListener("keydown", keyHandler); keyHandler = null; }
      if (searchTimer) clearTimeout(searchTimer);
      if (histTimer) clearTimeout(histTimer);
      Net.stop();
      var root = document.getElementById("app-root");
      if (root) root.innerHTML = "";
      bound = false;
    }
  };
}

var bus = registry.has("Core.Bus") && registry.get("Core.Bus").exports; if (bus) ctx.bus = bus;
var store = registry.has("Core.Store") && registry.get("Core.Store").exports; if (store) ctx.store = store;
var health = registry.has("Build.Health") && registry.get("Build.Health").exports; if (health) ctx.health = health;
updateGlobals();
}
function mountIDE(){
var topbar = registry.has("UI.Topbar") && registry.get("UI.Topbar").exports;
if (topbar && topbar.mount) topbar.mount();
var shell = registry.has("UI.Shell") && registry.get("UI.Shell").exports;
var actions = registry.has("UI.Actions") && registry.get("UI.Actions").exports;
if (shell && actions){
if (shell.mount) shell.mount();
if (actions.wire) actions.wire();
if (ctx.log && ctx.log.info) ctx.log.info("UI mounted");
} else {
if (actions && actions.wire) actions.wire();
if (!shell) console.warn("UI.Shell missing");
}
}
function mountApp(entry){
try{
var host = registry.has("App.Host") && registry.get("App.Host").exports;
if (host && host.mount) host.mount();
try{ document.body.classList.add("show-app"); }catch(_){}
if (entry){
var app = registry.has(entry) && registry.get(entry).exports;
if (app && typeof app.mount==="function") app.mount();
else if (app && typeof app.init==="function") app.init();
else console.warn("Entry app has no mount/init:", entry);
}
}catch(e){ console.error("App mount error", e); }
}
function updateGlobals(){
window.Loom = window.Loom || {};
window.Loom.meta = ctx.meta;
window.Loom.guide = ctx.guide;
window.Loom.require = ctx.require;
window.Loom.modules = ctx.modules;
window.Loom.log = ctx.log;
window.Loom.bus = ctx.bus;
window.Loom.store = ctx.store;
window.Loom.health = ctx.health;
}
document.addEventListener("DOMContentLoaded", function(){
collect();
compileAll();
try {
if (runProfile==="app"){ mountApp(entryApp); }
else {
var w = registry.has("App.Welcome") && registry.get("App.Welcome").exports;
if (w && w.init) w.init();
mountIDE();
}
} catch(e) {
if (ctx.log && ctx.log.warn) ctx.log.warn("Boot init failed", String(e));
}
});
})();
</script>
