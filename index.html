<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noosphere</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; max-width: 640px; margin: 2rem auto; padding: 0 1rem; background: #f8fafc; color: #0f172a; }
    h1 { margin-bottom: 1rem; font-size: 1.5rem; }
    textarea { width: 100%; min-height: 90px; padding: 0.75rem; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 1rem; font-family: inherit; resize: vertical; }
    button { padding: 0.6rem 1.2rem; background: #4f46e5; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; font-size: 0.9rem; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #64748b; }
    button.ghost { background: transparent; color: #4f46e5; border: 1px solid #e2e8f0; }
    .row { display: flex; gap: 0.75rem; align-items: center; margin-top: 0.75rem; flex-wrap: wrap; }
    .status { font-size: 0.85rem; color: #64748b; margin: 0.5rem 0; min-height: 1.2em; }
    .section { margin-top: 2rem; }
    .section-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .personal .section-title { color: #a78bfa; }
    .world .section-title { color: #38bdf8; }
    .card { border: 1px solid #e2e8f0; padding: 0.9rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; background: white; }
    .card-text { font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.5rem; white-space: pre-wrap; word-break: break-word; }
    .card-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: #64748b; }
    .score { background: rgba(79,70,229,0.1); color: #4f46e5; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .empty { text-align: center; color: #94a3b8; padding: 1.5rem; font-style: italic; font-size: 0.9rem; }
    .actions { display: flex; gap: 0.4rem; margin-top: 0.4rem; }
    .actions button { padding: 0.25rem 0.6rem; font-size: 0.75rem; }
    .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid #64748b; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type="checkbox"] { cursor: pointer; width: 18px; height: 18px; }
    label { user-select: none; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; }
    .sub-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin: 1rem 0 0.5rem; }
    .sub-title.relevant { color: #38bdf8; }
    .sub-title.serendipity { color: #fbbf24; }
    .wave-btn { background: none; border: 1px solid #e2e8f0; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🌍 Noosphere</h1>
  <textarea id="input" placeholder="Поделитесь мыслью..."></textarea>
  <div class="status" id="status">Загрузка модели...</div>
  <div class="row">
    <button id="saveBtn" disabled>💾 Сохранить</button>
    <label>
      <input type="checkbox" id="shareCheckbox" />
      Отправить в мир
    </label>
  </div>

  <div class="section personal" id="personalSection" style="display:none;">
    <div class="section-title">Мои похожие</div>
    <div id="personalResults"></div>
  </div>

  <div class="section world" id="worldSection" style="display:none;">
    <div class="section-title">Мир</div>
    <div id="worldResults"></div>
  </div>

  <div class="section">
    <div class="section-title" style="color:#64748b;">Мои заметки</div>
    <div id="myNotes"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
