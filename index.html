<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Noosphere (GunDB polished)</title>

  <!-- ================= Module: Styles (UI only) ================= -->
  <style>
    :root{
      --bg:#f8fafc; --surface:#ffffff; --text:#0f172a; --text2:#64748b;
      --border:#e2e8f0; --accent:#4f46e5; --accent2:#4338ca;
      --shadow:0 1px 3px rgba(0,0,0,0.06); --radius:16px;
      --wave:#0ea5e9; --star:#fbbf24;
      --personal:#a78bfa; --world:#38bdf8; --ser:#fbbf24;
      --danger:#ef4444; --ok:#16a34a;
    }
    body.dark{
      --bg:#0b1220; --surface:#111c2f; --text:#eef2ff; --text2:#94a3b8;
      --border:#22324f; --accent:#818cf8; --accent2:#6366f1;
      --shadow:0 1px 3px rgba(0,0,0,0.35);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
      background:var(--bg); color:var(--text); line-height:1.5;
      display:flex; justify-content:center; padding:0.7rem; overflow-x:hidden;
    }
    .app{ width:100%; max-width:720px; display:flex; flex-direction:column; gap:0.75rem; margin-top:0.25rem; }

    .tabs{ display:flex; gap:0.5rem; justify-content:center; }
    .tab-btn{
      padding:0.55rem 1.2rem; border-radius:12px; border:1px solid var(--border);
      background:transparent; color:var(--text2); cursor:pointer; font-weight:800;
      transition:all .2s;
    }
    .tab-btn.active{ background:var(--accent); border-color:var(--accent); color:#fff; }

    .view{ display:none; }
    .view.active{ display:block; }

    .thought-input{
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1rem; box-shadow:var(--shadow);
    }
    textarea{
      width:100%; border:none; background:transparent; outline:none;
      font-size:1.05rem; font-family:inherit; resize:none; color:var(--text);
      min-height:92px;
    }
    textarea::placeholder{ color:var(--text2); opacity:0.75; }
    .input-actions{
      display:flex; justify-content:space-between; gap:0.75rem; align-items:center; margin-top:0.75rem;
      flex-wrap:wrap;
    }
    .status-line{
      font-size:0.82rem; color:var(--text2);
      display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap;
    }
    .pill{
      display:inline-flex; gap:0.35rem; align-items:center;
      padding:0.15rem 0.55rem; border-radius:999px;
      border:1px solid var(--border); background:rgba(0,0,0,0.00);
      font-weight:800;
    }
    .dot{ width:8px; height:8px; border-radius:50%; background:var(--text2); display:inline-block; }
    .dot.ok{ background:var(--ok); }
    .dot.bad{ background:var(--danger); }

    .btn-row{ display:flex; gap:0.5rem; align-items:center; margin-left:auto; }
    .btn{
      padding:0.62rem 1rem; border-radius:12px; font-weight:900;
      border:none; cursor:pointer; background:var(--accent); color:#fff;
      font-size:0.92rem; transition:all .2s;
      display:inline-flex; align-items:center; justify-content:center; gap:0.5rem;
      box-shadow:0 6px 16px rgba(79,70,229,0.12);
    }
    .btn:hover{ background:var(--accent2); transform:translateY(-1px); }
    .btn:disabled{ opacity:0.45; pointer-events:none; transform:none; box-shadow:none; }
    .btn-ghost{
      background:transparent; color:var(--text2); border:1px solid var(--border);
      box-shadow:none;
    }
    .btn-danger{ background:var(--danger); box-shadow:none; }
    .btn-danger:hover{ filter:brightness(0.96); }

    .swipe-hint{ font-size:0.82rem; color:var(--text2); display:none; align-items:center; gap:0.35rem; }
    .swipe-hint.visible{ display:flex; }

    .feed-section{ margin-top:0.25rem; }
    .section-title{
      display:flex; align-items:center; gap:0.5rem;
      font-size:0.8rem; font-weight:950; color:var(--text2);
      text-transform:uppercase; letter-spacing:0.07em; margin-bottom:0.5rem;
    }
    .section-title::before{
      content:''; display:block; width:9px; height:9px; border-radius:50%;
      background:currentColor;
      box-shadow:0 0 0 3px rgba(0,0,0,0.04);
    }
    #personalSection .section-title{ color:var(--personal); }
    #relevantSection .section-title{ color:var(--world); }
    #serendipitySection .section-title{ color:var(--ser); }

    .carousel{
      display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch; gap:0.75rem; padding-bottom:0.5rem;
    }
    .carousel::-webkit-scrollbar{ height:5px; }
    .carousel::-webkit-scrollbar-thumb{ background:var(--border); border-radius:3px; }

    .card{
      flex:0 0 calc(100% - 1.5rem);
      scroll-snap-align:start;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1rem; box-shadow:var(--shadow);
      animation:fadeInUp .28s ease both;
    }
    .card.charged{ border-color:var(--wave); box-shadow:0 0 0 1px var(--wave); }
    @keyframes fadeInUp{ from{ opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    .card-text{ font-size:0.98rem; line-height:1.55; margin-bottom:0.7rem; white-space:pre-wrap; word-break:break-word; }
    .card-footer{ display:flex; align-items:center; justify-content:space-between; gap:0.6rem; font-size:0.82rem; color:var(--text2); }
    .badge{
      background:rgba(79,70,229,0.12); color:var(--accent);
      padding:2px 10px; border-radius:999px; font-weight:950;
      border:1px solid rgba(79,70,229,0.12);
    }
    .wave-group{ display:flex; align-items:center; gap:0.45rem; }
    .wave-btn{
      background:none; border:1px solid var(--border); border-radius:999px;
      padding:0.25rem 0.55rem;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:0.85rem; cursor:pointer; color:var(--text2); transition:all .2s;
      font-weight:900;
    }
    .wave-btn:hover{ background:var(--wave); color:#fff; border-color:var(--wave); }
    .wave-btn.active{ background:var(--wave); color:#fff; border-color:var(--wave); }
    .empty{ text-align:center; color:var(--text2); padding:1.25rem 1rem; font-style:italic; }

    .history-input{ margin-bottom:1rem; }
    .history-input input{
      width:100%; padding:0.78rem; border:1px solid var(--border); border-radius:14px;
      background:var(--surface); color:var(--text); outline:none;
    }
    .day-group{ margin-bottom:1.25rem; }
    .day-title{ font-size:0.86rem; font-weight:950; color:var(--text2); margin-bottom:0.5rem; }
    .archive-item{
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:0.75rem 1rem; margin-bottom:0.55rem;
    }
    .archive-item .meta{ font-size:0.75rem; color:var(--text2); margin-bottom:0.25rem; display:flex; gap:0.75rem; flex-wrap:wrap;}
    .archive-item .text{ font-size:0.98rem; white-space:pre-wrap; word-break:break-word; }
    .archive-item .actions{ margin-top:0.6rem; display:flex; gap:0.5rem; flex-wrap:wrap; }
    .archive-item .actions button{
      background:none; border:1px solid var(--border); border-radius:10px;
      padding:0.3rem 0.8rem; font-size:0.83rem; cursor:pointer; color:var(--text2);
      font-weight:900;
    }
    .archive-item .actions button.danger{ border-color:rgba(239,68,68,0.45); color:var(--danger); }

    .burger-btn{
      position:fixed; top:1rem; right:1rem; width:46px; height:46px;
      background:var(--surface); border:1px solid var(--border); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; z-index:5; font-size:1.4rem; box-shadow:var(--shadow);
    }
    .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:9; display:none; }
    .overlay.open{ display:block; }
    .settings-panel{
      position:fixed; top:0; right:0; width:400px; max-width:90vw; height:100%;
      background:var(--surface); box-shadow:-10px 0 35px rgba(0,0,0,0.18);
      z-index:10; padding:1.2rem; overflow-y:auto;
      transform:translateX(100%); transition:transform .32s cubic-bezier(0.4,0,0.2,1);
    }
    .settings-panel.open{ transform:translateX(0); }
    .setting-row{ margin-bottom:1rem; display:flex; flex-direction:column; gap:0.35rem; }
    .setting-row label{ font-size:0.85rem; color:var(--text2); font-weight:950; }
    .setting-row select, .setting-row textarea{
      width:100%; border:1px solid var(--border); border-radius:12px;
      padding:0.62rem 0.7rem; background:var(--surface); color:var(--text); outline:none;
      font-family:inherit;
    }
    .setting-row textarea{ min-height:78px; resize:vertical; }
    .range-display{ display:flex; align-items:center; gap:0.6rem; }
    .range-display input[type="range"]{ flex:1; }
    .range-display span{ min-width:3rem; font-weight:950; color:var(--accent); text-align:right; }

    .settings-actions{ display:flex; flex-direction:column; gap:0.6rem; margin:1.2rem 0; }
    .settings-actions .btn{ width:100%; }

    .spinner{
      display:inline-block; width:16px; height:16px;
      border:2px solid var(--text2); border-right-color:transparent;
      border-radius:50%; animation:spin .75s linear infinite; vertical-align:middle;
    }
    @keyframes spin{ to{ transform:rotate(360deg);} }

    .tiny{ font-size:0.75rem; color:var(--text2); }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>

  <!-- ================= Module: GunDB libs (network/storage only) ================= -->
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/rindexed.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/then.js"></script>
</head>

<body>
  <div class="app">
    <div class="tabs">
      <button class="tab-btn active" data-view="flow" id="tabFlowBtn">Поток</button>
      <button class="tab-btn" data-view="history" id="tabHistoryBtn">История</button>
    </div>

    <div class="view active" id="flowView">
      <div class="thought-input" id="thoughtContainer">
        <textarea id="thoughtInput" placeholder="Поделитесь мыслью..."></textarea>

        <div class="input-actions">
          <div class="status-line" id="statusMsg"></div>

          <div class="swipe-hint" id="swipeHint">
            <span>↑</span> <span id="swipeHintText">смахните вверх для публикации</span>
          </div>

          <div class="btn-row">
            <button class="btn btn-ghost" id="saveLocalBtn">Сохранить</button>
            <button class="btn" id="publishBtn" disabled>Опубликовать</button>
          </div>
        </div>
      </div>

      <div id="personalSection" class="feed-section">
        <div class="section-title" id="personalTitle">Мои мысли</div>
        <div id="personalCards" class="carousel"></div>
      </div>

      <div id="relevantSection" class="feed-section">
        <div class="section-title" id="relevantTitle">Мир</div>
        <div id="relevantCards" class="carousel"></div>
      </div>

      <div id="serendipitySection" class="feed-section" style="display:none;">
        <div class="section-title" id="serendipityTitle">Смежные</div>
        <div id="serendipityCards" class="carousel"></div>
      </div>
    </div>

    <div class="view" id="historyView">
      <div class="history-input">
        <input type="text" id="historySearchInput" placeholder="Поиск по истории..." />
      </div>
      <div id="historyContent"></div>
    </div>
  </div>

  <div class="burger-btn" id="settingsTrigger">☰</div>
  <div class="overlay" id="overlay"></div>

  <div class="settings-panel" id="settingsPanel">
    <h2 id="settingsTitle" style="margin-bottom:1rem;">Настройки</h2>

    <div class="setting-row">
      <label id="langLabel">Язык / Language</label>
      <select id="langSelect">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="themeLabel">Тема</label>
      <select id="themeSelect">
        <option value="auto">Авто</option>
        <option value="light">День</option>
        <option value="dark">Ночь</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="thresholdLabel">Порог релевантности</label>
      <div class="range-display">
        <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.25" />
        <span id="thresholdValue">0.25</span>
      </div>
    </div>

    <div class="setting-row">
      <label id="serLabel">Дельта смежности</label>
      <div class="range-display">
        <input type="range" id="serendipitySlider" min="0" max="0.5" step="0.01" value="0.15" />
        <span id="serendipityValue">0.15</span>
      </div>
    </div>

    <div class="setting-row">
      <label id="minWavesLabel">Мин. волн</label>
      <select id="minWavesSelect">
        <option value="0" selected>0</option>
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="5">5</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="maxCardsLabel">Макс. карточек</label>
      <select id="maxResultsSelect">
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="peersLabel">Gun peers (по одному URL на строку)</label>
      <textarea id="peersTextarea" class="mono" spellcheck="false"></textarea>
      <div class="tiny" id="peersHint">
        Если пусто — офлайн (IndexedDB). Для сети добавьте relay (например https://relay.peer.ooo/gun).
      </div>
    </div>

    <div class="settings-actions">
      <button id="exportCapsuleBtn" class="btn btn-ghost">Скачать капсулу</button>
      <button id="importCapsuleBtn" class="btn btn-ghost">Импортировать капсулу</button>
      <input type="file" id="importFileInput" accept=".capsule,.json" style="display:none;" />
      <button id="rebuildVectorsBtn" class="btn btn-ghost">Пересоздать векторы</button>
      <button id="resetDeviceBtn" class="btn btn-danger">Сбросить устройство (новый ID)</button>
    </div>

    <div style="display:flex; gap:0.5rem; margin:0.5rem 0 0;">
      <button id="applySettingsBtn" class="btn" style="flex:1;">Применить</button>
    </div>

    <div class="tiny" style="margin-top:1rem;">
      <div id="modelInfo">Модель: MiniLM (Transformers.js)</div>
      <div id="deviceInfo" class="mono"></div>
      <div id="debugInfo" class="mono"></div>
    </div>
  </div>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // ===================== Module: Utils =====================
    const Utils = (() => {
      const $ = (sel, root = document) => root.querySelector(sel);

      const escapeHTML = (s) => { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; };

      const debounce = (fn, ms) => {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
      };

      const clamp = (x, a, b) => Math.max(a, Math.min(b, x));

      const safeJSON = (x, fallback) => { try { return JSON.parse(x); } catch { return fallback; } };

      const uuid = () => (crypto?.randomUUID?.() ?? ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
      ));

      const formatDayLabel = (ms, t) => {
        const d = new Date(ms);
        const today = new Date(); today.setHours(0,0,0,0);
        const yest = new Date(today); yest.setDate(yest.getDate() - 1);
        if (+d >= +today) return t('today');
        if (+d >= +yest) return t('yesterday');
        return d.toLocaleDateString();
      };

      const groupByDay = (notes) => {
        const map = new Map();
        for (const n of notes) {
          const key = new Date(n.createdAt).toLocaleDateString();
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(n);
        }
        return map;
      };

      class Emitter {
        #m = new Map();
        on(ev, fn) { if (!this.#m.has(ev)) this.#m.set(ev, new Set()); this.#m.get(ev).add(fn); return () => this.#m.get(ev)?.delete(fn); }
        emit(ev, payload) { for (const fn of this.#m.get(ev) ?? []) { try { fn(payload); } catch (e) { console.error(e); } } }
      }

      return { $, escapeHTML, debounce, clamp, safeJSON, uuid, formatDayLabel, groupByDay, Emitter };
    })();

    // ===================== Module: IndexedDB KV (NO localStorage) =====================
    const KV = (() => {
      const DB_NAME = 'noosphere_kv_solid_v1';
      const STORE = 'kv';
      let available = true;

      function openDB() {
        return new Promise((resolve, reject) => {
          try {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = () => {
              const db = req.result;
              if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          } catch (e) {
            reject(e);
          }
        });
      }

      async function get(key) {
        try {
          const db = await openDB();
          return await new Promise((resolve, reject) => {
            const tx = db.transaction(STORE, 'readonly');
            const st = tx.objectStore(STORE);
            const req = st.get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        } catch (e) {
          available = false;
          return undefined;
        }
      }

      async function set(key, val) {
        try {
          const db = await openDB();
          return await new Promise((resolve, reject) => {
            const tx = db.transaction(STORE, 'readwrite');
            const st = tx.objectStore(STORE);
            const req = st.put(val, key);
            req.onsuccess = () => resolve(true);
            req.onerror = () => reject(req.error);
          });
        } catch (e) {
          available = false;
          return false;
        }
      }

      return { get, set, isAvailable: () => available };
    })();

    // ===================== Module: Settings Model (string peersText, not arrays in Gun!) =====================
    const SettingsModel = (() => {
      const DEFAULT = {
        __type: 'noosphere_settings',
        lang: 'ru',
        theme: 'auto',
        threshold: 0.25,
        serDelta: 0.15,
        minWaves: 0,
        maxResults: 5,
        peersText: 'https://relay.peer.ooo/gun'
      };

      const parsePeersText = (text) =>
        String(text ?? '')
          .split('\n')
          .map(s => s.trim())
          .filter(Boolean);

      const peersTextFromAny = (x) => {
        if (!x || typeof x !== 'object') return DEFAULT.peersText;

        if (typeof x.peersText === 'string') return x.peersText;

        // migration from old "peers" which could be array or object
        const p = x.peers;
        if (Array.isArray(p)) return p.map(String).join('\n');

        if (p && typeof p === 'object') {
          // numeric keys common case: {0:"...",1:"..."}
          const keys = Object.keys(p).filter(k => k !== '_' && k !== 'length');
          const arr = keys
            .filter(k => String(+k) === k) // numeric
            .sort((a,b) => (+a) - (+b))
            .map(k => String(p[k]).trim())
            .filter(Boolean);
          if (arr.length) return arr.join('\n');
        }

        return DEFAULT.peersText;
      };

      function sanitize(raw, base = DEFAULT) {
        const x = raw && typeof raw === 'object' ? raw : {};
        const peersText = peersTextFromAny(x);

        return {
          __type: 'noosphere_settings',
          lang: (x.lang === 'en' || x.lang === 'ru') ? x.lang : base.lang,
          theme: (x.theme === 'auto' || x.theme === 'light' || x.theme === 'dark') ? x.theme : base.theme,
          threshold: Utils.clamp(Number(x.threshold ?? base.threshold), 0, 1),
          serDelta: Utils.clamp(Number(x.serDelta ?? base.serDelta), 0, 0.5),
          minWaves: Math.max(0, Number(x.minWaves ?? base.minWaves) | 0),
          maxResults: Math.max(1, Number(x.maxResults ?? base.maxResults) | 0),
          peersText
        };
      }

      // PATCH extractor: only keys that реально пришли (чтобы .on() не сбрасывал значения дефолтом)
      function extractPatch(raw) {
        const x = raw && typeof raw === 'object' ? raw : {};
        const patch = {};
        if ('lang' in x) patch.lang = x.lang;
        if ('theme' in x) patch.theme = x.theme;
        if ('threshold' in x) patch.threshold = x.threshold;
        if ('serDelta' in x) patch.serDelta = x.serDelta;
        if ('minWaves' in x) patch.minWaves = x.minWaves;
        if ('maxResults' in x) patch.maxResults = x.maxResults;

        if ('peersText' in x || 'peers' in x) patch.peersText = peersTextFromAny(x);

        // marker
        if ('__type' in x) patch.__type = x.__type;

        return patch;
      }

      return { DEFAULT, sanitize, extractPatch, parsePeersText };
    })();

    // ===================== Module: BootSettings (KV) =====================
    const BootSettings = (() => {
      const KEY = 'bootSettings';
      async function load() {
        const raw = await KV.get(KEY);
        return SettingsModel.sanitize(raw ?? SettingsModel.DEFAULT);
      }
      async function save(s) {
        await KV.set(KEY, SettingsModel.sanitize(s));
      }
      return { load, save };
    })();

    // ===================== Module: I18n =====================
    const I18n = (() => {
      const dict = {
        ru: {
          tabFlow: 'Поток', tabHistory: 'История',
          inputPlaceholder: 'Поделитесь мыслью...',
          saveLocal: 'Сохранить', publish: 'Опубликовать',
          personalTitle: 'Мои мысли', worldTitle: 'Мир', serTitle: 'Смежные',
          emptyPersonal: 'Пока нет заметок. Нажмите «Сохранить».',
          emptyWorld: 'Пока пусто. Нажмите «Опубликовать».',
          emptySer: 'Смежные совпадения не найдены.',
          emptyHistory: 'Нет заметок',

    // ===================== Module: Vectors (math + packing) =====================
    const Vectors = (() => {
      const dot = (a, b) => { let d = 0; for (let i = 0; i < a.length; i++) d += a[i] * b[i]; return d; };

      const norm = (v) => {
        let s = 0; for (let i = 0; i < v.length; i++) s += v[i] * v[i];
        const m = Math.sqrt(s) || 0;
        if (!m) return v;
        for (let i = 0; i < v.length; i++) v[i] /= m;
        return v;
      };

      const _b64encode = (u8) => {
        let s = '';
        const CHUNK = 0x8000;
        for (let i = 0; i < u8.length; i += CHUNK) s += String.fromCharCode(...u8.subarray(i, i + CHUNK));
        return btoa(s);
      };
      const _b64decode = (b64) => {
        const bin = atob(b64);
        const u8 = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
        return u8;
      };

      const packInt8 = (f32) => {
        const v = new Float32Array(f32);
        norm(v);
        const i8 = new Int8Array(v.length);
        for (let i = 0; i < v.length; i++) i8[i] = Math.max(-127, Math.min(127, Math.round(v[i] * 127)));
        return _b64encode(new Uint8Array(i8.buffer));
      };

      const unpackInt8 = (b64) => {
        const u8 = _b64decode(b64);
        const i8 = new Int8Array(u8.buffer);
        const v = new Float32Array(i8.length);
        for (let i = 0; i < i8.length; i++) v[i] = i8[i] / 127;
        return norm(v);
      };

      return { dot, norm, packInt8, unpackInt8 };
    })();

    // ===================== Module: Embedder =====================
    const Embedder = (() => {
      let model = null;

      async function init() {
        model = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', { quantized: true });
      }

      async function embed(text) {
        if (!model) throw new Error('Embedder not initialized');
        const out = await model([text]);
        const { data, dims } = out;
        const tokens = dims?.[1];
        const hidden = dims?.[2];

        if (!tokens || !hidden) {
          const v = new Float32Array(data);
          return Vectors.norm(v);
        }

        const emb = new Float32Array(hidden);
        for (let t = 0; t < tokens; t++) {
          const base = t * hidden;
          for (let h = 0; h < hidden; h++) emb[h] += data[base + h];
        }
        for (let h = 0; h < hidden; h++) emb[h] /= tokens;
        return Vectors.norm(emb);
      }

      return { init, embed, isReady: () => !!model };
    })();

    // ===================== Module: Settings Store (Gun, PATCH MERGE) =====================
    const SettingsStore = (() => {
      function create({ gun, deviceId, seed }) {
        const ee = new Utils.Emitter();
        const ref = Schema.settings(gun, deviceId);

        let current = SettingsModel.sanitize(seed ?? SettingsModel.DEFAULT);

        // seed once (if empty)
        ref.once((data) => {
          const hasMarker = data && typeof data === 'object' && data.__type === 'noosphere_settings';
          const hasSome = data && typeof data === 'object' && (('lang' in data) || ('threshold' in data) || ('peersText' in data) || ('peers' in data));
          if (!hasMarker && !hasSome) {
            ref.put(current);
          } else if (!hasMarker && hasSome) {
            // migrate: ensure marker + peersText exist
            const patch = SettingsModel.extractPatch(data);
            current = SettingsModel.sanitize({ ...current, ...patch }, current);
            ref.put(current);
          }
        });

        ref.on((data) => {
          // IMPORTANT: merge patch, do not overwrite missing fields
          const patch = SettingsModel.extractPatch(data);
          current = SettingsModel.sanitize({ ...current, ...patch }, current);
          ee.emit('change', current);
        });

        function put(next) {
          current = SettingsModel.sanitize({ ...current, ...next }, current);
          ref.put(current);
          ee.emit('change', current);
        }

        return { get: () => current, onChange: (fn) => ee.on('change', fn), put };
      }
      return { create };
    })();

    // ===================== Module: Personal Notes Store =====================
    const PersonalStore = (() => {
      function create({ gun, deviceId }) {
        const ee = new Utils.Emitter();
        const ref = Schema.personalNotes(gun, deviceId);
        const map = new Map(); // id -> note

        function asNotePatch(data) {
          const x = data && typeof data === 'object' ? data : {};
          const p = {};
          if ('text' in x) p.text = String(x.text ?? '');
          if ('createdAt' in x) p.createdAt = Number(x.createdAt) || Date.now();
          if ('updatedAt' in x) p.updatedAt = Number(x.updatedAt) || Date.now();
          if ('editedAt' in x) p.editedAt = x.editedAt ? Number(x.editedAt) : null;
          if ('v' in x) p.vPacked = (typeof x.v === 'string') ? x.v : null;
          if ('deleted' in x) p.deleted = !!x.deleted;
          return p;
        }

        ref.map().on((data, id) => {
          if (!id || id === '_' || id === 'null') return;
          const patch = asNotePatch(data);

          if (patch.deleted) {
            map.delete(id);
            ee.emit('change', list());
            return;
          }

          const prev = map.get(id) ?? { id, text:'', createdAt: Date.now(), updatedAt: 0, editedAt: null, vPacked: null };
          const merged = { ...prev, ...patch, id };
          // updatedAt guard
          if ((merged.updatedAt ?? 0) >= (prev.updatedAt ?? 0)) {
            map.set(id, merged);
            ee.emit('change', list());
          }
        });

        function list() { return Array.from(map.values()).sort((a,b) => b.createdAt - a.createdAt); }
        function get(id) { return map.get(id) ?? null; }

        async function add({ text, vPacked = null, createdAt = Date.now(), editedAt = null }) {
          const id = Utils.uuid();
          const now = Date.now();
          ref.get(id).put({
            id,
            text,
            createdAt,
            updatedAt: now,
            editedAt,
            v: vPacked,
            deleted: false
          });
          return id;
        }

        async function update({ id, text, vPacked = null }) {
          const now = Date.now();
          ref.get(id).put({
            text,
            updatedAt: now,
            editedAt: now,
            ...(vPacked ? { v: vPacked } : {})
          });
        }

        async function putVector(id, vPacked) {
          ref.get(id).put({ v: vPacked, updatedAt: Date.now() });
        }

        async function markDeleted(id) {
          ref.get(id).put({ deleted: true, updatedAt: Date.now() });
        }

        return { onChange: (fn) => ee.on('change', fn), list, get, add, update, putVector, markDeleted };
      }
      return { create };
    })();

    // ===================== Module: World Store (notes + votes) =====================
    const WorldStore = (() => {
      function create({ gun, deviceId }) {
        const ee = new Utils.Emitter();
        const ref = Schema.worldNotes(gun);

        const notes = new Map();      // id -> {id, excerpt, createdAt, vPacked}
        const voteSets = new Map();   // id -> Map(voterId -> 1|0)
        const waves = new Map();      // id -> number
        const myWave = new Map();     // id -> boolean
        const voteSubs = new Set();

        function notePatch(data) {
          const x = data && typeof data === 'object' ? data : {};
          const p = {};
          if ('excerpt' in x) p.excerpt = String(x.excerpt ?? '').slice(0, 240);
          if ('createdAt' in x) p.createdAt = Number(x.createdAt) || Date.now();
          if ('v' in x) p.vPacked = (typeof x.v === 'string') ? x.v : null;
          if ('deleted' in x) p.deleted = !!x.deleted;
          return p;
        }

        function recompute(id) {
          const m = voteSets.get(id);
          let c = 0;
          if (m) for (const v of m.values()) if (v === 1) c++;
          waves.set(id, c);
          myWave.set(id, (m?.get(deviceId) === 1) || false);
        }

        function list() {
          const out = [];
          for (const n of notes.values()) {
            out.push({ ...n, waves: waves.get(n.id) ?? 0, myWave: myWave.get(n.id) ?? false });
          }
          return out.sort((a,b) => b.createdAt - a.createdAt);
        }

        function emit() { ee.emit('change', list()); }

        ref.map().on((data, id) => {
          if (!id || id === '_' || id === 'null') return;
          const patch = notePatch(data);

          if (patch.deleted) {
            notes.delete(id);
            voteSets.delete(id);
            waves.delete(id);
            myWave.delete(id);
            emit();
            return;
          }

          const prev = notes.get(id) ?? { id, excerpt:'', createdAt: Date.now(), vPacked: null };
          const merged = { ...prev, ...patch, id };
          notes.set(id, merged);

          if (!voteSubs.has(id)) {
            voteSubs.add(id);
            ref.get(id).get('votes').map().on((v, voterId) => {
              if (!voterId || voterId === '_' || voterId === 'null') return;
              const vv = Number(v) === 1 ? 1 : 0;
              if (!voteSets.has(id)) voteSets.set(id, new Map());
              voteSets.get(id).set(voterId, vv);
              recompute(id);
              emit();
            });
          }

          recompute(id);
          emit();
        });

        async function publish({ excerpt, vPacked }) {
          const id = Utils.uuid();
          ref.get(id).put({
            id,
            excerpt: String(excerpt ?? '').slice(0, 240),
            createdAt: Date.now(),
            v: vPacked ?? null,
            deleted: false
          });
          return id;
        }

        async function setMyWave(id, on) {
          ref.get(id).get('votes').get(deviceId).put(on ? 1 : 0);
        }

        return { onChange: (fn) => ee.on('change', fn), list, publish, setMyWave };
      }
      return { create };
    })();

    // ===================== Module: Search Engine =====================
    const SearchEngine = (() => {
      function create({ settingsStore, personalStore, worldStore }) {
        const vecCache = new Map(); // id -> Float32Array

        function getVec(id, packed) {
          if (!packed) return null;
          if (vecCache.has(id)) return vecCache.get(id);
          try {
            const v = Vectors.unpackInt8(packed);
            vecCache.set(id, v);
            return v;
          } catch { return null; }
        }

        function clearCache() { vecCache.clear(); }

        function scoreList(queryVec, items, getPacked, filter = () => true) {
          const res = [];
          for (const it of items) {
            if (!filter(it)) continue;
            const v = getVec(it.id, getPacked(it));
            if (!v) continue;
            const s = Vectors.dot(queryVec, v);
            res.push({ ...it, score: s });
          }
          res.sort((a,b) => b.score - a.score);
          return res;
        }

        async function flow(text) {
          const q = String(text ?? '').trim();
          const st = settingsStore.get();

          if (!q) {
            const personalRecent = personalStore.list().slice(0, st.maxResults);
            const worldRecent = worldStore.list()
              .filter(n => (n.waves ?? 0) >= st.minWaves)
              .slice(0, st.maxResults);
            return { mode: 'recent', personal: personalRecent, rel: worldRecent, ser: [] };
          }

          if (!Embedder.isReady()) {
            // пока модель грузится — не делаем "пустой поиск", показываем recent (чтобы не было зомби)
            const personalRecent = personalStore.list().slice(0, st.maxResults);
            const worldRecent = worldStore.list().slice(0, st.maxResults);
            return { mode: 'recent', personal: personalRecent, rel: worldRecent, ser: [] };
          }

          const qVec = await Embedder.embed(q);

          const personal = scoreList(qVec, personalStore.list(), n => n.vPacked)
            .filter(x => x.score >= st.threshold)
            .slice(0, st.maxResults);

          const low = Math.max(0, st.threshold - st.serDelta);

          const scoredWorld = scoreList(
            qVec,
            worldStore.list(),
            n => n.vPacked,
            n => (n.waves ?? 0) >= st.minWaves
          );

          const rel = scoredWorld.filter(x => x.score >= st.threshold).slice(0, st.maxResults);
          const ser = scoredWorld.filter(x => x.score >= low && x.score < st.threshold).slice(0, st.maxResults);

          return { mode: 'search', personal, rel, ser };
        }

        async function historySearch(text) {
          const q = String(text ?? '').trim();
          const st = settingsStore.get();

          if (!q) return { list: personalStore.list(), mode:'all' };

          if (!Embedder.isReady()) {
            const low = q.toLowerCase();
            const list = personalStore.list().filter(n => n.text.toLowerCase().includes(low));
            return { list, mode:'substring' };
          }

          const qVec = await Embedder.embed(q);
          const scored = scoreList(qVec, personalStore.list(), n => n.vPacked)
            .filter(x => x.score >= st.threshold);
          return { list: scored, mode:'semantic' };
        }

        return { clearCache, flow, historySearch };
      }
      return { create };
    })();

            html += `
              <div class="archive-item" data-id="${n.id}">
                <div class="meta"><span>${Utils.escapeHTML(time)}</span>${edited}</div>
                <div class="text">${Utils.escapeHTML(n.text)}</div>
                <div class="actions">
                  <button class="edit-btn" data-id="${n.id}">${Utils.escapeHTML(t('edit'))}</button>
                  <button class="delete-btn danger" data-id="${n.id}">${Utils.escapeHTML(t('delete'))}</button>
                </div>
              </div>
            `;
          }
          html += `</div>`;
        }

        els.historyContent.innerHTML = html;
      }

      return { refs, setTexts, setStatus, openSettings, closeSettings, setTab, settingsToUI, uiToSettings, renderCarousel, renderHistory };
    })();

    // ===================== Module: Capsule =====================
    const Capsule = (() => {
      function exportNotes(notes) {
        const capsule = { version: 2, kind: 'noosphere', createdAt: Date.now(), notes: notes.map(n => ({
          id: n.id, text: n.text, createdAt: n.createdAt, editedAt: n.editedAt ?? null
        }))};
        const blob = new Blob([JSON.stringify(capsule)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'noosphere.capsule.json';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      async function importNotes(file) {
        const text = await file.text();
        const cap = Utils.safeJSON(text, null);
        if (!cap || !Array.isArray(cap.notes)) throw new Error('Bad capsule');
        return cap.notes
          .filter(n => n && typeof n.text === 'string')
          .map(n => ({
            text: String(n.text),
            createdAt: Number(n.createdAt) || Date.now(),
            editedAt: n.editedAt ? Number(n.editedAt) : null
          }));
      }

      return { exportNotes, importNotes };
    })();

    // ===================== Module: App =====================
    const App = (() => {
      async function ensureDeviceId() {
        let id = await KV.get('deviceId');
        if (!id) { id = Utils.uuid(); await KV.set('deviceId', id); }
        return id;
      }

      async function resetDeviceId() {
        await KV.set('deviceId', Utils.uuid());
        location.reload();
      }

      function starBurstAt(el) {
        const rect = el.getBoundingClientRect();
        const star = document.createElement('div');
        star.textContent = '✦';
        star.style.cssText = `
          position:fixed; left:${rect.left + rect.width/2}px; top:${rect.top + rect.height/2}px;
          font-size:24px; color:var(--star);
          transition:all 1s cubic-bezier(0.25,0.1,0.25,1);
          z-index:999; pointer-events:none; transform:translate(-50%,-50%);
        `;
        document.body.appendChild(star);
        requestAnimationFrame(() => { star.style.transform = 'translate(-50%,-250px) scale(0.1)'; star.style.opacity = '0'; });
        setTimeout(() => star.remove(), 1000);
      }

      function pill(label, okState = 'neutral') {
        const dotClass = okState === 'ok' ? 'ok' : okState === 'bad' ? 'bad' : '';
        return `<span class="pill"><span class="dot ${dotClass}"></span>${Utils.escapeHTML(label)}</span>`;
      }

      async function start() {
        const els = UI.refs();

        // ---- boot: device + bootSettings (IndexedDB KV)
        const deviceId = await ensureDeviceId();
        els.deviceInfo.textContent = `device: ${deviceId}`;

        const lastStartPrev = await KV.get('lastStart');
        await KV.set('lastStart', Date.now());

        const boot = await BootSettings.load();
        I18n.setLang(boot.lang);
        Theme.apply(boot.theme);
        UI.setTexts(els, I18n.t);
        UI.settingsToUI(els, boot);

        // ---- Gun init with boot peers (peers as LIST derived from peersText)
        const peers = SettingsModel.parsePeersText(boot.peersText);
        const { gun } = GunNet.create({ peers });

        // ---- stores
        const settingsStore = SettingsStore.create({ gun, deviceId, seed: boot });
        const personalStore = PersonalStore.create({ gun, deviceId });
        const worldStore = WorldStore.create({ gun, deviceId });

        const engine = SearchEngine.create({ settingsStore, personalStore, worldStore });

        // ---- UI status baseline
        const idbState = KV.isAvailable() ? pill(I18n.t('idbOk'), 'ok') : pill(I18n.t('idbBad'), 'bad');
        const lastStartState = lastStartPrev ? pill(`${I18n.t('lastStart')}: ${new Date(lastStartPrev).toLocaleString()}`) : pill(`${I18n.t('lastStart')}: —`);
        UI.setStatus(els, `${idbState} ${lastStartState} ${pill(I18n.t('modelLoading'))}`);

        // publish disabled until model ready
        els.publishBtn.disabled = true;

        // ---- model init async
        (async () => {
          try {
            await Embedder.init();
            els.publishBtn.disabled = false;
            // update status: keep idb pills + model ready
            UI.setStatus(els, `${idbState} ${lastStartState} ${pill(I18n.t('modelReady'), 'ok')} ${pill(I18n.t('ready'), 'ok')}`);
            // after model ready: ensure vectors in background
            backgroundEnsureVectors();
            await refreshFlow();
          } catch (e) {
            console.error(e);
            UI.setStatus(els, `${idbState} ${lastStartState} ${pill('Model error', 'bad')} ${pill(I18n.t('ready'), 'ok')}`);
          }
        })();

        // ---- reactive: settings from Gun (merge) + persist to KV
        settingsStore.onChange(async (s) => {
          // apply
          I18n.setLang(s.lang);
          Theme.apply(s.theme);
          UI.setTexts(els, I18n.t);
          UI.settingsToUI(els, s);

          // persist for next boot
          await BootSettings.save(s);

          // update peers runtime
          gun.opt({ peers: SettingsModel.parsePeersText(s.peersText) });

          engine.clearCache();
          await refreshFlow();
          if (els.historyView.classList.contains('active')) await refreshHistory();
        });

        // ---- background vector build for missing vectors
        let bgBusy = false;
        async function backgroundEnsureVectors() {
          if (bgBusy) return;
          if (!Embedder.isReady()) return;
          bgBusy = true;
          try {
            for (const n of personalStore.list()) {
              if (n.vPacked) continue;
              const v = await Embedder.embed(n.text);
              const packed = Vectors.packInt8(v);
              await personalStore.putVector(n.id, packed);
              engine.clearCache();
            }
          } catch (e) {
            console.error(e);
          } finally {
            bgBusy = false;
          }
        }

        personalStore.onChange(() => {
          refreshFlow();
          if (els.historyView.classList.contains('active')) refreshHistory();
          // if model ready — rebuild missing vectors
          backgroundEnsureVectors();
        });

        worldStore.onChange(() => refreshFlow());

        // ---- search race guards
        let flowSeq = 0;
        let historySeq = 0;

        async function refreshFlow() {
          const my = ++flowSeq;
          const q = els.input.value;
          const res = await engine.flow(q);
          if (my !== flowSeq) return;

          const t = I18n.t;
          const showScore = res.mode === 'search';

          UI.renderCarousel(els.personalCards, res.personal, { emptyText: t('emptyPersonal'), isWorld: false, showScore });
          UI.renderCarousel(els.relevantCards, res.rel, { emptyText: t('emptyWorld'), isWorld: true, showScore });

          const showSer = res.mode === 'search';
          els.serSection.style.display = showSer ? 'block' : 'none';
          if (showSer) UI.renderCarousel(els.serCards, res.ser, { emptyText: t('emptySer'), isWorld: true, showScore: true });
        }

        async function refreshHistory() {
          const my = ++historySeq;
          const q = els.historySearch.value;
          const { list } = await engine.historySearch(q);
          if (my !== historySeq) return;
          UI.renderHistory(els, list, I18n.t);
        }

        // ---- initial flow: show recents (no zombie)
        await refreshFlow();

        // ===================== Module: UI events =====================
        els.input.addEventListener('input', () => {
          els.swipeHint.classList.toggle('visible', els.input.value.trim().length > 0);
        });
        els.input.addEventListener('input', Utils.debounce(refreshFlow, 320));

        // swipe up publish
        let touchY = 0;
        els.input.addEventListener('touchstart', (e) => { touchY = e.touches?.[0]?.clientY ?? 0; }, { passive: true });
        els.input.addEventListener('touchend', async (e) => {
          const endY = e.changedTouches?.[0]?.clientY ?? 0;
          if (touchY - endY > 60 && els.input.value.trim()) {
            e.preventDefault();
            await publish();
          }
        }, { passive: false });

        // Save local: instant (no vector)
        let saving = false;
        async function saveLocal() {
          if (saving) return;
          const text = els.input.value.trim();
          if (!text) return;

          saving = true;
          try {
            await personalStore.add({ text, vPacked: null });
            els.input.value = '';
            els.swipeHint.classList.remove('visible');
            await refreshFlow();
            backgroundEnsureVectors();
          } finally {
            saving = false;
          }
        }

        // Publish: needs vector
        let publishing = false;
        async function publish() {
          if (publishing) return;
          const text = els.input.value.trim();
          if (!text) return;

          if (!Embedder.isReady()) return; // button already disabled, but extra safety

          publishing = true;
          try {
            const v = await Embedder.embed(text);
            const packed = Vectors.packInt8(v);

            await personalStore.add({ text, vPacked: packed });
            await worldStore.publish({ excerpt: text, vPacked: packed });

            starBurstAt(els.thoughtContainer);
            els.input.value = '';
            els.swipeHint.classList.remove('visible');

            engine.clearCache();
            await refreshFlow();
          } finally {
            publishing = false;
          }
        }

        els.saveLocalBtn.addEventListener('click', saveLocal);
        els.publishBtn.addEventListener('click', publish);

        // ctrl+enter publish / shift+ctrl+enter save
        els.input.addEventListener('keydown', async (e) => {
          if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            if (e.shiftKey) await saveLocal();
            else await publish();
          }
        });

        // tabs
        els.tabFlowBtn.addEventListener('click', () => UI.setTab(els, 'flow'));
        els.tabHistoryBtn.addEventListener('click', async () => {
          UI.setTab(els, 'history');
          await refreshHistory();
        });

        // settings open/close
        els.settingsTrigger.addEventListener('click', () => UI.openSettings(els));
        els.overlay.addEventListener('click', () => UI.closeSettings(els));

        els.thresholdSl.addEventListener('input', () => els.thresholdVal.textContent = Number(els.thresholdSl.value).toFixed(2));
        els.serSl.addEventListener('input', () => els.serVal.textContent = Number(els.serSl.value).toFixed(2));

        els.applyBtn.addEventListener('click', async () => {
          const next = SettingsModel.sanitize(UI.uiToSettings(els), settingsStore.get());
          // IMPORTANT: write settings to Gun + KV
          settingsStore.put(next);
          await BootSettings.save(next);
          UI.closeSettings(els);
        });

        // history search
        els.historySearch.addEventListener('input', Utils.debounce(refreshHistory, 320));

        // world wave + history edit/delete
        document.addEventListener('click', async (e) => {
          const wave = e.target.closest?.('.wave-btn');
          if (wave && wave.dataset.action === 'wave') {
            const id = wave.dataset.id;
            const isActive = wave.classList.contains('active');
            await worldStore.setMyWave(id, !isActive);
            return;
          }

          const editBtn = e.target.closest?.('.edit-btn');
          const delBtn = e.target.closest?.('.delete-btn');
          const saveEdit = e.target.closest?.('.save-edit-btn');
          const cancelEdit = e.target.closest?.('.cancel-edit-btn');

          if (editBtn) {
            const item = editBtn.closest('.archive-item');
            const id = item?.dataset?.id;
            const note = personalStore.get(id);
            if (!note) return;

            item.querySelector('.text').innerHTML =
              `<textarea class="edit-textarea" style="width:100%;min-height:60px;">${Utils.escapeHTML(note.text)}</textarea>`;
            item.querySelector('.actions').innerHTML =
              `<button class="save-edit-btn" data-id="${id}">${Utils.escapeHTML(I18n.t('save'))}</button>
               <button class="cancel-edit-btn" data-id="${id}">${Utils.escapeHTML(I18n.t('cancel'))}</button>`;
            return;
          }

          if (saveEdit) {
            const item = saveEdit.closest('.archive-item');
            const id = saveEdit.dataset.id;
            const ta = item?.querySelector('.edit-textarea');
            if (ta?.value?.trim()) {
              const newText = ta.value.trim();
              let vPacked = null;
              if (Embedder.isReady()) {
                const v = await Embedder.embed(newText);
                vPacked = Vectors.packInt8(v);
              }
              await personalStore.update({ id, text: newText, vPacked });
              engine.clearCache();
              backgroundEnsureVectors();
            }
            await refreshHistory();
            await refreshFlow();
            return;
          }

          if (cancelEdit) { await refreshHistory(); return; }

          if (delBtn) {
            const id = delBtn.dataset.id;
            if (confirm(I18n.t('confirmDelete'))) {
              await personalStore.markDeleted(id);
              engine.clearCache();
              await refreshHistory();
              await refreshFlow();
            }
            return;
          }
        });

        // capsule
        els.exportBtn.addEventListener('click', () => Capsule.exportNotes(personalStore.list()));
        els.importBtn.addEventListener('click', () => els.importFile.click());
        els.importFile.addEventListener('change', async (e) => {
          const file = e.target.files?.[0];
          e.target.value = '';
          if (!file) return;

          try {
            const imported = await Capsule.importNotes(file);
            let n = 0;
            for (const item of imported) {
              await personalStore.add({ text: item.text, vPacked: null, createdAt: item.createdAt, editedAt: item.editedAt });
              n++;
            }
            alert(I18n.t('importSuccess', { n }));
            backgroundEnsureVectors();
          } catch (err) {
            console.error(err);
            alert('Import error: ' + (err?.message ?? String(err)));
          }
        });

        // rebuild vectors
        els.rebuildBtn.addEventListener('click', async () => {
          if (!Embedder.isReady()) { alert('Model not ready'); return; }
          els.rebuildBtn.disabled = true;
          els.rebuildBtn.textContent = '...';
          try {
            for (const n of personalStore.list()) {
              const v = await Embedder.embed(n.text);
              const packed = Vectors.packInt8(v);
              await personalStore.putVector(n.id, packed);
            }
            engine.clearCache();
            alert(I18n.t('rebuildDone'));
          } finally {
            els.rebuildBtn.disabled = false;
            els.rebuildBtn.textContent = I18n.t('rebuildVectors');
          }
        });

        // reset device
        els.resetDeviceBtn.addEventListener('click', async () => {
          if (!confirm(I18n.t('resetDeviceConfirm'))) return;
          await resetDeviceId();
        });

        // debug panel small
        const s = settingsStore.get();
        const peersNow = SettingsModel.parsePeersText(s.peersText).length;
        els.debugInfo.textContent = `peers: ${peersNow} | idb: ${KV.isAvailable() ? 'ok' : 'fail'}`;
      }

      return { start };
    })();

    // ===================== Boot =====================
    App.start().catch(err => {
      console.error(err);
      alert('Fatal error: ' + (err?.message ?? String(err)));
    });
  </script>
</body>
</html>
