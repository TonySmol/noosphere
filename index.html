<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trystero P2P test</title>
  <link rel="icon" href="data:," />
  <style>
    body{font:14px ui-monospace,Menlo,monospace;padding:16px}
    input,button{font:inherit;padding:8px}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
    pre{background:#111;color:#ddd;padding:10px;border-radius:8px;min-height:180px;overflow:auto}
    .pill{display:inline-block;padding:2px 8px;border:1px solid #ccc;border-radius:999px}
  </style>
</head>
<body>
  <h1>Trystero P2P test</h1>

  <div class="row">
    <span class="pill">peers: <span id="peers">0</span></span>
    <span class="pill">room: <span id="roomName"></span></span>
  </div>

  <div class="row">
    <input id="msg" placeholder="message..." style="flex:1;min-width:240px" />
    <button id="send">Send broadcast</button>
  </div>

  <pre id="log"></pre>

<script type="module">
  // ВАЖНО: импорт именно /torrent
  import { joinRoom } from 'https://cdn.jsdelivr.net/npm/trystero@0.17.1/torrent/+esm';

  const APP_ID = 'noosphere-demo';
  const ROOM = 'my-room-123'; // одинаково везде
  document.getElementById('roomName').textContent = ROOM;

  const TRACKERS = [
    'wss://tracker.openwebtorrent.com',
    'wss://tracker.btorrent.xyz',
    'wss://tracker.fastcast.nz',
  ];

  // иногда помогает явно указать STUN
  const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  const logEl = document.getElementById('log');
  const peersEl = document.getElementById('peers');
  const log = (...a) => { logEl.textContent += a.map(x => typeof x==='string'?x:JSON.stringify(x)).join(' ') + '\n'; logEl.scrollTop = logEl.scrollHeight; };

  const room = joinRoom({ appId: APP_ID, trackers: TRACKERS, rtcConfig }, ROOM);

  const refreshPeers = () => {
    // getPeers есть в новых версиях; если нет — просто не покажет число
    try {
      const peers = room.getPeers?.() || [];
      peersEl.textContent = String(peers.length);
    } catch {}
  };

  room.onPeerJoin?.((peerId) => { log('peer join', peerId); refreshPeers(); });
  room.onPeerLeave?.((peerId) => { log('peer leave', peerId); refreshPeers(); });

  const [sendMsg, onMsg] = room.makeAction('chat');
  onMsg((data, peerId) => log('from', peerId, '=>', data));

  document.getElementById('send').onclick = () => {
    const v = document.getElementById('msg').value.trim();
    if (!v) return;
    sendMsg({ text: v, t: Date.now() }); // broadcast всем
    log('you =>', v);
    document.getElementById('msg').value = '';
  };

  log('ready. open this page in 2 tabs/devices with same ROOM');
  refreshPeers();
</script>
</body>
</html>
