<title>Noosphere</title>
<style id="LOOM_CSS">
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface-hover:#1a1a24;
  --border:#24242e;--text-main:#e8e8f0;--text-muted:#8888a0;
  --brand:#7c5cff;--brand-glow:rgba(124,92,255,.2);
  --world:#0ea5e9;--world-glow:rgba(14,165,233,.2);
  --seren:#4ade80;--seren-glow:rgba(74,222,128,.2);
  --warn:#fbbf24;--warn-glow:rgba(251,191,36,.18);
  --danger:#f87171;--radius:12px;
  --font:14px/1.6 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --panel:#111827;--br:#1f2a44;--acc:#60a5fa;--ok:#22c55e;--muted:#99a7bf;
  --btn-bg:#18233a;--btn-text:#f8fbff;--btn-br:#223156;
  --btn-pr-bg:#7c5cff;--btn-pr-text:#fff;
  --topH:52px;--left:320px;
}
html[data-theme="light"]{
  --bg:#f3f4f6;--surface:#fff;--surface-hover:#f9fafb;
  --border:#e5e7eb;--text-main:#111827;--text-muted:#6b7280;
  --panel:#fff;--br:#d7dfea;--acc:#2563eb;--muted:#5b6374;
  --btn-bg:#f3f6fb;--btn-text:#0b1020;--btn-br:#d7dfea;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text-main);font:var(--font)}
body{display:flex;flex-direction:column}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font:inherit;color:inherit;background:none;border:none;outline:none}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--surface-hover)}

.navbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10}
.navbar-title{font-weight:700;font-size:16px;letter-spacing:.2px;background:linear-gradient(to right,var(--brand),var(--world));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.navbar-actions{display:flex;gap:6px}
.icon-btn{padding:6px 10px;border:1px solid var(--border);border-radius:8px;color:var(--text-main);transition:.2s;display:inline-flex;align-items:center;gap:6px;min-height:36px}
.icon-btn:hover{background:var(--surface-hover);border-color:var(--brand)}

.status-bar{display:flex;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;flex-wrap:wrap}
.badge-status{padding:4px 10px;border-radius:20px;background:var(--surface-hover);border:1px solid var(--border);display:flex;align-items:center;gap:6px;color:var(--text-muted);font-weight:500;transition:.3s}
.badge-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-status.active{color:var(--world);border-color:var(--world-glow);background:var(--world-glow)}
.badge-status.ready{color:var(--seren);border-color:var(--seren-glow)}
.badge-status.warn{color:var(--warn);border-color:var(--warn-glow);background:var(--warn-glow)}
.badge-status.alone{color:var(--text-muted);border-color:var(--border)}
.badge-status.busy .dot{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

.main-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:12px;color:var(--text-muted);font-weight:500;border-bottom:2px solid transparent;transition:.2s;display:flex;justify-content:center;align-items:center;gap:6px;cursor:pointer}
.tab.active{color:var(--text-main);border-color:var(--brand)}
.tab .tab-count{font-size:10px;font-family:monospace;background:var(--surface-hover);border:1px solid var(--border);padding:1px 6px;border-radius:10px}

.workspace{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;position:relative;scroll-behavior:smooth}
.view-layer{display:none;animation:fade .2s ease-out}
.view-layer.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.editor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;box-shadow:0 4px 6px -1px rgba(0,0,0,.1)}
.editor-textarea{width:100%;min-height:84px;background:transparent;border:none;resize:vertical;outline:none;font-size:15px;line-height:1.55;color:inherit;font-family:inherit}
.editor-textarea::placeholder{color:var(--text-muted)}
.editor-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:11px;color:var(--text-muted)}
.editor-meta-actions{display:flex;gap:14px}
.link-btn{color:var(--text-muted);font-size:11px;font-weight:600;transition:.2s;padding:2px 0;background:none;border:none;cursor:pointer}
.link-btn:hover{color:var(--brand)}
.editor-controls{display:flex;gap:8px;margin-top:14px}

.btn{padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;transition:.2s;border:1px solid transparent;flex:1;display:flex;justify-content:center;align-items:center;gap:6px;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:var(--surface-hover);color:var(--text-main);border-color:var(--border)}
.btn-ghost:hover:not(:disabled){border-color:var(--brand)}
.btn-primary{background:var(--btn-pr-bg);color:var(--btn-pr-text);border-color:var(--btn-pr-bg)}
.btn-primary:hover:not(:disabled){filter:brightness(1.1)}
kbd{font-family:monospace;font-size:10px;background:rgba(127,127,127,.14);border:1px solid var(--border);border-radius:4px;padding:1px 5px}

.filter-tabs{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:10px;border:1px solid var(--border);margin-bottom:16px}
.f-tab{flex:1;padding:6px;text-align:center;border-radius:6px;font-size:12px;font-weight:600;color:var(--text-muted);transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:none;border:none}
.f-tab.active{background:var(--surface-hover);color:var(--text-main);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.f-tab .counter{background:var(--border);padding:2px 6px;border-radius:12px;font-size:10px;font-family:monospace}
.f-tab.active[data-filter="local"] .counter{background:var(--brand-glow);color:var(--brand)}
.f-tab.active[data-filter="world"] .counter{background:var(--world-glow);color:var(--world)}
.f-tab.active[data-filter="seren"] .counter{background:var(--seren-glow);color:var(--seren)}

.node-list{display:none;flex-direction:column;gap:12px}
.node-list.active{display:flex}

.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 14px 14px 18px;position:relative;overflow:hidden;animation:slideUp .3s ease-out backwards}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.note-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.note-card.t-local::before{background:var(--brand)}
.note-card.t-world::before{background:var(--world)}
.note-card.t-seren::before{background:var(--seren)}
.note-card.peer{background:linear-gradient(180deg,var(--surface),var(--surface))}

.note-header{display:flex;justify-content:space-between;margin-bottom:8px;align-items:center;gap:8px}
.note-type{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;white-space:nowrap}
.t-local .note-type{background:var(--brand-glow);color:var(--brand)}
.t-world .note-type{background:var(--world-glow);color:var(--world)}
.t-seren .note-type{background:var(--seren-glow);color:var(--seren)}
.note-score{font-family:monospace;font-size:11px;color:var(--text-muted);white-space:nowrap}
.note-content{font-size:14px;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere}
.note-content mark{background:var(--brand-glow);color:var(--brand);padding:0 2px;border-radius:3px;font-weight:600}
.note-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:8px}
.note-hint{font-size:11px;color:var(--text-muted);font-style:italic;opacity:.8}
.note-actions{display:flex;gap:4px;flex-wrap:wrap;opacity:.55;transition:.2s;margin-left:auto}
.note-card:hover .note-actions{opacity:1}
.note-act{font-size:11px;font-weight:600;color:var(--text-muted);padding:4px 9px;border-radius:6px;border:1px solid var(--border);transition:.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer;background:none;font-family:inherit}
.note-act:hover{color:var(--text-main);border-color:var(--brand);background:var(--surface-hover)}
.note-act.danger:hover{color:var(--danger);border-color:var(--danger)}

.empty-state{padding:40px 20px;text-align:center;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-state svg{width:48px;height:48px;opacity:.2}
.empty-state .btn{flex:0}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--world);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.base-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;flex:1;min-width:80px}
.stat .num{font-size:18px;font-weight:700}
.stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}
.base-controls{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.base-search{flex:1;background:var(--surface);border:1px solid var(--border);padding:9px 12px;border-radius:8px;transition:.2s;color:inherit;font-family:inherit}
.base-search:focus{border-color:var(--brand);outline:none}
.base-sort{background:var(--surface);border:1px solid var(--border);padding:9px 10px;border-radius:8px;font-size:12px;color:inherit;font-family:inherit}
.base-sort option{background:var(--surface);color:var(--text-main)}

.toast-ns{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--text-main);color:var(--bg);padding:10px 20px;border-radius:30px;font-weight:600;font-size:13px;transition:.3s cubic-bezier(.175,.885,.32,1.275);z-index:1000;box-shadow:0 10px 25px rgba(0,0,0,.2);max-width:90vw;text-align:center;opacity:0;pointer-events:none}
.toast-ns.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-ns.ok{background:var(--seren);color:#04130a}
.toast-ns.err{background:var(--danger);color:#160404}
.toast-ns.info{background:var(--world);color:#021019}

.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:100;opacity:0;pointer-events:none;transition:.2s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-400px;width:360px;max-width:100%;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:101;transition:.3s cubic-bezier(.16,1,.3,1);padding:20px;overflow-y:auto}
.drawer.open{right:0}
.drawer-header{display:flex;justify-content:space-between;margin-bottom:24px;font-size:18px;font-weight:700;align-items:center}
.drawer-close{font-size:24px;color:var(--text-muted);transition:.2s;line-height:1;cursor:pointer;background:none;border:none}
.drawer-close:hover{color:var(--danger)}
.drawer-section{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:700;margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.drawer p{color:var(--text-muted);margin-bottom:10px;line-height:1.55}
.drawer b{color:var(--text-main);font-weight:600}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:11px;text-transform:uppercase;font-weight:700;color:var(--text-muted);margin-bottom:8px;letter-spacing:.5px}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.4}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);padding:10px 12px;border-radius:8px;transition:.2s;color:inherit;font-family:inherit}
.form-input:focus{border-color:var(--brand);outline:none}
.form-range{width:100%;accent-color:var(--brand)}
.val-display{float:right;font-family:monospace;color:var(--brand);font-weight:bold}
.btn-row{display:flex;gap:8px}

#loom-root{display:none}
body.show-app #app-root{display:flex;flex-direction:column;flex:1;min-height:0}
body.show-app #loom-root{display:none}

@media (max-width:600px){
  .workspace{padding:12px}
  .drawer{width:100%}
  .editor-card{padding:12px}
}
</style>

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var log = ctx.require("Core.Logger");
  var store = ctx.require("Core.Store");
  var KEY = "noosphere:cfg";

  var defaults = {
    room: "noosphere-core",
    theme: "dark",
    threshold: 0.30,
    serendipity: 0.15,
    relays: ["wss://relay.damus.io","wss://nos.lol","wss://relay.snort.social"],
    kQuery: 21000,
    kAnswer: 21001,
    model: "Xenova/all-MiniLM-L6-v2",
    dim: 384,
    debounce: 800,
    peerTTL: 60000,
    heartbeat: 30000,
    subWindow: 300,
    queryRateLimit: 2000,
    dbName: "ns_core_v12",
    storeName: "notes",
    capsuleExt: "capsul"
  };

  var state = Object.assign({}, defaults);
  try {
    var saved = store ? store.get(KEY, null) : null;
    if (saved && typeof saved === "object") Object.assign(state, saved);
  } catch(e){ if(log) log.warn("Config load failed", String(e)); }

  return {
    defaults: function(){ return Object.assign({}, defaults); },
    get: function(k, def){ return state.hasOwnProperty(k) ? state[k] : def; },
    set: function(k, v){ state[k] = v; },
    getAll: function(){ return Object.assign({}, state); },
    save: function(){
      try { if (store) store.set(KEY, state); }
      catch(e){ if(log) log.warn("Config save failed", String(e)); }
    },
    reset: function(){
      state = Object.assign({}, defaults);
      try { if (store) store.remove(KEY); } catch(_){}
    }
  };
}
</script>

<script type="application/json" data-role="contract">
{"$schema":"loom.contract/1","functions":{"uuid":{"args":[],"returns":{"type":"string"}},"fnv1a":{"args":[{"type":"string"}],"returns":{"type":"string"}},"esc":{"args":[{"type":"any"}],"returns":{"type":"string"}},"escRe":{"args":[{"type":"string"}],"returns":{"type":"string"}},"plural":{"args":[{"type":"number"},{"type":"string"},{"type":"string"},{"type":"string"}],"returns":{"type":"string"}},"word":{"args":[{"type":"string"},{"type":"number"}],"returns":{"type":"string"}},"ts":{"args":[],"returns":{"type":"number"}}}}

<script type="text/loom-module" data-role="code">
function Module(ctx){
  function uuid(){
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c){
      var r = Math.random() * 16 | 0;
      return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }
  function fnv1a(s){
    var h = 2166136261;
    for (var i=0; i<s.length; i++){
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return "h" + (h >>> 0).toString(16);
  }
  function esc(s){
    return String(s==null ? "" : s).replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
    });
  }
  function escRe(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

  function plural(n, one, few, many){
    n = Math.abs(n);
    var m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
    return many;
  }

  var words = {
    symbols: function(n){ return n + " " + plural(n, "символ", "символа", "символов"); },
    peers:   function(n){ return n + " " + plural(n, "узел", "узла", "узлов"); },
    thoughts:function(n){ return n + " " + plural(n, "мысль", "мысли", "мыслей"); },
    samples: function(n){ return n + " " + plural(n, "пример", "примера", "примеров"); }
  };
  function word(key, n){
    var fn = words[key];
    return fn ? fn(n) : String(n);
  }
  function ts(){ return Date.now(); }

  return { uuid:uuid, fnv1a:fnv1a, esc:esc, escRe:escRe, plural:plural, word:word, ts:ts };
}
</script>

{"$schema":"loom.contract/1","functions":{"put":{"args":[{"type":"object"}],"returns":{"type":"promise"}},"get":{"args":[{"type":"string"}],"returns":{"type":"promise"}},"del":{"args":[{"type":"string"}],"returns":{"type":"promise"}},"all":{"args":[],"returns":{"type":"promise"}},"clear":{"args":[],"returns":{"type":"promise"}},"bulkPut":{"args":[{"type":"array"}],"returns":{"type":"promise"}},"reset":{"args":[],"returns":{"type":"promise"}}}}

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg = ctx.require("Core.NsConfig");
  var log = ctx.require("Core.Logger");
  var db = null;

  function dbName(){ return cfg.get("dbName", "ns_core_v12"); }
  function storeName(){ return cfg.get("storeName", "notes"); }

  function open(){
    return new Promise(function(res, rej){
      if (db) return res(db);
      try {
        var req = indexedDB.open(dbName(), 1);
        req.onupgradeneeded = function(e){
          var d = e.target.result;
          var sn = storeName();
          if (!d.objectStoreNames.contains(sn)){
            d.createObjectStore(sn, { keyPath: "id" });
          }
        };
        req.onsuccess = function(e){ db = e.target.result; res(db); };
        req.onerror = function(){ rej(req.error); };
        req.onblocked = function(){ rej(new Error("DB blocked")); };
      } catch(err){ rej(err); }
    });
  }

  function tx(mode, fn, retries){
    if (retries === undefined) retries = 3;
    return open().then(function(d){
      return new Promise(function(res, rej){
        function attempt(n){
          try {
            var sn = storeName();
            var t = d.transaction(sn, mode);
            var s = t.objectStore(sn);
            var r = fn(s);
            r.onsuccess = function(){ res(r.result); };
            r.onerror = function(){
              if (n > 0) setTimeout(function(){ attempt(n - 1); }, 100);
              else rej(r.error);
            };
          } catch(err){
            if (n > 0) setTimeout(function(){ attempt(n - 1); }, 100);
            else rej(err);
          }
        }
        attempt(retries);
      });
    });
  }

  return {
    put: function(note){ return tx("readwrite", function(s){ return s.put(note); }); },
    get: function(id){ return tx("readonly", function(s){ return s.get(id); }); },
    del: function(id){ return tx("readwrite", function(s){ return s.delete(id); }); },
    all: function(){ return tx("readonly", function(s){ return s.getAll(); }); },
    clear: function(){ return tx("readwrite", function(s){ return s.clear(); }); },
    bulkPut: function(notes){
      return open().then(function(d){
        return new Promise(function(res, rej){
          try {
            var sn = storeName();
            var t = d.transaction(sn, "readwrite");
            var s = t.objectStore(sn);
            for (var i=0; i<notes.length; i++) s.put(notes[i]);
            t.oncomplete = function(){ res(notes.length); };
            t.onerror = function(){ rej(t.error); };
          } catch(err){ rej(err); }
        });
      });
    },
    reset: function(){
      if (db){ try{ db.close(); }catch(_){} db = null; }
      return new Promise(function(r){
        try {
          var req = indexedDB.deleteDatabase(dbName());
          req.onsuccess = req.onerror = req.onblocked = function(){ r(); };
        } catch(_){ r(); }
      });
    }
  };
}

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg = ctx.require("Core.NsConfig");
  var log = ctx.require("Core.Logger");
  var bus = ctx.require("Core.Bus");
  var ext = null;
  var mode = "loading";
  var cache = Object.create(null);
  var progressFns = [];

  function hashEmbed(text){
    var DIM = cfg.get("dim", 384);
    var v = new Float32Array(DIM);
    var tokens = (text || "").toLowerCase().match(/[a-zа-яё0-9]+/gi) || [];
    for (var t=0; t<tokens.length; t++){
      var tok = tokens[t];
      var h = 2166136261;
      for (var i=0; i<tok.length; i++){
        h ^= tok.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      v[Math.abs(h) % DIM] += 1;
      var h2 = Math.imul(h ^ 0x9e3779b9, 2654435761);
      v[Math.abs(h2) % DIM] += 0.5;
    }
    var n = 0;
    for (var i=0; i<DIM; i++) n += v[i] * v[i];
    n = Math.sqrt(n) || 1;
    for (var i=0; i<DIM; i++) v[i] /= n;
    return Array.from(v);
  }

  return {
    ready: function(){ return ext !== null || mode === "demo"; },
    getMode: function(){ return mode; },
    onProgress: function(fn){ if (typeof fn === "function") progressFns.push(fn); },

    load: function(onProgress){
      if (ext || mode === "demo") return Promise.resolve();
      var MODEL = cfg.get("model", "Xenova/all-MiniLM-L6-v2");
      return Promise.resolve().then(function(){
        return import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2");
      }).then(function(mod){
        if (mod.env){
          mod.env.allowLocalModels = false;
          mod.env.useBrowserCache = true;
        }
        return mod.pipeline("feature-extraction", MODEL, {
          quantized: true,
          progress_callback: function(p){
            if (p.status === "progress" && p.total > 0){
              var pct = p.loaded / p.total * 100;
              if (typeof onProgress === "function") onProgress(pct);
              for (var i=0; i<progressFns.length; i++){
                try { progressFns[i](pct); } catch(_){}
              }
              if (bus && bus.emit) bus.emit("ns:ai:progress", { pct: pct });
            }
          }
        });
      }).then(function(pipe){
        ext = pipe;
        mode = "model";
        if (log) log.info("AI model loaded: " + MODEL);
      }).catch(function(err){
        if (log) log.warn("AI model load failed, fallback to hash", String(err && err.message || err));
        mode = "demo";
      });
    },

    embed: function(text){
      var t = (text || "").trim();
      if (!t) return Promise.resolve(null);
      if (cache[t]) return Promise.resolve(cache[t]);
      var p;
      if (ext){
        p = Promise.resolve().then(function(){
          return ext(t, { pooling: "mean", normalize: true });
        }).then(function(out){
          return Array.from(out.data);
        }).catch(function(err){
          if (log) log.warn("embed failed, fallback to hash", String(err && err.message || err));
          return hashEmbed(t);
        });
      } else {
        p = Promise.resolve(hashEmbed(t));
      }
      return p.then(function(v){ cache[t] = v; return v; });
    },

    cosine: function(a, b){
      if (!a || !b || a.length !== b.length) return 0;
      var s = 0;
      for (var i=0; i<a.length; i++) s += a[i] * b[i];
      return s;
    }
  };
}
</script>

{"name":"Core.NsNet","type":"core","version":"1.0.0","dependsOn":["Core.NsConfig","Core.NsDB","Core.NsAI","Core.Logger","Core.Bus"],"exports":["init","send","activeAnswers","peerCount","stop","onPeers"]}

<script type="application/json" data-role="contract">
{"$schema":"loom.contract/1","functions":{"init":{"args":[{"type":"function","optional":true}],"returns":{"type":"promise"}},"send":{"args":[{"type":"array"}],"returns":{"type":"void"}},"activeAnswers":{"args":[],"returns":{"type":"array"}},"peerCount":{"args":[],"returns":{"type":"number"}},"stop":{"args":[],"returns":{"type":"void"}},"onPeers":{"args":[{"type":"function"}],"returns":{"type":"void"}}}}
</script>
<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg = ctx.require("Core.NsConfig");
  var DB  = ctx.require("Core.NsDB");
  var AI  = ctx.require("Core.NsAI");
  var log = ctx.require("Core.Logger");
  var bus = ctx.require("Core.Bus");

  var pool = null, sk = null, pk = null;
  var queryId = null;
  var peers = new Map();
  var answers = [];
  var onUpdate = null;
  var heartbeatTimer = null;
  var lastQueryTime = 0;
  var nostrMod = null;
  var sub = null;
  var peerListeners = [];
  var started = false;

  function notifyPeers(){
    var n = peers.size;
    for (var i=0; i<peerListeners.length; i++){
      try { peerListeners[i](n); } catch(_){}
    }
    if (bus && bus.emit) bus.emit("ns:net:peers", { count: n });
  }

  function validateEvent(ev){
    if (!ev || typeof ev !== "object") return false;
    if (typeof ev.id !== "string" || ev.id.length !== 64) return false;
    if (typeof ev.pubkey !== "string" || ev.pubkey.length !== 64) return false;
    if (typeof ev.kind !== "number") return false;
    if (!Array.isArray(ev.tags)) return false;
    return true;
  }

  function onEvent(ev){
    try {
      if (!validateEvent(ev)) return;
      if (ev.pubkey === pk) return;

      var hadBefore = peers.has(ev.pubkey);
      peers.set(ev.pubkey, Date.now());
      if (!hadBefore) notifyPeers();

      var K_QUERY = cfg.get("kQuery", 21000);
      var K_ANSWER = cfg.get("kAnswer", 21001);
      var room = cfg.get("room", "noosphere-core");

      if (ev.kind === K_QUERY){
        var q;
        try { q = JSON.parse(ev.content); } catch(_){ return; }
        if (!q || !q.vector || !Array.isArray(q.vector)) return;
        DB.all().then(function(all){
          var floor = cfg.get("threshold", 0.30) - cfg.get("serendipity", 0.15);
          var toSend = [];
          for (var i=0; i<all.length; i++){
            var n = all[i];
            if (!n || !n.shared || !n.vector) continue;
            if (AI.cosine(q.vector, n.vector) >= floor) toSend.push(n);
          }
          for (var j=0; j<toSend.length; j++){
            try {
              var ans = nostrMod.finalizeEvent({
                kind: K_ANSWER,
                created_at: Math.floor(Date.now() / 1000),
                tags: [["t", room], ["e", ev.id]],
                content: JSON.stringify({ text: toSend[j].text, vector: toSend[j].vector })
              }, sk);
              pool.publish(cfg.get("relays", []), ans);
            } catch(e){ if(log) log.warn("answer publish failed", String(e)); }
          }
        }).catch(function(e){ if(log) log.warn("DB.all in onEvent failed", String(e)); });
      }

      if (ev.kind === K_ANSWER){
        var eTag = null;
        for (var i=0; i<ev.tags.length; i++){
          if (ev.tags[i] && ev.tags[i][0] === "e"){ eTag = ev.tags[i][1]; break; }
        }
        if (eTag && eTag === queryId){
          var d;
          try { d = JSON.parse(ev.content); } catch(_){ return; }
          if (d && d.text && d.vector){
            var dup = false;
            for (var j=0; j<answers.length; j++){ if (answers[j].id === ev.id){ dup = true; break; } }
            if (!dup){
              answers.push({
                id: ev.id,
                text: d.text,
                vector: d.vector,
                peer: ev.pubkey.slice(0, 6),
                fullPubkey: ev.pubkey,
                createdAt: Date.now()
              });
              if (typeof onUpdate === "function") onUpdate();
            }
          }
        }
      }
    } catch(err){
      if (log) log.warn("onEvent error", String(err && err.message || err));
    }
  }

  function startHeartbeat(){
    if (heartbeatTimer) clearInterval(heartbeatTimer);
    var hb = cfg.get("heartbeat", 30000);
    var ttl = cfg.get("peerTTL", 60000);
    heartbeatTimer = setInterval(function(){
      var now = Date.now();
      var removed = 0;
      peers.forEach(function(ts, pubkey){
        if (now - ts > ttl){ peers.delete(pubkey); removed++; }
      });
      if (removed > 0){
        notifyPeers();
        if (typeof onUpdate === "function") onUpdate();
      }
    }, hb);
  }

  return {
    onPeers: function(fn){ if (typeof fn === "function") peerListeners.push(fn); },

    init: function(cb){
      if (started) return Promise.resolve();
      onUpdate = cb;
      return Promise.resolve().then(function(){
        return import("https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm");
      }).then(function(mod){
        nostrMod = mod;
        var KEY = "noosphere:sk";
        var keyHex = null;
        try { keyHex = localStorage.getItem(KEY); } catch(_){}
        if (!keyHex){
          var raw = mod.generateSecretKey();
          keyHex = Array.from(raw).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
          try { localStorage.setItem(KEY, keyHex); } catch(_){}
        }
        sk = new Uint8Array(keyHex.match(/.{1,2}/g).map(function(b){ return parseInt(b, 16); }));
        pk = mod.getPublicKey(sk);
        pool = new mod.SimplePool();

        var now = Math.floor(Date.now() / 1000);
        var room = cfg.get("room", "noosphere-core");
        var K_QUERY = cfg.get("kQuery", 21000);
        var K_ANSWER = cfg.get("kAnswer", 21001);
        var subWindow = cfg.get("subWindow", 300);

        try {
          sub = pool.subscribeMany(cfg.get("relays", []), [{
            kinds: [K_QUERY, K_ANSWER],
            "#t": [room],
            since: now - subWindow
          }], { onevent: onEvent });
        } catch(e){ if(log) log.warn("subscribe failed", String(e)); }

        started = true;
        startHeartbeat();
        notifyPeers();
        if (log) log.info("Nostr net started, room=" + room);
      }).catch(function(err){
        if (log) log.error("nostr-tools load failed", String(err && err.message || err));
        throw err;
      });
    },

    send: function(vector){
      if (!pool || !nostrMod) return;
      var now = Date.now();
      var rate = cfg.get("queryRateLimit", 2000);
      if (now - lastQueryTime < rate) return;
      lastQueryTime = now;

      answers.length = 0;
      try {
        var ev = nostrMod.finalizeEvent({
          kind: cfg.get("kQuery", 21000),
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", cfg.get("room", "noosphere-core")]],
          content: JSON.stringify({ vector: vector })
        }, sk);
        queryId = ev.id;
        pool.publish(cfg.get("relays", []), ev);
        if (typeof onUpdate === "function") onUpdate();
      } catch(e){ if(log) log.warn("publish failed", String(e)); }
    },

    activeAnswers: function(){
      var out = [];
      for (var i=0; i<answers.length; i++){
        if (peers.has(answers[i].fullPubkey)) out.push(answers[i]);
      }
      return out;
    },

    peerCount: function(){ return peers.size; },

    stop: function(){
      if (heartbeatTimer){ clearInterval(heartbeatTimer); heartbeatTimer = null; }
      if (sub && typeof sub.close === "function"){ try{ sub.close(); }catch(_){} }
      if (pool && typeof pool.close === "function"){ try{ pool.close(); }catch(_){} }
      started = false;
    }
  };
}
</script>

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var U = ctx.require("Core.NsUtils");
  var registry = Object.create(null);

  function card(item, type, qText){
    registry[item.id] = item;
    var isPeer = !!item.peer;

    var textHTML = U.esc(item.text);
    if (qText){
      var words = qText.toLowerCase().split(/\s+/).filter(function(w){ return w.length > 2; });
      for (var i=0; i<words.length; i++){
        var re = new RegExp("(" + U.escRe(words[i]) + ")", "gi");
        textHTML = textHTML.replace(re, "<mark>$1</mark>");
      }
    }

    var typeLabel;
    if (isPeer) typeLabel = "УЗЕЛ · " + item.peer;
    else typeLabel = item.shared ? "МОЁ · ОБЩЕЕ" : "МОЁ · ЛИЧНОЕ";

    var scoreRender;
    if (typeof item.score === "number") scoreRender = (item.score * 100).toFixed(1) + "%";
    else if (item.createdAt) scoreRender = new Date(item.createdAt).toLocaleDateString("ru-RU");
    else scoreRender = "";

    var foot;
    if (isPeer){
      foot = '<div class="note-foot"><span class="note-hint">прочитать · понять · написать своё</span></div>';
    } else {
      foot = '<div class="note-foot"><div class="note-actions">' +
        '<button class="note-act" data-act="find" data-id="'+item.id+'">⌖ Резонанс</button>' +
        '<button class="note-act" data-act="toggle" data-id="'+item.id+'">'+(item.shared ? '🔒 Скрыть' : '📡 Поделиться')+'</button>' +
        '<button class="note-act" data-act="copy" data-id="'+item.id+'">⧉ Копировать</button>' +
        '<button class="note-act danger" data-act="del" data-id="'+item.id+'">🗑 Удалить</button>' +
        '</div></div>';
    }

    return '<div class="note-card '+type+(isPeer?' peer':'')+'" style="animation-delay:'+(Math.random()*0.12).toFixed(3)+'s">' +
      '<div class="note-header"><span class="note-type">'+U.esc(typeLabel)+'</span><span class="note-score">'+U.esc(scoreRender)+'</span></div>' +
      '<div class="note-content">'+textHTML+'</div>' +
      foot +
      '</div>';
  }

  function render(id, items, type, query){
    var el = document.querySelector("#" + id);
    if (!el) return;
    if (!items || !items.length){
      empty(id, "Пусто", {});
      return;
    }
    var html = "";
    for (var i=0; i<items.length; i++) html += card(items[i], type, query);
    el.innerHTML = html;
  }

  function empty(id, msg, opts){
    var c = document.querySelector("#" + id);
    if (!c) return;
    opts = opts || {};
    if (opts.loading){
      c.innerHTML = '<div class="empty-state"><div class="spinner"></div><div>'+U.esc(msg)+'</div></div>';
      return;
    }
    var action = opts.actionLabel
      ? '<button class="btn btn-ghost" data-act="'+U.esc(opts.actionId||"")+'">'+U.esc(opts.actionLabel)+'</button>'
      : '';
    c.innerHTML = '<div class="empty-state">' +
      '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>' +
      '<div>'+U.esc(msg)+'</div>' +
      action +
      '</div>';
  }

  return {
    card:card, render:render, empty:empty,
    lookup: function(id){ return registry[id] || null; },
    clearRegistry: function(){ registry = Object.create(null); }
  };
}

  var U = ctx.require("Core.NsUtils");
  var root = null;

  function openDrawer(id){
    if (!root) return;
    var d = root.querySelector("#" + id);
    var o = root.querySelector("#" + id + "Overlay");
    if (d) d.classList.add("open");
    if (o) o.classList.add("open");
  }
  function closeAll(){
    if (!root) return;
    var ds = root.querySelectorAll(".drawer");
    var os = root.querySelectorAll(".drawer-overlay");
    for (var i=0; i<ds.length; i++) ds[i].classList.remove("open");
    for (var i=0; i<os.length; i++) os[i].classList.remove("open");
  }

  return {
    mount: function(host){ root = host; },
    open: openDrawer,
    close: closeAll,
    bindSettings: function(onApply, onWipe, onSeed){
      if (!root) return;
      var cfgTheme  = root.querySelector("#cfgTheme");
      var cfgRoom   = root.querySelector("#cfgRoom");
      var cfgThresh = root.querySelector("#cfgThresh");
      var cfgSeren  = root.querySelector("#cfgSeren");
      var valThresh = root.querySelector("#valThresh");
      var valSeren  = root.querySelector("#valSeren");

      if (cfgTheme)  cfgTheme.value  = cfg.get("theme", "dark");
      if (cfgRoom)   cfgRoom.value   = cfg.get("room", "noosphere-core");
      if (cfgThresh) cfgThresh.value = cfg.get("threshold", 0.30);
      if (cfgSeren)  cfgSeren.value  = cfg.get("serendipity", 0.15);
      if (valThresh) valThresh.textContent = Number(cfg.get("threshold", 0.30)).toFixed(2);
      if (valSeren)  valSeren.textContent  = Number(cfg.get("serendipity", 0.15)).toFixed(2);

      if (cfgThresh){
        cfgThresh.oninput = function(e){
          var v = parseFloat(e.target.value);

      if (cfgSeren){
        cfgSeren.oninput = function(e){
          var v = parseFloat(e.target.value);
          if (valSeren) valSeren.textContent = v.toFixed(2);
        };
      }
      if (cfgTheme){
        cfgTheme.onchange = function(e){
          document.documentElement.setAttribute("data-theme", e.target.value);
        };
      }

      var saveBtn = root.querySelector("#btnSaveConfig");
      if (saveBtn) saveBtn.onclick = function(){
        cfg.set("theme", cfgTheme ? cfgTheme.value : "dark");
        cfg.set("room", (cfgRoom ? cfgRoom.value.trim() : "") || "noosphere-core");
        cfg.set("threshold", parseFloat(cfgThresh ? cfgThresh.value : "0.30"));
        cfg.set("serendipity", parseFloat(cfgSeren ? cfgSeren.value : "0.15"));
        cfg.save();
        if (typeof onApply === "function") onApply();
      };

      var wipeBtn = root.querySelector("#btnWipeDB");
      if (wipeBtn) wipeBtn.onclick = function(){
        if (typeof onWipe === "function") onWipe();
      };

      var seedBtn = root.querySelector("#btnSeed");
      if (seedBtn) seedBtn.onclick = function(){
        if (typeof onSeed === "function") onSeed();
        closeAll();
      };
    }
  };
}
</script>

  function isBaseView(){
    var el = document.querySelector("#view-base");

  function switchToStream(root){
    if (!root) return;
    var tabs = root.querySelectorAll(".tab");
    for (var i=0; i<tabs.length; i++) tabs[i].classList.remove("active");
    var views = root.querySelectorAll(".view-layer");
    for (var i=0; i<views.length; i++) views[i].classList.remove("active");
    var streamTab = root.querySelector('.tab[data-view="view-stream"]');
    var streamView = root.querySelector("#view-stream");
    if (streamTab) streamTab.classList.add("active");
    if (streamView) streamView.classList.add("active");
  }

  function executeSearch(root, force){
    var input = root.querySelector("#ioInput");
    var text = input ? input.value.trim() : "";
    Renderer.clearRegistry();

    if (!text || !AI.ready()){
      ["local","world","seren"].forEach(function(k){
        var el = root.querySelector("#list-" + k);
        if (el) el.innerHTML = "";
        var c = root.querySelector("#cnt" + k.charAt(0).toUpperCase() + k.slice(1));
        if (c) c.textContent = "0";
      });
      var msg = AI.ready() ? "Начните печатать — поиск по смысловому пространству." : "ИИ ещё прогревается…";
      Renderer.empty("list-local", msg, { loading: !AI.ready() });
      return Promise.resolve();
    }

    return AI.embed(text).then(function(queryVector){
      if (!queryVector) return;

      if (!lastVector || AI.cosine(queryVector, lastVector) < 0.98 || force){
        lastVector = queryVector;
        lastQueryAt = Date.now();
        Net.send(queryVector);
      }

      return DB.all().then(function(dbNotes){
        var localScored = [];
        for (var i=0; i<dbNotes.length; i++){
          var n = dbNotes[i];
          if (n && n.vector) localScored.push(Object.assign({}, n, { score: AI.cosine(queryVector, n.vector) }));
        }
        var worldAnswers = Net.activeAnswers();
        var worldScored = [];
        for (var i=0; i<worldAnswers.length; i++){
          worldScored.push(Object.assign({}, worldAnswers[i], { score: AI.cosine(queryVector, worldAnswers[i].vector) }));
        }

        var TH = cfg.get("threshold", 0.30);
        var SD = cfg.get("serendipity", 0.15);

        var localExact = localScored.filter(function(n){ return n.score >= TH; }).sort(function(a,b){ return b.score - a.score; });
        var worldExact = worldScored.filter(function(n){ return n.score >= TH; }).sort(function(a,b){ return b.score - a.score; });
        var serenAll = localScored.concat(worldScored)
          .filter(function(n){ return n.score >= (TH - SD) && n.score < TH; })
          .sort(function(a,b){ return b.score - a.score; });

        Renderer.clearRegistry();

        if (localExact.length === 0) Renderer.empty("list-local", "В вашей базе нет точных совпадений.", {});
        else Renderer.render("list-local", localExact, "t-local", text);

        var waiting = (Date.now() - lastQueryAt < 6000) && worldExact.length === 0;
        if (waiting) Renderer.empty("list-world", "Слушаю резонанс в комнате…", { loading: true });
        else if (worldExact.length === 0) Renderer.empty("list-world", "Пока никто в комнате не думает так же.", {});
        else Renderer.render("list-world", worldExact, "t-world", text);

        if (serenAll.length === 0) Renderer.empty("list-seren", "Близких мыслей не найдено.", {});
        else Renderer.render("list-seren", serenAll, "t-seren", text);

        var setC = function(id, v){ var el = root.querySelector("#" + id); if (el) el.textContent = String(v); };
        setC("cntLocal", localExact.length);
        setC("cntWorld", worldExact.length);
        setC("cntSeren", serenAll.length);
      });
    });
  }

  function renderMyBase(root){
    return DB.all().then(function(all){
      var btc = root.querySelector("#baseTabCount");
      if (btc) btc.textContent = String(all.length);

      var shared = 0;
      for (var i=0; i<all.length; i++) if (all[i] && all[i].shared) shared++;

      var stats = root.querySelector("#baseStats");
      if (stats){
        stats.innerHTML =
          '<div class="stat"><div class="num">'+all.length+'</div><div class="lbl">Мыслей</div></div>' +
          '<div class="stat"><div class="num">'+shared+'</div><div class="lbl">Общих</div></div>' +
          '<div class="stat"><div class="num">'+(all.length - shared)+'</div><div class="lbl">Личных</div></div>';
      }

      if (all.length === 0){
        Renderer.empty("list-base", "Ваша база знаний пуста.", { actionLabel: "Загрузить примеры", actionId: "seed" });
        return;
      }

      var fEl = root.querySelector("#baseFilter");
      var sEl = root.querySelector("#baseSort");
      var q = fEl ? fEl.value.trim().toLowerCase() : "";
      var sort = sEl ? sEl.value : "new";

      var list = all.slice();
      if (q) list = list.filter(function(n){ return n.text && n.text.toLowerCase().indexOf(q) >= 0; });

      if (sort === "old") list.sort(function(a,b){ return (a.createdAt||0) - (b.createdAt||0); });
      else if (sort === "az") list.sort(function(a,b){ return (a.text||"").localeCompare(b.text||"", "ru"); });
      else list.sort(function(a,b){ return (b.createdAt||0) - (a.createdAt||0); });

      Renderer.clearRegistry();
      if (list.length === 0){
        Renderer.empty("list-base", "Под фильтр ничего не подошло.", {});
        return;
      }
      Renderer.render("list-base", list, "t-local", q || null);
    });
  }

  function refreshCurrent(root){
    if (isBaseView()) return renderMyBase(root);
    return executeSearch(root);
  }

  function sanitizeNote(raw){
    if (!raw || typeof raw !== "object") return null;
    if (typeof raw.text !== "string" || raw.text.length === 0 || raw.text.length > 10000) return null;
    return {
      id: typeof raw.id === "string" && raw.id ? raw.id : ("i" + Math.random().toString(36).slice(2, 10)),
      text: raw.text.trim(),
      vector: Array.isArray(raw.vector) ? raw.vector : null,
      shared: !!raw.shared,
      createdAt: typeof raw.createdAt === "number" ? raw.createdAt : Date.now()
    };
  }

  function seedSamples(root){
    if (!AI.ready()){ toast("ИИ ещё не готов.", "err"); return Promise.resolve(); }
    toast("Вкладываю смысл в примеры…", "info");
    var notes = [];
    function step(i){
      if (i >= SAMPLES.length){
        return DB.bulkPut(notes).then(function(){
          toast("Загружено " + U.word("samples", notes.length) + ".", "ok");
          return refreshCurrent(root);
        });
      }
      return AI.embed(SAMPLES[i]).then(function(v){
        notes.push({
          id: "s" + Math.random().toString(36).slice(2, 10),
          text: SAMPLES[i],
          vector: v,
          shared: true,
          createdAt: Date.now() - Math.floor(Math.random() * 1e7)
        });
        return step(i + 1);
      });
    }
    return step(0);
  }

  function exportData(){
    DB.all().then(function(notes){
      if (!notes || notes.length === 0){ toast("Базе нечего экспортировать.", "err"); return; }
      var capsule = {
        app: "noosphere", format: "capsul", version: 1,
        model: cfg.get("model"), dim: cfg.get("dim"),
        exportedAt: Date.now(), notes: notes
      };
      var blob = new Blob([JSON.stringify(capsule, null, 2)], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "noosphere-" + new Date().toISOString().slice(0,10) + "." + cfg.get("capsuleExt", "capsul");
      document.body.appendChild(a); a.click();
      URL.revokeObjectURL(url); a.remove();
      toast("Экспортировано " + U.word("thoughts", notes.length) + " в капсулу.", "ok");
    });
  }

  function importData(file){
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var data = JSON.parse(String(reader.result || "{}"));
        var notes = Array.isArray(data) ? data : (data.notes || []);
        if (!Array.isArray(notes)) throw new Error("bad format");

        var clean = [];
        for (var i=0; i<notes.length; i++){
          var s = sanitizeNote(notes[i]);
          if (s) clean.push(s);
        }

        function embedStep(j){
          if (j >= clean.length) return Promise.resolve();
          if (AI.ready() && !clean[j].vector){
            return AI.embed(clean[j].text).then(function(v){
              clean[j].vector = v;
              return embedStep(j + 1);
            }).catch(function(){ return embedStep(j + 1); });
          }
          return embedStep(j + 1);
        }
        embedStep(0).then(function(){
          return DB.bulkPut(clean);
        }).then(function(){
          toast("Импортировано " + U.word("thoughts", clean.length) + ".", "ok");
          refreshCurrent(document.getElementById("app-root"));
        });
      } catch(e){
        toast("Импорт не удался: " + (e && e.message || "неверный файл"), "err");
      }
    };
    reader.readAsText(file);
  }

  function handleCardAction(act, el, root){
    if (act === "seed"){ seedSamples(root); return; }
    var id = el.getAttribute("data-id");
    var item = id ? Renderer.lookup(id) : null;
    if (!item) return;

    if (act === "find"){
      var input = root.querySelector("#ioInput");
      var count = root.querySelector("#ioCount");
      if (input) input.value = item.text;
      if (count) count.textContent = U.word("symbols", item.text.length);
      switchToStream(root);
      executeSearch(root, true);
    } else if (act === "copy"){
      try {
        navigator.clipboard.writeText(item.text).then(
          function(){ toast("Скопировано в буфер.", "ok"); },
          function(){ toast("Не удалось скопировать.", "err"); }
        );
      } catch(e){ toast("Не удалось скопировать.", "err"); }
    } else if (act === "del"){
      if (!confirm("Удалить эту мысль навсегда?")) return;
      DB.del(id).then(function(){
        toast("Мысль удалена.", "info");
        refreshCurrent(root);
      });
    } else if (act === "toggle"){
      DB.get(id).then(function(rec){
        if (!rec) return;
        rec.shared = !rec.shared;
        return DB.put(rec).then(function(){
          toast(rec.shared ? "Теперь видно узлам." : "Теперь это личное.", "ok");
          refreshCurrent(root);
        });
      });
    }
  }

  function handleSave(root, isShared){
    var input = root.querySelector("#ioInput");
    var count = root.querySelector("#ioCount");
    var text = input ? input.value.trim() : "";
    if (!text){ toast("Нечего сохранять.", "err"); return; }
    if (!AI.ready()){ toast("ИИ ещё не готов.", "err"); return; }
    AI.embed(text).then(function(vector){
      return DB.put({
        id: Math.random().toString(36).slice(2, 10),
        text: text,
        vector: vector,
        shared: !!isShared,
        createdAt: Date.now()
      });
    }).then(function(){
      if (input) input.value = "";
      if (count) count.textContent = U.word("symbols", 0);
      lastVector = null;
      toast(isShared ? "Сохранено и видно узлам." : "Сохранено лично.", "ok");
      executeSearch(root);
      if (isBaseView()) renderMyBase(root);
    }).catch(function(e){ toast("Ошибка: " + (e && e.message || e), "err"); });
  }

  function bind(root){
    if (bound) return;
    bound = true;

    Status.mount(root);
    Drawers.mount(root);
    if (Theme && Theme.mount) Theme.mount();

    Drawers.bindSettings(
      function(){ location.reload(); },
      function(){
        if (!confirm("Внимание: это навсегда удалит все ваши мысли. Продолжить?")) return;
        DB.reset().then(function(){
          toast("База стёрта.", "info");
          setTimeout(function(){ location.reload(); }, 500);
        });
      },
      function(){ seedSamples(root); }
    );

    var tabs = root.querySelectorAll(".tab");
    for (var i=0; i<tabs.length; i++){
      tabs[i].onclick = function(e){
        var t = e.currentTarget;
        var ts = root.querySelectorAll(".tab");
        for (var j=0; j<ts.length; j++) ts[j].classList.remove("active");
        var vs = root.querySelectorAll(".view-layer");
        for (var j=0; j<vs.length; j++) vs[j].classList.remove("active");
        t.classList.add("active");
        var v = root.querySelector("#" + t.getAttribute("data-view"));
        if (v) v.classList.add("active");
        if (t.getAttribute("data-view") === "view-base") renderMyBase(root);
      };
    }

    var ftabs = root.querySelectorAll(".f-tab");
    for (var i=0; i<ftabs.length; i++){
      ftabs[i].onclick = function(e){
        var t = e.currentTarget;
        var ts = root.querySelectorAll(".f-tab");
        for (var j=0; j<ts.length; j++) ts[j].classList.remove("active");
        var ls = root.querySelectorAll("#view-stream .node-list");
        for (var j=0; j<ls.length; j++) ls[j].classList.remove("active");
        t.classList.add("active");
        var l = root.querySelector("#list-" + t.getAttribute("data-filter"));
        if (l) l.classList.add("active");
      };
    }

    var input = root.querySelector("#ioInput");
    if (input){
      input.addEventListener("input", function(){
        var count = root.querySelector("#ioCount");
        if (count) count.textContent = U.word("symbols", input.value.length);
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(function(){ executeSearch(root); }, cfg.get("debounce", 800));
      });
    }

    var btnRes = root.querySelector("#btnResonate");
    if (btnRes) btnRes.onclick = function(){ executeSearch(root, true); };
    var btnClr = root.querySelector("#btnClear");
    if (btnClr) btnClr.onclick = function(){
      if (input) input.value = "";
      var count = root.querySelector("#ioCount");
      if (count) count.textContent = U.word("symbols", 0);
      executeSearch(root);
    };

    var bsp = root.querySelector("#btnSavePrivate"); if (bsp) bsp.onclick = function(){ handleSave(root, false); };
    var bss = root.querySelector("#btnSaveShared"); if (bss) bss.onclick = function(){ handleSave(root, true); };

    var bf = root.querySelector("#baseFilter");
    if (bf) bf.addEventListener("input", function(){
      if (baseTimer) clearTimeout(baseTimer);
      baseTimer = setTimeout(function(){ renderMyBase(root); }, 200);
    });
    var bsrt = root.querySelector("#baseSort");
    if (bsrt) bsrt.onchange = function(){ renderMyBase(root); };

    var ws = root.querySelector(".workspace");
    if (ws) ws.addEventListener("click", function(e){
      var el = e.target.closest("[data-act]");
      if (el) handleCardAction(el.getAttribute("data-act"), el, root);
    });

    var bos = root.querySelector("#btnOpenSettings"); if (bos) bos.onclick = function(){ Drawers.open("drawer"); };
    var bcs = root.querySelector("#btnCloseSettings"); if (bcs) bcs.onclick = function(){ Drawers.close(); };
    var dov = root.querySelector("#drawerOverlay");   if (dov) dov.onclick = function(){ Drawers.close(); };
    var bh  = root.querySelector("#btnHelp");         if (bh)  bh.onclick  = function(){ Drawers.open("helpDrawer"); };
    var bch = root.querySelector("#btnCloseHelp");    if (bch) bch.onclick = function(){ Drawers.close(); };
    var hov = root.querySelector("#helpDrawerOverlay"); if (hov) hov.onclick = function(){ Drawers.close(); };

    var be = root.querySelector("#btnExport"); if (be) be.onclick = exportData;
    var bi = root.querySelector("#btnImport");
    var fi = root.querySelector("#importFile");
    if (bi) bi.onclick = function(){ if (fi) fi.click(); };
    if (fi) fi.onchange = function(e){
      if (e.target.files && e.target.files[0]) importData(e.target.files[0]);
      e.target.value = "";
    };

    keyHandler = function(e){
      if (e.key === "Escape") Drawers.close();
      if (e.key === "/" && document.activeElement !== input &&
          !/^(INPUT|TEXTAREA|SELECT)$/.test((document.activeElement && document.activeElement.tagName) || "")){
        e.preventDefault();
        switchToStream(root);
        if (input) input.focus();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter"){
        e.preventDefault();
        if (document.activeElement === input) handleSave(root, e.shiftKey);
      }
    };
    document.addEventListener("keydown", keyHandler);

    AI.onProgress(function(pct){
      Status.renderAI("Загрузка модели " + Math.round(pct) + "%", "busy");
    });

    Net.onPeers(function(n){
      Status.renderNetwork(n, true);
      if (!isBaseView()) executeSearch(root);
    });
  }

  function boot(root){
    DB.all().then(function(all){
      var btc = root.querySelector("#baseTabCount");
      if (btc) btc.textContent = String(all.length);
    }).catch(function(){});

    Renderer.empty("list-local", "ИИ прогревается…", { loading: true });
    Status.renderAI("ИИ загружается…", "busy");

    AI.load().then(function(){
      Status.renderAI(AI.getMode() === "model" ? "ИИ активен" : "ИИ: лексический режим",
                      AI.getMode() === "model" ? "ready" : "warn");
      Renderer.empty("list-local", "Начните печатать — поиск по смысловому пространству.", {});
    }).catch(function(e){
      if (log) log.error("AI", String(e && e.message || e));
      Status.renderAI("ИИ: лексический режим", "warn");
      toast("Модель недоступна — используется лексический поиск.", "info");
    });

    Net.init(function(){ executeSearch(root); }).then(function(){
      Status.renderNetwork(Net.peerCount(), true);
    }).catch(function(e){
      if (log) log.error("Net", String(e && e.message || e));
      Status.renderNetwork(0, false);
    });
  }

  return {
    mount: function(){
      var root = document.getElementById("app-root");
      if (!root) return;
      root.innerHTML = markup();
      bind(root);
      boot(root);
    },
    unmount: function(){
      if (keyHandler){ document.removeEventListener("keydown", keyHandler); keyHandler = null; }
      if (searchTimer) clearTimeout(searchTimer);
      if (baseTimer) clearTimeout(baseTimer);
      if (Net && Net.stop) Net.stop();
      var root = document.getElementById("app-root");
      if (root) root.innerHTML = "";
      bound = false;
    }
  };
}
</script>

<script id="LOOM_BOOT" data-version="2.5.0">

};
function nextByRole(start, role){

function compileOne(d){

function topoSort(items){
