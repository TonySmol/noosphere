<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flow мысли</title>
  <style>
    :root {
      --bg: #0d0f12; --card: #161a1f; --border: #2d333b;
      --text: #adbac7; --accent: #539bf5; --dim: #768390;
      --danger: #f85149; --radius: 12px;
    }
    :root.light {
      --bg: #ffffff; --card: #f6f8fa; --border: #d0d7de;
      --text: #1f2328; --accent: #0969da; --dim: #656d76;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; justify-content: center; overflow: hidden; }
    #app { width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; padding: 16px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
    .actions { display: flex; gap: 8px; }
    .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 1.2rem; }

    textarea { width: 100%; flex: 0 0 auto; min-height: 100px; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 1rem; resize: vertical; outline: none; font-family: inherit; margin-bottom: 12px; }
    textarea:focus { border-color: var(--accent); }

    .carousel-container { position: relative; flex: 1; display: flex; align-items: center; overflow: hidden; }
    .cards-wrapper { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; width: 100%; padding-bottom: 8px; }
    .cards-wrapper::-webkit-scrollbar { display: none; }
    .card { flex: 0 0 100%; scroll-snap-align: center; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 200px; cursor: pointer; transition: border-color 0.2s; }
    .card:hover { border-color: var(--accent); }
    .card-type { font-size: 0.75rem; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
    .card-text { font-size: 1rem; line-height: 1.5; flex: 1; white-space: pre-wrap; word-break: break-word; }
    .card-score { font-size: 0.8rem; color: var(--accent); align-self: flex-end; }

    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; }
    .carousel-btn.left { left: 8px; }
    .carousel-btn.right { right: 8px; }
    .carousel-btn:active { background: var(--accent); }

    .save-bar { display: flex; justify-content: flex-end; margin-top: 12px; }
    .save-btn { background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 12px 24px; font-weight: 600; cursor: pointer; }

    .settings-panel { display: none; position: fixed; top: 60px; right: 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; z-index: 100; flex-direction: column; gap: 12px; min-width: 200px; }
    .settings-panel.open { display: flex; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 6px; }

    .empty-state { color: var(--dim); text-align: center; margin-top: 40px; font-style: italic; }
  </style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <span class="logo">🌀 Flow мысли</span>
    <div class="actions">
      <button class="icon-btn" id="themeBtn">🌓</button>
      <button class="icon-btn" id="settingsBtn">⚙️</button>
    </div>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <label>Модель:</label>
    <select id="modelSelect">
      <option value="Xenova/paraphrase-multilingual-MiniLM-L12-v2">MiniLM (быстрая, 25МБ)</option>
      <option value="Xenova/multilingual-e5-small">E5 Small (точнее, 40МБ)</option>
    </select>
    <button id="applyModelBtn">Применить</button>
  </div>

  <textarea id="thoughtInput" placeholder="О чём думаешь?"></textarea>

  <div class="carousel-container">
    <button class="carousel-btn left" id="prevCard">←</button>
    <div class="cards-wrapper" id="cardsWrapper">
      <div class="empty-state" id="emptyPlaceholder">Начни вводить мысль, чтобы увидеть подсказки из архива.</div>
    </div>
    <button class="carousel-btn right" id="nextCard">→</button>
  </div>

  <div class="save-bar">
    <button class="save-btn" id="saveBtn">Сохранить мысль</button>
  </div>
</div>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

// ---------- Настройки ----------
const Settings = {
  modelName: 'Xenova/paraphrase-multilingual-MiniLM-L12-v2',
  load() { this.modelName = localStorage.getItem('flow_model') || this.modelName; },
  save() { localStorage.setItem('flow_model', this.modelName); }
};

// ---------- Хранилище ----------
let notes = JSON.parse(localStorage.getItem('flow_notes') || '[]');
function persist() { localStorage.setItem('flow_notes', JSON.stringify(notes)); }

// ---------- Векторный движок (mean pooling) ----------
const Engine = {
  model: null,
  cache: new Map(),
  async init() {
    this.model = await pipeline('feature-extraction', Settings.modelName, { quantized: true });
    // индексация всех заметок
    for (const note of notes) await this.vectorize(note.id, note.text);
  },
  async getEmbedding(text, prefix = '') {
    const output = await this.model([prefix + text]);
    const { data, dims } = output;
    const [batch, tokens, hidden] = dims;
    if (!tokens || !hidden) return norm(data);
    const emb = new Float32Array(hidden);
    for (let t = 0; t < tokens; t++) {
      const offset = t * hidden;
      for (let h = 0; h < hidden; h++) emb[h] += data[offset + h];
    }
    for (let h = 0; h < hidden; h++) emb[h] /= tokens;
    return norm(emb);
    function norm(v) {
      const mag = Math.sqrt(v.reduce((s,x) => s + x*x, 0));
      if (mag === 0) return v;
      return v.map(x => x / mag);
    }
  },
  async vectorize(id, text) {
    if (this.cache.has(id)) return;
    const prefix = Settings.modelName.includes('e5') ? 'passage: ' : '';
    const vec = await this.getEmbedding(text, prefix);
    this.cache.set(id, vec);
  },
  async search(query) {
    if (!query.trim() || !this.model) return [];
    const prefix = Settings.modelName.includes('e5') ? 'query: ' : '';
    const qVec = await this.getEmbedding(query, prefix);
    const results = [];
    for (const note of notes) {
      const nVec = this.cache.get(note.id);
      if (!nVec) continue;
      let dot = 0;
      for (let i = 0; i < qVec.length; i++) dot += qVec[i] * nVec[i];
      if (dot > 0.15) results.push({ ...note, score: dot });
    }
    return results.sort((a,b) => b.score - a.score).slice(0, 5);
  }
};

// ---------- UI ----------
const elements = {
  input: document.getElementById('thoughtInput'),
  cardsWrapper: document.getElementById('cardsWrapper'),
  prevBtn: document.getElementById('prevCard'),
  nextBtn: document.getElementById('nextCard'),
  saveBtn: document.getElementById('saveBtn'),
  themeBtn: document.getElementById('themeBtn'),
  settingsBtn: document.getElementById('settingsBtn'),
  settingsPanel: document.getElementById('settingsPanel'),
  modelSelect: document.getElementById('modelSelect'),
  applyModelBtn: document.getElementById('applyModelBtn'),
  emptyPlaceholder: document.getElementById('emptyPlaceholder')
};

function renderCards(results) {
  const wrapper = elements.cardsWrapper;
  if (!results || results.length === 0) {
    wrapper.innerHTML = '<div class="empty-state">Нет подходящих мыслей в архиве. Сохрани первую!</div>';
    return;
  }
  // Сортируем так: высший скор, средний, низший (но не меньше порога)
  const types = ['Прямое продолжение', 'Неочевидная связь', 'Альтернативный взгляд'];
  wrapper.innerHTML = results.slice(0,3).map((r, i) => `
    <div class="card" data-text="${escapeHTML(r.text)}">
      <div class="card-type">${types[i] || 'Вариант'}</div>
      <div class="card-text">${escapeHTML(r.text)}</div>
      <div class="card-score">${r.score.toFixed(2)}</div>
    </div>
  `).join('');
  // Добавляем клик для копирования в поле ввода
  wrapper.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      elements.input.value = card.dataset.text;
      elements.input.focus();
    });
  });
}

function escapeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Листание
let scrollTimeout;
function scrollToCard(index) {
  const cards = elements.cardsWrapper.children;
  if (cards.length === 0) return;
  const target = cards[Math.min(Math.max(index, 0), cards.length-1)];
  target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

elements.prevBtn.addEventListener('click', () => {
  const current = Math.round(elements.cardsWrapper.scrollLeft / elements.cardsWrapper.clientWidth);
  scrollToCard(current - 1);
});
elements.nextBtn.addEventListener('click', () => {
  const current = Math.round(elements.cardsWrapper.scrollLeft / elements.cardsWrapper.clientWidth);
  scrollToCard(current + 1);
});

// Темы
elements.themeBtn.addEventListener('click', () => {
  document.documentElement.classList.toggle('light');
  const isLight = document.documentElement.classList.contains('light');
  localStorage.setItem('flow_theme', isLight ? 'light' : 'dark');
  elements.themeBtn.textContent = isLight ? '☀️' : '🌙';
});
(function initTheme() {
  const saved = localStorage.getItem('flow_theme');
  if (saved === 'light') document.documentElement.classList.add('light');
  elements.themeBtn.textContent = saved === 'light' ? '☀️' : '🌙';
})();

// Настройки модели
elements.settingsBtn.addEventListener('click', () => elements.settingsPanel.classList.toggle('open'));
elements.applyModelBtn.addEventListener('click', async () => {
  const newModel = elements.modelSelect.value;
  if (newModel === Settings.modelName) return;
  Settings.modelName = newModel;
  Settings.save();
  elements.settingsPanel.classList.remove('open');
  // перезагрузка модели
  Engine.model = null;
  Engine.cache.clear();
  try {
    await Engine.init();
    alert('Модель обновлена!');
  } catch(e) { alert('Ошибка загрузки модели: ' + e.message); }
});

// Поиск при вводе
let debounce;
elements.input.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(async () => {
    const results = await Engine.search(elements.input.value);
    renderCards(results);
  }, 500);
});

// Сохранение заметки
elements.saveBtn.addEventListener('click', async () => {
  const text = elements.input.value.trim();
  if (!text) return;
  const note = { id: Date.now(), text, createdAt: new Date().toISOString() };
  notes.push(note);
  persist();
  await Engine.vectorize(note.id, note.text);
  elements.input.value = '';
  renderCards([]);
});

// Старт
(async () => {
  Settings.load();
  elements.modelSelect.value = Settings.modelName;
  try {
    await Engine.init();
    console.log('Модель готова');
  } catch(e) {
    console.error(e);
    alert('Не удалось загрузить модель. Проверьте интернет и попробуйте обновить страницу.');
  }
})();
</script>
</body>
</html>
