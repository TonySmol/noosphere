<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ноосфера · Flow</title>
  <style>
    :root {
      --bg: #f8f9fa; --card: #ffffff; --border: #dee2e6;
      --text: #212529; --accent: #0d6efd; --dim: #6c757d;
      --radius: 12px;
    }
    .dark {
      --bg: #212529; --card: #343a40; --border: #495057;
      --text: #f8f9fa; --accent: #3d8bfd; --dim: #adb5bd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; justify-content: center; transition: background 0.2s, color 0.2s; }
    #app { width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; padding: 16px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
    .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 1.2rem; }

    textarea { width: 100%; flex: 0 0 auto; min-height: 100px; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 1rem; resize: vertical; outline: none; font-family: inherit; margin-bottom: 12px; }
    textarea:focus { border-color: var(--accent); }

    .carousel-container { position: relative; flex: 1; display: flex; align-items: center; overflow: hidden; }
    .cards-wrapper { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; width: 100%; padding-bottom: 8px; }
    .cards-wrapper::-webkit-scrollbar { display: none; }
    .card { flex: 0 0 100%; scroll-snap-align: center; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 200px; cursor: pointer; transition: border-color 0.2s; }
    .card:hover { border-color: var(--accent); }
    .card-type { font-size: 0.75rem; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
    .card-text { font-size: 1rem; line-height: 1.5; flex: 1; white-space: pre-wrap; word-break: break-word; }
    .card-score { font-size: 0.8rem; color: var(--accent); align-self: flex-end; }

    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; }
    .carousel-btn.left { left: 8px; }
    .carousel-btn.right { right: 8px; }

    .save-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .status-text { font-size: 0.85rem; color: var(--dim); }
    .save-btn { background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 12px 24px; font-weight: 600; cursor: pointer; }

    .empty-state { color: var(--dim); text-align: center; margin-top: 40px; font-style: italic; }
  </style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <span class="logo">🌀 Flow</span>
    <button class="icon-btn" id="themeBtn" title="Сменить тему">🌓</button>
  </div>

  <textarea id="thoughtInput" placeholder="О чём думаешь?"></textarea>

  <div class="carousel-container">
    <button class="carousel-btn left" id="prevCard">←</button>
    <div class="cards-wrapper" id="cardsWrapper">
      <div class="empty-state" id="emptyPlaceholder">Начни вводить мысль, чтобы увидеть подсказки из архива.</div>
    </div>
    <button class="carousel-btn right" id="nextCard">→</button>
  </div>

  <div class="save-bar">
    <span class="status-text" id="statusText"></span>
    <button class="save-btn" id="saveBtn">Сохранить мысль</button>
  </div>
</div>

<script type="module">
// Используем новую версию библиотеки (v3), которая корректно работает в браузере
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.0';

// Настройки
const MODEL_NAME = 'Xenova/all-MiniLM-L6-v2'; // Проверенная модель, точно работает

// Хранилище заметок
let notes = [];
try {
  notes = JSON.parse(localStorage.getItem('flow_notes_v2') || '[]');
} catch(e) { notes = []; }
function persist() { localStorage.setItem('flow_notes_v2', JSON.stringify(notes)); }

// Векторный движок (правильный mean pooling)
const Engine = {
  model: null,
  cache: new Map(),
  async init() {
    this.model = await pipeline('feature-extraction', MODEL_NAME, {
      pooling: 'mean',
      normalize: true
    });
    // Индексация архива
    for (const note of notes) {
      try { await this.vectorize(note.id, note.text); }
      catch(e) { console.warn('Пропущена заметка:', e); }
    }
  },
  async vectorize(id, text) {
    if (this.cache.has(id)) return;
    const output = await this.model([text]);
    // output.data уже нормализованный Float32Array
    this.cache.set(id, output.data);
  },
  async search(query) {
    if (!query.trim() || !this.model) return [];
    const output = await this.model([query]);
    const qVec = output.data;
    const results = [];
    for (const note of notes) {
      const nVec = this.cache.get(note.id);
      if (!nVec) continue;
      let dot = 0;
      for (let i = 0; i < qVec.length; i++) dot += qVec[i] * nVec[i];
      if (dot > 0.15) results.push({ ...note, score: dot });
    }
    return results.sort((a,b) => b.score - a.score).slice(0, 5);
  }
};

// UI элементы
const $ = id => document.getElementById(id);
const elements = {
  input: $('thoughtInput'),
  cardsWrapper: $('cardsWrapper'),
  prevBtn: $('prevCard'),
  nextBtn: $('nextCard'),
  saveBtn: $('saveBtn'),
  themeBtn: $('themeBtn'),
  statusText: $('statusText')
};

// Рендер карточек
function renderCards(results) {
  const wrapper = elements.cardsWrapper;
  if (!results || results.length === 0) {
    wrapper.innerHTML = '<div class="empty-state">Нет подходящих мыслей в архиве. Сохрани первую!</div>';
    return;
  }
  const types = ['Продолжение', 'Неочевидно', 'Альтернатива'];
  wrapper.innerHTML = results.slice(0,3).map((r, i) => `
    <div class="card" data-text="${escapeHTML(r.text)}">
      <div class="card-type">${types[i] || 'Вариант'}</div>
      <div class="card-text">${escapeHTML(r.text)}</div>
      <div class="card-score">${r.score.toFixed(2)}</div>
    </div>
  `).join('');
  wrapper.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      elements.input.value = card.dataset.text;
      elements.input.focus();
      elements.input.dispatchEvent(new Event('input'));
    });
  });
}

function escapeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Листание карточек
elements.prevBtn.addEventListener('click', () => {
  const cards = elements.cardsWrapper.children;
  if (cards.length === 0) return;
  const current = Math.round(elements.cardsWrapper.scrollLeft / elements.cardsWrapper.clientWidth);
  const target = cards[Math.min(Math.max(current - 1, 0), cards.length - 1)];
  target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
});
elements.nextBtn.addEventListener('click', () => {
  const cards = elements.cardsWrapper.children;
  if (cards.length === 0) return;
  const current = Math.round(elements.cardsWrapper.scrollLeft / elements.cardsWrapper.clientWidth);
  const target = cards[Math.min(Math.max(current + 1, 0), cards.length - 1)];
  target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
});

// Тема
elements.themeBtn.addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
  const isDark = document.documentElement.classList.contains('dark');
  localStorage.setItem('flow_theme', isDark ? 'dark' : 'light');
  elements.themeBtn.textContent = isDark ? '☀️' : '🌙';
});
(function initTheme() {
  const saved = localStorage.getItem('flow_theme');
  if (saved === 'dark') {
    document.documentElement.classList.add('dark');
    elements.themeBtn.textContent = '☀️';
  }
})();

// Поиск при вводе
let debounceTimer;
elements.input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(async () => {
    const results = await Engine.search(elements.input.value);
    renderCards(results);
    elements.statusText.textContent = results.length ? `Найдено: ${results.length}` : '';
  }, 500);
});

// Сохранение заметки
elements.saveBtn.addEventListener('click', async () => {
  const text = elements.input.value.trim();
  if (!text) return;
  const note = { id: Date.now(), text, createdAt: new Date().toISOString() };
  notes.push(note);
  persist();
  try { await Engine.vectorize(note.id, note.text); }
  catch(e) { console.warn('Ошибка векторизации:', e); }
  elements.input.value = '';
  renderCards([]);
  elements.statusText.textContent = 'Мысль сохранена';
  setTimeout(() => elements.statusText.textContent = '', 2000);
});

// Старт
(async () => {
  elements.statusText.textContent = 'Загрузка модели...';
  try {
    await Engine.init();
    elements.statusText.textContent = 'Готово';
    setTimeout(() => elements.statusText.textContent = '', 2000);
  } catch(e) {
    elements.statusText.textContent = 'Ошибка загрузки. Проверьте интернет.';
    console.error(e);
  }
})();
</script>
</body>
</html>
