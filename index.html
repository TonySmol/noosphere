<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Noosphere (GunDB solid)</title>

  <!-- ================= Module: Styles (UI only) ================= -->
  <style>
    :root{
      --bg:#f8fafc; --surface:#ffffff; --text:#0f172a; --text2:#64748b;
      --border:#e2e8f0; --accent:#4f46e5; --accent2:#4338ca;
      --shadow:0 1px 3px rgba(0,0,0,0.05); --radius:16px;
      --wave:#0ea5e9; --star:#fbbf24;
      --personal:#a78bfa; --world:#38bdf8; --ser:#fbbf24;
      --danger:#ef4444;
    }
    body.dark{
      --bg:#0f172a; --surface:#1e293b; --text:#f1f5f9; --text2:#94a3b8;
      --border:#334155; --accent:#818cf8; --accent2:#6366f1;
      --shadow:0 1px 3px rgba(0,0,0,0.3);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
      background:var(--bg); color:var(--text); line-height:1.5;
      display:flex; justify-content:center; padding:0.5rem; overflow-x:hidden;
    }
    .app{ width:100%; max-width:680px; display:flex; flex-direction:column; gap:0.75rem; margin-top:0.5rem; }

    .tabs{ display:flex; gap:0.5rem; justify-content:center; }
    .tab-btn{
      padding:0.5rem 1.2rem; border-radius:12px; border:1px solid var(--border);
      background:transparent; color:var(--text2); cursor:pointer; font-weight:700;
      transition:all .2s;
    }
    .tab-btn.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
    .view{ display:none; }
    .view.active{ display:block; }

    .thought-input{
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1rem; box-shadow:var(--shadow);
    }
    textarea{
      width:100%; border:none; background:transparent; outline:none;
      font-size:1.05rem; font-family:inherit; resize:none; color:var(--text);
      min-height:90px;
    }
    textarea::placeholder{ color:var(--text2); opacity:0.7; }
    .input-actions{
      display:flex; justify-content:space-between; gap:0.75rem; align-items:center; margin-top:0.75rem;
      flex-wrap:wrap;
    }
    .status-line{ font-size:0.82rem; color:var(--text2); display:flex; gap:0.5rem; align-items:center; }
    .btn-row{ display:flex; gap:0.5rem; align-items:center; margin-left:auto; }
    .btn{
      padding:0.6rem 1rem; border-radius:12px; font-weight:800;
      border:none; cursor:pointer; background:var(--accent); color:#fff;
      font-size:0.9rem; transition:all .2s;
      display:inline-flex; align-items:center; justify-content:center; gap:0.5rem;
    }
    .btn:hover{ background:var(--accent2); transform:translateY(-1px); }
    .btn:disabled{ opacity:0.45; pointer-events:none; transform:none; }
    .btn-ghost{ background:transparent; color:var(--text2); border:1px solid var(--border); }
    .btn-danger{ background:var(--danger); }
    .btn-danger:hover{ filter:brightness(0.95); }

    .swipe-hint{ font-size:0.82rem; color:var(--text2); display:none; align-items:center; gap:0.35rem; }
    .swipe-hint.visible{ display:flex; }

    .feed-section{ margin-top:0.25rem; }
    .section-title{
      display:flex; align-items:center; gap:0.5rem;
      font-size:0.8rem; font-weight:900; color:var(--text2);
      text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.5rem;
    }
    .section-title::before{
      content:''; display:block; width:8px; height:8px; border-radius:50%;
      background:currentColor;
    }
    #personalSection .section-title{ color:var(--personal); }
    #relevantSection .section-title{ color:var(--world); }
    #serendipitySection .section-title{ color:var(--ser); }

    .carousel{
      display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch; gap:0.75rem; padding-bottom:0.5rem;
    }
    .carousel::-webkit-scrollbar{ height:4px; }
    .carousel::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }

    .card{
      flex:0 0 calc(100% - 1.5rem);
      scroll-snap-align:start;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1rem; box-shadow:var(--shadow);
      animation:fadeInUp .35s ease both;
    }
    .card.charged{ border-color:var(--wave); box-shadow:0 0 0 1px var(--wave); }
    @keyframes fadeInUp{ from{ opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    .card-text{ font-size:0.95rem; line-height:1.5; margin-bottom:0.6rem; white-space:pre-wrap; word-break:break-word; }
    .card-footer{ display:flex; align-items:center; justify-content:space-between; gap:0.5rem; font-size:0.82rem; color:var(--text2); }
    .badge{ background:rgba(79,70,229,0.12); color:var(--accent); padding:2px 8px; border-radius:999px; font-weight:900; }
    .wave-group{ display:flex; align-items:center; gap:0.35rem; }
    .wave-btn{
      background:none; border:1px solid var(--border); border-radius:50%;
      width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center;
      font-size:0.95rem; cursor:pointer; color:var(--text2); transition:all .2s;
    }
    .wave-btn:hover{ background:var(--wave); color:#fff; border-color:var(--wave); }
    .wave-btn.active{ background:var(--wave); color:#fff; border-color:var(--wave); }
    .empty{ text-align:center; color:var(--text2); padding:1.5rem 1rem; font-style:italic; }

    .history-input{ margin-bottom:1rem; }
    .history-input input{
      width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:14px;
      background:var(--surface); color:var(--text); outline:none;
    }
    .day-group{ margin-bottom:1.25rem; }
    .day-title{ font-size:0.85rem; font-weight:900; color:var(--text2); margin-bottom:0.5rem; }
    .archive-item{
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:0.75rem 1rem; margin-bottom:0.5rem;
    }
    .archive-item .meta{ font-size:0.75rem; color:var(--text2); margin-bottom:0.25rem; display:flex; gap:0.75rem; flex-wrap:wrap;}
    .archive-item .text{ font-size:0.95rem; white-space:pre-wrap; word-break:break-word; }
    .archive-item .actions{ margin-top:0.6rem; display:flex; gap:0.5rem; flex-wrap:wrap; }
    .archive-item .actions button{
      background:none; border:1px solid var(--border); border-radius:10px;
      padding:0.28rem 0.75rem; font-size:0.82rem; cursor:pointer; color:var(--text2);
    }
    .archive-item .actions button.danger{ border-color:rgba(239,68,68,0.4); color:var(--danger); }

    .burger-btn{
      position:fixed; top:1rem; right:1rem; width:46px; height:46px;
      background:var(--surface); border:1px solid var(--border); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; z-index:5; font-size:1.4rem; box-shadow:var(--shadow);
    }
    .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:9; display:none; }
    .overlay.open{ display:block; }
    .settings-panel{
      position:fixed; top:0; right:0; width:380px; max-width:88vw; height:100%;
      background:var(--surface); box-shadow:-5px 0 25px rgba(0,0,0,0.15);
      z-index:10; padding:1.25rem; overflow-y:auto;
      transform:translateX(100%); transition:transform .35s cubic-bezier(0.4,0,0.2,1);
    }
    .settings-panel.open{ transform:translateX(0); }
    .setting-row{ margin-bottom:1rem; display:flex; flex-direction:column; gap:0.35rem; }
    .setting-row label{ font-size:0.85rem; color:var(--text2); font-weight:900; }
    .setting-row select, .setting-row textarea{
      width:100%; border:1px solid var(--border); border-radius:12px;
      padding:0.6rem 0.7rem; background:var(--surface); color:var(--text); outline:none;
      font-family:inherit;
    }
    .setting-row textarea{ min-height:72px; resize:vertical; }
    .range-display{ display:flex; align-items:center; gap:0.6rem; }
    .range-display input[type="range"]{ flex:1; }
    .range-display span{ min-width:3rem; font-weight:900; color:var(--accent); text-align:right; }

    .settings-actions{ display:flex; flex-direction:column; gap:0.6rem; margin:1.25rem 0; }
    .settings-actions .btn{ width:100%; }

    .spinner{
      display:inline-block; width:16px; height:16px;
      border:2px solid var(--text2); border-right-color:transparent;
      border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle;
    }
    @keyframes spin{ to{ transform:rotate(360deg);} }

    .tiny{ font-size:0.75rem; color:var(--text2); }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>

<body>
  <div class="app">

      <button class="tab-btn active" data-view="flow" id="tabFlowBtn">Поток</button>

    </div>

    <div class="view active" id="flowView">

        <div class="input-actions">
          <div class="status-line" id="statusMsg"></div>

          </div>

            <button class="btn btn-ghost" id="saveLocalBtn" disabled>Сохранить</button>
            <button class="btn" id="publishBtn" disabled>Опубликовать</button>
          </div>
        </div>
      </div>

      <div id="personalSection" class="feed-section">
        <div class="section-title" id="personalTitle">Мои мысли</div>

      </div>

    <div class="view" id="historyView">

      </div>

    </div>

  <div class="burger-btn" id="settingsTrigger">☰</div>
  <div class="overlay" id="overlay"></div>

  <div class="settings-panel" id="settingsPanel">
    <h2 id="settingsTitle" style="margin-bottom:1rem;">Настройки</h2>

    <div class="setting-row">
      <label id="langLabel">Язык / Language</label>
      <select id="langSelect">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="themeLabel">Тема</label>
      <select id="themeSelect">
        <option value="auto">Авто</option>
        <option value="light">День</option>
        <option value="dark">Ночь</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="thresholdLabel">Порог релевантности</label>
      <div class="range-display">
        <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.25" />
        <span id="thresholdValue">0.25</span>

    </div>

    <div class="setting-row">

        <input type="range" id="serendipitySlider" min="0" max="0.5" step="0.01" value="0.15" />
        <span id="serendipityValue">0.15</span>
      </div>
    </div>

    <div class="setting-row">
      <label id="minWavesLabel">Мин. волн</label>
      <select id="minWavesSelect">
        <option value="0" selected>0</option>
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="5">5</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="maxCardsLabel">Макс. карточек</label>
      <select id="maxResultsSelect">
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="peersLabel">Gun peers (по одному URL на строку)</label>
      <textarea id="peersTextarea" class="mono" spellcheck="false"></textarea>
      <div class="tiny" id="peersHint">
        Если пусто — офлайн (IndexedDB). Для сети добавьте relay (например https://relay.peer.ooo/gun).

    <div class="settings-actions">

    <div style="display:flex; gap:0.5rem; margin:0.5rem 0 0;">

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // ===================== Module: Utils =====================
    const Utils = (() => {
      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
      const debounce = (fn, ms) => {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
      };
      const escapeHTML = (s) => { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; };
      const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
      const safeJSON = (x, fallback) => { try { return JSON.parse(x); } catch { return fallback; } };

      const formatDayLabel = (ms, t) => {
        const d = new Date(ms);
        const today = new Date(); today.setHours(0,0,0,0);
        const yest = new Date(today); yest.setDate(yest.getDate() - 1);
        if (+d >= +today) return t('today');
        if (+d >= +yest) return t('yesterday');
        return d.toLocaleDateString();
      };

      const groupByDay = (notes) => {
        const map = new Map();
        for (const n of notes) {
          const key = new Date(n.createdAt).toLocaleDateString();
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(n);
        }
        return map;
      };

      class Emitter {
        #m = new Map();
        on(ev, fn) { if (!this.#m.has(ev)) this.#m.set(ev, new Set()); this.#m.get(ev).add(fn); return () => this.#m.get(ev)?.delete(fn); }
        emit(ev, payload) { for (const fn of this.#m.get(ev) ?? []) { try { fn(payload); } catch (e) { console.error(e); } } }
      }

      return { $, $$, debounce, escapeHTML, clamp, safeJSON, formatDayLabel, groupByDay, Emitter };
    })();

    // ===================== Module: IndexedDB KV (NO localStorage) =====================
    const KV = (() => {
      const DB_NAME = 'noosphere_kv_v2';
      const STORE = 'kv';
      function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }
      async function get(key) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readonly');
          const st = tx.objectStore(STORE);
          const req = st.get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }
      async function set(key, val) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readwrite');
          const st = tx.objectStore(STORE);
          const req = st.put(val, key);
          req.onsuccess = () => resolve(true);
          req.onerror = () => reject(req.error);
        });
      }
      return { get, set };
    })();

    // ===================== Module: BootSettings (IndexedDB; for peers/theme/lang at boot) =====================
    const BootSettings = (() => {
      const KEY = 'bootSettings';
      const DEFAULT = {
        lang: 'ru',
        theme: 'auto',
        threshold: 0.25,
        serDelta: 0.15,
        minWaves: 0,         // IMPORTANT: not 1 (otherwise world is "dead")
        maxResults: 5,
        peers: ['https://relay.peer.ooo/gun']
      };

      function sanitize(raw) {
        const x = raw && typeof raw === 'object' ? raw : {};
        const peers = Array.isArray(x.peers) ? x.peers.map(String).map(s => s.trim()).filter(Boolean) : DEFAULT.peers.slice();
        return {
          lang: (x.lang === 'en' || x.lang === 'ru') ? x.lang : DEFAULT.lang,
          theme: (x.theme === 'auto' || x.theme === 'light' || x.theme === 'dark') ? x.theme : DEFAULT.theme,
          threshold: Utils.clamp(Number(x.threshold ?? DEFAULT.threshold), 0, 1),
          serDelta: Utils.clamp(Number(x.serDelta ?? DEFAULT.serDelta), 0, 0.5),
          minWaves: Math.max(0, Number(x.minWaves ?? DEFAULT.minWaves) | 0),
          maxResults: Math.max(1, Number(x.maxResults ?? DEFAULT.maxResults) | 0),
          peers
        };
      }

      async function load() {
        const raw = await KV.get(KEY);
        return sanitize(raw ?? DEFAULT);
      }
      async function save(s) {
        await KV.set(KEY, sanitize(s));
      }

      return { DEFAULT, sanitize, load, save };
    })();

    // ===================== Module: I18n =====================
    const I18n = (() => {

          exportCapsule: 'Download capsule', importCapsule: 'Import capsule',

          publishing: 'Publishing...'
        }
      };

      let lang = 'ru';
      const t = (key, vars = null) => {
        const s = (dict[lang]?.[key] ?? dict.ru[key] ?? key);
        if (!vars) return s;
        return s.replace(/\{(\w+)\}/g, (_, k) => String(vars[k] ?? ''));
      };
      const setLang = (v) => { lang = v in dict ? v : 'ru'; };
      const getLang = () => lang;

      return { t, setLang, getLang };
    })();

    // ===================== Module: Theme =====================
    const Theme = (() => {
      function apply(mode) {
        const dark = mode === 'dark' || (mode === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.body.classList.toggle('dark', !!dark);
      }
      return { apply };
    })();

    // ===================== Module: Vector math + packing =====================
    const Vectors = (() => {
      const dot = (a, b) => { let d = 0; for (let i = 0; i < a.length; i++) d += a[i] * b[i]; return d; };
      const norm = (v) => {
        let s = 0; for (let i = 0; i < v.length; i++) s += v[i] * v[i];
        const m = Math.sqrt(s) || 0;
        if (!m) return v;
        for (let i = 0; i < v.length; i++) v[i] /= m;
        return v;
      };

      const _b64encode = (u8) => {
        let s = '';
        const CHUNK = 0x8000;
        for (let i = 0; i < u8.length; i += CHUNK) s += String.fromCharCode(...u8.subarray(i, i + CHUNK));
        return btoa(s);
      };
      const _b64decode = (b64) => {
        const bin = atob(b64);
        const u8 = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
        return u8;
      };

      const packInt8 = (f32) => {
        const v = new Float32Array(f32);
        norm(v);
        const i8 = new Int8Array(v.length);
        for (let i = 0; i < v.length; i++) i8[i] = Math.max(-127, Math.min(127, Math.round(v[i] * 127)));
        return _b64encode(new Uint8Array(i8.buffer));
      };

      const unpackInt8 = (b64) => {
        const u8 = _b64decode(b64);
        const i8 = new Int8Array(u8.buffer);
        const v = new Float32Array(i8.length);
        for (let i = 0; i < i8.length; i++) v[i] = i8[i] / 127;
        return norm(v);
      };

      return { dot, norm, packInt8, unpackInt8 };
    })();

    // ===================== Module: Embedder (Transformers.js) =====================
    const Embedder = (() => {
      let model = null;

      async function init() {
        model = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', { quantized: true });
      }

      async function embed(text) {
        if (!model) throw new Error('Embedder not initialized');
        const out = await model([text]);
        const { data, dims } = out;
        const tokens = dims?.[1];
        const hidden = dims?.[2];

        if (!tokens || !hidden) {
          const v = new Float32Array(data);
          return Vectors.norm(v);
        }

        const emb = new Float32Array(hidden);
        for (let t = 0; t < tokens; t++) {
          const base = t * hidden;
          for (let h = 0; h < hidden; h++) emb[h] += data[base + h];
        }
        for (let h = 0; h < hidden; h++) emb[h] /= tokens;
        return Vectors.norm(emb);
      }

      return { init, embed, isReady: () => !!model };
    })();

    // ===================== Module: Gun Network =====================
    const GunNet = (() => {
      function create({ peers }) {
        if (!window.Gun) throw new Error('Gun not loaded');
        const list = (peers ?? []).map(s => s.trim()).filter(Boolean);
        const gun = Gun({ peers: list, localStorage: false });
        return { gun, peers: list };
      }
      return { create };
    })();

    // ===================== Module: App Schema (Gun paths only) =====================
    const Schema = (() => {
      const ROOT = 'noosphere_v2';
      const root = (gun) => gun.get(ROOT);
      const client = (gun, deviceId) => root(gun).get('clients').get(deviceId);
      const settings = (gun, deviceId) => client(gun, deviceId).get('settings');
      const personalNotes = (gun, deviceId) => client(gun, deviceId).get('notes');
      const worldNotes = (gun) => root(gun).get('world').get('notes');
      return { root, client, settings, personalNotes, worldNotes };
    })();

    // ===================== Module: Settings Store (Gun) =====================
    const SettingsStore = (() => {
      function create({ gun, deviceId, seed }) {
        const ee = new Utils.Emitter();
        const ref = Schema.settings(gun, deviceId);

        let current = BootSettings.sanitize(seed ?? BootSettings.DEFAULT);
        let initialized = false;

        // Seed once if empty (first run)
        ref.once((data) => {
          const has = data && typeof data === 'object' && (data.lang || data.theme || data.threshold != null);
          if (!has) ref.put(current);
        });

        ref.on((data) => {
          current = BootSettings.sanitize(data ?? current);
          initialized = true;
          ee.emit('change', current);
        });

        let putTimer = null;
        function put(partial) {
          current = BootSettings.sanitize({ ...current, ...partial });
          clearTimeout(putTimer);
          putTimer = setTimeout(() => ref.put(current), 120);
          ee.emit('change', current);
        }

        return {
          get: () => current,
          isReady: () => initialized,
          onChange: (fn) => ee.on('change', fn),
          put
        };
      }
      return { create };
    })();

    // ===================== Module: Personal Notes Store (Gun) =====================
    const PersonalStore = (() => {
      function normalizeNote(id, data) {
        if (!data || typeof data !== 'object') return null;
        if (data.deleted) return { id, deleted: true };

        const createdAt = Number(data.createdAt) || Date.now();
        const updatedAt = Number(data.updatedAt) || createdAt;
        const vPacked = typeof data.v === 'string' ? data.v : null;

        return {
          id,
          text: String(data.text ?? ''),
          createdAt,
          updatedAt,
          editedAt: data.editedAt ? Number(data.editedAt) : null,
          vPacked,
          deleted: false
        };
      }

      function create({ gun, deviceId }) {
        const ee = new Utils.Emitter();
        const ref = Schema.personalNotes(gun, deviceId);
        const map = new Map();

        ref.map().on((data, id) => {
          if (!id || id === '_' || id === 'null') return;
          const n = normalizeNote(id, data);
          if (!n) return;

          if (n.deleted) { map.delete(id); ee.emit('change', list()); return; }

          const prev = map.get(id);
          if (!prev || (n.updatedAt >= (prev.updatedAt ?? 0))) {
            map.set(id, n);
            ee.emit('change', list());
          }
        });

        function list() { return Array.from(map.values()).sort((a,b) => b.createdAt - a.createdAt); }
        function get(id) { return map.get(id) ?? null; }

        async function add({ text, vPacked = null, createdAt = Date.now(), editedAt = null }) {
          const id = crypto.randomUUID();
          const now = Date.now();
          ref.get(id).put({
            id,
            text,
            createdAt,
            updatedAt: now,
            editedAt,
            v: vPacked,
            deleted: false
          });
          return id;
        }

        async function update({ id, text, vPacked = null }) {
          const now = Date.now();
          ref.get(id).put({
            text,
            updatedAt: now,
            editedAt: now,
            ...(vPacked ? { v: vPacked } : {})
          });
        }

        async function putVector(id, vPacked) {
          ref.get(id).put({ v: vPacked, updatedAt: Date.now() });
        }

        async function markDeleted(id) {
          ref.get(id).put({ deleted: true, updatedAt: Date.now() });
        }

        return { onChange: (fn) => ee.on('change', fn), list, get, add, update, putVector, markDeleted };
      }

      return { create };
    })();

    // ===================== Module: World Store (Gun + votes) =====================
    const WorldStore = (() => {
      function normalizeWorld(id, data) {
        if (!data || typeof data !== 'object') return null;
        if (data.deleted) return { id, deleted: true };
        const createdAt = Number(data.createdAt) || Date.now();
        const excerpt = String(data.excerpt ?? '');
        const vPacked = typeof data.v === 'string' ? data.v : null;
        return { id, excerpt, createdAt, vPacked, deleted: false };
      }

      function create({ gun, deviceId }) {
        const ee = new Utils.Emitter();
        const ref = Schema.worldNotes(gun);

        const notes = new Map();
        const voteSets = new Map(); // id -> Map(voterId -> 1|0)
        const waves = new Map();
        const myWave = new Map();
        const voteSubs = new Set();

        function recompute(id) {
          const m = voteSets.get(id);
          let c = 0;
          if (m) for (const v of m.values()) if (v === 1) c++;
          waves.set(id, c);
          myWave.set(id, (m?.get(deviceId) === 1) || false);
        }

        function list() {
          const out = [];
          for (const n of notes.values()) {
            out.push({ ...n, waves: waves.get(n.id) ?? 0, myWave: myWave.get(n.id) ?? false });
          }
          return out.sort((a,b) => b.createdAt - a.createdAt);
        }

        function emit() { ee.emit('change', list()); }

        ref.map().on((data, id) => {
          if (!id || id === '_' || id === 'null') return;
          const n = normalizeWorld(id, data);
          if (!n) return;

          if (n.deleted) {
            notes.delete(id);
            voteSets.delete(id);
            waves.delete(id);
            myWave.delete(id);
            emit();
            return;
          }

          notes.set(id, n);

          if (!voteSubs.has(id)) {
            voteSubs.add(id);
            const votesRef = ref.get(id).get('votes');
            votesRef.map().on((v, voterId) => {
              if (!voterId || voterId === '_' || voterId === 'null') return;
              const vv = Number(v) === 1 ? 1 : 0;
              if (!voteSets.has(id)) voteSets.set(id, new Map());
              voteSets.get(id).set(voterId, vv);
              recompute(id);
              emit();
            });
          }

          recompute(id);
          emit();
        });

        async function publish({ excerpt, vPacked }) {
          const id = crypto.randomUUID();
          ref.get(id).put({
            id,
            excerpt: String(excerpt ?? '').slice(0, 240),
            createdAt: Date.now(),
            v: vPacked ?? null,
            deleted: false
          });
          return id;
        }

        async function setMyWave(id, on) {
          ref.get(id).get('votes').get(deviceId).put(on ? 1 : 0);
        }

        return { onChange: (fn) => ee.on('change', fn), list, publish, setMyWave };
      }

      return { create };
    })();

    // ===================== Module: Search Engine (pure) =====================
    const SearchEngine = (() => {
      function create({ settingsStore, personalStore, worldStore }) {
        const vecCache = new Map(); // id -> Float32Array

        function getVec(id, packed) {
          if (!packed) return null;
          if (vecCache.has(id)) return vecCache.get(id);
          try {
            const v = Vectors.unpackInt8(packed);
            vecCache.set(id, v);
            return v;
          } catch { return null; }
        }

        function clearCache() { vecCache.clear(); }

        function scoreList(queryVec, items, getPacked, extraFilter = () => true) {
          const res = [];
          for (const it of items) {
            if (!extraFilter(it)) continue;
            const v = getVec(it.id, getPacked(it));
            if (!v) continue;
            const s = Vectors.dot(queryVec, v);
            res.push({ ...it, score: s });
          }
          res.sort((a,b) => b.score - a.score);
          return res;
        }

        async function flow(text) {
          const q = String(text ?? '').trim();
          const st = settingsStore.get();

          // "живой поток" без запроса: показываем последние
          if (!q) {
            const personalRecent = personalStore.list().slice(0, st.maxResults);
            const worldRecent = worldStore.list()
              .filter(n => (n.waves ?? 0) >= st.minWaves)
              .slice(0, st.maxResults);

            return { mode: 'recent', personal: personalRecent, rel: worldRecent, ser: [] };
          }

          // search mode
          if (!Embedder.isReady()) {
            // если модель не готова — возвращаем недорогой fallback: просто последние
            const personalRecent = personalStore.list().slice(0, st.maxResults);
            const worldRecent = worldStore.list().slice(0, st.maxResults);
            return { mode: 'recent', personal: personalRecent, rel: worldRecent, ser: [] };
          }

          const qVec = await Embedder.embed(q);

          const personal = scoreList(qVec, personalStore.list(), n => n.vPacked)
            .filter(x => x.score >= st.threshold)
            .slice(0, st.maxResults);

          const low = Math.max(0, st.threshold - st.serDelta);
          const scoredWorld = scoreList(
            qVec,
            worldStore.list(),
            n => n.vPacked,
            n => (n.waves ?? 0) >= st.minWaves
          );

          const rel = scoredWorld.filter(x => x.score >= st.threshold).slice(0, st.maxResults);
          const ser = scoredWorld.filter(x => x.score >= low && x.score < st.threshold).slice(0, st.maxResults);

          return { mode: 'search', personal, rel, ser };
        }

        async function historySearch(text) {
          const q = String(text ?? '').trim();
          const st = settingsStore.get();
          if (!q) return { mode: 'all', list: personalStore.list() };

          if (!Embedder.isReady()) {
            // fallback: подстрочный поиск
            const low = q.toLowerCase();
            const list = personalStore.list().filter(n => n.text.toLowerCase().includes(low));
            return { mode: 'substring', list };
          }

          const qVec = await Embedder.embed(q);
          const scored = scoreList(qVec, personalStore.list(), n => n.vPacked)
            .filter(x => x.score >= st.threshold);
          return { mode: 'semantic', list: scored };
        }

        return { clearCache, flow, historySearch };
      }

      return { create };
    })();

    // ===================== Module: Capsule =====================
    const Capsule = (() => {

          id: n.id, text: n.text, createdAt: n.createdAt, editedAt: n.editedAt ?? null
        }))};
        const blob = new Blob([JSON.stringify(capsule)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'noosphere.capsule.json';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      async function importNotes(file) {
        const text = await file.text();
        const cap = Utils.safeJSON(text, null);
        if (!cap || !Array.isArray(cap.notes)) throw new Error('Bad capsule');
        return cap.notes
          .filter(n => n && typeof n.text === 'string')
          .map(n => ({
            id: String(n.id || crypto.randomUUID()),
            text: String(n.text),
            createdAt: Number(n.createdAt) || Date.now(),
            editedAt: n.editedAt ? Number(n.editedAt) : null
          }));
      }

      return { exportNotes, importNotes };
    })();

    // ===================== Module: App =====================
    const App = (() => {
      async function ensureDeviceId() {
        let id = await KV.get('deviceId');
        if (!id) { id = crypto.randomUUID(); await KV.set('deviceId', id); }
        return id;
      }

      async function resetDeviceId() {
        const id = crypto.randomUUID();
        await KV.set('deviceId', id);
        location.reload();
      }

      function starBurstAt(el) {
        const rect = el.getBoundingClientRect();
        const star = document.createElement('div');
        star.textContent = '✦';
        star.style.cssText = `
          position:fixed; left:${rect.left + rect.width/2}px; top:${rect.top + rect.height/2}px;
          font-size:24px; color:var(--star);
          transition:all 1s cubic-bezier(0.25,0.1,0.25,1);
          z-index:999; pointer-events:none; transform:translate(-50%,-50%);
        `;
        document.body.appendChild(star);
        requestAnimationFrame(() => { star.style.transform = 'translate(-50%,-250px) scale(0.1)'; star.style.opacity = '0'; });
        setTimeout(() => star.remove(), 1000);
      }

      async function start() {
        const els = UI.refs();

        const deviceId = await ensureDeviceId();
        els.deviceInfo.textContent = `device: ${deviceId}`;

        // 1) load boot settings from IndexedDB (so peers/theme/lang work instantly)
        const boot = await BootSettings.load();

        // apply boot UI state immediately
        I18n.setLang(boot.lang);
        Theme.apply(boot.theme);
        UI.setTexts(els, I18n.t);
        UI.settingsToUI(els, boot);

        // 2) start Gun with boot peers
        const net = GunNet.create({ peers: boot.peers });
        const gun = net.gun;
        gun.opt({ peers: boot.peers });

        // 3) create stores
        const settingsStore = SettingsStore.create({ gun, deviceId, seed: boot });
        const personalStore = PersonalStore.create({ gun, deviceId });
        const worldStore = WorldStore.create({ gun, deviceId });

        const engine = SearchEngine.create({ settingsStore, personalStore, worldStore });

        // 4) status + readiness (app should not be zombie even if model isn't ready)
        UI.setReady(els, true);
        UI.setStatus(els, `<span class="spinner"></span> ${I18n.t('modelLoading')}`);

        // start model async
        (async () => {
          try {
            await Embedder.init();
            UI.setStatus(els, I18n.t('ready'));
          } catch (e) {
            console.error(e);
            UI.setStatus(els, 'Model error (check console). App will work, but semantic search disabled.');
          }
        })();

        // 5) reactive: settings changes
        function netInfo(s) {
          const peers = (s.peers ?? []).map(x => x.trim()).filter(Boolean);
          els.netInfo.textContent = peers.length ? I18n.t('netPeers', { n: peers.length }) : I18n.t('netOffline');
          gun.opt({ peers });
        }

        settingsStore.onChange(async (s) => {
          // persist for next boot
          await BootSettings.save(s);

          // apply UI
          I18n.setLang(s.lang);
          Theme.apply(s.theme);
          UI.setTexts(els, I18n.t);
          UI.settingsToUI(els, s);

          netInfo(s);
          engine.clearCache();
          await refreshFlow();
          if (els.historyView.classList.contains('active')) await refreshHistory();
        });

        // initial net info from boot
        netInfo(boot);

        // 6) background vector build for notes missing vectors (so save is instant)
        let bgVectorBusy = false;
        async function backgroundEnsureVectors() {
          if (bgVectorBusy) return;
          if (!Embedder.isReady()) return;
          bgVectorBusy = true;
          try {
            const list = personalStore.list();
            for (const n of list) {
              if (n.vPacked) continue;
              UI.setStatus(els, `${I18n.t('indexing')}`);
              const v = await Embedder.embed(n.text);
              const packed = Vectors.packInt8(v);
              await personalStore.putVector(n.id, packed);
              engine.clearCache();
            }
            UI.setStatus(els, I18n.t('ready'));
          } finally {
            bgVectorBusy = false;
          }
        }

        personalStore.onChange(() => {
          backgroundEnsureVectors();
          refreshFlow();
          if (els.historyView.classList.contains('active')) refreshHistory();
        });

        worldStore.onChange(() => { refreshFlow(); });

        // 7) search coordinator to avoid "zombie" races
        let flowSeq = 0;
        let historySeq = 0;

        async function refreshFlow() {
          const my = ++flowSeq;
          const q = els.input.value;
          const res = await engine.flow(q);
          if (my !== flowSeq) return;

          const t = I18n.t;
          UI.renderCarousel(els.personalCards, res.personal, { emptyText: t('emptyPersonal'), isWorld: false });
          UI.renderCarousel(els.relevantCards, res.rel, { emptyText: t('emptyWorld'), isWorld: true });

          // serendipity: only meaningful in search mode
          const showSer = res.mode === 'search';
          document.getElementById('serendipitySection').style.display = showSer ? 'block' : 'none';
          if (showSer) UI.renderCarousel(els.serCards, res.ser, { emptyText: t('emptySer'), isWorld: true });
        }

        async function refreshHistory() {
          const my = ++historySeq;
          const q = els.historySearch.value;
          const { list } = await engine.historySearch(q);
          if (my !== historySeq) return;
          UI.renderHistory(els, list, I18n.t);
        }

        // initial render (no zombie: show recents)
        await refreshFlow();

        // ===================== Module: UI events =====================
        els.input.addEventListener('input', () => {
          els.swipeHint.classList.toggle('visible', els.input.value.trim().length > 0);
        });
        els.input.addEventListener('input', Utils.debounce(refreshFlow, 350));

        // swipe up publish
        let touchY = 0;
        els.input.addEventListener('touchstart', (e) => { touchY = e.touches?.[0]?.clientY ?? 0; }, { passive: true });
        els.input.addEventListener('touchend', async (e) => {
          const endY = e.changedTouches?.[0]?.clientY ?? 0;
          if (touchY - endY > 60 && els.input.value.trim()) {
            e.preventDefault();
            await publish();
          }
        }, { passive: false });

        async function saveLocal() {
          const text = els.input.value.trim();
          if (!text) return;

          try {
            UI.setStatus(els, `${I18n.t('saving')}`);
            // instant write without vector
            await personalStore.add({ text, vPacked: null });
            els.input.value = '';
            els.swipeHint.classList.remove('visible');
            UI.setStatus(els, I18n.t('ready'));
            await refreshFlow();
            backgroundEnsureVectors();
          } catch (e) {
            console.error(e);
            UI.setStatus(els, 'Save error (check console)');
          }
        }

        async function publish() {
          const text = els.input.value.trim();
          if (!text) return;

          try {
            UI.setStatus(els, `${I18n.t('publishing')}`);
            // publish requires vector (so others can search)
            if (!Embedder.isReady()) {
              UI.setStatus(els, 'Model not ready yet. Try again in a few seconds.');
              return;
            }
            const v = await Embedder.embed(text);
            const packed = Vectors.packInt8(v);

            await personalStore.add({ text, vPacked: packed });
            await worldStore.publish({ excerpt: text, vPacked: packed });

            starBurstAt(els.thoughtContainer);
            els.input.value = '';
            els.swipeHint.classList.remove('visible');

            UI.setStatus(els, I18n.t('ready'));
            engine.clearCache();
            await refreshFlow();
          } catch (e) {
            console.error(e);
            UI.setStatus(els, 'Publish error (check console)');
          }
        }

        els.saveLocalBtn.addEventListener('click', saveLocal);
        els.publishBtn.addEventListener('click', publish);

        els.input.addEventListener('keydown', async (e) => {
          if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            // ctrl+enter = publish, shift+ctrl+enter = save
            if (e.shiftKey) await saveLocal();
            else await publish();
          }
        });

        // tabs
        els.tabFlowBtn.addEventListener('click', () => UI.setTab(els, 'flow'));
        els.tabHistoryBtn.addEventListener('click', async () => {
          UI.setTab(els, 'history');
          await refreshHistory();
        });

        // settings
        els.settingsTrigger.addEventListener('click', () => UI.openSettings(els));
        els.overlay.addEventListener('click', () => UI.closeSettings(els));

        els.thresholdSl.addEventListener('input', () => els.thresholdVal.textContent = Number(els.thresholdSl.value).toFixed(2));
        els.serSl.addEventListener('input', () => els.serVal.textContent = Number(els.serSl.value).toFixed(2));

        els.applyBtn.addEventListener('click', async () => {
          const next = BootSettings.sanitize(UI.uiToSettings(els));
          settingsStore.put(next);
          await BootSettings.save(next); // boot persistence (no localStorage)
          UI.closeSettings(els);
        });

        // history search
        els.historySearch.addEventListener('input', Utils.debounce(refreshHistory, 350));

        // world wave + history edit/delete (delegation)
        document.addEventListener('click', async (e) => {
          const wave = e.target.closest?.('.wave-btn');
          if (wave && wave.dataset.action === 'wave') {
            const id = wave.dataset.id;
            const isActive = wave.classList.contains('active');
            await worldStore.setMyWave(id, !isActive);
            return;
          }

          const editBtn = e.target.closest?.('.edit-btn');
          const delBtn = e.target.closest?.('.delete-btn');
          const saveEdit = e.target.closest?.('.save-edit-btn');
          const cancelEdit = e.target.closest?.('.cancel-edit-btn');

          if (editBtn) {
            const item = editBtn.closest('.archive-item');
            const id = item?.dataset?.id;
            const note = personalStore.get(id);
            if (!note) return;

            item.querySelector('.text').innerHTML =
              `<textarea class="edit-textarea" style="width:100%;min-height:60px;">${Utils.escapeHTML(note.text)}</textarea>`;
            item.querySelector('.actions').innerHTML =
              `<button class="save-edit-btn" data-id="${id}">${Utils.escapeHTML(I18n.t('save'))}</button>
               <button class="cancel-edit-btn" data-id="${id}">${Utils.escapeHTML(I18n.t('cancel'))}</button>`;
            return;
          }

          if (saveEdit) {
            const item = saveEdit.closest('.archive-item');
            const id = saveEdit.dataset.id;
            const ta = item?.querySelector('.edit-textarea');
            if (ta?.value?.trim()) {
              const newText = ta.value.trim();
              // update note; vector rebuild if model ready
              let vPacked = null;
              if (Embedder.isReady()) {
                UI.setStatus(els, `${I18n.t('indexing')}`);
                const v = await Embedder.embed(newText);
                vPacked = Vectors.packInt8(v);
              }
              await personalStore.update({ id, text: newText, vPacked });
              engine.clearCache();
              UI.setStatus(els, I18n.t('ready'));
            }
            await refreshHistory();
            await refreshFlow();
            backgroundEnsureVectors();
            return;
          }

          if (cancelEdit) { await refreshHistory(); return; }

          if (delBtn) {
            const id = delBtn.dataset.id;
            if (confirm(I18n.t('confirmDelete'))) {
              await personalStore.markDeleted(id);
              engine.clearCache();
              await refreshHistory();
              await refreshFlow();
            }
            return;
          }
        });

        // capsule
        els.exportBtn.addEventListener('click', () => Capsule.exportNotes(personalStore.list()));
        els.importBtn.addEventListener('click', () => els.importFile.click());
        els.importFile.addEventListener('change', async (e) => {
          const file = e.target.files?.[0];
          e.target.value = '';
          if (!file) return;

          try {
            const imported = await Capsule.importNotes(file);
            let n = 0;
            for (const item of imported) {
              // import instant; vectors will build in background
              await personalStore.add({ text: item.text, vPacked: null, createdAt: item.createdAt, editedAt: item.editedAt });
              n++;
            }
            alert(I18n.t('importSuccess', { n }));
            backgroundEnsureVectors();
          } catch (err) {
            console.error(err);
            alert('Import error: ' + (err?.message ?? String(err)));
          }
        });

        // rebuild vectors
        els.rebuildBtn.addEventListener('click', async () => {
          if (!Embedder.isReady()) { alert('Model not ready'); return; }
          els.rebuildBtn.disabled = true;
          els.rebuildBtn.textContent = '...';
          try {
            for (const n of personalStore.list()) {
              const v = await Embedder.embed(n.text);
              const packed = Vectors.packInt8(v);
              await personalStore.putVector(n.id, packed);
            }
            engine.clearCache();
            alert(I18n.t('rebuildDone'));
          } finally {
            els.rebuildBtn.disabled = false;
            els.rebuildBtn.textContent = I18n.t('rebuildVectors');
          }
        });

        // reset device
        els.resetDeviceBtn.addEventListener('click', async () => {
          if (!confirm(I18n.t('resetDeviceConfirm'))) return;
          await resetDeviceId();
        });
      }

      return { start };
    })();

    App.start().catch(err => {
      console.error(err);
      alert('Fatal error: ' + (err?.message ?? String(err)));
    });
  </script>
</body>
</html>
