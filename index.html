<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https: wss:; worker-src 'self' blob:; connect-src * https: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src * data: blob:;">
<title>NOOmium</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◆</text></svg>">
<style>
/* ============================================
   NOOmium — Design System
   Inspired by Telegram WebApp / Wallet style
   ============================================ */

:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
  --vh:1dvh;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --r-xs:6px;--r-sm:10px;--r:14px;--r-lg:18px;--r-xl:22px;--r-pill:999px;
  --font-ui:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter','Segoe UI',Roboto,sans-serif;
  --font-logo:'Inter','SF Pro Display',system-ui,sans-serif;
  --brand:#7c5cff;--brand-glow:rgba(124,92,255,.18);--brand-soft:rgba(124,92,255,.10);
  --world:#06b6d4;--world-glow:rgba(6,182,212,.18);--world-soft:rgba(6,182,212,.10);
  --seren:#10b981;--seren-glow:rgba(16,185,129,.18);--seren-soft:rgba(16,185,129,.10);
  --danger:#ef4444;--danger-glow:rgba(239,68,68,.15);
  --warning:#f59e0b;--success:#22c55e;
}

/* DARK THEME (default) */
[data-theme="dark"]{
  --bg:#0a0a14;--bg-2:#0f0f1c;--surface:#151525;--surface-2:#1c1c33;--surface-3:#252542;
  --text:#f5f5fa;--text-2:#b4b4cc;--text-3:#6a6a88;--text-dim:#4a4a68;
  --border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.14);
  --tg-hint-color:rgba(255,255,255,.08);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 16px rgba(0,0,0,.35);
  --shadow-lg:0 12px 40px rgba(0,0,0,.5);
  --glow:0 0 0 1px rgba(255,255,255,.04);
  color-scheme:dark;
}

/* LIGHT THEME */
[data-theme="light"]{
  --bg:#f5f5f7;--bg-2:#ffffff;--surface:#ffffff;--surface-2:#f0f0f5;--surface-3:#e6e6ef;
  --text:#1a1a2e;--text-2:#4a4a6a;--text-3:#8a8aa5;--text-dim:#b0b0c5;
  --border:rgba(0,0,0,.06);--border-strong:rgba(0,0,0,.12);
  --tg-hint-color:rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --glow:0 0 0 1px rgba(0,0,0,.03);
  color-scheme:light;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;height:calc(var(--vh,1vh)*100);
  overflow:hidden;background:var(--bg);color:var(--text);
  font:15px/1.5 var(--font-ui);-webkit-font-smoothing:antialiased;
  -webkit-user-select:none;user-select:none;
  overscroll-behavior:none;touch-action:manipulation;
}
input,textarea{-webkit-user-select:text;user-select:text;touch-action:manipulation}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;outline:none;touch-action:manipulation}
button:active{transform:scale(.97)}
button[disabled]{opacity:.5;cursor:not-allowed;transform:none}

#app-root{
  height:100%;height:calc(var(--vh,1vh)*100);
  display:none;flex-direction:column;
}
body.show-app #app-root{display:flex}
body.show-app #loom-root{display:none}

/* ============ HEADER ============ */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:calc(12px + var(--safe-top));
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;gap:10px;min-height:56px;
}
.logo{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-logo);font-weight:800;font-size:18px;
  letter-spacing:-.02em;
}
.logo-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--brand),#a78bfa);
  color:white;font-weight:900;font-size:15px;
  box-shadow:0 2px 8px var(--brand-glow);
}
.logo-txt{letter-spacing:-.03em}
.logo-txt-dot{color:var(--brand)}
.hdr-acts{display:flex;gap:4px}
.ib{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--text-2);
  transition:all .15s var(--ease);
}
.ib:hover{background:var(--surface-2);color:var(--text)}
.ib:active{transform:scale(.92)}

/* ============ STATUS BAR ============ */
.status{
  display:flex;gap:6px;padding:8px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.status::-webkit-scrollbar{display:none}
.stb{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:var(--r-pill);
  font-size:11px;font-weight:600;
  background:var(--surface-2);color:var(--text-3);
  white-space:nowrap;transition:all .2s var(--ease);
  border:1px solid transparent;
}
.stb-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.stb.ok{color:var(--success);background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.20)}
.stb.warn{color:var(--warning);background:rgba(245,158,11,.10);border-color:rgba(245,158,11,.20)}
.stb.err{color:var(--danger);background:var(--danger-glow);border-color:rgba(239,68,68,.25)}
.stb.load{color:var(--brand);background:var(--brand-soft);border-color:var(--brand-glow)}
.stb.load .stb-dot{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{50%{opacity:.35}}

/* ============ WORKSPACE ============ */
.ws{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-height:0}

/* ============ EDITOR WITH SWIPE ============ */
.ed{
  background:var(--surface);margin:12px 16px 0;
  border:1px solid var(--border);border-radius:var(--r-lg);
  padding:14px;flex-shrink:0;
  transition:border-color .2s var(--ease),box-shadow .2s var(--ease);
  position:relative;
}
.ed:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}
.ed-ta{
  width:100%;min-height:56px;max-height:120px;
  background:transparent;border:none;outline:none;resize:none;
  font:16px/1.55 var(--font-ui);color:var(--text);
  touch-action:pan-y;
}
.ed-ta::placeholder{color:var(--text-dim)}
.ed-foot{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border);gap:8px;flex-wrap:wrap;
}
.ed-cnt{font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums}
.ed-acts{display:flex;gap:6px}

/* Swipe hint overlays */
.ed-swipe-hint{
  position:absolute;left:0;right:0;
  pointer-events:none;opacity:0;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:13px;font-weight:600;
  transition:opacity .2s var(--ease),transform .2s var(--ease);
  padding:8px 16px;
}
.ed-swipe-hint.up{
  top:-40px;color:var(--world);
  background:var(--surface-2);border:1px solid var(--world-glow);
  border-radius:var(--r);
}
.ed-swipe-hint.down{
  bottom:-40px;color:var(--text-2);
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);
}
.ed-swipe-hint.show{opacity:1}
.ed-swipe-hint.up.show{transform:translateY(-6px)}
.ed-swipe-hint.down.show{transform:translateY(6px)}

/* ============ BUTTONS ============ */
.btn{
  padding:9px 14px;border-radius:var(--r);
  font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:5px;
  transition:all .15s var(--ease);
  border:1px solid transparent;white-space:nowrap;
}
.btn-p{background:var(--brand);color:white;box-shadow:0 2px 8px var(--brand-glow)}
.btn-p:hover{filter:brightness(1.08)}
.btn-p:active{transform:scale(.97)}
.btn-s{background:var(--surface-2);color:var(--text);border-color:var(--border)}
.btn-s:hover{background:var(--surface-3)}
.btn-g{color:var(--text-2)}
.btn-g:hover{background:var(--surface-2);color:var(--text)}
.btn-d{background:var(--danger-glow);color:var(--danger);border-color:rgba(239,68,68,.3)}
.btn-d:hover{background:var(--danger);color:white}

/* ============ SEGMENTED CONTROL ============ */
.seg{
  display:flex;gap:3px;margin:12px 16px 0;padding:3px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);flex-shrink:0;
}
.seg-b{
  flex:1;padding:8px 6px;border-radius:calc(var(--r) - 3px);
  font-size:12px;font-weight:600;color:var(--text-2);
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .2s var(--ease);position:relative;min-width:0;
}
.seg-b .cnt{
  font-size:10px;padding:1px 6px;border-radius:var(--r-pill);
  background:var(--surface-2);font-weight:700;
  min-width:16px;text-align:center;flex-shrink:0;
  font-variant-numeric:tabular-nums;
}
.seg-b.on{background:var(--surface-2);color:var(--text);box-shadow:var(--shadow-sm)}
.seg-b[data-k="local"].on .cnt{background:var(--brand-soft);color:var(--brand)}
.seg-b[data-k="world"].on .cnt{background:var(--world-soft);color:var(--world)}
.seg-b[data-k="seren"].on .cnt{background:var(--seren-soft);color:var(--seren)}
.seg-b .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ============ DECK (Tinder cards) ============ */
.deck{
  flex:1;position:relative;margin:12px 16px 0;
  overflow:hidden;min-height:240px;
  display:flex;align-items:center;justify-content:center;
}
.deck-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px;color:var(--text-3);width:100%;
}
.deck-empty-ic{font-size:48px;margin-bottom:14px;opacity:.5}
.deck-empty-t{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.deck-empty-d{font-size:13px;max-width:280px;line-height:1.5;color:var(--text-2)}

/* CARD */
.card{
  position:absolute;inset:0;
  background:var(--surface);
  border:1px solid var(--border-strong);
  border-radius:var(--r-xl);
  padding:20px;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:transform .3s var(--ease),opacity .3s var(--ease);
  touch-action:pan-y;will-change:transform;
  max-width:520px;margin:0 auto;width:100%;
}
/* REMOVED colored left stripe - single clean design */
.card-h{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;gap:10px;flex-shrink:0;
}
.card-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:var(--r-pill);
  font-size:11px;font-weight:700;letter-spacing:.02em;
  background:var(--surface-2);color:var(--text-2);
  border:1px solid var(--border);
}
.card.t-local .card-badge{background:var(--brand-soft);color:var(--brand);border-color:var(--brand-glow)}
.card.t-world .card-badge{background:var(--world-soft);color:var(--world);border-color:var(--world-glow)}
.card.t-seren .card-badge{background:var(--seren-soft);color:var(--seren);border-color:var(--seren-glow)}
.card-score{font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums}
.card-body{
  flex:1;overflow-y:auto;
  font-size:16px;line-height:1.6;
  white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere;
  color:var(--text);padding:2px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.card-body::-webkit-scrollbar{width:3px}
.card-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card-body mark{
  background:var(--brand-soft);color:var(--brand);
  padding:0 3px;border-radius:3px;font-weight:600;
}
.card-foot{display:flex;gap:8px;margin-top:14px;flex-shrink:0;flex-wrap:wrap}
.card-act{
  flex:1;min-width:90px;padding:10px 10px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);font-size:12px;font-weight:600;
  color:var(--text-2);
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  transition:all .15s var(--ease);
  white-space:nowrap;
}
.card-act:hover{background:var(--surface-3);color:var(--text)}
.card-act.primary{background:var(--brand);color:white;border-color:transparent;box-shadow:0 2px 8px var(--brand-glow)}
.card-act.primary:hover{filter:brightness(1.1)}
.card-act.danger:hover{background:var(--danger-glow);color:var(--danger);border-color:var(--danger)}

/* Swipe visual feedback */
.card.swiping{transition:none}
.card-gone-right{transform:translateX(150%) rotate(18deg)!important;opacity:0!important}
.card-gone-left{transform:translateX(-150%) rotate(-18deg)!important;opacity:0!important}

/* Swipe indicator overlay */
.swipe-ind{
  position:absolute;top:50%;transform:translate(-50%,-50%) scale(.5) rotate(-12deg);
  font-size:40px;font-weight:800;letter-spacing:.02em;
  padding:10px 22px;border-radius:var(--r-lg);
  opacity:0;transition:opacity .15s,transform .15s;
  pointer-events:none;text-transform:uppercase;
  z-index:5;
}
.swipe-ind.right{right:16px;color:var(--success);border:3px solid var(--success);transform:translate(0,-50%) scale(.5) rotate(12deg)}
.swipe-ind.left{left:16px;color:var(--text-3);border:3px solid var(--text-3);transform:translate(0,-50%) scale(.5) rotate(-12deg)}
.swipe-ind.show{opacity:.9}
.swipe-ind.show.right{transform:translate(0,-50%) scale(1) rotate(12deg)}
.swipe-ind.show.left{transform:translate(0,-50%) scale(1) rotate(-12deg)}

/* ============ BASE VIEW ============ */
.base{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.base-h{padding:12px 16px 0;flex-shrink:0}
.base-stats{display:flex;gap:8px;margin-bottom:10px}
.stat{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 8px;text-align:center;
  min-width:0;
}
.stat-v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-l{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.base-ctrls{display:flex;gap:8px;margin-bottom:4px;align-items:center}
.base-search{
  flex:1;min-width:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:9px 12px;
  font:14px var(--font-ui);color:var(--text);outline:none;
  transition:border-color .2s var(--ease),box-shadow .2s var(--ease);
}
.base-search:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}
.base-search::placeholder{color:var(--text-dim)}
/* FIXED: sort button overflow */
.base-sort{
  flex:0 0 auto;min-width:0;max-width:140px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:9px 10px;
  font:13px var(--font-ui);color:var(--text);outline:none;
  cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath fill='none' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' d='M1 1l4 4 4-4'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 10px center;
  padding-right:28px;
}
.base-sort option{background:var(--surface);color:var(--text)}

/* Base list - FIXED: no squishing on mobile */
.base-list{
  flex:1;overflow-y:auto;padding:12px 16px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  padding-bottom:calc(12px + var(--safe-bottom) + 70px);
  width:100%;
}
.base-list::-webkit-scrollbar{width:3px}
.base-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.base-item{
  width:100%;box-sizing:border-box;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;
  position:relative;overflow:hidden;
  transition:border-color .15s var(--ease),transform .15s var(--ease);
}
.base-item:hover{border-color:var(--border-strong)}
.base-item-t{
  font-size:14px;line-height:1.55;color:var(--text);
  margin-bottom:10px;
  white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere;
}
.base-item-f{
  display:flex;justify-content:space-between;align-items:center;
  gap:8px;flex-wrap:wrap;
}
.base-item-meta{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--text-3);flex-wrap:wrap;
}
.base-item-tag{
  padding:2px 8px;border-radius:var(--r-pill);
  font-size:10px;font-weight:700;
  background:var(--brand-soft);color:var(--brand);
  border:1px solid var(--brand-glow);
}
.base-item.shared .base-item-tag{background:var(--world-soft);color:var(--world);border-color:var(--world-glow)}
.base-item-acts{display:flex;gap:4px;flex-shrink:0}
.base-item-act{
  padding:6px 10px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--r-sm);
  font-size:11px;font-weight:600;color:var(--text-2);
  transition:all .15s var(--ease);
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;
}
.base-item-act:hover{color:var(--text);background:var(--surface-3)}
.base-item-act.danger:hover{color:var(--danger);border-color:var(--danger);background:var(--danger-glow)}

/* ============ BOTTOM TABS (compact + safe-area) ============ */
.btab{
  position:fixed;left:0;right:0;bottom:0;
  display:flex;background:var(--surface);
  border-top:1px solid var(--border);
  padding:4px 8px;
  padding-bottom:calc(4px + var(--safe-bottom));
  z-index:50;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.btab-b{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1px;padding:6px 4px;
  color:var(--text-3);font-size:10px;font-weight:600;
  transition:color .15s var(--ease);
  border-radius:var(--r-sm);
}
.btab-b.on{color:var(--brand)}
.btab-b.on .btab-ic{transform:scale(1.05)}
.btab-ic{font-size:18px;transition:transform .15s var(--ease-spring)}
.btab-lbl{font-size:10px;letter-spacing:.02em}

/* ============ MODAL ============ */
.mo{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:16px;
  animation:fade .2s var(--ease);
}
.mo.on{display:flex}
@keyframes fade{from{opacity:0}}
.md{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);
  max-width:520px;width:100%;max-height:85vh;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);
  animation:mdIn .28s var(--ease-spring);
}
@keyframes mdIn{from{opacity:0;transform:translateY(16px) scale(.96)}}
.md-h{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.md-t{font-size:16px;font-weight:700;letter-spacing:-.01em}
.md-x{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--text-3);transition:all .15s var(--ease);
}
.md-x:hover{background:var(--surface-2);color:var(--text)}
.md-b{
  flex:1;overflow-y:auto;padding:16px 18px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.md-b::-webkit-scrollbar{width:3px}
.md-b::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.md-f{
  display:flex;justify-content:flex-end;gap:8px;
  padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;
}

/* ============ FORMS ============ */
.fg{margin-bottom:16px}
.fl{
  display:block;font-size:11px;font-weight:700;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;
}
.fi,.fs{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 12px;
  font:14px var(--font-ui);color:var(--text);outline:none;
  transition:border-color .2s var(--ease),box-shadow .2s var(--ease);
}
.fi:focus,.fs:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}
.fi::placeholder{color:var(--text-dim)}
.ft{
  width:100%;min-height:80px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 12px;
  font:12px 'SF Mono',Monaco,Consolas,monospace;
  color:var(--text);outline:none;resize:vertical;
  transition:border-color .2s var(--ease),box-shadow .2s var(--ease);
}
.ft:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}
.ft::placeholder{color:var(--text-dim)}
.fh{font-size:11px;color:var(--text-3);margin-top:5px;line-height:1.4}
.fr{
  width:100%;height:4px;border-radius:2px;
  background:var(--surface-2);outline:none;
  -webkit-appearance:none;appearance:none;cursor:pointer;
}
.fr::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--brand);cursor:pointer;
  border:2px solid var(--surface);box-shadow:0 2px 6px var(--brand-glow);
}
.fr::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;background:var(--brand);
  cursor:pointer;border:2px solid var(--surface);
}
.rv{float:right;font-size:13px;font-weight:700;color:var(--brand);font-variant-numeric:tabular-nums}

/* ============ TOAST ============ */
.tc{
  position:fixed;top:calc(16px + var(--safe-top));
  left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:6px;
  pointer-events:none;max-width:90vw;
}
.tt{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 14px;
  box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:10px;
  min-width:240px;max-width:420px;
  animation:ttIn .28s var(--ease-spring);
  pointer-events:auto;
}
@keyframes ttIn{from{opacity:0;transform:translateY(-12px) scale(.96)}}
.tt-ic{font-size:15px;flex-shrink:0}
.tt-msg{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.tt.ok{border-left:3px solid var(--success)}.tt.ok .tt-ic{color:var(--success)}
.tt.err{border-left:3px solid var(--danger)}.tt.err .tt-ic{color:var(--danger)}
.tt.warn{border-left:3px solid var(--warning)}.tt.warn .tt-ic{color:var(--warning)}
.tt.info{border-left:3px solid var(--brand)}.tt.info .tt-ic{color:var(--brand)}

/* ============ ONBOARDING ============ */
.ob{text-align:center}
.ob-ic{font-size:60px;margin-bottom:14px}
.ob-t{font-size:22px;font-weight:800;margin-bottom:10px;letter-spacing:-.02em}
.ob-d{color:var(--text-2);font-size:14px;line-height:1.55;margin-bottom:22px}
.ob-feats{text-align:left;margin-bottom:20px}
.ob-f{
  display:flex;gap:12px;padding:12px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:7px;
}
.ob-f-ic{font-size:22px;flex-shrink:0}
.ob-f-t{font-weight:700;margin-bottom:3px;font-size:13px}
.ob-f-d{font-size:12px;color:var(--text-2);line-height:1.45}

/* Help */
.help-sec{margin-bottom:14px}
.help-st{font-size:14px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.help-sd{font-size:13px;color:var(--text-2);line-height:1.55}
.help-box{
  padding:12px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);margin-top:10px;
  font-size:13px;line-height:1.55;color:var(--text-2);
}
.help-keys{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--text-2);margin-top:6px}
kbd{
  padding:2px 6px;background:var(--surface-3);border:1px solid var(--border);
  border-radius:4px;font-size:10px;font-family:monospace;
}

/* AI Progress overlay */
.aip{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  z-index:9998;padding:20px;animation:fade .3s var(--ease);
}
.aip-c{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:28px;
  max-width:360px;width:100%;text-align:center;
  box-shadow:var(--shadow-lg);
}
.aip-ic{
  font-size:44px;margin-bottom:14px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{50%{transform:translateY(-6px)}}
.aip-t{font-size:17px;font-weight:700;margin-bottom:6px;letter-spacing:-.01em}
.aip-d{color:var(--text-2);font-size:13px;margin-bottom:18px;line-height:1.5}
.aip-bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-bottom:8px}
.aip-fill{
  height:100%;background:linear-gradient(90deg,var(--brand),#a78bfa);
  border-radius:3px;transition:width .3s var(--ease);
  position:relative;overflow:hidden;
}
.aip-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shim 1.5s infinite;
}
@keyframes shim{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.aip-pct{font-size:12px;color:var(--text-2);font-variant-numeric:tabular-nums}

/* ============ THEME SWITCH ============ */
.theme-sw{
  display:flex;align-items:center;gap:10px;
  padding:10px;background:var(--surface-2);
  border-radius:var(--r);border:1px solid var(--border);
}
.theme-sw-ic{font-size:18px}
.theme-sw-track{
  position:relative;flex:1;height:24px;
  background:var(--surface-3);border-radius:var(--r-pill);
  cursor:pointer;
}
.theme-sw-thumb{
  position:absolute;top:2px;left:2px;
  width:20px;height:20px;border-radius:50%;
  background:var(--brand);
  transition:left .2s var(--ease);
  box-shadow:0 1px 4px var(--brand-glow);
}
.theme-sw.light .theme-sw-thumb{left:calc(100% - 22px)}
.theme-sw-lbl{font-size:12px;font-weight:600;color:var(--text-2)}

/* Language switch */
.lang-sw{display:flex;gap:2px;background:var(--surface-2);padding:2px;border-radius:var(--r);border:1px solid var(--border)}
.lang-sw-b{flex:1;padding:6px 10px;border-radius:calc(var(--r) - 2px);font-size:12px;font-weight:600;color:var(--text-3);transition:all .15s var(--ease)}
.lang-sw-b.on{background:var(--brand);color:white}

/* Desktop max-width */
@media (min-width:768px){
  .ws{max-width:720px;margin:0 auto;width:100%}
  .btab{max-width:720px;left:50%;transform:translateX(-50%);border-radius:18px 18px 0 0}
  .hdr>*,.status,.seg,.ed,.base-h{max-width:720px;margin-left:auto;margin-right:auto}
  .hdr{padding-left:calc(16px + max(0px,(100vw - 720px)/2));padding-right:calc(16px + max(0px,(100vw - 720px)/2))}
}

<script type="application/json" data-role="manifest">

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var store=ctx.require("Core.Store");
  var bus=ctx.require("Core.Bus");
  var LANG_KEY="lang";
  var dicts=Object.create(null);
  var curLang="ru";
  var changeListeners=[];
  function fmt(s,p){
    var str=String(s==null?"":s);
    if(!p)return str;
    return str.replace(/\{(\w+)\}/g,function(_,k){return(p[k]!==undefined&&p[k]!==null)?String(p[k]):_;});
  }
  function getLang(){return curLang;}
  function setLang(lang){
    curLang=String(lang||"ru");
    try{if(store)store.set(LANG_KEY,curLang);}catch(_){}
    for(var i=0;i<changeListeners.length;i++)try{changeListeners[i](curLang);}catch(_){}
    if(bus&&bus.emit)try{bus.emit("i18n:change",{lang:curLang});}catch(_){}
  }
  function addDict(lang,dict){
    var l=String(lang);

  }
  function t(key,params,fallback){
    var d=dicts[curLang]||{};

    if(val===undefined){
      var en=dicts["en"]||{};
      val=Object.prototype.hasOwnProperty.call(en,key)?en[key]:undefined;
    }
    var out=val!==undefined?val:(fallback!==undefined?fallback:String(key));
    return fmt(out,params);
  }
  function onChange(fn){if(typeof fn==="function")changeListeners.push(fn);}

  try{
    var saved=store?store.get(LANG_KEY,null):null;

</script>

<script type="application/json" data-role="manifest">

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg=ctx.require("Core.NooConfig");var log=ctx.require("Core.Logger");
  var db=null,mem=null;
  function dn(){return cfg.get("dbName","noomium_v5");}
  function sn(){return cfg.get("storeName","notes");}
  function open(){
    return new Promise(function(res,rej){
      if(db)return res(db);
      if(!window.indexedDB){mem=new Map();return res(null);}
      try{
        var req=indexedDB.open(dn(),1);
        req.onupgradeneeded=function(e){var d=e.target.result;var s=sn();if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});};
        req.onsuccess=function(e){db=e.target.result;res(db);};

      }catch(err){if(log)log.warn("IDB unsupported",String(err));mem=new Map();res(null);}
    });
  }
  function tx(mode,fn){
    return open().then(function(d){
      return new Promise(function(res,rej){
        try{
          if(!d){
            var s={

              put:function(v){mem.set(v.id,v);return{onsuccess:function(cb){cb&&cb();},onerror:function(cb){cb&&cb();}};},
              delete:function(k){mem.delete(k);return{onsuccess:function(cb){cb&&cb();},onerror:function(cb){cb&&cb();}};},
              getAll:function(){return{result:Array.from(mem.values()),onsuccess:function(cb){cb&&cb();},onerror:function(cb){cb&&cb();}};}};

          }

        }catch(err){if(log)log.warn("DB tx error",String(err));rej(err);}
      });
    });
  }

    put:function(n){return tx("readwrite",function(s){return s.put(n);});},
    get:function(id){return tx("readonly",function(s){return s.get(id);});},
    del:function(id){return tx("readwrite",function(s){return s.delete(id);});},
    all:function(){return tx("readonly",function(s){return s.getAll();});},

      return open().then(function(d){
        return new Promise(function(res,rej){

      return loadP;
    },
    embed:function(text){
      var t=(text||"").trim();if(!t)return Promise.resolve(null);

        p=Promise.resolve().then(function(){return ext(t,{pooling:"mean",normalize:true});}).then(function(out){return Array.from(out.data);}).catch(function(err){
          if(log)log.warn("embed fail, hash",String(err&&err.message||err));
          return hashEmbed(t);
        });
      }else{p=Promise.resolve(hashEmbed(t));}
      return p.then(function(v){cache[t]=v;return v;});
    },
    cosine:function(a,b){
      if(!a||!b||a.length!==b.length)return 0;
      var s=0;for(var i=0;i<a.length;i++)s+=a[i]*b[i];

<script type="application/json" data-role="manifest">
{"name":"Core.NooNet","type":"core","version":"1.0.0","dependsOn":["Core.NooConfig","Core.NooDB","Core.NooAI","Core.Logger","Core.Bus"],"exports":["init","send","activeAnswers","peerCount","stop","onPeers","restart"]}
</script>
<script type="text/loom-module" data-role="code">
/* FIXED: onEvent dup bug. Using Set for deduplication, single listener with started flag to prevent leaks */
function Module(ctx){
  var cfg=ctx.require("Core.NooConfig");var DB=ctx.require("Core.NooDB");var AI=ctx.require("Core.NooAI");
  var log=ctx.require("Core.Logger");var bus=ctx.require("Core.Bus");
  var pool=null,sk=null,pk=null,queryId=null;
  var peers=new Map(),answers=[];
  var onUpdate=null,hbTimer=null,lastQ=0;
  var nostr=null,sub=null,peerLs=[];
  var started=false;
  var seen=new Set();
  var seenTimer=null;

  function cleanupSeen(){
    if(seenTimer)clearInterval(seenTimer);
    seenTimer=setInterval(function(){
      // keep only recent (last 500)
      if(seen.size>500){
        var arr=Array.from(seen);
        seen=new Set(arr.slice(arr.length-500));
      }
    },60000);
  }

  function notifyPeers(){
    var n=peers.size;
    for(var i=0;i<peerLs.length;i++)try{peerLs[i](n);}catch(_){}
    if(bus&&bus.emit)try{bus.emit("net:peers",{count:n});}catch(_){}
  }
  function valid(ev){
    if(!ev||typeof ev!=="object")return false;
    if(typeof ev.id!=="string"||ev.id.length!==64)return false;
    if(typeof ev.pubkey!=="string"||ev.pubkey.length!==64)return false;
    if(typeof ev.kind!=="number")return false;
    if(!Array.isArray(ev.tags))return false;
    return true;
  }
  function isDup(ev){
    if(!ev||!ev.id)return true;
    if(seen.has(ev.id))return true;
    seen.add(ev.id);
    return false;
  }
  // Single handler, bound once in init()
  function onEvent(ev){
    try{
      if(!valid(ev))return;
      if(isDup(ev))return;
      if(pk&&ev.pubkey===pk)return;
      var had=peers.has(ev.pubkey);
      peers.set(ev.pubkey,Date.now());
      if(!had)notifyPeers();
      var KQ=cfg.get("kQuery",21000),KA=cfg.get("kAnswer",21001),room=cfg.get("room","noomium-main");
      if(ev.kind===KQ){
        var q;try{q=JSON.parse(ev.content);}catch(_){return;}
        if(!q||!q.vector||!Array.isArray(q.vector))return;
        DB.all().then(function(all){
          var floor=cfg.get("threshold",0.30)-cfg.get("serendipity",0.15);
          var toSend=[];
          for(var i=0;i<all.length;i++){var n=all[i];if(!n||!n.shared||!n.vector)continue;if(AI.cosine(q.vector,n.vector)>=floor)toSend.push(n);}
          for(var j=0;j<toSend.length;j++){
            try{
              var ans=nostr.finalizeEvent({kind:KA,created_at:Math.floor(Date.now()/1000),tags:[["t",room],["e",ev.id]],content:JSON.stringify({text:toSend[j].text,vector:toSend[j].vector})},sk);
              pool.publish(cfg.get("relays",[]),ans);
            }catch(e){if(log)log.warn("answer pub fail",String(e));}
          }
        }).catch(function(e){if(log)log.warn("DB.all fail",String(e));});
      }
      if(ev.kind===KA){
        var eTag=null;
        for(var i=0;i<ev.tags.length;i++)if(ev.tags[i]&&ev.tags[i][0]==="e"){eTag=ev.tags[i][1];break;}
        if(eTag&&eTag===queryId){
          var d;try{d=JSON.parse(ev.content);}catch(_){return;}
          if(d&&d.text&&d.vector){
            var isDupAns=false;
            for(var j=0;j<answers.length;j++)if(answers[j].id===ev.id){isDupAns=true;break;}
            if(!isDupAns){
              answers.push({id:ev.id,text:d.text,vector:d.vector,peer:ev.pubkey.slice(0,6),fullPubkey:ev.pubkey,createdAt:Date.now()});
              if(typeof onUpdate==="function")try{onUpdate();}catch(_){}
            }
          }
        }
      }
    }catch(err){if(log)log.warn("onEvent",String(err&&err.message||err));}
  }
  function startHB(){
    if(hbTimer)clearInterval(hbTimer);
    var hb=cfg.get("heartbeat",30000),ttl=cfg.get("peerTTL",60000);
    hbTimer=setInterval(function(){
      var now=Date.now(),rem=0;
      peers.forEach(function(ts,pkk){if(now-ts>ttl){peers.delete(pkk);rem++;}});
      if(rem>0){notifyPeers();if(typeof onUpdate==="function")try{onUpdate();}catch(_){}}
      var cut=now-300000;
      for(var i=answers.length-1;i>=0;i--)if(!peers.has(answers[i].fullPubkey)||answers[i].createdAt<cut)answers.splice(i,1);
    },hb);
  }
  return{
    onPeers:function(fn){if(typeof fn==="function")peerLs.push(fn);},
    init:function(cb){
      // prevent duplicate subscriptions
      if(started)return Promise.resolve();
      onUpdate=cb;
      cleanupSeen();
      return Promise.resolve().then(function(){return import("https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm");}).then(function(mod){
        nostr=mod;
        var KEY="noomium:sk",kh=null;
        try{kh=localStorage.getItem(KEY);}catch(_){}
        if(!kh){var raw=mod.generateSecretKey();kh=Array.from(raw).map(function(b){return b.toString(16).padStart(2,"0");}).join("");try{localStorage.setItem(KEY,kh);}catch(_){}}
        sk=new Uint8Array(kh.match(/.{1,2}/g).map(function(b){return parseInt(b,16);}));
        pk=mod.getPublicKey(sk);
        pool=new mod.SimplePool();
        var now=Math.floor(Date.now()/1000),room=cfg.get("room","noomium-main"),KQ=cfg.get("kQuery",21000),KA=cfg.get("kAnswer",21001),sw=cfg.get("subWindow",300);
        try{
          sub=pool.subscribeMany(cfg.get("relays",[]),[{kinds:[KQ,KA],"#t":[room],since:now-sw}],{onevent:onEvent});
        }catch(e){if(log)log.warn("sub fail",String(e));}
        started=true;startHB();notifyPeers();if(log)log.info("net started, room="+room);
      }).catch(function(err){if(log)log.error("nostr load fail",String(err&&err.message||err));throw err;});
    },
    send:function(vector){
      if(!pool||!nostr||AI.getMode()==="demo")return;
      var now=Date.now(),rate=cfg.get("queryRateLimit",2000);
      if(now-lastQ<rate)return;
      lastQ=now;answers.length=0;
      try{
        var ev=nostr.finalizeEvent({kind:cfg.get("kQuery",21000),created_at:Math.floor(Date.now()/1000),tags:[["t",cfg.get("room","noomium-main")]],content:JSON.stringify({vector:vector})},sk);
        queryId=ev.id;pool.publish(cfg.get("relays",[]),ev);
        if(typeof onUpdate==="function")try{onUpdate();}catch(_){}
      }catch(e){if(log)log.warn("pub fail",String(e));}
    },
    activeAnswers:function(){var out=[];for(var i=0;i<answers.length;i++)if(peers.has(answers[i].fullPubkey))out.push(answers[i]);return out;},
    peerCount:function(){return peers.size;},
    stop:function(){
      if(hbTimer){clearInterval(hbTimer);hbTimer=null;}
      if(seenTimer){clearInterval(seenTimer);seenTimer=null;}
      if(sub&&typeof sub.close==="function")try{sub.close();}catch(_){}
      if(pool&&typeof pool.close==="function")try{pool.close();}catch(_){}
      started=false;sub=null;pool=null;
      seen.clear();
    },
    restart:function(cb){this.stop();onUpdate=cb;return this.init(cb);}
  };
}
</script>

<script type="text/loom-module" data-role="code">
function Module(){
  var ov,ct,lastF=null,escHandler=null;
  function ensure(){
    if(ov)return;
    ov=document.createElement("div");ov.className="mo";
    ct=document.createElement("div");ct.className="md";
    ov.appendChild(ct);document.body.appendChild(ov);
    ov.addEventListener("click",function(e){if(e.target===ov)close();});

    document.addEventListener("keydown",escHandler);
  }

    ensure();ct.innerHTML="";lastF=document.activeElement;
    var h=document.createElement("div");h.className="md-h";
    var t=document.createElement("div");t.className="md-t";t.textContent=(opts&&opts.title)||"";
    var x=document.createElement("button");x.className="md-x";x.innerHTML="×";x.setAttribute("aria-label","Close");x.onclick=close;
    h.appendChild(t);h.appendChild(x);
    var b=document.createElement("div");b.className="md-b";

    if(opts&&opts.buttons&&opts.buttons.length>0){
      var f=document.createElement("div");f.className="md-f";

        var el=document.createElement("button");

  function highlight(text,q){
    if(!q)return U.esc(text);
    var out=U.esc(text),words=q.toLowerCase().split(/\s+/).filter(function(w){return w.length>2;});
    for(var i=0;i<words.length;i++){var re=new RegExp("("+U.escRe(words[i])+")","gi");out=out.replace(re,'<mark>$1</mark>');}
    return out;
  }

  function renderDeck(){
    var d=document.getElementById("deck");if(!d)return;
    var list=deck[seg],idx=deck.idx[seg];
    if(!list||list.length===0){
      var msgs={
        local:{i:T("empty.local.i"),t:T("empty.local.t"),d:T("empty.local.d")},
        world:{i:T("empty.world.i"),t:T("empty.world.t"),d:T("empty.world.d")},
        seren:{i:T("empty.seren.i"),t:T("empty.seren.t"),d:T("empty.seren.d")}
      };
      var m=msgs[seg];
      d.innerHTML='<div class="deck-empty"><div class="deck-empty-ic">'+m.i+'</div><div class="deck-empty-t">'+m.t+'</div><div class="deck-empty-d">'+m.d+'</div></div>';
      return;
    }
    if(idx>=list.length){deck.idx[seg]=list.length-1;idx=deck.idx[seg];}
    if(idx<0){deck.idx[seg]=0;idx=0;}
    var item=list[idx];
    d.innerHTML=cardHTML(item);
    bindCardSwipe();
  }

  function bindCardSwipe(){
    var d=document.getElementById("deck");if(!d)return;
    var card=d.querySelector(".card");if(!card)return;
    var sx=0,sy=0,cx=0,cy=0,swiping=false,TH=80;
    var indRight=card.querySelector(".swipe-ind.right"),indLeft=card.querySelector(".swipe-ind.left");

    function showInd(dir){
      if(indRight)indRight.classList.toggle("show",dir==="right");
      if(indLeft)indLeft.classList.toggle("show",dir==="left");
    }
    function clearInd(){if(indRight)indRight.classList.remove("show");if(indLeft)indLeft.classList.remove("show");}

    // Touch
    card.addEventListener("touchstart",function(e){
      if(e.touches.length>1)return;
      sx=e.touches[0].clientX;sy=e.touches[0].clientY;
      swiping=true;cx=0;cy=0;
      card.classList.add("swiping");
    },{passive:true});
    card.addEventListener("touchmove",function(e){
      if(!swiping)return;
      cx=e.touches[0].clientX-sx;cy=e.touches[0].clientY-sy;
      if(Math.abs(cx)>Math.abs(cy)*1.2){
        var rot=cx*0.05;
        card.style.transform="translateX("+cx+"px) rotate("+rot+"deg)";
        card.style.opacity=Math.max(0.5,1-Math.abs(cx)/400);
        if(cx>30)showInd("right");else if(cx<-30)showInd("left");else clearInd();
      }
    },{passive:true});
    card.addEventListener("touchend",function(){
      if(!swiping)return;swiping=false;card.classList.remove("swiping");clearInd();
      if(Math.abs(cx)>TH){
        card.classList.add(cx>0?"card-gone-right":"card-gone-left");
        setTimeout(function(){
          if(cx>0){handleCardAction("adopt",card);}
          else{deck.idx[seg]++;renderDeck();}
        },280);
      }else{card.style.transform="";card.style.opacity="";}
      cx=cy=0;
    },{passive:true});

    // Mouse drag (desktop)
    var mx=0,dragging=false;
    card.addEventListener("mousedown",function(e){
      if(e.target.closest(".card-act"))return;
      mx=e.clientX;dragging=true;cx=0;
      card.classList.add("swiping");
      e.preventDefault();
    });
    function onMouseMove(e){
      if(!dragging)return;cx=e.clientX-mx;
      var rot=cx*0.05;
      card.style.transform="translateX("+cx+"px) rotate("+rot+"deg)";
      card.style.opacity=Math.max(0.5,1-Math.abs(cx)/400);
      if(cx>30)showInd("right");else if(cx<-30)showInd("left");else clearInd();
    }
    function onMouseUp(){
      if(!dragging)return;dragging=false;card.classList.remove("swiping");clearInd();
      if(Math.abs(cx)>TH){
        card.classList.add(cx>0?"card-gone-right":"card-gone-left");
        setTimeout(function(){
          if(cx>0){handleCardAction("adopt",card);}
          else{deck.idx[seg]++;renderDeck();}
        },280);
      }else{card.style.transform="";card.style.opacity="";}
      cx=0;
    }
    document.addEventListener("mousemove",onMouseMove);
    document.addEventListener("mouseup",onMouseUp);
  }

  function handleCardAction(act,el){
    var id=el?el.getAttribute("data-id"):null;
    var item=null;
    if(id){var list=deck[seg];for(var i=0;i<list.length;i++)if(list[i].id===id){item=list[i];break;}}
    if(act==="adopt"&&item){
      if(!item.peer){toast("Already yours","info");return;}
      if(!AI.ready()){toast(T("toast.ai.notready"),"err");return;}
      AI.embed(item.text).then(function(v){
        return DB.put({id:Math.random().toString(36).slice(2,10),text:item.text,vector:v,shared:false,createdAt:Date.now()});
      }).then(function(){
        toast(T("toast.adopted"),"ok");
        deck.idx[seg]++;renderDeck();executeSearch();
      }).catch(function(e){toast("Error: "+(e&&e.message||e),"err");});
    }else if(act==="develop"&&item){
      var ta=document.getElementById("ed-ta");
      if(ta){ta.value=item.text;updateCounter();ta.focus();}
      deck.idx[seg]++;renderDeck();
    }else if(act==="skip"){
      deck.idx[seg]++;renderDeck();
    }else if(act==="copy"&&item){
      try{
        if(navigator.clipboard&&navigator.clipboard.writeText){
          navigator.clipboard.writeText(item.text).then(function(){toast(T("toast.copied"),"ok");},function(){toast(T("toast.copy.fail"),"err");});
        }else{
          // fallback
          var ta=document.createElement("textarea");ta.value=item.text;ta.style.position="fixed";ta.style.top="-9999px";
          document.body.appendChild(ta);ta.select();
          try{document.execCommand("copy");toast(T("toast.copied"),"ok");}catch(e){toast(T("toast.copy.fail"),"err");}
          document.body.removeChild(ta);
        }
      }catch(e){toast(T("toast.copy.fail"),"err");}
    }else if(act==="del"&&id){
      if(!confirm(T("base.wipe.confirm").replace("все ваши мысли","эту мысль")))return;
      DB.del(id).then(function(){
        toast(T("toast.deleted"),"info");
        deck[seg]=deck[seg].filter(function(n){return n.id!==id;});
        if(deck.idx[seg]>=deck[seg].length)deck.idx[seg]=Math.max(0,deck[seg].length-1);
        renderDeck();if(view==="base")renderBase();
      });
    }else if(act==="toggle"&&id){
      DB.get(id).then(function(r){
        if(!r)return;r.shared=!r.shared;
        return DB.put(r).then(function(){
          toast(r.shared?T("toast.saved.public"):T("toast.saved.private"),"ok");
          executeSearch();if(view==="base")renderBase();
        });
      });
    }
  }

  // ====== EDITOR SWIPE GESTURES ======
  function bindEditorSwipe(){
    var wrap=document.getElementById("ed-wrap");
    var ta=document.getElementById("ed-ta");
    var hintUp=document.getElementById("ed-hint-up");
    var hintDown=document.getElementById("ed-hint-down");
    if(!wrap||!ta)return;

    var startY=0,startX=0,startTime=0,swiping=false,curDy=0,curDx=0;
    var TH=50,MAX_TIME=800;

    ta.addEventListener("touchstart",function(e){
      if(e.touches.length>1)return;
      startY=e.touches[0].clientY;startX=e.touches[0].clientX;
      startTime=Date.now();swiping=true;curDy=0;curDx=0;
      if(hintUp)hintUp.classList.remove("show");
      if(hintDown)hintDown.classList.remove("show");
    },{passive:true});

    ta.addEventListener("touchmove",function(e){
      if(!swiping)return;
      curDy=e.touches[0].clientY-startY;
      curDx=e.touches[0].clientX-startX;
      var dt=Date.now()-startTime;
      // Only react to vertical swipes
      if(Math.abs(curDy)>Math.abs(curDx)*1.5 && Math.abs(curDy)>20 && dt<MAX_TIME){
        if(curDy<0 && hintUp)hintUp.classList.add("show");
        else if(curDy>0 && hintDown)hintDown.classList.add("show");
      }
    },{passive:true});

    ta.addEventListener("touchend",function(e){
      if(!swiping)return;swiping=false;
      var dt=Date.now()-startTime;
      var endY=e.changedTouches[0].clientY;
      var dy=endY-startY;
      if(hintUp)hintUp.classList.remove("show");
      if(hintDown)hintDown.classList.remove("show");
      // Only fire if fast vertical swipe
      if(dt<MAX_TIME && Math.abs(dy)>TH && Math.abs(dy)>Math.abs(curDx)*1.5){
        if(dy<0){
          // swipe UP = share to world + save locally
          handleSave(true,true);
        }else{
          // swipe DOWN = save privately
          handleSave(false,false);
        }
      }
    },{passive:true});

    // Desktop: mouse swipe for testing (optional, keep simple)
    var my=0,md=false;
    ta.addEventListener("mousedown",function(e){
      // only start drag if not clicking a button
      if(e.target.tagName==="BUTTON")return;
      my=e.clientY;md=true;startTime=Date.now();
    });
    document.addEventListener("mouseup",function(e){
      if(!md)return;md=false;
      var dy=e.clientY-my;var dt=Date.now()-startTime;
      if(dt<MAX_TIME && Math.abs(dy)>TH){
        if(dy<0){handleSave(true,true);}else{handleSave(false,false);}
      }
    });
  }

  function executeSearch(force){
    var ta=document.getElementById("ed-ta");if(!ta)return Promise.resolve();
    var text=ta.value;
    if(!text||!AI.ready()){
      deck={local:[],world:[],seren:[],idx:{local:0,world:0,seren:0}};
      updateCounts();renderDeck();
      return Promise.resolve();
    }
    return AI.embed(text).then(function(vec){
      if(!vec)return;
      if(!lastVec||AI.cosine(vec,lastVec)<0.98||force){
        lastVec=vec;lastQ=Date.now();
        if(AI.getMode()==="model")Net.send(vec);
      }
      return DB.all().then(function(notes){
        var localScored=[];
        for(var i=0;i<notes.length;i++){var n=notes[i];if(n&&n.vector)localScored.push(Object.assign({},n,{score:AI.cosine(vec,n.vector)}));}
        var worldAns=Net.activeAnswers(),worldScored=[];
        for(var i=0;i<worldAns.length;i++)worldScored.push(Object.assign({},worldAns[i],{score:AI.cosine(vec,worldAns[i].vector)}));
        var TH=cfg.get("threshold",0.30),SD=cfg.get("serendipity",0.15);
        deck.local=localScored.filter(function(n){return n.score>=TH;}).sort(function(a,b){return b.score-a.score;});
        deck.world=worldScored.filter(function(n){return n.score>=TH;}).sort(function(a,b){return b.score-a.score;});
        deck.seren=localScored.concat(worldScored).filter(function(n){return n.score>=(TH-SD)&&n.score<TH;}).sort(function(a,b){return b.score-a.score;});
        updateCounts();renderDeck();
      });
    });
  }
  function updateCounts(){
    ["local","world","seren"].forEach(function(k){
      var el=document.getElementById("c-"+k);if(el)el.textContent=deck[k].length;
    });
  }

  function renderBase(){
    DB.all().then(function(all){
      var stats=document.getElementById("base-stats");
      if(stats){
        var sh=0;for(var i=0;i<all.length;i++)if(all[i]&&all[i].shared)sh++;
        stats.innerHTML='<div class="stat"><div class="stat-v">'+all.length+'</div><div class="stat-l">'+T("base.stat.total")+'</div></div>'+
          '<div class="stat"><div class="stat-v">'+sh+'</div><div class="stat-l">'+T("base.stat.open")+'</div></div>'+
          '<div class="stat"><div class="stat-v">'+(all.length-sh)+'</div><div class="stat-l">'+T("base.stat.priv")+'</div></div>';
      }
      var q=document.getElementById("base-q"),s=document.getElementById("base-sort");
      var qv=q?q.value.trim().toLowerCase():"",sv=s?s.value:"new";
      var list=all.slice();
      if(qv)list=list.filter(function(n){return n.text&&n.text.toLowerCase().indexOf(qv)>=0;});
      if(sv==="old")list.sort(function(a,b){return(a.createdAt||0)-(b.createdAt||0);});
      else if(sv==="az")list.sort(function(a,b){return(a.text||"").localeCompare(b.text||"","ru");});
      else list.sort(function(a,b){return(b.createdAt||0)-(a.createdAt||0);});
      var c=document.getElementById("base-list");if(!c)return;
      if(list.length===0){
        c.innerHTML='<div class="deck-empty"><div class="deck-empty-ic">'+T("empty.base.i")+'</div><div class="deck-empty-t">'+T("empty.base.t")+'</div>'+
          '<div class="deck-empty-d">'+(all.length===0?T("empty.base.d"):T("empty.base.empty"))+'</div>'+
          (all.length===0?'<button class="btn btn-p" id="btn-seed" style="margin-top:16px">'+T("base.seed")+'</button>':'')+'</div>';
        var sb=document.getElementById("btn-seed");if(sb)sb.onclick=seedSamples;
        return;
      }
      c.innerHTML=list.map(function(n){
        var d=new Date(n.createdAt||Date.now());
        var ds=d.toLocaleDateString(I18n.getLang()==="en"?"en-US":"ru-RU",{day:"numeric",month:"short"});
        return '<div class="base-item '+(n.shared?"shared":"")+'" data-id="'+U.esc(n.id)+'">'+
          '<div class="base-item-t">'+U.esc(n.text)+'</div>'+
          '<div class="base-item-f"><div class="base-item-meta"><span class="base-item-tag">'+(n.shared?T("base.tag.shared"):T("base.tag.private"))+'</span><span>'+U.esc(ds)+'</span></div>'+
          '<div class="base-item-acts">'+
            '<button class="base-item-act" data-act="edit" data-id="'+U.esc(n.id)+'">'+T("btn.edit")+'</button>'+
            '<button class="base-item-act" data-act="toggle" data-id="'+U.esc(n.id)+'">'+(n.shared?T("btn.toggle.on"):T("btn.toggle.off"))+'</button>'+
            '<button class="base-item-act" data-act="copy" data-id="'+U.esc(n.id)+'">'+T("btn.copy")+'</button>'+
            '<button class="base-item-act danger" data-act="del" data-id="'+U.esc(n.id)+'">'+T("btn.del")+'</button>'+
          '</div></div></div>';
      }).join("");
    });
  }

  function handleBaseAction(act,id){
    if(act==="edit"){
      DB.get(id).then(function(rec){
        if(!rec)return;
        var b=document.createElement("div");
        var ta=document.createElement("textarea");ta.className="ft";ta.value=rec.text;ta.style.minHeight="160px";
        var privLabel=document.createElement("label");privLabel.style.display="flex";privLabel.style.alignItems="center";privLabel.style.gap="8px";privLabel.style.marginTop="10px";privLabel.style.fontSize="13px";privLabel.style.color="var(--text-2)";
        var cb=document.createElement("input");cb.type="checkbox";cb.checked=rec.shared;
        privLabel.appendChild(cb);privLabel.appendChild(document.createTextNode(T("base.tag.shared")));
        b.appendChild(ta);b.appendChild(privLabel);
        Modal.open({
          title:T("btn.edit"),
          body:b,
          buttons:[
            {text:T("btn.cancel"),onClick:function(){Modal.close();}},
            {text:T("btn.save"),primary:true,onClick:function(){
              rec.text=ta.value.trim();rec.shared=cb.checked;
              if(!rec.text){toast(T("toast.empty"),"err");return;}
              // Re-embed
              AI.embed(rec.text).then(function(v){rec.vector=v;return DB.put(rec);}).then(function(){
                toast(T("toast.edit.saved"),"ok");
                Modal.close();renderBase();executeSearch();
              }).catch(function(e){toast("Error: "+(e&&e.message||e),"err");});
            }}
          ]
        });
      });
    }else if(act==="toggle"){
      DB.get(id).then(function(rec){
        if(!rec)return;rec.shared=!rec.shared;
        return DB.put(rec).then(function(){toast(rec.shared?T("toast.saved.public"):T("toast.saved.private"),"ok");renderBase();executeSearch();});
      });
    }else if(act==="copy"){
      DB.get(id).then(function(rec){
        if(!rec)return;
        try{
          if(navigator.clipboard&&navigator.clipboard.writeText){
            navigator.clipboard.writeText(rec.text).then(function(){toast(T("toast.copied"),"ok");},function(){toast(T("toast.copy.fail"),"err");});
          }else{
            var ta=document.createElement("textarea");ta.value=rec.text;ta.style.position="fixed";ta.style.top="-9999px";
            document.body.appendChild(ta);ta.select();
            try{document.execCommand("copy");toast(T("toast.copied"),"ok");}catch(e){toast(T("toast.copy.fail"),"err");}
            document.body.removeChild(ta);
          }
        }catch(e){toast(T("toast.copy.fail"),"err");}
      });
    }else if(act==="del"){
      if(!confirm(T("base.wipe.confirm")))return;
      DB.del(id).then(function(){toast(T("toast.deleted"),"info");renderBase();executeSearch();});
    }
  }

  // FIXED: handleSave now supports bothSaveLocally flag
  function handleSave(shared,alsoSaveLocally){
    var ta=document.getElementById("ed-ta");if(!ta)return;
    var text=ta.value.trim();
    if(!text){toast(T("toast.empty"),"err");return;}
    if(!AI.ready()){toast(T("toast.ai.notready"),"err");return;}
    AI.embed(text).then(function(v){
      // Save one note (shared or private based on param)
      return DB.put({id:Math.random().toString(36).slice(2,10),text:text,vector:v,shared:!!shared,createdAt:Date.now()});
    }).then(function(){
      ta.value="";updateCounter();lastVec=null;
      toast(shared?T("toast.saved.public"):T("toast.saved.private"),"ok");
      executeSearch();if(view==="base")renderBase();
    }).catch(function(e){toast("Error: "+(e&&e.message||e),"err");});
  }

  function seedSamples(){
    if(!AI.ready()){toast(T("toast.ai.notready"),"err");return Promise.resolve();}
    toast(T("toast.samples_loading"),"info");
    var notes=[];
    function step(i){
      if(i>=SAMPLES.length){
        return DB.bulkPut(notes).then(function(){toast(T("toast.samples.done").replace("{n}",notes.length),"ok");executeSearch();if(view==="base")renderBase();});
      }
      return AI.embed(SAMPLES[i]).then(function(v){
        notes.push({id:"s"+Math.random().toString(36).slice(2,10),text:SAMPLES[i],vector:v,shared:true,createdAt:Date.now()-Math.floor(Math.random()*1e7)});
        return step(i+1);
      });
    }
    return step(0);
  }

  function openSettings(){
    var b=document.createElement("div");
    var rInp=document.createElement("input");rInp.type="text";rInp.className="fi";rInp.value=cfg.get("room","noomium-main");
    var thInp=document.createElement("input");thInp.type="range";thInp.className="fr";thInp.min="0.1";thInp.max="0.7";thInp.step="0.05";thInp.value=cfg.get("threshold",0.30);
    var thVal=document.createElement("span");thVal.className="rv";thVal.textContent=Number(cfg.get("threshold",0.30)).toFixed(2);
    var seInp=document.createElement("input");seInp.type="range";seInp.className="fr";seInp.min="0.05";seInp.max="0.3";seInp.step="0.01";seInp.value=cfg.get("serendipity",0.15);
    var seVal=document.createElement("span");seVal.className="rv";seVal.textContent=Number(cfg.get("serendipity",0.15)).toFixed(2);
    thInp.oninput=function(e){thVal.textContent=parseFloat(e.target.value).toFixed(2);};
    seInp.oninput=function(e){seVal.textContent=parseFloat(e.target.value).toFixed(2);};
    var rlInp=document.createElement("textarea");rlInp.className="ft";rlInp.value=cfg.get("relays",[]).join("\n");

    // Theme switch
    var themeWrap=document.createElement("div");themeWrap.className="theme-sw "+(cfg.get("theme","dark")==="light"?"light":"");
    themeWrap.innerHTML='<div class="theme-sw-ic">🌙</div><div class="theme-sw-track"><div class="theme-sw-thumb"></div></div><div class="theme-sw-ic">☀️</div><div class="theme-sw-lbl" style="flex:1;text-align:right">'+T(cfg.get("theme","dark")==="light"?"set.theme.light":"set.theme.dark")+'</div>';
    themeWrap.querySelector(".theme-sw-track").onclick=function(){
      var cur=cfg.get("theme","dark");var next=cur==="dark"?"light":"dark";
      applyTheme(next);
      themeWrap.classList.toggle("light",next==="light");
      themeWrap.querySelector(".theme-sw-lbl").textContent=T(next==="light"?"set.theme.light":"set.theme.dark");
    };

    // Language switch
    var langWrap=document.createElement("div");langWrap.className="lang-sw";
    ["ru","en"].forEach(function(l){
      var b=document.createElement("button");b.className="lang-sw-b"+(I18n.getLang()===l?" on":"");b.textContent=l.toUpperCase();
      b.onclick=function(){
        I18n.setLang(l);
        langWrap.querySelectorAll(".lang-sw-b").forEach(function(x){x.classList.toggle("on",x.textContent.toLowerCase()===l);});
        toast("Language: "+l.toUpperCase(),"info");
      };
      langWrap.appendChild(b);
    });

    var seedBtn=document.createElement("button");seedBtn.className="btn btn-s";seedBtn.style.width="100%";seedBtn.style.marginBottom="8px";seedBtn.textContent=T("set.samples");
    seedBtn.onclick=function(){Modal.close();seedSamples();};
    var wipeBtn=document.createElement("button");wipeBtn.className="btn btn-d";wipeBtn.style.width="100%";wipeBtn.textContent=T("base.wipe");
    wipeBtn.onclick=function(){if(!confirm(T("base.wipe.confirm")))return;DB.reset().then(function(){toast(T("toast.base.wiped"),"info");setTimeout(function(){location.reload();},500);});};

    function addF(lbl,el,hint){
      var g=document.createElement("div");g.className="fg";
      var l=document.createElement("label");l.className="fl";l.textContent=lbl;
      g.appendChild(l);g.appendChild(el);
      if(hint){var h=document.createElement("div");h.className="fh";h.textContent=hint;g.appendChild(h);}
      b.appendChild(g);
    }
    var thW=document.createElement("div");thW.appendChild(thInp);thW.appendChild(thVal);
    var seW=document.createElement("div");seW.appendChild(seInp);seW.appendChild(seVal);
    addF(T("set.theme"),themeWrap);
    addF(T("set.lang"),langWrap);
    addF(T("set.room"),rInp,T("set.room.hint"));
    addF(T("set.threshold"),thW,T("set.threshold.hint"));
    addF(T("set.seren"),seW,T("set.seren.hint"));
    addF(T("set.relays"),rlInp,T("set.relays.hint"));
    var acts=document.createElement("div");acts.style.marginTop="16px";acts.appendChild(seedBtn);acts.appendChild(wipeBtn);
    b.appendChild(acts);
    Modal.open({title:T("set.title"),body:b,buttons:[
      {text:T("btn.cancel"),onClick:function(){Modal.close();}},
      {text:T("btn.save"),primary:true,onClick:function(){
        cfg.set("room",rInp.value.trim()||"noomium-main");
        cfg.set("threshold",parseFloat(thInp.value));
        cfg.set("serendipity",parseFloat(seInp.value));
        var rt=rlInp.value.trim();
        var rl=rt?rt.split(/[\n,]+/).map(function(r){return r.trim();}).filter(function(r){return r&&/^wss?:\/\//.test(r);}):cfg.defaults().relays;
        cfg.set("relays",rl);cfg.save();
        Modal.close();
        toast(T("toast.net.restart"),"info");
        setTimeout(function(){if(Net&&Net.restart)Net.restart(function(){executeSearch();});},300);
      }}
    ]});
  }

  function openHelp(){
    var b=document.createElement("div");
    b.innerHTML='<div style="text-align:center;margin-bottom:18px"><div style="font-size:48px;margin-bottom:10px">◆</div>'+
      '<div style="font-size:18px;font-weight:700;margin-bottom:6px">'+T("help.title")+'</div>'+
      '<div style="color:var(--text-2);font-size:13px;line-height:1.55">'+T("help.intro")+'</div></div>'+
      '<div class="help-sec"><div class="help-st">'+T("seg.local")+'</div><div class="help-sd">'+T("help.local")+'</div></div>'+
      '<div class="help-sec"><div class="help-st">'+T("seg.world")+'</div><div class="help-sd">'+T("help.world")+'</div></div>'+
      '<div class="help-sec"><div class="help-st">'+T("seg.seren")+'</div><div class="help-sd">'+T("help.seren")+'</div></div>'+
      '<div class="help-box"><b>👆 '+T("help.swipe")+'</b></div>'+

  function quickLangSwitch(){
    var cur=I18n.getLang();var next=cur==="ru"?"en":"ru";
    I18n.setLang(next);
    toast("Language: "+next.toUpperCase(),"info");
    // Remount to refresh all text
    var r=document.getElementById("app-root");if(r)r.innerHTML="";
    mount();
  }

  function bind(){
    var ta=document.getElementById("ed-ta");
    if(ta){
      ta.addEventListener("input",function(){
        updateCounter();
        if(sTimer)clearTimeout(sTimer);
        sTimer=setTimeout(function(){executeSearch();},cfg.get("debounce",800));
      });
    }
    var bp=document.getElementById("btn-priv");if(bp)bp.onclick=function(){handleSave(false,false);};
    var bpub=document.getElementById("btn-pub");if(bpub)bpub.onclick=function(){handleSave(true,true);};
    document.querySelectorAll(".seg-b").forEach(function(b){b.onclick=function(){setSeg(b.getAttribute("data-k"));};});
    document.querySelectorAll(".btab-b").forEach(function(b){b.onclick=function(){switchView(b.getAttribute("data-v"));};});

    var ws=document.getElementById("ws-stream");
    if(ws)ws.addEventListener("click",function(e){var el=e.target.closest("[data-act]");if(el)handleCardAction(el.getAttribute("data-act"),el);});

    var wb=document.getElementById("ws-base");
    if(wb)wb.addEventListener("click",function(e){
      var el=e.target.closest("[data-act]");
      if(el){handleBaseAction(el.getAttribute("data-act"),el.getAttribute("data-id"));}
    });

    var bq=document.getElementById("base-q");
    if(bq){var bTimer=null;bq.addEventListener("input",function(){if(bTimer)clearTimeout(bTimer);bTimer=setTimeout(renderBase,200);});}
    var bs=document.getElementById("base-sort");if(bs)bs.onchange=renderBase;

    var bh=document.getElementById("btn-help");if(bh)bh.onclick=openHelp;
    var bset=document.getElementById("btn-set");if(bset)bset.onclick=openSettings;
    var blang=document.getElementById("btn-lang");if(blang)blang.onclick=quickLangSwitch;

    document.addEventListener("keydown",function(e){
      if(e.key==="Escape")Modal.close();
      if(e.key==="/"&&document.activeElement&&document.activeElement!==ta){e.preventDefault();if(ta)ta.focus();}
      if((e.ctrlKey||e.metaKey)&&e.key==="Enter"&&document.activeElement===ta){e.preventDefault();handleSave(e.shiftKey,e.shiftKey);}
    });

    AI.onProgress(function(p){
      setSt("st-ai",T("st.ai.loading")+" "+Math.round(p)+"%","load");
      Prog.update(p);
    });
    Net.onPeers(function(n){
      setSt("st-net",n>0?T("st.net.online")+" · "+U.word("peers",n,I18n.getLang()):T("st.net.listen"),n>0?"ok":"load");
      if(view==="stream")executeSearch();
    });

    bindEditorSwipe();
  }

  function boot(){
    setSt("st-net",T("st.net"),"load");
    setSt("st-ai",T("st.ai.loading"),"load");
    Prog.show();
    AI.load().then(function(){
      Prog.hide();
      setSt("st-ai",AI.getMode()==="model"?T("st.ai.ready"):T("st.ai.demo"),AI.getMode()==="model"?"ok":"warn");
      if(!cfg.get("onboarded",false)){
        setTimeout(function(){
          Modal.onboarding(function(){
            cfg.set("onboarded",true);cfg.save();
            seedSamples();
          });
        },400);
      }
    }).catch(function(e){
      Prog.hide();
      if(log)log.error("AI",String(e&&e.message||e));
      setSt("st-ai",T("st.ai.demo"),"warn");
      toast(T("toast.ai.notready"),"info");
    });
    Net.init(function(){executeSearch();}).then(function(){
      setSt("st-net",Net.peerCount()>0?T("st.net.online")+" · "+U.word("peers",Net.peerCount(),I18n.getLang()):T("st.net.listen"),Net.peerCount()>0?"ok":"load");
    }).catch(function(e){
      if(log)log.error("Net",String(e&&e.message||e));
      setSt("st-net",T("st.net"),"err");
    });
  }

  // ====== vh fix for mobile browsers ======
  function setVH(){document.documentElement.style.setProperty("--vh",window.innerHeight*0.01+"px");}
  window.addEventListener("resize",setVH);
  window.addEventListener("orientationchange",function(){setTimeout(setVH,100);});
  setVH();

  // Apply saved theme
  applyTheme(cfg.get("theme","dark"));

  function mount(){
    Host.mount();
    var r=document.getElementById("app-root");if(!r)return;
    r.innerHTML=markup();
    bind();
    boot();
    if(log)log.info("App.NOOmium mounted");
  }

  return{mount:mount};
}
