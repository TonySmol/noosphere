<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный поиск на GitHub Pages</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        input { width: 70%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 25%; padding: 11px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #status { margin: 15px 0; font-weight: bold; color: #555; }
        ul { list-style-type: none; padding: 0; margin-top: 20px; }
        li { padding: 12px; background: #f8f9fa; border: 1px solid #dfe2e5; margin-bottom: 8px; border-radius: 4px; }
        .score { font-weight: bold; color: #28a745; margin-right: 10px; }
    </style>
</head>
<body>

    <h2>Семантический поиск (Один файл на GitHub)</h2>
    <div id="status">Инициализация...</div>
    
    <div style="display: flex; justify-content: space-between;">
        <input id="q" placeholder="Введите поисковый запрос..." disabled>
        <button id="btn" disabled>Найти</button>
    </div>
    
    <ul id="res"></ul>

    <script type="module">
        // Используем проверенную ветку v2, которая не блокируется CORS на GitHub Pages
        import { pipeline, env } from 'https://jsdelivr.net';

        env.allowLocalModels = false;
        env.useBrowserCache = true; // Кэширует модель в IndexedDB браузера

        // Ваша база данных для поиска
        const docs = [
            "Кошки любят молоко, ловить мышей и спать на теплом солнце.",
            "JavaScript отлично работает прямо в браузере без всякого сервера.",
            "Трансформеры используют механизм внимания для обработки контекста текста.",
            "Node.js позволяет запускать серверный JS код на бэкенде.",
            "GitHub Pages — отличный бесплатный хостинг для статических сайтов."
        ];

        let extractor;
        let docEmbeddings = []; // Массив для хранения заранее просчитанных векторов базы

        const statusDiv = document.getElementById('status');
        const inputField = document.getElementById('q');
        const searchBtn = document.getElementById('btn');
        const resultsList = document.getElementById('res');

        // Автоматический старт при загрузке страницы
        async function init() {
            statusDiv.innerText = 'Загрузка ИИ-модели с Hugging Face... (~20 МБ, подождите)';
            try {
                // Инициализируем пайплайн
                extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                    pooling: 'mean', 
                    normalize: true 
                });

                statusDiv.innerText = 'Индексация базы данных... Просчитываем векторы текстов...';

                // ВАЖНО: Считаем эмбеддинги для всей базы документов ОДИН РАЗ на старте
                for (const d of docs) {
                    const output = await extractor([d]);
                    docEmbeddings.push({
                        text: d,
                        vector: Array.from(output.data)
                    });
                }

                statusDiv.innerText = 'ИИ готов к работе! Введите запрос.';
                statusDiv.style.color = 'green';
                inputField.disabled = false;
                searchBtn.disabled = false;

            } catch (err) {
                statusDiv.innerText = 'Ошибка инициализации: ' + err.message;
                statusDiv.style.color = 'red';
                console.error(err);
            }
        }

        // Логика кнопки «Найти»
        searchBtn.onclick = async () => {
            const query = inputField.value.trim();
            if (!query) return;

            statusDiv.innerText = 'Ищем похожие смыслы...';
            resultsList.innerHTML = '';

            // 1. Получаем вектор только для поискового запроса пользователя
            const queryOutput = await extractor([query]);
            const qVector = Array.from(queryOutput.data);

            const similarities = [];

            // 2. Сравниваем готовый вектор запроса со всеми ранее сохраненными векторами документов
            for (const doc of docEmbeddings) {
                let dotProduct = 0;
                // Считаем косинусное сходство (скалярное произведение)
                for (let i = 0; i < qVector.length; i++) {
                    dotProduct += qVector[i] * doc.vector[i];
                }
                similarities.push({ text: doc.text, score: dotProduct });
            }

            // 3. Сортируем результаты по релевантности (от большего к меньшему)
            similarities.sort((a, b) => b.score - a.score);

            statusDiv.innerText = `Результаты поиска для: "${query}"`;
            
            // 4. Выводим отсортированный результат на экран
            resultsList.innerHTML = similarities.map(s => `
                <li>
                    <span class="score">${(s.score * 100).toFixed(1)}% совпадение</span>
                    <span>${s.text}</span>
                </li>
            `).join('');
        };

        // Запуск системы
        init();
    </script>
</body>
</html>
