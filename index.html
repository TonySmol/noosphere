<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ноосфера v3.0 - GitHub Cloud Node</title>
    
    <!-- Подключаем Transformers.js v3 через стабильный UMD бандл unpkg -->
    <script src="https://unpkg.com"></script>

    <script>
        let pipe = null;
        const notesDatabase = []; 

        document.addEventListener("DOMContentLoaded", () => {
            initAI();
        });

        function screenLog(message, isError = false) {
            const consoleDiv = document.getElementById('screenConsole');
            if (!consoleDiv) return;
            const time = new Date().toLocaleTimeString();
            const color = isError ? '#ff4d4f' : '#00ff00';
            consoleDiv.innerHTML += `<div style="color: ${color}; margin-bottom: 4px;">[${time}] ${message}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        async function initAI() {
            screenLog("Старт Ноосферы на GitHub Pages...");
            
            if (typeof window.huggingface === 'undefined' || !window.huggingface.transformers) {
                screenLog("КРИТ: Библиотека ИИ не загрузилась. Проверьте VPN!", true);
                return;
            }

            const { pipeline, env } = window.huggingface.transformers;

            // Настройка для работы из облака HuggingFace
            env.allowLocalModels = false; 

            screenLog("Запрос мультиязычного ядра MiniLM (~120 МБ)...");

            try {
                // Загружаем мультиязычную модель (Русский + Английский)
                pipe = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', {
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            const percent = data.progress ? data.progress.toFixed(0) : 0;
                            document.getElementById('progressBar').style.width = `${percent}%`;
                            document.getElementById('progressText').innerText = `Синхронизация с Ноосферой: ${percent}%`;
                        }
                    }
                });
                
                screenLog("✓ УСПЕХ! ИИ успешно запущен в облачном Secure Context.");
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'block';

            } catch (error) {
                screenLog(`Критический сбой WASM: ${error.message}`, true);
                console.error(error);
            }
        }

        async function getVector(text) {
            const output = await pipe(text, { pooling: 'mean', normalize: true });
            return Array.from(output.data);
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0.0; let normA = 0.0; let normB = 0.0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        window.saveNote = async function() {
            const textInput = document.getElementById('noteText').value.trim();
            if (!textInput) return;

            screenLog("Извлечение вектора смысла на русском языке...");
            try {
                const vector = await getVector(textInput);
                let bestMatch = null;
                let highestScore = 0;

                for (let oldNote of notesDatabase) {
                    const score = cosineSimilarity(vector, oldNote.vector);
                    if (score > highestScore) {
                        highestScore = score;
                        bestMatch = oldNote;
                    }
                }

                notesDatabase.push({ text: textInput, vector: vector });

                const synergyDiv = document.getElementById('synergyResult');
                if (bestMatch && highestScore > 0.60) { 
                    synergyDiv.innerHTML = `
                        <div style="background: #e6f7ff; padding: 12px; border-left: 4px solid #1890ff; margin: 15px 0; border-radius: 4px; font-size: 14px;">
                            <strong>Синергия смыслов (${(highestScore * 100).toFixed(0)}%):</strong><br>
                            "${bestMatch.text}"
                        </div>
                    `;
                } else {
                    synergyDiv.innerHTML = `<p style="color: #888; font-size: 13px;">Сохранено в локальный граф.</p>`;
                }

                document.getElementById('notesList').innerHTML = notesDatabase.map(n => `
                    <li style="background: #f5f5f5; padding: 10px; margin-bottom: 6px; border-radius: 4px; list-style-type: none; font-size: 14px;">${n.text}</li>
                `).reverse().join('');
                
                document.getElementById('noteText').value = '';
            } catch (err) {
                screenLog(`Ошибка: ${err.message}`, true);
            }
        }
    </script>
</head>
<body style="font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 0 15px; color: #222; background: #fafafa;">

    <h2>Ноосфера v3.0</h2>
    <p style="color: #666; margin-top: 0; font-size: 13px;">Облачный HTTPS узел (GitHub Pages)</p>
    
    <div style="background: #1a1a1a; color: #00ff00; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 11px; height: 110px; overflow-y: auto; margin-bottom: 15px;" id="screenConsole"></div>
    
    <div id="loader">
        <div id="progressText" style="font-size: 14px; color: #555; margin-bottom: 5px;">Инициализация защищенного контекста...</div>
        <div style="width: 100%; background-color: #ddd; border-radius: 4px; height: 8px;">
            <div id="progressBar" style="width: 0%; height: 100%; background-color: #00ff00; border-radius: 4px; transition: width 0.1s;"></div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <textarea id="noteText" style="width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px;" placeholder="Введи мысль на русском или теги..."></textarea>
        <button onclick="saveNote()" style="margin-top: 10px; width: 100%; padding: 12px; background: #2b82c9; color: white; border: none; border-radius: 4px; font-weight: bold;">
            Сохранить мысль
        </button>
        <div id="synergyResult"></div>
        <ul id="notesList" style="padding: 0;"></ul>
    </div>

</body>
</html>
