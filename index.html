<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7c5cff">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https: wss:; worker-src 'self' blob:; connect-src * https: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src * data: blob:; font-src * data:; media-src * data: blob:;">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Серендипити</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌌</text></svg>">
<style>
:root {
  --bg: #0f0f1e;
  --surface: #1a1a2e;
  --surface-2: #252541;
  --surface-3: #2f2f52;
  --text: #f0f0ff;
  --text-muted: #a0a0c0;
  --text-dim: #6a6a8e;
  --border: #3a3a5c;
  --border-subtle: #2a2a4c;
  --primary: #7c5cff;
  --primary-glow: rgba(124, 92, 255, 0.15);
  --primary-soft: rgba(124, 92, 255, 0.08);
  --world: #06b6d4;
  --world-glow: rgba(6, 182, 212, 0.15);
  --world-soft: rgba(6, 182, 212, 0.08);
  --seren: #10b981;
  --seren-glow: rgba(16, 185, 129, 0.15);
  --seren-soft: rgba(16, 185, 129, 0.08);
  --danger: #ef4444;
  --danger-glow: rgba(239, 68, 68, 0.15);
  --warning: #f59e0b;
  --success: #22c55e;
  --radius: 16px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 8px 48px rgba(0, 0, 0, 0.4);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

input, textarea {
  -webkit-user-select: text;
  user-select: text;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  font-size: inherit;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

button:active { transform: scale(0.97); }

/* App Layout */
#app-root {
  height: 100%;
  display: none;
  flex-direction: column;
}

body.show-app #app-root {
  display: flex;
}

body.show-app #loom-root {
  display: none;
}

/* Header */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
  min-height: 56px;
  padding-top: max(12px, env(safe-area-inset-top));
}

.app-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  font-weight: 600;
}

.app-logo-icon {
  font-size: 24px;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  background: var(--surface-2);
  transition: all var(--transition);
}

.icon-btn:hover { background: var(--surface-3); }

/* Status Badges */
.status-bar {
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-subtle);
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}

.status-bar::-webkit-scrollbar { display: none; }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  white-space: nowrap;
  transition: all var(--transition);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.status-badge.active { color: var(--success); border-color: var(--success); }
.status-badge.warn { color: var(--warning); border-color: var(--warning); }
.status-badge.error { color: var(--danger); border-color: var(--danger); }
.status-badge.loading { color: var(--primary); border-color: var(--primary); }
.status-badge.loading .status-dot { animation: pulse 1s ease-in-out infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Progress Overlay */
.ai-progress-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.ai-progress-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
}

.ai-progress-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.ai-progress-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}

.ai-progress-desc {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
}

.ai-progress-bar {
  height: 8px;
  background: var(--surface-2);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 12px;
}

.ai-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #a78bfa);
  border-radius: 4px;
  transition: width 0.3s ease;
  position: relative;
  overflow: hidden;
}

.ai-progress-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

.ai-progress-percent {
  font-size: 14px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* Main Workspace */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Tabs */
.main-tabs {
  display: flex;
  padding: 12px 16px;
  gap: 8px;
  flex-shrink: 0;
  background: var(--bg);
}

.main-tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  transition: all var(--transition);
}

.main-tab.active {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: var(--primary);
}

.main-tab-icon {
  font-size: 18px;
}

.main-tab-count {
  font-size: 11px;
  padding: 2px 6px;
  background: var(--surface-2);
  border-radius: 10px;
  font-weight: 600;
}

.main-tab.active .main-tab-count {
  background: var(--primary-glow);
}

/* Views */
.view {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.view.active {
  display: flex;
}

/* Stream View */
.stream-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Editor Card */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  margin: 16px;
  padding: 16px;
  flex-shrink: 0;
  transition: all var(--transition);
}

.editor-card:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.editor-textarea {
  width: 100%;
  min-height: 80px;
  max-height: 200px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  font-family: inherit;
}

.editor-textarea::placeholder {
  color: var(--text-dim);
}

.editor-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-subtle);
}

.editor-counter {
  font-size: 12px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

.editor-actions {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 10px 16px;
  border-radius: var(--radius-xs);
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  background: #6a4ee6;
  box-shadow: 0 4px 12px var(--primary-glow);
}

.btn-secondary {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border-subtle);
}

.btn-secondary:hover {
  background: var(--surface-3);
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
}

.btn-ghost:hover {
  background: var(--surface-2);
  color: var(--text);
}

.btn-danger {
  background: var(--danger-glow);
  color: var(--danger);
  border: 1px solid var(--danger);
}

.btn-danger:hover {
  background: var(--danger);
  color: white;
}

/* Filter Pills */
.filter-pills {
  display: flex;
  gap: 8px;
  padding: 0 16px 12px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}

.filter-pills::-webkit-scrollbar { display: none; }

.filter-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  transition: all var(--transition);
}

.filter-pill.active[data-filter="local"] {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: var(--primary);
}

.filter-pill.active[data-filter="world"] {
  background: var(--world-soft);
  border-color: var(--world);
  color: var(--world);
}

.filter-pill.active[data-filter="seren"] {
  background: var(--seren-soft);
  border-color: var(--seren);
  color: var(--seren);
}

.filter-pill-count {
  font-size: 11px;
  padding: 1px 6px;
  background: var(--surface-2);
  border-radius: 10px;
  font-weight: 600;
}

.filter-pill.active .filter-pill-count {
  background: currentColor;
  color: var(--surface);
}

/* Carousel */
.carousel-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  margin: 0 16px 16px;
}

.carousel-track {
  display: flex;
  height: 100%;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.carousel-slide {
  min-width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 0 4px;
}

.carousel-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 60px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.carousel-list::-webkit-scrollbar {
  width: 4px;
}

.carousel-list::-webkit-scrollbar-track {
  background: transparent;
}

.carousel-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

/* Note Card */
.note-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
  animation: slideUp 0.3s ease-out backwards;
  transition: all var(--transition);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.note-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: currentColor;
  opacity: 0.5;
}

.note-card.type-local { color: var(--primary); }
.note-card.type-world { color: var(--world); }
.note-card.type-seren { color: var(--seren); }

.note-card:hover {
  border-color: var(--border);
  box-shadow: var(--shadow);
}

.note-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  gap: 8px;
}

.note-meta {
  display: flex;
  align-items: center;
  gap: 8px;
}

.note-type-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: currentColor;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--surface);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.note-score {
  font-size: 11px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

.note-content {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  word-wrap: break-word;
  margin-bottom: 12px;
}

.note-content mark {
  background: var(--primary-glow);
  color: var(--primary);
  padding: 0 3px;
  border-radius: 3px;
  font-weight: 600;
}

.note-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.note-action {
  padding: 8px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all var(--transition);
}

.note-action:hover {
  background: var(--surface-3);
  color: var(--text);
}

.note-action.danger:hover {
  background: var(--danger-glow);
  color: var(--danger);
  border-color: var(--danger);
}

/* Empty State */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}

.empty-desc {
  font-size: 14px;
  max-width: 300px;
  line-height: 1.5;
}

/* Spinner */
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--surface-2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Base View */
.base-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.base-header {
  padding: 16px;
  flex-shrink: 0;
}

.base-stats {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.stat-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}

.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

.base-controls {
  display: flex;
  gap: 8px;
}

.base-search {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: all var(--transition);
}

.base-search:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.base-search::placeholder {
  color: var(--text-dim);
}

.base-sort {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  cursor: pointer;
}

.base-sort option {
  background: var(--surface);
  color: var(--text);
}

.base-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.base-list::-webkit-scrollbar {
  width: 4px;
}

.base-list::-webkit-scrollbar-track {
  background: transparent;
}

.base-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 560px;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: modalSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes modalSlide {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.modal-title {
  font-size: 18px;
  font-weight: 600;
}

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: var(--text-muted);
  transition: all var(--transition);
}

.modal-close:hover {
  background: var(--surface-2);
  color: var(--text);
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.modal-body::-webkit-scrollbar {
  width: 4px;
}

.modal-body::-webkit-scrollbar-track {
  background: transparent;
}

.modal-body::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 16px 20px;
  border-top: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

/* Form */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.form-input, .form-select {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: all var(--transition);
}

.form-input:focus, .form-select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.form-input::placeholder {
  color: var(--text-dim);
}

.form-textarea {
  width: 100%;
  min-height: 100px;
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  outline: none;
  resize: vertical;
  transition: all var(--transition);
}

.form-textarea:focus {

  color: var(--text-dim);
  margin-top: 6px;
}

}

  height: 18px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  border: 2px solid var(--surface);

}

  font-weight: 600;
  color: var(--primary);

}

/* Toast */
.toast-container {

  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 280px;
  max-width: 500px;
  animation: toastSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: auto;
}

@keyframes toastSlide {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.toast-icon {
  font-size: 18px;
  flex-shrink: 0;
}

.toast-message {
  flex: 1;
  font-size: 14px;
  color: var(--text);
}

.toast.success { border-left: 3px solid var(--success); }
.toast.success .toast-icon { color: var(--success); }

.toast.error { border-left: 3px solid var(--danger); }
.toast.error .toast-icon { color: var(--danger); }

.toast.warning { border-left: 3px solid var(--warning); }
.toast.warning .toast-icon { color: var(--warning); }

.toast.info { border-left: 3px solid var(--primary); }
.toast.info .toast-icon { color: var(--primary); }

/* Onboarding */
.onboarding-content {
  text-align: center;
}

.onboarding-icon {
  font-size: 72px;
  margin-bottom: 16px;
}

.onboarding-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 12px;
}

.onboarding-desc {
  color: var(--text-muted);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 24px;
}

.onboarding-features {
  text-align: left;
  margin-bottom: 24px;
}

.onboarding-feature {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px;
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}

.onboarding-feature-icon {
  font-size: 24px;
  flex-shrink: 0;
}

.onboarding-feature-text {
  flex: 1;
}

.onboarding-feature-title {
  font-weight: 600;
  margin-bottom: 4px;
}

.onboarding-feature-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.4;
}

/* Safe area */
@supports (padding: max(0px)) {
  .modal {
    margin-bottom: env(safe-area-inset-bottom);
  }
}

/* Desktop optimization */
@media (min-width: 768px) {
  .workspace {
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  
  .note-card:hover {
    transform: translateY(-2px);
  }
}

/* Touch hints */
@media (hover: none) {
  .note-card:active {
    transform: scale(0.98);
  }
  
  .btn:active {
    transform: scale(0.95);
  }
}

<script type="text/loom-module" data-role="code">
function Module(ctx){
  var U=ctx.require("Core.NooUtils");
  var registry=Object.create(null);
  var typeLabels={local:"🏠 Моё",world:"🌍 Мир",seren:"✨ Озарение"};
  function card(item,type,qText){
    registry[item.id]=item;
    var isPeer=!!item.peer;
    var textHTML=U.esc(item.text);
    if(qText){
      var words=qText.toLowerCase().split(/\s+/).filter(function(w){return w.length>2;});

    if(typeof item.score==="number")scoreRender=Math.round(item.score*100)+"%";
    else if(item.createdAt)scoreRender=new Date(item.createdAt).toLocaleDateString("ru-RU",{day:"numeric",month:"short"});
    else scoreRender="";
    var foot;
    if(isPeer){
      foot='<div class="note-actions"><span style="font-size:12px;color:var(--text-dim);font-style:italic">прочитать · понять · написать своё</span></div>';

        '<button class="note-action" data-act="toggle" data-id="'+item.id+'">'+(item.shared?'🔒 Сделать личным':'🌍 Открыть миру')+'</button>'+
        '<button class="note-action" data-act="copy" data-id="'+item.id+'">📋 Копировать</button>'+

        '</div>';
    }
    return'<div class="note-card type-'+type+'" style="animation-delay:'+(Math.random()*0.1).toFixed(3)+'s">'+
      '<div class="note-header"><div class="note-meta"><span class="note-type-badge">'+U.esc(typeLabel)+'</span><span class="note-score">'+U.esc(scoreRender)+'</span></div></div>'+
      '<div class="note-content">'+textHTML+'</div>'+
      foot+
      '</div>';
  }
  function lookup(id){return registry[id]||null;}
  function clearRegistry(){registry=Object.create(null);}
  return{card:card,lookup:lookup,clearRegistry:clearRegistry};
}
</script>

  function importData(file){

      try{

  function handleCardAction(act,el){
