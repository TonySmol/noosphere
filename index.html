<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformers.js в 1 файл (Исправлено)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold;}
        button:hover { background: #0056b3; }
        #status { margin: 20px 0; font-weight: bold; color: #333; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 14px; border: 1px solid #ddd; white-space: pre-wrap; }
    </style>

    <!-- Подключаем готовую собранную библиотеку через cdnjs -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <h2>Эмбеддинги в один HTML-файл</h2>
    <p>Исправленная версия. Библиотека инициализируется корректно.</p>
    
    <button id="run-btn">Сгенерировать вектор</button>
    <div id="status">Статус: Ожидание нажатия кнопки...</div>
    <pre id="output">Результат появится здесь...</pre>

    <script>
        // ИСПРАВЛЕНО: В не-модульной версии объект называется строго `transformers`
        const { pipeline, env } = transformers; 

        // Настройки путей: разрешаем только удаленную загрузку с Hugging Face
        env.allowRemoteModels = true; 
        env.allowLocalModels = false;

        const runBtn = document.getElementById('run-btn');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');

        runBtn.addEventListener('click', async () => {
            statusDiv.innerText = "Статус: Загрузка модели из Hugging Face... (~90МБ, пожалуйста, подождите)";
            statusDiv.style.color = "orange";
            outputDiv.innerText = "";

            try {
                // Создаем пайплайн на процессоре (wasm)
                const extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                    device: 'wasm'
                });

                statusDiv.innerText = "Статус: Модель готова. Расчет вектора...";
                
                // Генерируем эмбеддинг
                const result = await extractor('Тестовый текст для проверки работы нейросети', { 
                    pooling: 'mean', 
                    normalize: true 
                });

                statusDiv.innerText = "Статус: Успешно выполнено!";
                statusDiv.style.color = "green";

                // Переводим Float32Array в обычный массив чисел для вывода
                const vector = Array.from(result.data);
                outputDiv.innerText = `Размерность вектора: ${vector.length} измерений.\n\nПервые 10 значений:\n${JSON.stringify(vector.slice(0, 10), null, 2)}`;

            } catch (error) {
                statusDiv.innerText = "Статус: Ошибка!";
                statusDiv.style.color = "red";
                outputDiv.innerText = `Критическое исключение: ${error.message}\n\nПодробности в консоли F12.`;
                console.error(error);
            }
        });
    </script>
</body>
</html>
