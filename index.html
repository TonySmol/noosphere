<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Noosphere v3 / Presence-Aware</title>
<style>
  /* =====================================================================
     UI: темы, адаптив, свайп-зона, relevance-колонки
     ===================================================================== */
  :root {
    --bg: #0f1115; --panel: #161a22; --border: #242a36;
    --text: #e6e8ee; --muted: #8a93a6; --accent: #6aa6ff;
    --ok: #4ade80; --warn: #f59e0b; --err: #ef4444;
    --sleep: #6b7280;
  }
  [data-theme="light"] {
    --bg: #f5f5f7; --panel: #ffffff; --border: #e0e0e6;
    --text: #1a1d24; --muted: #6b7280; --accent: #2563eb;
    --ok: #16a34a; --warn: #d97706; --err: #dc2626;
    --sleep: #9ca3af;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", ui-monospace, monospace;
    transition: background .2s, color .2s;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 16px; margin: 0 0 14px; letter-spacing: .5px; display: flex; align-items: center; gap: 10px; }
  h1 .lang-switch { font-size: 11px; color: var(--muted); cursor: pointer; padding: 3px 8px; border: 1px solid var(--border); border-radius: 3px; }
  h1 small { color: var(--muted); font-weight: normal; font-size: 11px; margin-left: auto; }
  h2 { font-size: 11px; margin: 18px 0 6px; color: var(--muted);
       text-transform: uppercase; letter-spacing: 1px; }
  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: 6px; padding: 12px; margin-bottom: 10px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (max-width: 820px) { .grid-3 { grid-template-columns: 1fr; } }

  textarea, input[type="text"], input[type="number"], select {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 10px; font: inherit; resize: vertical;
  }
  textarea { min-height: 80px; }
  button {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 12px; font: inherit; cursor: pointer;
  }
  button:hover:not(:disabled) { background: var(--border); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.danger  { background: #2a1a1d; color: var(--err); border-color: #3d1f22; }
  [data-theme="light"] button.danger { background: #fee; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  label.check { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); }

  /* Свайп-зона: визуальная подсказка для мобильного жеста */
  .swipe-zone {
    position: relative;
    border: 1px dashed transparent;
    transition: border-color .2s;
  }
  .swipe-zone.active { border-color: var(--accent); }
  .swipe-hint {
    position: absolute; right: 8px; top: 8px;
    font-size: 10px; color: var(--muted); pointer-events: none;
  }

  .status { display: inline-flex; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 3px 8px; border-radius: 999px; font-size: 11px;
          background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
  .pill.ok    { color: var(--ok);    border-color: var(--ok); }
  .pill.warn  { color: var(--warn);  border-color: var(--warn); }
  .pill.err   { color: var(--err);   border-color: var(--err); }
  .pill.sleep { color: var(--sleep); border-color: var(--sleep); }

  .list { display: flex; flex-direction: column; gap: 6px; min-height: 60px; }
  .item { background: var(--bg); border: 1px solid var(--border);
          border-radius: 4px; padding: 8px 10px; position: relative; }
  .item.world { border-left: 3px solid var(--accent); }
  .item.local { border-left: 3px solid #555; }
  .item.sleeping { opacity: .6; }
  .item .score { float: right; color: var(--muted); font-size: 11px; }
  .item .meta  { color: var(--muted); font-size: 10px; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  .item mark { background: transparent; color: var(--accent); font-weight: bold; }
  .item .presence-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--ok); margin-right: 4px; vertical-align: middle;
  }
  .item .presence-dot.sleeping { background: var(--sleep); }

  .progress { height: 3px; background: var(--border); border-radius: 2px;
              overflow: hidden; margin-top: 6px; }
  .progress > div { height: 100%; background: var(--accent); width: 0; transition: width .2s; }

  .log { background: var(--bg); border: 1px solid var(--border);
         border-radius: 4px; padding: 8px; max-height: 180px; overflow: auto;
         font-size: 11px; font-family: ui-monospace, monospace; }
  .log .e { color: var(--err); }
  .log .w { color: var(--warn); }
  .log .i { color: var(--muted); }

  .empty { color: var(--muted); font-size: 12px; padding: 6px; }
  .device-id { font-size: 10px; color: var(--muted); margin-top: 6px; word-break: break-all; }

  details summary { cursor: pointer; color: var(--muted); font-size: 12px; padding: 4px 0; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
  .settings-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .settings-grid input, .settings-grid select { padding: 6px; font-size: 12px; }
  textarea.peers { min-height: 60px; font-size: 11px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>
    NOOSPHERE v3
    <span class="lang-switch" id="langSwitch">EN</span>
    <small id="tagline">presence-aware build</small>
  </h1>

  <section class="panel">
    <div class="status" id="status">
      <span class="pill" data-key="idb">IDB: ...</span>
      <span class="pill" data-key="gun">GUN: ...</span>
      <span class="pill" data-key="peers">PEERS: 0</span>
      <span class="pill" data-key="presence">PRESENCE: idle</span>
      <span class="pill" data-key="model">MODEL: idle</span>
      <span class="pill" data-key="indexed">INDEXED: 0/0</span>
    </div>
    <div class="device-id" id="deviceId">device: ...</div>
    <div class="progress"><div id="modelProgress"></div></div>
  </section>

  <section class="panel swipe-zone" id="swipeZone">
    <h2 data-i18n="thought">thought</h2>
    <span class="swipe-hint" data-i18n="swipeHint">swipe up = publish to world</span>
    <textarea id="input" placeholder="type a thought..."></textarea>
    <div class="row" style="margin-top:8px; align-items:center;">
      <label class="check">
        <input type="checkbox" id="publishWorld" />
        <span data-i18n="publishToWorld">publish to world (p2p)</span>
      </label>
      <div style="flex:1"></div>
      <button id="btnSave" class="primary" data-i18n="save">Save</button>
      <button id="btnSaveWorld" class="primary" data-i18n="saveWorld">Save + World</button>
    </div>
  </section>

  <section class="panel">
    <h2 data-i18n="liveRelevance">live relevance</h2>
    <div class="grid-3">
      <div>
        <div style="color:var(--muted); font-size:11px; margin-bottom:4px;" data-i18n="colMine">MY / RELEVANT</div>
        <div class="list" id="listMineRelevant"></div>
      </div>
      <div>
        <div style="color:var(--muted); font-size:11px; margin-bottom:4px;" data-i18n="colWorld">WORLD (presence-filtered)</div>
        <div class="list" id="listWorldRelevant"></div>
      </div>
      <div>
        <div style="color:var(--muted); font-size:11px; margin-bottom:4px;" data-i18n="colAdjacent">ADJACENT (serendipity)</div>
        <div class="list" id="listAdjacent"></div>
      </div>
    </div>
  </section>

  <section class="panel">
    <details>
      <summary data-i18n="settingsTitle">settings</summary>
      <div class="settings-grid" style="margin-top:10px;">
        <label>
          <span data-i18n="theme">Theme</span>
          <select id="setTheme">
            <option value="auto" data-i18n="themeAuto">Auto</option>
            <option value="dark" data-i18n="themeDark">Dark</option>
            <option value="light" data-i18n="themeLight">Light</option>
          </select>
        </label>
        <label>
          <span data-i18n="threshold">Relevance threshold</span>
          <input type="number" id="setThreshold" step="0.05" min="0" max="1" value="0.25" />
        </label>
        <label>
          <span data-i18n="adjacency">Adjacency delta</span>
          <input type="number" id="setAdjacency" step="0.05" min="0" max="1" value="0.15" />
        </label>
        <label>
          <span data-i18n="maxCards">Max cards</span>
          <select id="setMaxCards">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
          </select>
        </label>
        <label>
          <span data-i18n="minWaves">Min waves (hours)</span>
          <select id="setMinWaves">
            <option value="0" selected>0</option>
            <option value="1">1</option>
            <option value="3">3</option>
            <option value="5">5</option>
          </select>
        </label>
        <label>
          <span data-i18n="presenceTtl">Presence TTL (sec)</span>
          <input type="number" id="setPresenceTtl" step="30" min="60" max="1800" value="300" />
        </label>
        <label style="grid-column: 1 / -1;">
          <span data-i18n="relays">Gun relay peers (one URL per line)</span>
          <textarea id="setRelays" class="peers">https://relay.peer.ooo/gun</textarea>
        </label>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="btnApplySettings" class="primary" data-i18n="apply">Apply</button>
        <button id="btnExportCapsule" data-i18n="exportCapsule">Export capsule</button>
        <button id="btnImportCapsule" data-i18n="importCapsule">Import capsule</button>
        <input type="file" id="importFile" accept=".json" style="display:none" />
        <button id="btnReindex" data-i18n="reindex">Reindex vectors</button>
        <button id="btnSeed" data-i18n="seed">Seed 5</button>
        <button id="btnReset" class="danger" data-i18n="reset">Reset all</button>
      </div>
    </details>
  </section>

  <section class="panel">
    <h2 data-i18n="allThoughts">all thoughts</h2>
    <div class="list" id="listAll"></div>
  </section>

  <section class="panel">
    <details>
      <summary data-i18n="eventLog">event log</summary>
      <div class="log" id="log" style="margin-top:8px;"></div>
    </details>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/radisk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/rindexed.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/axe.js"></script>

<script type="module">
/* ============================================================================
   NOOSPHERE v3 — PRESENCE-AWARE, FINAL STABLE
   ----------------------------------------------------------------------------
   Архитектура (4 слоя):
     L1 ФИЗИКА:      Gun relay хранит мировой граф + presence граф.
     L2 ПРИСУТСТВИЕ: каждое устройство шлёт heartbeat (deviceId + aliveIds).
     L3 ВИДИМОСТЬ:   UI "Мир" показывает только то, чей автор online (presence live).
     L4 РАНЖИР:      similarity * freshness * presenceBoost.

   Порядок секций (зависимости идут строго по возрастанию):
     [1] Config  [2] I18n  [3] Logger  [4] Util
     [5] Device  [6] Settings  [7] Storage  [8] Vector
     [9] P2P     [10] Presence [11] Relevance
     [12] Sync   [13] UI       [14] App
   ============================================================================ */

import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

env.allowLocalModels = false;
env.useBrowserCache    = true;

const ns = (window.__ns = {});

/* --------------------------------------------------------------------------
   [1] CONFIG
   Значения по умолчанию. Пользовательские настройки хранятся в Settings.
   -------------------------------------------------------------------------- */
ns.Config = Object.freeze({
  DB_NAME: 'noosphere_v3',
  DB_VERSION: 1,
  STORE_THOUGHTS: 'thoughts',
  STORE_META: 'meta',

  GUN_WORLD_NS:    'noosphere/world/v3',
  GUN_PRESENCE_NS: 'noosphere/presence/v3',

  DEFAULT_RELAYS: ['https://relay.peer.ooo/gun'],

  LIMITS: {
    MAX_TEXT_LENGTH: 10_000,
    RENDER_CAP: 300,
    DEBOUNCE_INPUT_MS: 250,
    HEARTBEAT_INTERVAL_MS: 60_000, // 1 мин
  },

  VECTOR: {
    MODEL_ID: 'Xenova/all-MiniLM-L6-v2',
    DIMENSIONS: 384,
  },

  DEFAULTS: {
    threshold: 0.25,
    adjacency: 0.15,
    maxCards: 5,
    minWavesHours: 0,
    presenceTtlSec: 300, // 5 минут без heartbeat = sleeping
    theme: 'auto',
    lang: 'ru',
  },
});

/* --------------------------------------------------------------------------
   [2] I18N
   Минимальный словарь RU/EN. Ключи — из data-i18n атрибутов.
   -------------------------------------------------------------------------- */
ns.I18n = (() => {
  const dict = {
    ru: {
      thought: 'мысль', swipeHint: 'свайп вверх = публикация в мир',
      publishToWorld: 'опубликовать в мир (p2p)', save: 'Сохранить',
      saveWorld: 'Сохранить + Мир', liveRelevance: 'живая релевантность',
      colMine: 'МОИ / РЕЛЕВАНТНЫЕ', colWorld: 'МИР (presence-фильтр)',
      colAdjacent: 'СМЕЖНЫЕ (serendipity)', settingsTitle: 'настройки',
      theme: 'Тема', themeAuto: 'Авто', themeDark: 'Тёмная', themeLight: 'Светлая',
      threshold: 'Порог релевантности', adjacency: 'Дельта смежности',
      maxCards: 'Макс. карточек', minWaves: 'Мин. волны (часы)',
      presenceTtl: 'Presence TTL (сек)', relays: 'Gun relay (по URL на строку)',
      apply: 'Применить', exportCapsule: 'Экспорт капсулы',
      importCapsule: 'Импорт капсулы', reindex: 'Реиндекс векторов',
      seed: 'Сид 5', reset: 'Сбросить всё', allThoughts: 'все мысли',
      eventLog: 'лог событий',
    },
    en: {
      thought: 'thought', swipeHint: 'swipe up = publish to world',
      publishToWorld: 'publish to world (p2p)', save: 'Save',
      saveWorld: 'Save + World', liveRelevance: 'live relevance',
      colMine: 'MY / RELEVANT', colWorld: 'WORLD (presence-filtered)',
      colAdjacent: 'ADJACENT (serendipity)', settingsTitle: 'settings',
      theme: 'Theme', themeAuto: 'Auto', themeDark: 'Dark', themeLight: 'Light',
      threshold: 'Relevance threshold', adjacency: 'Adjacency delta',
      maxCards: 'Max cards', minWaves: 'Min waves (hours)',
      presenceTtl: 'Presence TTL (sec)', relays: 'Gun relays (one URL per line)',
      apply: 'Apply', exportCapsule: 'Export capsule',
      importCapsule: 'Import capsule', reindex: 'Reindex vectors',
      seed: 'Seed 5', reset: 'Reset all', allThoughts: 'all thoughts',
      eventLog: 'event log',
    },
  };

  const apply = (lang) => {
    const d = dict[lang] || dict.ru;
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      const key = el.getAttribute('data-i18n');
      if (d[key]) {
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          el.placeholder = d[key];
        } else {
          el.textContent = d[key];
        }
      }
    });
  };

  return { apply, has: (l) => !!dict[l] };
})();

/* --------------------------------------------------------------------------
   [3] LOGGER
   -------------------------------------------------------------------------- */
ns.Logger = (() => {
  const el = () => document.getElementById('log');
  const fmt = (d) => d.toISOString().slice(11, 19);
  const safe = (x) => {
    try { return typeof x === 'string' ? x : JSON.stringify(x); }
    catch { return String(x); }
  };
  const write = (lvl, m, d) => {
    const line = document.createElement('div');
    line.className = lvl;
    const tail = d !== undefined ? ' ' + safe(d) : '';
    line.textContent = `[${fmt(new Date())}] [${lvl.toUpperCase()}] ${m}${tail}`;
    const box = el();
    if (box) { box.appendChild(line); box.scrollTop = box.scrollHeight; }
    const fn = lvl === 'e' ? 'error' : lvl === 'w' ? 'warn' : 'log';
    console[fn](`[noosphere:${lvl}] ${m}`, d ?? '');
  };
  return {
    info:  (m, d) => write('i', m, d),
    warn:  (m, d) => write('w', m, d),
    error: (m, d) => write('e', m, d),
  };
})();

/* --------------------------------------------------------------------------
   [4] UTIL
   -------------------------------------------------------------------------- */
ns.Util = {
  newId: () => (crypto.randomUUID
    ? crypto.randomUUID()
    : 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10)),
  now: () => Date.now(),
  normalizeText: (t) => typeof t === 'string'
    ? t.trim().slice(0, ns.Config.LIMITS.MAX_TEXT_LENGTH)
    : '',
  isNonEmptyString: (v) => typeof v === 'string' && v.trim().length > 0,
  debounce: (fn, ms) => {
    let t = null;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  },
  escapeHtml: (s) => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;'),
};

/* --------------------------------------------------------------------------
   [5] DEVICE (стабильный deviceFingerprint)
   -------------------------------------------------------------------------- */
ns.Device = (() => {
  const META_KEY = 'deviceFingerprint';
  let fp = null;

  const generate = () => 'dev-' + (crypto.randomUUID
    ? crypto.randomUUID()
    : Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 14));

  const init = async (storageApi) => {
    try {
      const row = await storageApi.getMeta(META_KEY);
      if (row && row.value) {
        fp = row.value;
      } else {
        fp = generate();
        await storageApi.putMeta({ key: META_KEY, value: fp });
        ns.Logger.info('new device fingerprint minted', { fp: fp.slice(0, 16) + '...' });
      }
    } catch (e) {
      fp = generate();
      ns.Logger.warn('device fp fallback to memory', { fp: fp.slice(0, 16) + '...' });
    }
    return fp;
  };

  const get = () => fp;
  const reset = async (storageApi) => { await storageApi.clearAll(); fp = null; };

  return { init, get, reset };
})();

/* --------------------------------------------------------------------------
   [6] SETTINGS (пользовательские настройки, хранятся в IDB meta)
   -------------------------------------------------------------------------- */
ns.Settings = (() => {
  const META_KEY = 'userSettings';
  let cache = { ...ns.Config.DEFAULTS };

  const load = async (storageApi) => {
    try {
      const row = await storageApi.getMeta(META_KEY);
      if (row && row.value) {
        cache = { ...ns.Config.DEFAULTS, ...row.value };
      }
    } catch (e) {
      ns.Logger.warn('settings load failed, using defaults', e.message);
    }
    return cache;
  };

  const save = async (storageApi, patch) => {
    cache = { ...cache, ...patch };
    try {
      await storageApi.putMeta({ key: META_KEY, value: cache });
    } catch (e) {
      ns.Logger.warn('settings save failed', e.message);
    }
    return cache;
  };

  const get = () => cache;
  const set = (patch) => { cache = { ...cache, ...patch }; };

  return { load, save, get, set };
})();

/* --------------------------------------------------------------------------
   [7] STORAGE (IndexedDB)
   -------------------------------------------------------------------------- */
ns.Storage = (() => {
  const { DB_NAME, DB_VERSION, STORE_THOUGHTS, STORE_META } = ns.Config;
  let db = null;

  const open = () => new Promise((resolve, reject) => {
    if (db) return resolve(db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (ev) => {
      const _db = ev.target.result;
      if (!_db.objectStoreNames.contains(STORE_THOUGHTS)) {
        const store = _db.createObjectStore(STORE_THOUGHTS, { keyPath: 'id' });
        store.createIndex('createdAt', 'createdAt');
        store.createIndex('source',    'source');
        store.createIndex('hasVector', 'hasVector');
        store.createIndex('originDevice', 'originDevice');
      }
      if (!_db.objectStoreNames.contains(STORE_META)) {
        _db.createObjectStore(STORE_META, { keyPath: 'key' });
      }
    };
    req.onsuccess = (ev) => { db = ev.target.result; resolve(db); };
    req.onerror   = ()    => reject(req.error);
    req.onblocked = ()    => reject(new Error('IDB blocked'));
  });

  const tx = (name, mode = 'readonly') => db.transaction(name, mode).objectStore(name);
  const prom = (req) => new Promise((res, rej) => {
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });

  const put    = async (t) => { await open(); return prom(tx(STORE_THOUGHTS, 'readwrite').put(t)); };
  const putBulk = async (items) => {
    await open();
    const t = db.transaction(STORE_THOUGHTS, 'readwrite');
    const store = t.objectStore(STORE_THOUGHTS);
    for (const it of items) store.put(it);
    return new Promise((res, rej) => {
      t.oncomplete = () => res();
      t.onerror = () => rej(t.error);
    });
  };
  const get    = async (id) => { await open(); return prom(tx(STORE_THOUGHTS).get(id)); };
  const remove = async (id) => { await open(); return prom(tx(STORE_THOUGHTS, 'readwrite').delete(id)); };
  const all    = async ()    => { await open(); return prom(tx(STORE_THOUGHTS).getAll()); };

  const listUnindexed = async () => {
    await open();
    return new Promise((res, rej) => {
      const out = [];
      const req = tx(STORE_THOUGHTS).index('hasVector').openCursor(IDBKeyRange.only(0));
      req.onsuccess = (ev) => {
        const c = ev.target.result;
        if (!c) return res(out);
        out.push(c.value);
        c.continue();
      };
      req.onerror = () => rej(req.error);
    });
  };

  const getMeta = async (key) => { await open(); return prom(tx(STORE_META).get(key)); };
  const putMeta = async (row) => { await open(); return prom(tx(STORE_META, 'readwrite').put(row)); };

  const clearAll = async () => {
    await open();
    await prom(tx(STORE_THOUGHTS, 'readwrite').clear());
    await prom(tx(STORE_META,    'readwrite').clear());
  };

  return {
    open, put, putBulk, get, remove, all,
    listUnindexed, getMeta, putMeta, clearAll,
  };
})();

/* --------------------------------------------------------------------------
   [8] VECTOR (MiniLM via transformers.js)
   -------------------------------------------------------------------------- */
ns.Vector = (() => {
  let extractor = null;
  let loadPromise = null;

  const load = (onProgress) => {
    if (extractor) return Promise.resolve(extractor);
    if (loadPromise) return loadPromise;
    loadPromise = pipeline('feature-extraction', ns.Config.VECTOR.MODEL_ID, {
      progress_callback: (p) => {
        if (onProgress && p.status === 'progress' && p.total) {
          onProgress({ loaded: p.loaded, total: p.total, file: p.file });
        }
      },
    }).then((ex) => {
      extractor = ex;
      ns.Logger.info('model loaded', { id: ns.Config.VECTOR.MODEL_ID });
      return ex;
    }).catch((err) => {
      loadPromise = null;
      throw err;
    });
    return loadPromise;
  };

  const embed = async (text) => {
    if (!extractor) throw new Error('Model not loaded');
    if (!ns.Util.isNonEmptyString(text)) return null;
    const out = await extractor(text, { pooling: 'mean', normalize: true });
    return Array.from(out.data);
  };

  const cosine = (a, b) => {
    if (!a || !b || a.length !== b.length) return 0;
    let s = 0;
    for (let i = 0; i < a.length; i++) s += a[i] * b[i];
    return s;
  };

  const isLoaded = () => extractor !== null;

  return { load, embed, cosine, isLoaded };
})();

/* --------------------------------------------------------------------------
   [9] P2P (GunDB) — мировой граф + presence граф
   Мировой граф: noosphere/world/v3/<id>      -> {text, createdAt, updatedAt, originDevice}
   Presence граф: noosphere/presence/v3/<devId> -> {lastSeen, aliveIds: [id...]}
   -------------------------------------------------------------------------- */
ns.P2P = (() => {
  let gun = null, worldNode = null, presenceRoot = null;
  let peerCount = 0;
  const worldListeners = new Set();
  const presenceListeners = new Set();

  const safeCall = (set, arg) => {
    for (const fn of set) {
      try { fn(arg); } catch (e) { ns.Logger.error('listener crashed', e.message); }
    }
  };

  const broadcastPeers = () => {
    document.dispatchEvent(new CustomEvent('ns:peers', { detail: { count: peerCount } }));
  };

  const toWorldThought = (d, id) => {
    if (!d || typeof d !== 'object') return null;
    const text = typeof d.text === 'string' ? d.text : '';
    if (!text.trim()) return null;
    return {
      id: String(id),
      text: text.slice(0, ns.Config.LIMITS.MAX_TEXT_LENGTH),
      source: 'world',
      createdAt: Number(d.createdAt) || ns.Util.now(),
      updatedAt: Number(d.updatedAt) || ns.Util.now(),
      originDevice: String(d.originDevice || ''),
      vector: null,
      hasVector: 0,
      published: true,
    };
  };

  const init = (relays) => new Promise((res, rej) => {
    try {
      if (typeof Gun === 'undefined') throw new Error('Gun not loaded');
      gun = Gun({ peers: relays, localStorage: true });
      worldNode    = gun.get(ns.Config.GUN_WORLD_NS);
      presenceRoot = gun.get(ns.Config.GUN_PRESENCE_NS);

      gun.on('hi',  () => { peerCount++; broadcastPeers(); });
      gun.on('bye', () => { peerCount = Math.max(0, peerCount - 1); broadcastPeers(); });

      // Мировой граф: snapshot + realtime
      worldNode.map().once((data, id) => {
        const t = toWorldThought(data, id);
        if (t) safeCall(worldListeners, t);
      });
      worldNode.map().on((data, id) => {
        const t = toWorldThought(data, id);
        if (t) safeCall(worldListeners, t);
      });

      // Presence граф: слушаем обновления всех устройств
      presenceRoot.map().on((data, devId) => {
        if (!data || !devId) return;
        safeCall(presenceListeners, {
          deviceId: String(devId),
          lastSeen: Number(data.lastSeen) || 0,
          aliveIds: Array.isArray(data.aliveIds) ? data.aliveIds.map(String) : [],
        });
      });

      ns.Logger.info('Gun initialized', {
        world: ns.Config.GUN_WORLD_NS,
        presence: ns.Config.GUN_PRESENCE_NS,
        relays,
      });
      res();
    } catch (e) { rej(e); }
  });

  const publishWorld = (t) => new Promise((res, rej) => {
    if (!worldNode) return rej(new Error('Gun not init'));
    worldNode.get(t.id).put({
      text: t.text,
      createdAt: t.createdAt,
      updatedAt: t.updatedAt,
      originDevice: t.originDevice || '',
    }, (ack) => {
      if (ack && ack.err) return rej(new Error(ack.err));
      res();
    });
  });

  const publishPresence = (devId, aliveIds, lastSeen) => {
    if (!presenceRoot) return;
    presenceRoot.get(devId).put({
      lastSeen,
      aliveIds: aliveIds.slice(0, 500), // лимит, чтобы presence не раздувался
    });
  };

  const onWorldThought    = (fn) => { worldListeners.add(fn);    return () => worldListeners.delete(fn); };
  const onPresenceUpdate  = (fn) => { presenceListeners.add(fn); return () => presenceListeners.delete(fn); };
  const getPeerCount = () => peerCount;
  const isConnected  = () => peerCount > 0;

  return {
    init, publishWorld, publishPresence,
    onWorldThought, onPresenceUpdate,
    getPeerCount, isConnected,
  };
})();

/* --------------------------------------------------------------------------
   [10] PRESENCE
   Heartbeat + локальный индекс чужих presence + определение online/sleeping.
   -------------------------------------------------------------------------- */
ns.Presence = (() => {
  // Локальный кеш: deviceId -> { lastSeen, aliveIds: Set }
  const remoteIndex = new Map();
  let heartbeatTimer = null;

  // Индекс "живых" мировых заметок: thoughtId -> Set<deviceId who has it alive>
  // Построен на основе remoteIndex.
  const aliveHosts = new Map();

  const rebuildAliveHosts = () => {
    aliveHosts.clear();
    for (const [devId, rec] of remoteIndex) {
      for (const id of rec.aliveIds) {
        if (!aliveHosts.has(id)) aliveHosts.set(id, new Set());
        aliveHosts.get(id).add(devId);
      }
    }
  };

  const handlePresenceUpdate = (rec) => {
    if (rec.deviceId === ns.Device.get()) return; // свои не храним в remote
    remoteIndex.set(rec.deviceId, {
      lastSeen: rec.lastSeen,
      aliveIds: rec.aliveIds,
    });
    rebuildAliveHosts();
    // Триггерим UI только если есть подписчики на изменения relevance.
    document.dispatchEvent(new CustomEvent('ns:presence-changed'));
  };

  const isOnline = (deviceId) => {
    if (!deviceId) return false;
    if (deviceId === ns.Device.get()) return true; // мы сами всегда online для себя
    const rec = remoteIndex.get(deviceId);
    if (!rec) return false;
    const ttl = (ns.Settings.get().presenceTtlSec || 300) * 1000;
    return (ns.Util.now() - rec.lastSeen) < ttl;
  };

  // Заметка считается "видимой в мире", если:
  //   1) её автор online (heartbeat свежий)
  //   2) ИЛИ есть хотя бы один живой хост, у которого она в aliveIds
  const isThoughtVisible = (thought) => {
    if (thought.source === 'local') return true;
    if (isOnline(thought.originDevice)) return true;
    const hosts = aliveHosts.get(thought.id);
    if (!hosts) return false;
    for (const devId of hosts) if (isOnline(devId)) return true;
    return false;
  };

  const getAliveHostCount = (thoughtId) => {
    const hosts = aliveHosts.get(thoughtId);
    if (!hosts) return 0;
    let count = 0;
    for (const devId of hosts) if (isOnline(devId)) count++;
    return count;
  };

  // Публикуем свой presence: список всех наших локальных ID
  const broadcastSelf = async () => {
    const myFp = ns.Device.get();
    if (!myFp) return;
    try {
      const all = await ns.Storage.all();
      const aliveIds = all
        .filter((t) => t.source === 'local')
        .map((t) => t.id);
      ns.P2P.publishPresence(myFp, aliveIds, ns.Util.now());
    } catch (e) {
      ns.Logger.warn('presence broadcast failed', e.message);
    }
  };

  const startHeartbeat = () => {
    if (heartbeatTimer) return;
    const tick = () => {
      broadcastSelf();
      heartbeatTimer = setTimeout(tick, ns.Config.LIMITS.HEARTBEAT_INTERVAL_MS);
    };
    tick();
    ns.Logger.info('presence heartbeat started');
  };

  const stopHeartbeat = () => {
    if (heartbeatTimer) {
      clearTimeout(heartbeatTimer);
      heartbeatTimer = null;
    }
  };

  const bind = () => {
    ns.P2P.onPresenceUpdate(handlePresenceUpdate);
  };

  const getStats = () => ({
    totalDevices: remoteIndex.size,
    onlineDevices: [...remoteIndex.keys()].filter(isOnline).length,
  });

  return {
    bind, startHeartbeat, stopHeartbeat, broadcastSelf,
    isOnline, isThoughtVisible, getAliveHostCount, getStats,
  };
})();

/* --------------------------------------------------------------------------
   [11] RELEVANCE
   Скоринг учитывает: similarity + presenceBoost + freshness + minWaves
   -------------------------------------------------------------------------- */
ns.Relevance = (() => {
  const escapeHtml = ns.Util.escapeHtml;

  const rank = (queryVec, thoughts) => {
    if (!queryVec) return [];
    const s = ns.Settings.get();
    const now = ns.Util.now();
    const minWavesMs = (s.minWavesHours || 0) * 3600 * 1000;
    const cutoff = now - minWavesMs;

    return thoughts
      .filter((t) => Array.isArray(t.vector))
      .filter((t) => t.createdAt <= cutoff) // minWaves: только заметки старше N часов
      .map((t) => {
        const sim = ns.Vector.cosine(queryVec, t.vector);
        const presenceBoost = ns.Presence.isThoughtVisible(t) ? 1.0 : 0.5;
        // свежесть: логарифмический буст для недавних (до 7 дней)
        const ageHours = (now - t.createdAt) / 3600000;
        const freshBoost = 1 + Math.max(0, 0.3 - ageHours / (7 * 24) * 0.3);
        const score = sim * presenceBoost * freshBoost;
        return { thought: t, score, sim };
      })
      .filter((r) => r.score > (s.threshold - s.adjacency))
      .sort((a, b) => b.score - a.score);
  };

  const split = (ranked) => {
    const s = ns.Settings.get();
    const mine = [], world = [], adjacent = [];
    for (const r of ranked) {
      const isRelevant = r.score >= s.threshold;
      if (!isRelevant) {
        if (adjacent.length < s.maxCards) adjacent.push(r);
      } else if (r.thought.source === 'local') {
        if (mine.length < s.maxCards) mine.push(r);
      } else {
        if (world.length < s.maxCards) world.push(r);
      }
    }
    return { mine, world, adjacent };
  };

  const highlightFragment = (queryText, matchText) => {
    if (!queryText || !matchText) return escapeHtml(matchText);
    const qTokens = queryText.toLowerCase().match(/\w+/g) || [];
    const mTokens = matchText.toLowerCase().match(/\w+/g) || [];
    if (!qTokens.length || !mTokens.length) return escapeHtml(matchText);

    const mRaw = matchText.match(/\w+/g) || [];
    const mPos = [];
    let cursor = 0;
    for (const w of mRaw) {
      const idx = matchText.toLowerCase().indexOf(w.toLowerCase(), cursor);
      if (idx < 0) break;
      mPos.push({ start: idx, end: idx + w.length });
      cursor = idx + w.length;
    }

    let bestLen = 0, bestStart = -1;
    for (let i = 0; i < mTokens.length && i < mPos.length; i++) {
      for (let L = Math.min(qTokens.length, mTokens.length - i); L > bestLen; L--) {
        if (i + L > mPos.length) break;
        const slice = mTokens.slice(i, i + L).join(' ');
        if (qTokens.join(' ').includes(slice)) {
          bestLen = L; bestStart = i;
        }
      }
    }
    if (bestLen < 2 || bestStart < 0) return escapeHtml(matchText);

    const a = mPos[bestStart];
    const b = mPos[bestStart + bestLen - 1];
    if (!a || !b) return escapeHtml(matchText);
    return escapeHtml(matchText.slice(0, a.start))
         + '<mark>' + escapeHtml(matchText.slice(a.start, b.end)) + '</mark>'
         + escapeHtml(matchText.slice(b.end));
  };

  return { rank, split, highlightFragment };
})();

/* --------------------------------------------------------------------------
   [12] SYNC
   saveLocal + ingestWorld (anti-ghost) + reindex + capsule export/import
   -------------------------------------------------------------------------- */
ns.Sync = (() => {
  const saveLocal = async ({ text, publishToWorld }) => {
    const clean = ns.Util.normalizeText(text);
    if (!clean) throw new Error('Empty thought');
    const myFp = ns.Device.get();

    const thought = {
      id: ns.Util.newId(),
      text: clean,
      source: 'local',
      createdAt: ns.Util.now(),
      updatedAt: ns.Util.now(),
      originDevice: myFp,
      vector: null,
      hasVector: 0,
      published: false,
    };

    if (ns.Vector.isLoaded()) {
      try {
        thought.vector = await ns.Vector.embed(clean);
        thought.hasVector = thought.vector ? 1 : 0;
      } catch (e) { ns.Logger.warn('embed failed on save', e.message); }
    }

    await ns.Storage.put(thought);
    ns.Logger.info('saved local', { id: thought.id });

    if (publishToWorld) {
      try {
        await ns.P2P.publishWorld(thought);
        thought.published = true;
        await ns.Storage.put(thought);
        ns.Logger.info('published to world', { id: thought.id, origin: myFp.slice(0, 12) });
      } catch (e) { ns.Logger.warn('publish failed', e.message); }
    }

    // Обновляем presence: новая локальная заметка = живой хост
    ns.Presence.broadcastSelf();
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
    return thought;
  };

  const ingestWorld = async (incoming) => {
    const myFp = ns.Device.get();

    // [ANTI-GHOST] эхо-фильтр: наши собственные публикации игнорим
    if (incoming.originDevice && incoming.originDevice === myFp) return;

    // LWW
    const existing = await ns.Storage.get(incoming.id);
    if (existing && existing.updatedAt >= incoming.updatedAt) return;

    // Дедуп по тексту
    const all = await ns.Storage.all();
    const duplicate = all.find((t) => t.text === incoming.text && t.id !== incoming.id);
    if (duplicate) {
      ns.Logger.info('skipped world duplicate (text match)', { id: incoming.id });
      return;
    }

    // Автовекторизация
    if (ns.Vector.isLoaded() && !incoming.hasVector) {
      try {
        incoming.vector = await ns.Vector.embed(incoming.text);
        incoming.hasVector = incoming.vector ? 1 : 0;
      } catch (e) { ns.Logger.warn('embed failed on ingest', e.message); }
    }

    await ns.Storage.put(incoming);
    ns.Logger.info('ingested world', {
      id: incoming.id,
      from: (incoming.originDevice || 'unknown').slice(0, 12),
      vectorized: !!incoming.hasVector,
    });
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
  };

  const reindexAll = async (onProgress) => {
    if (!ns.Vector.isLoaded()) throw new Error('Load model first');
    const pending = await ns.Storage.listUnindexed();
    let done = 0;
    for (const t of pending) {
      try {
        const v = await ns.Vector.embed(t.text);
        t.vector = v;
        t.hasVector = v ? 1 : 0;
        await ns.Storage.put(t);
      } catch (e) { ns.Logger.warn('reindex failed for ' + t.id, e.message); }
      done++;
      if (onProgress) onProgress({ done, total: pending.length });
    }
    ns.Logger.info('reindex done', { total: pending.length });
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
  };

  const exportCapsule = async () => {
    const all = await ns.Storage.all();
    const capsule = {
      version: 3,
      exportedAt: new Date().toISOString(),
      device: ns.Device.get(),
      settings: ns.Settings.get(),
      thoughts: all.map((t) => ({
        id: t.id, text: t.text, source: t.source,
        createdAt: t.createdAt, updatedAt: t.updatedAt,
        originDevice: t.originDevice,
        vector: t.vector, hasVector: t.hasVector,
      })),
    };
    const blob = new Blob([JSON.stringify(capsule, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `noosphere-capsule-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    ns.Logger.info('capsule exported', { count: all.length });
  };

  const importCapsule = async (file) => {
    const text = await file.text();
    const capsule = JSON.parse(text);
    if (!capsule || capsule.version !== 3 || !Array.isArray(capsule.thoughts)) {
      throw new Error('Invalid capsule format (expected v3)');
    }
    const myFp = ns.Device.get();
    let imported = 0;
    for (const t of capsule.thoughts) {
      // Пропускаем наши собственные (по originDevice)
      if (t.originDevice === myFp) continue;
      const existing = await ns.Storage.get(t.id);
      if (existing) continue;
      t.source = 'world'; // импортим как мировые
      t.published = true;
      await ns.Storage.put(t);
      imported++;
    }
    ns.Logger.info('capsule imported', { imported, total: capsule.thoughts.length });
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
  };

  const bind = () => { ns.P2P.onWorldThought(ingestWorld); };

  return { saveLocal, ingestWorld, reindexAll, exportCapsule, importCapsule, bind };
})();

/* --------------------------------------------------------------------------
   [13] UI
   -------------------------------------------------------------------------- */
ns.UI = (() => {
  const refs = {};

  const cache = () => {
    ['input','publishWorld','btnSave','btnSaveWorld','btnReindex','btnSeed',
     'btnExportCapsule','btnImportCapsule','importFile','btnReset','btnApplySettings',
     'listMineRelevant','listWorldRelevant','listAdjacent','listAll',
     'status','modelProgress','deviceId','langSwitch','swipeZone',
     'setTheme','setThreshold','setAdjacency','setMaxCards','setMinWaves',
     'setPresenceTtl','setRelays']
      .forEach((id) => { refs[id] = document.getElementById(id); });
  };

  const setPill = (k, t, s = '') => {
    const el = refs.status.querySelector(`[data-key="${k}"]`);
    if (!el) return;
    el.textContent = t;
    el.classList.remove('ok','warn','err','sleep');
    if (s) el.classList.add(s);
  };

  const setProgress = (pct) => { refs.modelProgress.style.width = pct + '%'; };
  const showDeviceId = () => {
    const fp = ns.Device.get();
    if (refs.deviceId) refs.deviceId.textContent = fp ? `device: ${fp}` : 'device: (n/a)';
  };

  const renderRelevanceList = (container, ranked, queryText) => {
    container.innerHTML = '';
    if (!ranked.length) {
      const d = document.createElement('div');
      d.className = 'empty';
      d.textContent = '(none)';
      container.appendChild(d);
      return;
    }
    for (const r of ranked) {
      const row = document.createElement('div');
      const visible = ns.Presence.isThoughtVisible(r.thought);
      row.className = `item ${r.thought.source}${visible ? '' : ' sleeping'}`;

      const score = document.createElement('span');
      score.className = 'score';
      score.textContent = typeof r.score === 'number' ? r.score.toFixed(3) : '';

      const body = document.createElement('div');
      body.innerHTML = ns.Relevance.highlightFragment(queryText, r.thought.text);

      const meta = document.createElement('div');
      meta.className = 'meta';
      const dot = document.createElement('span');
      dot.className = 'presence-dot' + (visible ? '' : ' sleeping');
      meta.appendChild(dot);
      const metaText = document.createElement('span');
      const hosts = ns.Presence.getAliveHostCount(r.thought.id);
      metaText.textContent =
        `${r.thought.source} | ${new Date(r.thought.createdAt).toISOString().slice(0,16)} | ` +
        `from:${(r.thought.originDevice || '?').slice(0,8)}${hosts > 0 ? ` | hosts:${hosts}` : ''} | ${r.thought.id.slice(0,6)}`;
      meta.appendChild(metaText);

      row.appendChild(score);
      row.appendChild(body);
      row.appendChild(meta);
      container.appendChild(row);
    }
  };

  const clearRelevanceColumns = () => {
    renderRelevanceList(refs.listMineRelevant,  [], '');
    renderRelevanceList(refs.listWorldRelevant, [], '');
    renderRelevanceList(refs.listAdjacent,      [], '');
  };

  const updateLiveRelevance = async () => {
    if (!ns.Vector.isLoaded()) {
      clearRelevanceColumns();
      return;
    }
    const text = refs.input.value.trim();
    const all = await ns.Storage.all();

    if (!text) {
      // Лента: показываем последние видимые
      const visible = all
        .filter((t) => t.hasVector && ns.Presence.isThoughtVisible(t))
        .sort((a, b) => b.createdAt - a.createdAt)
        .slice(0, ns.Settings.get().maxCards * 2);
      renderRelevanceList(
        refs.listMineRelevant,
        visible.filter(t => t.source === 'local').slice(0, ns.Settings.get().maxCards).map(t => ({ thought: t, score: 1 })),
        ''
      );
      renderRelevanceList(
        refs.listWorldRelevant,
        visible.filter(t => t.source === 'world').slice(0, ns.Settings.get().maxCards).map(t => ({ thought: t, score: 1 })),
        ''
      );
      renderRelevanceList(refs.listAdjacent, [], '');
      return;
    }

    try {
      const qv = await ns.Vector.embed(text);
      const ranked = ns.Relevance.rank(qv, all);
      const { mine, world, adjacent } = ns.Relevance.split(ranked);
      renderRelevanceList(refs.listMineRelevant,  mine,     text);
      renderRelevanceList(refs.listWorldRelevant, world,    text);
      renderRelevanceList(refs.listAdjacent,      adjacent, text);
    } catch (e) {
      ns.Logger.error('live relevance failed', e.message);
    }
  };

  const renderAll = async () => {
    const all = await ns.Storage.all();
    const sorted = all.sort((a, b) => b.createdAt - a.createdAt)
                      .slice(0, ns.Config.LIMITS.RENDER_CAP);
    refs.listAll.innerHTML = '';
    for (const t of sorted) {
      const row = document.createElement('div');
      const visible = ns.Presence.isThoughtVisible(t);
      row.className = `item ${t.source}${visible ? '' : ' sleeping'}`;
      const body = document.createElement('div');
      body.textContent = t.text;
      const meta = document.createElement('div');
      meta.className = 'meta';
      const dot = document.createElement('span');
      dot.className = 'presence-dot' + (visible ? '' : ' sleeping');
      meta.appendChild(dot);
      const metaText = document.createElement('span');
      metaText.textContent =
        `${t.source} | ${new Date(t.createdAt).toISOString().slice(0,16)} | ` +
        `vec:${t.hasVector ? 'yes' : 'no'} | from:${(t.originDevice || '?').slice(0,8)} | ${t.id.slice(0,8)}`;
      meta.appendChild(metaText);
      row.appendChild(body);
      row.appendChild(meta);
      refs.listAll.appendChild(row);
    }
    const indexed = all.filter((t) => t.hasVector).length;
    setPill('indexed',
      `INDEXED: ${indexed}/${all.length}`,
      all.length > 0 && indexed === all.length ? 'ok' : 'warn');
  };

  const refresh = async () => {
    await renderAll();
    await updateLiveRelevance();
  };

  const syncSettingsToForm = () => {
    const s = ns.Settings.get();
    refs.setTheme.value      = s.theme;
    refs.setThreshold.value  = s.threshold;
    refs.setAdjacency.value  = s.adjacency;
    refs.setMaxCards.value   = s.maxCards;
    refs.setMinWaves.value   = s.minWavesHours;
    refs.setPresenceTtl.value = s.presenceTtlSec;
    refs.setRelays.value     = (s.relays || ns.Config.DEFAULT_RELAYS).join('\n');
  };

  const applyTheme = (theme) => {
    const resolved = theme === 'auto'
      ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
      : theme;
    document.documentElement.setAttribute('data-theme', resolved);
  };

  // Мобильный свайп вверх по textarea = publish to world
  const setupSwipe = () => {
    let startY = 0, active = false;
    const zone = refs.swipeZone;
    zone.addEventListener('touchstart', (e) => {
      startY = e.touches[0].clientY;
      active = true;
    }, { passive: true });
    zone.addEventListener('touchmove', (e) => {
      if (!active) return;
      const dy = startY - e.touches[0].clientY;
      if (dy > 60) {
        zone.classList.add('active');
      }
    }, { passive: true });
    zone.addEventListener('touchend', (e) => {
      if (!active) return;
      const endY = e.changedTouches[0].clientY;
      const dy = startY - endY;
      if (dy > 60) {
        // свайп вверх — триггерим "Save + World"
        refs.btnSaveWorld.click();
      }
      zone.classList.remove('active');
      active = false;
    });
  };

  const bind = () => {
    const debouncedUpdate = ns.Util.debounce(
      updateLiveRelevance,
      ns.Config.LIMITS.DEBOUNCE_INPUT_MS
    );
    refs.input.addEventListener('input', debouncedUpdate);

    const doSave = async (publishToWorld) => {
      try {
        refs.btnSave.disabled = refs.btnSaveWorld.disabled = true;
        await ns.Sync.saveLocal({
          text: refs.input.value,
          publishToWorld,
        });
        refs.input.value = '';
        await refresh();
      } catch (e) { ns.Logger.error('save failed', e.message); }
      finally { refs.btnSave.disabled = refs.btnSaveWorld.disabled = false; }
    };

    refs.btnSave.addEventListener('click', () => doSave(false));
    refs.btnSaveWorld.addEventListener('click', () => doSave(true));

    refs.btnApplySettings.addEventListener('click', async () => {
      const patch = {
        theme: refs.setTheme.value,
        threshold: parseFloat(refs.setThreshold.value) || 0.25,
        adjacency: parseFloat(refs.setAdjacency.value) || 0.15,
        maxCards: parseInt(refs.setMaxCards.value, 10) || 5,
        minWavesHours: parseInt(refs.setMinWaves.value, 10) || 0,
        presenceTtlSec: parseInt(refs.setPresenceTtl.value, 10) || 300,
        relays: refs.setRelays.value.split('\n').map((s) => s.trim()).filter(Boolean),
      };
      await ns.Settings.save(ns.Storage, patch);
      applyTheme(patch.theme);
      ns.Logger.info('settings applied', patch);
      await refresh();
    });

    refs.btnExportCapsule.addEventListener('click', ns.Sync.exportCapsule);
    refs.btnImportCapsule.addEventListener('click', () => refs.importFile.click());
    refs.importFile.addEventListener('change', async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      try {
        await ns.Sync.importCapsule(f);
        await refresh();
      } catch (err) {
        ns.Logger.error('import failed', err.message);
      }
      e.target.value = '';
    });

    refs.btnReindex.addEventListener('click', async () => {
      if (!ns.Vector.isLoaded()) {
        // автозагрузка при первом reindex
        try {
          setPill('model', 'MODEL: loading...', 'warn');
          await ns.Vector.load((p) => {
            const pct = Math.round((p.loaded / p.total) * 100);
            setProgress(pct);
            setPill('model', `MODEL: ${pct}%`, 'warn');
          });
          setPill('model', 'MODEL: ready', 'ok');
          setProgress(100);
        } catch (e) {
          setPill('model', 'MODEL: err', 'err');
          return ns.Logger.error('model load failed', e.message);
        }
      }
      try {
        refs.btnReindex.disabled = true;
        await ns.Sync.reindexAll((p) => {
          setPill('model', `MODEL: reindex ${p.done}/${p.total}`, 'warn');
        });
        setPill('model', 'MODEL: ready', 'ok');
        await refresh();
      } catch (e) { ns.Logger.error('reindex failed', e.message); }
      finally { refs.btnReindex.disabled = false; }
    });

    refs.btnSeed.addEventListener('click', async () => {
      const samples = [
        'Мысль появляется в паузе между действиями.',
        'Архитектура — это способ договариваться с будущим собой.',
        'Случайность — недооценённый инструмент поиска.',
        'Иногда нужно просто записать, чтобы понять.',
        'Связи между идеями важнее самих идей.',
      ];
      for (const s of samples) {
        await ns.Sync.saveLocal({ text: s, publishToWorld: false });
      }
      await refresh();
    });

    refs.btnReset.addEventListener('click', async () => {
      if (!confirm(
        'Стереть ВСЕ локальные данные и сменить идентичность устройства?\n\n' +
        'Мировой граф останется (чужие записи), но твои старые "духи" больше не вернутся.'
      )) return;
      try {
        await ns.Device.reset(ns.Storage);
        alert('Готово. Перезагружаю...');
        location.reload();
      } catch (e) { ns.Logger.error('reset failed', e.message); }
    });

    refs.langSwitch.addEventListener('click', async () => {
      const cur = ns.Settings.get().lang || 'ru';
      const next = cur === 'ru' ? 'en' : 'ru';
      await ns.Settings.save(ns.Storage, { lang: next });
      ns.I18n.apply(next);
      refs.langSwitch.textContent = next === 'ru' ? 'EN' : 'RU';
    });

    document.addEventListener('ns:thoughts-changed', refresh);
    document.addEventListener('ns:presence-changed',  refresh);
    document.addEventListener('ns:peers', (ev) => {
      const n = ev.detail.count;
      setPill('peers', `PEERS: ${n}`, n ? 'ok' : 'warn');
    });

    setupSwipe();
  };

  const init = () => {
    cache();
    bind();
    syncSettingsToForm();
    applyTheme(ns.Settings.get().theme);
    ns.I18n.apply(ns.Settings.get().lang || 'ru');
    refs.langSwitch.textContent = (ns.Settings.get().lang || 'ru') === 'ru' ? 'EN' : 'RU';
  };

  return { init, refresh, setPill, showDeviceId };
})();

/* --------------------------------------------------------------------------
   [14] APP
   Boot-порядок: Storage -> Device -> Settings -> UI -> P2P -> Presence -> Sync
   -------------------------------------------------------------------------- */
ns.App = (() => {
  const boot = async () => {
    ns.UI.init();
    ns.UI.setPill('idb', 'IDB: boot...', 'warn');
    ns.UI.setPill('gun', 'GUN: boot...', 'warn');

    // 1. Storage
    try {
      await ns.Storage.open();
      ns.UI.setPill('idb', 'IDB: OK', 'ok');
      ns.Logger.info('IDB ready', { name: ns.Config.DB_NAME });
    } catch (e) {
      ns.UI.setPill('idb', 'IDB: ERR', 'err');
      ns.Logger.error('IDB init failed', e.message);
      return;
    }

    // 2. Device
    try {
      await ns.Device.init(ns.Storage);
      ns.UI.showDeviceId();
    } catch (e) {
      ns.Logger.error('device init failed', e.message);
    }

    // 3. Settings (из IDB meta)
    try {
      await ns.Settings.load(ns.Storage);
      ns.UI.init(); // пересинхронизируем форму с загруженными настройками
    } catch (e) {
      ns.Logger.warn('settings load failed', e.message);
    }

    // 4. Gun P2P
    const relays = ns.Settings.get().relays || ns.Config.DEFAULT_RELAYS;
    try {
      await ns.P2P.init(relays);
      ns.UI.setPill('gun', 'GUN: ONLINE', 'ok');
    } catch (e) {
      ns.UI.setPill('gun', 'GUN: ERR', 'err');
      ns.Logger.error('Gun init failed', e.message);
    }

    // 5. Presence (подписка + heartbeat)
    ns.Presence.bind();
    ns.Presence.startHeartbeat();
    ns.UI.setPill('presence', 'PRESENCE: ON', 'ok');

    // 6. Sync (подписка на мировой граф)
    ns.Sync.bind();

    // 7. Финальный refresh
    await ns.UI.refresh();
  };

  return { boot };
})();

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', ns.App.boot);
} else {
  ns.App.boot();
}
</script>
</body>
