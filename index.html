<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Noosphere (World + Offline + GunDB)</title>

  <!-- ===================== Module: Styles (UI only) ===================== -->
  <style>
    :root{
      --bg:#f8fafc; --surface:#ffffff; --text:#0f172a; --text2:#64748b;
      --border:#e2e8f0; --accent:#4f46e5; --accent2:#4338ca;
      --shadow:0 1px 3px rgba(0,0,0,0.06);
      --radius:16px;
      --personal:#a78bfa; --world:#38bdf8; --ser:#fbbf24;
      --danger:#ef4444; --ok:#16a34a; --warn:#f59e0b;
    }
    body.dark{
      --bg:#0b1220; --surface:#111c2f; --text:#eef2ff; --text2:#94a3b8;
      --border:#22324f; --accent:#818cf8; --accent2:#6366f1;
      --shadow:0 1px 3px rgba(0,0,0,0.35);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
      background:var(--bg); color:var(--text); line-height:1.5;
      display:flex; justify-content:center; padding:0.7rem; overflow-x:hidden;
    }
    .app{ width:100%; max-width:780px; display:flex; flex-direction:column; gap:0.75rem; margin-top:0.25rem; }

    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:0.75rem; }
    .tabs{ display:flex; gap:0.5rem; }
    .tab-btn{
      padding:0.55rem 1.1rem; border-radius:12px; border:1px solid var(--border);
      background:transparent; color:var(--text2); cursor:pointer; font-weight:950;
      transition:all .2s;
    }
    .tab-btn.active{ background:var(--accent); border-color:var(--accent); color:#fff; }

    .burger-btn{
      width:46px; height:46px;
      background:var(--surface); border:1px solid var(--border); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:1.4rem; box-shadow:var(--shadow);
      flex:0 0 auto;
    }

    .view{ display:none; }
    .view.active{ display:block; }

    .thought-input{
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1rem; box-shadow:var(--shadow);
    }
    textarea{
      width:100%; border:none; background:transparent; outline:none;
      font-size:1.05rem; font-family:inherit; resize:none; color:var(--text);
      min-height:92px;
    }
    textarea::placeholder{ color:var(--text2); opacity:0.75; }

    .input-actions{
      display:flex; justify-content:space-between; gap:0.75rem; align-items:center;
      margin-top:0.75rem; flex-wrap:wrap;
    }
    .status-line{
      font-size:0.82rem; color:var(--text2);
      display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;
    }
    .pill{
      display:inline-flex; gap:0.35rem; align-items:center;
      padding:0.15rem 0.55rem; border-radius:999px;
      border:1px solid var(--border);
      font-weight:950;
      background:rgba(0,0,0,0.00);
    }
    .dot{ width:8px; height:8px; border-radius:50%; background:var(--text2); display:inline-block; }
    .dot.ok{ background:var(--ok); }
    .dot.bad{ background:var(--danger); }
    .dot.warn{ background:var(--warn); }

    .btn-row{ display:flex; gap:0.5rem; align-items:center; margin-left:auto; }
    .btn{
      padding:0.62rem 1rem; border-radius:12px; font-weight:950;
      border:none; cursor:pointer; background:var(--accent); color:#fff;
      font-size:0.92rem; transition:all .2s;
      display:inline-flex; align-items:center; justify-content:center; gap:0.5rem;
      box-shadow:0 6px 18px rgba(79,70,229,0.12);
    }
    .btn:hover{ background:var(--accent2); transform:translateY(-1px); }
    .btn:disabled{ opacity:0.45; pointer-events:none; transform:none; box-shadow:none; }
    .btn-ghost{ background:transparent; color:var(--text2); border:1px solid var(--border); box-shadow:none; }
    .btn-danger{ background:var(--danger); box-shadow:none; }
    .btn-danger:hover{ filter:brightness(0.96); }

    .hint{
      margin-top:0.55rem;
      padding:0.8rem 1rem;
      border-radius:14px;
      border:1px solid rgba(79,70,229,0.14);
      background:rgba(79,70,229,0.06);
      color:var(--text2);
      font-size:0.9rem;
    }

    .feed-section{ margin-top:0.25rem; }
    .section-title{
      display:flex; align-items:center; gap:0.5rem;
      font-size:0.8rem; font-weight:950; color:var(--text2);
      text-transform:uppercase; letter-spacing:0.07em; margin-bottom:0.5rem;
    }
    .section-title::before{
      content:''; display:block; width:9px; height:9px; border-radius:50%;
      background:currentColor;
      box-shadow:0 0 0 3px rgba(0,0,0,0.04);
    }
    #personalSection .section-title{ color:var(--personal); }
    #worldSection .section-title{ color:var(--world); }
    #serSection .section-title{ color:var(--ser); }

    .carousel{
      display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch; gap:0.75rem; padding-bottom:0.5rem;
    }
    .carousel::-webkit-scrollbar{ height:5px; }
    .carousel::-webkit-scrollbar-thumb{ background:var(--border); border-radius:3px; }

    .card{
      flex:0 0 calc(100% - 1.5rem);
      scroll-snap-align:start;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1rem; box-shadow:var(--shadow);
      animation:fadeInUp .22s ease both;
    }
    @keyframes fadeInUp{ from{ opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
    .card-text{ font-size:0.98rem; line-height:1.55; margin-bottom:0.7rem; white-space:pre-wrap; word-break:break-word; }
    .card-footer{ display:flex; align-items:center; justify-content:space-between; gap:0.6rem; font-size:0.82rem; color:var(--text2); }
    .badge{
      background:rgba(79,70,229,0.12); color:var(--accent);
      padding:2px 10px; border-radius:999px; font-weight:950;
      border:1px solid rgba(79,70,229,0.12);
    }
    .meta-mini{ display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap; }

    .empty{ text-align:center; color:var(--text2); padding:1.1rem 0.75rem; font-style:italic; }

    .history-input{ margin-bottom:1rem; }
    .history-input input{
      width:100%; padding:0.78rem; border:1px solid var(--border); border-radius:14px;
      background:var(--surface); color:var(--text); outline:none;
    }
    .day-group{ margin-bottom:1.25rem; }
    .day-title{ font-size:0.86rem; font-weight:950; color:var(--text2); margin-bottom:0.5rem; }
    .archive-item{
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:0.75rem 1rem; margin-bottom:0.55rem;
    }
    .archive-item .meta{ font-size:0.75rem; color:var(--text2); margin-bottom:0.25rem; display:flex; gap:0.75rem; flex-wrap:wrap;}
    .archive-item .text{ font-size:0.98rem; white-space:pre-wrap; word-break:break-word; }
    .archive-item .actions{ margin-top:0.6rem; display:flex; gap:0.5rem; flex-wrap:wrap; }
    .archive-item .actions button{
      background:none; border:1px solid var(--border); border-radius:10px;
      padding:0.3rem 0.8rem; font-size:0.83rem; cursor:pointer; color:var(--text2);
      font-weight:950;
    }
    .archive-item .actions button.danger{ border-color:rgba(239,68,68,0.45); color:var(--danger); }

    .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:9; display:none; }
    .overlay.open{ display:block; }
    .settings-panel{
      position:fixed; top:0; right:0; width:420px; max-width:92vw; height:100%;
      background:var(--surface); box-shadow:-10px 0 35px rgba(0,0,0,0.18);
      z-index:10; padding:1.2rem; overflow-y:auto;
      transform:translateX(100%); transition:transform .24s cubic-bezier(0.4,0,0.2,1);
    }
    .settings-panel.open{ transform:translateX(0); }
    .setting-row{ margin-bottom:1rem; display:flex; flex-direction:column; gap:0.35rem; }
    .setting-row label{ font-size:0.85rem; color:var(--text2); font-weight:950; }
    .setting-row select, .setting-row textarea{
      width:100%; border:1px solid var(--border); border-radius:12px;
      padding:0.62rem 0.7rem; background:var(--surface); color:var(--text); outline:none;
      font-family:inherit;
    }
    .setting-row textarea{ min-height:92px; resize:vertical; }

    .range-display{ display:flex; align-items:center; gap:0.6rem; }
    .range-display input[type="range"]{ flex:1; }
    .range-display span{ min-width:3rem; font-weight:950; color:var(--accent); text-align:right; }

    .settings-actions{ display:flex; flex-direction:column; gap:0.6rem; margin:1.2rem 0; }
    .settings-actions .btn{ width:100%; }

    .tiny{ font-size:0.75rem; color:var(--text2); }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    .spinner{
      display:inline-block; width:16px; height:16px;
      border:2px solid var(--text2); border-right-color:transparent;
      border-radius:50%; animation:spin .75s linear infinite;
      vertical-align:middle;
    }
    @keyframes spin{ to{ transform:rotate(360deg);} }
  </style>

  <!-- ===================== Module: GunDB libs (storage/network only) ===================== -->
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/rindexed.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/then.js"></script>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="tabs">
        <button class="tab-btn active" id="tabFlow">Поток</button>
        <button class="tab-btn" id="tabHistory">История</button>
      </div>
      <button class="burger-btn" id="openSettings">☰</button>
    </div>

    <!-- ===================== View: Flow ===================== -->
    <div class="view active" id="flowView">
      <div class="thought-input" id="thoughtBox">
        <textarea id="thoughtInput" placeholder="Поделитесь мыслью..."></textarea>

        <div class="input-actions">
          <div class="status-line" id="status"></div>
          <div class="btn-row">
            <button class="btn btn-ghost" id="saveBtn">Сохранить</button>
            <button class="btn" id="publishBtn" disabled>Отправить в Мир</button>
          </div>
        </div>

        <div class="hint" id="swipeHint">
          Свайп вверх по полю ввода — отправка в «Мир» (и сохранение офлайн).
        </div>
      </div>

      <div id="personalSection" class="feed-section">
        <div class="section-title" id="personalTitle">Мои мысли</div>
        <div id="personalCards" class="carousel"></div>
      </div>

      <div id="worldSection" class="feed-section">
        <div class="section-title" id="worldTitle">Мир</div>
        <div id="worldCards" class="carousel"></div>
      </div>

      <div id="serSection" class="feed-section">
        <div class="section-title" id="serTitle">Смежные</div>
        <div id="serCards" class="carousel"></div>
      </div>
    </div>

    <!-- ===================== View: History ===================== -->
    <div class="view" id="historyView">
      <div class="history-input">
        <input type="text" id="historySearch" placeholder="Поиск по истории..." />
      </div>
      <div id="historyContent"></div>
    </div>
  </div>

  <!-- ===================== Settings ===================== -->
  <div class="overlay" id="overlay"></div>
  <div class="settings-panel" id="settingsPanel">
    <h2 id="settingsTitle" style="margin-bottom:1rem;">Настройки</h2>

    <div class="setting-row">
      <label id="langLabel">Язык / Language</label>
      <select id="langSel">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="themeLabel">Тема</label>
      <select id="themeSel">
        <option value="auto">Авто</option>
        <option value="light">День</option>
        <option value="dark">Ночь</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="thresholdLabel">Порог релевантности</label>
      <div class="range-display">
        <input type="range" id="threshold" min="0" max="1" step="0.01" value="0.25" />
        <span id="thresholdVal">0.25</span>
      </div>
    </div>

    <div class="setting-row">
      <label id="serLabel">Дельта смежности</label>
      <div class="range-display">
        <input type="range" id="serDelta" min="0" max="0.5" step="0.01" value="0.15" />
        <span id="serVal">0.15</span>
      </div>
    </div>

    <div class="setting-row">
      <label id="maxLabel">Макс. карточек</label>
      <select id="maxResults">
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="peersLabel">Gun relay peers (по одному URL на строку)</label>
      <textarea id="peersText" class="mono" spellcheck="false" placeholder="https://relay.peer.ooo/gun"></textarea>
      <div class="tiny" id="peersHint">
        Нужен хотя бы один relay, иначе «Мир» будет только на этом устройстве. Пример: https://relay.peer.ooo/gun
      </div>
    </div>

    <div class="settings-actions">
      <button id="exportBtn" class="btn btn-ghost">Скачать капсулу</button>
      <button id="importBtn" class="btn btn-ghost">Импортировать капсулу</button>
      <input type="file" id="importFile" accept=".capsule,.json" style="display:none;" />
      <button id="reindexBtn" class="btn btn-ghost">Пересоздать векторы</button>
      <button id="resetDeviceBtn" class="btn btn-danger">Сбросить устройство (новый ID)</button>
    </div>

    <div class="tiny" style="margin-top:1rem;">
      <div id="modelInfo">Model: MiniLM</div>
      <div id="deviceInfo" class="mono"></div>
      <div id="netInfo" class="mono"></div>
    </div>
  </div>

  <!-- ===================== App ===================== -->
  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // ===================== Module: Utils =====================
    const Utils = (() => {
      const $ = (sel, root=document) => root.querySelector(sel);
      const escapeHTML = (s) => { const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; };
      const debounce = (fn, ms) => { let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; };
      const clamp = (x,a,b) => Math.max(a, Math.min(b, x));
      const safeJSON = (x, fb) => { try { return JSON.parse(x); } catch { return fb; } };
      const uuid = () => crypto.randomUUID();
      class Emitter{ #m=new Map(); on(e,f){ if(!this.#m.has(e)) this.#m.set(e,new Set()); this.#m.get(e).add(f); return ()=>this.#m.get(e)?.delete(f);} emit(e,p){ for(const f of this.#m.get(e)??[]) try{f(p)}catch(err){console.error(err)} } }
      const groupByDay = (notes) => {
        const m = new Map();
        for (const n of notes) {
          const key = new Date(n.createdAt).toLocaleDateString();
          if (!m.has(key)) m.set(key, []);
          m.get(key).push(n);
        }
        return m;
      };
      const formatDayLabel = (ms, t) => {
        const d = new Date(ms);
        const today = new Date(); today.setHours(0,0,0,0);
        const yest = new Date(today); yest.setDate(yest.getDate()-1);
        if (+d >= +today) return t('today');
        if (+d >= +yest) return t('yesterday');
        return d.toLocaleDateString();
      };
      return { $, escapeHTML, debounce, clamp, safeJSON, uuid, Emitter, groupByDay, formatDayLabel };
    })();

    // ===================== Module: IndexedDB KV (no localStorage) =====================
    const KV = (() => {
      const DB='noosphere_kv_world_v1', STORE='kv';
      let ok = true;
      const open = () => new Promise((res, rej) => {
        try{
          const req = indexedDB.open(DB, 1);
          req.onupgradeneeded = () => { const db=req.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE); };
          req.onsuccess = () => res(req.result);
          req.onerror = () => rej(req.error);
        } catch(e){ rej(e); }
      });
      const get = async (k) => {
        try{
          const db = await open();
          return await new Promise((res, rej) => {
            const tx=db.transaction(STORE,'readonly'); const st=tx.objectStore(STORE);
            const r=st.get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
          });
        } catch { ok=false; return undefined; }
      };
      const set = async (k,v) => {
        try{
          const db = await open();
          return await new Promise((res, rej) => {
            const tx=db.transaction(STORE,'readwrite'); const st=tx.objectStore(STORE);
            const r=st.put(v,k); r.onsuccess=()=>res(true); r.onerror=()=>rej(r.error);
          });
        } catch { ok=false; return false; }
      };
      return { get, set, ok:()=>ok };
    })();

    // ===================== Module: I18n =====================
    const I18n = (() => {
      const dict = {
        ru: {
          tabFlow:'Поток', tabHistory:'История',
          placeholder:'Поделитесь мыслью...',
          save:'Сохранить', publish:'Отправить в Мир',
          hint:'Свайп вверх по полю ввода — отправка в «Мир» (и сохранение офлайн).',
          personal:'Мои мысли', world:'Мир', ser:'Смежные',
          typeToSearch:'Введите текст выше — появятся совпадения.',
          emptyPersonal:'Похожих личных заметок не найдено.',
          emptyWorld:'Мировых совпадений не найдено (или нет relays).',
          emptySer:'Смежные совпадения не найдены.',
          historyPh:'Поиск по истории...',
          emptyHistory:'Нет заметок',
          edit:'ред.', save2:'сохр.', cancel:'отм.', del:'удал.',
          edited:'(изм.)', today:'Сегодня', yesterday:'Вчера',
          confirmDel:'Удалить заметку?',
          settings:'Настройки',
          lang:'Язык / Language',
          theme:'Тема',
          threshold:'Порог релевантности',
          serDelta:'Дельта смежности',
          max:'Макс. карточек',
          peers:'Gun relay peers (по одному URL на строку)',
          peersHint:'Нужен хотя бы один relay, иначе «Мир» будет только на этом устройстве.',
          export:'Скачать капсулу',
          import:'Импортировать капсулу',
          reindex:'Пересоздать векторы',
          reset:'Сбросить устройство (новый ID)',
          resetConfirm:'Сбросить устройство? Будет создан новый ID. Продолжить?',
          modelLoading:'Загрузка модели…',
          modelReady:'Модель готова',
          saved:'Сохранено (офлайн)',
          publishQueued:'Публикация поставлена в очередь',
          published:'Опубликовано в Мир',
          publishNeedRelay:'Нет relay peers — мир не общий. Добавьте relay в настройках.',
          net:'net',
          idb:'IDB'
        },
        en: {
          tabFlow:'Flow', tabHistory:'History',
          placeholder:'Share a thought...',
          save:'Save', publish:'Send to World',
          hint:'Swipe up on input to publish to “World” (also saves offline).',
          personal:'My thoughts', world:'World', ser:'Serendipity',
          typeToSearch:'Type above to see matches.',
          emptyPersonal:'No similar personal notes.',
          emptyWorld:'No world matches (or no relays).',
          emptySer:'No serendipity matches.',
          historyPh:'Search history...',
          emptyHistory:'No notes',
          edit:'edit', save2:'save', cancel:'cancel', del:'delete',
          edited:'(edited)', today:'Today', yesterday:'Yesterday',
          confirmDel:'Delete note?',
          settings:'Settings',
          lang:'Language',
          theme:'Theme',
          threshold:'Relevance threshold',
          serDelta:'Serendipity delta',
          max:'Max cards',
          peers:'Gun relay peers (one URL per line)',
          peersHint:'You need at least one relay to share “World” across users.',
          export:'Download capsule',
          import:'Import capsule',
          reindex:'Rebuild vectors',
          reset:'Reset device (new ID)',
          resetConfirm:'Reset device? A new ID will be created. Continue?',
          modelLoading:'Loading model…',
          modelReady:'Model ready',
          saved:'Saved (offline)',
          publishQueued:'Publish queued',
          published:'Published to World',
          publishNeedRelay:'No relay peers — World is not shared. Add a relay in settings.',
          net:'net',
          idb:'IDB'
        }
      };
      let lang='ru';
      const setLang = (l)=>{ lang = (l in dict) ? l : 'ru'; };
      const t = (k)=> dict[lang]?.[k] ?? dict.ru[k] ?? k;
      return { setLang, t, get:()=>lang };
    })();

    // ===================== Module: Theme =====================
    const Theme = (() => {
      const apply = (mode) => {
        const dark = mode === 'dark' || (mode === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.body.classList.toggle('dark', !!dark);
      };
      return { apply };
    })();

    // ===================== Module: Vectors (pack/unpack + dot) =====================
    const Vectors = (() => {
      const dot = (a,b)=>{ let d=0; for(let i=0;i<a.length;i++) d += a[i]*b[i]; return d; };
      const b64enc = (u8)=>{ let s=''; const CH=0x8000; for(let i=0;i<u8.length;i+=CH) s+=String.fromCharCode(...u8.subarray(i,i+CH)); return btoa(s); };
      const b64dec = (b64)=>{ const bin=atob(b64); const u8=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i); return u8; };
      const norm = (v)=>{ let s=0; for(let i=0;i<v.length;i++) s+=v[i]*v[i]; const m=Math.sqrt(s)||1; for(let i=0;i<v.length;i++) v[i]/=m; return v; };
      const packI8 = (f32)=>{ const v=new Float32Array(f32); norm(v); const i8=new Int8Array(v.length); for(let i=0;i<v.length;i++) i8[i]=Math.max(-127, Math.min(127, Math.round(v[i]*127))); return b64enc(new Uint8Array(i8.buffer)); };
      const unpackI8 = (b64)=>{ const u8=b64dec(b64); const i8=new Int8Array(u8.buffer); const v=new Float32Array(i8.length); for(let i=0;i<i8.length;i++) v[i]=i8[i]/127; return norm(v); };
      return { dot, packI8, unpackI8 };
    })();

    // ===================== Module: Embedder (Transformers.js) =====================
    const Embedder = (() => {
      let model=null;
      const init = async()=>{ model = await pipeline('feature-extraction','Xenova/paraphrase-multilingual-MiniLM-L12-v2',{ quantized:true }); };
      const ready = ()=>!!model;
      const embed = async(text)=>{
        if(!model) throw new Error('model not ready');
        const out = await model([text]);
        const { data, dims } = out;
        const tokens = dims?.[1], hidden = dims?.[2];
        const emb = new Float32Array(hidden);
        for(let t=0;t<tokens;t++){ const base=t*hidden; for(let h=0;h<hidden;h++) emb[h]+=data[base+h]; }
        for(let h=0;h<hidden;h++) emb[h]/=tokens;
        // normalize
        let s=0; for(let h=0;h<hidden;h++) s+=emb[h]*emb[h];
        const m=Math.sqrt(s)||1;
        for(let h=0;h<hidden;h++) emb[h]/=m;
        return emb;
      };
      return { init, ready, embed };
    })();

    // ===================== Module: GunKit (Gun instance + ack put) =====================
    const GunKit = (() => {
      const create = (peers) => Gun({ peers, localStorage:false });
      const put = (node, data) => new Promise((resolve, reject) => {
        node.put(data, (ack) => ack?.err ? reject(new Error(ack.err)) : resolve(ack));
      });
      return { create, put };
    })();

    // ===================== Module: Schema (Gun graph layout) =====================
    const Schema = (() => {
      const ROOT = 'noosphere_world_foundation_v1';
      const root = (gun)=>gun.get(ROOT);

      const client = (gun, deviceId)=>root(gun).get('clients').get(deviceId);

      const settings = (gun, deviceId)=>client(gun,deviceId).get('settings');

      // personal
      const pIndex = (gun, deviceId)=>client(gun,deviceId).get('p_index');
      const pNotes = (gun, deviceId)=>client(gun,deviceId).get('p_notes');

      // world shared
      const wIndex = (gun)=>root(gun).get('world').get('w_index');
      const wNotes = (gun)=>root(gun).get('world').get('w_notes');

      return { settings, pIndex, pNotes, wIndex, wNotes };
    })();

    // ===================== Module: SettingsModel (no arrays in Gun) =====================
    const SettingsModel = (() => {
      const DEFAULT = {
        __type:'noosphere_settings',
        lang:'ru',
        theme:'auto',
        threshold:0.25,
        serDelta:0.15,
        maxResults:5,
        peersText:'' // offline by default; user adds relay for "World"
      };

      const parsePeers = (peersText) =>
        String(peersText??'').split('\n').map(s=>s.trim()).filter(Boolean);

      const sanitize = (raw, base=DEFAULT) => {
        const x = raw && typeof raw==='object' ? raw : {};
        return {
          __type:'noosphere_settings',
          lang: (x.lang==='ru'||x.lang==='en') ? x.lang : base.lang,
          theme: (x.theme==='auto'||x.theme==='light'||x.theme==='dark') ? x.theme : base.theme,
          threshold: Utils.clamp(Number(x.threshold ?? base.threshold), 0, 1),
          serDelta: Utils.clamp(Number(x.serDelta ?? base.serDelta), 0, 0.5),
          maxResults: Math.max(1, Number(x.maxResults ?? base.maxResults) | 0),
          peersText: (typeof x.peersText==='string') ? x.peersText : base.peersText
        };
      };

      const patchFrom = (raw) => {
        const x = raw && typeof raw==='object' ? raw : {};
        const p = {};
        if ('lang' in x) p.lang = x.lang;
        if ('theme' in x) p.theme = x.theme;
        if ('threshold' in x) p.threshold = x.threshold;
        if ('serDelta' in x) p.serDelta = x.serDelta;
        if ('maxResults' in x) p.maxResults = x.maxResults;
        if ('peersText' in x) p.peersText = x.peersText;
        if ('__type' in x) p.__type = x.__type;
        return p;
      };

      return { DEFAULT, sanitize, patchFrom, parsePeers };
    })();

    // ===================== Module: Boot (IndexedDB KV for device & settings) =====================
    const Boot = (() => {
      const K_DEV='device_id', K_SET='boot_settings', K_START='last_start';

      const deviceId = async()=> {
        let id = await KV.get(K_DEV);
        if(!id){ id=Utils.uuid(); await KV.set(K_DEV, id); }
        return id;
      };

      const loadSettings = async()=> SettingsModel.sanitize((await KV.get(K_SET)) ?? SettingsModel.DEFAULT);
      const saveSettings = async(s)=> KV.set(K_SET, SettingsModel.sanitize(s));

      const bumpStart = async()=>{
        const prev = await KV.get(K_START);
        await KV.set(K_START, Date.now());
        return prev;
      };

      const resetDevice = async()=> {
        await KV.set(K_DEV, Utils.uuid());
        location.reload();
      };

      return { deviceId, loadSettings, saveSettings, bumpStart, resetDevice };
    })();

    // ===================== Module: SettingsStore (Gun + Boot persist) =====================
    const SettingsStore = (() => {
      const create = ({ gun, deviceId, seed }) => {
        const ee = new Utils.Emitter();
        const ref = Schema.settings(gun, deviceId);
        let cur = SettingsModel.sanitize(seed ?? SettingsModel.DEFAULT);

        ref.once((d)=>{ if (!(d && d.__type==='noosphere_settings')) ref.put(cur); });

        ref.on((d)=>{
          const patch = SettingsModel.patchFrom(d);
          cur = SettingsModel.sanitize({ ...cur, ...patch }, cur);
          ee.emit('change', cur);
        });

        const set = async(nextPartial) => {
          cur = SettingsModel.sanitize({ ...cur, ...nextPartial }, cur);
          await Boot.saveSettings(cur);
          ref.put(cur);
          ee.emit('change', cur);
          return cur;
        };

        return { get:()=>cur, onChange:(fn)=>ee.on('change', fn), set };
      };
      return { create };
    })();

    // ===================== Module: PersonalStore (index-based, stable) =====================
    const PersonalStore = (() => {
      const create = ({ gun, deviceId }) => {
        const ee = new Utils.Emitter();
        const idx = Schema.pIndex(gun, deviceId);
        const notes = Schema.pNotes(gun, deviceId);

        const subscribed = new Set();
        const map = new Map(); // id->note

        const normalize = (id, raw) => {
          const x = raw && typeof raw==='object' ? raw : {};
          if (x.deleted) return null;
          return {
            id,
            text: String(x.text ?? ''),
            createdAt: Number(x.createdAt) || Date.now(),
            updatedAt: Number(x.updatedAt) || Number(x.createdAt) || Date.now(),
            editedAt: x.editedAt ? Number(x.editedAt) : null,
            v: (typeof x.v === 'string') ? x.v : null,
            publishState: String(x.publishState ?? 'none'), // none|pending|published
            worldId: (typeof x.worldId === 'string') ? x.worldId : null
          };
        };

        const list = () => Array.from(map.values()).sort((a,b)=>b.createdAt-a.createdAt);
        const get = (id) => map.get(id) ?? null;

        idx.map().on((val, id)=>{
          if (!id || id==='_' || id==='null') return;
          if (subscribed.has(id)) return;
          subscribed.add(id);

          notes.get(id).on((raw)=>{
            const n = normalize(id, raw);
            if (!n) map.delete(id);
            else map.set(id, n);
            ee.emit('change', list());
          });
        });

        const addLocal = async({ text, v=null, publishState='none', worldId=null }) => {
          const id = Utils.uuid();
          const now = Date.now();
          await GunKit.put(notes.get(id), {
            id, text, v,
            createdAt: now,
            updatedAt: now,
            editedAt: null,
            publishState,
            worldId,
            deleted: false
          });
          await GunKit.put(idx.get(id), { at: now });
          return id;
        };

        const setVector = async(id, v) => GunKit.put(notes.get(id), { v, updatedAt: Date.now() });
        const setPublishState = async(id, patch) => GunKit.put(notes.get(id), { ...patch, updatedAt: Date.now() });
        const updateText = async(id, text) => GunKit.put(notes.get(id), { text, editedAt: Date.now(), updatedAt: Date.now() });
        const remove = async(id) => GunKit.put(notes.get(id), { deleted:true, updatedAt: Date.now() });

        return { onChange:(fn)=>ee.on('change', fn), list, get, addLocal, setVector, setPublishState, updateText, remove };
      };
      return { create };
    })();

    // ===================== Module: WorldStore (shared, index-based) =====================
    const WorldStore = (() => {
      const create = ({ gun }) => {
        const ee = new Utils.Emitter();
        const idx = Schema.wIndex(gun);
        const notes = Schema.wNotes(gun);

        const subscribed = new Set();
        const map = new Map(); // id->note

        const normalize = (id, raw) => {
          const x = raw && typeof raw==='object' ? raw : {};
          if (x.deleted) return null;
          return {
            id,
            text: String(x.text ?? ''),
            createdAt: Number(x.createdAt) || Date.now(),
            v: (typeof x.v === 'string') ? x.v : null,
            author: String(x.author ?? '')
          };
        };

        const list = () => Array.from(map.values()).sort((a,b)=>b.createdAt-a.createdAt);

        idx.map().on((val, id)=>{
          if (!id || id==='_' || id==='null') return;
          if (subscribed.has(id)) return;
          subscribed.add(id);

          notes.get(id).on((raw)=>{
            const n = normalize(id, raw);
            if (!n) map.delete(id);
            else map.set(id, n);
            ee.emit('change', list());
          });
        });

        const publish = async({ text, v, author }) => {
          const id = Utils.uuid();
          const now = Date.now();
          await GunKit.put(notes.get(id), { id, text: String(text).slice(0, 5000), v, author, createdAt: now, deleted:false });
          await GunKit.put(idx.get(id), { at: now });
          return id;
        };

        return { onChange:(fn)=>ee.on('change', fn), list, publish };
      };
      return { create };
    })();

    // ===================== Module: VectorIndexing (background vectors) =====================
    const VectorIndexing = (() => {
      const create = ({ personal }) => {
        const pending = new Set();
        let running = false;

        const enqueue = (id) => { pending.add(id); run(); };

        const enqueueMissing = () => {
          for (const n of personal.list()) if (!n.v) pending.add(n.id);
          run();
        };

        async function run() {
          if (running) return;
          if (!Embedder.ready()) return;
          running = true;
          try{
            for (const id of Array.from(pending)) {
              pending.delete(id);
              const n = personal.get(id);
              if (!n || n.v) continue;
              const vec = await Embedder.embed(n.text);
              const packed = Vectors.packI8(vec);
              await personal.setVector(id, packed);
            }
          } finally {
            running = false;
          }
        }

        return { enqueue, enqueueMissing };
      };
      return { create };
    })();

    // ===================== Module: Publisher (reliable publish queue) =====================
    const Publisher = (() => {
      const create = ({ settings, personal, world, deviceId }) => {
        let running = false;

        const hasRelay = () => SettingsModel.parsePeers(settings.get().peersText).length > 0;

        const tryPublishOne = async(noteId) => {
          const n = personal.get(noteId);
          if (!n) return false;
          if (n.publishState === 'published') return true;

          if (!hasRelay()) return false;
          if (!Embedder.ready()) return false;

          // ensure vector
          let vPacked = n.v;
          if (!vPacked) {
            const vec = await Embedder.embed(n.text);
            vPacked = Vectors.packI8(vec);
            await personal.setVector(n.id, vPacked);
          }

          // publish to world
          const worldId = await world.publish({ text: n.text, v: vPacked, author: deviceId });
          await personal.setPublishState(n.id, { publishState: 'published', worldId });
          return true;
        };

        const run = async() => {
          if (running) return;
          running = true;
          try{
            // publish all pending
            const pend = personal.list().filter(n => n.publishState === 'pending');
            for (const n of pend) {
              await tryPublishOne(n.id);
            }
          } finally {
            running = false;
          }
        };

        const enqueue = async(noteId) => {
          await personal.setPublishState(noteId, { publishState: 'pending' });
          run();
        };

        // react: if settings changed (relay added) or model becomes ready -> run()
        const poke = () => run();

        return { enqueue, poke, hasRelay };
      };
      return { create };
    })();

    // ===================== Module: SearchEngine (local+world+serendipity) =====================
    const SearchEngine = (() => {
      const create = ({ settings, personal, world }) => {
        const cache = new Map(); // id->Float32Array
        const getVec = (id, packed) => {
          if (!packed) return null;
          if (cache.has(id)) return cache.get(id);
          try { const v = Vectors.unpackI8(packed); cache.set(id, v); return v; } catch { return null; }
        };
        const clear = () => cache.clear();

        const search = async(queryText) => {
          const q = String(queryText ?? '').trim();
          const s = settings.get();

          if (!q) return { mode:'empty', personal:[], world:[], ser:[] };
          if (!Embedder.ready()) return { mode:'model_loading', personal:[], world:[], ser:[] };

          const qVec = await Embedder.embed(q);

          const max = s.maxResults;
          const thr = s.threshold;
          const low = Math.max(0, thr - s.serDelta);

          const localHits = [];
          for (const n of personal.list()) {
            const v = getVec(n.id, n.v);
            if (!v) continue;
            const score = Vectors.dot(qVec, v);
            if (score >= thr) localHits.push({ ...n, score });
          }
          localHits.sort((a,b)=>b.score-a.score);

          const worldHits = [];
          const serHits = [];
          for (const w of world.list()) {
            const v = getVec(w.id, w.v);
            if (!v) continue;
            const score = Vectors.dot(qVec, v);
            if (score >= thr) worldHits.push({ ...w, score });
            else if (score >= low) serHits.push({ ...w, score });
          }
          worldHits.sort((a,b)=>b.score-a.score);
          serHits.sort((a,b)=>b.score-a.score);

          return {
            mode:'ok',
            personal: localHits.slice(0, max),
            world: worldHits.slice(0, max),
            ser: serHits.slice(0, max)
          };
        };

        const historySearch = async(queryText) => {
          const q = String(queryText ?? '').trim().toLowerCase();
          const all = personal.list();
          if (!q) return all;
          return all.filter(n => n.text.toLowerCase().includes(q));
        };

        return { search, historySearch, clear };
      };
      return { create };
    })();

            const pub = n.publishState === 'pending' ? `<span class="pill"><span class="dot warn"></span>pending</span>` :

            html += `

          html += `</div>`;

        els.historyContent.innerHTML = html;

      return { pill, setTexts, settingsToUI, uiToSettings, renderCarousel, renderHistory };

    // ===================== Module: Capsule =====================

          UIRender.pill(`${I18n.t('idb')}:${idb ? 'ok' : 'fail'}`, idb ? 'ok' : 'bad'),
          UIRender.pill(`${I18n.t('net')}:${peersCount}`, peersCount ? 'ok' : 'warn'),
          UIRender.pill(modelReady ? I18n.t('modelReady') : I18n.t('modelLoading'), modelReady ? 'ok' : 'warn'),
        ];

        if (toastMsg && Date.now() < toastUntil) pills.push(UIRender.pill(toastMsg, 'ok'));
        els.status.innerHTML = pills.join(' ');
      };

      const openSettings = () => { els.overlay.classList.add('open'); els.settingsPanel.classList.add('open'); };
      const closeSettings = () => { els.overlay.classList.remove('open'); els.settingsPanel.classList.remove('open'); };

      const setTab = (which) => {
        const flow = which === 'flow';
        els.tabFlow.classList.toggle('active', flow);
        els.tabHistory.classList.toggle('active', !flow);
        els.flowView.classList.toggle('active', flow);
        els.historyView.classList.toggle('active', !flow);
        if (!flow) refreshHistory();
      };

      // ---- flow search (semantic) ----
      let searchSeq = 0;
      const refreshFlow = Utils.debounce(async() => {
        const seq = ++searchSeq;
        const q = els.thoughtInput.value.trim();

        if (!q) {
          UIRender.renderCarousel(els.personalCards, [], { emptyText: I18n.t('typeToSearch'), kind:'personal' });
          UIRender.renderCarousel(els.worldCards, [], { emptyText: I18n.t('typeToSearch'), kind:'world' });
          UIRender.renderCarousel(els.serCards, [], { emptyText: I18n.t('typeToSearch'), kind:'world' });
          return;
        }

        const res = await engine.search(q);
        if (seq !== searchSeq) return;

        if (res.mode === 'model_loading') {
          UIRender.renderCarousel(els.personalCards, [], { emptyText: I18n.t('modelLoading'), kind:'personal' });
          UIRender.renderCarousel(els.worldCards, [], { emptyText: I18n.t('modelLoading'), kind:'world' });
          UIRender.renderCarousel(els.serCards, [], { emptyText: I18n.t('modelLoading'), kind:'world' });
          return;
        }

        UIRender.renderCarousel(els.personalCards, res.personal, { emptyText: I18n.t('emptyPersonal'), kind:'personal' });
        UIRender.renderCarousel(els.worldCards, res.world, { emptyText: I18n.t('emptyWorld'), kind:'world' });
        UIRender.renderCarousel(els.serCards, res.ser, { emptyText: I18n.t('emptySer'), kind:'world' });
      }, 280);

      // ---- history ----
      const refreshHistory = Utils.debounce(async() => {
        const q = els.historySearch.value.trim();
        const list = await engine.historySearch(q);
        UIRender.renderHistory(els, list);
      }, 200);

      // ---- actions ----
      const saveLocal = async() => {
        const text = els.thoughtInput.value.trim();
        if (!text) return;

        const id = await personalStore.addLocal({ text, v:null, publishState:'none', worldId:null });
        // background vector
        indexer.enqueueMissing();
        els.thoughtInput.value = '';
        refreshFlow();
        setToast(I18n.t('saved'));
        return id;
      };

      const publishToWorld = async() => {
        const text = els.thoughtInput.value.trim();
        if (!text) return;

        // always save offline immediately
        const localId = await personalStore.addLocal({ text, v:null, publishState:'pending', worldId:null });

        els.thoughtInput.value = '';
        refreshFlow();

        // queue publish (will publish when model+relay ready)
        await publisher.enqueue(localId);

        if (!publisher.hasRelay()) setToast(I18n.t('publishNeedRelay'), 2200);
        else setToast(I18n.t('publishQueued'));

        // run now (maybe succeeds immediately)
        publisher.poke();
      };

      // swipe up to publish
      let touchY = 0;
      const bindSwipe = () => {
        els.thoughtInput.addEventListener('touchstart', (e) => {
          touchY = e.touches?.[0]?.clientY ?? 0;
        }, { passive:true });

        els.thoughtInput.addEventListener('touchend', (e) => {
          const endY = e.changedTouches?.[0]?.clientY ?? 0;
          if (touchY - endY > 60) {
            e.preventDefault();
            publishToWorld();
          }
        }, { passive:false });
      };

      const applySettingsFromUI = async() => {
        const next = SettingsModel.sanitize(UIRender.uiToSettings(els), settingsStore.get());
        await settingsStore.set(next);
        // apply runtime gun peers
        gun.opt({ peers: SettingsModel.parsePeers(next.peersText) });
        // poke publisher in case relay appeared
        publisher.poke();
        engine.clear();
        renderStatus();
        refreshFlow();
      };

      const applyI18nTheme = (s) => {
        I18n.setLang(s.lang);
        Theme.apply(s.theme);
        UIRender.setTexts(els);
        UIRender.settingsToUI(els, s);
      };

      async function start() {
        await Boot.bumpStart();
        deviceId = await Boot.deviceId();
        els.deviceInfo.textContent = `device: ${deviceId}`;

        const bootSettings = await Boot.loadSettings();
        applyI18nTheme(bootSettings);

        // create gun with boot peers
        gun = GunKit.create(SettingsModel.parsePeers(bootSettings.peersText));

        settingsStore = SettingsStore.create({ gun, deviceId, seed: bootSettings });
        personalStore = PersonalStore.create({ gun, deviceId });
        worldStore = WorldStore.create({ gun });

        indexer = VectorIndexing.create({ personal: personalStore });
        engine = SearchEngine.create({ settings: settingsStore, personal: personalStore, world: worldStore });
        publisher = Publisher.create({ settings: settingsStore, personal: personalStore, world: worldStore, deviceId });

        // Settings reactive
        settingsStore.onChange((s) => {
          applyI18nTheme(s);
          gun.opt({ peers: SettingsModel.parsePeers(s.peersText) });
          publisher.poke();
          engine.clear();
          renderStatus();
          refreshFlow();
          if (els.historyView.classList.contains('active')) refreshHistory();
        });

        // Data reactive
        personalStore.onChange(() => {
          renderStatus();
          indexer.enqueueMissing();
          refreshFlow();
          if (els.historyView.classList.contains('active')) refreshHistory();
          // publish pending if possible
          publisher.poke();
        });
        worldStore.onChange(() => {
          renderStatus();
          refreshFlow();
        });

        // Model init
        renderStatus();
        els.publishBtn.disabled = true;
        (async() => {
          try {
            await Embedder.init();
            modelReady = true;
            els.publishBtn.disabled = false;
            renderStatus();
            indexer.enqueueMissing();
            publisher.poke();
          } catch (e) {
            console.error(e);
            modelReady = false;
            els.publishBtn.disabled = true;
            renderStatus();
          }
        })();

        // UI events
        els.tabFlow.addEventListener('click', () => setTab('flow'));
        els.tabHistory.addEventListener('click', () => setTab('history'));

        els.openSettings.addEventListener('click', openSettings);
        els.overlay.addEventListener('click', closeSettings);

        els.threshold.addEventListener('input', () => els.thresholdVal.textContent = Number(els.threshold.value).toFixed(2));
        els.serDelta.addEventListener('input', () => els.serVal.textContent = Number(els.serDelta.value).toFixed(2));

        els.langSel.addEventListener('change', applySettingsFromUI);
        els.themeSel.addEventListener('change', applySettingsFromUI);
        els.threshold.addEventListener('change', applySettingsFromUI);
        els.serDelta.addEventListener('change', applySettingsFromUI);
        els.maxResults.addEventListener('change', applySettingsFromUI);
        els.peersText.addEventListener('change', applySettingsFromUI);

        els.thoughtInput.addEventListener('input', refreshFlow);
        bindSwipe();

        els.saveBtn.addEventListener('click', saveLocal);
        els.publishBtn.addEventListener('click', publishToWorld);

        els.thoughtInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            publishToWorld();
          }
        });

        els.historySearch.addEventListener('input', refreshHistory);

        // History actions delegation
        document.addEventListener('click', async(e) => {
          const del = e.target.closest?.('.delete-btn');
          const edit = e.target.closest?.('.edit-btn');
          const saveEdit = e.target.closest?.('.save-edit-btn');
          const cancel = e.target.closest?.('.cancel-edit-btn');

          if (del) {
            const id = del.dataset.id;
            if (!confirm(I18n.t('confirmDel'))) return;
            await personalStore.remove(id);
            refreshHistory();
            return;
          }

          if (edit) {
            const id = edit.dataset.id;
            const item = edit.closest('.archive-item');
            const note = personalStore.get(id);
            if (!note) return;
            item.querySelector('.text').innerHTML =
              `<textarea class="edit-textarea" style="width:100%;min-height:60px;">${Utils.escapeHTML(note.text)}</textarea>`;
            item.querySelector('.actions').innerHTML =
              `<button class="save-edit-btn" data-id="${id}">${Utils.escapeHTML(I18n.t('save2'))}</button>
               <button class="cancel-edit-btn" data-id="${id}">${Utils.escapeHTML(I18n.t('cancel'))}</button>`;
            return;
          }

          if (saveEdit) {
            const id = saveEdit.dataset.id;
            const item = saveEdit.closest('.archive-item');
            const ta = item.querySelector('.edit-textarea');
            const text = ta?.value?.trim();
            if (!text) { refreshHistory(); return; }
            await personalStore.updateText(id, text);
            // vector rebuild background
            indexer.enqueueMissing();
            refreshHistory();
            return;
          }

          if (cancel) {
            refreshHistory();
            return;
          }
        });

        // Settings buttons
        els.exportBtn.addEventListener('click', () => Capsule.exportNotes(personalStore.list()));
        els.importBtn.addEventListener('click', () => els.importFile.click());
        els.importFile.addEventListener('change', async(e) => {
          const file = e.target.files?.[0];
          e.target.value = '';
          if (!file) return;
          try{
            const imported = await Capsule.importNotes(file);
            for (const n of imported) await personalStore.addLocal({ text:n.text, v:null, publishState:'none', worldId:null });
            indexer.enqueueMissing();
            setToast(`import ${imported.length}`);
          } catch(err) {
            console.error(err);
          }
        });

        els.reindexBtn.addEventListener('click', async() => {
          if (!Embedder.ready()) { setToast(I18n.t('modelLoading'), 1800); return; }
          // brute force: clear vectors by re-putting (simple)
          for (const n of personalStore.list()) {
            const vec = await Embedder.embed(n.text);
            const packed = Vectors.packI8(vec);
            await personalStore.setVector(n.id, packed);
          }
          engine.clear();
          setToast('reindex ok', 1400);
          refreshFlow();
        });

        els.resetDeviceBtn.addEventListener('click', async() => {
          if (!confirm(I18n.t('resetConfirm'))) return;
          await Boot.resetDevice();
        });

        // net info minimal
        els.netInfo.textContent = 'Gun + rindexed (IndexedDB). Add relay to share World.';

        // initial renders
        refreshFlow();
        refreshHistory();
        renderStatus();

        // expose debug
        window.__noosphere = { gun, settingsStore, personalStore, worldStore, engine, publisher };
      }

      return { start };
    })();

    App.start().catch(err => {
      console.error(err);
      alert('Fatal: ' + (err?.message ?? String(err)));
    });
  </script>
</body>
</html>
