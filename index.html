<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>NOOmium</title>

<!-- ============================================ -->
<!-- LAYER 1: UI STYLES -->
<!-- ============================================ -->
<style>
:root {
  --bg: #0a0a0a; --fg: #ededed; --dim: #666; --line: #1a1a1a;
  --accent: #7c5cff; --world: #0ea5e9; --ok: #4ade80;
  --warn: #fbbf24; --err: #ef4444; --insight: #f472b6;
  --mono: ui-monospace, 'SF Mono', Monaco, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100dvh; background: var(--bg); color: var(--fg); font: 14px/1.5 var(--sans); overflow: hidden; }
body { display: flex; flex-direction: column; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font: inherit; color: inherit; background: none; border: none; outline: none; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.topbar { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.brand { font: 700 15px var(--mono); background: linear-gradient(135deg, var(--accent), var(--world)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.spacer { flex: 1; }
.icon-btn { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 6px; color: var(--dim); }
.icon-btn:hover { background: var(--line); color: var(--fg); }

.status-bar { display: flex; gap: 12px; padding: 4px 14px; border-top: 1px solid var(--line); font: 10px var(--mono); color: var(--dim); flex-shrink: 0; }
.st-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--dim); margin-right: 4px; vertical-align: middle; }
.st-ok .st-dot { background: var(--ok); }
.st-err .st-dot { background: var(--err); }
.st-warn .st-dot { background: var(--warn); }
.st-loading .st-dot { background: var(--warn); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: .3; } }

.work { flex: 1; overflow-y: auto; padding: 14px; }
.track { padding: 10px; }
.empty { padding: 40px 20px; text-align: center; color: var(--dim); font: 13px var(--mono); }

.editor { flex-shrink: 0; padding: 12px 14px; border-bottom: 1px solid var(--line); background: #0f0f0f; }
#note-input { width: 100%; min-height: 60px; max-height: 40dvh; resize: none; font: 14px/1.5 var(--sans); }
#note-input::placeholder { color: var(--dim); }
.editor-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn { padding: 6px 12px; border: 1px solid var(--line); border-radius: 6px; font: 12px var(--mono); transition: .15s; }
.btn:hover { background: var(--line); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #6b4eff; }

.card { background: #111; border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 8px; transition: .15s; position: relative; }
.card:hover { border-color: #2a2a2a; }
.card.world { border-left: 3px solid var(--world); }
.card.insight { border-left: 3px solid var(--insight); background: rgba(244, 114, 182, .04); }
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font: 10px var(--mono); color: var(--dim); flex-wrap: wrap; }
.card-meta .src { padding: 1px 5px; background: var(--bg); border-radius: 3px; }
.card-meta .src.world { color: var(--world); }
.card-meta .src.insight { color: var(--insight); }
.card-meta .score { color: var(--accent); }
.card-body { font: 14px/1.5 var(--sans); white-space: pre-wrap; word-wrap: break-word; }
.card-actions { display: flex; gap: 4px; margin-top: 8px; opacity: 0; transition: .15s; }
.card:hover .card-actions { opacity: 1; }
.card-action { padding: 4px 8px; font: 11px var(--mono); color: var(--dim); border-radius: 4px; }
.card-action:hover { background: var(--line); color: var(--fg); }
.card-action.del:hover { color: var(--err); }

.toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--fg); color: var(--bg); padding: 8px 16px; border-radius: 6px; font: 12px var(--mono); z-index: 200; opacity: 0; transition: .25s; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.err { background: var(--err); color: #fff; }
.toast.ok { background: var(--ok); color: #000; }

@media (max-width: 600px) {
  .topbar { padding: 8px 10px; }
  .editor { padding: 10px; }
  .card-actions { opacity: 1; }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!-- LAYER 2: UI MARKUP -->
<!-- ============================================ -->
<header class="topbar">
  <div class="brand">NOOmium</div>
  <div class="spacer"></div>
  <button class="icon-btn" id="btn-settings" title="Настройки">⚙</button>
</header>

<section class="editor">
  <textarea id="note-input" placeholder="О чём думаешь?"></textarea>
  <div class="editor-actions">
    <button class="btn btn-primary" id="btn-save">Сохранить</button>
  </div>
</section>

<main class="work" id="work">
  <div class="track" id="track"></div>
</main>

<div class="status-bar">
  <span class="st-loading" id="st-db"><span class="st-dot"></span>DB</span>
  <span class="st-loading" id="st-ai"><span class="st-dot"></span>AI</span>
  <span class="st-loading" id="st-net"><span class="st-dot"></span>P2P</span>
</div>

<div class="toast" id="toast"></div>

<!-- ============================================ -->
<!-- SCRIPT -->
<!-- ============================================ -->
<script type="module">
// ============================================
// CONTRACT: NOO-framework v1.0
// ============================================

// === LAYER: BOOT | MODULE: GlobalHandlers ===
// [MANIFEST] provides: глобальные обработчики
// [RULE] подавляет шум, ловит критические ошибки
window.addEventListener('error', (e) => {
  console.error('[Global]', e.error || e.message);
});
window.addEventListener('unhandledrejection', (e) => {
  const msg = e.reason?.message || String(e.reason);
  if (msg.includes('connection') || msg.includes('WebSocket') || msg.includes('NetworkError')) {
    e.preventDefault();
    return;
  }
  console.error('[Rejection]', e.reason);
});

// === LAYER: CORE | MODULE: Config ===
// [MANIFEST] provides: C, saveCfg
// [RULE] единый источник правды
const C = {
  DB: 'noomium_v1',
  STORE_NOTES: 'notes',
  DEBOUNCE: 400,
  state: {}
};

try {
  const s = localStorage.getItem('noomium_cfg');
  if (s) Object.assign(C.state, JSON.parse(s));
} catch {}

const saveCfg = () => {
  try { localStorage.setItem('noomium_cfg', JSON.stringify(C.state)); } catch {}
};

// === LAYER: CORE | MODULE: Utils ===
// [MANIFEST] provides: uuid, fnv1a, esc, toast, setStatus, fmtTime
// [RULE] чистые функции без сайд-эффектов
const uuid = () => crypto.randomUUID();

const fnv1a = (s) => {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return 'h' + (h >>> 0).toString(16);
};

const esc = (s) => String(s).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let toastTimer;
const toast = (msg, type = '') => {
  const el = document.getElementById('toast');
  if (!el) return;
  el.className = `toast show ${type}`;
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', 2500);
};

const setStatus = (id, text, cls = '') => {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `st-${cls}`;
  let textNode = null;
  for (const node of el.childNodes) {
    if (node.nodeType === 3) { textNode = node; break; }
  }
  if (textNode) textNode.textContent = text;
  else el.append(document.createTextNode(text));
};

const fmtTime = (ts) => {
  const d = new Date(ts);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const time = d.toTimeString().slice(0, 5);
  return isToday ? time : `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')} ${time}`;
};

// === LAYER: CORE | MODULE: Storage ===
// [MANIFEST] provides: put, get, del, all, reset
// [RULE] IndexedDB wrapper с импотентным открытием
const Storage = (() => {
  let db = null;
  const open = () => new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(C.DB, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(C.STORE_NOTES)) {
        d.createObjectStore(C.STORE_NOTES, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });

  const tx = async (mode, fn) => {
    const d = await open();
    return new Promise((res, rej) => {
      const t = d.transaction(C.STORE_NOTES, mode);
      const s = t.objectStore(C.STORE_NOTES);
      const r = fn(s);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  };

  return {
    put: (item) => tx('readwrite', s => s.put(item)),
    get: (id) => tx('readonly', s => s.get(id)),
    del: (id) => tx('readwrite', s => s.delete(id)),
    all: () => tx('readonly', s => s.getAll()),
    reset: async () => {
      if (db) { db.close(); db = null; }
      await new Promise(r => {
        const req = indexedDB.deleteDatabase(C.DB);
        req.onsuccess = req.onerror = req.onblocked = () => r();
      });
    }
  };
})();

// === LAYER: CORE | MODULE: AI ===
// [MANIFEST] provides: embed, aiReady
// [RULE] заглушка для embeddings (опционально)
const aiReady = async () => {
  setStatus('st-ai', ' AI: off', 'warn');
  return null;
};

const embed = async (text) => {
  return null;
};

// === LAYER: CORE | MODULE: Network ===
// [MANIFEST] provides: publish, subscribe
// [RULE] заглушка для P2P (опционально)
const publish = async (payload) => {
  setStatus('st-net', ' P2P: off', 'warn');
  return false;
};

const subscribe = (fn) => {
  setStatus('st-net', ' P2P: off', 'warn');
};

// === LAYER: UI | MODULE: Renderer ===
// [MANIFEST] provides: render, empty, card
// [RULE] чистый рендер, без бизнес-логики
const UI = {
  render: (items, tab = 'local') => {
    const track = document.getElementById('track');
    if (!track) return;
    if (!items.length) {
      track.innerHTML = UI.empty(tab);
      return;
    }
    track.innerHTML = items.map(i => UI.card(i)).join('');
  },

  card: (item) => {
    const src = item.src || 'local';
    const srcLabel = { local: 'Л', world: 'М', insight: 'О' }[src] || 'Л';
    const score = item.score != null ? ` · ${item.score.toFixed(2)}` : '';
    const actions = src === 'local'
      ? `<button class="card-action" data-act="copy" data-id="${item.id}">копировать</button>
         <button class="card-action del" data-act="del" data-id="${item.id}">удалить</button>`
      : `<button class="card-action" data-act="adopt" data-id="${item.id}">забрать</button>`;
    return `<div class="card ${src}" data-id="${item.id}">
      <div class="card-meta">
        <span class="src ${src}">${srcLabel}</span>
        <span>${fmtTime(item.createdAt)}</span>
        ${score ? `<span class="score">${score}</span>` : ''}
        ${item.peer ? `<span>от ${esc(item.peer)}</span>` : ''}
      </div>
      <div class="card-body">${esc(item.text)}</div>
      <div class="card-actions">${actions}</div>
    </div>`;
  },

  empty: (tab) => {
    const msgs = {
      local: 'В базе пока ничего нет. Напиши первую мысль.',
      world: 'Пока никто не делится.',
      insight: 'Озарений нет.',
      stream: 'Поток пуст.'
    };
    return `<div class="empty">${esc(msgs[tab] || 'пусто')}</div>`;
  }
};

// === LAYER: ENGINE | MODULE: BusinessLogic ===
// [MANIFEST] provides: save, search
// [RULE] оркестрация слоёв ниже
const save = async () => {
  const text = document.getElementById('note-input').value.trim();
  if (!text) { toast('пусто', 'err'); return; }
  await Storage.put({
    id: uuid(),
    text,
    createdAt: Date.now()
  });
  document.getElementById('note-input').value = '';
  toast('сохранено', 'ok');
  await search();
};

const search = async () => {
  const all = await Storage.all();
  all.sort((a, b) => b.createdAt - a.createdAt);
  UI.render(all.map(n => ({ ...n, src: 'local' })), 'local');
};

// === LAYER: UI | MODULE: EventHandlers ===
// [MANIFEST] provides: bind
// [RULE] только DOM-события, без бизнес-логики
const bind = () => {
  document.getElementById('btn-save')?.addEventListener('click', save);

  document.getElementById('work')?.addEventListener('click', async (e) => {
    const el = e.target.closest('[data-act]');
    if (!el) return;
    const { act, id } = el.dataset;
    if (act === 'del') {
      await Storage.del(id);
      toast('удалено', 'ok');
      await search();
    } else if (act === 'copy') {
      const all = await Storage.all();
      const n = all.find(x => x.id === id);
      if (n) {
        try {
          await navigator.clipboard.writeText(n.text);
          toast('скопировано', 'ok');
        } catch {}
      }
    }
  });
};

// === LAYER: BOOT | MODULE: Bootstrap ===
// [MANIFEST] provides: boot
// [RULE] параллельный запуск, изоляция ошибок
const boot = async () => {
  try {
    bind();

    await Promise.allSettled([
      Storage.all()
        .then(() => setStatus('st-db', ' DB', 'ok'))
        .catch(() => setStatus('st-db', ' DB', 'err')),
      aiReady(),
      Promise.resolve(subscribe())
    ]);

    await search();
    console.log('NOOmium ready');
  } catch (err) {
    console.error('[Bootstrap] fatal:', err);
    toast('критическая ошибка', 'err');
  }
};

boot();
</script>
</body>
</html>
