<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Transformers.js Test</title>
</head>
<body>
    <h1>Тест эмбеддингов</h1>
    <button id="calc-btn">Создать эмбеддинг</button>
    <pre id="output">Нажмите кнопку для старта...</pre>

    <!-- Важно: используем type="module" -->
    <script type="module">
        // Импортируем библиотеку напрямую из CDN
        import { pipeline } from 'https://jsdelivr.net';

        const btn = document.getElementById('calc-btn');
        const output = document.getElementById('output');

        btn.addEventListener('click', async () => {
            output.innerText = 'Загрузка модели (это займет время при первом запуске)...';
            
            try {
                // Модель скачается сама из интернета, ничего локально класть не надо!
                const extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                
                output.innerText = 'Модель загружена. Считаем вектор...';
                
                const result = await extractor('Привет, мир!', { pooling: 'mean', normalize: true });
                
                // Выводим первые 5 чисел вектора для проверки
                const vectorArray = Array.from(result.data).slice(0, 5);
                output.innerText = `Успех!\nРазмерность вектора: ${result.data.length}\nПервые 5 значений: ${JSON.stringify(vectorArray)}`;
            } catch (error) {
                output.innerText = `Ошибка: ${error.message}`;
                console.error(error);
            }
        });
    </script>
</body>
</html>
