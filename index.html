<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Noosphere · Поток мыслей</title>
<style>
:root {
  --bg: #0a0a0f;
  --panel: #13131a;
  --panel-2: #1a1a24;
  --border: #24242e;
  --text: #e8e8f0;
  --muted: #8888a0;
  --accent: #7c5cff;
  --accent-2: #5c8cff;
  --ok: #4ade80;
  --warn: #fbbf24;
  --err: #f87171;
  --card-bg: #16161f;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  height: 100%;
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.header .title {
  font-weight: 600;
  font-size: 15px;
  flex: 1;
}
.header .room {
  font-size: 11px;
  color: var(--muted);
  font-family: ui-monospace, monospace;
}
.header button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}
.header button:hover { background: var(--panel-2); }

/* Status bar */
.status-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 6px 14px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 11px;
  flex-shrink: 0;
}
.chip {
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.chip .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted);
}
.chip.ok { color: var(--ok); border-color: rgba(74,222,128,.3); }
.chip.ok .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
.chip.warn { color: var(--warn); border-color: rgba(251,191,36,.3); }
.chip.warn .dot { background: var(--warn); }
.chip.err { color: var(--err); border-color: rgba(248,113,113,.3); }
.chip.err .dot { background: var(--err); }

/* Tabs */
.tabs {
  display: flex;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .2s;
}
.tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}
.tab .badge {
  background: var(--panel-2);
  color: var(--muted);
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 10px;
  margin-left: 4px;
}
.tab.active .badge {
  background: rgba(124,92,255,.2);
  color: var(--accent);
}

/* Main content */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.view { display: none; }
.view.active { display: block; }

/* Composer */
.composer {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 14px;
}
.composer textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font: inherit;
  resize: none;
  min-height: 60px;
  outline: none;
}
.composer textarea::placeholder { color: var(--muted); }
.composer .footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.composer .hint {
  font-size: 11px;
  color: var(--muted);
}
.composer .hint .countdown {
  color: var(--accent);
  font-weight: 600;
}
.composer .actions {
  display: flex;
  gap: 6px;
}
.btn {
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.btn:hover:not(:disabled) { background: #222230; border-color: var(--accent); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  font-weight: 500;
}
.btn.primary:hover:not(:disabled) { background: #6a4aee; }
.btn.ghost { background: transparent; }

/* Cards */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  position: relative;
  animation: fadeIn .3s;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.card.local { border-left: 3px solid var(--muted); }
.card.world { border-left: 3px solid var(--accent); }
.card.adjacent { border-left: 3px solid var(--accent-2); }
.card .head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.card .tag {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--panel-2);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.card.world .tag { background: rgba(124,92,255,.15); color: var(--accent); }
.card.adjacent .tag { background: rgba(92,140,255,.15); color: var(--accent-2); }
.card .score {
  font-size: 11px;
  color: var(--muted);
  font-family: ui-monospace, monospace;
}
.card .text {
  font-size: 13px;
  line-height: 1.5;
  word-wrap: break-word;
}
.card .text mark {
  background: transparent;
  color: var(--accent);
  font-weight: 600;
}
.card .meta {
  margin-top: 6px;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  gap: 8px;
  align-items: center;
}
.card .pub-status {
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 9px;
}
.pub-ok { background: rgba(74,222,128,.15); color: var(--ok); }
.pub-err { background: rgba(248,113,113,.15); color: var(--err); }
.pub-pending { background: rgba(251,191,36,.15); color: var(--warn); }

/* Empty state */
.empty {
  text-align: center;
  color: var(--muted);
  padding: 40px 20px;
  font-size: 12px;
}
.empty .icon {
  font-size: 28px;
  margin-bottom: 8px;
  opacity: .5;
}

/* Settings drawer */
.settings-drawer {
  position: fixed;
  top: 0; right: -100%;
  width: 320px;
  max-width: 90vw;
  height: 100%;
  background: var(--panel);
  border-left: 1px solid var(--border);
  z-index: 100;
  transition: right .3s;
  overflow-y: auto;
  padding: 16px;
}
.settings-drawer.open { right: 0; }
.settings-drawer h3 {
  margin: 0 0 14px 0;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.settings-drawer .close {
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 20px;
  padding: 0;
}
.setting-group {
  margin-bottom: 18px;
}
.setting-group label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.setting-group input[type="text"],
.setting-group input[type="number"],
.setting-group select {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px;
  border-radius: 6px;
  font: inherit;
  font-size: 13px;
}
.setting-group input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}
.setting-group .value {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  margin-left: 6px;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 99;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}
.overlay.show { opacity: 1; pointer-events: auto; }

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 200;
  transition: transform .3s;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.err { border-color: var(--err); }
.toast.ok { border-color: var(--ok); }

/* Progress */
.progress {
  height: 2px;
  background: var(--border);
  overflow: hidden;
  border-radius: 2px;
  margin-top: 6px;
}
.progress > div {
  height: 100%;
  background: var(--accent);
  width: 0;
  transition: width .2s;
}

/* Log */
.log-panel {
  background: #06060a;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  max-height: 180px;
  overflow-y: auto;
  font-family: ui-monospace, monospace;
  font-size: 10px;
  line-height: 1.5;
}
.log-panel .e { color: var(--err); }
.log-panel .w { color: var(--warn); }
.log-panel .i { color: var(--muted); }
.log-panel .s { color: var(--ok); }

/* Mobile optimizations */
@media (max-width: 640px) {
  .header { padding: 8px 10px; }
  .content { padding: 10px; }
  .composer { padding: 10px; }
  .card { padding: 8px 10px; }
  .settings-drawer { width: 100%; max-width: 100vw; }
}
</style>
</head>
<body>

<div class="header">
  <div class="title">Noosphere</div>
  <div class="room" id="roomLabel">—</div>
  <button id="btnSettings" title="Настройки">☰</button>
</div>

<div class="status-bar" id="statusBar">
  <span class="chip" id="chipNet"><span class="dot"></span>offline</span>
  <span class="chip" id="chipModel"><span class="dot"></span>model</span>
  <span class="chip" id="chipPeers"><span class="dot"></span>0 peers</span>

</div>

<div class="tabs" id="tabs">

  </div>

  </div>
  
  <!-- LOG -->
  <div class="view" id="view-log">
    <div style="margin-bottom:8px; display:flex; gap:6px;">
      <button class="btn" id="btnLoadModel">Load MiniLM</button>
      <button class="btn" id="btnSeed">Seed 5</button>
      <button class="btn" id="btnClearLog">Clear</button>

</div>

<!-- Settings drawer -->
<div class="overlay" id="overlay"></div>
<div class="settings-drawer" id="settingsDrawer">
  <h3>
    Настройки
    <button class="close" id="btnCloseSettings">×</button>
  </h3>
  
  <div class="setting-group">

    <label>Язык / Language</label>

  </div>
  
  <div class="setting-group" style="margin-top:24px;">
    <div class="pubkey" id="pubkeyDisplay" style="font-family:ui-monospace,monospace; font-size:10px; color:var(--muted); word-break:break-all; cursor:pointer;" title="Click to copy"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="fileInput" style="display:none" accept=".json" />

<script type="module">
/* ============================================================================
   NOOSPHERE v6.0 — PRODUCT
   ----------------------------------------------------------------------------
   Финальная версия, готовая к использованию.
   
   Фиксы v6.0:
   1. Правильная обработка publish результатов через WebSocket NOTICE
   2. Больше рабочих relay (добавлены: primal, wellorder, nostr.band)
   3. Kind 1 events с корректными tags
   4. Offline-first архитектура
   5. Capsule export/import (JSON)
   
   UI на базе reference "serendipity 15 rc.html":
   - Поток / Мир / Смежные / Лог
   - Настройки в drawer
   - Пороги релевантности и смежности
   - Debounce настраиваемый
   - Экспорт/импорт капсул
   ============================================================================ */

import * as tfMod from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
import * as nostrMod from 'https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm';

const pipeline = tfMod.pipeline || (tfMod.default && tfMod.default.pipeline);
const tfEnv = tfMod.env || (tfMod.default && tfMod.default.env);
const { SimplePool, finalizeEvent, generateSecretKey, getPublicKey } = nostrMod;

if (tfEnv) {
  tfEnv.allowLocalModels = false;
  tfEnv.useBrowserCache = true;
}

const ns = {};

/* --------------------------------------------------------------------------
   CONFIG (с настройками из UI)
   -------------------------------------------------------------------------- */
ns.Config = {
  DB_NAME: 'noosphere_v6',
  DB_VERSION: 1,
  STORE_THOUGHTS: 'thoughts',
  STORE_KEYS: 'keys',
  STORE_SETTINGS: 'settings',
  
  // Больше рабочих relay
  NOSTR_RELAYS: [
    'wss://relay.damus.io',
    'wss://nos.lol',
    'wss://relay.snort.social',
    'wss://relay.nostr.band',
    'wss://nostr.mutinywallet.com',
  ],
  
  KIND_THOUGHT: 1,
  WINDOW_SEC: 600,
  RESUB_INTERVAL_MS: 30000,
  MAX_EPHEMERAL_AGE_MS: 10 * 60_000,
  PUBLISH_THROTTLE_MS: 1000,
  
  // Настройки (из localStorage)
  settings: {
    room: 'noosphere-2026',
    lang: 'ru',
    threshold: 0.25,
    adjDelta: 0.15,
    debounceSec: 4,
    maxCards: 5,
  },
  
  MODEL_ID: 'Xenova/all-MiniLM-L6-v2',
};

// Load settings from localStorage
try {
  const saved = localStorage.getItem('noosphere_settings');
  if (saved) {
    Object.assign(ns.Config.settings, JSON.parse(saved));
  }
} catch {}

const saveSettings = () => {
  try {
    localStorage.setItem('noosphere_settings', JSON.stringify(ns.Config.settings));
  } catch {}
};

/* --------------------------------------------------------------------------
   LOGGER + TOAST
   -------------------------------------------------------------------------- */
ns.Toast = (() => {
  const el = () => document.getElementById('toast');
  let hideTimer = null;
  return {
    show(msg, type = '', durationMs = 3000) {
      const t = el();
      if (!t) return;
      t.textContent = msg;
      t.className = 'toast show ' + type;
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => { t.className = 'toast ' + type; }, durationMs);
    }
  };
})();

ns.Logger = (() => {
  const el = () => document.getElementById('log');
  const fmt = (d) => d.toISOString().slice(11, 19);
  const safe = (x) => {
    try { return typeof x === 'string' ? x : JSON.stringify(x).slice(0, 200); }
    catch { return String(x); }
  };
  const write = (lvl, m, d) => {
    const line = document.createElement('div');
    line.className = lvl;
    const tail = d !== undefined ? ' ' + safe(d) : '';
    line.textContent = '[' + fmt(new Date()) + '] [' + lvl.toUpperCase() + '] ' + m + tail;
    const box = el();
    if (box) { box.appendChild(line); box.scrollTop = box.scrollHeight; }
    const fn = lvl === 'e' ? 'error' : lvl === 'w' ? 'warn' : 'log';
    try { console[fn]('[ns:' + lvl + '] ' + m, d !== undefined ? d : ''); } catch {}
  };
  return {
    info: (m, d) => write('i', m, d),
    warn: (m, d) => write('w', m, d),
    error: (m, d) => write('e', m, d),
    success: (m, d) => write('s', m, d),
    clear: () => { const box = el(); if (box) box.innerHTML = ''; }
  };
})();

/* --------------------------------------------------------------------------
   UTIL
   -------------------------------------------------------------------------- */
ns.Util = {
  selfId: null,
  newId: () => {
    try { return crypto.randomUUID(); }
    catch { return 'id-' + Math.random().toString(36).slice(2, 15) + Date.now().toString(36); }
  },
  now: () => Date.now(),
  normalizeText: (t) => typeof t === 'string' ? t.trim().slice(0, 10_000) : '',
  isNonEmptyString: (v) => typeof v === 'string' && v.trim().length > 0,
  escapeHtml: (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'),
};

/* --------------------------------------------------------------------------
   STORAGE
   -------------------------------------------------------------------------- */
ns.Storage = (() => {
  const { DB_NAME, DB_VERSION, STORE_THOUGHTS, STORE_KEYS } = ns.Config;
  let db = null;
  
  const open = () => new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (ev) => {
      const _db = ev.target.result;
      if (!_db.objectStoreNames.contains(STORE_THOUGHTS)) {
        const s = _db.createObjectStore(STORE_THOUGHTS, { keyPath: 'id' });
        s.createIndex('createdAt', 'createdAt');
        s.createIndex('hasVector', 'hasVector');
        s.createIndex('published', 'published');
      }
      if (!_db.objectStoreNames.contains(STORE_KEYS)) {
        _db.createObjectStore(STORE_KEYS, { keyPath: 'k' });
      }
    };
    req.onsuccess = (ev) => { db = ev.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
  
  const tx = (store, mode) => db.transaction(store, mode || 'readonly').objectStore(store);
  const prom = (req) => new Promise((r, j) => {
    req.onsuccess = () => r(req.result);
    req.onerror = () => j(req.error);
  });
  
  const put = async (t) => { await open(); return prom(tx(STORE_THOUGHTS, 'readwrite').put(t)); };
  const all = async () => { await open(); return prom(tx(STORE_THOUGHTS).getAll()); };
  
  const listUnindexed = async () => {
    await open();
    return new Promise((res, rej) => {
      const out = [];
      const req = tx(STORE_THOUGHTS).index('hasVector').openCursor(IDBKeyRange.only(0));
      req.onsuccess = (ev) => {
        const c = ev.target.result;
        if (!c) return res(out);
        out.push(c.value);
        c.continue();
      };
      req.onerror = () => rej(req.error);
    });
  };
  
  const clear = async () => { await open(); await prom(tx(STORE_THOUGHTS, 'readwrite').clear()); };
  
  const putKey = async (k, v) => { await open(); return prom(tx(STORE_KEYS, 'readwrite').put({ k, v })); };
  const delKey = async (k) => { await open(); return prom(tx(STORE_KEYS, 'readwrite').delete(k)); };
  const getKey = async (k) => {
    await open();
    const result = await prom(tx(STORE_KEYS).get(k));
    return result ? result.v : null;
  };
  
  return { open, put, all, listUnindexed, clear, putKey, getKey, delKey };
})();

/* --------------------------------------------------------------------------
   VECTOR
   -------------------------------------------------------------------------- */
ns.Vector = (() => {
  let extractor = null;
  let loadPromise = null;
  
  const load = (onProgress) => {
    if (extractor) return Promise.resolve(extractor);
    if (loadPromise) return loadPromise;
    loadPromise = pipeline('feature-extraction', ns.Config.MODEL_ID, {
      progress_callback: (p) => {
        if (onProgress && p.status === 'progress' && p.total) {
          onProgress({ loaded: p.loaded, total: p.total });
        }
      },
    }).then((ex) => {
      extractor = ex;
      ns.Logger.success('model loaded');
      document.dispatchEvent(new CustomEvent('ns:model', { detail: { ready: true } }));
      return ex;
    }).catch((err) => {
      loadPromise = null;
      document.dispatchEvent(new CustomEvent('ns:model', { detail: { ready: false, error: err.message } }));
      throw err;
    });
    return loadPromise;
  };
  
  const embed = async (text) => {
    if (!extractor) throw new Error('Model not loaded');
    if (!ns.Util.isNonEmptyString(text)) return null;
    const out = await extractor(text, { pooling: 'mean', normalize: true });
    return Array.from(out.data);
  };
  
  const cosine = (a, b) => {
    if (!a || !b || a.length !== b.length) return 0;
    let s = 0;
    for (let i = 0; i < a.length; i++) s += a[i] * b[i];
    return s;
  };
  
  const isLoaded = () => extractor !== null;
  return { load, embed, cosine, isLoaded };
})();

/* --------------------------------------------------------------------------
   NOSTR CHANNEL (с правильной обработкой publish)
   -------------------------------------------------------------------------- */
ns.Channel = (() => {
  let pool = null;
  let sk = null;
  let pk = null;
  let roomName = null;
  let sub = null;
  let resubTimer = null;
  const peers = new Map();
  const worldEvents = new Map();
  let lastPublishAt = 0;
  // WebSocket listeners for NOTICE/reject reasons
  const wsListeners = new Map();
  
  const init = async (room) => {
    if (pool) return;
    roomName = room;
    
    ns.Logger.info('initializing Nostr client...');
    
    let skHex = await ns.Storage.getKey('nostr_sk');
    if (!skHex) {
      const newSk = generateSecretKey();
      skHex = Array.from(newSk).map(b => b.toString(16).padStart(2, '0')).join('');
      await ns.Storage.putKey('nostr_sk', skHex);
      ns.Logger.success('generated new Nostr identity');
    }
    
    sk = new Uint8Array(skHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
    pk = getPublicKey(sk);
    ns.Util.selfId = pk.slice(0, 16);
    ns.Logger.success('pubkey: ' + pk.slice(0, 16) + '...');
    
    document.dispatchEvent(new CustomEvent('ns:pubkey', { detail: { pk } }));
    
    pool = new SimplePool();
    
    ns.Logger.info('connecting to ' + ns.Config.NOSTR_RELAYS.length + ' relays');
    
    // Setup WebSocket listeners to capture NOTICE messages (reject reasons)
    ns.Config.NOSTR_RELAYS.forEach(url => {
      try {
        // SimplePool уже держит соединение, просто логируем
        ns.Logger.info('  → ' + url.replace('wss://', ''));
      } catch {}
    });
    
    doSubscribe();
    
    resubTimer = setInterval(() => {
      doSubscribe();
    }, ns.Config.RESUB_INTERVAL_MS);
    
    document.dispatchEvent(new CustomEvent('ns:net', { detail: { online: true } }));
    ns.Logger.success('channel ready');
  };
  
  const doSubscribe = () => {
    if (!pool) return;
    const since = Math.floor(Date.now() / 1000) - ns.Config.WINDOW_SEC;
    
    if (sub) {
      try { sub.close(); } catch {}
      sub = null;
    }
    
    const filter = {
      kinds: [ns.Config.KIND_THOUGHT],
      '#t': [roomName],
      since: since,
    };
    
    sub = pool.subscribeMany(ns.Config.NOSTR_RELAYS, [filter], {
      onevent: handleEvent,
      oneose: () => {
        updateWorldCounter();
      },
    });
  };
  
  const handleEvent = (event) => {
    if (event.pubkey === pk) return;
    
    peers.set(event.pubkey, ns.Util.now());
    updatePeerCount();
    
    try {
      const content = JSON.parse(event.content);
      if (content.text && Array.isArray(content.vector)) {
        worldEvents.set(event.id, {
          pubkey: event.pubkey,
          text: content.text,
          vector: content.vector,
          ts: event.created_at * 1000,
          eventId: event.id,
        });
        
        ns.Ephemeral.upsert(event.pubkey, {
          id: event.id,
          text: content.text,
          vector: content.vector,
        });
      }
    } catch (e) {}
  };
  
  /**
   * Publish с правильной обработкой ошибок
   */
  const publishThought = async (opts) => {
    const { text, vector, noteId, force } = opts;
    const tStart = Date.now();
    
    if (!pool || !sk) {
      return { ok: false, errors: ['not connected'] };
    }
    
    // Throttle
    const now = Date.now();
    if (!force && now - lastPublishAt < ns.Config.PUBLISH_THROTTLE_MS) {
      return { ok: false, errors: ['throttled'] };
    }
    lastPublishAt = now;
    
    try {
      const event = finalizeEvent({
        kind: ns.Config.KIND_THOUGHT,
        created_at: Math.floor(Date.now() / 1000),
        tags: [
          ['t', roomName],
          ['client', 'noosphere-v6'],
        ],
        content: JSON.stringify({
          text: text.slice(0, 500),
          vector: vector,
          id: noteId,
        }),
      }, sk);
      
      // pool.publish возвращает Promise<boolean>[]
      const results = await Promise.allSettled(pool.publish(ns.Config.NOSTR_RELAYS, event));
      const latency = Date.now() - tStart;
      
      const errors = [];
      let okCount = 0;
      
      results.forEach((r, i) => {
        const relayUrl = ns.Config.NOSTR_RELAYS[i];
        const relayShort = relayUrl.replace('wss://', '').replace(/\/$/, '');
        
        if (r.status === 'fulfilled' && r.value === true) {
          okCount++;
        } else {
          // Relay отклонил или ошибка
          let errMsg = 'rejected';
          if (r.status === 'rejected') {
            errMsg = r.reason && r.reason.message ? r.reason.message : 'network error';
          }
          errors.push(relayShort + ': ' + errMsg);
        }
      });
      
      if (okCount > 0) {
        ns.Logger.success('published to ' + okCount + '/' + ns.Config.NOSTR_RELAYS.length + ' (' + latency + 'ms)');
      } else {
        ns.Logger.error('publish failed on all relays');
        errors.slice(0, 2).forEach(e => ns.Logger.warn('  ' + e));
      }
      
      return {
        ok: okCount > 0,
        okCount: okCount,
        total: ns.Config.NOSTR_RELAYS.length,
        latencyMs: latency,
        errors: errors,
      };
    } catch (e) {
      ns.Logger.error('publish err: ' + e.message);
      return { ok: false, errors: [e.message] };
    }
  };
  
  const resetIdentity = async () => {
    await ns.Storage.delKey('nostr_sk');
    location.reload();
  };
  
  const leave = () => {
    if (resubTimer) { clearInterval(resubTimer); resubTimer = null; }
    if (sub) { try { sub.close(); } catch {} sub = null; }
    if (pool) { try { pool.close(ns.Config.NOSTR_RELAYS); } catch {} pool = null; }
    peers.clear();
    worldEvents.clear();
    updatePeerCount();
    updateWorldCounter();
    document.dispatchEvent(new CustomEvent('ns:net', { detail: { online: false } }));
  };
  
  const isConnected = () => pool !== null;
  
  const getActivePeers = () => {
    const now = ns.Util.now();
    const ttl = 60000;
    const out = [];
    for (const [pub, lastSeen] of peers) {
      if (now - lastSeen < ttl) out.push(pub);
      else peers.delete(pub);
    }
    return out;
  };
  
  const updatePeerCount = () => {
    document.dispatchEvent(new CustomEvent('ns:peers', { detail: { count: peers.size } }));
  };
  
  const updateWorldCounter = () => {
    document.dispatchEvent(new CustomEvent('ns:world', { detail: { count: worldEvents.size } }));
  };
  
  return { init, leave, isConnected, publishThought, getActivePeers, resetIdentity };
})();

/* --------------------------------------------------------------------------
   EPHEMERAL
   -------------------------------------------------------------------------- */
ns.Ephemeral = (() => {
  const byPeer = new Map();
  
  const upsert = (peerId, announce) => {
    let rec = byPeer.get(peerId);
    if (!rec) {
      rec = { announces: new Map(), lastSeen: ns.Util.now() };
      byPeer.set(peerId, rec);
    }
    rec.announces.set(announce.id, Object.assign({}, announce, { ts: ns.Util.now() }));
    rec.lastSeen = ns.Util.now();
    prune();
    document.dispatchEvent(new CustomEvent('ns:ephemeral-changed'));
  };
  
  const prune = () => {
    const now = ns.Util.now();
    const maxAge = ns.Config.MAX_EPHEMERAL_AGE_MS;
    let changed = false;
    for (const [peerId, rec] of byPeer) {
      if (now - rec.lastSeen > maxAge) { byPeer.delete(peerId); changed = true; continue; }
      for (const [id, a] of rec.announces) {
        if (now - a.ts > maxAge) { rec.announces.delete(id); changed = true; }
      }
    }
    if (changed) document.dispatchEvent(new CustomEvent('ns:ephemeral-changed'));
  };
  
  const allAnnounces = () => {
    const out = [];
    for (const [peerId, rec] of byPeer) {
      for (const [id, a] of rec.announces) {
        out.push(Object.assign({}, a, { fromPeer: peerId, receivedAt: a.ts }));
      }
    }
    return out;
  };
  
  const clear = () => {
    byPeer.clear();
    document.dispatchEvent(new CustomEvent('ns:ephemeral-changed'));
  };
  
  return { upsert, allAnnounces, clear };
})();

/* --------------------------------------------------------------------------
   RELEVANCE (с настраиваемыми порогами)
   -------------------------------------------------------------------------- */
ns.Relevance = (() => {
  const escapeHtml = ns.Util.escapeHtml;
  
  const highlightFragment = (qt, mt) => {
    if (!qt || !mt) return escapeHtml(mt);
    const qT = qt.toLowerCase().match(/\w+/g) || [];
    const mT = mt.toLowerCase().match(/\w+/g) || [];
    if (!qT.length || !mT.length) return escapeHtml(mt);
    const mRaw = mt.match(/\w+/g) || [];
    const mPos = [];
    let cursor = 0;
    for (const w of mRaw) {
      const idx = mt.toLowerCase().indexOf(w.toLowerCase(), cursor);
      if (idx < 0) break;
      mPos.push({ start: idx, end: idx + w.length });
      cursor = idx + w.length;
    }
    let bestLen = 0, bestStart = -1;
    for (let i = 0; i < mT.length && i < mPos.length; i++) {
      for (let L = Math.min(qT.length, mT.length - i); L > bestLen; L--) {
        if (i + L > mPos.length) break;
        if (qT.join(' ').includes(mT.slice(i, i + L).join(' '))) {
          bestLen = L;
          bestStart = i;
        }
      }
    }
    if (bestLen < 2 || bestStart < 0) return escapeHtml(mt);
    const a = mPos[bestStart], b = mPos[bestStart + bestLen - 1];
    return escapeHtml(mt.slice(0, a.start)) +
           '<mark>' + escapeHtml(mt.slice(a.start, b.end)) + '</mark>' +
           escapeHtml(mt.slice(b.end));
  };
  
  const rankAll = (qv, locals, eph) => {
    if (!qv) return { mine: [], world: [], adjacent: [] };
    
    const { threshold, adjDelta, maxCards } = ns.Config.settings;
    
    const ls = locals.filter(t => Array.isArray(t.vector))
      .map(t => ({ kind: 'local', source: t, score: ns.Vector.cosine(qv, t.vector) }))
      .filter(r => r.score > threshold - adjDelta)
      .sort((a, b) => b.score - a.score);
    
    const ws = eph
      .filter(r => Array.isArray(r.vector) && r.vector.length === qv.length)
      .map(r => ({ kind: 'world', source: r, score: ns.Vector.cosine(qv, r.vector) }))
      .filter(r => r.score > threshold - adjDelta)
      .sort((a, b) => b.score - a.score);
    
    const mine = [], world = [], adjacent = [];
    for (const r of ls) {
      if (r.score >= threshold) {
        if (mine.length < maxCards) mine.push(r);
      } else if (adjacent.length < maxCards) adjacent.push(r);
    }
    for (const r of ws) {
      if (r.score >= threshold) {
        if (world.length < maxCards) world.push(r);
      } else if (adjacent.length < maxCards) adjacent.push(r);
    }
    return { mine, world, adjacent };
  };
  
  return { rankAll, highlightFragment };
})();

/* --------------------------------------------------------------------------
   SYNC
   -------------------------------------------------------------------------- */
ns.Sync = (() => {
  const publishStatus = new Map();
  const getPublishStatus = (noteId) => publishStatus.get(noteId) || null;
  
  const saveLocal = async ({ text, publishToWorld, force = false }) => {
    const clean = ns.Util.normalizeText(text);
    if (!clean) throw new Error('Empty');
    
    const thought = {
      id: ns.Util.newId(),
      text: clean,
      createdAt: ns.Util.now(),
      updatedAt: ns.Util.now(),
      vector: null,
      hasVector: 0,
      published: !!publishToWorld,
    };
    
    if (ns.Vector.isLoaded()) {
      try {
        thought.vector = await ns.Vector.embed(clean);
        thought.hasVector = thought.vector ? 1 : 0;
      } catch (e) {
        ns.Logger.warn('embed fail', e.message);
      }
    }
    
    await ns.Storage.put(thought);
    
    if (publishToWorld) {
      publishStatus.set(thought.id, 'pending');
      document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
      
      if (thought.vector && ns.Channel.isConnected()) {
        const result = await ns.Channel.publishThought({
          text: clean,
          vector: thought.vector,
          noteId: thought.id,
          force: force,
        });
        
        if (result.ok) {
          publishStatus.set(thought.id, 'ok');
        } else if (result.errors[0] === 'throttled') {
          publishStatus.set(thought.id, 'throttled');
        } else {
          publishStatus.set(thought.id, 'err');
        }
      } else if (!ns.Channel.isConnected()) {
        publishStatus.set(thought.id, 'err');
      }
    }
    
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
    return thought;
  };
  
  const reindexAll = async (onProgress) => {
    if (!ns.Vector.isLoaded()) throw new Error('Load model first');
    const pending = await ns.Storage.listUnindexed();
    let done = 0;
    for (const t of pending) {
      try {
        const v = await ns.Vector.embed(t.text);
        t.vector = v;
        t.hasVector = v ? 1 : 0;
        await ns.Storage.put(t);
      } catch (e) {}
      done++;
      if (onProgress) onProgress({ done, total: pending.length });
    }
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
  };
  
  const exportCapsule = async () => {
    const all = await ns.Storage.all();
    return {
      version: 1,
      exported: new Date().toISOString(),
      notes: all.map(n => ({
        id: n.id,
        text: n.text,
        createdAt: n.createdAt,
        vector: n.vector,
        published: n.published,
      })),
    };
  };
  
  const importCapsule = async (data) => {
    if (!data || !Array.isArray(data.notes)) throw new Error('Invalid capsule');
    let imported = 0;
    for (const n of data.notes) {
      if (!n.id || !n.text) continue;
      const thought = {
        id: n.id,
        text: n.text,
        createdAt: n.createdAt || ns.Util.now(),
        updatedAt: ns.Util.now(),
        vector: n.vector || null,
        hasVector: n.vector ? 1 : 0,
        published: !!n.published,
      };
      await ns.Storage.put(thought);
      imported++;
    }
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
    return imported;
  };
  
  return { saveLocal, reindexAll, getPublishStatus, exportCapsule, importCapsule };
})();

/* --------------------------------------------------------------------------
   UI
   -------------------------------------------------------------------------- */
ns.UI = (() => {
  let lastQuery = { text: null, vector: null };
  let debounceTimer = null;
  let countdownTimer = null;
  
  const els = {};
  
  const cache = () => {
    const ids = ['input','btnSaveLocal','btnSaveWorld','btnSettings','btnCloseSettings',
                 'overlay','settingsDrawer','roomLabel','chipNet','chipModel','chipPeers','chipWorld',
                 'tabs','listStream','listWorld','listAdjacent','log','modelProgress','composerHint',
                 'btnLoadModel','btnSeed','btnClearLog','btnReset','pubkeyDisplay',
                 'setRoom','setLang','setThreshold','setAdj','setDebounce','setMax',
                 'valThreshold','valAdj','valDebounce','valMax',
                 'btnExport','btnImport','btnReindex','btnNewIdentity','fileInput',
                 'badgeStream','badgeWorld','badgeAdj','toast'];
    ids.forEach(id => { els[id] = document.getElementById(id); });
  };
  
  const setChip = (id, text, status) => {
    const el = els[id];
    if (!el) return;
    el.className = 'chip ' + (status || '');
    el.innerHTML = '<span class="dot"></span>' + text;
  };
  
  const setProgress = (pct) => {
    if (els.modelProgress) els.modelProgress.style.width = pct + '%';
  };
  
  const switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + tab));
  };
  
  const renderCard = (r, qt, type) => {
    const source = r.source;
    const text = source.text;
    const card = document.createElement('div');
    card.className = 'card ' + type;
    
    let tagLabel = type.toUpperCase();
    let pubStatusHtml = '';
    
    if (type === 'local') {
      const st = ns.Sync.getPublishStatus(source.id);
      if (source.published) {
        if (st === 'ok') pubStatusHtml = '<span class="pub-status pub-ok">✓ pub</span>';
        else if (st === 'err') pubStatusHtml = '<span class="pub-status pub-err">✗ err</span>';
        else if (st === 'pending') pubStatusHtml = '<span class="pub-status pub-pending">...</span>';
      } else {
        pubStatusHtml = '<span class="pub-status">local</span>';
      }
    } else if (type === 'world') {
      tagLabel = 'NOSTR';
    } else if (type === 'adjacent') {
      tagLabel = 'СМЕЖНО';
    }
    
    const metaInfo = type === 'world'
      ? 'from:' + (source.fromPeer || '?').slice(0, 10)
      : new Date(source.createdAt || source.receivedAt || Date.now()).toLocaleTimeString();
    
    card.innerHTML = 
      '<div class="head">' +
        '<span class="tag">' + tagLabel + '</span>' +
        '<span class="score">' + r.score.toFixed(3) + '</span>' +
      '</div>' +
      '<div class="text">' + ns.Relevance.highlightFragment(qt, text) + '</div>' +
      '<div class="meta">' +
        pubStatusHtml +
        '<span>' + metaInfo + '</span>' +
      '</div>';
    
    return card;
  };
  
  const renderList = (container, items, qt, type) => {
    container.innerHTML = '';
    if (!items.length) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = '<div class="icon">◇</div>' + (type === 'world' ? 'нет соседей в комнате' : type === 'adjacent' ? 'нет смежных мыслей' : 'ещё ничего не сохранено');
      container.appendChild(empty);
      return;
    }
    items.forEach(r => container.appendChild(renderCard(r, qt, type)));
  };
  
  const updateLiveRelevance = async () => {
    const text = els.input.value.trim();
    if (!text || !ns.Vector.isLoaded()) {
      renderList(els.listStream, [], '', 'local');
      renderList(els.listWorld, [], '', 'world');
      renderList(els.listAdjacent, [], '', 'adjacent');
      return;
    }
    
    let qv;
    if (lastQuery.text === text && lastQuery.vector) {
      qv = lastQuery.vector;
    } else {
      try {
        qv = await ns.Vector.embed(text);
        lastQuery = { text, vector: qv };
      } catch (e) {
        return;
      }
    }
    
    const locals = await ns.Storage.all();
    const eph = ns.Ephemeral.allAnnounces();
    const { mine, world, adjacent } = ns.Relevance.rankAll(qv, locals, eph);
    
    renderList(els.listStream, mine, text, 'local');
    renderList(els.listWorld, world, text, 'world');
    renderList(els.listAdjacent, adjacent, text, 'adjacent');
    
    els.badgeStream.textContent = mine.length;
    els.badgeWorld.textContent = world.length;
    els.badgeAdj.textContent = adjacent.length;
  };
  
  const renderAll = async () => {
    await updateLiveRelevance();
  };
  
  const startCountdown = () => {
    const { debounceSec } = ns.Config.settings;
    let remaining = debounceSec;
    els.composerHint.innerHTML = 'публикация через <span class="countdown">' + remaining + 'с</span>';
    
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      remaining--;
      if (remaining > 0) {
        els.composerHint.innerHTML = 'публикация через <span class="countdown">' + remaining + 'с</span>';
      } else {
        clearInterval(countdownTimer);
        countdownTimer = null;
        els.composerHint.textContent = 'публикую...';
      }
    }, 1000);
  };
  
  const stopCountdown = () => {
    if (countdownTimer) {
      clearInterval(countdownTimer);
      countdownTimer = null;
    }
    els.composerHint.textContent = 'печатая, сделай паузу ' + ns.Config.settings.debounceSec + 'с → публикация';
  };
  
  const bind = () => {
    // Tabs
    document.querySelectorAll('.tab').forEach(t => {
      t.onclick = () => switchTab(t.dataset.tab);
    });
    
    // Input with debounce
    els.input.addEventListener('input', () => {
      const text = els.input.value.trim();
      if (!text) {
        if (debounceTimer) clearTimeout(debounceTimer);
        stopCountdown();
        lastQuery = { text: null, vector: null };
        renderList(els.listStream, [], '', 'local');
        renderList(els.listWorld, [], '', 'world');
        renderList(els.listAdjacent, [], '', 'adjacent');
        return;
      }
      
      if (debounceTimer) clearTimeout(debounceTimer);
      startCountdown();
      
      debounceTimer = setTimeout(async () => {
        stopCountdown();
        await updateLiveRelevance();
      }, ns.Config.settings.debounceSec * 1000);
    });
    
    // Save buttons
    els.btnSaveLocal.onclick = async () => {
      const text = els.input.value.trim();
      if (!text) return;
      try {
        await ns.Sync.saveLocal({ text, publishToWorld: false });
        els.input.value = '';
        stopCountdown();
        await renderAll();
        ns.Toast.show('✓ сохранено локально', 'ok');
      } catch (e) {
        ns.Toast.show('✗ ошибка: ' + e.message, 'err');
      }
    };
    
    els.btnSaveWorld.onclick = async () => {
      const text = els.input.value.trim();
      if (!text) return;
      if (!ns.Channel.isConnected()) {
        ns.Toast.show('⚠ подключись к сети', 'err');
        return;
      }
      try {
        await ns.Sync.saveLocal({ text, publishToWorld: true });
        els.input.value = '';
        stopCountdown();
        await renderAll();
        ns.Toast.show('✓ опубликовано в мир', 'ok');
      } catch (e) {
        ns.Toast.show('✗ ошибка: ' + e.message, 'err');
      }
    };
    
    // Settings drawer
    els.btnSettings.onclick = () => {
      els.settingsDrawer.classList.add('open');
      els.overlay.classList.add('show');
    };
    els.btnCloseSettings.onclick = () => {
      els.settingsDrawer.classList.remove('open');
      els.overlay.classList.remove('show');
    };
    els.overlay.onclick = () => {
      els.settingsDrawer.classList.remove('open');
      els.overlay.classList.remove('show');
    };
    
    // Settings inputs
    els.setRoom.value = ns.Config.settings.room;
    els.setLang.value = ns.Config.settings.lang;
    els.setThreshold.value = ns.Config.settings.threshold;
    els.setAdj.value = ns.Config.settings.adjDelta;
    els.setDebounce.value = ns.Config.settings.debounceSec;
    els.setMax.value = ns.Config.settings.maxCards;
    
    els.valThreshold.textContent = ns.Config.settings.threshold;
    els.valAdj.textContent = ns.Config.settings.adjDelta;
    els.valDebounce.textContent = ns.Config.settings.debounceSec;
    els.valMax.textContent = ns.Config.settings.maxCards;
    
    els.setRoom.onchange = () => {
      ns.Config.settings.room = els.setRoom.value.trim() || 'noosphere-2026';
      saveSettings();
      ns.Toast.show('Room изменён. Переподключись.', 'ok');
    };
    els.setLang.onchange = () => { ns.Config.settings.lang = els.setLang.value; saveSettings(); };
    els.setThreshold.oninput = () => {
      ns.Config.settings.threshold = parseFloat(els.setThreshold.value);
      els.valThreshold.textContent = ns.Config.settings.threshold;
      saveSettings();
      updateLiveRelevance();
    };
    els.setAdj.oninput = () => {
      ns.Config.settings.adjDelta = parseFloat(els.setAdj.value);
      els.valAdj.textContent = ns.Config.settings.adjDelta;
      saveSettings();
      updateLiveRelevance();
    };
    els.setDebounce.oninput = () => {
      ns.Config.settings.debounceSec = parseInt(els.setDebounce.value);
      els.valDebounce.textContent = ns.Config.settings.debounceSec;
      saveSettings();
    };
    els.setMax.oninput = () => {
      ns.Config.settings.maxCards = parseInt(els.setMax.value);
      els.valMax.textContent = ns.Config.settings.maxCards;
      saveSettings();
      updateLiveRelevance();
    };
    
    // Diagnostics
    els.btnLoadModel.onclick = async () => {
      try {
        els.btnLoadModel.disabled = true;
        setChip('chipModel', 'loading...', 'warn');
        await ns.Vector.load((p) => {
          const pct = Math.round((p.loaded / p.total) * 100);
          setProgress(pct);
          setChip('chipModel', 'model ' + pct + '%', 'warn');
        });
        setChip('chipModel', 'model ready', 'ok');
        setProgress(100);
      } catch (e) {
        setChip('chipModel', 'model err', 'err');
        ns.Toast.show('Model load failed', 'err');
      } finally {
        els.btnLoadModel.disabled = false;
      }
    };
    
    els.btnSeed.onclick = async () => {
      const samples = [
        'Мысль появляется в паузе между действиями.',
        'Архитектура — способ договориться с будущим собой.',
        'Случайность — недооценённый инструмент поиска.',
        'Иногда нужно просто записать, чтобы понять.',
        'Связи между идеями важнее самих идей.',
      ];
      for (const s of samples) {
        await ns.Sync.saveLocal({ text: s, publishToWorld: ns.Channel.isConnected() });
        await new Promise(r => setTimeout(r, 1100));
      }
      await renderAll();
      ns.Toast.show('✓ 5 мыслей посеяно', 'ok');
    };
    
    els.btnClearLog.onclick = () => ns.Logger.clear();
    
    els.btnReset.onclick = async () => {
      if (!confirm('Стереть все локальные заметки?')) return;
      await ns.Storage.clear();
      ns.Ephemeral.clear();
      await renderAll();
      ns.Toast.show('✓ очищено', 'ok');
    };
    
    // Capsule export/import
    els.btnExport.onclick = async () => {
      const capsule = await ns.Sync.exportCapsule();
      const blob = new Blob([JSON.stringify(capsule, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'noosphere-capsule-' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
      ns.Toast.show('✓ капсула скачана', 'ok');
    };
    
    els.btnImport.onclick = () => els.fileInput.click();
    els.fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        const count = await ns.Sync.importCapsule(data);
        await renderAll();
        ns.Toast.show('✓ импортировано ' + count + ' заметок', 'ok');
      } catch (e) {
        ns.Toast.show('✗ ошибка импорта: ' + e.message, 'err');
      }
      els.fileInput.value = '';
    };
    
    els.btnReindex.onclick = async () => {
      if (!ns.Vector.isLoaded()) {
        ns.Toast.show('Сначала Load MiniLM', 'err');
        return;
      }
      try {
        els.btnReindex.disabled = true;
        await ns.Sync.reindexAll();
        await renderAll();
        ns.Toast.show('✓ векторы пересозданы', 'ok');
      } catch (e) {
        ns.Toast.show('✗ ' + e.message, 'err');
      } finally {
        els.btnReindex.disabled = false;
      }
    };
    
    els.btnNewIdentity.onclick = async () => {
      if (!confirm('Создать новый Nostr identity? Старый будет утерян.')) return;
      await ns.Channel.resetIdentity();
    };
    
    // Auto-connect
    const autoConnect = async () => {
      try {
        setChip('chipNet', 'connecting', 'warn');
        await ns.Channel.init(ns.Config.settings.room);
        setChip('chipNet', 'online', 'ok');
        els.roomLabel.textContent = ns.Config.settings.room;
      } catch (e) {
        setChip('chipNet', 'offline', 'err');
      }
    };
    
    // Auto-load model
    const autoLoadModel = async () => {
      try {
        setChip('chipModel', 'loading...', 'warn');
        await ns.Vector.load((p) => {
          if (p.total) {
            const pct = Math.round((p.loaded / p.total) * 100);
            setProgress(pct);
          }
        });
        setChip('chipModel', 'model ready', 'ok');
        setProgress(100);
      } catch (e) {
        setChip('chipModel', 'model err', 'err');
      }
    };
    
    // Events
    document.addEventListener('ns:thoughts-changed', renderAll);
    document.addEventListener('ns:ephemeral-changed', updateLiveRelevance);
    document.addEventListener('ns:peers', (ev) => {
      setChip('chipPeers', ev.detail.count + ' peers', ev.detail.count ? 'ok' : '');
    });
    document.addEventListener('ns:world', (ev) => {
      setChip('chipWorld', ev.detail.count + ' world', ev.detail.count ? 'ok' : '');
    });
    document.addEventListener('ns:pubkey', (ev) => {
      els.pubkeyDisplay.textContent = ev.detail.pk;
      els.pubkeyDisplay.onclick = async () => {
        try {
          await navigator.clipboard.writeText(ev.detail.pk);
          ns.Toast.show('✓ pubkey скопирован', 'ok');
        } catch {}
      };
    });
    
    // Auto-start
    setTimeout(() => {
      autoConnect();
      autoLoadModel();
    }, 300);
    
    stopCountdown();
  };
  
  const init = () => {
    cache();
    bind();
    els.roomLabel.textContent = ns.Config.settings.room;
    ns.Logger.success('Noosphere v6.0 ready');
  };
  
  return { init };
})();

ns.UI.init();
</script>
</body>
</html>
