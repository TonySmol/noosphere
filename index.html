<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Noosphere</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #13131a;
      --panel-2: #1a1a24;
      --border: #24242e;
      --text: #e8e8f0;
      --muted: #8888a0;
      --accent: #7c5cff;
      --accent-2: #5c8cff;
      --ok: #4ade80;
      --warn: #fbbf24;
      --err: #f87171;
      --card: #16161f;
    }
    html[data-theme="light"] {
      --bg: #f6f6fa;
      --panel: #ffffff;
      --panel-2: #f0f0f6;
      --border: #e0e0ea;
      --text: #1a1a24;
      --muted: #666680;
      --card: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    body { display: flex; flex-direction: column; }
    .header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header .title {
      font-weight: 600;
      font-size: 16px;
      letter-spacing: .5px;
    }
    .header .spacer { flex: 1; }
    .header button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .header button:hover { background: var(--panel-2); }
    .main-tabs {
      display: flex;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .main-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .main-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .net-activity {
      height: 2px;
      background: var(--panel-2);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .net-activity .bar {
      position: absolute;
      top: 0; left: -40%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity .3s;
    }
    .net-activity.active .bar {
      opacity: 1;
      animation: slide 1.2s linear infinite;
    }
    @keyframes slide {
      0% { left: -40%; }
      100% { left: 100%; }
    }
    .status-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 5px 14px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 10px;
      flex-shrink: 0;
      align-items: center;
    }
    .chip {
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all .2s;
    }
    .chip .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted);
      transition: all .2s;
    }
    .chip.ok { color: var(--ok); border-color: rgba(74,222,128,.3); }
    .chip.ok .dot { background: var(--ok); box-shadow: 0 0 5px var(--ok); }
    .chip.warn { color: var(--warn); border-color: rgba(251,191,36,.3); }
    .chip.warn .dot { background: var(--warn); }
    .chip.err { color: var(--err); border-color: rgba(248,113,113,.3); }
    .chip.err .dot { background: var(--err); }
    .chip.publishing {
      color: var(--accent);
      border-color: rgba(124,92,255,.4);
      background: rgba(124,92,255,.1);
    }
    .chip.publishing .dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.3); }
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      padding-bottom: 20px;
    }
    .view { display: none; }
    .view.active { display: block; }
    .composer {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      position: relative;
    }
    .composer textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      resize: none;
      min-height: 60px;
      outline: none;
    }
    .composer textarea::placeholder { color: var(--muted); }
    .composer .swipe-hint {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      opacity: .6;
    }
    .composer .swipe-hint .arrow {
      display: inline-block;
      animation: up 1.5s infinite;
    }
    @keyframes up {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .composer .countdown {
      position: absolute;
      top: 6px; right: 10px;
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
    }
    .composer .actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .btn {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all .15s;
      position: relative;
      overflow: hidden;
    }
    .btn:hover:not(:disabled) { background: #222230; border-color: var(--accent); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      flex: 1;
    }
    .btn.primary:hover:not(:disabled) { background: #6a4aee; }
    .btn.ghost { background: transparent; }
    .btn .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .sub-tabs {
      display: flex;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 12px;
      gap: 2px;
    }
    .sub-tab {
      flex: 1;
      padding: 7px 10px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      border-radius: 5px;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .sub-tab.active {
      background: var(--panel-2);
      color: var(--text);
    }
    .sub-tab .badge {
      background: var(--border);
      color: var(--muted);
      padding: 0 5px;
      border-radius: 8px;
      font-size: 10px;
      min-width: 16px;
    }
    .sub-tab.active .badge {
      background: rgba(124,92,255,.25);
      color: var(--accent);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      animation: fadeIn .25s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card.mine { border-left: 3px solid var(--muted); }
    .card.world { border-left: 3px solid var(--accent); }
    .card.adjacent { border-left: 3px solid var(--accent-2); }
    .card .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .card .tag {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--panel-2);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      font-weight: 600;
    }
    .card.world .tag { background: rgba(124,92,255,.15); color: var(--accent); }
    .card.adjacent .tag { background: rgba(92,140,255,.15); color: var(--accent-2); }
    .card .score {
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, monospace;
    }
    .card .text {
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .card .text mark {
      background: transparent;
      color: var(--accent);
      font-weight: 600;
    }
    .card .meta {
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pub-status {
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .pub-ok { background: rgba(74,222,128,.15); color: var(--ok); }
    .pub-err { background: rgba(248,113,113,.15); color: var(--err); }
    .pub-pending { background: rgba(251,191,36,.15); color: var(--warn); }
    .pub-pending::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--warn);
      animation: pulse 1s infinite;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 32px 16px;
      font-size: 12px;
    }
    .empty .icon { font-size: 26px; margin-bottom: 6px; opacity: .5; }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed;
      top: 0; right: -100%;
      width: 320px;
      max-width: 92vw;
      height: 100%;
      background: var(--panel);
      border-left: 1px solid var(--border);
      z-index: 100;
      transition: right .25s;
      overflow-y: auto;
      padding: 16px;
    }
    .drawer.open { right: 0; }
    .drawer h3 {
      margin: 0 0 16px 0;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .drawer .close {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 22px;
      padding: 0;
      line-height: 1;
    }
    .setting { margin-bottom: 16px; }
    .setting label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .setting input[type="text"],
    .setting select {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font: inherit;
      font-size: 13px;
    }
    .setting input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .setting .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .setting .val {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      font-family: ui-monospace, monospace;
    }
    .setting .seg {
      display: flex;
      gap: 4px;
    }
    .setting .seg button {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
    }
    .setting .seg button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .setting .btn { width: 100%; margin-bottom: 6px; }
    .pubkey {
      font-family: ui-monospace, monospace;
      font-size: 10px;
      color: var(--muted);
      word-break: break-all;
      cursor: pointer;
      padding: 6px 8px;
      background: var(--panel-2);
      border-radius: 5px;
      border: 1px solid var(--border);
    }
    .pubkey:hover { border-color: var(--accent); color: var(--text); }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 200;
      transition: transform .25s;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      max-width: 90vw;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err { border-color: var(--err); }
    .toast.ok { border-color: var(--ok); }
    .toast.warn { border-color: var(--warn); }
    .toast .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .log {
      background: #06060a;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      max-height: 220px;
      overflow-y: auto;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      line-height: 1.5;
    }
    html[data-theme="light"] .log { background: #f0f0f6; }
    .log .e { color: var(--err); }
    .log .w { color: var(--warn); }
    .log .i { color: var(--muted); }
    .log .s { color: var(--ok); }
    .model-label {
      font-size: 10px;
      color: var(--muted);
      padding: 3px 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      display: inline-block;
      margin-bottom: 10px;
    }
    .progress {
      height: 2px;
      background: var(--border);
      overflow: hidden;
      border-radius: 2px;
      margin-top: 6px;
    }
    .progress > div {
      height: 100%;
      background: var(--accent);
      width: 0;
      transition: width .2s;
    }
    @media (max-width: 640px) {
      .content { padding: 10px; }
      .drawer { width: 100%; max-width: 100vw; }
    }
  </style>
</head>
<body>
<div class="header">
  <div class="title">Noosphere</div>
  <div class="spacer"></div>
  <button id="btnSettings" title="Настройки">☰</button>
</div>
<div class="main-tabs">
  <div class="main-tab active" data-main="stream">Поток</div>
  <div class="main-tab" data-main="history">История</div>
</div>
<div class="net-activity" id="netActivity"><div class="bar"></div></div>
<div class="status-bar">
  <span class="chip" id="chipNet"><span class="dot"></span>offline</span>
  <span class="chip" id="chipModel"><span class="dot"></span>model</span>
  <span class="chip" id="chipPeers"><span class="dot"></span>0 peers</span>
  <span class="chip" id="chipWorld"><span class="dot"></span>0 world</span>
  <span class="chip" id="chipActivity" style="display:none"><span class="dot"></span>—</span>
</div>
<div class="content">
  <div class="view active" id="view-stream">
    <div class="composer" id="composer">
      <div class="countdown" id="countdown"></div>
      <textarea id="input" placeholder="О чём думаешь?"></textarea>
      <div class="swipe-hint"><span class="arrow">↑</span> смахните вверх для публикации</div>
      <div class="actions">
        <button class="btn ghost" id="btnSaveLocal">Сохранить</button>
        <button class="btn primary" id="btnPublish">Отправить</button>
      </div>
      <div class="progress"><div id="modelProgress"></div></div>
    </div>
    <div class="sub-tabs">
      <div class="sub-tab active" data-sub="mine">Мои мысли<span class="badge" id="badgeMine">0</span></div>
      <div class="sub-tab" data-sub="world">Мир<span class="badge" id="badgeWorld">0</span></div>
      <div class="sub-tab" data-sub="adjacent">Смежные<span class="badge" id="badgeAdj">0</span></div>
    </div>
    <div id="sub-mine"><div id="listMine"></div></div>
    <div id="sub-world" style="display:none"><div id="listWorld"></div></div>
    <div id="sub-adjacent" style="display:none"><div id="listAdjacent"></div></div>
  </div>
  <div class="view" id="view-history">
    <div class="model-label">Модель: MiniLM (25 МБ)</div>
    <div id="listHistory"></div>
  </div>
</div>
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <h3>Настройки<button class="close" id="btnClose">×</button></h3>
  <div class="setting">
    <label>Язык / Language</label>
    <div class="seg" data-opt="lang">
      <button data-val="ru" class="active">Русский</button>
      <button data-val="en">English</button>
    </div>
  </div>
  <div class="setting">
    <label>Тема</label>
    <div class="seg" data-opt="theme">
      <button data-val="auto" class="active">Авто</button>
      <button data-val="light">День</button>
      <button data-val="dark">Ночь</button>
    </div>
  </div>
  <div class="setting">
    <label>Room</label>
    <input type="text" id="setRoom" />
  </div>
  <div class="setting">
    <div class="row">
      <label>Порог релевантности</label>
      <span class="val" id="valThreshold">0.25</span>
    </div>
    <input type="range" id="setThreshold" min="0.1" max="0.7" step="0.05" value="0.25" />
  </div>
  <div class="setting">
    <div class="row">
      <label>Дельта смежности</label>
      <span class="val" id="valAdj">0.15</span>
    </div>
    <input type="range" id="setAdj" min="0.05" max="0.3" step="0.05" value="0.15" />
  </div>
  <div class="setting">
    <label>Мин. волн</label>
    <div class="seg" data-opt="minWave">
      <button data-val="0" class="active">0</button>
      <button data-val="1">1</button>
      <button data-val="3">3</button>
      <button data-val="5">5</button>
    </div>
  </div>
  <div class="setting">
    <label>Макс. карточек</label>
    <div class="seg" data-opt="maxCards">
      <button data-val="3">3</button>
      <button data-val="5" class="active">5</button>
      <button data-val="10">10</button>
    </div>
  </div>
  <div class="setting" style="margin-top:20px;">
    <button class="btn" id="btnExport">💾 Скачать капсулу</button>
    <button class="btn" id="btnImport">📥 Импортировать капсулу</button>
    <button class="btn" id="btnReindex">🔄 Пересоздать векторы</button>
    <button class="btn" id="btnReset" style="color:var(--err)">🗑 Сбросить всё</button>
    <button class="btn" id="btnNewIdentity" style="color:var(--warn)">🔑 Новый identity</button>
    <button class="btn primary" id="btnApply">Применить</button>
  </div>
  <div class="setting" style="margin-top:16px;">
    <label>Pubkey</label>
    <div class="pubkey" id="pubkeyDisplay" title="Click to copy">—</div>
  </div>
  <div class="setting">
    <label>Log</label>
    <div class="log" id="log"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="fileInput" style="display:none" accept=".json" />

<script type="module">
/* ============================================================================
   NOOSPHERE v9.3 – Online‑only, publish fixed, instant peer cleanup
   ============================================================================ */

import * as tfMod from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
import * as nostrMod from 'https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm';

const pipeline = tfMod.pipeline || (tfMod.default && tfMod.default.pipeline);
const tfEnv = tfMod.env || (tfMod.default && tfMod.default.env);
const { SimplePool, finalizeEvent, generateSecretKey, getPublicKey } = nostrMod;
if (tfEnv) { tfEnv.allowLocalModels = false; tfEnv.useBrowserCache = true; }

const CFG = {
  DB_NAME: 'noosphere_v9', DB_VERSION: 1,
  STORE_THOUGHTS: 'thoughts', STORE_KEYS: 'keys',
  NOSTR_RELAYS: ['wss://relay.damus.io','wss://nos.lol','wss://relay.snort.social'],
  KIND_THOUGHT: 1, WINDOW_SEC: 600, RESUB_INTERVAL_MS: 30000,
  MAX_EPHEMERAL_AGE_MS: 10*60_000, PEER_TTL_MS: 60_000, PRUNE_TICK_MS: 10_000,
  PUBLISH_THROTTLE_MS: 1500, MODEL_ID: 'Xenova/all-MiniLM-L6-v2',
  settings: {
    room:'noosphere-2026', lang:'ru', theme:'auto', threshold:0.25,
    adjDelta:0.15, minWave:0, maxCards:5, debounceSec:4
  }
};
try { const s=localStorage.getItem('noosphere_settings_v9'); if(s) Object.assign(CFG.settings,JSON.parse(s)); } catch {}
const saveSettings=()=>{ try{localStorage.setItem('noosphere_settings_v9',JSON.stringify(CFG.settings))}catch{} };

const Toast=(()=>{
  let h=null; const e=()=>document.getElementById('toast');
  return {
    show(html,type='',d=3000){ const t=e(); if(!t)return; t.innerHTML=html; t.className='toast show '+type; if(h)clearTimeout(h); h=setTimeout(()=>{t.className='toast '+type},d); },
    showSending(){ this.show('<span class="spinner"></span> Отправка в сеть...','warn',30000); },
    showSuccess(m){ this.show('✓ '+m,'ok'); },
    showError(m){ this.show('✗ '+m,'err',5000); }
  };
})();

const Log=(()=>{
  const f=d=>d.toISOString().slice(11,19);
  const sa=x=>{ try{return typeof x==='string'?x:JSON.stringify(x).slice(0,400)}catch{return String(x)} };
  const w=(l,m,d)=>{
    const li=document.createElement('div'); li.className=l;
    li.textContent='['+f(new Date)+'] ['+l.toUpperCase()+'] '+m+(d!==undefined?' '+sa(d):'');
    const b=document.getElementById('log'); if(b){b.appendChild(li);b.scrollTop=b.scrollHeight;}
    try{console[l==='e'?'error':l==='w'?'warn':'log']('[ns:'+l+'] '+m,d)}catch{}
  };
  return { info:(m,d)=>w('i',m,d), warn:(m,d)=>w('w',m,d), error:(m,d)=>w('e',m,d), success:(m,d)=>w('s',m,d) };
})();

const Util={
  newId:()=>(crypto.randomUUID?crypto.randomUUID():('id-'+Math.random().toString(36).slice(2,15)+Date.now().toString(36))),
  now:()=>Date.now(),
  escapeHtml:s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
};

const Storage=(()=>{
  let db=null;
  const open=()=>new Promise((res,rej)=>{
    if(db)return res(db);
    const req=indexedDB.open(CFG.DB_NAME,CFG.DB_VERSION);
    req.onupgradeneeded=ev=>{
      const d=ev.target.result;
      if(!d.objectStoreNames.contains(CFG.STORE_THOUGHTS)){
        const s=d.createObjectStore(CFG.STORE_THOUGHTS,{keyPath:'id'});
        s.createIndex('createdAt','createdAt'); s.createIndex('hasVector','hasVector');
      }
      if(!d.objectStoreNames.contains(CFG.STORE_KEYS)) d.createObjectStore(CFG.STORE_KEYS,{keyPath:'k'});
    };
    req.onsuccess=ev=>{db=ev.target.result;res(db)};
    req.onerror=()=>rej(req.error);
  });
  const tx=(s,m)=>db.transaction(s,m||'readonly').objectStore(s);
  const prom=r=>new Promise((res,rej)=>{r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
  return {
    open,
    put:async t=>{await open();return prom(tx(CFG.STORE_THOUGHTS,'readwrite').put(t))},
    all:async()=>{await open();return prom(tx(CFG.STORE_THOUGHTS).getAll())},
    listUnindexed:async()=>{await open();return new Promise((res,rej)=>{
      const out=[]; const req=tx(CFG.STORE_THOUGHTS).index('hasVector').openCursor(IDBKeyRange.only(0));
      req.onsuccess=ev=>{const c=ev.target.result;if(!c)return res(out);out.push(c.value);c.continue()};
      req.onerror=()=>rej(req.error);
    })},
    clear:async()=>{await open();await prom(tx(CFG.STORE_THOUGHTS,'readwrite').clear())},
    putKey:async(k,v)=>{await open();return prom(tx(CFG.STORE_KEYS,'readwrite').put({k,v}))},
    delKey:async k=>{await open();return prom(tx(CFG.STORE_KEYS,'readwrite').delete(k))},
    getKey:async k=>{await open();const r=await prom(tx(CFG.STORE_KEYS).get(k));return r?r.v:null}
  };
})();

const Vector=(()=>{
  let ex=null,lp=null;
  return {
    load:onP=>{
      if(ex)return Promise.resolve(ex);
      if(lp)return lp;
      lp=pipeline('feature-extraction',CFG.MODEL_ID,{progress_callback:p=>{if(onP&&p.status==='progress'&&p.total)onP({loaded:p.loaded,total:p.total})}})
        .then(e=>{ex=e;Log.success('model loaded');return e}).catch(err=>{lp=null;throw err});
      return lp;
    },
    embed:async text=>{
      if(!ex)throw new Error('Model not loaded');
      if(!text||!text.trim())return null;
      const out=await ex(text,{pooling:'mean',normalize:true});
      return Array.from(out.data);
    },
    cosine:(a,b)=>{
      if(!a||!b||a.length!==b.length)return 0;
      let s=0;for(let i=0;i<a.length;i++)s+=a[i]*b[i];return s;
    },
    isLoaded:()=>ex!==null
  };
})();

const NetActivity=(()=>{
  let c=0;
  const bar=()=>document.getElementById('netActivity'), chip=()=>document.getElementById('chipActivity');
  const upd=()=>{
    const b=bar(),ch=chip(); if(!b||!ch)return;
    if(c>0){b.classList.add('active');ch.style.display='';ch.className='chip publishing';ch.innerHTML='<span class="dot"></span>'+c+' in flight'}
    else{b.classList.remove('active');ch.style.display='none'}
  };
  return {start:()=>{c++;upd()},stop:()=>{c=Math.max(0,c-1);upd()}};
})();

/* ===== CHANNEL – online‑only peers ===== */
const Channel=(()=>{
  let pool=null,sk=null,pk=null,roomName=null,sub=null,resubTimer=null,pruneTimer=null;
  const peers=new Map();            // pubkey -> lastSeen(ms)
  const seenEvents=new Map();       // event.id -> receivedAt(ms)
  const pubStatus=new Map();
  let lastPub=0;

  const dispatch=()=>{
    document.dispatchEvent(new CustomEvent('ns:peers',{detail:{count:peers.size}}));
    document.dispatchEvent(new CustomEvent('ns:world',{detail:{count:seenEvents.size}}));
  };
  const prune=()=>{
    const now=Util.now();
    let chPeers=false, chWorld=false;
    for(const [pub,ts] of peers){if(now-ts>CFG.PEER_TTL_MS){peers.delete(pub);chPeers=true;}}
    for(const [id,ts] of seenEvents){if(now-ts>CFG.MAX_EPHEMERAL_AGE_MS){seenEvents.delete(id);chWorld=true;}}
    if(chPeers) document.dispatchEvent(new CustomEvent('ns:peers',{detail:{count:peers.size}}));
    if(chWorld) document.dispatchEvent(new CustomEvent('ns:world',{detail:{count:seenEvents.size}}));
    // If peers changed, tell UI to clean worldBuffer
    if(chPeers) document.dispatchEvent(new CustomEvent('ns:peers-pruned'));
  };
  const doSub=()=>{
    if(!pool)return;
    const since=Math.floor(Date.now()/1000)-CFG.WINDOW_SEC;
    if(sub)try{sub.close()}catch{}sub=null;
    sub=pool.subscribeMany(CFG.NOSTR_RELAYS,[{kinds:[CFG.KIND_THOUGHT],'#t':[roomName],since,limit:200}],{
      onevent:ev=>{
        if(ev.pubkey===pk)return;
        if(seenEvents.has(ev.id))return;
        seenEvents.set(ev.id,Util.now());
        peers.set(ev.pubkey,Util.now());
        try{
          const c=JSON.parse(ev.content);
          if(!c||typeof c!=='object')return;
          if(!c.text||typeof c.text!=='string')return;
          if(!Array.isArray(c.vector))return;
          if(c.vector.length<64)return;
          document.dispatchEvent(new CustomEvent('ns:world-event',{detail:{
            id:ev.id,text:c.text,vector:c.vector,fromPeer:ev.pubkey,receivedAt:Util.now()
          }}));
        }catch{}
        dispatch();
      },
      oneose:()=>{prune();dispatch();}
    });
  };
  return {
    init:async room=>{
      if(pool)return;
      roomName=room; Log.info('init Nostr...');
      let skHex=await Storage.getKey('nostr_sk');
      if(!skHex){
        const ns=generateSecretKey();
        skHex=Array.from(ns).map(b=>b.toString(16).padStart(2,'0')).join('');
        await Storage.putKey('nostr_sk',skHex);
        Log.success('new identity');
      }
      sk=new Uint8Array(skHex.match(/.{1,2}/g).map(b=>parseInt(b,16)));
      pk=getPublicKey(sk);
      Log.success('pubkey: '+pk.slice(0,16)+'...');
      document.dispatchEvent(new CustomEvent('ns:pubkey',{detail:{pk}}));
      pool=new SimplePool();
      doSub();
      resubTimer=setInterval(doSub,CFG.RESUB_INTERVAL_MS);
      pruneTimer=setInterval(prune,CFG.PRUNE_TICK_MS);
      document.dispatchEvent(new CustomEvent('ns:net',{detail:{online:true}}));
      Log.success('channel ready');
    },
    publish:async({text,vector,noteId,force})=>{
      if(!pool||!sk)return{ok:false,errors:['not connected']};
      const now=Date.now();
      if(!force&&now-lastPub<CFG.PUBLISH_THROTTLE_MS)return{ok:false,throttled:true,errors:['throttled']};
      lastPub=now;
      NetActivity.start();
      try{
        const ev=finalizeEvent({kind:CFG.KIND_THOUGHT,created_at:Math.floor(Date.now()/1000),
          tags:[['t',roomName],['client','noosphere-v9.3']],
          content:JSON.stringify({text:text.slice(0,500),vector,id:noteId})},sk);
        const proms=CFG.NOSTR_RELAYS.map(url=>pool.publish([url],ev));
        const ress=await Promise.allSettled(proms);
        const lat=Date.now()-now;
        let okc=0; const errs=[];
        ress.forEach((r,i)=>{
          const url=CFG.NOSTR_RELAYS[i].replace('wss://','').replace(/\/$/,'');
          if(r.status==='fulfilled'&&r.value===true)okc++;
          else{const m=r.status==='rejected'?(r.reason?.message||String(r.reason||'unknown')):'rejected(false)';errs.push(url+': '+m);}
        });
        if(okc>0)Log.success(`pub ${okc}/${CFG.NOSTR_RELAYS.length} (${lat}ms)`);
        else{Log.error('pub failed all');errs.forEach(e=>Log.warn('  '+e));}
        return{ok:okc>0,okCount:okc,total:CFG.NOSTR_RELAYS.length,errors:errs};
      }catch(e){Log.error('pub err: '+e.message);return{ok:false,errors:[e.message]}}
      finally{NetActivity.stop();}
    },
    leave:()=>{
      if(pruneTimer)clearInterval(pruneTimer); if(resubTimer)clearInterval(resubTimer);
      if(sub)try{sub.close()}catch{} if(pool)try{pool.close(CFG.NOSTR_RELAYS)}catch{}
      peers.clear(); seenEvents.clear();
      document.dispatchEvent(new CustomEvent('ns:net',{detail:{online:false}})); dispatch();
    },
    isConnected:()=>pool!==null,
    getPublishStatus:id=>pubStatus.get(id)||null,
    setPublishStatus:(id,s)=>{pubStatus.set(id,s);document.dispatchEvent(new CustomEvent('ns:thoughts-changed'))},
    resetIdentity:async()=>{await Storage.delKey('nostr_sk');location.reload()},
    getPeersCount:()=>peers.size,
    /** For online‑only: return set of active peer pubkeys */
    getActivePeers:()=>new Set(peers.keys())
  };
})();

/* ===== RELEVANCE ===== */
const Relevance=(()=>{
  const esc=Util.escapeHtml;
  const hl=(qt,mt)=>{
    if(!qt||!mt)return esc(mt);
    const qT=qt.toLowerCase().match(/\w+/g)||[], mT=mt.toLowerCase().match(/\w+/g)||[];
    if(!qT.length||!mT.length)return esc(mt);
    const mRaw=mt.match(/\w+/g)||[], mPos=[];
    let cur=0;
    for(const w of mRaw){
      const idx=mt.toLowerCase().indexOf(w.toLowerCase(),cur);
      if(idx<0)break; mPos.push({start:idx,end:idx+w.length}); cur=idx+w.length;
    }
    let bestL=0,bestS=-1;
    for(let i=0;i<mT.length&&i<mPos.length;i++){
      for(let L=Math.min(qT.length,mT.length-i);L>bestL;L--){
        if(i+L>mPos.length)break;
        if(qT.join(' ').includes(mT.slice(i,i+L).join(' '))){bestL=L;bestS=i;}
      }
    }
    if(bestL<2||bestS<0)return esc(mt);
    const a=mPos[bestS],b=mPos[bestS+bestL-1];
    return esc(mt.slice(0,a.start))+'<mark>'+esc(mt.slice(a.start,b.end))+'</mark>'+esc(mt.slice(b.end));
  };
  const rank=(qv,locals,world,activePeers)=>{
    if(!qv)return{mine:[],world:[],adjacent:[]};
    const{threshold,adjDelta,maxCards}=CFG.settings;
    const ls=locals.filter(t=>Array.isArray(t.vector))
      .map(t=>({source:t,score:Vector.cosine(qv,t.vector)}))
      .filter(r=>r.score>threshold-adjDelta).sort((a,b)=>b.score-a.score);
    // filter world to only active peers
    const filteredWorld=world.filter(r=>activePeers.has(r.fromPeer));
    const ws=filteredWorld
      .filter(r=>Array.isArray(r.vector)&&r.vector.length===qv.length)
      .map(r=>({source:r,score:Vector.cosine(qv,r.vector)}))
      .filter(r=>r.score>threshold-adjDelta).sort((a,b)=>b.score-a.score);
    const mine=[],wout=[],adj=[];
    for(const r of ls){
      if(r.score>=threshold){if(mine.length<maxCards)mine.push(r);}
      else if(adj.length<maxCards)adj.push(r);
    }
    for(const r of ws){
      if(r.score>=threshold){if(wout.length<maxCards)wout.push(r);}
      else if(adj.length<maxCards)adj.push(r);
    }
    return{mine,world:wout,adjacent:adj};
  };
  return{rank,highlight:hl};
})();

/* ===== UI ===== */
const UI=(()=>{
  let lastQuery={text:null,vector:null},debTimer=null,cdTimer=null,worldBuf=[],publishing=false;
  const $=id=>document.getElementById(id);
  const setChip=(id,t,st)=>{const e=$(id);if(!e)return;e.className='chip '+(st||'');e.innerHTML='<span class="dot"></span>'+t};
  const setProg=pct=>{const e=$('modelProgress');if(e)e.style.width=pct+'%'};
  const applyTheme=()=>{
    const t=CFG.settings.theme;
    if(t==='auto')document.documentElement.setAttribute('data-theme',window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
    else document.documentElement.setAttribute('data-theme',t);
  };
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(CFG.settings.theme==='auto')applyTheme()});
  const renderCard=(r,qt,type)=>{
    const s=r.source;
    const card=document.createElement('div'); card.className='card '+type;
    let tag=type==='mine'?'LOCAL':type==='world'?'NOSTR':'СМЕЖНО', pub='';
    if(type==='mine'){
      if(s.published){
        const st=Channel.getPublishStatus(s.id);
        if(st==='ok')pub='<span class="pub-status pub-ok">✓ pub</span>';
        else if(st==='err')pub='<span class="pub-status pub-err">✗ fail</span>';
        else if(st==='pending')pub='<span class="pub-status pub-pending">sending</span>';
        else pub='<span class="pub-status pub-ok">✓ pub</span>';
      }else pub='<span class="pub-status">local</span>';
    }
    const meta=type==='world'?'from: '+(s.fromPeer||'?').slice(0,10)+' · RAM'
      :new Date(s.createdAt||s.receivedAt||Date.now()).toLocaleTimeString();
    card.innerHTML='<div class="head"><span class="tag">'+tag+'</span><span class="score">'+r.score.toFixed(3)+'</span></div>'
      +'<div class="text">'+Relevance.highlight(qt,s.text)+'</div>'
      +'<div class="meta">'+pub+'<span>'+meta+'</span></div>';
    return card;
  };
  const renderEmpty=(c,m)=>{c.innerHTML='<div class="empty"><div class="icon">◇</div>'+m+'</div>'};
  const renderList=(c,items,qt,type,altMsg)=>{
    c.innerHTML='';
    if(!items.length){const m=altMsg||(type==='world'?'нет соседей в комнате':type==='adjacent'?'нет смежных мыслей':'ещё ничего не сохранено');renderEmpty(c,m);return}
    items.forEach(r=>c.appendChild(renderCard(r,qt,type)));
  };
  const pruneWorldBuf=()=>{
    const cutoff=Util.now()-CFG.MAX_EPHEMERAL_AGE_MS;
    const before=worldBuf.length;
    worldBuf=worldBuf.filter(w=>(w.receivedAt||0)>cutoff);
    // also remove events from peers that are no longer active
    const active=Channel.getActivePeers();
    worldBuf=worldBuf.filter(w=>active.has(w.fromPeer));
    if(worldBuf.length!==before) updateRelevance();
  };
  const updateRelevance=async()=>{
    pruneWorldBuf();
    const text=$('input').value.trim();
    if(!text){
      renderList($('listMine'),[],'','mine'); renderList($('listWorld'),[],'','world'); renderList($('listAdjacent'),[],'','adjacent');
      $('badgeMine').textContent='0';$('badgeWorld').textContent='0';$('badgeAdj').textContent='0';
      lastQuery={text:null,vector:null};return;
    }
    if(!Vector.isLoaded())return;
    let qv;
    if(lastQuery.text===text&&lastQuery.vector)qv=lastQuery.vector;
    else{try{qv=await Vector.embed(text);lastQuery={text,vector:qv}}catch{return}}
    const locals=await Storage.all();
    const activePeers=Channel.getActivePeers();
    const{ mine, world, adjacent }=Relevance.rank(qv,locals,worldBuf,activePeers);
    const peersCnt=Channel.getPeersCount();
    const minW=Number(CFG.settings.minWave||0);
    const worldOk=(minW<=0)||(peersCnt>=minW);
    renderList($('listMine'),mine,text,'mine');
    renderList($('listWorld'),worldOk?world:[],text,'world',worldOk?undefined:`нужно минимум ${minW} peers (сейчас ${peersCnt})`);
    renderList($('listAdjacent'),adjacent,text,'adjacent');
    $('badgeMine').textContent=mine.length;
    $('badgeWorld').textContent=worldOk?world.length:0;
    $('badgeAdj').textContent=adjacent.length;
  };
  const renderHistory=async()=>{
    const c=$('listHistory'); const all=await Storage.all(); const sorted=all.sort((a,b)=>b.createdAt-a.createdAt);
    c.innerHTML='';
    if(!sorted.length){renderEmpty(c,'история пуста');return}
    sorted.forEach(t=>{
      const card=document.createElement('div'); card.className='card mine';
      let pub='';
      if(t.published){
        const st=Channel.getPublishStatus(t.id);
        if(st==='ok')pub='<span class="pub-status pub-ok">✓ pub</span>';
        else if(st==='err')pub='<span class="pub-status pub-err">✗ fail</span>';
        else if(st==='pending')pub='<span class="pub-status pub-pending">sending</span>';
        else pub='<span class="pub-status pub-ok">✓ pub</span>';
      }else pub='<span class="pub-status">local</span>';
      card.innerHTML='<div class="head"><span class="tag">'+(t.published?'WORLD':'LOCAL')+'</span>'
        +'<span class="score">'+new Date(t.createdAt).toLocaleString()+'</span></div>'
        +'<div class="text">'+Util.escapeHtml(t.text)+'</div>'
        +'<div class="meta">'+pub+'<span>vec:'+(t.hasVector?'yes':'no')+'</span><span>'+t.id.slice(0,6)+'</span></div>';
      c.appendChild(card);
    });
  };
  const save=async({publishToWorld,force=false})=>{
    if(publishing){Log.warn('already publishing');return}
    const inp=$('input'); const text=inp.value.trim();
    if(!text){Toast.showError('пустая заметка');return}
    const thought={id:Util.newId(),text,createdAt:Util.now(),updatedAt:Util.now(),vector:null,hasVector:0,published:!!publishToWorld};
    if(Vector.isLoaded()){try{thought.vector=await Vector.embed(text);thought.hasVector=thought.vector?1:0}catch(e){Log.warn('embed fail: '+e.message)}}
    await Storage.put(thought); Log.info('saved locally: '+thought.id.slice(0,8));
    inp.value=''; if(cdTimer){clearInterval(cdTimer);cdTimer=null} $('countdown').textContent='';
    if(publishToWorld){
      if(!Channel.isConnected()){Channel.setPublishStatus(thought.id,'err');Toast.showError('нет подключения к сети')}
      else if(!thought.vector){Channel.setPublishStatus(thought.id,'err');Toast.showError('нет вектора (модель не загружена)')}
      else{
        Channel.setPublishStatus(thought.id,'pending'); Toast.showSending();
        publishing=true; const btn=$('btnPublish'); const orig=btn.innerHTML; btn.innerHTML='<span class="spinner"></span>Отправка...'; btn.disabled=true;
        try{
          const r=await Channel.publish({text:thought.text,vector:thought.vector,noteId:thought.id,force});
          if(r.ok){
            Channel.setPublishStatus(thought.id,'ok');
            Toast.showSuccess('Отправлено ('+r.okCount+'/'+r.total+' relay)');
          }else if(r.throttled){Channel.setPublishStatus(thought.id,'err');Toast.showError('слишком часто (throttle)')}
          else{Channel.setPublishStatus(thought.id,'err');Toast.showError('ошибка publish');(r.errors||[]).slice(0,2).forEach(e=>Log.warn('  '+e));}
        }catch(e){Channel.setPublishStatus(thought.id,'err');Toast.showError(e.message)}
        finally{publishing=false;btn.innerHTML=orig;btn.disabled=false}
      }
    }else Toast.showSuccess('Сохранено локально');
    await updateRelevance(); await renderHistory();
  };
  const startCd=()=>{
    const el=$('countdown'); let rem=CFG.settings.debounceSec; el.textContent=rem+'с';
    if(cdTimer)clearInterval(cdTimer);
    cdTimer=setInterval(()=>{rem--;if(rem>0)el.textContent=rem+'с';else{clearInterval(cdTimer);cdTimer=null;el.textContent=''}},1000);
  };
  const stopCd=()=>{if(cdTimer)clearInterval(cdTimer);cdTimer=null;$('countdown').textContent=''};

  const init=async()=>{
    $('setRoom').value=CFG.settings.room; $('setThreshold').value=CFG.settings.threshold; $('setAdj').value=CFG.settings.adjDelta;
    $('valThreshold').textContent=CFG.settings.threshold; $('valAdj').textContent=CFG.settings.adjDelta;
    applyTheme();

    // seg controls
    document.querySelectorAll('.seg').forEach(seg=>{
      const opt=seg.dataset.opt; const val=String(CFG.settings[opt]);
      seg.querySelectorAll('button').forEach(b=>{
        b.classList.toggle('active',b.dataset.val===val);
        b.onclick=()=>{
          seg.querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
          const v=b.dataset.val; CFG.settings[opt]=/^\d+$/.test(v)?parseInt(v):v; saveSettings();
          if(opt==='theme')applyTheme(); updateRelevance();
        };
      });
    });
    // main tabs
    document.querySelectorAll('.main-tab').forEach(t=>{
      t.onclick=()=>{
        document.querySelectorAll('.main-tab').forEach(x=>x.classList.remove('active')); t.classList.add('active');
        const m=t.dataset.main;
        document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+m));
        if(m==='history')renderHistory();
      };
    });
    // sub tabs
    document.querySelectorAll('.sub-tab').forEach(t=>{
      t.onclick=()=>{
        document.querySelectorAll('.sub-tab').forEach(x=>x.classList.remove('active')); t.classList.add('active');
        const sub=t.dataset.sub;
        $('sub-mine').style.display=sub==='mine'?'':'none';
        $('sub-world').style.display=sub==='world'?'':'none';
        $('sub-adjacent').style.display=sub==='adjacent'?'':'none';
      };
    });
    // input
    const inp=$('input');
    inp.addEventListener('input',()=>{
      const tx=inp.value.trim();
      if(!tx){if(debTimer)clearTimeout(debTimer);stopCd();updateRelevance();return}
      if(debTimer)clearTimeout(debTimer); startCd();
      debTimer=setTimeout(()=>{stopCd();updateRelevance()},CFG.settings.debounceSec*1000);
      updateRelevance();
    });
    // swipe
    const comp=$('composer'); let touchY=0;
    comp.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY},{passive:true});
    comp.addEventListener('touchend',e=>{if(touchY-e.changedTouches[0].clientY>50)save({publishToWorld:true})});
    // buttons
    $('btnSaveLocal').onclick=()=>save({publishToWorld:false});
    $('btnPublish').onclick=()=>save({publishToWorld:true});
    // drawer
    const drawer=$('drawer'), overlay=$('overlay');
    $('btnSettings').onclick=()=>{drawer.classList.add('open');overlay.classList.add('show')};
    const closeDr=()=>{drawer.classList.remove('open');overlay.classList.remove('show')};
    $('btnClose').onclick=closeDr; overlay.onclick=closeDr;
    // settings inputs
    $('setRoom').oninput=e=>{CFG.settings.room=e.target.value.trim()||'noosphere-2026'};
    $('setThreshold').oninput=e=>{CFG.settings.threshold=parseFloat(e.target.value);$('valThreshold').textContent=CFG.settings.threshold;saveSettings();updateRelevance()};
    $('setAdj').oninput=e=>{CFG.settings.adjDelta=parseFloat(e.target.value);$('valAdj').textContent=CFG.settings.adjDelta;saveSettings();updateRelevance()};
    // export/import/reindex/reset/identity
    $('btnExport').onclick=async()=>{
      const all=await Storage.all();
      const cap={version:9,exported:new Date().toISOString(),notes:all.map(n=>({id:n.id,text:n.text,createdAt:n.createdAt,vector:n.vector,published:n.published}))};
      const blob=new Blob([JSON.stringify(cap,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url;
      a.download='noosphere-capsule-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(url);
      Toast.showSuccess('Капсула скачана');
    };
    $('btnImport').onclick=()=>$('fileInput').click();
    $('fileInput').onchange=async e=>{
      const f=e.target.files[0]; if(!f)return;
      try{
        const d=JSON.parse(await f.text()); if(!d||!Array.isArray(d.notes))throw new Error('bad format');
        let imp=0;
        for(const n of d.notes){
          if(!n.id||!n.text)continue;
          await Storage.put({id:n.id,text:n.text,createdAt:n.createdAt||Util.now(),updatedAt:Util.now(),vector:n.vector||null,hasVector:n.vector?1:0,published:!!n.published});
          imp++;
        }
        await updateRelevance(); await renderHistory(); Toast.showSuccess('Импортировано '+imp);
      }catch(err){Toast.showError(err.message)}
      e.target.value='';
    };
    $('btnReindex').onclick=async()=>{
      if(!Vector.isLoaded()){Toast.showError('Загрузите модель');return}
      const pend=await Storage.listUnindexed(); let done=0;
      for(const t of pend){try{const v=await Vector.embed(t.text);t.vector=v;t.hasVector=v?1:0;await Storage.put(t)}catch{}done++}
      Toast.showSuccess('Пересоздано '+done); await updateRelevance(); await renderHistory();
    };
    $('btnReset').onclick=async()=>{if(!confirm('Стереть все заметки?'))return;await Storage.clear();worldBuf=[];await updateRelevance();await renderHistory();Toast.showSuccess('Очищено')};
    $('btnNewIdentity').onclick=async()=>{if(!confirm('Создать новый identity?'))return;await Channel.resetIdentity()};
    $('btnApply').onclick=async()=>{
      saveSettings(); closeDr(); Channel.leave();
      try{setChip('chipNet','connecting','warn');await Channel.init(CFG.settings.room);setChip('chipNet','online','ok');Toast.showSuccess('Применено')}
      catch(err){setChip('chipNet','offline','warn');Toast.showError(err.message)}
    };
    // events
    document.addEventListener('ns:thoughts-changed',()=>{updateRelevance();renderHistory()});
    document.addEventListener('ns:world-event',ev=>{
      const e=ev.detail; worldBuf.push(e); pruneWorldBuf(); updateRelevance();
    });
    document.addEventListener('ns:peers',ev=>{setChip('chipPeers',ev.detail.count+' peers',ev.detail.count?'ok':'warn')});
    document.addEventListener('ns:world',ev=>{setChip('chipWorld',ev.detail.count+' world',ev.detail.count?'ok':'warn')});
    document.addEventListener('ns:net',ev=>{
      const on=ev.detail.online; setChip('chipNet',on?'online':'offline',on?'ok':'warn');
      if(!on){worldBuf=[];updateRelevance()}
    });
    document.addEventListener('ns:peers-pruned',()=>{pruneWorldBuf();updateRelevance()});
    document.addEventListener('ns:pubkey',ev=>{
      const el=$('pubkeyDisplay'); el.textContent=ev.detail.pk;
      el.onclick=async()=>{try{await navigator.clipboard.writeText(ev.detail.pk);Toast.showSuccess('Pubkey скопирован')}catch{}}
    });
    // boot
    try{await Storage.open();Log.success('IDB ready')}catch(err){Log.error('IDB fail: '+err.message);Toast.showError('IDB error');return}
    setInterval(pruneWorldBuf,CFG.PRUNE_TICK_MS);
    (async()=>{
      try{setChip('chipModel','loading...','warn');await Vector.load(p=>{if(p.total){const pct=Math.round((p.loaded/p.total)*100);setProg(pct);setChip('chipModel','model '+pct+'%','warn')}});
        setChip('chipModel','model ready','ok');setProg(100)}catch(err){setChip('chipModel','model err','err');Log.error('model fail: '+err.message)}
    })();
    (async()=>{
      try{setChip('chipNet','connecting','warn');await Channel.init(CFG.settings.room);setChip('chipNet','online','ok')}
      catch(err){setChip('chipNet','offline','warn');Log.error('connect fail: '+err.message)}
    })();
    await renderHistory(); Log.success('Noosphere v9.3 ready');
  };
  return{init};
})();
UI.init();
</script>
</body>
</html>
