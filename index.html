<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Semantic Search</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --ok: #22c55e; --err: #ef4444; --prim: #38bdf8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 1rem; max-width: 600px; margin: 0 auto; }
    .status { padding: 0.75rem; margin: 1rem 0; border-radius: 6px; background: var(--card); font-size: 0.9rem; text-align: center; }
    .status.ok { border-left: 4px solid var(--ok); }
    .status.err { border-left: 4px solid var(--err); }
    .input-row { display: flex; gap: 0.5rem; margin: 1rem 0; }
    input { flex: 1; padding: 0.75rem; border: 1px solid #334155; border-radius: 6px; background: var(--card); color: var(--text); font-size: 1rem; }
    button { padding: 0.75rem 1.25rem; border: none; border-radius: 6px; background: var(--prim); color: #0f172a; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    ul { list-style: none; margin-top: 1rem; }
    li { padding: 0.75rem; margin: 0.5rem 0; background: var(--card); border-radius: 6px; }
    .sc { color: var(--prim); font-weight: 600; margin-right: 0.5rem; }
    .bar { height: 4px; background: #334155; border-radius: 2px; margin-top: 0.5rem; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--prim); width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <h2>Семантический поиск</h2>
  <div id="status" class="status">Проверка окружения...</div>
  <div class="bar"><div id="bar" class="bar-fill"></div></div>
  <div class="input-row">
    <input id="q" type="text" placeholder="Запрос..." disabled>
    <button id="btn" disabled>Найти</button>
  </div>
  <ul id="res"></ul>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@3.0.0';

if (location.protocol === 'file:') {
  document.getElementById('status').textContent = '❌ file:// не поддерживается. Запустите через http://localhost или HTTPS.';
  document.getElementById('status').className = 'status err';
  throw new Error('Protocol blocked');
}

env.allowLocalModels = false;
env.useBrowserCache = true;

const corpus = [
  "Кошки предпочитают тепло и мягкие поверхности.",
  "JavaScript выполняется в браузере без серверной части.",
  "Векторный поиск использует косинусное сходство эмбеддингов.",
  "Web Workers не работают по протоколу file://.",
  "Трансформеры опираются на механизм self-attention."
];

const statusEl = document.getElementById('status');
const resEl = document.getElementById('res');
const qEl = document.getElementById('q');
const btnEl = document.getElementById('btn');
const barEl = document.getElementById('bar');

let extractor;
let corpusVecs = [];

const setStatus = (msg, type = '') => {
  statusEl.textContent = msg;
  statusEl.className = `status ${type}`;
};

async function init() {
  try {
    setStatus('Загрузка мультиязычной модели (~25 МБ)...');
    extractor = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', {
      pooling: 'mean', normalize: true, quantized: true,
      progress_callback: s => {
        if (s.status === 'progress') barEl.style.width = `${(s.progress || 0) * 100}%`;
        else if (s.status === 'download') setStatus(`Загрузка: ${s.file || 'веса'}...`);
      }
    });

    setStatus('Кэширование корпуса...');
    corpusVecs = await Promise.all(corpus.map(d => extractor([d]).then(o => o.data)));

    setStatus('Готово.', 'ok');
    qEl.disabled = false; btnEl.disabled = false; qEl.focus();
  } catch (e) {
    setStatus(`Ошибка инициализации: ${e.message}`, 'err');
    console.error(e);
  }
}

const dot = (a, b) => { let s = 0; for (let i = 0; i < a.length; i++) s += a[i] * b[i]; return s; };

async function search() {
  const txt = qEl.value.trim();
  if (!txt || !extractor) return;

  btnEl.disabled = true; resEl.innerHTML = ''; setStatus('Вычисление...');
  try {
    const qVec = (await extractor([txt])).data;
    const ranked = corpus.map((d, i) => ({ text: d, score: dot(qVec, corpusVecs[i]) }));
    ranked.sort((a, b) => b.score - a.score);
    resEl.innerHTML = ranked.map(r => `<li><span class="sc">${r.score.toFixed(3)}</span>${r.text}</li>`).join('');
    setStatus('Найдено.', 'ok');
  } catch (e) {
    setStatus(`Ошибка инференса: ${e.message}`, 'err');
  } finally { btnEl.disabled = false; }
}

btnEl.onclick = search;
qEl.onkeydown = e => e.key === 'Enter' && search();

init();
</script>
</body>
</html>
