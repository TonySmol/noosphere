<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Noosphere — Глобальный Разум Человечества</title>
  <meta name="description" content="Присоединяйтесь к коллективному сознанию. Ваши мысли находят резонанс в умах миллионов.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <style>
    /* ========================================================================
       DESIGN TOKENS — единая система переменных
       ======================================================================== */
    :root {
      /* Цвета — светлая тема */
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-surface-elevated: #ffffff;
      --color-border: #e2e8f0;
      --color-border-focus: #3b82f6;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --color-text-inverse: #f8fafc;
      --color-accent: #3b82f6;
      --color-accent-hover: #2563eb;
      --color-accent-soft: #dbeafe;
      --color-success: #10b981;
      --color-warning: #f59e0b;
      --color-error: #ef4444;
      --color-ad: #fef3c7;
      --color-ad-text: #92400e;

      /* Тени — многослойная глубина */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --shadow-focus: 0 0 0 3px rgb(59 130 246 / 0.15);

      /* Радиусы — скругления */
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;

      /* Отступы — 8px базовая сетка */
      --space-1: 0.25rem;   /* 4px */
      --space-2: 0.5rem;    /* 8px */
      --space-3: 0.75rem;   /* 12px */
      --space-4: 1rem;      /* 16px */
      --space-5: 1.25rem;   /* 20px */
      --space-6: 1.5rem;    /* 24px */
      --space-8: 2rem;      /* 32px */
      --space-10: 2.5rem;   /* 40px */

      /* Типографика */
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', 'Fira Code', monospace;
      --text-xs: 0.75rem;   --text-xs--lh: 1rem;
      --text-sm: 0.875rem;  --text-sm--lh: 1.25rem;
      --text-base: 1rem;    --text-base--lh: 1.5rem;
      --text-lg: 1.125rem;  --text-lg--lh: 1.75rem;
      --text-xl: 1.25rem;   --text-xl--lh: 1.75rem;
      --text-2xl: 1.5rem;   --text-2xl--lh: 2rem;

      /* Анимации */
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      --transition-slow: 400ms ease;

      /* Z-index слои */
      --z-dropdown: 100;
      --z-sticky: 200;
      --z-modal: 300;
      --z-toast: 400;
    }

    /* Тёмная тема — авто-переключение */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0f172a;
        --color-surface: #1e293b;
        --color-surface-elevated: #334155;
        --color-border: #334155;
        --color-border-focus: #60a5fa;
        --color-text: #f1f5f9;
        --color-text-muted: #94a3b8;
        --color-accent: #60a5fa;
        --color-accent-hover: #3b82f6;
        --color-accent-soft: #1e3a5f;
        --color-ad: #45331a;
        --color-ad-text: #fcd34d;
      }
    }

    /* ========================================================================
       БАЗОВЫЕ СТИЛИ — сброс и нормализация
       ======================================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: var(--text-base--lh);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    @media (min-width: 640px) { body { padding: var(--space-6); display: flex; justify-content: center; } }

    /* Скрытие скроллбара для горизонтальных списков */
    .scroll-snap {
      display: flex;
      overflow-x: auto;
      gap: var(--space-3);
      padding-bottom: var(--space-2);
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .scroll-snap::-webkit-scrollbar { display: none; }

    /* ========================================================================
       КОМПОНЕНТЫ — атомарные строительные блоки
       ======================================================================== */
    .app {
      width: 100%;
      max-width: 720px;
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: var(--space-6);
      transition: box-shadow var(--transition-normal);
    }
    @media (min-width: 768px) { .app { padding: var(--space-8); } }
    .app:focus-within { box-shadow: var(--shadow-xl), var(--shadow-focus); }

    /* Заголовок */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--color-border);
    }
    .header h1 {
      font-size: var(--text-xl);
      font-weight: 600;
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .header h1::before {
      content: '🧠';
      font-size: 1.25em;
      filter: saturate(1.2);
    }

    /* Кнопки */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--color-accent);
      color: var(--color-text-inverse);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--color-accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .btn-ghost {
      background: transparent;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--color-surface-elevated);
      color: var(--color-text);
    }
    .btn-icon {
      padding: var(--space-2);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--color-text-muted);
      font-size: 1.1em;
      line-height: 1;
    }
    .btn-icon:hover { background: var(--color-surface-elevated); color: var(--color-text); }

    /* Статус-бар */
    .status {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface-elevated);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-5);
      border-left: 3px solid var(--color-border);
    }
    .status.ok { border-left-color: var(--color-success); background: color-mix(in srgb, var(--color-success) 10%, transparent); }
    .status.error { border-left-color: var(--color-error); background: color-mix(in srgb, var(--color-error) 10%, transparent); color: var(--color-error); }
    .status .spinner {
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Текстовое поле */
    .input-group { margin-bottom: var(--space-4); }
    .input-group label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 500;
      margin-bottom: var(--space-2);
      color: var(--color-text);
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: var(--space-4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: var(--text-base);
      font-family: inherit;
      line-height: var(--text-base--lh);
      resize: vertical;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    textarea::placeholder { color: var(--color-text-muted); opacity: 1; }
    textarea:focus {
      outline: none;
      border-color: var(--color-border-focus);
      box-shadow: var(--shadow-focus);
    }
    textarea:disabled {
      background: var(--color-surface-elevated);
      cursor: not-allowed;
    }

    /* Чекбокс с лейблом */
    .checkbox {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      cursor: pointer;
      user-select: none;
    }
    .checkbox input {
      width: 16px; height: 16px;
      accent-color: var(--color-accent);
      cursor: pointer;
    }

    /* Панель действий */
    .actions {
      display: flex;
      gap: var(--space-2);
      justify-content: flex-end;
      margin: var(--space-4) 0 var(--space-6);
      flex-wrap: wrap;
    }

    /* Секции */
    .section { margin-top: var(--space-8); }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }
    .section-title {
      font-size: var(--text-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .section-hint {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: normal;
      background: var(--color-surface-elevated);
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }

    /* Карточка заметки */
    .note-card {
      min-width: 240px;
      max-width: 280px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      scroll-snap-align: start;
      flex-shrink: 0;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .note-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--color-accent-soft);
    }
    .note-card__content {
      font-size: var(--text-sm);
      line-height: var(--text-sm--lh);
      white-space: pre-wrap;
      flex: 1;
    }
    .note-card__meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      padding-top: var(--space-3);
      border-top: 1px solid var(--color-border);
    }
    .note-card__score {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: var(--color-accent-soft);
      color: var(--color-accent);
      border-radius: var(--radius-full);
      font-weight: 600;
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }
    .note-card__badge {
      background: var(--color-ad);
      color: var(--color-ad-text);
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    /* Голосование */
    .vote {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    .vote-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    .vote-btn:hover {
      background: var(--color-surface-elevated);
      color: var(--color-text);
      border-color: var(--color-border-focus);
    }
    .vote-btn[data-action="up"]:hover { color: var(--color-success); }
    .vote-btn[data-action="down"]:hover { color: var(--color-error); }
    .vote-count {
      min-width: 24px;
      text-align: center;
      font-weight: 500;
      font-size: var(--text-sm);
      font-family: var(--font-mono);
    }

    /* Архив — вертикальный список */
    .archive-list { list-style: none; display: flex; flex-direction: column; gap: var(--space-2); }
    .archive-item {
      padding: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      display: flex;
      justify-content: space-between;
      gap: var(--space-4);
      transition: border-color var(--transition-fast);
    }
    .archive-item:hover { border-color: var(--color-accent-soft); }
    .archive-item__text {
      flex: 1;
      font-size: var(--text-sm);
      line-height: var(--text-sm--lh);
      white-space: pre-wrap;
    }
    .archive-item__date {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      white-space: nowrap;
      padding-top: 2px;
    }

    /* Пустое состояние */
    .empty {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--color-text-muted);
      font-style: italic;
      font-size: var(--text-sm);
      background: var(--color-surface-elevated);
      border-radius: var(--radius-md);
      border: 1px dashed var(--color-border);
    }
    .empty--horizontal { min-width: 100%; }

    /* Настройки — панель */
    .settings {
      margin: 0 0 var(--space-6);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all var(--transition-normal);
    }
    .settings__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-4);
      background: var(--color-surface-elevated);
      cursor: pointer;
      user-select: none;
    }
    .settings__header:hover { background: color-mix(in srgb, var(--color-surface-elevated) 90%, var(--color-border) 10%); }
    .settings__body {
      padding: var(--space-4);
      background: var(--color-surface);
      display: none;
      border-top: 1px solid var(--color-border);
    }
    .settings.open .settings__body { display: block; }
    .settings__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .settings__row:last-child { border-bottom: none; }
    .settings__label {
      font-size: var(--text-sm);
      color: var(--color-text);
      flex: 1;
      min-width: 0;
    }
    .settings__label__desc {
      display: block;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .settings__control { flex-shrink: 0; }
    select, input[type="range"] {
      font-size: var(--text-sm);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      color: var(--color-text);
      accent-color: var(--color-accent);
    }
    select:focus, input[type="range"]:focus {
      outline: none;
      border-color: var(--color-border-focus);
      box-shadow: var(--shadow-focus);
    }
    .range-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .range-value {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      min-width: 3ch;
      text-align: right;
    }

    /* Тост-уведомления */
    .toast {
      position: fixed;
      bottom: var(--space-6);
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--color-surface-elevated);
      color: var(--color-text);
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-size: var(--text-sm);
      z-index: var(--z-toast);
      transition: transform var(--transition-normal);
      max-width: calc(100% - var(--space-8));
      text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-left: 3px solid var(--color-success); }
    .toast.error { border-left: 3px solid var(--color-error); }

    /* Подсказки по клавиатуре */
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xs);
      font-family: var(--font-mono);
      font-size: 0.75em;
      color: var(--color-text-muted);
      margin-left: var(--space-1);
    }

    /* Адаптив */
    @media (max-width: 639px) {
      .app {
        border-radius: 0;
        box-shadow: none;
        padding: var(--space-4);
      }
      .note-card { min-width: 85vw; }
      .actions { justify-content: stretch; }
      .actions .btn { flex: 1; }
    }

    /* Доступность */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
<div class="app" role="application" aria-label="Noosphere — портал в коллективный разум человечества">
  
  <!-- Шапка -->
  <header class="header">
    <h1>Noosphere 🌐</h1>
    <button id="settingsToggle" class="btn btn-icon" aria-label="Настройки" aria-expanded="false">⚙️</button>
  </header>

  <!-- Настройки -->
  <section id="settings" class="settings" aria-hidden="true">
    <div class="settings__header" role="button" tabindex="0">
      <span>⚙️ Центр Управления Разумом</span>
      <span id="settingsChevron">▾</span>
    </div>
    <div class="settings__body">
      <div class="settings__row">
        <label class="settings__label">
          Нейронный Интерфейс
          <span class="settings__label__desc">Выберите частоту подключения к Глобальному Разуму</span>
        </label>
        <div class="settings__control">
          <select id="modelSelect" aria-label="Выбор модели">
            <option value="mobile">📱 Лёгкий (быстрое подключение)</option>
            <option value="desktop">💻 Глубокий (полное погружение)</option>
          </select>
        </div>
      </div>
      <div class="settings__row">
        <label class="settings__label">
          Чувствительность Резонанса
          <span class="settings__label__desc">Настройте глубину связи с мыслями других</span>
        </label>
        <div class="settings__control range-wrap">
          <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.15" aria-label="Порог релевантности">
          <span class="range-value" id="thresholdValue">0.15</span>
        </div>
      </div>
      <div class="settings__row">
        <label class="settings__label">
          Поле Серендипности
          <span class="settings__label__desc">Радиус для неожиданных открытий</span>
        </label>
        <div class="settings__control range-wrap">
          <input type="range" id="serendipitySlider" min="0" max="0.5" step="0.01" value="0.10" aria-label="Дельта смежности">
          <span class="range-value" id="serendipityValue">0.10</span>
        </div>
      </div>
      <div class="settings__row">
        <label class="settings__label">
          Фильтр Мудрости
          <span class="settings__label__desc">Показывать только проверенные идеи</span>
        </label>
        <div class="settings__control">
          <select id="minRatingSelect" aria-label="Минимальный рейтинг">
            <option value="0">Все мысли</option>
            <option value="1" selected>≥ 1 голоса</option>
            <option value="3">≥ 3 голоса</option>
            <option value="5">≥ 5 голосов</option>
          </select>
        </div>
      </div>
      <div class="settings__row">
        <label class="settings__label">
          Подключение к Ноосфере

  <!-- Личные связи -->

<!-- Тост-контейнер -->
<template id="toastTemplate">
  <div class="toast" role="alert" aria-live="assertive"></div>
</template>

<script type="module">
// ============================================================================
// 0. CONFIG — централизованная конфигурация
// ============================================================================
const Config = Object.freeze({
  // Модели: мультиязычные, квантованные
  MODELS: {
    mobile: {
      id: 'Xenova/paraphrase-multilingual-MiniLM-L12-v2',
      size: 25, // MB
      description: 'Быстрая, для мобильных',
      dims: 384
    },
    desktop: {
      id: 'Xenova/paraphrase-multilingual-mpnet-base-v2',
      size: 110,
      description: 'Точная, для ПК',
      dims: 768
    }
  },
  // Пороги поиска
  THRESHOLD: { min: 0, max: 1, default: 0.15, step: 0.01 },
  SERENDIPITY: { min: 0, max: 0.5, default: 0.10, step: 0.01 },
  // Производительность
  DEBOUNCE_MS: 400,
  MAX_RESULTS: 5,
  // Хранилище
  STORAGE_KEYS: {
    settings: 'noosphere:settings:v2',
    local: 'noosphere:local:v2',
    global: 'noosphere:global:v2'
  },
  // UX
  TOAST_DURATION_MS: 3000
});

// ============================================================================
// 1. UTILS — вспомогательные функции (чистые, тестируемые)
// ============================================================================
const Utils = {
  /** @param {string} str @returns {string} */
  escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  },

  /** @param {number} ts @returns {string} */
  formatDate(ts) {
    return new Date(ts).toLocaleDateString('ru-RU', {
      day: 'numeric', month: 'short', year: 'numeric'
    });
  },

  /** Debounce с отменой предыдущего вызова */
  debounce(fn, delay) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), delay);
    };
  },

  /** @param {string} key @param {any} value */
  saveStorage(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch(e) { console.warn('Storage save failed', e); }
  },

  /** @param {string} key @param {any} fallback @returns {any} */
  loadStorage(key, fallback = null) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch(e) {
      console.warn('Storage load failed', e);
      return fallback;
    }
  },

  /** @param {Float32Array} vec @returns {Float32Array} */
  normalize(vec) {
    const len = vec.length;
    if (len === 0) return new Float32Array(0);
    let sumSq = 0;
    for (let i = 0; i < len; i++) { const v = vec[i]; sumSq += v * v; }
    const norm = Math.sqrt(sumSq);
    if (norm === 0) return new Float32Array(len);
    const result = new Float32Array(len);
    for (let i = 0; i < len; i++) result[i] = vec[i] / norm;
    return result;
  },

  /** @param {Float32Array} a @param {Float32Array} b @returns {number} */
  cosine(a, b) {
    if (a.length !== b.length) return 0;
    let dot = 0;
    for (let i = 0; i < a.length; i++) dot += a[i] * b[i];
    return Math.max(-1, Math.min(1, dot)); // clamp для численной стабильности
  }
};

// ============================================================================
// 2. EVENT BUS — лёгкая система событий для слабой связности
// ============================================================================
const EventBus = {
  listeners: new Map(),
  on(event, handler) {
    if (!this.listeners.has(event)) this.listeners.set(event, []);
    this.listeners.get(event).push(handler);
    return () => this.off(event, handler);
  },
  off(event, handler) {
    const handlers = this.listeners.get(event);
    if (!handlers) return;
    const idx = handlers.indexOf(handler);
    if (idx >= 0) handlers.splice(idx, 1);
  },
  emit(event, data) {
    const handlers = this.listeners.get(event) || [];
    handlers.forEach(h => { try { h(data); } catch(e) { console.error('Event handler error', e); } });
  }
};

// ============================================================================
// 3. MATH — векторные операции (вынесено для тестирования)
// ============================================================================
const VectorMath = {
  normalize: Utils.normalize,
  cosine: Utils.cosine,

  /** Mean pooling для тензора [batch, tokens, hidden] */
  meanPooling(tensor) {
    const { data, dims } = tensor;
    const [batch, tokens, hidden] = dims;
    if (tokens === 1) return new Float32Array(data); // уже pooled
    const result = new Float32Array(hidden);
    for (let t = 0; t < tokens; t++) {
      const offset = t * hidden;
      for (let h = 0; h < hidden; h++) {
        result[h] += data[offset + h];
      }
    }
    for (let h = 0; h < hidden; h++) result[h] /= tokens;
    return result;
  },

  /** Валидация вектора для отладки */
  validate(vec, label = 'vector') {
    if (!(vec instanceof Float32Array)) return { ok: false, reason: 'Not Float32Array' };
    if (vec.length === 0) return { ok: false, reason: 'Zero length' };
    let sumSq = 0;
    for (let i = 0; i < vec.length; i++) {
      const v = vec[i];
      if (!Number.isFinite(v)) return { ok: false, reason: `Non-finite at ${i}` };
      sumSq += v * v;
    }
    const norm = Math.sqrt(sumSq);
    if (Math.abs(norm - 1.0) > 0.01) return { ok: false, reason: `Not normalized: ||v||=${norm.toFixed(4)}` };
    return { ok: true };
  }
};

// ============================================================================
// 4. STORAGE — абстракция над localStorage с типизацией
// ============================================================================
const Storage = {
  /** @typedef {{id: string, text: string, ts: number, shared: boolean}} LocalNote */
  /** @typedef {{id: string, vector: number[], upvotes: number, downvotes: number, isAd: boolean, ts: number}} GlobalNote */

  local: {
    /** @returns {Promise<LocalNote[]>} */
    async load() {
      return Utils.loadStorage(Config.STORAGE_KEYS.local, []);
    },
    /** @param {LocalNote[]} notes */
    async save(notes) {
      Utils.saveStorage(Config.STORAGE_KEYS.local, notes);
    },
    /** @param {string} text @param {boolean} shared @returns {Promise<LocalNote>} */
    async add(text, shared = false) {
      const notes = await this.load();
      const note = { id: String(Date.now()), text, ts: Date.now(), shared };
      notes.unshift(note);
      await this.save(notes);
      return note;
    },
    async clear() {
      await this.save([]);
    }
  },

  global: {
    /** @returns {Promise<GlobalNote[]>} */
    async load() {
      return Utils.loadStorage(Config.STORAGE_KEYS.global, []);
    },
    /** @param {GlobalNote[]} notes */
    async save(notes) {
      Utils.saveStorage(Config.STORAGE_KEYS.global, notes);
    },
    /** @param {Float32Array} vector @param {boolean} isAd @returns {Promise<GlobalNote>} */
    async add(vector, isAd = false) {
      const notes = await this.load();
      const note = {
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        vector: Array.from(vector),
        upvotes: 0, downvotes: 0,
        isAd,
        ts: Date.now()
      };
      notes.unshift(note);
      await this.save(notes);
      return note;
    },
    /** @param {string} id @param {'up'|'down'} action */
    async vote(id, action) {
      const notes = await this.load();
      const note = notes.find(n => n.id === id);
      if (!note) return;
      if (action === 'up') note.upvotes++;
      else if (action === 'down') note.downvotes++;
      await this.save(notes);
      return note;
    }
  }
};

// ============================================================================
// 5. MODEL — слой работы с Transformers.js
// ============================================================================
const Model = {
  instance: null,
  config: null,
  /** @type {Map<string, Float32Array>} */
  cache: new Map(),

  /** @param {'mobile'|'desktop'} preset */
  selectPreset(preset) {
    this.config = Config.MODELS[preset] || Config.MODELS.mobile;
  },

  /** @returns {Promise<void>} */
  async load() {
    if (!this.config) throw new Error('Model config not set');
    const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
    this.instance = await pipeline('feature-extraction', this.config.id, {
      quantized: true,
      pooling: 'mean' // встроенный mean pooling в 2.17.2
    });
  },

  /**
   * @param {string} text
   * @param {{cache?: boolean}} options
   * @returns {Promise<Float32Array>}
   */
  async embed(text, { cache = true } = {}) {
    if (!this.instance) throw new Error('Model not loaded');
    const key = cache ? `${this.config.id}:${text.slice(0, 100)}` : null;
    if (cache && key && this.cache.has(key)) {
      return this.cache.get(key);
    }
    const output = await this.instance([text]);
    // КЛОН: предотвращает переиспользование WASM-буфера
    const raw = new Float32Array(output.data);
    const pooled = this.config.dims === raw.length ? raw : VectorMath.meanPooling(output);
    const normalized = VectorMath.normalize(new Float32Array(pooled));
    
    if (cache && key) this.cache.set(key, normalized);
    return normalized;
  },

  clearCache() {
    this.cache.clear();
  }
};

// ============================================================================
// 6. SEARCH — логика поиска (отделена от UI)
// ============================================================================
const Search = {
  /** @typedef {{text: string, score: number, note: any}} SearchResult */

  /**
   * @param {Float32Array} queryVec
   * @param {Array} notes
   * @param {Map<string, Float32Array>} vectorCache
   * @param {number} threshold
   * @returns {Promise<SearchResult[]>}
   */
  async find(queryVec, notes, vectorCache, threshold) {
    const results = [];
    for (const note of notes) {
      const vec = vectorCache.get(note.id);
      if (!vec) continue;
      const score = VectorMath.cosine(queryVec, vec);
      if (score >= threshold) {
        results.push({ text: note.text, score, note });
      }
    }
    return results.sort((a, b) => b.score - a.score);
  },

  /**
   * @param {Float32Array} queryVec
   * @param {Array} globalNotes
   * @param {{threshold: number, delta: number, minRating: number, max: number}} params
   * @returns {Promise<{relevant: SearchResult[], serendipity: SearchResult[]}>}
   */
  async findGlobal(queryVec, globalNotes, { threshold, delta, minRating, max }) {
    const relevant = [], serendipity = [];
    const lowThreshold = Math.max(0, threshold - delta);
    
    for (const gnote of globalNotes) {
      if ((gnote.upvotes - gnote.downvotes) < minRating) continue;
      const vec = new Float32Array(gnote.vector);
      const score = VectorMath.cosine(queryVec, vec);
      const item = { text: gnote.id.slice(-6), score, note: gnote }; // сокращённый ID для демо
      if (score >= threshold) relevant.push(item);
      else if (score >= lowThreshold) serendipity.push(item);
    }
    return {
      relevant: relevant.sort((a,b)=>b.score-a.score).slice(0, max),
      serendipity: serendipity.sort((a,b)=>b.score-a.score).slice(0, max)
    };
  }
};

// ============================================================================
// 7. UI — рендеринг компонентов (чистые функции + DOM-манипуляции)
// ============================================================================
const UI = {
  els: {},

  init() {
    this.els = {
      status: document.getElementById('status'),
      input: document.getElementById('input'),
      saveBtn: document.getElementById('saveBtn'),
      clearBtn: document.getElementById('clearBtn'),
      related: document.getElementById('relatedScroll'),
      globalRel: document.getElementById('globalRelevantScroll'),
      globalSer: document.getElementById('globalSerendipityScroll'),
      archive: document.getElementById('archiveList'),
      settings: document.getElementById('settings'),
      settingsToggle: document.getElementById('settingsToggle'),
      applySettings: document.getElementById('applySettingsBtn'),
      modelSelect: document.getElementById('modelSelect'),
      thresholdSlider: document.getElementById('thresholdSlider'),
      thresholdValue: document.getElementById('thresholdValue'),
      serendipitySlider: document.getElementById('serendipitySlider'),
      serendipityValue: document.getElementById('serendipityValue'),
      minRating: document.getElementById('minRatingSelect'),
      globalSearch: document.getElementById('globalSearchCheckbox'),
      shareCheckbox: document.getElementById('shareCheckbox'),
      thresholdInfo: document.getElementById('thresholdInfo'),
      globalInfo: document.getElementById('globalInfo'),
      serendipityInfo: document.getElementById('serendipityInfo')
    };
    // Keyboard shortcut hint — мистическое послание
    this.els.input.title = 'Ctrl+Enter — отправить мысль в вечность';
  },

  /** @param {string} html @param {'ok'|'error'|''} type */
  status(html, type = '') {
    const el = this.els.status;
    el.innerHTML = html;
    el.className = `status${type ? ' ' + type : ''}`;
  },

  /** @param {boolean} loading */
  setLoading(loading) {
    const els = [this.els.input, this.els.saveBtn, this.els.clearBtn, this.els.applySettings];
    els.forEach(el => { if (el) el.disabled = loading; });
  },

  /** @param {string} msg @param {'success'|'error'} type */
  toast(msg, type = 'success') {
    const tpl = document.getElementById('toastTemplate');
    const toast = tpl.content.firstElementChild.cloneNode(true);
    toast.textContent = msg;
    toast.className += ` ${type}`;
    document.body.appendChild(toast);
    // Анимация появления
    requestAnimationFrame(() => toast.classList.add('show'));
    // Авто-удаление
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }, Config.TOAST_DURATION_MS);
  },

  /** @param {Array<{text: string, score: number, note: any}>} results @param {boolean} isGlobal */
  renderCards(results, isGlobal = false) {
    if (!results || results.length === 0) {
      return `<div class="empty empty--horizontal">🔮 Тишина в эфире... Ноосфера ждёт ваших мыслей</div>`;
    }
    return results.map(r => {
      const net = r.note?.upvotes - r.note?.downvotes;
      const badge = r.note?.isAd ? `<span class="note-card__badge">✨ Спонсор</span>` : '';
      const vote = isGlobal ? `
        <div class="vote">
          <button class="vote-btn" data-id="${r.note.id}" data-action="up" aria-label="Поддержать идею">👍</button>
          <span class="vote-count">${net > 0 ? '+'+net : net}</span>
          <button class="vote-btn" data-id="${r.note.id}" data-action="down" aria-label="Отклонить идею">👎</button>
        </div>` : '';
      return `
        <article class="note-card" role="listitem" data-note-id="${r.note?.id || ''}">
          <div class="note-card__content">${Utils.escapeHtml(r.text)}</div>
          <div class="note-card__meta">
            <span class="note-card__score">${badge}${r.score.toFixed(2)}</span>
            ${isGlobal ? vote : `<time>💭 ${Utils.formatDate(r.note?.ts)}</time>`}
          </div>
        </article>`;
    }).join('');
  },

  /** @param {Array<{text: string, ts: number}>} notes */
  renderArchive(notes) {
    const el = this.els.archive;
    if (!notes?.length) {
      el.innerHTML = '<li class="empty">🌱 Хроники пусты. Станьте первым творцом Ноосферы!</li>';
      return;
    }
    el.innerHTML = notes.map(n => `
      <li class="archive-item">
        <div class="archive-item__text">${Utils.escapeHtml(n.text)}</div>
        <time class="archive-item__date">📅 ${Utils.formatDate(n.ts)}</time>
      </li>
    `).join('');
  },

  /** Обновление подсказок в заголовках секций */
  updateHints({ threshold, foundLocal, foundGlobal, foundSerendipity }) {
    if (this.els.thresholdInfo) {
      this.els.thresholdInfo.textContent = `резонанс ${threshold.toFixed(2)} • найдено связей ${foundLocal}`;
    }
    if (this.els.globalInfo) {
      this.els.globalInfo.textContent = foundGlobal !== undefined ? `голосов человечества ${foundGlobal}` : '';
    }
    if (this.els.serendipityInfo) {
      this.els.serendipityInfo.textContent = foundSerendipity !== undefined ? `открытий на горизонте ${foundSerendipity}` : '';
    }
  }
};

// ============================================================================
// 8. APP — оркестрация (главный контроллер)
// ============================================================================
const App = {
  state: {
    settings: {
      modelPreset: 'mobile',
      threshold: Config.THRESHOLD.default,
      serendipityDelta: Config.SERENDIPITY.default,
      minRating: 1,
      globalSearch: true,
      maxResults: Config.MAX_RESULTS
    },
    localNotes: [],
    globalNotes: [],
    localVectors: new Map(),
    isReady: false
  },

  async init() {
    UI.init();
    await this.loadSettings();
    await this.loadData();
    await this.setupEventListeners();
    await this.loadModel();
    await this.indexLocal();
    this.state.isReady = true;
    UI.setLoading(false);
    UI.status('Связь с Глобальным Разумом установлена', 'ok');
    UI.toast('Добро пожаловать в Ноосферу — разум человечества теперь един', 'success');
    this.render();
  },

  async loadSettings() {
    const saved = Utils.loadStorage(Config.STORAGE_KEYS.settings);
    if (saved) Object.assign(this.state.settings, saved);
    // Синхронизация UI с состоянием
    UI.els.modelSelect.value = this.state.settings.modelPreset;
    UI.els.thresholdSlider.value = this.state.settings.threshold;
    UI.els.thresholdValue.textContent = this.state.settings.threshold.toFixed(2);
    UI.els.serendipitySlider.value = this.state.settings.serendipityDelta;
    UI.els.serendipityValue.textContent = this.state.settings.serendipityDelta.toFixed(2);
    UI.els.minRating.value = this.state.settings.minRating;
    UI.els.globalSearch.checked = this.state.settings.globalSearch;
  },

  async loadData() {
    [this.state.localNotes, this.state.globalNotes] = await Promise.all([
      Storage.local.load(),
      Storage.global.load()
    ]);
  },

  setupEventListeners() {
    // Переключение настроек
    const toggleSettings = () => {
      const isOpen = UI.els.settings.classList.toggle('open');
      UI.els.settings.setAttribute('aria-hidden', String(!isOpen));
      UI.els.settingsToggle.setAttribute('aria-expanded', String(isOpen));
      UI.els.settingsChevron.textContent = isOpen ? '▴' : '▾';
    };
    UI.els.settingsToggle.onclick = toggleSettings;
    UI.els.settings.querySelector('.settings__header').onclick = toggleSettings;
    UI.els.settings.querySelector('.settings__header').onkeydown = (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleSettings(); }
    };

    // Слайдеры с живым обновлением значения
    const bindRange = (slider, display, key) => {
      slider.oninput = (e) => {
        display.textContent = parseFloat(e.target.value).toFixed(2);
        this.state.settings[key] = parseFloat(e.target.value);
      };
      slider.onchange = () => this.applySettings(false);
    };
    bindRange(UI.els.thresholdSlider, UI.els.thresholdValue, 'threshold');
    bindRange(UI.els.serendipitySlider, UI.els.serendipityValue, 'serendipityDelta');

    // Остальные настройки
    UI.els.modelSelect.onchange = () => {
      this.state.settings.modelPreset = UI.els.modelSelect.value;
      this.applySettings(true);
    };
    UI.els.minRating.onchange = () => {
      this.state.settings.minRating = parseInt(UI.els.minRating.value);
      this.applySettings(false);
    };
    UI.els.globalSearch.onchange = () => {
      this.state.settings.globalSearch = UI.els.globalSearch.checked;
      this.applySettings(false);
    };
    UI.els.applySettings.onclick = () => this.applySettings(true);

    // Ввод текста с debounce
    const debouncedSearch = Utils.debounce(async () => {
      const query = UI.els.input.value.trim();
      if (!query || !this.state.isReady) return;
      await this.performSearch(query);
    }, Config.DEBOUNCE_MS);
    UI.els.input.oninput = debouncedSearch;

    // Сохранение заметки
    const saveNote = async () => {
      const text = UI.els.input.value.trim();
      if (!text) return;
      const share = UI.els.shareCheckbox.checked;
      
      // Локальное сохранение
      const note = await Storage.local.add(text, share);
      this.state.localNotes.unshift(note);
      
      // Векторизация и кэширование
      try {
        const vec = await Model.embed(text);
        this.state.localVectors.set(note.id, vec);
        // Если шарим — публикуем в глобал (демо: сохраняем вектор локально)
        if (share) {
          await Storage.global.add(vec, false);
          this.state.globalNotes.unshift({ id: note.id, vector: Array.from(vec), upvotes: 0, downvotes: 0, isAd: false, ts: note.ts });
        }
      } catch(e) {
        console.warn('Vectorization failed', e);
        UI.toast('Сбой нейронного канала... Попробуйте снова', 'error');
      }
      
      // UI обновления
      UI.renderArchive(this.state.localNotes);
      UI.els.input.value = '';
      UI.els.shareCheckbox.checked = false;
      UI.renderCards([], false);
      UI.renderCards([], true);
      UI.renderCards([], true);
      UI.toast('Ваша мысль теперь часть вечности' + (share ? ' и резонирует с умами миллионов' : ''), 'success');
    };
    UI.els.saveBtn.onclick = saveNote;
    UI.els.input.onkeydown = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        saveNote();
      }
    };

    // Очистка
    UI.els.clearBtn.onclick = async () => {
      if (!confirm('Вы уверены, что хотите стереть эти мысли из памяти Ноосферы?')) return;
      await Storage.local.clear();
      this.state.localNotes = [];
      this.state.localVectors.clear();
      UI.renderArchive([]);
      UI.renderCards([], false);
      UI.toast('Хроники очищены — пространство для новых идей готово', 'success');
    };

    // Голосование (делегирование)
    const handleVote = async (e) => {
      const btn = e.target.closest('.vote-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      await Storage.global.vote(id, action);
      // Перерисовка глобальных секций
      const query = UI.els.input.value.trim();
      if (query) await this.performSearch(query);
    };
    UI.els.globalRel.addEventListener('click', handleVote);
    UI.els.globalSer.addEventListener('click', handleVote);

    // Авто-сохранение настроек
    EventBus.on('settings:changed', () => {
      Utils.saveStorage(Config.STORAGE_KEYS.settings, this.state.settings);
    });
  },

  async loadModel() {
    Model.selectPreset(this.state.settings.modelPreset);
    UI.status(`<span class="spinner"></span> Загрузка модели ${Model.config.description} (~${Model.config.size} МБ)...`);
    try {
      await Model.load();
    } catch(e) {
      UI.status(`Критический сбой подключения к нейросети: ${e.message}`, 'error');
      throw e;
    }
  },

  async indexLocal() {
    if (!this.state.localNotes.length) return;
    UI.status('<span class="spinner"></span> Синхронизация ваших мыслей с коллективным разумом...');
    for (const note of this.state.localNotes) {
      try {
        const vec = await Model.embed(note.text);
        this.state.localVectors.set(note.id, vec);
      } catch(e) {
        console.warn(`Failed to vectorize note ${note.id}`, e);
      }
    }
  },

  async applySettings(needReindex) {
    EventBus.emit('settings:changed');
    UI.setLoading(true);
    
    if (needReindex) {
      // Смена модели требует перезагрузки
      Model.clearCache();
      this.state.localVectors.clear();
      await this.loadModel();
      await this.indexLocal();
      UI.status('Конфигурация нейронного интерфейса обновлена', 'ok');
    }
    
    UI.setLoading(false);
    this.render();
    
    // Если есть текст в инпуте — пересчитать поиск
    const query = UI.els.input.value.trim();
    if (query) await this.performSearch(query);
  },

  async performSearch(query) {
    if (!this.state.isReady) return;
    
    try {
      const queryVec = await Model.embed(query, { cache: false });
      
      // Локальный поиск
      const localResults = await Search.find(
        queryVec,
        this.state.localNotes,
        this.state.localVectors,
        this.state.settings.threshold
      );
      
      // Глобальный поиск
      let globalRelevant = [], globalSerendipity = [];
      if (this.state.settings.globalSearch && this.state.globalNotes.length) {
        const global = await Search.findGlobal(
          queryVec,
          this.state.globalNotes,
          {
            threshold: this.state.settings.threshold,
            delta: this.state.settings.serendipityDelta,
            minRating: this.state.settings.minRating,
            max: this.state.settings.maxResults
          }
        );
        globalRelevant = global.relevant;
        globalSerendipity = global.serendipity;
      }
      
      // Рендер
      UI.els.related.innerHTML = UI.renderCards(localResults.slice(0, this.state.settings.maxResults), false);
      UI.els.globalRel.innerHTML = UI.renderCards(globalRelevant, true);
      UI.els.globalSer.innerHTML = UI.renderCards(globalSerendipity, true);
      
      // Обновление подсказок
      UI.updateHints({
        threshold: this.state.settings.threshold,
        foundLocal: localResults.length,
        foundGlobal: globalRelevant.length,
        foundSerendipity: globalSerendipity.length
      });
      
    } catch(e) {
      console.error('Search failed', e);
      UI.status('Сбой в матрице резонанса — попробуйте снова', 'error');
    }
  },

  render() {
    UI.renderArchive(this.state.localNotes);
    // Очистка результатов при старте
    UI.els.related.innerHTML = '<div class="empty empty--horizontal">Введите мысль — и Ноосфера ответит эхом тысяч умов</div>';
    UI.els.globalRel.innerHTML = this.state.settings.globalSearch 
      ? '<div class="empty empty--horizontal">Канал связи с человечеством открыт</div>'
      : '<div class="empty empty--horizontal">Вы отключились от коллективного разума... Но ещё можно вернуться</div>';
    UI.els.globalSer.innerHTML = '<div class="empty empty--horizontal">Здесь вспыхнут неожиданные озарения</div>';
    UI.updateHints({
      threshold: this.state.settings.threshold,
      foundLocal: 0,
      foundGlobal: undefined,
      foundSerendipity: undefined
    });
  }
};

// ============================================================================
// BOOTSTRAP
// ============================================================================
(async function() {
  try {
    await App.init();
  } catch(e) {
    console.error('App init failed', e);
    UI.status(`Критическая ошибка: ${e.message}`, 'error');
    UI.setLoading(false);
  }
})();

// ============================================================================
// DEBUG API (только localhost)
// ============================================================================
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  window.__debug = {
    async test(a, b) {
      const va = await Model.embed(a);
      const vb = await Model.embed(b);
      const sim = VectorMath.cosine(va, vb);
      console.log(`"${a}" ↔ "${b}": ${sim.toFixed(4)}`);
      return sim;
    },
    vector(id) {
      const vec = App.state.localVectors.get(id);
      if (!vec) return console.log('Not found');
      console.log('Norm:', Math.sqrt(vec.reduce((s,v)=>s+v*v,0)).toFixed(6));
      console.log('First 5:', Array.from(vec.slice(0,5)).map(v=>v.toFixed(4)));
    },
    state() {
      console.log('Settings:', App.state.settings);
      console.log('Local notes:', App.state.localNotes.length);
      console.log('Global notes:', App.state.globalNotes.length);
      console.log('Vector cache:', App.state.localVectors.size);
    }
  };
  console.log('Debug API: window.__debug');
}
</script>
