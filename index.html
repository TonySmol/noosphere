<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Noosphere</title>
<style>
:root {
  --bg: #0a0a0f;
  --panel: #13131a;
  --panel-2: #1a1a24;
  --border: #24242e;
  --text: #e8e8f0;
  --muted: #8888a0;
  --accent: #7c5cff;
  --accent-2: #5c8cff;
  --ok: #4ade80;
  --warn: #fbbf24;
  --err: #f87171;
  --card: #16161f;
}
html[data-theme="light"] {
  --bg: #f6f6fa;
  --panel: #ffffff;
  --panel-2: #f0f0f6;
  --border: #e0e0ea;
  --text: #1a1a24;
  --muted: #666680;
  --card: #ffffff;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  overflow: hidden;
}
body { display: flex; flex-direction: column; }

.header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.header .title {
  font-weight: 600;
  font-size: 16px;
  letter-spacing: .5px;
}
.header .spacer { flex: 1; }
.header button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
.header button:hover { background: var(--panel-2); }

.main-tabs {
  display: flex;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.main-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.main-tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

.net-activity {
  height: 2px;
  background: var(--panel-2);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.net-activity .bar {
  position: absolute;
  top: 0; left: -40%;
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity .3s;
}
.net-activity.active .bar {
  opacity: 1;
  animation: slide 1.2s linear infinite;
}
@keyframes slide {
  0% { left: -40%; }
  100% { left: 100%; }
}

.status-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 5px 14px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  font-size: 10px;
  flex-shrink: 0;
  align-items: center;
}
.chip {
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all .2s;
}
.chip .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--muted);
  transition: all .2s;
}
.chip.ok { color: var(--ok); border-color: rgba(74,222,128,.3); }
.chip.ok .dot { background: var(--ok); box-shadow: 0 0 5px var(--ok); }
.chip.warn { color: var(--warn); border-color: rgba(251,191,36,.3); }
.chip.warn .dot { background: var(--warn); }
.chip.err { color: var(--err); border-color: rgba(248,113,113,.3); }
.chip.err .dot { background: var(--err); }
.chip.publishing {
  color: var(--accent);
  border-color: rgba(124,92,255,.4);
  background: rgba(124,92,255,.1);
}
.chip.publishing .dot {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .5; transform: scale(1.3); }
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  padding-bottom: 20px;
}
.view { display: none; }
.view.active { display: block; }

.composer {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  position: relative;
}
.composer textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font: inherit;
  resize: none;
  min-height: 60px;
  outline: none;
}
.composer textarea::placeholder { color: var(--muted); }
.composer .swipe-hint {
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  opacity: .6;
}
.composer .swipe-hint .arrow {
  display: inline-block;
  animation: up 1.5s infinite;
}
@keyframes up {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
.composer .countdown {
  position: absolute;
  top: 6px; right: 10px;
  font-size: 10px;
  color: var(--accent);
  font-weight: 600;
}
.composer .actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.btn {
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
  transition: all .15s;
  position: relative;
  overflow: hidden;
}
.btn:hover:not(:disabled) { background: #222230; border-color: var(--accent); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  flex: 1;
}
.btn.primary:hover:not(:disabled) { background: #6a4aee; }
.btn.ghost { background: transparent; }
.btn .spinner {
  display: inline-block;
  width: 10px;
  height: 10px;
  border: 1.5px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 4px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.sub-tabs {
  display: flex;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 12px;
  gap: 2px;
}
.sub-tab {
  flex: 1;
  padding: 7px 10px;
  text-align: center;
  cursor: pointer;
  font-size: 12px;
  color: var(--muted);
  border-radius: 5px;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.sub-tab.active {
  background: var(--panel-2);
  color: var(--text);
}
.sub-tab .badge {
  background: var(--border);
  color: var(--muted);
  padding: 0 5px;
  border-radius: 8px;
  font-size: 10px;
  min-width: 16px;
}
.sub-tab.active .badge {
  background: rgba(124,92,255,.25);
  color: var(--accent);
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  animation: fadeIn .25s;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.card.mine { border-left: 3px solid var(--muted); }
.card.world { border-left: 3px solid var(--accent); }
.card.adjacent { border-left: 3px solid var(--accent-2); }
.card .head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.card .tag {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--panel-2);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  font-weight: 600;
}
.card.world .tag { background: rgba(124,92,255,.15); color: var(--accent); }
.card.adjacent .tag { background: rgba(92,140,255,.15); color: var(--accent-2); }
.card .score {
  font-size: 11px;
  color: var(--muted);
  font-family: ui-monospace, monospace;
}
.card .text {
  font-size: 13px;
  line-height: 1.5;
  word-wrap: break-word;
}
.card .text mark {
  background: transparent;
  color: var(--accent);
  font-weight: 600;
}
.card .meta {
  margin-top: 6px;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.pub-status {
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.pub-ok { background: rgba(74,222,128,.15); color: var(--ok); }
.pub-err { background: rgba(248,113,113,.15); color: var(--err); }
.pub-pending { background: rgba(251,191,36,.15); color: var(--warn); }
.pub-pending::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--warn);
  animation: pulse 1s infinite;
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 32px 16px;
  font-size: 12px;
}
.empty .icon { font-size: 26px; margin-bottom: 6px; opacity: .5; }

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 99;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.overlay.show { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: -100%;
  width: 320px;
  max-width: 92vw;
  height: 100%;
  background: var(--panel);
  border-left: 1px solid var(--border);
  z-index: 100;
  transition: right .25s;
  overflow-y: auto;
  padding: 16px;
}
.drawer.open { right: 0; }
.drawer h3 {
  margin: 0 0 16px 0;
  font-size: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.drawer .close {
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 22px;
  padding: 0;
  line-height: 1;
}
.setting { margin-bottom: 16px; }
.setting label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.setting input[type="text"],
.setting select {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 6px;
  font: inherit;
  font-size: 13px;
}
.setting input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}
.setting .row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.setting .val {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  font-family: ui-monospace, monospace;
}
.setting .seg {
  display: flex;
  gap: 4px;
}
.setting .seg button {
  flex: 1;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 10px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
}
.setting .seg button.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.setting .btn { width: 100%; margin-bottom: 6px; }
.pubkey {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: var(--muted);
  word-break: break-all;
  cursor: pointer;
  padding: 6px 8px;
  background: var(--panel-2);
  border-radius: 5px;
  border: 1px solid var(--border);
}
.pubkey:hover { border-color: var(--accent); color: var(--text); }

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 200;
  transition: transform .25s;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  max-width: 90vw;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.err { border-color: var(--err); }
.toast.ok { border-color: var(--ok); }
.toast.warn { border-color: var(--warn); }
.toast .spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 1.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.log {
  background: #06060a;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  max-height: 220px;
  overflow-y: auto;
  font-family: ui-monospace, monospace;
  font-size: 10px;
  line-height: 1.5;
}
html[data-theme="light"] .log { background: #f0f0f6; }
.log .e { color: var(--err); }
.log .w { color: var(--warn); }
.log .i { color: var(--muted); }
.log .s { color: var(--ok); }

.model-label {
  font-size: 10px;
  color: var(--muted);
  padding: 3px 8px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 5px;
  display: inline-block;
  margin-bottom: 10px;
}

.progress {
  height: 2px;
  background: var(--border);
  overflow: hidden;
  border-radius: 2px;
  margin-top: 6px;
}
.progress > div {
  height: 100%;
  background: var(--accent);
  width: 0;
  transition: width .2s;
}

@media (max-width: 640px) {
  .content { padding: 10px; }
  .drawer { width: 100%; max-width: 100vw; }
}
</style>
</head>
<body>

<div class="header">
  <div class="title">Noosphere</div>
  <div class="spacer"></div>
  <button id="btnSettings" title="Настройки">☰</button>
</div>

<div class="main-tabs">
  <div class="main-tab active" data-main="stream">Поток</div>
  <div class="main-tab" data-main="history">История</div>
</div>

<div class="net-activity" id="netActivity"><div class="bar"></div></div>

<div class="status-bar">
  <span class="chip" id="chipNet"><span class="dot"></span>offline</span>
  <span class="chip" id="chipModel"><span class="dot"></span>model</span>
  <span class="chip" id="chipPeers"><span class="dot"></span>0 peers</span>
  <span class="chip" id="chipWorld"><span class="dot"></span>0 world</span>
  <span class="chip" id="chipActivity" style="display:none"><span class="dot"></span>—</span>
</div>

<div class="content">
  <div class="view active" id="view-stream">
    <div class="composer" id="composer">
      <div class="countdown" id="countdown"></div>
      <textarea id="input" placeholder="О чём думаешь?"></textarea>
      <div class="swipe-hint"><span class="arrow">↑</span> смахните вверх для публикации</div>
      <div class="actions">
        <button class="btn ghost" id="btnSaveLocal">Сохранить</button>
        <button class="btn primary" id="btnPublish">Отправить</button>
      </div>
      <div class="progress"><div id="modelProgress"></div></div>
    </div>

    <div class="sub-tabs">
      <div class="sub-tab active" data-sub="mine">Мои мысли<span class="badge" id="badgeMine">0</span></div>
      <div class="sub-tab" data-sub="world">Мир<span class="badge" id="badgeWorld">0</span></div>
      <div class="sub-tab" data-sub="adjacent">Смежные<span class="badge" id="badgeAdj">0</span></div>
    </div>

    <div id="sub-mine"><div id="listMine"></div></div>
    <div id="sub-world" style="display:none"><div id="listWorld"></div></div>
    <div id="sub-adjacent" style="display:none"><div id="listAdjacent"></div></div>
  </div>

  <div class="view" id="view-history">
    <div class="model-label">Модель: MiniLM (25 МБ)</div>
    <div id="listHistory"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <h3>
    Настройки
    <button class="close" id="btnClose">×</button>
  </h3>

  <div class="setting">
    <label>Язык / Language</label>
    <div class="seg" data-opt="lang">
      <button data-val="ru" class="active">Русский</button>
      <button data-val="en">English</button>
    </div>
  </div>

  <div class="setting">
    <label>Тема</label>
    <div class="seg" data-opt="theme">
      <button data-val="auto" class="active">Авто</button>
      <button data-val="light">День</button>
      <button data-val="dark">Ночь</button>
    </div>
  </div>

  <div class="setting">
    <label>Room</label>
    <input type="text" id="setRoom" />
  </div>

  <div class="setting">
    <div class="row">
      <label>Порог релевантности</label>
      <span class="val" id="valThreshold">0.25</span>
    </div>
    <input type="range" id="setThreshold" min="0.1" max="0.7" step="0.05" value="0.25" />
  </div>

  <div class="setting">
    <div class="row">
      <label>Дельта смежности</label>
      <span class="val" id="valAdj">0.15</span>
    </div>
    <input type="range" id="setAdj" min="0.05" max="0.3" step="0.05" value="0.15" />
  </div>

  <div class="setting">
    <label>Мин. волн</label>
    <div class="seg" data-opt="minWave">
      <button data-val="0" class="active">0</button>
      <button data-val="1">1</button>
      <button data-val="3">3</button>
      <button data-val="5">5</button>
    </div>
  </div>

  <div class="setting">
    <label>Макс. карточек</label>
    <div class="seg" data-opt="maxCards">
      <button data-val="3">3</button>
      <button data-val="5" class="active">5</button>
      <button data-val="10">10</button>
    </div>
  </div>

  <div class="setting" style="margin-top:20px;">
    <button class="btn" id="btnExport">💾 Скачать капсулу</button>
    <button class="btn" id="btnImport">📥 Импортировать капсулу</button>
    <button class="btn" id="btnReindex">🔄 Пересоздать векторы</button>
    <button class="btn" id="btnReset" style="color:var(--err)">🗑 Сбросить всё</button>
    <button class="btn" id="btnNewIdentity" style="color:var(--warn)">🔑 Новый identity</button>
    <button class="btn primary" id="btnApply">Применить</button>
  </div>

  <div class="setting" style="margin-top:16px;">
    <label>Pubkey</label>
    <div class="pubkey" id="pubkeyDisplay" title="Click to copy">—</div>
  </div>

  <div class="setting">
    <label>Log</label>
    <div class="log" id="log"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" style="display:none" accept=".json" />

<script type="module">
/* ============================================================================
   NOOSPHERE v9.2 — Final
   - Исправлена публикация (по одному релею для корректного счётчика)
   - При отключении сети очищается «мир»
   - Авто‑тема реагирует на системные изменения
   ============================================================================ */

import * as tfMod from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
import * as nostrMod from 'https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm';

const pipeline = tfMod.pipeline || (tfMod.default && tfMod.default.pipeline);
const tfEnv = tfMod.env || (tfMod.default && tfMod.default.env);
const { SimplePool, finalizeEvent, generateSecretKey, getPublicKey } = nostrMod;

if (tfEnv) {
  tfEnv.allowLocalModels = false;
  tfEnv.useBrowserCache = true;
}

/* ---------- CONFIG ---------- */
const CFG = {
  DB_NAME: 'noosphere_v9',
  DB_VERSION: 1,
  STORE_THOUGHTS: 'thoughts',
  STORE_KEYS: 'keys',

  NOSTR_RELAYS: [
    'wss://relay.damus.io',
    'wss://nos.lol',
    'wss://relay.snort.social',
  ],

  KIND_THOUGHT: 1,
  WINDOW_SEC: 600,
  RESUB_INTERVAL_MS: 30000,
  MAX_EPHEMERAL_AGE_MS: 10 * 60_000,
  PEER_TTL_MS: 60_000,
  PRUNE_TICK_MS: 10_000,
  PUBLISH_THROTTLE_MS: 1500,
  MODEL_ID: 'Xenova/all-MiniLM-L6-v2',

  settings: {
    room: 'noosphere-2026',
    lang: 'ru',
    theme: 'auto',
    threshold: 0.25,
    adjDelta: 0.15,
    minWave: 0,
    maxCards: 5,
    debounceSec: 4,
  },
};

try {
  const saved = localStorage.getItem('noosphere_settings_v9');
  if (saved) Object.assign(CFG.settings, JSON.parse(saved));
} catch {}

const saveSettings = () => {
  try { localStorage.setItem('noosphere_settings_v9', JSON.stringify(CFG.settings)); } catch {}
};

/* ---------- TOAST ---------- */
const Toast = (() => {
  let hideTimer = null;
  const el = () => document.getElementById('toast');
  return {
    show(html, type = '', durationMs = 3000) {
      const t = el();
      if (!t) return;
      t.innerHTML = html;
      t.className = 'toast show ' + type;
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => { t.className = 'toast ' + type; }, durationMs);
    },
    showSending() { this.show('<span class="spinner"></span> Отправка в сеть...', 'warn', 30000); },
    showSuccess(msg) { this.show('✓ ' + msg, 'ok'); },
    showError(msg) { this.show('✗ ' + msg, 'err', 5000); }
  };
})();

/* ---------- LOGGER ---------- */
const Log = (() => {
  const fmt = (d) => d.toISOString().slice(11, 19);
  const safe = (x) => { try { return typeof x === 'string' ? x : JSON.stringify(x).slice(0, 400); } catch { return String(x); } };
  const write = (lvl, m, d) => {
    const line = document.createElement('div');
    line.className = lvl;
    const tail = d !== undefined ? ' ' + safe(d) : '';
    line.textContent = '[' + fmt(new Date()) + '] [' + lvl.toUpperCase() + '] ' + m + tail;
    const box = document.getElementById('log');
    if (box) { box.appendChild(line); box.scrollTop = box.scrollHeight; }
    const fn = lvl === 'e' ? 'error' : lvl === 'w' ? 'warn' : 'log';
    try { console[fn]('[ns:' + lvl + '] ' + m, d !== undefined ? d : ''); } catch {}
  };
  return {
    info: (m, d) => write('i', m, d),
    warn: (m, d) => write('w', m, d),
    error: (m, d) => write('e', m, d),
    success: (m, d) => write('s', m, d),
  };
})();

/* ---------- UTIL ---------- */
const Util = {
  newId: () => (crypto.randomUUID ? crypto.randomUUID() : ('id-' + Math.random().toString(36).slice(2, 15) + Date.now().toString(36))),
  now: () => Date.now(),
  escapeHtml: (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'),
};

/* ---------- STORAGE ---------- */
const Storage = (() => {
  let db = null;
  const open = () => new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(CFG.DB_NAME, CFG.DB_VERSION);
    req.onupgradeneeded = (ev) => {
      const _db = ev.target.result;
      if (!_db.objectStoreNames.contains(CFG.STORE_THOUGHTS)) {
        const s = _db.createObjectStore(CFG.STORE_THOUGHTS, { keyPath: 'id' });
        s.createIndex('createdAt', 'createdAt');
        s.createIndex('hasVector', 'hasVector');
      }
      if (!_db.objectStoreNames.contains(CFG.STORE_KEYS)) {
        _db.createObjectStore(CFG.STORE_KEYS, { keyPath: 'k' });
      }
    };
    req.onsuccess = (ev) => { db = ev.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
  const tx = (store, mode) => db.transaction(store, mode || 'readonly').objectStore(store);
  const prom = (req) => new Promise((r, j) => { req.onsuccess = () => r(req.result); req.onerror = () => j(req.error); });

  return {
    open,
    put: async (t) => { await open(); return prom(tx(CFG.STORE_THOUGHTS, 'readwrite').put(t)); },
    all: async () => { await open(); return prom(tx(CFG.STORE_THOUGHTS).getAll()); },
    listUnindexed: async () => {
      await open();
      return new Promise((res, rej) => {
        const out = [];
        const req = tx(CFG.STORE_THOUGHTS).index('hasVector').openCursor(IDBKeyRange.only(0));
        req.onsuccess = (ev) => { const c = ev.target.result; if (!c) return res(out); out.push(c.value); c.continue(); };
        req.onerror = () => rej(req.error);
      });
    },
    clear: async () => { await open(); await prom(tx(CFG.STORE_THOUGHTS, 'readwrite').clear()); },
    putKey: async (k, v) => { await open(); return prom(tx(CFG.STORE_KEYS, 'readwrite').put({ k, v })); },
    delKey: async (k) => { await open(); return prom(tx(CFG.STORE_KEYS, 'readwrite').delete(k)); },
    getKey: async (k) => { await open(); const r = await prom(tx(CFG.STORE_KEYS).get(k)); return r ? r.v : null; },
  };
})();

/* ---------- VECTOR ---------- */
const Vector = (() => {
  let extractor = null, loadPromise = null;
  return {
    load: (onProgress) => {
      if (extractor) return Promise.resolve(extractor);
      if (loadPromise) return loadPromise;
      loadPromise = pipeline('feature-extraction', CFG.MODEL_ID, {
        progress_callback: (p) => {
          if (onProgress && p.status === 'progress' && p.total) onProgress({ loaded: p.loaded, total: p.total });
        },
      }).then((ex) => {
        extractor = ex;
        Log.success('model loaded');
        return ex;
      }).catch((err) => { loadPromise = null; throw err; });
      return loadPromise;
    },
    embed: async (text) => {
      if (!extractor) throw new Error('Model not loaded');
      if (!text || !text.trim()) return null;
      const out = await extractor(text, { pooling: 'mean', normalize: true });
      return Array.from(out.data);
    },
    cosine: (a, b) => {
      if (!a || !b || a.length !== b.length) return 0;
      let s = 0;
      for (let i = 0; i < a.length; i++) s += a[i] * b[i];
      return s;
    },
    isLoaded: () => extractor !== null,
  };
})();

/* ---------- NETWORK ACTIVITY INDICATOR ---------- */
const NetActivity = (() => {
  let activeCount = 0;
  const bar = () => document.getElementById('netActivity');
  const chip = () => document.getElementById('chipActivity');

  const update = () => {
    const b = bar();
    const c = chip();
    if (!b || !c) return;
    if (activeCount > 0) {
      b.classList.add('active');
      c.style.display = '';
      c.className = 'chip publishing';
      c.innerHTML = '<span class="dot"></span>' + activeCount + ' in flight';
    } else {
      b.classList.remove('active');
      c.style.display = 'none';
    }
  };

  return {
    start: () => { activeCount++; update(); },
    stop: () => { activeCount = Math.max(0, activeCount - 1); update(); },
  };
})();

/* ---------- NOSTR CHANNEL (FIXED publish + offline clear) ---------- */
const Channel = (() => {
  let pool = null, sk = null, pk = null, roomName = null;
  let sub = null, resubTimer = null, pruneTimer = null;

  const peers = new Map();
  const seenEvents = new Map();
  const publishStatus = new Map();
  let lastPublishAt = 0;

  const dispatchCounts = () => {
    document.dispatchEvent(new CustomEvent('ns:peers', { detail: { count: peers.size } }));
    document.dispatchEvent(new CustomEvent('ns:world', { detail: { count: seenEvents.size } }));
  };

  const prune = () => {
    const now = Util.now();
    let changedPeers = false, changedWorld = false;

    for (const [pub, lastSeen] of peers) {
      if (now - lastSeen > CFG.PEER_TTL_MS) { peers.delete(pub); changedPeers = true; }
    }
    for (const [id, ts] of seenEvents) {
      if (now - ts > CFG.MAX_EPHEMERAL_AGE_MS) { seenEvents.delete(id); changedWorld = true; }
    }

    if (changedPeers) document.dispatchEvent(new CustomEvent('ns:peers', { detail: { count: peers.size } }));
    if (changedWorld) document.dispatchEvent(new CustomEvent('ns:world', { detail: { count: seenEvents.size } }));
  };

  const getPeersCount = () => peers.size;
  const getWorldCount = () => seenEvents.size;

  const doSubscribe = () => {
    if (!pool) return;

    const since = Math.floor(Date.now() / 1000) - CFG.WINDOW_SEC;
    if (sub) { try { sub.close(); } catch {} sub = null; }

    sub = pool.subscribeMany(CFG.NOSTR_RELAYS, [{
      kinds: [CFG.KIND_THOUGHT],
      '#t': [roomName],
      since,
      limit: 200,
    }], {
      onevent: (event) => {
        if (event.pubkey === pk) return;
        if (seenEvents.has(event.id)) return;

        seenEvents.set(event.id, Util.now());
        peers.set(event.pubkey, Util.now());

        try {
          const content = JSON.parse(event.content);
          if (!content || typeof content !== 'object') return;
          if (!content.text || typeof content.text !== 'string') return;
          if (!Array.isArray(content.vector)) return;
          if (content.vector.length < 64) return;

          document.dispatchEvent(new CustomEvent('ns:world-event', {
            detail: {
              id: event.id,
              text: content.text,
              vector: content.vector,
              fromPeer: event.pubkey,
              receivedAt: Util.now(),
            }
          }));
        } catch { /* not our event */ }
        dispatchCounts();
      },
      oneose: () => {
        prune();
        dispatchCounts();
      },
    });
  };

  return {
    init: async (room) => {
      if (pool) return;

      roomName = room;
      Log.info('initializing Nostr client...');

      let skHex = await Storage.getKey('nostr_sk');
      if (!skHex) {
        const newSk = generateSecretKey();
        skHex = Array.from(newSk).map(b => b.toString(16).padStart(2, '0')).join('');
        await Storage.putKey('nostr_sk', skHex);
        Log.success('generated new Nostr identity');
      }

      sk = new Uint8Array(skHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
      pk = getPublicKey(sk);
      Log.success('pubkey: ' + pk.slice(0, 16) + '...');
      document.dispatchEvent(new CustomEvent('ns:pubkey', { detail: { pk } }));

      pool = new SimplePool();
      Log.info('connecting to ' + CFG.NOSTR_RELAYS.length + ' relays');

      doSubscribe();
      resubTimer = setInterval(doSubscribe, CFG.RESUB_INTERVAL_MS);
      pruneTimer = setInterval(() => { prune(); dispatchCounts(); }, CFG.PRUNE_TICK_MS);

      document.dispatchEvent(new CustomEvent('ns:net', { detail: { online: true } }));
      Log.success('channel ready');
    },

    /**
     * Публикация: отправляем на каждый релей отдельно, чтобы корректно подсчитать успешные.
     */
    publish: async ({ text, vector, noteId, force }) => {
      if (!pool || !sk) return { ok: false, errors: ['not connected'] };

      const now = Date.now();
      if (!force && now - lastPublishAt < CFG.PUBLISH_THROTTLE_MS) {
        return { ok: false, throttled: true, errors: ['throttled'] };
      }
      lastPublishAt = now;

      NetActivity.start();
      try {
        const event = finalizeEvent({
          kind: CFG.KIND_THOUGHT,
          created_at: Math.floor(Date.now() / 1000),
          tags: [
            ['t', roomName],
            ['client', 'noosphere-v9.2'],
          ],
          content: JSON.stringify({
            text: text.slice(0, 500),
            vector,
            id: noteId,
          }),
        }, sk);

        // Отправляем на каждый релей отдельным промисом
        const promises = CFG.NOSTR_RELAYS.map(url => pool.publish([url], event));
        const results = await Promise.allSettled(promises);
        const latency = Date.now() - now;

        let okCount = 0;
        const errors = [];
        results.forEach((r, i) => {
          const url = CFG.NOSTR_RELAYS[i].replace('wss://', '').replace(/\/$/, '');
          if (r.status === 'fulfilled' && r.value === true) {
            okCount++;
          } else {
            const msg = r.status === 'rejected'
              ? (r.reason?.message || String(r.reason || 'unknown'))
              : 'rejected (false)';
            errors.push(url + ': ' + msg);
          }
        });

        if (okCount > 0) {
          Log.success(`published to ${okCount}/${CFG.NOSTR_RELAYS.length} (${latency}ms)`);
        } else {
          Log.error('publish failed on all relays');
          errors.forEach(e => Log.warn('  ' + e));
        }

        return { ok: okCount > 0, okCount, total: CFG.NOSTR_RELAYS.length, errors };
      } catch (e) {
        Log.error('publish err: ' + e.message);
        return { ok: false, errors: [e.message] };
      } finally {
        NetActivity.stop();
      }
    },

    leave: () => {
      if (pruneTimer) { clearInterval(pruneTimer); pruneTimer = null; }
      if (resubTimer) { clearInterval(resubTimer); resubTimer = null; }
      if (sub) { try { sub.close(); } catch {} sub = null; }
      if (pool) { try { pool.close(CFG.NOSTR_RELAYS); } catch {} pool = null; }

      peers.clear();
      seenEvents.clear();

      document.dispatchEvent(new CustomEvent('ns:net', { detail: { online: false } }));
      dispatchCounts();
    },

    isConnected: () => pool !== null,

    getPublishStatus: (id) => publishStatus.get(id) || null,
    setPublishStatus: (id, status) => {
      publishStatus.set(id, status);
      document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
    },

    resetIdentity: async () => {
      await Storage.delKey('nostr_sk');
      location.reload();
    },

    getPeersCount: () => peers.size,
  };
})();

/* ---------- RELEVANCE ---------- */
const Relevance = (() => {
  const escapeHtml = Util.escapeHtml;

  const highlight = (qt, mt) => {
    if (!qt || !mt) return escapeHtml(mt);
    const qT = qt.toLowerCase().match(/\w+/g) || [];
    const mT = mt.toLowerCase().match(/\w+/g) || [];
    if (!qT.length || !mT.length) return escapeHtml(mt);

    const mRaw = mt.match(/\w+/g) || [];
    const mPos = [];
    let cursor = 0;
    for (const w of mRaw) {
      const idx = mt.toLowerCase().indexOf(w.toLowerCase(), cursor);
      if (idx < 0) break;
      mPos.push({ start: idx, end: idx + w.length });
      cursor = idx + w.length;
    }

    let bestLen = 0, bestStart = -1;
    for (let i = 0; i < mT.length && i < mPos.length; i++) {
      for (let L = Math.min(qT.length, mT.length - i); L > bestLen; L--) {
        if (i + L > mPos.length) break;
        if (qT.join(' ').includes(mT.slice(i, i + L).join(' '))) {
          bestLen = L; bestStart = i;
        }
      }
    }

    if (bestLen < 2 || bestStart < 0) return escapeHtml(mt);
    const a = mPos[bestStart], b = mPos[bestStart + bestLen - 1];
    return escapeHtml(mt.slice(0, a.start)) +
           '<mark>' + escapeHtml(mt.slice(a.start, b.end)) + '</mark>' +
           escapeHtml(mt.slice(b.end));
  };

  const rank = (qv, locals, world) => {
    if (!qv) return { mine: [], world: [], adjacent: [] };
    const { threshold, adjDelta, maxCards } = CFG.settings;

    const ls = locals.filter(t => Array.isArray(t.vector))
      .map(t => ({ source: t, score: Vector.cosine(qv, t.vector) }))
      .filter(r => r.score > threshold - adjDelta)
      .sort((a, b) => b.score - a.score);

    const ws = world
      .filter(r => Array.isArray(r.vector) && r.vector.length === qv.length)
      .map(r => ({ source: r, score: Vector.cosine(qv, r.vector) }))
      .filter(r => r.score > threshold - adjDelta)
      .sort((a, b) => b.score - a.score);

    const mine = [], worldOut = [], adjacent = [];
    for (const r of ls) {
      if (r.score >= threshold) { if (mine.length < maxCards) mine.push(r); }
      else if (adjacent.length < maxCards) adjacent.push(r);
    }
    for (const r of ws) {
      if (r.score >= threshold) { if (worldOut.length < maxCards) worldOut.push(r); }
      else if (adjacent.length < maxCards) adjacent.push(r);
    }

    return { mine, world: worldOut, adjacent };
  };

  return { rank, highlight };
})();

/* ---------- UI ---------- */
const UI = (() => {
  let lastQuery = { text: null, vector: null };
  let debounceTimer = null;
  let countdownTimer = null;
  let worldBuffer = [];
  let isPublishing = false;

  const $ = (id) => document.getElementById(id);

  const setChip = (id, text, status) => {
    const el = $(id);
    if (!el) return;
    el.className = 'chip ' + (status || '');
    el.innerHTML = '<span class="dot"></span>' + text;
  };

  const setProgress = (pct) => {
    const el = $('modelProgress');
    if (el) el.style.width = pct + '%';
  };

  const applyTheme = () => {
    const theme = CFG.settings.theme;
    if (theme === 'auto') {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
  };

  // Слушаем изменения системной темы
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (CFG.settings.theme === 'auto') applyTheme();
  });

  const renderCard = (r, qt, type) => {
    const s = r.source;
    const card = document.createElement('div');
    card.className = 'card ' + type;

    let tagLabel = type === 'mine' ? 'LOCAL' : type === 'world' ? 'NOSTR' : 'СМЕЖНО';
    let pubStatus = '';

    if (type === 'mine') {
      if (s.published) {
        const st = Channel.getPublishStatus(s.id);
        if (st === 'ok') pubStatus = '<span class="pub-status pub-ok">✓ pub</span>';
        else if (st === 'err') pubStatus = '<span class="pub-status pub-err">✗ fail</span>';
        else if (st === 'pending') pubStatus = '<span class="pub-status pub-pending">sending</span>';
        else pubStatus = '<span class="pub-status pub-ok">✓ pub</span>';
      } else {
        pubStatus = '<span class="pub-status">local</span>';
      }
    }

    const metaInfo = type === 'world'
      ? 'from: ' + (s.fromPeer || '?').slice(0, 10) + ' · RAM'
      : new Date(s.createdAt || s.receivedAt || Date.now()).toLocaleTimeString();

    card.innerHTML =
      '<div class="head">' +
        '<span class="tag">' + tagLabel + '</span>' +
        '<span class="score">' + r.score.toFixed(3) + '</span>' +
      '</div>' +
      '<div class="text">' + Relevance.highlight(qt, s.text) + '</div>' +
      '<div class="meta">' + pubStatus + '<span>' + metaInfo + '</span></div>';

    return card;
  };

  const renderEmpty = (container, msg) => {
    container.innerHTML = '<div class="empty"><div class="icon">◇</div>' + msg + '</div>';
  };

  const renderList = (container, items, qt, type, emptyMsgOverride) => {
    container.innerHTML = '';
    if (!items.length) {
      const msg = emptyMsgOverride ??
        (type === 'world' ? 'нет соседей в комнате' :
         type === 'adjacent' ? 'нет смежных мыслей' : 'ещё ничего не сохранено');
      renderEmpty(container, msg);
      return;
    }
    items.forEach(r => container.appendChild(renderCard(r, qt, type)));
  };

  const pruneWorldBuffer = () => {
    const cutoff = Util.now() - CFG.MAX_EPHEMERAL_AGE_MS;
    const before = worldBuffer.length;
    worldBuffer = worldBuffer.filter(w => (w.receivedAt || 0) > cutoff);
    if (worldBuffer.length !== before) updateRelevance();
  };

  const updateRelevance = async () => {
    pruneWorldBuffer();

    const text = $('input').value.trim();
    if (!text) {
      renderList($('listMine'), [], '', 'mine');
      renderList($('listWorld'), [], '', 'world');
      renderList($('listAdjacent'), [], '', 'adjacent');
      $('badgeMine').textContent = '0';
      $('badgeWorld').textContent = '0';
      $('badgeAdj').textContent = '0';
      lastQuery = { text: null, vector: null };
      return;
    }

    if (!Vector.isLoaded()) return;

    let qv;
    if (lastQuery.text === text && lastQuery.vector) qv = lastQuery.vector;
    else {
      try { qv = await Vector.embed(text); lastQuery = { text, vector: qv }; }
      catch { return; }
    }

    const locals = await Storage.all();
    const { mine, world, adjacent } = Relevance.rank(qv, locals, worldBuffer);

    const peersCount = Channel.getPeersCount();
    const minWave = Number(CFG.settings.minWave || 0);
    const worldAllowed = (minWave <= 0) || (peersCount >= minWave);

    renderList($('listMine'), mine, text, 'mine');
    renderList(
      $('listWorld'),
      worldAllowed ? world : [],
      text,
      'world',
      worldAllowed ? undefined : (`нужно минимум ${minWave} peers (сейчас ${peersCount})`)
    );
    renderList($('listAdjacent'), adjacent, text, 'adjacent');

    $('badgeMine').textContent = mine.length;
    $('badgeWorld').textContent = worldAllowed ? world.length : 0;
    $('badgeAdj').textContent = adjacent.length;
  };

  const renderHistory = async () => {
    const container = $('listHistory');
    const all = await Storage.all();
    const sorted = all.sort((a, b) => b.createdAt - a.createdAt);
    container.innerHTML = '';
    if (!sorted.length) {
      renderEmpty(container, 'история пуста');
      return;
    }
    sorted.forEach(t => {
      const card = document.createElement('div');
      card.className = 'card mine';
      let pubStatus = '';
      if (t.published) {
        const st = Channel.getPublishStatus(t.id);
        if (st === 'ok') pubStatus = '<span class="pub-status pub-ok">✓ pub</span>';
        else if (st === 'err') pubStatus = '<span class="pub-status pub-err">✗ fail</span>';
        else if (st === 'pending') pubStatus = '<span class="pub-status pub-pending">sending</span>';
        else pubStatus = '<span class="pub-status pub-ok">✓ pub</span>';
      } else {
        pubStatus = '<span class="pub-status">local</span>';
      }
      card.innerHTML =
        '<div class="head"><span class="tag">' + (t.published ? 'WORLD' : 'LOCAL') + '</span>' +
        '<span class="score">' + new Date(t.createdAt).toLocaleString() + '</span></div>' +
        '<div class="text">' + Util.escapeHtml(t.text) + '</div>' +
        '<div class="meta">' + pubStatus +
        '<span>vec:' + (t.hasVector ? 'yes' : 'no') + '</span>' +
        '<span>' + t.id.slice(0, 6) + '</span></div>';
      container.appendChild(card);
    });
  };

  const save = async ({ publishToWorld, force = false }) => {
    if (isPublishing) { Log.warn('already publishing, ignored'); return; }

    const input = $('input');
    const text = input.value.trim();
    if (!text) { Toast.showError('пустая заметка'); return; }

    const thought = {
      id: Util.newId(),
      text,
      createdAt: Util.now(),
      updatedAt: Util.now(),
      vector: null,
      hasVector: 0,
      published: !!publishToWorld,
    };

    if (Vector.isLoaded()) {
      try {
        thought.vector = await Vector.embed(text);
        thought.hasVector = thought.vector ? 1 : 0;
      } catch (e) {
        Log.warn('embed fail: ' + e.message);
      }
    }

    await Storage.put(thought);
    Log.info('saved locally: ' + thought.id.slice(0, 8));

    input.value = '';
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    $('countdown').textContent = '';

    if (publishToWorld) {
      if (!Channel.isConnected()) {
        Channel.setPublishStatus(thought.id, 'err');
        Toast.showError('нет подключения к сети');
      } else if (!thought.vector) {
        Channel.setPublishStatus(thought.id, 'err');
        Toast.showError('нет вектора (модель не загружена)');
      } else {
        Channel.setPublishStatus(thought.id, 'pending');
        Toast.showSending();

        isPublishing = true;
        const btn = $('btnPublish');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span>Отправка...';
        btn.disabled = true;

        try {
          const r = await Channel.publish({ text: thought.text, vector: thought.vector, noteId: thought.id, force });
          if (r.ok) {
            Channel.setPublishStatus(thought.id, 'ok');
            Toast.showSuccess('Отправлено (' + r.okCount + '/' + r.total + ' relay)');
          } else if (r.throttled) {
            Channel.setPublishStatus(thought.id, 'err');
            Toast.showError('слишком часто (throttle)');
          } else {
            Channel.setPublishStatus(thought.id, 'err');
            Toast.showError('ошибка publish');
            (r.errors || []).slice(0, 2).forEach(e => Log.warn('  ' + e));
          }
        } catch (e) {
          Channel.setPublishStatus(thought.id, 'err');
          Toast.showError(e.message);
        } finally {
          isPublishing = false;
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      }
    } else {
      Toast.showSuccess('Сохранено локально');
    }

    await updateRelevance();
    await renderHistory();
  };

  const startCountdown = () => {
    const el = $('countdown');
    let remaining = CFG.settings.debounceSec;
    el.textContent = remaining + 'с';
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      remaining--;
      if (remaining > 0) el.textContent = remaining + 'с';
      else { clearInterval(countdownTimer); countdownTimer = null; el.textContent = ''; }
    }, 1000);
  };

  const stopCountdown = () => {
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    $('countdown').textContent = '';
  };

  const init = async () => {
    const setRoom = $('setRoom');
    const setThreshold = $('setThreshold');
    const setAdj = $('setAdj');

    setRoom.value = CFG.settings.room;
    setThreshold.value = CFG.settings.threshold;
    setAdj.value = CFG.settings.adjDelta;
    $('valThreshold').textContent = CFG.settings.threshold;
    $('valAdj').textContent = CFG.settings.adjDelta;

    applyTheme();

    // Seg controls
    document.querySelectorAll('.seg').forEach(seg => {
      const opt = seg.dataset.opt;
      const val = String(CFG.settings[opt]);
      seg.querySelectorAll('button').forEach(b => {
        b.classList.toggle('active', b.dataset.val === val);
        b.onclick = () => {
          seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          const v = b.dataset.val;
          CFG.settings[opt] = /^\d+$/.test(v) ? parseInt(v) : v;
          saveSettings();
          if (opt === 'theme') applyTheme();
          updateRelevance();
        };
      });
    });

    // Main tabs
    document.querySelectorAll('.main-tab').forEach(t => {
      t.onclick = () => {
        document.querySelectorAll('.main-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        const main = t.dataset.main;
        document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + main));
        if (main === 'history') renderHistory();
      };
    });

    // Sub tabs
    document.querySelectorAll('.sub-tab').forEach(t => {
      t.onclick = () => {
        document.querySelectorAll('.sub-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        const sub = t.dataset.sub;
        $('sub-mine').style.display = sub === 'mine' ? '' : 'none';
        $('sub-world').style.display = sub === 'world' ? '' : 'none';
        $('sub-adjacent').style.display = sub === 'adjacent' ? '' : 'none';
      };
    });

    // Input + debounce
    const input = $('input');
    input.addEventListener('input', () => {
      const text = input.value.trim();
      if (!text) {
        if (debounceTimer) clearTimeout(debounceTimer);
        stopCountdown();
        updateRelevance();
        return;
      }
      if (debounceTimer) clearTimeout(debounceTimer);
      startCountdown();
      debounceTimer = setTimeout(() => {
        stopCountdown();
        updateRelevance();
      }, CFG.settings.debounceSec * 1000);
      updateRelevance();
    });

    // Swipe up to publish
    const composer = $('composer');
    let touchStartY = 0;
    composer.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
    composer.addEventListener('touchend', (e) => {
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (dy > 50) save({ publishToWorld: true });
    });

    // Buttons
    $('btnSaveLocal').onclick = () => save({ publishToWorld: false });
    $('btnPublish').onclick = () => save({ publishToWorld: true });

    // Drawer
    const drawer = $('drawer');
    const overlay = $('overlay');
    $('btnSettings').onclick = () => { drawer.classList.add('open'); overlay.classList.add('show'); };
    const closeDrawer = () => { drawer.classList.remove('open'); overlay.classList.remove('show'); };
    $('btnClose').onclick = closeDrawer;
    overlay.onclick = closeDrawer;

    // Settings inputs
    setRoom.oninput = (e) => { CFG.settings.room = e.target.value.trim() || 'noosphere-2026'; };
    setThreshold.oninput = (e) => {
      CFG.settings.threshold = parseFloat(e.target.value);
      $('valThreshold').textContent = CFG.settings.threshold;
      saveSettings();
      updateRelevance();
    };
    setAdj.oninput = (e) => {
      CFG.settings.adjDelta = parseFloat(e.target.value);
      $('valAdj').textContent = CFG.settings.adjDelta;
      saveSettings();
      updateRelevance();
    };

    // Export / Import / Reindex / Reset / Identity
    $('btnExport').onclick = async () => {
      const all = await Storage.all();
      const capsule = {
        version: 9,
        exported: new Date().toISOString(),
        notes: all.map(n => ({ id: n.id, text: n.text, createdAt: n.createdAt, vector: n.vector, published: n.published })),
      };
      const blob = new Blob([JSON.stringify(capsule, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'noosphere-capsule-' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
      Toast.showSuccess('Капсула скачана');
    };

    $('btnImport').onclick = () => $('fileInput').click();
    $('fileInput').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (!data || !Array.isArray(data.notes)) throw new Error('bad format');
        let imported = 0;
        for (const n of data.notes) {
          if (!n.id || !n.text) continue;
          await Storage.put({
            id: n.id, text: n.text,
            createdAt: n.createdAt || Util.now(),
            updatedAt: Util.now(),
            vector: n.vector || null,
            hasVector: n.vector ? 1 : 0,
            published: !!n.published,
          });
          imported++;
        }
        await updateRelevance();
        await renderHistory();
        Toast.showSuccess('Импортировано ' + imported);
      } catch (err) {
        Toast.showError(err.message);
      }
      e.target.value = '';
    };

    $('btnReindex').onclick = async () => {
      if (!Vector.isLoaded()) { Toast.showError('Загрузите модель'); return; }
      const pending = await Storage.listUnindexed();
      let done = 0;
      for (const t of pending) {
        try {
          const v = await Vector.embed(t.text);
          t.vector = v; t.hasVector = v ? 1 : 0;
          await Storage.put(t);
        } catch {}
        done++;
      }
      Toast.showSuccess('Пересоздано ' + done);
      await updateRelevance();
      await renderHistory();
    };

    $('btnReset').onclick = async () => {
      if (!confirm('Стереть все заметки?')) return;
      await Storage.clear();
      worldBuffer = [];
      await updateRelevance();
      await renderHistory();
      Toast.showSuccess('Очищено');
    };

    $('btnNewIdentity').onclick = async () => {
      if (!confirm('Создать новый identity?')) return;
      await Channel.resetIdentity();
    };

    $('btnApply').onclick = async () => {
      saveSettings();
      closeDrawer();
      Channel.leave();
      try {
        setChip('chipNet', 'connecting', 'warn');
        await Channel.init(CFG.settings.room);
        setChip('chipNet', 'online', 'ok');
        Toast.showSuccess('Применено');
      } catch (err) {
        setChip('chipNet', 'offline', 'warn');
        Toast.showError(err.message);
      }
    };

    // Events
    document.addEventListener('ns:thoughts-changed', () => { updateRelevance(); renderHistory(); });

    document.addEventListener('ns:world-event', (ev) => {
      const e2 = ev.detail;
      worldBuffer.push(e2);
      pruneWorldBuffer();
      updateRelevance();
    });

    document.addEventListener('ns:peers', (ev) => {
      setChip('chipPeers', ev.detail.count + ' peers', ev.detail.count ? 'ok' : 'warn');
    });

    document.addEventListener('ns:world', (ev) => {
      setChip('chipWorld', ev.detail.count + ' world', ev.detail.count ? 'ok' : 'warn');
    });

    document.addEventListener('ns:net', (ev) => {
      const online = ev.detail.online;
      setChip('chipNet', online ? 'online' : 'offline', online ? 'ok' : 'warn');
      // При отключении очищаем «мир»
      if (!online) {
        worldBuffer = [];
        updateRelevance();
      }
    });

    document.addEventListener('ns:pubkey', (ev) => {
      const el = $('pubkeyDisplay');
      el.textContent = ev.detail.pk;
      el.onclick = async () => {
        try {
          await navigator.clipboard.writeText(ev.detail.pk);
          Toast.showSuccess('Pubkey скопирован');
        } catch {}
      };
    });

    // Boot
    try {
      await Storage.open();
      Log.success('IDB ready');
    } catch (err) {
      Log.error('IDB fail: ' + err.message);
      Toast.showError('IDB error');
      return;
    }

    // Периодическая очистка UI-буфера
    setInterval(pruneWorldBuffer, CFG.PRUNE_TICK_MS);

    // Auto-load model
    (async () => {
      try {
        setChip('chipModel', 'loading...', 'warn');
        await Vector.load((p) => {
          if (p.total) {
            const pct = Math.round((p.loaded / p.total) * 100);
            setProgress(pct);
            setChip('chipModel', 'model ' + pct + '%', 'warn');
          }
        });
        setChip('chipModel', 'model ready', 'ok');
        setProgress(100);
      } catch (err) {
        setChip('chipModel', 'model err', 'err');
        Log.error('model load fail: ' + err.message);
      }
    })();

    // Auto-connect
    (async () => {
      try {
        setChip('chipNet', 'connecting', 'warn');
        await Channel.init(CFG.settings.room);
        setChip('chipNet', 'online', 'ok');
      } catch (err) {
        setChip('chipNet', 'offline', 'warn');
        Log.error('connect fail: ' + err.message);
      }
    })();

    await renderHistory();
    Log.success('Noosphere v9.2 ready');
  };

  return { init };
})();

UI.init();
</script>
</body>
</html>
