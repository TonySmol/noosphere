<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Semantic Search (Transformers.js)</title></head>
<body>
<input id="q" placeholder="Запрос...">
<button id="btn">Найти</button>
<ul id="res"></ul>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

env.allowLocalModels = false;
env.useBrowserCache = true; // кеширует в IndexedDB, если поддерживается

const docs = [
  "Кошки любят молоко и спать на солнце.",
  "JavaScript работает в браузере без сервера.",
  "Трансформеры используют механизм внимания."
];

let extractor;
document.getElementById('btn').onclick = async () => {
  if (!extractor) {
    document.getElementById('res').innerHTML = '<li>Загрузка модели... (~20 МБ)</li>';
    extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
      pooling: 'mean', normalize: true // упрощает пулинг и нормализацию
    });
  }

  const query = document.getElementById('q').value.trim();
  if (!query) return;

  const [qEmb] = (await extractor([query])).data;
  const sim = [];

  for (const d of docs) {
    const [dEmb] = (await extractor([d])).data;
    let dot = 0;
    for (let i = 0; i < qEmb.length; i++) dot += qEmb[i] * dEmb[i];
    sim.push({ text: d, score: dot });
  }

  sim.sort((a, b) => b.score - a.score);
  document.getElementById('res').innerHTML = sim.map(s => `<li>${s.score.toFixed(3)}: ${s.text}</li>`).join('');
};
</script>
</body>
</html>
