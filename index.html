<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Noomium</title>
<style>
  :root {
    --bg:#0f1115; --panel:#161a22; --border:#242a36;
    --text:#e6e8ee; --muted:#8a93a6; --accent:#6aa6ff;
    --ok:#4ade80; --warn:#f59e0b; --err:#ef4444;
  }
  [data-theme="light"] {
    --bg:#f5f5f7; --panel:#ffffff; --border:#e0e0e6;
    --text:#1a1d24; --muted:#6b7280; --accent:#2563eb;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
               font:14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
               transition: background .2s, color .2s; }
  .wrap { max-width:1000px; margin:0 auto; padding:16px; }
  h1 { font-size:18px; margin:0 0 14px; letter-spacing:1px; display:flex; align-items:center; gap:10px; }
  h1 .lang { font-size:11px; color:var(--muted); cursor:pointer; padding:3px 8px;
             border:1px solid var(--border); border-radius:3px; user-select:none; }
  h1 small { color:var(--muted); font-weight:normal; font-size:11px; margin-left:auto; }
  h2 { font-size:11px; margin:16px 0 6px; color:var(--muted);
       text-transform:uppercase; letter-spacing:1px; }
  .panel { background:var(--panel); border:1px solid var(--border);
           border-radius:6px; padding:12px; margin-bottom:10px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  @media (max-width:820px) { .grid-3 { grid-template-columns:1fr; } }

  textarea { width:100%; background:var(--bg); color:var(--text);
             border:1px solid var(--border); border-radius:4px;
             padding:10px; font:inherit; resize:vertical; min-height:70px; }
  button { background:var(--panel); color:var(--text); border:1px solid var(--border);
           border-radius:4px; padding:7px 11px; font:inherit; cursor:pointer; font-size:12px; }
  button:hover:not(:disabled) { background:var(--border); }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.secondary { background:var(--bg); color:var(--accent); border-color:var(--accent); }
  button.danger { background:#2a1a1d; color:var(--err); border-color:#3d1f22; }
  [data-theme="light"] button.danger { background:#fee; }
  button:disabled { opacity:.5; cursor:not-allowed; }

  .status { display:inline-flex; gap:8px; flex-wrap:wrap; }
  .pill { padding:2px 7px; border-radius:999px; font-size:10px;
          background:var(--bg); border:1px solid var(--border); color:var(--muted); }
  .pill.ok   { color:var(--ok);   border-color:var(--ok); }
  .pill.warn { color:var(--warn); border-color:var(--warn); }
  .pill.err  { color:var(--err);  border-color:var(--err); }
  .pill.think { color:var(--accent); border-color:var(--accent); }

  .list { display:flex; flex-direction:column; gap:6px; min-height:50px; }
  .item { background:var(--bg); border:1px solid var(--border);
          border-radius:4px; padding:8px 10px; font-size:13px; }
  .item.local { border-left:3px solid #555; }
  .item.world { border-left:3px solid var(--accent); }
  .item .score { float:right; color:var(--muted); font-size:10px; }
  .item .meta { color:var(--muted); font-size:10px; margin-top:4px; }
  .item mark { background:transparent; color:var(--accent); font-weight:bold; }

  .progress { height:3px; background:var(--border); border-radius:2px;
              overflow:hidden; margin-top:6px; }
  .progress > div { height:100%; background:var(--accent); width:0; transition:width .2s; }

  .log { background:var(--bg); border:1px solid var(--border);
         border-radius:4px; padding:8px; max-height:180px; overflow:auto; font-size:10px; }
  .log .e { color:var(--err); } .log .w { color:var(--warn); } .log .i { color:var(--muted); }

  .empty { color:var(--muted); font-size:12px; padding:6px; }
  .hint { font-size:11px; color:var(--muted); font-style:italic; margin-top:6px; }
  .device-id { font-size:10px; color:var(--muted); margin-top:6px; word-break:break-all; }

  .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  @media (max-width:600px) { .settings-grid { grid-template-columns:1fr; } }
  .settings-grid label { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted); }
  .settings-grid input, .settings-grid select {
    padding:6px; font-size:12px; background:var(--bg); color:var(--text);
    border:1px solid var(--border); border-radius:4px; font:inherit;
  }
  textarea.peers { min-height:50px; font-size:11px; }
  details summary { cursor:pointer; color:var(--muted); font-size:12px; padding:4px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>
    NOOMIUM
    <span class="lang" id="langSwitch">EN</span>
    <small data-i18n="tagline">local first · gun p2p</small>
  </h1>

  <section class="panel">
    <div class="status" id="status">
      <span class="pill" data-key="idb">IDB: ...</span>
      <span class="pill" data-key="gun">GUN: ...</span>
      <span class="pill" data-key="peers">PEERS: 0</span>
      <span class="pill" data-key="model">MODEL: idle</span>
      <span class="pill" data-key="indexed">INDEXED: 0</span>
      <span class="pill" data-key="think" style="display:none">...</span>
    </div>
    <div class="device-id" id="deviceId">device: ...</div>
    <div class="progress"><div id="modelProgress"></div></div>
  </section>

  <section class="panel">
    <h2 data-i18n="thought">thought</h2>
    <textarea id="input" placeholder="напечатай мысль..."></textarea>
    <div class="row" style="margin-top:8px;">
      <button id="btnSave" class="secondary" data-i18n="saveLocal">Сохранить</button>
      <button id="btnSaveWorld" class="primary" data-i18n="saveWorld">Сохранить + в Мир</button>
    </div>
  </section>

  <section class="panel">
    <h2 data-i18n="relevance">live relevance</h2>
    <div class="grid-3">
      <div>
        <div style="color:var(--muted); font-size:10px; margin-bottom:4px; text-transform:uppercase;" data-i18n="colMine">MY</div>
        <div class="list" id="listMine"></div>
      </div>
      <div>
        <div style="color:var(--muted); font-size:10px; margin-bottom:4px; text-transform:uppercase;" data-i18n="colWorld">WORLD</div>
        <div class="list" id="listWorld"></div>
      </div>
      <div>
        <div style="color:var(--muted); font-size:10px; margin-bottom:4px; text-transform:uppercase;" data-i18n="colAdjacent">ADJACENT</div>
        <div class="list" id="listAdjacent"></div>
      </div>
    </div>
  </section>

  <section class="panel">
    <details>
      <summary data-i18n="settings">настройки</summary>
      <div class="settings-grid">
        <label>
          <span data-i18n="theme">Тема</span>
          <select id="setTheme">
            <option value="auto" data-i18n="auto">Авто</option>
            <option value="dark" data-i18n="dark">Тёмная</option>
            <option value="light" data-i18n="light">Светлая</option>
          </select>
        </label>
        <label>
          <span data-i18n="threshold">Порог</span>
          <input type="number" id="setThreshold" step="0.05" min="0" max="1" value="0.25" />
        </label>
        <label>
          <span data-i18n="adjacency">Дельта смежности</span>
          <input type="number" id="setAdjacency" step="0.05" min="0" max="1" value="0.15" />
        </label>
        <label>
          <span data-i18n="maxCards">Макс. карточек</span>
          <select id="setMaxCards">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
          </select>
        </label>
        <label style="grid-column: 1 / -1;">
          <span data-i18n="relays">Gun relay peers (по одному URL на строку)</span>
          <textarea id="setRelays" class="peers">https://relay.peer.ooo/gun</textarea>
        </label>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="btnApplySettings" class="primary" data-i18n="apply">Применить</button>
        <button id="btnLoadModel" data-i18n="loadModel">Загрузить MiniLM</button>
        <button id="btnReindex" data-i18n="reindex">Реиндекс</button>
        <button id="btnSeed5" data-i18n="seed5">Seed 5</button>
        <button id="btnExport" data-i18n="export">Экспорт</button>
        <button id="btnImport" data-i18n="import">Импорт</button>
        <input type="file" id="importFile" accept=".json" style="display:none" />
        <button id="btnReset" class="danger" data-i18n="reset">Сброс</button>
      </div>
    </details>
  </section>

  <section class="panel">
    <h2 data-i18n="myThoughts">мои мысли</h2>
    <div class="list" id="listAll"></div>
  </section>

  <section class="panel">
    <details>
      <summary data-i18n="eventLog">лог</summary>
      <div class="log" id="log" style="margin-top:8px;"></div>
    </details>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/radisk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/rindexed.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/axe.js"></script>

<script type="module">
/* ============================================================================
   NOOMIUM v1.0 — local first · gun p2p
   ----------------------------------------------------------------------------
   Архитектура:
     1. Storage (IDB) — только локальные заметки + векторы + мировые (кеш).
     2. Vector (MiniLM) — с кешем Cache API, не перезагружается.
     3. P2P (Gun relay) — публичный граф мировых заметок.
     4. Anti-ghost: originDevice фильтр.
     5. Debounce 4s, кеш queryVector, очистка при пустом поле.

   Секции:
     [1] Config  [2] I18n  [3] Logger  [4] Util  [5] Device  [6] Settings
     [7] Storage  [8] Vector  [9] P2P  [10] Relevance  [11] Sync  [12] Capsule
     [13] UI  [14] App
   ============================================================================ */

import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

env.allowLocalModels = false;
env.useBrowserCache = true;

const ns = (window.__ns = {});

/* [1] CONFIG */
ns.Config = Object.freeze({
  DB_NAME: 'noomium_v1',
  DB_VERSION: 1,
  STORE_THOUGHTS: 'thoughts',
  STORE_META: 'meta',
  GUN_WORLD_NS: 'noomium/world/v1',
  DEFAULT_RELAYS: ['https://relay.peer.ooo/gun'],
  LIMITS: {
    MAX_TEXT_LENGTH: 10_000,
    RENDER_CAP: 300,
    DEBOUNCE_MS: 4000,
    CACHE_PROBE_MS: 500,
  },
  VECTOR: { MODEL_ID: 'Xenova/all-MiniLM-L6-v2' },
});

/* [2] I18N */
ns.I18n = (() => {
  const dict = {
    ru: {
      tagline: 'локально в приоритете · gun p2p',
      thought: 'мысль', saveLocal: 'Сохранить', saveWorld: 'Сохранить + в Мир',
      relevance: 'живая релевантность',
      colMine: 'MY', colWorld: 'WORLD', colAdjacent: 'ADJACENT',
      settings: 'настройки', theme: 'Тема', auto: 'Авто', dark: 'Тёмная', light: 'Светлая',
      threshold: 'Порог', adjacency: 'Дельта смежности', maxCards: 'Макс. карточек',
      relays: 'Gun relay (по одному URL на строку)',
      apply: 'Применить', loadModel: 'Загрузить MiniLM', reindex: 'Реиндекс',
      seed5: 'Seed 5', export: 'Экспорт', import: 'Импорт',
      reset: 'Сброс', myThoughts: 'мои мысли', eventLog: 'лог',
    },
    en: {
      tagline: 'local first · gun p2p',
      thought: 'thought', saveLocal: 'Save local', saveWorld: 'Save + World',
      relevance: 'live relevance',
      colMine: 'MY', colWorld: 'WORLD', colAdjacent: 'ADJACENT',
      settings: 'settings', theme: 'Theme', auto: 'Auto', dark: 'Dark', light: 'Light',
      threshold: 'Threshold', adjacency: 'Adjacency delta', maxCards: 'Max cards',
      relays: 'Gun relay (one URL per line)',
      apply: 'Apply', loadModel: 'Load MiniLM', reindex: 'Reindex',
      seed5: 'Seed 5', export: 'Export', import: 'Import',
      reset: 'Reset', myThoughts: 'my thoughts', eventLog: 'log',
    },
  };
  const apply = (lang) => {
    const d = dict[lang] || dict.ru;
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      const key = el.getAttribute('data-i18n');
      if (d[key]) el.textContent = d[key];
    });
  };
  return { apply };
})();

/* [3] LOGGER */
ns.Logger = (() => {
  const el = () => document.getElementById('log');
  const fmt = (d) => d.toISOString().slice(11, 19);
  const safe = (x) => {
    try { return typeof x === 'string' ? x : JSON.stringify(x); }
    catch { return String(x); }
  };
  const write = (lvl, m, d) => {
    const line = document.createElement('div');
    line.className = lvl;
    const tail = d !== undefined ? ' ' + safe(d) : '';
    line.textContent = `[${fmt(new Date())}] [${lvl.toUpperCase()}] ${m}${tail}`;
    const box = el();
    if (box) { box.appendChild(line); box.scrollTop = box.scrollHeight; }
    const fn = lvl === 'e' ? 'error' : lvl === 'w' ? 'warn' : 'log';
    console[fn](`[noomium:${lvl}] ${m}`, d ?? '');
  };
  return {
    info:  (m, d) => write('i', m, d),
    warn:  (m, d) => write('w', m, d),
    error: (m, d) => write('e', m, d),
  };
})();

/* [4] UTIL */
ns.Util = {
  newId: () => crypto.randomUUID(),
  now: () => Date.now(),
  normalizeText: (t) => typeof t === 'string' ? t.trim().slice(0, ns.Config.LIMITS.MAX_TEXT_LENGTH) : '',
  isNonEmptyString: (v) => typeof v === 'string' && v.trim().length > 0,
  debounce: (fn, ms) => {
    let t = null;
    const debounced = (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    debounced.cancel = () => clearTimeout(t);
    return debounced;
  },
  escapeHtml: (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'),
};

/* [5] DEVICE */
ns.Device = (() => {
  const META_KEY = 'deviceFingerprint';
  let fp = null;

  const init = async (storage) => {
    try {
      const row = await storage.getMeta(META_KEY);
      if (row?.value) fp = row.value;
      else {
        fp = 'dev-' + crypto.randomUUID();
        await storage.putMeta({ key: META_KEY, value: fp });
        ns.Logger.info('device fingerprint minted', { fp: fp.slice(0, 16) + '...' });
      }
    } catch (e) {
      fp = 'dev-' + crypto.randomUUID();
      ns.Logger.warn('device fp in-memory fallback', e.message);
    }
    return fp;
  };
  const get = () => fp;
  const reset = async (storage) => { await storage.clearAll(); fp = null; };
  return { init, get, reset };
})();

/* [6] SETTINGS */
ns.Settings = (() => {
  const META_KEY = 'userSettings';
  let cache = {
    theme: 'auto', lang: 'ru',
    threshold: 0.25, adjacency: 0.15, maxCards: 5,
    relays: ns.Config.DEFAULT_RELAYS,
  };
  const load = async (storage) => {
    try {
      const row = await storage.getMeta(META_KEY);
      if (row?.value) cache = { ...cache, ...row.value };
    } catch {}
    return cache;
  };
  const save = async (storage, patch) => {
    cache = { ...cache, ...patch };
    try { await storage.putMeta({ key: META_KEY, value: cache }); } catch {}
    return cache;
  };
  const get = () => cache;
  return { load, save, get };
})();

/* [7] STORAGE */
ns.Storage = (() => {
  const { DB_NAME, DB_VERSION, STORE_THOUGHTS, STORE_META } = ns.Config;
  let db = null;
  const open = () => new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (ev) => {
      const _db = ev.target.result;
      if (!_db.objectStoreNames.contains(STORE_THOUGHTS)) {
        const store = _db.createObjectStore(STORE_THOUGHTS, { keyPath: 'id' });
        store.createIndex('createdAt', 'createdAt');
        store.createIndex('hasVector', 'hasVector');
        store.createIndex('published', 'published');
        store.createIndex('source', 'source');
        store.createIndex('originDevice', 'originDevice');
      }
      if (!_db.objectStoreNames.contains(STORE_META)) {
        _db.createObjectStore(STORE_META, { keyPath: 'key' });
      }
    };
    req.onsuccess = (ev) => { db = ev.target.result; res(db); };
    req.onerror = () => rej(req.error);
    req.onblocked = () => rej(new Error('IDB blocked'));
  });
  const tx = (name, mode = 'readonly') => db.transaction(name, mode).objectStore(name);
  const prom = (req) => new Promise((r, j) => { req.onsuccess = () => r(req.result); req.onerror = () => j(req.error); });
  const put = async (t) => { await open(); return prom(tx(STORE_THOUGHTS, 'readwrite').put(t)); };
  const get = async (id) => { await open(); return prom(tx(STORE_THOUGHTS).get(id)); };
  const all = async () => { await open(); return prom(tx(STORE_THOUGHTS).getAll()); };
  const listUnindexed = async () => {
    await open();
    return new Promise((res, rej) => {
      const out = [];
      const req = tx(STORE_THOUGHTS).index('hasVector').openCursor(IDBKeyRange.only(0));
      req.onsuccess = (ev) => {
        const c = ev.target.result;
        if (!c) return res(out);
        out.push(c.value); c.continue();
      };
      req.onerror = () => rej(req.error);
    });
  };
  const getMeta = async (key) => { await open(); return prom(tx(STORE_META).get(key)); };
  const putMeta = async (row) => { await open(); return prom(tx(STORE_META, 'readwrite').put(row)); };
  const clearAll = async () => {
    await open();
    await prom(tx(STORE_THOUGHTS, 'readwrite').clear());
    await prom(tx(STORE_META,    'readwrite').clear());
  };
  return { open, put, get, all, listUnindexed, getMeta, putMeta, clearAll };
})();

/* [8] VECTOR */
ns.Vector = (() => {
  let extractor = null;
  let loadPromise = null;
  const load = (onProgress) => {
    if (extractor) return Promise.resolve(extractor);
    if (loadPromise) return loadPromise;
    let progressFired = false;
    const probeTimer = setTimeout(() => {
      if (!progressFired) onProgress?.({ status: 'loading', hint: 'первая загрузка ~25MB...' });
    }, ns.Config.LIMITS.CACHE_PROBE_MS);
    loadPromise = pipeline('feature-extraction', ns.Config.VECTOR.MODEL_ID, {
      progress_callback: (p) => {
        progressFired = true;
        if (p.status === 'progress' && p.total) {
          onProgress?.({ loaded: p.loaded, total: p.total, fromCache: false });
        }
      },
    }).then((ex) => {
      clearTimeout(probeTimer);
      extractor = ex;
      const fromCache = !progressFired;
      ns.Logger.info('model ready', { fromCache });
      onProgress?.({ done: true, fromCache });
      return ex;
    }).catch((err) => {
      clearTimeout(probeTimer);
      loadPromise = null;
      throw err;
    });
    return loadPromise;
  };
  const embed = async (text) => {
    if (!extractor) throw new Error('Model not loaded');
    if (!ns.Util.isNonEmptyString(text)) return null;
    const out = await extractor(text, { pooling: 'mean', normalize: true });
    return Array.from(out.data);
  };
  const cosine = (a, b) => {
    if (!a || !b || a.length !== b.length) return 0;
    let s = 0;
    for (let i = 0; i < a.length; i++) s += a[i] * b[i];
    return s;
  };
  const isLoaded = () => extractor !== null;
  return { load, embed, cosine, isLoaded };
})();

/* [9] P2P (Gun) */
ns.P2P = (() => {
  const { GUN_WORLD_NS } = ns.Config;
  let gun = null, worldNode = null;
  let peerCount = 0;
  const listeners = new Set();
  const toWorldThought = (data, id) => {
    if (!data || typeof data !== 'object') return null;
    const text = typeof data.text === 'string' ? data.text : '';
    if (!text.trim()) return null;
    return {
      id: String(id),
      text: text.slice(0, ns.Config.LIMITS.MAX_TEXT_LENGTH),
      source: 'world',
      createdAt: Number(data.createdAt) || ns.Util.now(),
      updatedAt: Number(data.updatedAt) || ns.Util.now(),
      originDevice: String(data.originDevice || ''),
      vector: null, hasVector: 0, published: true,
    };
  };
  const init = (relays) => new Promise((res, rej) => {
    try {
      if (typeof Gun === 'undefined') throw new Error('Gun not loaded');
      gun = Gun({ peers: relays, localStorage: true });
      worldNode = gun.get(GUN_WORLD_NS);
      gun.on('hi',  () => { peerCount++; updatePeerCount(); });
      gun.on('bye', () => { peerCount = Math.max(0, peerCount - 1); updatePeerCount(); });
      worldNode.map().once((data, id) => {
        const t = toWorldThought(data, id);
        if (t) notifyListeners(t);
      });
      worldNode.map().on((data, id) => {
        const t = toWorldThought(data, id);
        if (t) notifyListeners(t);
      });
      ns.Logger.info('Gun initialized', { world: GUN_WORLD_NS, relays });
      res();
    } catch (e) { rej(e); }
  });
  const notifyListeners = (t) => {
    for (const fn of listeners) {
      try { fn(t); } catch (e) { ns.Logger.error('listener crashed', e.message); }
    }
  };
  const updatePeerCount = () => {
    document.dispatchEvent(new CustomEvent('ns:peers', { detail: { count: peerCount } }));
  };
  const publish = (t) => new Promise((res, rej) => {
    if (!worldNode) return rej(new Error('Gun not init'));
    worldNode.get(t.id).put({
      text: t.text, createdAt: t.createdAt,
      updatedAt: t.updatedAt, originDevice: t.originDevice || '',
    }, (ack) => {
      if (ack && ack.err) return rej(new Error(ack.err));
      res();
    });
  });
  const onWorldThought = (fn) => {
    listeners.add(fn);
    return () => listeners.delete(fn);
  };
  return { init, publish, onWorldThought };
})();

/* [10] RELEVANCE */
ns.Relevance = (() => {
  const escapeHtml = ns.Util.escapeHtml;
  const highlightFragment = (queryText, matchText) => {
    if (!queryText || !matchText) return escapeHtml(matchText);
    const qTokens = queryText.toLowerCase().match(/\w+/g) || [];
    const mTokens = matchText.toLowerCase().match(/\w+/g) || [];
    if (!qTokens.length || !mTokens.length) return escapeHtml(matchText);
    const mRaw = matchText.match(/\w+/g) || [];
    const mPos = [];
    let cursor = 0;
    for (const w of mRaw) {
      const idx = matchText.toLowerCase().indexOf(w.toLowerCase(), cursor);
      if (idx < 0) break;
      mPos.push({ start: idx, end: idx + w.length });
      cursor = idx + w.length;
    }
    let bestLen = 0, bestStart = -1;
    for (let i = 0; i < mTokens.length && i < mPos.length; i++) {
      for (let L = Math.min(qTokens.length, mTokens.length - i); L > bestLen; L--) {
        if (i + L > mPos.length) break;
        const slice = mTokens.slice(i, i + L).join(' ');
        if (qTokens.join(' ').includes(slice)) { bestLen = L; bestStart = i; }
      }
    }
    if (bestLen < 2 || bestStart < 0) return escapeHtml(matchText);
    const a = mPos[bestStart], b = mPos[bestStart + bestLen - 1];
    return escapeHtml(matchText.slice(0, a.start))
         + '<mark>' + escapeHtml(matchText.slice(a.start, b.end)) + '</mark>'
         + escapeHtml(matchText.slice(b.end));
  };
  const rankAll = (queryVec, localThoughts, worldThoughts) => {
    if (!queryVec) return { mine: [], world: [], adjacent: [] };
    const s = ns.Settings.get();
    const localScored = localThoughts
      .filter((t) => Array.isArray(t.vector))
      .map((t) => ({ kind: 'local', source: t, score: ns.Vector.cosine(queryVec, t.vector) }))
      .filter((r) => r.score > s.threshold - s.adjacency)
      .sort((a, b) => b.score - a.score);
    const worldScored = worldThoughts
      .filter((t) => Array.isArray(t.vector))
      .map((t) => ({ kind: 'world', source: t, score: ns.Vector.cosine(queryVec, t.vector) }))
      .filter((r) => r.score > s.threshold - s.adjacency)
      .sort((a, b) => b.score - a.score);
    const mine = [], world = [], adjacent = [];
    for (const r of localScored) {
      if (r.score >= s.threshold) { if (mine.length < s.maxCards) mine.push(r); }
      else if (adjacent.length < s.maxCards) adjacent.push(r);
    }
    for (const r of worldScored) {
      if (r.score >= s.threshold) { if (world.length < s.maxCards) world.push(r); }
      else if (adjacent.length < s.maxCards) adjacent.push(r);
    }
    return { mine, world, adjacent };
  };
  return { rankAll, highlightFragment };
})();

/* [11] SYNC */
ns.Sync = (() => {
  const saveLocal = async ({ text, publishToWorld = false }) => {
    const clean = ns.Util.normalizeText(text);
    if (!clean) throw new Error('Empty thought');
    const myFp = ns.Device.get();
    const thought = {
      id: ns.Util.newId(), text: clean, source: 'local',
      createdAt: ns.Util.now(), updatedAt: ns.Util.now(),
      originDevice: myFp, vector: null, hasVector: 0,
      published: !!publishToWorld,
    };
    if (ns.Vector.isLoaded()) {
      try {
        thought.vector = await ns.Vector.embed(clean);
        thought.hasVector = thought.vector ? 1 : 0;
      } catch (e) { ns.Logger.warn('embed failed on save', e.message); }
    }
    await ns.Storage.put(thought);
    ns.Logger.info('saved local', { id: thought.id.slice(0, 8), published: thought.published });
    if (publishToWorld) {
      try {
        await ns.P2P.publish(thought);
        ns.Logger.info('published to world', { id: thought.id.slice(0, 8) });
      } catch (e) { ns.Logger.warn('publish failed', e.message); }
    }
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
    return thought;
  };
  const ingestWorld = async (incoming) => {
    const myFp = ns.Device.get();
    if (incoming.originDevice && incoming.originDevice === myFp) return;
    const existing = await ns.Storage.get(incoming.id);
    if (existing && existing.updatedAt >= incoming.updatedAt) return;
    const all = await ns.Storage.all();
    const duplicate = all.find((t) => t.text === incoming.text && t.id !== incoming.id);
    if (duplicate) {
      ns.Logger.info('skipped world duplicate', { id: incoming.id.slice(0, 8) });
      return;
    }
    if (ns.Vector.isLoaded() && !incoming.hasVector) {
      try {
        incoming.vector = await ns.Vector.embed(incoming.text);
        incoming.hasVector = incoming.vector ? 1 : 0;
      } catch (e) { ns.Logger.warn('embed failed on ingest', e.message); }
    }
    await ns.Storage.put(incoming);
    ns.Logger.info('ingested world', {
      id: incoming.id.slice(0, 8),
      from: (incoming.originDevice || '?').slice(0, 12),
      vectorized: !!incoming.hasVector,
    });
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
  };
  const reindexAll = async (onProgress) => {
    if (!ns.Vector.isLoaded()) throw new Error('Load model first');
    const pending = await ns.Storage.listUnindexed();
    let done = 0;
    for (const t of pending) {
      try {
        const v = await ns.Vector.embed(t.text);
        t.vector = v; t.hasVector = v ? 1 : 0;
        await ns.Storage.put(t);
      } catch (e) { ns.Logger.warn('reindex failed', e.message); }
      done++;
      if (onProgress) onProgress({ done, total: pending.length });
    }
    ns.Logger.info('reindex done', { total: pending.length });
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
  };
  const bind = () => { ns.P2P.onWorldThought(ingestWorld); };
  return { saveLocal, reindexAll, bind };
})();

/* [12] CAPSULE */
ns.Capsule = (() => {
  const exportAll = async () => {
    const all = await ns.Storage.all();
    const capsule = {
      version: 'noomium_v1',
      exportedAt: new Date().toISOString(),
      device: ns.Device.get(),
      thoughts: all,
    };
    const blob = new Blob([JSON.stringify(capsule, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `noomium-capsule-${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
    ns.Logger.info('capsule exported', { count: all.length });
  };
  const importFile = async (file) => {
    const text = await file.text();
    const capsule = JSON.parse(text);
    if (!capsule || !Array.isArray(capsule.thoughts)) {
      throw new Error('Invalid capsule');
    }
    let imported = 0;
    for (const t of capsule.thoughts) {
      const existing = await ns.Storage.get(t.id);
      if (existing) continue;
      await ns.Storage.put(t);
      imported++;
    }
    ns.Logger.info('capsule imported', { imported, total: capsule.thoughts.length });
    document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
  };
  return { exportAll, importFile };
})();

/* [13] UI */
ns.UI = (() => {
  const refs = {};
  let lastQuery = { text: null, vector: null };

  const cache = () => {
    ['input','btnSave','btnSaveWorld','btnLoadModel','btnReindex','btnSeed5',
     'btnExport','btnImport','importFile','btnReset','btnApplySettings',
     'listMine','listWorld','listAdjacent','listAll','status','modelProgress',
     'deviceId','langSwitch','setTheme','setThreshold','setAdjacency',
     'setMaxCards','setRelays']
      .forEach((id) => { refs[id] = document.getElementById(id); });
  };

  const setPill = (k, t, s = '') => {
    const el = refs.status.querySelector(`[data-key="${k}"]`);
    if (!el) return;
    el.textContent = t;
    el.classList.remove('ok','warn','err','think');
    if (s) el.classList.add(s);
  };

  const setThink = (active, text = 'думаю...') => {
    const el = refs.status.querySelector('[data-key="think"]');
    if (!el) return;
    if (active) {
      el.style.display = '';
      el.textContent = text;
      el.classList.add('think');
    } else {
      el.style.display = 'none';
    }
  };

  const setProgress = (pct) => { refs.modelProgress.style.width = pct + '%'; };

  const showDeviceId = () => {
    const fp = ns.Device.get();
    if (refs.deviceId && fp) {
      refs.deviceId.textContent = `device: ${fp}`;
    }
  };

  const applyTheme = (theme) => {
    const resolved = theme === 'auto'
      ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
      : theme;
    document.documentElement.setAttribute('data-theme', resolved);
  };

  const updateLangButton = () => {
    if (refs.langSwitch) {
      refs.langSwitch.textContent = (ns.Settings.get().lang || 'ru') === 'ru' ? 'EN' : 'RU';
    }
  };

  const renderLocalList = (container, items, queryText) => {
    container.innerHTML = '';
    if (!items.length) {
      const d = document.createElement('div');
      d.className = 'empty'; d.textContent = '(empty)';
      container.appendChild(d);
      return;
    }
    for (const r of items) {
      const t = r.source;
      const row = document.createElement('div');
      row.className = 'item local';
      const score = document.createElement('span');
      score.className = 'score';
      score.textContent = typeof r.score === 'number' ? r.score.toFixed(3) : '';
      const body = document.createElement('div');
      body.innerHTML = ns.Relevance.highlightFragment(queryText, t.text);
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `${t.published ? 'world' : 'local'} · ${new Date(t.createdAt).toISOString().slice(0,16)} · ${t.id.slice(0,6)}`;
      row.appendChild(score); row.appendChild(body); row.appendChild(meta);
      container.appendChild(row);
    }
  };

  const renderWorldList = (container, items, queryText) => {
    container.innerHTML = '';
    if (!items.length) {
      const d = document.createElement('div');
      d.className = 'empty'; d.textContent = '(no matches)';
      container.appendChild(d);
      return;
    }
    for (const r of items) {
      const t = r.source;
      const row = document.createElement('div');
      row.className = 'item world';
      const score = document.createElement('span');
      score.className = 'score';
      score.textContent = typeof r.score === 'number' ? r.score.toFixed(3) : '';
      const body = document.createElement('div');
      body.innerHTML = ns.Relevance.highlightFragment(queryText, t.text);
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `from:${(t.originDevice || '?').slice(0,12)} · ${new Date(t.createdAt).toISOString().slice(0,16)}`;
      row.appendChild(score); row.appendChild(body); row.appendChild(meta);
      container.appendChild(row);
    }
  };

  const renderMixedList = (container, items, queryText) => {
    container.innerHTML = '';
    if (!items.length) {
      const d = document.createElement('div');
      d.className = 'empty'; d.textContent = '(empty)';
      container.appendChild(d);
      return;
    }
    for (const r of items) {
      const isLocal = r.kind === 'local';
      const text = r.source.text;
      const row = document.createElement('div');
      row.className = `item ${isLocal ? 'local' : 'world'}`;
      const score = document.createElement('span');
      score.className = 'score';
      score.textContent = typeof r.score === 'number' ? r.score.toFixed(3) : '';
      const body = document.createElement('div');
      body.innerHTML = ns.Relevance.highlightFragment(queryText, text);
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = isLocal ? `local · ${r.source.id.slice(0,6)}` : `from:${(r.source.originDevice || '?').slice(0,12)}`;
      row.appendChild(score); row.appendChild(body); row.appendChild(meta);
      container.appendChild(row);
    }
  };

  const clearAll = () => {
    renderLocalList(refs.listMine, [], '');
    renderWorldList(refs.listWorld, [], '');
    renderMixedList(refs.listAdjacent, [], '');
  };

  const updateLiveRelevance = async () => {
    if (!ns.Vector.isLoaded()) { clearAll(); return; }
    const text = refs.input.value.trim();
    if (!text) {
      clearAll();
      lastQuery = { text: null, vector: null };
      setThink(false);
      return;
    }
    let qv;
    if (lastQuery.text === text && lastQuery.vector) {
      qv = lastQuery.vector;
      ns.Logger.info('relevance: cache hit');
    } else {
      setThink(true, 'считаю вектор...');
      try {
        qv = await ns.Vector.embed(text);
        lastQuery = { text, vector: qv };
      } catch (e) {
        setThink(false);
        ns.Logger.error('embed failed', e.message);
        return;
      }
    }
    const all = await ns.Storage.all();
    const locals = all.filter((t) => t.source === 'local');
    const worlds = all.filter((t) => t.source === 'world');
    const { mine, world, adjacent } = ns.Relevance.rankAll(qv, locals, worlds);
    renderLocalList(refs.listMine, mine, text);
    renderWorldList(refs.listWorld, world, text);
    renderMixedList(refs.listAdjacent, adjacent, text);
    setThink(false);
  };

  const invalidateCache = () => { lastQuery = { text: null, vector: null }; };

  const renderAll = async () => {
    const all = await ns.Storage.all();
    const locals = all.filter((t) => t.source === 'local')
                      .sort((a, b) => b.createdAt - a.createdAt)
                      .slice(0, ns.Config.LIMITS.RENDER_CAP);
    refs.listAll.innerHTML = '';
    for (const t of locals) {
      const row = document.createElement('div');
      row.className = 'item local';
      const body = document.createElement('div');
      body.textContent = t.text;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `${new Date(t.createdAt).toISOString().slice(0,16)} · ${t.published ? 'world' : 'local'} · vec:${t.hasVector ? 'yes' : 'no'} · ${t.id.slice(0,6)}`;
      row.appendChild(body); row.appendChild(meta);
      refs.listAll.appendChild(row);
    }
    const indexed = all.filter((t) => t.hasVector).length;
    setPill('indexed', `INDEXED: ${indexed}/${all.length}`, all.length > 0 && indexed === all.length ? 'ok' : 'warn');
  };

  const refresh = async () => {
    invalidateCache();
    await renderAll();
    await updateLiveRelevance();
  };

  const syncSettingsToForm = () => {
    const s = ns.Settings.get();
    refs.setTheme.value = s.theme;
    refs.setThreshold.value = s.threshold;
    refs.setAdjacency.value = s.adjacency;
    refs.setMaxCards.value = s.maxCards;
    refs.setRelays.value = (s.relays || ns.Config.DEFAULT_RELAYS).join('\n');
  };

  const bind = () => {
    const debouncedUpdate = ns.Util.debounce(async () => {
      setThink(false);
      await updateLiveRelevance();
    }, ns.Config.LIMITS.DEBOUNCE_MS);

    refs.input.addEventListener('input', () => {
      const text = refs.input.value.trim();
      if (!text) {
        debouncedUpdate.cancel();
        clearAll();
        lastQuery = { text: null, vector: null };
        setThink(false);
        return;
      }
      setThink(true, 'жду паузу...');
      debouncedUpdate();
    });

    const disableSavers = (v) => { refs.btnSave.disabled = refs.btnSaveWorld.disabled = v; };

    refs.btnSave.addEventListener('click', async () => {
      try {
        disableSavers(true);
        await ns.Sync.saveLocal({ text: refs.input.value, publishToWorld: false });
        refs.input.value = '';
        clearAll();
        await renderAll();
      } catch (e) { ns.Logger.error('save failed', e.message); }
      finally { disableSavers(false); }
    });

    refs.btnSaveWorld.addEventListener('click', async () => {
      try {
        disableSavers(true);
        await ns.Sync.saveLocal({ text: refs.input.value, publishToWorld: true });
        refs.input.value = '';
        clearAll();
        await renderAll();
      } catch (e) { ns.Logger.error('save failed', e.message); }
      finally { disableSavers(false); }
    });

    refs.btnApplySettings.addEventListener('click', async () => {
      const patch = {
        theme: refs.setTheme.value,
        threshold: parseFloat(refs.setThreshold.value) || 0.25,
        adjacency: parseFloat(refs.setAdjacency.value) || 0.15,
        maxCards: parseInt(refs.setMaxCards.value, 10) || 5,
        relays: refs.setRelays.value.split('\n').map((s) => s.trim()).filter(Boolean),
      };
      await ns.Settings.save(ns.Storage, patch);
      applyTheme(patch.theme);
      ns.Logger.info('settings applied', patch);
      await refresh();
    });

    refs.btnLoadModel.addEventListener('click', async () => {
      try {
        refs.btnLoadModel.disabled = true;
        setPill('model', 'MODEL: checking cache...', 'warn');
        await ns.Vector.load((p) => {
          if (p.done) {
            setPill('model', p.fromCache ? 'MODEL: ready (cached)' : 'MODEL: ready', 'ok');
            setProgress(100);
          } else if (p.status === 'loading') {
            setPill('model', 'MODEL: ' + p.hint, 'warn');
          } else if (p.total) {
            const pct = Math.round((p.loaded / p.total) * 100);
            setProgress(pct);
            setPill('model', `MODEL: ${pct}%`, 'warn');
          }
        });
      } catch (e) {
        setPill('model', 'MODEL: err', 'err');
        ns.Logger.error('model load failed', e.message);
      } finally { refs.btnLoadModel.disabled = false; }
    });

    refs.btnReindex.addEventListener('click', async () => {
      if (!ns.Vector.isLoaded()) { ns.Logger.warn('Load model first'); return; }
      try {
        refs.btnReindex.disabled = true;
        await ns.Sync.reindexAll((p) => {
          setPill('model', `MODEL: reindex ${p.done}/${p.total}`, 'warn');
        });
        setPill('model', 'MODEL: ready', 'ok');
        invalidateCache();
        await renderAll();
      } catch (e) { ns.Logger.error('reindex failed', e.message); }
      finally { refs.btnReindex.disabled = false; }
    });

    refs.btnSeed5.addEventListener('click', async () => {
      const samples = [
        'Мысль появляется в паузе между действиями.',
        'Архитектура — это способ договариваться с будущим собой.',
        'Случайность — недооценённый инструмент поиска.',
        'Иногда нужно просто записать, чтобы понять.',
        'Связи между идеями важнее самих идей.',
      ];
      for (const s of samples) await ns.Sync.saveLocal({ text: s, publishToWorld: true });
      invalidateCache();
      await renderAll();
    });

    refs.btnExport.addEventListener('click', ns.Capsule.exportAll);
    refs.btnImport.addEventListener('click', () => refs.importFile.click());
    refs.importFile.addEventListener('change', async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      try {
        await ns.Capsule.importFile(f);
        await refresh();
      } catch (err) {
        ns.Logger.error('import failed', err.message);
      }
      e.target.value = '';
    });

    refs.btnReset.addEventListener('click', async () => {
      if (!confirm('Стереть все локальные данные?')) return;
      try {
        await ns.Device.reset(ns.Storage);
        alert('Готово. Перезагружаю...');
        location.reload();
      } catch (e) { ns.Logger.error('reset failed', e.message); }
    });

    refs.langSwitch.addEventListener('click', async () => {
      const cur = ns.Settings.get().lang || 'ru';
      const next = cur === 'ru' ? 'en' : 'ru';
      await ns.Settings.save(ns.Storage, { lang: next });
      ns.I18n.apply(next);
      updateLangButton();
    });

    document.addEventListener('ns:thoughts-changed', async () => {
      invalidateCache();
      await renderAll();
      await updateLiveRelevance();
    });
    document.addEventListener('ns:peers', (ev) => {
      setPill('peers', `PEERS: ${ev.detail.count}`, ev.detail.count ? 'ok' : 'warn');
    });
  };

  const init = () => {
    cache();
    bind();
    updateLangButton();
  };

  return { init, refresh, setPill, showDeviceId, applyTheme, syncSettingsToForm };
})();

/* [14] APP */
ns.App = (() => {
  const boot = async () => {
    ns.UI.init();
    ns.UI.setPill('idb', 'IDB: boot...', 'warn');
    ns.UI.setPill('gun', 'GUN: boot...', 'warn');

    try {
      await ns.Storage.open();
      ns.UI.setPill('idb', 'IDB: OK', 'ok');
      ns.Logger.info('IDB ready', { name: ns.Config.DB_NAME });
    } catch (e) {
      ns.UI.setPill('idb', 'IDB: ERR', 'err');
      ns.Logger.error('IDB init failed', e.message);
      return;
    }

    try {
      await ns.Device.init(ns.Storage);
      ns.UI.showDeviceId();
    } catch (e) { ns.Logger.error('device init failed', e.message); }

    await ns.Settings.load(ns.Storage);
    ns.UI.applyTheme(ns.Settings.get().theme);
    ns.I18n.apply(ns.Settings.get().lang);
    ns.UI.syncSettingsToForm();

    const relays = ns.Settings.get().relays || ns.Config.DEFAULT_RELAYS;
    try {
      await ns.P2P.init(relays);
      ns.UI.setPill('gun', 'GUN: OK', 'ok');
    } catch (e) {
      ns.UI.setPill('gun', 'GUN: ERR', 'err');
      ns.Logger.error('Gun init failed', e.message);
    }

    ns.Sync.bind();

    try {
      await ns.Vector.load((p) => {
        if (p.done) {
          ns.UI.setPill('model', p.fromCache ? 'MODEL: ready (cached)' : 'MODEL: ready', 'ok');
        } else if (p.status === 'loading') {
          ns.UI.setPill('model', 'MODEL: ' + p.hint, 'warn');
        } else if (p.total) {
          const pct = Math.round((p.loaded / p.total) * 100);
          ns.UI.setPill('model', `MODEL: ${pct}%`, 'warn');
        }
      });
    } catch (e) {
      ns.Logger.warn('model auto-load skipped', e.message);
    }

    await ns.UI.refresh();
    ns.Logger.info('app ready');
  };
  return { boot };
})();

ns.App.boot();
</script>
