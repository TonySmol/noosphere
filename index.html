<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>P2P Notebook (local-only + embeddings + trystero)</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body { margin: 0; display: grid; grid-template-columns: 340px 1fr; height: 100vh; }
    aside { border-right: 1px solid #ddd; padding: 12px; overflow: auto; }
    main { padding: 12px; overflow: auto; display: grid; grid-template-rows: auto 1fr auto; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input, textarea, button { font: inherit; }
    textarea { width: 100%; min-height: 220px; resize: vertical; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { border: 1px solid #eee; border-radius: 10px; padding: 10px; margin: 8px 0; cursor: pointer; }
    li:hover { background: #fafafa; }
    .muted { color: #666; font-size: 12px; }
    .pill { display:inline-block; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; font-size: 12px; color:#333;}
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .card { border: 1px solid #e8e8e8; border-radius: 12px; padding: 10px; min-height: 180px; overflow: auto; }
    .card h3 { margin: 0 0 6px 0; font-size: 14px; }
    .noteTitle { font-weight: 600; }
    .snippet { margin-top: 6px; white-space: pre-wrap; color: #222; }
    .score { float:right; color:#555; font-size: 12px; }
    .danger { color: #a00; }
    .ok { color: #0a0; }
  </style>
</head>

<body>
  <aside>
    <div class="row" style="justify-content:space-between">
      <div>
        <div><strong>Заметки</strong></div>
        <div class="muted">Локально (IndexedDB)</div>
      </div>
      <button id="btnNew">+ Новая</button>
    </div>

    <div class="row" style="margin-top:10px">
      <span class="pill">Peers: <span id="peersCount">0</span></span>
      <span class="pill">Model: <span id="modelStatus">idle</span></span>
      <span class="pill">P2P: <span id="p2pStatus">offline</span></span>
    </div>

    <hr/>
    <ul id="notesList"></ul>
  </aside>

  <main>
    <div class="row">
      <input id="title" placeholder="Заголовок" style="flex:1; padding:8px;"/>
      <button id="btnSave">Сохранить</button>
      <button id="btnDelete" class="danger">Удалить</button>
    </div>

    <textarea id="body" placeholder="Пиши... снизу будут локальные/сетевые/serendipity подсказки"></textarea>

    <div class="grid3">
      <section class="card">
        <h3>Локально релевантное</h3>
        <div id="localRec" class="muted">—</div>
      </section>

      <section class="card">
        <h3>Из сети (пока peer онлайн)</h3>
        <div id="netRec" class="muted">—</div>
      </section>

      <section class="card">
        <h3>Serendipity (слабая корреляция)</h3>
        <div id="mixRec" class="muted">—</div>
      </section>
    </div>
  </main>

<script type="module">
  import { openDB } from 'https://esm.sh/idb@8.0.0';
  import { joinRoom } from 'https://esm.sh/trystero@0.17.1';
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

  // ----------------------------
  // Config (поменяй под себя)
  // ----------------------------
  const APP_ID = 'p2p-notebook-v1';
  const ROOM_NAME = 'my-shared-room'; // одинаковая строка у всех участников
  const MODEL_ID = 'Xenova/all-MiniLM-L6-v2';

  // WebTorrent trackers (можно расширять)
  const TRACKERS = [
    'wss://tracker.openwebtorrent.com',
    'wss://tracker.btorrent.xyz',
    'wss://tracker.fastcast.nz',
  ];

  // ----------------------------
  // Utils
  // ----------------------------
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  const clamp = (x, a, b) => Math.max(a, Math.min(b, x));

  function debounce(fn, ms) {
    let t = null;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), ms);
    };
  }

  function now() { return Date.now(); }

  function truncate(text, n) {
    if (!text) return '';
    return text.length <= n ? text : text.slice(0, n - 1) + '…';
  }

  function dot(a, b) {
    // a,b: Float32Array одинаковой длины
    let s = 0;
    for (let i = 0; i < a.length; i++) s += a[i] * b[i];
    return s;
  }

  function pickQueryText(title, body) {
    // Чтобы эмбеддинг строился стабильно и быстро:
    // - заголовок + последние символы тела (контекст текущей мысли)
    const tail = (body || '').slice(-1200);
    return `${title || ''}\n\n${tail}`.trim();
  }

  // ----------------------------
  // DB (IndexedDB)
  // ----------------------------
  class NoteDB {
    /** @type {import('idb').IDBPDatabase<any>} */
    #db;

    async init() {
      this.#db = await openDB('p2p-notebook-db', 1, {
        upgrade(db) {
          const notes = db.createObjectStore('notes', { keyPath: 'id' });
          notes.createIndex('updatedAt', 'updatedAt');

          const emb = db.createObjectStore('embeddings', { keyPath: 'noteId' });
          emb.createIndex('updatedAt', 'updatedAt');
        }
      });
    }

    async listNotes() {
      const tx = this.#db.transaction('notes', 'readonly');
      const all = await tx.store.getAll();
      all.sort((a, b) => b.updatedAt - a.updatedAt);
      return all;
    }

    async getNote(id) { return this.#db.get('notes', id); }

    async upsertNote(note) {
      await this.#db.put('notes', note);
    }

    async deleteNote(id) {
      const tx = this.#db.transaction(['notes', 'embeddings'], 'readwrite');
      await tx.objectStore('notes').delete(id);
      await tx.objectStore('embeddings').delete(id);
      await tx.done;
    }

    async getEmbedding(noteId) {
      const row = await this.#db.get('embeddings', noteId);
      return row?.vector || null;
    }

    async putEmbedding(noteId, vector, model = MODEL_ID) {
      await this.#db.put('embeddings', {
        noteId, vector, model, updatedAt: now()
      });
    }

    async listAllEmbeddings() {
      return await this.#db.getAll('embeddings');
    }
  }

  // ----------------------------
  // Embedder (transformers.js)
  // ----------------------------
  class Embedder {
    #extractor = null;
    #statusEl;

    constructor(statusEl) {
      this.#statusEl = statusEl;
    }

    async init() {
      if (this.#extractor) return;

      this.#statusEl.textContent = 'loading';
      // Без локальных моделей; качаем с CDN/HF (как настроено в transformers.js)
      env.allowLocalModels = false;

      // pipeline feature-extraction -> mean pooling -> normalize
      this.#extractor = await pipeline('feature-extraction', MODEL_ID);
      this.#statusEl.textContent = 'ready';
    }

    /** @returns {Promise<Float32Array>} */
    async embed(text) {
      await this.init();
      const out = await this.#extractor(text, { pooling: 'mean', normalize: true });
      // out.data: Float32Array
      return out.data;
    }
  }

  // ----------------------------
  // Vector index (in-memory)
  // ----------------------------
  class VectorIndex {
    /** @type {Map<string, Float32Array>} */
    #map = new Map();

    async loadFromDB(db) {
      const rows = await db.listAllEmbeddings();
      this.#map.clear();
      for (const r of rows) {
        if (r?.vector?.length) this.#map.set(r.noteId, r.vector);
      }
    }

    set(noteId, vec) { this.#map.set(noteId, vec); }
    delete(noteId) { this.#map.delete(noteId); }

    /**
     * @param {Float32Array} queryVec normalized
     * @param {{excludeIds?: Set<string>, k?: number}} opts
     */
    search(queryVec, opts = {}) {
      const k = opts.k ?? 6;
      const exclude = opts.excludeIds ?? new Set();

      /** @type {{id:string, score:number}[]} */
      const scored = [];
      for (const [id, vec] of this.#map.entries()) {
        if (exclude.has(id)) continue;
        if (vec.length !== queryVec.length) continue;
        scored.push({ id, score: dot(queryVec, vec) });
      }
      scored.sort((a, b) => b.score - a.score);
      return scored.slice(0, k);
    }

    /**
     * “Слабокоррелированные” кандидаты для serendipity
     * @param {Float32Array} queryVec
     * @param {{excludeIds?: Set<string>, min?: number, max?: number, k?: number}} opts
     */
    searchLowCorr(queryVec, opts = {}) {
      const min = opts.min ?? 0.15;
      const max = opts.max ?? 0.35;
      const k = opts.k ?? 6;
      const exclude = opts.excludeIds ?? new Set();

      /** @type {{id:string, score:number}[]} */
      const pool = [];
      for (const [id, vec] of this.#map.entries()) {
        if (exclude.has(id)) continue;
        if (vec.length !== queryVec.length) continue;
        const s = dot(queryVec, vec);
        if (s >= min && s <= max) pool.push({ id, score: s });
      }
      // немного рандома, чтобы “инсайты” не были слишком детерминированы
      pool.sort((a, b) => (b.score - a.score) + (Math.random() - 0.5) * 0.05);
      return pool.slice(0, k);
    }
  }

  // ----------------------------
  // P2P search (Trystero)
  // ----------------------------
  class P2PSearch {
    #room;
    #p2pStatusEl;
    #peersCountEl;

    /** pending requestId -> { deadline, results: [], resolve } */
    #pending = new Map();

    constructor(p2pStatusEl, peersCountEl) {
      this.#p2pStatusEl = p2pStatusEl;
      this.#peersCountEl = peersCountEl;
    }

    init({ onIncomingSearch }) {
      // Room
      this.#room = joinRoom(
        { appId: APP_ID, trackers: TRACKERS },
        ROOM_NAME
      );

      this.#p2pStatusEl.textContent = 'online';

      // Actions
      const [sendReq, onReq] = this.#room.makeAction('search:req');
      const [sendRes, onRes] = this.#room.makeAction('search:res');

      // Presence / peers count
      const updatePeers = () => {
        const peers = this.#room.getPeers?.() ?? []; // на новых версиях есть getPeers()
        const n = Array.isArray(peers) ? peers.length : (this.#room.peers?.length ?? 0);
        this.#peersCountEl.textContent = String(n);
      };

      this.#room.onPeerJoin?.(() => updatePeers());
      this.#room.onPeerLeave?.(() => updatePeers());
      updatePeers();

      // Handle incoming request: peer asks us to search in OUR local notes
      onReq(async (payload, peerId) => {
        try {
          if (!payload || payload.v !== 1) return;
          const { requestId, queryVec, k, snippetChars } = payload;
          if (!requestId || !queryVec) return;

          const results = await onIncomingSearch({
            queryVec,
            k: clamp(k ?? 6, 1, 12),
            snippetChars: clamp(snippetChars ?? 240, 80, 600),
          });

          sendRes(peerId, { v: 1, requestId, results });
        } catch (e) {
          // намеренно молчим: не хотим ломать сетевой обмен из-за одной ошибки
          console.warn('onReq error', e);
        }
      });

      // Handle incoming response: peer returns results to our query
      onRes((payload, peerId) => {
        if (!payload || payload.v !== 1) return;
        const { requestId, results } = payload;
        const pending = this.#pending.get(requestId);
        if (!pending) return;
        if (Array.isArray(results)) {
          // Добавляем peerId только как метку источника (в памяти)
          for (const r of results) pending.results.push({ ...r, peerId });
        }
      });

      // expose methods
      this.sendSearch = async ({ queryVec, k = 6, snippetChars = 240, timeoutMs = 900 }) => {
        const requestId = crypto.randomUUID();
        const deadline = now() + timeoutMs;

        // отправляем всем
        // В Trystero sendReq(data) пошлёт всем, sendReq(peerId, data) конкретному
        sendReq({ v: 1, requestId, queryVec, k, snippetChars });

        const results = await new Promise((resolve) => {
          this.#pending.set(requestId, { deadline, results: [], resolve });
        });

        return results;
      };

      // simple pending sweeper
      const tick = () => {
        const t = now();
        for (const [requestId, p] of this.#pending.entries()) {
          if (t >= p.deadline) {
            this.#pending.delete(requestId);
            p.resolve(p.results);
          }
        }
        requestAnimationFrame(tick);
      };
      tick();
    }

    /** @type {(args: {queryVec:Float32Array, k?:number, snippetChars?:number, timeoutMs?:number})=>Promise<any[]>} */
    sendSearch = async () => [];

    destroy() {
      try { this.#room?.leave?.(); } catch {}
      this.#p2pStatusEl.textContent = 'offline';
      this.#peersCountEl.textContent = '0';
    }
  }

  // ----------------------------
  // App glue
  // ----------------------------
  const els = {
    notesList: document.getElementById('notesList'),
    title: document.getElementById('title'),
    body: document.getElementById('body'),
    btnNew: document.getElementById('btnNew'),
    btnSave: document.getElementById('btnSave'),
    btnDelete: document.getElementById('btnDelete'),
    localRec: document.getElementById('localRec'),
    netRec: document.getElementById('netRec'),
    mixRec: document.getElementById('mixRec'),
    modelStatus: document.getElementById('modelStatus'),
    p2pStatus: document.getElementById('p2pStatus'),
    peersCount: document.getElementById('peersCount'),
  };

  const db = new NoteDB();
  const index = new VectorIndex();
  const embedder = new Embedder(els.modelStatus);
  const p2p = new P2PSearch(els.p2pStatus, els.peersCount);

  /** @type {{id:string, title:string, body:string, createdAt:number, updatedAt:number} | null} */
  let currentNote = null;

  function renderNotesList(notes) {
    els.notesList.innerHTML = '';
    for (const n of notes) {
      const li = document.createElement('li');
      li.dataset.id = n.id;
      li.innerHTML = `
        <div class="noteTitle">${escapeHtml(n.title || '(без названия)')}</div>
        <div class="muted">${new Date(n.updatedAt).toLocaleString()}</div>
        <div class="muted">${escapeHtml(truncate(n.body || '', 120))}</div>
      `;
      li.onclick = () => loadNote(n.id);
      els.notesList.appendChild(li);
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#039;");
  }

  async function refreshNotesList() {
    const notes = await db.listNotes();
    renderNotesList(notes);
  }

  async function loadNote(id) {
    const n = await db.getNote(id);
    if (!n) return;
    currentNote = n;
    els.title.value = n.title || '';
    els.body.value = n.body || '';
    scheduleRecs();
  }

  function newNote() {
    const t = now();
    currentNote = {
      id: crypto.randomUUID(),
      title: '',
      body: '',
      createdAt: t,
      updatedAt: t,
    };
    els.title.value = '';
    els.body.value = '';
    scheduleRecs();
  }

  async function saveCurrentNote() {
    if (!currentNote) newNote();
    const t = now();
    currentNote.title = els.title.value;
    currentNote.body = els.body.value;
    currentNote.updatedAt = t;

    await db.upsertNote(currentNote);
    await refreshNotesList();

    // Асинхронно пересчитываем эмбеддинг (в реале можно вынести в worker/очередь)
    // Чтобы не пересчитывать на каждый символ — мы делаем это только при Save.
    const text = pickQueryText(currentNote.title, currentNote.body);
    if (text.length >= 4) {
      const vec = await embedder.embed(text);
      await db.putEmbedding(currentNote.id, vec);
      index.set(currentNote.id, vec);
    }
    scheduleRecs();
  }

  async function deleteCurrentNote() {
    if (!currentNote) return;
    const id = currentNote.id;
    await db.deleteNote(id);
    index.delete(id);
    currentNote = null;
    els.title.value = '';
    els.body.value = '';
    await refreshNotesList();
    renderRecs([], [], []);
  }

  function renderRecs(local, net, mix) {
    els.localRec.innerHTML = renderRecList(local, { showPeer: false }) || '<span class="muted">—</span>';
    els.netRec.innerHTML = renderRecList(net, { showPeer: true }) || '<span class="muted">—</span>';
    els.mixRec.innerHTML = renderRecList(mix, { showPeer: true }) || '<span class="muted">—</span>';
  }

  function renderRecList(items, { showPeer }) {
    if (!items?.length) return '';
    return items.map(it => {
      const src = it.peerId ? `<span class="pill">peer: ${escapeHtml(it.peerId.slice(0, 6))}</span>` : `<span class="pill">local</span>`;
      const score = (it.score ?? 0).toFixed(3);
      return `
        <div style="border:1px solid #eee; border-radius:10px; padding:8px; margin:8px 0;">
          <div>
            <span class="score">${score}</span>
            <span class="noteTitle">${escapeHtml(it.title || '(без названия)')}</span>
          </div>
          <div class="muted" style="margin-top:6px">
            ${showPeer ? src : '<span class="pill">local</span>'}
            ${it.updatedAt ? `<span class="pill">${new Date(it.updatedAt).toLocaleString()}</span>` : ''}
          </div>
          <div class="snippet">${escapeHtml(it.snippet || '')}</div>
        </div>
      `;
    }).join('');
  }

  async function computeLocalRecommendations(queryVec) {
    const exclude = new Set();
    if (currentNote?.id) exclude.add(currentNote.id);

    const top = index.search(queryVec, { excludeIds: exclude, k: 6 });
    // Гидратим из notes
    const out = [];
    for (const { id, score } of top) {
      const n = await db.getNote(id);
      if (!n) continue;
      out.push({
        id,
        title: n.title,
        snippet: truncate(n.body, 240),
        score,
        updatedAt: n.updatedAt,
      });
    }
    return out;
  }

  async function computeNetworkRecommendations(queryVec) {
    const results = await p2p.sendSearch({ queryVec, k: 6, snippetChars: 240, timeoutMs: 900 });
    // Убираем мусор, сортируем
    const cleaned = results
      .filter(r => r && typeof r.score === 'number')
      .map(r => ({
        ...r,
        score: clamp(r.score, -1, 1),
        title: r.title || '',
        snippet: r.snippet || '',
      }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 6);

    return cleaned;
  }

  async function computeSerendipity(queryVec, localRecs, netRecs) {
    const exclude = new Set();
    if (currentNote?.id) exclude.add(currentNote.id);

    // 1) слабокоррелированные локальные
    const lowLocalIds = index.searchLowCorr(queryVec, {
      excludeIds: exclude,
      min: 0.12, max: 0.33, k: 6
    });

    const lowLocal = [];
    for (const { id, score } of lowLocalIds) {
      const n = await db.getNote(id);
      if (!n) continue;
      lowLocal.push({
        id,
        title: n.title,
        snippet: truncate(n.body, 240),
        score,
        updatedAt: n.updatedAt,
        peerId: null
      });
    }

    // 2) слабокоррелированные из сети: берём из netRecs те, что не “в топ релевантности”
    const lowNet = (netRecs || [])
      .filter(r => r.score >= 0.12 && r.score <= 0.33)
      .sort((a, b) => (a.score - b.score) + (Math.random() - 0.5) * 0.03) // предпочитаем “слабее”, чуть рандома
      .slice(0, 6);

    // 3) микс: чередование local/net
    const mix = [];
    const a = lowLocal.slice();
    const b = lowNet.slice();
    while (mix.length < 6 && (a.length || b.length)) {
      if (a.length) mix.push(a.shift());
      if (mix.length >= 6) break;
      if (b.length) mix.push(b.shift());
    }
    return mix;
  }

  const scheduleRecs = debounce(async () => {
    // Не спамим моделью на каждый ввод: считаем по дебаунсу
    const title = els.title.value;
    const body = els.body.value;
    const q = pickQueryText(title, body);
    if (q.length < 10) {
      renderRecs([], [], []);
      return;
    }

    try {
      const queryVec = await embedder.embed(q);

      // локально — быстро
      const localRecs = await computeLocalRecommendations(queryVec);

      // сеть — параллельно
      const netPromise = computeNetworkRecommendations(queryVec);

      const netRecs = await netPromise;
      const mixRecs = await computeSerendipity(queryVec, localRecs, netRecs);

      renderRecs(localRecs, netRecs, mixRecs);
    } catch (e) {
      console.warn(e);
      els.localRec.innerHTML = '<span class="muted">Ошибка рекомендаций</span>';
      els.netRec.innerHTML = '<span class="muted">—</span>';
      els.mixRec.innerHTML = '<span class="muted">—</span>';
    }
  }, 550);

  // ----------------------------
  // P2P incoming search handler
  // ----------------------------
  p2p.init({
    onIncomingSearch: async ({ queryVec, k, snippetChars }) => {
      // Мы НЕ отдаем всю базу. Мы отдаём только top-K сниппеты.
      // Это “эпhemeral sharing”: пока мы онлайн.
      const scored = index.search(queryVec, { k, excludeIds: new Set() });

      const out = [];
      for (const { id, score } of scored) {
        const n = await db.getNote(id);
        if (!n) continue;
        out.push({
          id: n.id,
          title: n.title || '',
          snippet: truncate(n.body || '', snippetChars),
          score: clamp(score, -1, 1),
          updatedAt: n.updatedAt,
        });
      }
      return out;
    }
  });

  // ----------------------------
  // UI bindings
  // ----------------------------
  els.btnNew.onclick = () => newNote();
  els.btnSave.onclick = () => saveCurrentNote();
  els.btnDelete.onclick = () => deleteCurrentNote();

  els.title.addEventListener('input', scheduleRecs);
  els.body.addEventListener('input', scheduleRecs);

  // ----------------------------
  // Boot
  // ----------------------------
  (async function boot() {
    await db.init();
    await index.loadFromDB(db);
    await refreshNotesList();

    // Если пусто — создадим новую
    const notes = await db.listNotes();
    if (notes.length) await loadNote(notes[0].id);
    else newNote();

    // Подогрев модели не обязателен, но уменьшает первый лаг
    // await embedder.init();
  })();
</script>
</body>
</html>
