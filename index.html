<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Noosphere :: Foundation</title>
<style>
  /* =========================================================
     UI: минимальный технический интерфейс для проверки связки
     ========================================================= */
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --border: #242a36;
    --text: #e6e8ee;
    --muted: #8a93a6;
    --accent: #6aa6ff;
    --ok: #4ade80;
    --warn: #f59e0b;
    --err: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 16px; margin: 0 0 16px; letter-spacing: .5px; }
  h2 { font-size: 13px; margin: 24px 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; margin-bottom: 12px;
  }
  textarea, input[type="text"] {
    width: 100%; background: #0b0d12; color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 10px; font: inherit; resize: vertical;
  }
  textarea { min-height: 90px; }
  button {
    background: #1f2532; color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 12px; font: inherit; cursor: pointer;
  }
  button:hover { background: #272f40; }
  button.primary { background: var(--accent); color: #0b0d12; border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: not-allowed; }

  label.check { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); }
  .status { display: inline-flex; gap: 12px; flex-wrap: wrap; }
  .pill {
    padding: 4px 8px; border-radius: 999px; font-size: 12px;
    background: #1a1f2a; border: 1px solid var(--border); color: var(--muted);
  }
  .pill.ok    { color: var(--ok);   border-color: #1f3d2a; }
  .pill.warn  { color: var(--warn); border-color: #3d3220; }
  .pill.err   { color: var(--err);  border-color: #3d1f22; }

  .list { display: flex; flex-direction: column; gap: 6px; }
  .item {
    background: #0b0d12; border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 10px;
  }
  .item .meta { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .item.world { border-left: 2px solid var(--accent); }
  .item.local { border-left: 2px solid #555; }

  .log {
    background: #07090d; border: 1px solid var(--border);
    border-radius: 4px; padding: 8px; max-height: 220px; overflow: auto;
    font-size: 12px;
  }
  .log .e { color: var(--err); }
  .log .w { color: var(--warn); }
  .log .i { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>NOOSPHERE / FOUNDATION</h1>

  <!-- Статус подсистем -->
  <section class="panel">
    <div class="status" id="status">
      <span class="pill" data-key="idb">IDB: ...</span>
      <span class="pill" data-key="gun">GUN: ...</span>
      <span class="pill" data-key="peers">PEERS: 0</span>
      <span class="pill" data-key="local">LOCAL: 0</span>
      <span class="pill" data-key="world">WORLD: 0</span>
    </div>
  </section>

  <!-- Ввод -->
  <section class="panel">
    <h2>thought</h2>
    <textarea id="input" placeholder="type a thought..."></textarea>
    <div class="row" style="margin-top:8px; align-items:center;">
      <label class="check">
        <input type="checkbox" id="publishWorld" />
        <span>publish to world (p2p)</span>
      </label>
      <div style="flex:1"></div>
      <button id="btnSave" class="primary">Save</button>
    </div>
  </section>

  <!-- Действия диагностики -->
  <section class="panel">
    <h2>diagnostics</h2>
    <div class="row">
      <button id="btnTestIdb">Test IDB</button>
      <button id="btnTestGun">Test Gun</button>
      <button id="btnSeed">Seed 3 thoughts</button>
      <button id="btnReindex">Reindex vectors (stub)</button>
      <button id="btnExport">Export JSON</button>
      <button id="btnReset">Reset device</button>
    </div>
  </section>

  <!-- Локальные -->
  <section class="panel">
    <h2>local thoughts</h2>
    <div class="list" id="listLocal"></div>
  </section>

  <!-- Мировые -->
  <section class="panel">
    <h2>world thoughts (p2p)</h2>
    <div class="list" id="listWorld"></div>
  </section>

  <!-- Лог -->
  <section class="panel">
    <h2>event log</h2>
    <div class="log" id="log"></div>
  </section>
</div>

<!-- GunDB: core + relay adapters -->
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/radisk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/rindexed.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/axe.js"></script>

<script>
/* ==========================================================================
   NOOSPHERE :: FOUNDATION
   Архитектура в одном файле. Секции изолированы IIFE-подобными блоками
   через namespaces на window.__ns, чтобы не засорять глобальную область.
   Порядок объявления критичен: Config -> Logger -> Storage -> P2P -> Sync -> UI -> App
   ========================================================================== */

(() => {
  'use strict';

  const ns = (window.__ns = {});

  /* --------------------------------------------------------------------------
     [1] CONFIG
     Централизованные константы. Меняются только здесь.
     -------------------------------------------------------------------------- */
  ns.Config = Object.freeze({
    DB_NAME: 'noosphere_v1',
    DB_VERSION: 1,
    STORE_THOUGHTS: 'thoughts',
    STORE_META: 'meta',

    GUN_NAMESPACE: 'noosphere/thoughts',
    GUN_RELAYS: [
      'https://relay.peer.ooo/gun',
      // Добавляй свои relay сюда. Для продакшена обязателен собственный.
    ],

    LIMITS: {
      MAX_TEXT_LENGTH: 10_000,
      RENDER_CAP: 200,
    },

    VECTOR: {
      // Заглушка под будущую эмбеддинг-модель (MiniLM / ONNX).
      // Сейчас вектор не вычисляется, поле зарезервировано.
      DIMENSIONS: 0,
    },
  });

  /* --------------------------------------------------------------------------
     [2] LOGGER
     Без эмодзи. Уровни: i / w / e. Выводит в UI-лог и в консоль.
     -------------------------------------------------------------------------- */
  ns.Logger = (() => {
    const el = () => document.getElementById('log');
    const fmtTime = (d) => d.toISOString().slice(11, 19);

    const write = (level, msg, data) => {
      const line = document.createElement('div');
      line.className = level;
      const tail = data !== undefined ? ' ' + safeStringify(data) : '';
      line.textContent = `[${fmtTime(new Date())}] [${level.toUpperCase()}] ${msg}${tail}`;
      const box = el();
      if (box) {
        box.appendChild(line);
        box.scrollTop = box.scrollHeight;
      }
      const consoleFn = level === 'e' ? 'error' : level === 'w' ? 'warn' : 'log';
      console[consoleFn](`[noosphere:${level}] ${msg}`, data ?? '');
    };

    const safeStringify = (x) => {
      try { return typeof x === 'string' ? x : JSON.stringify(x); }
      catch { return String(x); }
    };

    return {
      info:  (m, d) => write('i', m, d),
      warn:  (m, d) => write('w', m, d),
      error: (m, d) => write('e', m, d),
    };
  })();

  /* --------------------------------------------------------------------------
     [3] UTIL
     Мелкие чистые хелперы: ID, валидация, нормализация.
     -------------------------------------------------------------------------- */
  ns.Util = {
    newId: () => {
      // crypto.randomUUID доступен в secure context. Fallback — на Date+Math.
      if (crypto && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
    },

    now: () => Date.now(),

    normalizeText: (text) => {
      if (typeof text !== 'string') return '';
      const trimmed = text.trim();
      return trimmed.slice(0, ns.Config.LIMITS.MAX_TEXT_LENGTH);
    },

    isNonEmptyString: (v) => typeof v === 'string' && v.trim().length > 0,
  };

  /* --------------------------------------------------------------------------
     [4] STORAGE (IndexedDB wrapper)
     Promise-based API. Два хранилища:
       - thoughts: ключ id, индексы по createdAt и source
       - meta:     key-value для служебных флагов (последний курсор и т.п.)
     -------------------------------------------------------------------------- */
  ns.Storage = (() => {
    const { DB_NAME, DB_VERSION, STORE_THOUGHTS, STORE_META } = ns.Config;
    let db = null;

    const open = () => new Promise((resolve, reject) => {
      if (db) return resolve(db);
      if (!('indexedDB' in window)) {
        return reject(new Error('IndexedDB is not supported in this browser'));
      }
      const req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = (ev) => {
        const _db = ev.target.result;
        if (!_db.objectStoreNames.contains(STORE_THOUGHTS)) {
          const store = _db.createObjectStore(STORE_THOUGHTS, { keyPath: 'id' });
          store.createIndex('createdAt', 'createdAt', { unique: false });
          store.createIndex('source',    'source',    { unique: false });
        }
        if (!_db.objectStoreNames.contains(STORE_META)) {
          _db.createObjectStore(STORE_META, { keyPath: 'key' });
        }
      };

      req.onsuccess = (ev) => { db = ev.target.result; resolve(db); };
      req.onerror   = ()    => reject(req.error);
      req.onblocked = ()    => reject(new Error('IDB open blocked by another tab'));
    });

    const tx = (storeName, mode = 'readonly') => {
      const t = db.transaction(storeName, mode);
      return t.objectStore(storeName);
    };

    const prom = (req) => new Promise((resolve, reject) => {
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });

    /**
     * Thought shape:
     * {
     *   id: string,
     *   text: string,
     *   source: 'local' | 'world',
     *   createdAt: number,
     *   updatedAt: number,
     *   vector: number[] | null,   // reserved
     *   originDevice: string,      // device fingerprint (reserved)
     *   published: boolean,        // was pushed to Gun
     * }
     */
    const validate = (t) => {
      if (!t || typeof t !== 'object') throw new Error('Invalid thought: not an object');
      if (!ns.Util.isNonEmptyString(t.id))   throw new Error('Invalid thought: bad id');
      if (!ns.Util.isNonEmptyString(t.text)) throw new Error('Invalid thought: empty text');
      if (t.source !== 'local' && t.source !== 'world') {
        throw new Error('Invalid thought: bad source');
      }
      return true;
    };

    const put = async (thought) => {
      validate(thought);
      await open();
      return prom(tx(STORE_THOUGHTS, 'readwrite').put(thought));
    };

    const get = async (id) => {
      await open();
      return prom(tx(STORE_THOUGHTS).get(id));
    };

    const remove = async (id) => {
      await open();
      return prom(tx(STORE_THOUGHTS, 'readwrite').delete(id));
    };

    const listBySource = async (source) => {
      await open();
      return new Promise((resolve, reject) => {
        const out = [];
        const idx = tx(STORE_THOUGHTS).index('source');
        const req = idx.openCursor(IDBKeyRange.only(source), 'prev');
        req.onsuccess = (ev) => {
          const cursor = ev.target.result;
          if (!cursor) return resolve(out);
          out.push(cursor.value);
          if (out.length >= ns.Config.LIMITS.RENDER_CAP) return resolve(out);
          cursor.continue();
        };
        req.onerror = () => reject(req.error);
      });
    };

    const countBySource = async (source) => {
      await open();
      return prom(tx(STORE_THOUGHTS).index('source').count(IDBKeyRange.only(source)));
    };

    const all = async () => {
      await open();
      return prom(tx(STORE_THOUGHTS).getAll());
    };

    const clearAll = async () => {
      await open();
      await prom(tx(STORE_THOUGHTS, 'readwrite').clear());
      await prom(tx(STORE_META,    'readwrite').clear());
    };

    return {
      open, put, get, remove,
      listBySource, countBySource, all, clearAll,
    };
  })();

  /* --------------------------------------------------------------------------
     [5] P2P (GunDB adapter)
     Тонкий слой поверх Gun. Все операции возвращают Promise/observable.
     Поддержка offline: Gun сам кеширует в localStorage/RAD, мы не дублируем.
     -------------------------------------------------------------------------- */
  ns.P2P = (() => {
    const { GUN_NAMESPACE, GUN_RELAYS } = ns.Config;
    let gun = null;
    let thoughtsNode = null;
    let peerCount = 0;
    const listeners = new Set();

    const init = () => new Promise((resolve, reject) => {
      try {
        if (typeof Gun === 'undefined') {
          throw new Error('Gun library not loaded (CDN blocked?)');
        }
        gun = Gun({
          peers: GUN_RELAYS,
          localStorage: true, // локальный кэш Gun (не путать с нашим IDB)
        });
        thoughtsNode = gun.get(GUN_NAMESPACE);

        // Подписка на graph-события для подсчёта пиров.
        gun.on('hi',  () => { peerCount++; notifyPeers(); });
        gun.on('bye', () => { peerCount = Math.max(0, peerCount - 1); notifyPeers(); });

        // Подписка на поток мировых заметок. map().on() стреляет по каждой.
        thoughtsNode.map().on((data, id) => {
          if (!data) return; // удаление (tombstone)
          const thought = gunPayloadToThought(data, id);
          if (!thought) return;
          for (const fn of listeners) {
            try { fn(thought); } catch (err) { ns.Logger.error('listener crashed', err.message); }
          }
        });

        ns.Logger.info('Gun initialized', { peers: GUN_RELAYS });
        resolve();
      } catch (err) {
        reject(err);
      }
    });

    const notifyPeers = () => {
      document.dispatchEvent(new CustomEvent('ns:peers', { detail: { count: peerCount } }));
    };

    /**
     * Преобразует сырой объект Gun в валидный Thought.
     * Gun добавляет служебное поле '_' — отбрасываем.
     */
    const gunPayloadToThought = (data, id) => {
      if (!data || typeof data !== 'object') return null;
      const text = typeof data.text === 'string' ? data.text : '';
      if (!text.trim()) return null;
      return {
        id: String(id),
        text: text.slice(0, ns.Config.LIMITS.MAX_TEXT_LENGTH),
        source: 'world',
        createdAt: Number(data.createdAt) || ns.Util.now(),
        updatedAt: Number(data.updatedAt) || ns.Util.now(),
        vector: null,
        originDevice: String(data.originDevice || ''),
        published: true,
      };
    };

    const publish = (thought) => new Promise((resolve, reject) => {
      if (!thoughtsNode) return reject(new Error('Gun not initialized'));
      try { validateForPublish(thought); } catch (e) { return reject(e); }

      const payload = {
        text: thought.text,
        createdAt: thought.createdAt,
        updatedAt: thought.updatedAt,
        originDevice: thought.originDevice || '',
        // Вектор в публичный граф не кладём: тяжёлый и бесполезный для чужих устройств.
      };
      thoughtsNode.get(thought.id).put(payload, (ack) => {
        if (ack && ack.err) return reject(new Error(ack.err));
        resolve();
      });
    });

    const validateForPublish = (t) => {
      if (!t || !ns.Util.isNonEmptyString(t.id))   throw new Error('publish: bad id');
      if (!ns.Util.isNonEmptyString(t.text))       throw new Error('publish: empty text');
    };

    const onWorldThought = (fn) => {
      listeners.add(fn);
      return () => listeners.delete(fn);
    };

    const getPeerCount = () => peerCount;
    const isConnected  = () => peerCount > 0;

    return { init, publish, onWorldThought, getPeerCount, isConnected };
  })();

  /* --------------------------------------------------------------------------
     [6] SYNC
     Мост между Storage и P2P.
     - Локальные сохранения: всегда в IDB, опционально publish.
     - Входящие мировые: upsert в IDB с Last-Write-Wins по updatedAt.
     -------------------------------------------------------------------------- */
  ns.Sync = (() => {
    const seenWorldIds = new Set();

    const saveLocal = async ({ text, publishToWorld }) => {
      const clean = ns.Util.normalizeText(text);
      if (!clean) throw new Error('Empty thought');

      const thought = {
        id: ns.Util.newId(),
        text: clean,
        source: 'local',
        createdAt: ns.Util.now(),
        updatedAt: ns.Util.now(),
        vector: null,
        originDevice: '',
        published: false,
      };

      await ns.Storage.put(thought);
      ns.Logger.info('saved local', { id: thought.id });

      if (publishToWorld) {
        try {
          await ns.P2P.publish(thought);
          thought.published = true;
          await ns.Storage.put(thought); // фиксируем флаг published
          ns.Logger.info('published to world', { id: thought.id });
        } catch (err) {
          ns.Logger.warn('publish failed (saved locally)', err.message);
        }
      }

      document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
      return thought;
    };

    const ingestWorld = async (thought) => {
      // Дедупликация на уровне сессии + LWW по updatedAt.
      const existing = await ns.Storage.get(thought.id);
      if (existing) {
        if (existing.updatedAt >= thought.updatedAt) return; // наше новее или равно
        if (seenWorldIds.has(thought.id)) return;
      }
      seenWorldIds.add(thought.id);
      await ns.Storage.put(thought);
      ns.Logger.info('ingested world thought', { id: thought.id });
      document.dispatchEvent(new CustomEvent('ns:thoughts-changed'));
    };

    const bind = () => {
      ns.P2P.onWorldThought(ingestWorld);
    };

    return { saveLocal, ingestWorld, bind };
  })();

  /* --------------------------------------------------------------------------
     [7] UI
     Чистый рендер без фреймворка. Слушает 'ns:thoughts-changed' и 'ns:peers'.
     -------------------------------------------------------------------------- */
  ns.UI = (() => {
    const refs = {};

    const cacheRefs = () => {
      ['input','publishWorld','btnSave','btnTestIdb','btnTestGun','btnSeed',
       'btnReindex','btnExport','btnReset','listLocal','listWorld','status']
        .forEach((id) => { refs[id] = document.getElementById(id); });
    };

    const setPill = (key, text, state = '') => {
      const el = refs.status.querySelector(`[data-key="${key}"]`);
      if (!el) return;
      el.textContent = text;
      el.classList.remove('ok','warn','err');
      if (state) el.classList.add(state);
    };

    const renderList = (container, items) => {
      container.innerHTML = '';
      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'item';
        empty.textContent = '(empty)';
        container.appendChild(empty);
        return;
      }
      for (const t of items) {
        const row = document.createElement('div');
        row.className = `item ${t.source}`;
        const body = document.createElement('div');
        body.textContent = t.text;
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent =
          `${t.source} | ${new Date(t.createdAt).toISOString()} | id:${t.id.slice(0,8)}` +
          (t.published ? ' | published' : '');
        row.appendChild(body);
        row.appendChild(meta);
        container.appendChild(row);
      }
    };

    const refresh = async () => {
      try {
        const [locals, worlds, cLocal, cWorld] = await Promise.all([
          ns.Storage.listBySource('local'),
          ns.Storage.listBySource('world'),
          ns.Storage.countBySource('local'),
          ns.Storage.countBySource('world'),
        ]);
        renderList(refs.listLocal, locals);
        renderList(refs.listWorld, worlds);
        setPill('local', `LOCAL: ${cLocal}`, 'ok');
        setPill('world', `WORLD: ${cWorld}`, cWorld ? 'ok' : '');
      } catch (err) {
        ns.Logger.error('refresh failed', err.message);
      }
    };

    const bindEvents = () => {
      refs.btnSave.addEventListener('click', async () => {
        const text = refs.input.value;
        const publishToWorld = refs.publishWorld.checked;
        try {
          refs.btnSave.disabled = true;
          await ns.Sync.saveLocal({ text, publishToWorld });
          refs.input.value = '';
          await refresh();
        } catch (err) {
          ns.Logger.error('save failed', err.message);
        } finally {
          refs.btnSave.disabled = false;
        }
      });

      refs.btnTestIdb.addEventListener('click', async () => {
        try {
          await ns.Storage.open();
          const probe = {
            id: 'probe-' + ns.Util.newId(),
            text: 'idb probe',
            source: 'local',
            createdAt: ns.Util.now(),
            updatedAt: ns.Util.now(),
            vector: null, originDevice: '', published: false,
          };
          await ns.Storage.put(probe);
          const read = await ns.Storage.get(probe.id);
          await ns.Storage.remove(probe.id);
          if (read && read.id === probe.id) {
            setPill('idb', 'IDB: OK', 'ok');
            ns.Logger.info('IDB probe OK');
          } else {
            setPill('idb', 'IDB: READ MISMATCH', 'err');
          }
        } catch (err) {
          setPill('idb', 'IDB: ERR', 'err');
          ns.Logger.error('IDB probe failed', err.message);
        }
      });

      refs.btnTestGun.addEventListener('click', () => {
        const ok = ns.P2P.isConnected();
        setPill('gun', ok ? 'GUN: ONLINE' : 'GUN: OFFLINE', ok ? 'ok' : 'warn');
        ns.Logger.info('Gun peer check', { peers: ns.P2P.getPeerCount() });
      });

      refs.btnSeed.addEventListener('click', async () => {
        const samples = [
          'Мысль появляется в паузе между действиями.',
          'Архитектура — это способ договариваться с будущим собой.',
          'Случайность — недооценённый инструмент поиска.',
        ];
        for (const s of samples) {
          await ns.Sync.saveLocal({ text: s, publishToWorld: false });
        }
        await refresh();
      });

      refs.btnReindex.addEventListener('click', () => {
        ns.Logger.warn('Reindex stub: эмбеддинги ещё не подключены');
      });

      refs.btnExport.addEventListener('click', async () => {
        const all = await ns.Storage.all();
        const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `noosphere-export-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        ns.Logger.info('export done', { count: all.length });
      });

      refs.btnReset.addEventListener('click', async () => {
        if (!confirm('Удалить все локальные данные на этом устройстве?')) return;
        try {
          await ns.Storage.clearAll();
          ns.Logger.warn('device reset');
          await refresh();
        } catch (err) {
          ns.Logger.error('reset failed', err.message);
        }
      });

      document.addEventListener('ns:thoughts-changed', refresh);
      document.addEventListener('ns:peers', (ev) => {
        const n = ev.detail.count;
        setPill('peers', `PEERS: ${n}`, n ? 'ok' : 'warn');
      });
    };

    const init = () => {
      cacheRefs();
      bindEvents();
    };

    return { init, refresh, setPill };
  })();

  /* --------------------------------------------------------------------------
     [8] APP (entry point)
     Последовательный bootstrap. Каждый шаг изолирован — падение одного
     не валит остальные.
     -------------------------------------------------------------------------- */
  ns.App = (() => {
    const boot = async () => {
      ns.UI.init();
      ns.UI.setPill('idb',  'IDB: boot...', 'warn');
      ns.UI.setPill('gun',  'GUN: boot...', 'warn');

      // 1. IndexedDB
      try {
        await ns.Storage.open();
        ns.UI.setPill('idb', 'IDB: OK', 'ok');
        ns.Logger.info('IDB ready', { name: ns.Config.DB_NAME });
      } catch (err) {
        ns.UI.setPill('idb', 'IDB: ERR', 'err');
        ns.Logger.error('IDB init failed', err.message);
      }

      // 2. Gun P2P
      try {
        await ns.P2P.init();
        ns.UI.setPill('gun', 'GUN: ONLINE (init)', 'ok');
      } catch (err) {
        ns.UI.setPill('gun', 'GUN: ERR', 'err');
        ns.Logger.error('Gun init failed', err.message);
      }

      // 3. Связка Sync
      ns.Sync.bind();

      // 4. Первичный рендер
      await ns.UI.refresh();
    };

    return { boot };
  })();

  // Старт после DOMContentLoaded, чтобы все узлы UI были доступны.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ns.App.boot);
  } else {
    ns.App.boot();
  }
})();
</script>
</body>
</html>
