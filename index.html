<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Noosphere – мысли мира</title>
  <style>
    :root {
      --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
      --text-secondary: #64748b; --border: #e2e8f0; --accent: #4f46e5;
      --accent-hover: #4338ca; --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
      --radius: 20px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9;
        --text-secondary: #94a3b8; --border: #334155; --accent: #818cf8;
        --shadow: 0 10px 25px -5px rgba(0,0,0,0.4);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      display: flex; justify-content: center; padding: 1rem;
    }
    .app {
      width: 100%; max-width: 640px;
      display: flex; flex-direction: column; gap: 1.25rem;
    }

    /* Главный заголовок */
    .logo {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.03em;
      text-align: center; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Поле ввода – сердце приложения */
    .thought-input {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
      box-shadow: var(--shadow); transition: all 0.3s;
    }
    .thought-input:focus-within {
      border-color: var(--accent); box-shadow: 0 0 0 4px rgba(79,70,229,0.15);
    }
    textarea {
      width: 100%; border: none; background: transparent;
      font-size: 1.15rem; font-family: inherit; resize: none;
      outline: none; color: var(--text); min-height: 80px;
    }
    textarea::placeholder { color: var(--text-secondary); opacity: 0.7; }
    .input-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 0.75rem;
    }
    .share-toggle {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.9rem; color: var(--text-secondary); cursor: pointer;
      user-select: none;
    }
    .share-toggle input[type="checkbox"] {
      width: 1.2rem; height: 1.2rem; accent-color: var(--accent);
    }
    .btn {
      padding: 0.65rem 1.4rem; border-radius: 14px; font-weight: 600;
      border: none; cursor: pointer; transition: all 0.2s;
      background: var(--accent); color: white; font-size: 0.95rem;
    }
    .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .btn-ghost {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface); }

    /* Карточки мыслей – плавное появление */
    .feed-section {
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .section-label {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-secondary); padding-left: 0.25rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .cards-row {
      display: flex; overflow-x: auto; gap: 0.75rem;
      padding-bottom: 0.5rem; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .cards-row::-webkit-scrollbar { height: 6px; }
    .cards-row::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 3px;
    }
    .card {
      min-width: 220px; max-width: 280px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1rem;
      box-shadow: var(--shadow); scroll-snap-align: start;
      transition: all 0.2s; animation: fadeInUp 0.4s ease both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); }
    .card-text {
      font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.75rem;
      white-space: pre-wrap; word-break: break-word;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.75rem; color: var(--text-secondary);
    }
    .score-badge {
      background: rgba(79,70,229,0.1); color: var(--accent);
      padding: 2px 8px; border-radius: 12px; font-weight: 600;
    }
    .vote-group {
      display: flex; align-items: center; gap: 0.3rem;
    }
    .vote-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 50%; width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.85rem; cursor: pointer; color: var(--text-secondary);
      transition: all 0.2s;
    }
    .vote-btn:hover { background: var(--bg); color: var(--text); }
    .vote-count { font-weight: 600; min-width: 1.8rem; text-align: center; }
    .empty-message {
      text-align: center; color: var(--text-secondary);
      font-style: italic; padding: 1rem; width: 100%;
    }

    /* Архив — скрытая секция */
    .archive-section {
      border-top: 1px solid var(--border); padding-top: 1rem;
    }
    .archive-item {
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .archive-item:last-child { border-bottom: none; }

    /* Настройки – иконка в углу */
    .settings-trigger {
      position: fixed; top: 1rem; right: 1rem;
      width: 44px; height: 44px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: var(--shadow); z-index: 5;
    }
    .settings-panel {
      position: fixed; top: 0; right: 0; width: 320px; max-width: 85vw;
      height: 100%; background: var(--surface); box-shadow: -5px 0 25px rgba(0,0,0,0.15);
      z-index: 10; padding: 1.5rem; overflow-y: auto;
      transform: translateX(100%); transition: transform 0.3s ease;
    }
    .settings-panel.open { transform: translateX(0); }
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      z-index: 9; display: none;
    }
    .overlay.open { display: block; }

    @media (max-width: 480px) {
      .card { min-width: 170px; max-width: 220px; }
      .logo { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <h1 class="logo">🌐 Noosphere</h1>

  <!-- Поле ввода мыслей -->
  <div class="thought-input">
    <textarea id="thoughtInput" placeholder="Поделитесь мыслью..."></textarea>
    <div class="input-actions">
      <label class="share-toggle">
        <input type="checkbox" id="shareCheckbox"> В общий поток
      </label>
      <button id="saveBtn" class="btn" disabled>Отправить</button>
    </div>
  </div>

  <!-- Динамические ленты -->
  <div id="personalFeed" class="feed-section" style="display:none;">
    <div class="section-label">🧠 Мои похожие мысли</div>
    <div id="personalCards" class="cards-row"></div>
  </div>
  <div id="relevantFeed" class="feed-section" style="display:none;">
    <div class="section-label">🌍 Релевантные идеи мира</div>
    <div id="relevantCards" class="cards-row"></div>
  </div>
  <div id="serendipityFeed" class="feed-section" style="display:none;">
    <div class="section-label">🌀 Смежные (неожиданные)</div>
    <div id="serendipityCards" class="cards-row"></div>
  </div>

  <!-- Архив (появляется после сохранения) -->
  <div id="archiveSection" class="archive-section" style="display:none;">
    <div class="section-label">📚 Мои сохранённые мысли</div>
    <div id="archiveList"></div>
  </div>
</div>

<!-- Настройки -->
<div class="settings-trigger" id="settingsTrigger">⚙️</div>
<div class="overlay" id="overlay"></div>
<div class="settings-panel" id="settingsPanel">
  <h2 style="margin-bottom:1.5rem;">Настройки</h2>
  <div style="margin-bottom:1rem;">
    <label>Порог релевантности</label>
    <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.15">
    <span id="thresholdValue">0.15</span>
  </div>
  <div style="margin-bottom:1rem;">
    <label>Дельта смежности</label>
    <input type="range" id="serendipitySlider" min="0" max="0.5" step="0.01" value="0.10">
    <span id="serendipityValue">0.10</span>
  </div>
  <div style="margin-bottom:1rem;">
    <label>Мин. рейтинг</label>
    <select id="minRatingSelect">
      <option value="0">0</option><option value="1" selected>1</option>
      <option value="3">3</option><option value="5">5</option>
    </select>
  </div>
  <div style="margin-bottom:1rem;">
    <label>Макс. карточек</label>
    <select id="maxResultsSelect">
      <option value="3">3</option><option value="5" selected>5</option>
      <option value="10">10</option>
    </select>
  </div>
  <button id="applySettingsBtn" class="btn" style="width:100%;">Применить</button>
  <p style="font-size:0.75rem;margin-top:1rem;color:var(--text-secondary);">Модель: MiniLM (25 МБ)</p>
</div>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

// --- Простые настройки ---
const Settings = {
  threshold: 0.15, serendipityDelta: 0.10, minRating: 1, maxResults: 5,
  load() { try { Object.assign(this, JSON.parse(localStorage.getItem('ns_settings')||'{}')); } catch(e) {} },
  save() { localStorage.setItem('ns_settings', JSON.stringify(this)); }
};

// --- Математика векторов ---
const Vec = {
  normalize(v) {
    const mag = Math.sqrt(v.reduce((s,x)=>s+x*x,0));
    return mag ? new Float32Array(v.map(x=>x/mag)) : new Float32Array(v.length);
  },
  cosine(a,b) { let d=0; for(let i=0;i<a.length;i++) d+=a[i]*b[i]; return d; }
};

// --- Хранилища ---
const MyNotes = {
  data: [],
  load() { try { this.data = JSON.parse(localStorage.getItem('ns_mynotes')||'[]'); } catch(e) {} },
  save() { localStorage.setItem('ns_mynotes', JSON.stringify(this.data)); },
  add(text) { const n={id:'l_'+Date.now(), text, date:new Date().toISOString()}; this.data.unshift(n); this.save(); return n; },
  clear() { this.data=[]; this.save(); }
};

const World = {
  notes: [],
  load() { try { this.notes = JSON.parse(localStorage.getItem('ns_world')||'[]'); } catch(e) {} },
  save() { localStorage.setItem('ns_world', JSON.stringify(this.notes)); },
  add(vectorArray, text) {
    const excerpt = text.slice(0,150);
    const n = { id:'g_'+Date.now()+Math.random(), vec:vectorArray, up:0, down:0, excerpt };
    this.notes.unshift(n); this.save(); return n;
  },
  vote(id, up) { const n=this.notes.find(n=>n.id===id); if(n) { up?n.up++:n.down++; this.save(); } }
};

// --- Движок с единственной моделью ---
const Engine = {
  model: null, cache: new Map(),
  async init() {
    this.model = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', { quantized: true });
    await this.reindex();
  },
  async embed(text) {
    const out = await this.model([text]);
    const { data, dims } = out;
    const [_, tokens, hidden] = dims;
    if (!tokens || !hidden) return Vec.normalize(data);
    const emb = new Float32Array(hidden);
    for (let t=0; t<tokens; t++) for (let h=0; h<hidden; h++) emb[h] += data[t*hidden+h];
    for (let h=0; h<hidden; h++) emb[h] /= tokens;
    return Vec.normalize(emb);
  },
  async reindex() {
    this.cache.clear();
    for (const n of MyNotes.data) await this.cacheNote(n.id, n.text);
  },
  async cacheNote(id, text) { if (!this.cache.has(id)) this.cache.set(id, await this.embed(text)); },
  async searchLocal(qVec) {
    const res = [];
    for (const n of MyNotes.data) {
      const v = this.cache.get(n.id); if (!v) continue;
      const s = Vec.cosine(qVec, v);
      if (s > Settings.threshold) res.push({...n, score: s});
    }
    return res.sort((a,b)=>b.score-a.score).slice(0, Settings.maxResults);
  },
  async searchWorld(qVec) {
    const rel=[], ser=[], low = Settings.threshold - Settings.serendipityDelta;
    for (const n of World.notes) {
      if ((n.up - n.down) < Settings.minRating) continue;
      const v = new Float32Array(n.vec);
      const s = Vec.cosine(qVec, v);
      if (s >= Settings.threshold) rel.push({...n, score:s});
      else if (s >= low) ser.push({...n, score:s});
    }
    return {
      rel: rel.sort((a,b)=>b.score-a.score).slice(0, Settings.maxResults),
      ser: ser.sort((a,b)=>b.score-a.score).slice(0, Settings.maxResults)
    };
  }
};

// --- UI-элементы ---
const D = {
  input: document.getElementById('thoughtInput'),
  saveBtn: document.getElementById('saveBtn'),
  shareChk: document.getElementById('shareCheckbox'),
  personalFeed: document.getElementById('personalFeed'),
  personalCards: document.getElementById('personalCards'),
  relevantFeed: document.getElementById('relevantFeed'),
  relevantCards: document.getElementById('relevantCards'),
  serendipityFeed: document.getElementById('serendipityFeed'),
  serendipityCards: document.getElementById('serendipityCards'),
  archiveSection: document.getElementById('archiveSection'),
  archiveList: document.getElementById('archiveList'),
  settingsTrigger: document.getElementById('settingsTrigger'),
  overlay: document.getElementById('overlay'),
  panel: document.getElementById('settingsPanel'),
  thresholdSl: document.getElementById('thresholdSlider'),
  thresholdVal: document.getElementById('thresholdValue'),
  serendipitySl: document.getElementById('serendipitySlider'),
  serendipityVal: document.getElementById('serendipityValue'),
  minRatingSel: document.getElementById('minRatingSelect'),
  maxResSel: document.getElementById('maxResultsSelect'),
  applyBtn: document.getElementById('applySettingsBtn')
};

// --- Рендеринг ---
function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function showCards(container, items, isWorld=false) {
  if (!items.length) { container.innerHTML = '<div class="empty-message">Пока ничего нет</div>'; return; }
  container.innerHTML = items.map(item => {
    const text = isWorld ? (item.excerpt || 'мысль') : item.text;
    const footer = isWorld
      ? `<div class="vote-group">
           <button class="vote-btn" data-id="${item.id}" data-vote="up">👍</button>
           <span class="vote-count">${item.up - item.down}</span>
           <button class="vote-btn" data-id="${item.id}" data-vote="down">👎</button>
         </div>`
      : `<span>${new Date(item.date).toLocaleDateString()}</span>`;
    return `<div class="card">
      <div class="card-text">${esc(text)}</div>
      <div class="card-footer"><span class="score-badge">${item.score.toFixed(2)}</span>${footer}</div>
    </div>`;
  }).join('');
}
function renderArchive() {
  D.archiveList.innerHTML = MyNotes.data.map(n => `<div class="archive-item"><span>${esc(n.text)}</span><span style="color:var(--text-secondary)">${new Date(n.date).toLocaleDateString()}</span></div>`).join('');
  D.archiveSection.style.display = MyNotes.data.length ? 'block' : 'none';
}

// --- Поиск при вводе ---
async function handleInput() {
  const q = D.input.value.trim();
  if (!q) {
    D.personalFeed.style.display = 'none';
    D.relevantFeed.style.display = 'none';
    D.serendipityFeed.style.display = 'none';
    return;
  }
  const qVec = await Engine.embed(q);
  const [local, world] = await Promise.all([Engine.searchLocal(qVec), Engine.searchWorld(qVec)]);

  if (local.length) { D.personalFeed.style.display = 'flex'; showCards(D.personalCards, local); }
  else D.personalFeed.style.display = 'none';

  if (world.rel.length) { D.relevantFeed.style.display = 'flex'; showCards(D.relevantCards, world.rel, true); }
  else D.relevantFeed.style.display = 'none';

  if (world.ser.length) { D.serendipityFeed.style.display = 'flex'; showCards(D.serendipityCards, world.ser, true); }
  else D.serendipityFeed.style.display = 'none';
}

// --- Сохранение мысли ---
async function saveThought() {
  const text = D.input.value.trim(); if (!text) return;
  const share = D.shareChk.checked;
  MyNotes.add(text);
  await Engine.cacheNote(MyNotes.data[0].id, text);
  if (share) {
    const vec = await Engine.embed(text);
    World.add(Array.from(vec), text);
  }
  D.input.value = '';
  D.shareChk.checked = false;
  renderArchive();
  handleInput(); // очистить ленты
}

// --- Настройки ---
function applySettings() {
  Settings.threshold = +D.thresholdSl.value;
  Settings.serendipityDelta = +D.serendipitySl.value;
  Settings.minRating = +D.minRatingSel.value;
  Settings.maxResults = +D.maxResSel.value;
  Settings.save();
  D.thresholdVal.textContent = Settings.threshold.toFixed(2);
  D.serendipityVal.textContent = Settings.serendipityDelta.toFixed(2);
  handleInput();
}

// --- Старт ---
(async () => {
  Settings.load(); MyNotes.load(); World.load();
  D.thresholdSl.value = Settings.threshold; D.thresholdVal.textContent = Settings.threshold.toFixed(2);
  D.serendipitySl.value = Settings.serendipityDelta; D.serendipityVal.textContent = Settings.serendipityDelta.toFixed(2);
  D.minRatingSel.value = Settings.minRating; D.maxResSel.value = Settings.maxResults;

  // Модель загружается асинхронно, но поле доступно сразу (будет включено после загрузки)
  D.saveBtn.disabled = true;
  Engine.init().then(() => {
    D.saveBtn.disabled = false;
    renderArchive();
    // Если уже есть текст, выполнить поиск (маловероятно)
  });

  // События
  D.input.addEventListener('input', debounce(handleInput, 400));
  D.saveBtn.addEventListener('click', saveThought);
  D.input.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveThought(); }
  });
  D.settingsTrigger.addEventListener('click', () => {
    D.overlay.classList.add('open'); D.panel.classList.add('open');
  });
  D.overlay.addEventListener('click', () => {
    D.overlay.classList.remove('open'); D.panel.classList.remove('open');
  });
  D.applyBtn.addEventListener('click', () => {
    applySettings();
    D.overlay.classList.remove('open'); D.panel.classList.remove('open');
  });
  D.thresholdSl.addEventListener('input', () => D.thresholdVal.textContent = parseFloat(D.thresholdSl.value).toFixed(2));
  D.serendipitySl.addEventListener('input', () => D.serendipityVal.textContent = parseFloat(D.serendipitySl.value).toFixed(2));
  // Живое обновление при изменении ползунков (без кнопки Применить)
  D.thresholdSl.addEventListener('change', applySettings);
  D.serendipitySl.addEventListener('change', applySettings);
  D.minRatingSel.addEventListener('change', applySettings);
  D.maxResSel.addEventListener('change', applySettings);

  // Голосование
  document.body.addEventListener('click', e => {
    const btn = e.target.closest('.vote-btn');
    if (!btn) return;
    World.vote(btn.dataset.id, btn.dataset.vote === 'up');
    handleInput();
  });
})();

function debounce(fn, ms) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }
</script>
</body>
</html>
