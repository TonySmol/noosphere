<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https: wss:; worker-src 'self' blob:; connect-src * https: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src * data: blob:;">
<title>NOOmium</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◆</text></svg>">
<style>
/* ============================================
   NOOmium · LOOM-UI · utilitarian design
   ============================================ */
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.2,.7,.2,1);
  --r:12px;--r-sm:8px;--r-xs:5px;
  --font:ui-sans-serif,-apple-system,'SF Pro Text','Inter','Segoe UI',Roboto,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
[data-theme="dark"]{
  --bg:#0b0b10;--bg-2:#121218;--surface:#16161e;--surface-2:#1c1c26;--surface-3:#242430;
  --text:#ececf1;--text-2:#a0a0ae;--text-3:#6c6c7a;--text-dim:#484855;
  --line:rgba(255,255,255,.06);--line-strong:rgba(255,255,255,.11);
  --brand:#8b7cff;--brand-glow:rgba(139,124,255,.14);
  --world:#38bdf8;--world-glow:rgba(56,189,248,.12);
  --seren:#4ade80;--seren-glow:rgba(74,222,128,.12);
  --danger:#ef4444;--warning:#eab308;--ok:#22c55e;
  color-scheme:dark;
}
[data-theme="light"]{
  --bg:#fafafa;--bg-2:#ffffff;--surface:#ffffff;--surface-2:#f4f4f6;--surface-3:#eaeaed;
  --text:#1a1a22;--text-2:#52525c;--text-3:#8a8a95;--text-dim:#b4b4be;
  --line:rgba(0,0,0,.06);--line-strong:rgba(0,0,0,.12);
  --brand:#6d5ef5;--brand-glow:rgba(109,94,245,.10);
  --world:#0284c7;--world-glow:rgba(2,132,199,.08);
  --seren:#16a34a;--seren-glow:rgba(22,163,74,.08);
  --danger:#dc2626;--warning:#ca8a04;--ok:#16a34a;
  color-scheme:light;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font:14px/1.5 var(--font);
  -webkit-font-smoothing:antialiased;
  -webkit-user-select:none;user-select:none;
  overscroll-behavior:none;
}
input,textarea{-webkit-user-select:text;user-select:text}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;outline:none}
button[disabled]{opacity:.4;cursor:not-allowed}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}

#app-root{height:100%;display:none;flex-direction:column}
body.show-app #app-root{display:flex}
body.show-app #loom-root{display:none}

/* ============ HEADER (minimal) ============ */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;padding-top:calc(10px + var(--safe-top));
  background:var(--surface);border-bottom:1px solid var(--line);
  flex-shrink:0;min-height:48px;
}
.logo{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font);font-weight:700;font-size:15px;
  letter-spacing:-.01em;color:var(--text);
}
.logo-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:6px;
  background:var(--brand);color:white;
  font-weight:800;font-size:11px;letter-spacing:-.02em;
}
.logo-dot{color:var(--brand);margin:0 .5px}
.burger{
  width:34px;height:34px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;transition:background .15s var(--ease);
}
.burger:hover{background:var(--surface-2)}
.burger-line{width:14px;height:1.5px;background:var(--text-2);border-radius:1px}

/* ============ STATUS (compact inline) ============ */
.status{
  display:flex;gap:10px;padding:6px 14px;
  background:var(--surface);border-bottom:1px solid var(--line);
  flex-shrink:0;font-size:11px;color:var(--text-3);
  font-family:var(--mono);letter-spacing:.02em;
  align-items:center;overflow:hidden;
}
.st-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--text-dim);flex-shrink:0;
}
.st-dot.ok{background:var(--ok)}
.st-dot.warn{background:var(--warning)}
.st-dot.err{background:var(--danger)}
.st-dot.load{background:var(--brand);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{50%{opacity:.3}}
.st-item{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.st-sep{color:var(--line-strong)}

/* ============ WORKSPACE ============ */
.ws{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-height:0}

/* ============ EDITOR (clean) ============ */
.ed{
  background:var(--surface);margin:10px 12px 0;
  border:1px solid var(--line);border-radius:var(--r);
  padding:10px 12px;flex-shrink:0;
  transition:border-color .15s var(--ease);
}
.ed:focus-within{border-color:var(--brand)}
.ed-ta{
  width:100%;min-height:48px;max-height:110px;
  background:transparent;border:none;outline:none;resize:none;
  font:14px/1.55 var(--font);color:var(--text);
}
.ed-ta::placeholder{color:var(--text-dim)}
.ed-foot{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;padding-top:8px;
  border-top:1px solid var(--line);gap:8px;
}
.ed-cnt{font-size:11px;color:var(--text-3);font-family:var(--mono);font-variant-numeric:tabular-nums}
.ed-acts{display:flex;gap:4px}

/* ============ BUTTONS (flat utilitarian) ============ */
.btn{
  padding:6px 10px;border-radius:var(--r-xs);
  font-size:12px;font-weight:500;
  display:inline-flex;align-items:center;gap:4px;
  transition:background .12s var(--ease),border-color .12s var(--ease);
  border:1px solid var(--line);background:transparent;color:var(--text-2);
  white-space:nowrap;font-family:var(--font);
}
.btn:hover{background:var(--surface-2);color:var(--text)}
.btn-p{background:var(--brand);color:white;border-color:transparent}
.btn-p:hover{background:var(--brand);filter:brightness(1.08);color:white}
.btn-d{color:var(--danger)}
.btn-d:hover{background:rgba(239,68,68,.08);color:var(--danger)}

/* ============ SEGMENTS ============ */
.seg{
  display:flex;gap:2px;margin:8px 12px 0;
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-sm);flex-shrink:0;padding:2px;
}
.seg-b{
  flex:1;padding:6px 4px;border-radius:6px;
  font-size:12px;font-weight:500;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:background .15s var(--ease),color .15s var(--ease);
  min-width:0;
}
.seg-b.on{background:var(--surface-2);color:var(--text)}
.seg-b .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seg-b .cnt{
  font-size:10px;padding:1px 5px;border-radius:9px;
  background:var(--surface-3);font-family:var(--mono);
  font-variant-numeric:tabular-nums;font-weight:600;
  flex-shrink:0;min-width:14px;text-align:center;
}
.seg-b.on[data-k="local"] .cnt{background:var(--brand-glow);color:var(--brand)}
.seg-b.on[data-k="world"] .cnt{background:var(--world-glow);color:var(--world)}
.seg-b.on[data-k="seren"] .cnt{background:var(--seren-glow);color:var(--seren)}

/* ============ FEED (vertical scroll, no tinder) ============ */
.feed{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 12px 80px;
  display:flex;flex-direction:column;gap:8px;
  min-height:0;
}
.feed-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 20px;color:var(--text-3);
  min-height:200px;flex:1;
}
.feed-empty-ic{
  font-size:32px;margin-bottom:12px;opacity:.4;
  width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);border-radius:12px;
}
.feed-empty-t{font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.feed-empty-d{font-size:12px;max-width:280px;line-height:1.45}

/* ============ FEED ITEM (simple row) ============ */
.fi{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:10px 12px;
  display:flex;flex-direction:column;gap:8px;
  width:100%;flex-shrink:0;
}
.fi-h{
  display:flex;justify-content:space-between;align-items:center;
  gap:8px;font-size:11px;
}
.fi-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:4px;
  font-size:10px;font-weight:600;letter-spacing:.03em;
  background:var(--surface-2);color:var(--text-3);
  border:1px solid var(--line);
  text-transform:uppercase;
}
.fi.t-local .fi-badge{color:var(--brand);border-color:var(--brand-glow)}
.fi.t-world .fi-badge{color:var(--world);border-color:var(--world-glow)}
.fi.t-seren .fi-badge{color:var(--seren);border-color:var(--seren-glow)}
.fi-score{font-family:var(--mono);color:var(--text-3);font-variant-numeric:tabular-nums}
.fi-body{
  font-size:14px;line-height:1.55;color:var(--text);
  white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere;
  max-height:none;
}
.fi-body mark{
  background:var(--brand-glow);color:var(--brand);
  padding:0 2px;border-radius:2px;font-weight:600;
}
.fi-foot{
  display:flex;gap:4px;flex-wrap:wrap;
  padding-top:6px;border-top:1px solid var(--line);
}
.fi-act{
  padding:4px 8px;border-radius:4px;
  font-size:11px;font-weight:500;color:var(--text-3);
  transition:background .12s var(--ease),color .12s var(--ease);
  border:1px solid transparent;
}
.fi-act:hover{background:var(--surface-2);color:var(--text);border-color:var(--line)}
.fi-act.danger:hover{background:rgba(239,68,68,.08);color:var(--danger)}
.fi-act.primary{color:var(--brand)}
.fi-act.primary:hover{background:var(--brand-glow)}

/* ============ BASE VIEW ============ */
.base{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.base-h{padding:10px 12px 0;flex-shrink:0}
.base-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.stat{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:8px;text-align:center;
  min-width:0;
}
.stat-v{font-size:18px;font-weight:700;font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--text)}
.stat-l{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.base-ctrls{display:flex;gap:6px;align-items:center}
.base-search{
  flex:1;min-width:0;
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:7px 10px;
  font:13px var(--font);color:var(--text);outline:none;
  transition:border-color .15s var(--ease);
}
.base-search:focus{border-color:var(--brand)}
.base-search::placeholder{color:var(--text-dim)}
.base-sort{
  flex:0 0 auto;min-width:0;max-width:130px;
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:7px 26px 7px 10px;
  font:12px var(--font);color:var(--text-2);outline:none;
  cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath fill='none' stroke='%23888' stroke-width='1.5' stroke-linecap='round' d='M1 1l4 4 4-4'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 8px center;
}
.base-sort option{background:var(--surface);color:var(--text)}
.base-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 12px 80px;
  display:flex;flex-direction:column;gap:6px;
  min-height:0;width:100%;
}
.bi{
  width:100%;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:10px 12px;
  flex-shrink:0;min-height:60px;
  display:flex;flex-direction:column;gap:6px;
}
.bi-t{
  font-size:13px;line-height:1.5;color:var(--text);
  white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere;
}
.bi-f{
  display:flex;justify-content:space-between;align-items:center;
  gap:6px;flex-wrap:wrap;font-size:11px;
  padding-top:6px;border-top:1px solid var(--line);
}
.bi-meta{display:flex;align-items:center;gap:6px;color:var(--text-3);flex-wrap:wrap}
.bi-tag{
  padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;
  background:var(--brand-glow);color:var(--brand);
  text-transform:uppercase;letter-spacing:.03em;
}
.bi.shared .bi-tag{background:var(--world-glow);color:var(--world)}
.bi-date{font-family:var(--mono);font-variant-numeric:tabular-nums}
.bi-acts{display:flex;gap:2px;flex-shrink:0}
.bi-act{
  padding:4px 7px;border-radius:4px;
  font-size:11px;font-weight:500;color:var(--text-3);
  transition:background .12s var(--ease),color .12s var(--ease);
}
.bi-act:hover{background:var(--surface-2);color:var(--text)}
.bi-act.danger:hover{background:rgba(239,68,68,.08);color:var(--danger)}

/* ============ BOTTOM TABS (compact flat) ============ */
.btab{
  position:fixed;left:0;right:0;bottom:0;
  display:flex;background:var(--surface);
  border-top:1px solid var(--line);
  padding:6px 6px;
  padding-bottom:calc(6px + var(--safe-bot));
  z-index:50;
}
.btab-b{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:7px 8px;color:var(--text-3);
  font-size:12px;font-weight:500;
  border-radius:var(--r-sm);
  transition:background .15s var(--ease),color .15s var(--ease);
}
.btab-b.on{background:var(--surface-2);color:var(--text)}
.btab-ic{font-size:14px}

/* ============ MODAL (drawer from right on mobile, centered on desktop) ============ */
.mo{
  position:fixed;inset:0;
  background:rgba(0,0,0,.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:none;z-index:1000;
}
.mo.on{display:block}
.md{
  position:absolute;top:0;right:0;bottom:0;
  width:min(380px,100%);
  background:var(--surface);border-left:1px solid var(--line);
  display:flex;flex-direction:column;
  animation:slideIn .25s var(--ease);
}
@keyframes slideIn{from{transform:translateX(100%)}}
.md-h{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;padding-top:calc(14px + var(--safe-top));
  border-bottom:1px solid var(--line);flex-shrink:0;
}
.md-t{font-size:15px;font-weight:600;letter-spacing:-.01em}
.md-x{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--text-3);transition:background .12s var(--ease);
}
.md-x:hover{background:var(--surface-2);color:var(--text)}
.md-b{
  flex:1;overflow-y:auto;padding:14px 16px;
  padding-bottom:calc(14px + var(--safe-bot));
}
.md-f{
  display:flex;justify-content:flex-end;gap:6px;
  padding:12px 16px;border-top:1px solid var(--line);flex-shrink:0;
}

@media (min-width:768px){
  .md{
    position:relative;top:auto;right:auto;bottom:auto;
    width:min(480px,calc(100vw - 32px));max-height:85vh;
    border-radius:var(--r);border:1px solid var(--line);
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    margin:auto;
    animation:fadeScale .22s var(--ease);
  }
  .mo{display:none;align-items:center;justify-content:center;padding:16px}
  .mo.on{display:flex}
  @keyframes fadeScale{from{opacity:0;transform:scale(.96)}}
}

/* ============ FORMS ============ */
.fg{margin-bottom:14px}
.fl{
  display:block;font-size:10px;font-weight:600;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;
}
.fi-input,.fi-select{
  width:100%;background:var(--surface-2);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:8px 10px;
  font:13px var(--font);color:var(--text);outline:none;
  transition:border-color .15s var(--ease);
}
.fi-input:focus,.fi-select:focus{border-color:var(--brand)}
.fi-input::placeholder{color:var(--text-dim)}
.fi-textarea{
  width:100%;min-height:80px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:8px 10px;
  font:12px var(--mono);color:var(--text);outline:none;resize:vertical;
  transition:border-color .15s var(--ease);
}
.fi-textarea:focus{border-color:var(--brand)}
.fh{font-size:10px;color:var(--text-3);margin-top:4px;line-height:1.4}
.fr{
  width:100%;height:3px;border-radius:2px;
  background:var(--surface-2);outline:none;
  -webkit-appearance:none;appearance:none;cursor:pointer;
}
.fr::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--brand);cursor:pointer;
  border:2px solid var(--surface);
}
.fr::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;background:var(--brand);
  cursor:pointer;border:2px solid var(--surface);
}
.rv{float:right;font-size:12px;font-weight:600;color:var(--brand);font-family:var(--mono)}

/* ============ SETTINGS SECTIONS ============ */
.set-sec{
  margin-bottom:16px;padding-bottom:16px;
  border-bottom:1px solid var(--line);
}
.set-sec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.set-sec-t{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.row-2{display:flex;gap:6px}
.row-2 > *{flex:1;min-width:0}

/* ============ TOGGLE ============ */
.tog{
  display:flex;align-items:center;gap:8px;
  padding:8px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:var(--r-sm);
  cursor:pointer;transition:background .12s var(--ease);
}
.tog:hover{background:var(--surface-3)}
.tog-ic{font-size:14px}
.tog-lbl{flex:1;font-size:12px;font-weight:500;color:var(--text)}
.tog-track{
  position:relative;width:28px;height:16px;
  background:var(--surface-3);border-radius:8px;
  transition:background .15s var(--ease);
}
.tog-thumb{
  position:absolute;top:2px;left:2px;
  width:12px;height:12px;border-radius:50%;
  background:var(--text-3);
  transition:left .15s var(--ease),background .15s var(--ease);
}
.tog.on .tog-track{background:var(--brand-glow)}
.tog.on .tog-thumb{left:14px;background:var(--brand)}

/* ============ LANG SWITCH ============ */
.lang-sw{display:flex;gap:2px;background:var(--surface-2);padding:2px;border-radius:var(--r-sm);border:1px solid var(--line)}
.lang-sw-b{
  flex:1;padding:5px 8px;border-radius:6px;
  font-size:11px;font-weight:600;color:var(--text-3);
  transition:background .12s var(--ease),color .12s var(--ease);
  font-family:var(--mono);
}
.lang-sw-b.on{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.1)}

/* ============ TOAST (compact, bottom) ============ */
.tc{
  position:fixed;left:50%;bottom:calc(60px + var(--safe-bot));
  transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column-reverse;gap:4px;
  pointer-events:none;max-width:calc(100vw - 24px);width:max-content;
}
.tt{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:6px 10px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text);
  animation:ttIn .2s var(--ease);
  pointer-events:auto;white-space:nowrap;
}

function Module(ctx){

  function sn(){return cfg.get("storeName","notes");}
  function open(){
    return new Promise(function(res,rej){
      if(db)return res(db);

        var req=indexedDB.open(dn(),1);

        req.onblocked=function(){mem=new Map();res(null);};
      }catch(err){if(log)log.warn("IDB unsupported",String(err));mem=new Map();res(null);}
    });
  }
  function tx(mode,fn){
    return open().then(function(d){
      return new Promise(function(res,rej){
        try{
          if(!d){
            var s={
              get:function(k){return{result:mem.get(k),onsuccess:function(cb){cb&&cb();},onerror:function(cb){cb&&cb();}};},
              put:function(v){mem.set(v.id,v);return{onsuccess:function(cb){cb&&cb();},onerror:function(cb){cb&&cb();}};},
              delete:function(k){mem.delete(k);return{onsuccess:function(cb){cb&&cb();},onerror:function(cb){cb&&cb();}};},
              getAll:function(){return{result:Array.from(mem.values()),onsuccess:function(cb){cb&&cb();},onerror:function(cb){cb&&cb();}};}};

          }

    });
  }

    put:function(n){return tx("readwrite",function(s){return s.put(n);});},
    get:function(id){return tx("readonly",function(s){return s.get(id);});},
    del:function(id){return tx("readwrite",function(s){return s.delete(id);});},
    all:function(){return tx("readonly",function(s){return s.getAll();});},

function Module(ctx){

      if(mod.env){mod.env.allowLocalModels=false;mod.env.useBrowserCache=true;}

    ready:function(){return ext!==null||mode==="demo";},
    getMode:function(){return mode;},
    onProgress:function(fn){if(typeof fn==="function")progFns.push(fn);},

/* FIXED: Rate-limit backoff per relay, batching, maxAnswersPerQuery, global publish throttle.

  function notifyPeers(){
    var n=peers.size;
    for(var i=0;i<peerLs.length;i++)try{peerLs[i](n);}catch(_){}
    if(bus&&bus.emit)try{bus.emit("net:peers",{count:n});}catch(_){}
  }
  function valid(ev){
    if(!ev||typeof ev!=="object")return false;
    if(typeof ev.id!=="string"||ev.id.length!==64)return false;
    if(typeof ev.pubkey!=="string"||ev.pubkey.length!==64)return false;
    if(typeof ev.kind!=="number")return false;
    if(!Array.isArray(ev.tags))return false;
    return true;
  }
  function isDup(ev){

  // Smart publish with rate-limit backoff per relay
  function safePublish(ev){
    var relays=cfg.get("relays",[]);
    var now=Date.now();
    var good=[];
    for(var i=0;i<relays.length;i++){
      var until=rateLimitedUntil.get(relays[i])||0;
      if(until<=now)good.push(relays[i]);
    }
    if(good.length===0){
      if(log)log.warn("All relays rate-limited, skipping publish");
      return Promise.resolve();
    }
    // publish returns a Map<relay, Promise>, swallow per-relay rejections
    try{
      var pubs=pool.publish(good,ev);
      if(pubs&&pubs.forEach){
        pubs.forEach(function(p,relay){

            for(var j=0;j<answers.length;j++)if(answers[j].id===ev.id){isDupAns=true;break;}
            if(!isDupAns){
              answers.push({id:ev.id,text:d.text,vector:d.vector,peer:ev.pubkey.slice(0,6),fullPubkey:ev.pubkey,createdAt:Date.now()});
              if(typeof onUpdate==="function")try{onUpdate();}catch(_){}
            }
          }
        }
      }
    }catch(err){if(log)log.warn("onEvent",String(err&&err.message||err));}
  }
  function startHB(){
    if(hbTimer)clearInterval(hbTimer);
    var hb=cfg.get("heartbeat",30000),ttl=cfg.get("peerTTL",60000);
    hbTimer=setInterval(function(){
      var now=Date.now(),rem=0;
      peers.forEach(function(ts,pkk){if(now-ts>ttl){peers.delete(pkk);rem++;}});
      if(rem>0){notifyPeers();if(typeof onUpdate==="function")try{onUpdate();}catch(_){}}
      var cut=now-300000;
      for(var i=answers.length-1;i>=0;i--)if(!peers.has(answers[i].fullPubkey)||answers[i].createdAt<cut)answers.splice(i,1);
    },hb);
  }
  return{
    onPeers:function(fn){if(typeof fn==="function")peerLs.push(fn);},
    init:function(cb){
      if(started)return Promise.resolve();
      onUpdate=cb;
      return Promise.resolve().then(function(){return import("https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm");}).then(function(mod){
        nostr=mod;
        var KEY="noomium:sk",kh=null;
        try{kh=localStorage.getItem(KEY);}catch(_){}
        if(!kh){var raw=mod.generateSecretKey();kh=Array.from(raw).map(function(b){return b.toString(16).padStart(2,"0");}).join("");try{localStorage.setItem(KEY,kh);}catch(_){}}
        sk=new Uint8Array(kh.match(/.{1,2}/g).map(function(b){return parseInt(b,16);}));
        pk=mod.getPublicKey(sk);
        pool=new mod.SimplePool();
        var now=Math.floor(Date.now()/1000),room=cfg.get("room","noomium-main"),KQ=cfg.get("kQuery",21000),KA=cfg.get("kAnswer",21001),sw=cfg.get("subWindow",300);
        try{
          sub=pool.subscribeMany(cfg.get("relays",[]),[{kinds:[KQ,KA],"#t":[room],since:now-sw}],{onevent:onEvent});
        }catch(e){if(log)log.warn("sub fail",String(e));}
        started=true;startHB();notifyPeers();if(log)log.info("net started, room="+room);
      }).catch(function(err){if(log)log.error("nostr load fail",String(err&&err.message||err));throw err;});
    },
    send:function(vector){
      if(!pool||!nostr||AI.getMode()==="demo")return;
      var now=Date.now(),rate=cfg.get("queryRateLimit",3000);
      if(now-lastQ<rate)return;
      lastQ=now;answers.length=0;
      try{
        var ev=nostr.finalizeEvent({kind:cfg.get("kQuery",21000),created_at:Math.floor(Date.now()/1000),tags:[["t",cfg.get("room","noomium-main")]],content:JSON.stringify({vector:vector})},sk);
        queryId=ev.id;safePublish(ev);
        if(typeof onUpdate==="function")try{onUpdate();}catch(_){}
      }catch(e){if(log)log.warn("pub fail",String(e));}
    },
    activeAnswers:function(){var out=[];for(var i=0;i<answers.length;i++)if(peers.has(answers[i].fullPubkey))out.push(answers[i]);return out;},
    peerCount:function(){return peers.size;},
    stop:function(){
      if(hbTimer){clearInterval(hbTimer);hbTimer=null;}
      if(sub&&typeof sub.close==="function")try{sub.close();}catch(_){}
      if(pool&&typeof pool.close==="function")try{pool.close();}catch(_){}
      started=false;sub=null;pool=null;
      seen.clear();rateLimitedUntil.clear();
    },
    restart:function(cb){this.stop();onUpdate=cb;return this.init(cb);}
  };
}
</script>

  // ====== EDITOR SWIPE ======
  function bindEditorSwipe(){
    var ta=document.getElementById("ed-ta");if(!ta)return;
    var startY=0,startX=0,startTime=0,active=false;
    ta.addEventListener("touchstart",function(e){
      if(e.touches.length>1)return;
      startY=e.touches[0].clientY;startX=e.touches[0].clientX;
      startTime=Date.now();active=true;
    },{passive:true});
    ta.addEventListener("touchend",function(e){
      if(!active)return;active=false;
      var dt=Date.now()-startTime;
      var endY=e.changedTouches[0].clientY,endX=e.changedTouches[0].clientX;
      var dy=endY-startY,dx=endX-startX;
      if(dt<700&&Math.abs(dy)>60&&Math.abs(dy)>Math.abs(dx)*1.5){
        if(dy<0)handleSave(true);else handleSave(false);
      }
    },{passive:true});
  }

  function executeSearch(force){
    var ta=document.getElementById("ed-ta");if(!ta)return Promise.resolve();
    var text=ta.value;
    if(!text||!AI.ready()){
      lists={local:[],world:[],seren:[]};
      updateCounts();renderFeed();
      return Promise.resolve();
    }
    return AI.embed(text).then(function(vec){
      if(!vec)return;
      if(!lastVec||AI.cosine(vec,lastVec)<0.98||force){
        lastVec=vec;lastQ=Date.now();
        if(AI.getMode()==="model")Net.send(vec);
      }
      return DB.all().then(function(notes){
        var localScored=[];
        for(var i=0;i<notes.length;i++){var n=notes[i];if(n&&n.vector)localScored.push(Object.assign({},n,{score:AI.cosine(vec,n.vector)}));}
        var worldAns=Net.activeAnswers(),worldScored=[];
        for(var i=0;i<worldAns.length;i++)worldScored.push(Object.assign({},worldAns[i],{score:AI.cosine(vec,worldAns[i].vector)}));
        var TH=cfg.get("threshold",0.30),SD=cfg.get("serendipity",0.15);
        lists.local=localScored.filter(function(n){return n.score>=TH;}).sort(function(a,b){return b.score-a.score;});
        lists.world=worldScored.filter(function(n){return n.score>=TH;}).sort(function(a,b){return b.score-a.score;});
        lists.seren=localScored.concat(worldScored).filter(function(n){return n.score>=(TH-SD)&&n.score<TH;}).sort(function(a,b){return b.score-a.score;});
        updateCounts();renderFeed();
      });
    });
  }

    ["local","world","seren"].forEach(function(k){

  function handleSave(shared){

  function seedSamples(){
    if(!AI.ready()){toast(T("toast.ai.notready"),"err");return Promise.resolve();}
    toast(T("toast.samples.done").replace("{n}","0"),"info");
    var notes=[];
    function step(i){
      if(i>=SAMPLES.length){
        return DB.bulkPut(notes).then(function(){toast(T("toast.samples.done").replace("{n}",String(notes.length)),"ok");executeSearch();if(view==="base")renderBase();});
      }
      return AI.embed(SAMPLES[i]).then(function(v){
        notes.push({id:"s"+Math.random().toString(36).slice(2,10),text:SAMPLES[i],vector:v,shared:true,createdAt:Date.now()-Math.floor(Math.random()*1e7)});
        return step(i+1);
      });
    }
    return step(0);
  }

  function exportData(){
    DB.all().then(function(notes){
      if(!notes||notes.length===0){toast("0","err");return;}
      var capsule={app:"noomium",format:"v1",version:1,exportedAt:Date.now(),notes:notes};
      var blob=new Blob([JSON.stringify(capsule,null,2)],{type:"application/json"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url;a.download="noomium-"+new Date().toISOString().slice(0,10)+".json";
      document.body.appendChild(a);a.click();URL.revokeObjectURL(url);a.remove();
      toast("✓ "+notes.length,"ok");
    });
  }

  function importData(){
    var inp=document.createElement("input");inp.type="file";inp.accept="application/json,.json";
    inp.onchange=function(){
      var f=inp.files&&inp.files[0];if(!f)return;
      var r=new FileReader();
      r.onload=function(){
        try{
          var data=JSON.parse(String(r.result||"{}"));
          var notes=Array.isArray(data)?data:(data.notes||[]);
          if(!Array.isArray(notes))throw new Error("bad");
          var clean=[];
          for(var i=0;i<notes.length;i++){
            var n=notes[i];
            if(!n||typeof n.text!=="string"||!n.text.trim())continue;
            clean.push({
              id:n.id||("i"+Math.random().toString(36).slice(2,10)),
              text:n.text.trim(),
              vector:Array.isArray(n.vector)?n.vector:null,
              shared:!!n.shared,
              createdAt:typeof n.createdAt==="number"?n.createdAt:Date.now()
            });
          }
          DB.bulkPut(clean).then(function(){toast("✓ "+clean.length,"ok");if(view==="base")renderBase();executeSearch();});
        }catch(e){toast("err","err");}
      };
      r.readAsText(f);
    };
    inp.click();
  }

      '<div class="help-keys"><div>'+T("help.k1")+'</div><div>'+T("help.k2")+'</div><div>'+T("help.k3")+'</div></div></div>';

  }

  function bind(){
    var ta=document.getElementById("ed-ta");
    if(ta){
      ta.addEventListener("input",function(){
        updateCounter();
        if(sTimer)clearTimeout(sTimer);
        sTimer=setTimeout(function(){executeSearch();},cfg.get("debounce",800));
      });
    }
    var bp=document.getElementById("btn-priv");if(bp)bp.onclick=function(){handleSave(false);};
    var bpub=document.getElementById("btn-pub");if(bpub)bpub.onclick=function(){handleSave(true);};
    document.querySelectorAll(".seg-b").forEach(function(b){b.onclick=function(){setSeg(b.getAttribute("data-k"));};});
    document.querySelectorAll(".btab-b").forEach(function(b){b.onclick=function(){switchView(b.getAttribute("data-v"));};});

    var feed=document.getElementById("feed");
    if(feed)feed.addEventListener("click",function(e){var el=e.target.closest("[data-act]");if(el)handleItemAction(el.getAttribute("data-act"),el);});
    var wb=document.getElementById("ws-base");
    if(wb)wb.addEventListener("click",function(e){var el=e.target.closest("[data-act]");if(el)handleBaseAction(el.getAttribute("data-act"),el.getAttribute("data-id"));});

    var bq=document.getElementById("base-q");
    if(bq){var bTimer=null;bq.addEventListener("input",function(){if(bTimer)clearTimeout(bTimer);bTimer=setTimeout(renderBase,200);});}
    var bs=document.getElementById("base-sort");if(bs)bs.onchange=renderBase;

    var bmenu=document.getElementById("btn-menu");if(bmenu)bmenu.onclick=openMenu;

    document.addEventListener("keydown",function(e){
      if(e.key==="Escape")Modal.close();
      if(e.key==="/"&&document.activeElement&&document.activeElement!==ta){e.preventDefault();if(ta)ta.focus();}
      if((e.ctrlKey||e.metaKey)&&e.key==="Enter"&&document.activeElement===ta){e.preventDefault();handleSave(e.shiftKey);}
    });

    AI.onProgress(function(p){
      setSt("ai",T("st.ai.loading")+" "+Math.round(p)+"%","load");
      Prog.update(p);
    });
    Net.onPeers(function(n){
      setSt("net",n>0?T("st.net.online")+" · "+U.word("peers",n,I18n.getLang()):T("st.net.listen"),n>0?"ok":"load");
      if(view==="stream")executeSearch();
    });

    bindEditorSwipe();
  }

  function boot(){
    setSt("net",T("st.net"),"load");
    setSt("ai",T("st.ai.loading"),"load");
    Prog.show();
    AI.load().then(function(){
      Prog.hide();
      setSt("ai",AI.getMode()==="model"?T("st.ai.ready"):T("st.ai.demo"),AI.getMode()==="model"?"ok":"warn");
      if(!cfg.get("onboarded",false)){
        setTimeout(function(){
          seedSamples();
          cfg.set("onboarded",true);cfg.save();
        },300);
      }
    }).catch(function(e){
      Prog.hide();
      if(log)log.error("AI",String(e&&e.message||e));
      setSt("ai",T("st.ai.demo"),"warn");
    });
    Net.init(function(){executeSearch();}).then(function(){
      setSt("net",Net.peerCount()>0?T("st.net.online")+" · "+U.word("peers",Net.peerCount(),I18n.getLang()):T("st.net.listen"),Net.peerCount()>0?"ok":"load");
    }).catch(function(e){
      if(log)log.error("Net",String(e&&e.message||e));
      setSt("net",T("st.net"),"err");
    });
  }

  function setVH(){document.documentElement.style.setProperty("--vh",window.innerHeight*0.01+"px");}
  window.addEventListener("resize",setVH);
  window.addEventListener("orientationchange",function(){setTimeout(setVH,100);});
  setVH();

  applyTheme(cfg.get("theme","dark"));

  function mount(){
    Host.mount();
    var r=document.getElementById("app-root");if(!r)return;
    r.innerHTML=markup();
    bind();
    boot();
    if(log)log.info("App.NOOmium mounted");
  }
  return{mount:mount};
}
</script>
