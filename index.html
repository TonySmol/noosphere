<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformers.js в 1 файл (Финальное решение)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold;}
        button:hover { background: #0056b3; }
        #status { margin: 20px 0; font-weight: bold; color: #333; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 14px; border: 1px solid #ddd; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>Эмбеддинги в один HTML-файл</h2>
    <p>Решение через ES-модули на зеркале UNPKG. Никаких конфликтов имён.</p>
    
    <button id="run-btn">Сгенерировать вектор</button>
    <div id="status">Статус: Ожидание нажатия кнопки...</div>
    <pre id="output">Результат появится здесь...</pre>

    <!-- Используем type="module", браузер сам поймет импорт без глобальных переменных -->
    <script type="module">
        // Импортируем напрямую через unpkg — это зеркало открывается без туннельных ошибок
        import { pipeline, env } from 'https://unpkg.com';

        // Настраиваем окружение: качаем напрямую с серверов Hugging Face
        env.allowRemoteModels = true; 
        env.allowLocalModels = false;

        const runBtn = document.getElementById('run-btn');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');

        runBtn.addEventListener('click', async () => {
            statusDiv.innerText = "Статус: Подключение к Hugging Face и скачивание модели... (~90МБ, подождите)";
            statusDiv.style.color = "orange";
            outputDiv.innerText = "";

            try {
                // Запускаем через CPU (wasm) для максимальной совместимости на любых ПК/смартфонах
                const extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                    device: 'wasm'
                });

                statusDiv.innerText = "Статус: Модель успешно загружена. Считаем эмбеддинг...";
                
                const result = await extractor('Тестовый текст для проверки работы нейросети', { 
                    pooling: 'mean', 
                    normalize: true 
                });

                statusDiv.innerText = "Статус: Успешно выполнено!";
                statusDiv.style.color = "green";

                const vector = Array.from(result.data);
                outputDiv.innerText = `Размерность вектора: ${vector.length} измерений.\n\nПервые 10 значений:\n${JSON.stringify(vector.slice(0, 10), null, 2)}`;

            } catch (error) {
                statusDiv.innerText = "Статус: Ошибка!";
                statusDiv.style.color = "red";
                outputDiv.innerText = `Критическое исключение: ${error.message}\n\nЕсли скачивание оборвалось, попробуйте обновить страницу.`;
                console.error(error);
            }
        });
    </script>
</body>
</html>
