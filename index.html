<head>

<title>Noosphere</title>
<style id="LOOM_CSS">
/* ========================================================== */
/* LOOM ENGINE CSS (завод)                                     */
/* ========================================================== */
:root{
  --bg:#0b0f14;--panel:#111827;--text:#f8fbff;--muted:#99a7bf;--br:#1f2a44;--acc:#60a5fa;
  --ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--focus:#60a5fa80;
  --top-bg:linear-gradient(180deg,#0d1220,#0a0f1c);--item-bg:#0f172a;
  --btn-bg:#18233a;--btn-text:#f8fbff;--btn-br:#223156;
  --btn-bg-hover:#1c2a49;--btn-bg-active:#1a2744;
  --btn-pr-bg:#60a5fa;--btn-pr-text:#0a0f1a;--btn-pr-br:#7fb5ff;
  --btn-pr-hover:#73b2ff;--btn-pr-active:#5aa1ee;
  --btn-d-bg:#1f1320;--btn-d-text:#ffdfe4;--btn-d-br:#3a1d29;
  --btn-d-hover:#2a0f15;--btn-d-active:#3a151c;
  --btn-g-bg:transparent;--btn-g-text:#f8fbff;--btn-g-br:#223156;
  --btn-g-hover:#1c2a49;
  --tab-active-bg:#0a1228;--tab-active-br:#203061;
  --code-bg:#09122a;--code-br:#14224a;--code-fg:#dbeafe;
  --menu-hover-bg:#0d1b3f;
  --left:320px;--topH:52px;--sbH:48px;
  --modRow:48px;--modGap:6px;
  /* NOOmium tokens */
  --brand:#7c5cff;--brand-glow:rgba(124,92,255,.2);
  --world:#0ea5e9;--world-glow:rgba(14,165,233,.2);
  --seren:#4ade80;--seren-glow:rgba(74,222,128,.2);
  --noo-radius:12px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;background:var(--bg);color:var(--text);
  font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Helvetica,Arial;
  overflow-y:auto;
}
a{color:var(--acc);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px}

.top{
  position:sticky;top:0;z-index:20;
  display:flex;flex-wrap:wrap;row-gap:6px;gap:8px;align-items:center;
  padding:10px 14px;min-height:var(--topH);
  border-bottom:1px solid var(--br);background:var(--top-bg)
}
.brand{font-weight:700;font-size:16px;color:var(--acc)}
.muted{color:var(--muted);font-size:12px}
.sp{flex:1}
.top .btn{min-height:36px}
@media (max-width:760px){.top .btn{padding:6px 8px;font-size:12px}}

.btn{
  background:var(--btn-bg);color:var(--btn-text);
  border:1px solid var(--btn-br);padding:8px 12px;border-radius:8px;
  cursor:pointer;font-size:13px;font-family:inherit;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.btn:hover{background:var(--btn-bg-hover)}
.btn:active{background:var(--btn-bg-active);color:var(--btn-text)}
.btn[disabled],.btn:disabled{opacity:.6;cursor:not-allowed}
.btn.p{background:var(--btn-pr-bg);color:var(--btn-pr-text);border-color:var(--btn-pr-br)}
.btn.p:hover{background:var(--btn-pr-hover)}
.btn.p:active{background:var(--btn-pr-active);color:var(--btn-pr-text)}
.btn.danger{background:var(--btn-d-bg);color:var(--btn-d-text);border-color:var(--btn-d-br)}
.btn.danger:hover{background:var(--btn-d-hover)}
.btn.danger:active{background:var(--btn-d-active);color:var(--btn-d-text)}
.btn.ghost{background:var(--btn-g-bg);color:var(--btn-g-text);border-color:var(--btn-g-br)}
.btn.ghost:hover{background:var(--btn-g-hover)}

.grid{display:grid;grid-template-columns:var(--left) 1fr;gap:12px;padding:12px;height:calc(100vh - var(--topH) - var(--sbH) - 24px);overflow:hidden}
.panel{background:var(--panel);border:1px solid var(--br);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;height:100%}
.panel>header{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--br);position:sticky;top:0;background:var(--panel);z-index:2}
.body{padding:12px}
.panel .body{flex:1 1 auto;overflow:auto;max-height:none}
.panel:not(.sidebar) > .body{display:flex;flex-direction:column;overflow:hidden}
.panel:not(.sidebar) > .body .code{flex:1 1 auto;overflow:auto}
.panel:not(.sidebar) > .body .ta{flex:1 1 auto;height:auto}

.tabs{display:flex;gap:6px;margin:8px 10px 0}
.tab{padding:8px 12px;border:1px solid var(--br);border-radius:8px;color:var(--muted);cursor:pointer;user-select:none;background:transparent}
.tab.a{color:var(--text);background:var(--tab-active-bg);border-color:var(--tab-active-br)}

.list{display:flex;flex-direction:column;gap:6px}
.item{position:relative;display:flex;gap:8px;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--br);border-radius:10px;background:var(--item-bg);cursor:pointer;min-height:48px}
.item:hover{filter:brightness(1.05)}
.item.a{outline:none;box-shadow:inset 0 0 0 2px var(--acc)}
.item .title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.panel.sidebar .v-slice{gap:var(--modGap)!important}
.panel.sidebar .item{height:var(--modRow);min-height:var(--modRow);overflow:hidden}

.kv{display:grid;grid-template-columns:160px 1fr;gap:8px;margin:6px 0;align-items:center}
.code{background:var(--code-bg);border:1px solid var(--code-br);border-radius:10px;padding:10px;white-space:pre;overflow:auto;font:12px/1.45 ui-monospace,Consolas,Menlo,monospace;color:var(--code-fg)}
.ta{width:100%;height:320px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.input,select{background:var(--btn-bg);color:var(--text);border:1px solid var(--br);border-radius:8px;padding:8px 10px;font-family:inherit}
.input::placeholder{color:var(--muted)}
.ok{color:var(--ok)}.warn{color:var(--warn)}.err{color:var(--err)}
.detail{margin-top:12px;padding:10px;border:1px solid var(--br);border-radius:10px;background:var(--item-bg)}
.badge{display:inline-block;padding:2px 6px;border:1px solid var(--btn-br);border-radius:6px;color:var(--muted);font-size:12px}
.note{color:var(--muted);font-size:12px;margin-top:6px}
.lbl{color:var(--muted)}
.statusbar{padding:8px 12px;border-top:1px solid var(--br);color:var(--muted);display:flex;gap:8px;align-items:center;justify-content:space-between}

.show-app #loom-root{display:none}
#app-root{margin:0;display:none}
.show-app #app-root{display:block}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{border:1px solid var(--btn-br);border-radius:999px;padding:6px 10px;cursor:pointer;color:var(--muted);background:transparent}
.chip.a{background:var(--btn-pr-bg);color:var(--btn-pr-text);border-color:var(--btn-pr-br)}

.item .mwrap{position:relative}
.menu{position:absolute;right:0;top:36px;background:var(--panel);border:1px solid var(--br);border-radius:8px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:5;display:none}
.menu.a{display:block}
.menu .mi{padding:8px 10px;cursor:pointer;color:var(--text)}
.menu .mi:hover{background:var(--menu-hover-bg)}
.menu .mi.danger{color:var(--btn-d-text)}

.portal-menu{position:fixed;z-index:3000;display:inline-block;box-sizing:border-box;width:220px}
.portal-menu .mi{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.grid .panel.sidebar{height:100%}
.grid .panel.sidebar > .body{flex:1 1 auto;overflow:auto;overscroll-behavior:contain;scrollbar-gutter:stable both-edges}
.left-footer{flex:0 0 auto;border-top:1px solid var(--br);padding:10px 12px;background:var(--panel)}
.v-slice{display:flex;flex-direction:column;gap:14px}

.cp .hdr input{background:var(--btn-bg)!important;border:1px solid var(--br)!important;color:var(--text)!important}

.loom-toasts{position:fixed;top:auto;right:auto;left:50%;bottom:16px;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;align-items:center}
.loom-toast{background:var(--panel);border:1px solid var(--br);border-left:4px solid var(--acc);border-radius:10px;padding:10px 12px;box-shadow:0 6px 18px rgba(0,0,0,.3);color:var(--text);width:min(640px,calc(100vw - 32px))}
.loom-toast.success{border-left-color:var(--ok)}
.loom-toast.warn{border-left-color:var(--warn)}
.loom-toast.error{border-left-color:var(--err)}

@media (max-width:980px){
  .grid{grid-template-columns:1fr}
  .grid .panel.sidebar{height:auto !important}
  .panel.sidebar{position:fixed;left:0;top:var(--topH);bottom:0;width:min(88vw,360px);transform:translateX(-110%);transition:transform .2s ease;z-index:30}
  body.show-sidebar .panel.sidebar{transform:translateX(0)}
  .panel.sidebar > header{position:sticky;top:0;z-index:2}
  .panel.sidebar > .body{height:calc(100vh - var(--topH) - 52px);overflow:auto;padding-bottom:72px}
  .left-footer{position:sticky;bottom:0;background:var(--panel)}
  .sidebar-backdrop{display:none}
  body.show-sidebar .sidebar-backdrop{display:block;position:fixed;left:0;right:0;top:var(--topH);bottom:0;background:rgba(0,0,0,.5);z-index:25}
}
.top .top-actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.top .top-actions .btn{margin:0}

/* ========================================================== */
/* NOOmium CSS (изделие)                                        */
/* ========================================================== */

/* Status bar */
.noo-status-bar{
  display:flex;gap:8px;padding:8px 16px;
  background:var(--panel);border-bottom:1px solid var(--br);
  font-size:11px;flex-wrap:wrap;
}
.noo-badge-status{
  padding:4px 10px;border-radius:20px;
  background:var(--item-bg);border:1px solid var(--br);
  display:inline-flex;align-items:center;gap:6px;
  color:var(--muted);font-weight:500;transition:.3s;
}
.noo-badge-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.noo-badge-status.active{color:var(--world);border-color:var(--world-glow);background:var(--world-glow)}
.noo-badge-status.ready{color:var(--seren);border-color:var(--seren-glow)}
.noo-badge-status.warn{color:var(--warn);border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.12)}
.noo-badge-status.alone{color:var(--muted);border-color:var(--br)}
.noo-badge-status.busy .dot{animation:noo-pulse 1s infinite}
@keyframes noo-pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* Main tabs (Stream / Base) */
.noo-main-tabs{
  display:flex;background:var(--panel);
  border-bottom:1px solid var(--br);
}
.noo-tab{
  flex:1;text-align:center;padding:12px;
  color:var(--muted);font-weight:500;
  border-bottom:2px solid transparent;transition:.2s;
  display:flex;justify-content:center;align-items:center;gap:6px;
  cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;
  font-family:inherit;font-size:14px;
}
.noo-tab.active{color:var(--text);border-bottom-color:var(--brand)}
.noo-tab .noo-tab-count{
  font-size:10px;font-family:monospace;
  background:var(--item-bg);border:1px solid var(--br);
  padding:1px 6px;border-radius:10px;
}

/* Workspace */
.noo-workspace{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px;position:relative;scroll-behavior:smooth;
  min-height:calc(100vh - 200px);
}
.noo-view-layer{display:none;animation:noo-fade .2s ease-out}
.noo-view-layer.active{display:block}
@keyframes noo-fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* Editor */
.noo-editor-card{
  background:var(--panel);border:1px solid var(--br);
  border-radius:var(--noo-radius);padding:16px;
  margin-bottom:20px;box-shadow:0 4px 6px -1px rgba(0,0,0,.1);
}
.noo-editor-textarea{
  width:100%;min-height:84px;background:transparent;
  border:none;resize:vertical;outline:none;
  font-size:15px;line-height:1.55;color:inherit;font-family:inherit;
}
.noo-editor-textarea::placeholder{color:var(--muted)}
.noo-editor-meta{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:6px;font-size:11px;color:var(--muted);
}
.noo-editor-controls{display:flex;gap:8px;margin-top:14px}

/* Filter tabs (local / world / seren) */
.noo-filter-tabs{
  display:flex;gap:4px;background:var(--panel);
  padding:4px;border-radius:10px;border:1px solid var(--br);
  margin-bottom:16px;
}
.noo-f-tab{
  flex:1;padding:8px;text-align:center;border-radius:6px;
  font-size:12px;font-weight:600;color:var(--muted);transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;background:none;border:none;font-family:inherit;
}
.noo-f-tab.active{background:var(--item-bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.noo-f-tab .counter{
  background:var(--br);padding:2px 6px;border-radius:12px;
  font-size:10px;font-family:monospace;
}
.noo-f-tab.active[data-filter="local"] .counter{background:var(--brand-glow);color:var(--brand)}
.noo-f-tab.active[data-filter="world"] .counter{background:var(--world-glow);color:var(--world)}
.noo-f-tab.active[data-filter="seren"] .counter{background:var(--seren-glow);color:var(--seren)}

/* Node list */
.noo-node-list{display:none;flex-direction:column;gap:12px}
.noo-node-list.active{display:flex}

/* Note card */
.noo-note-card{
  background:var(--panel);border:1px solid var(--br);
  border-radius:var(--noo-radius);
  padding:14px 14px 14px 18px;
  position:relative;overflow:hidden;
  animation:noo-slideUp .3s ease-out backwards;
}
@keyframes noo-slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.noo-note-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.noo-note-card.t-local::before{background:var(--brand)}
.noo-note-card.t-world::before{background:var(--world)}
.noo-note-card.t-seren::before{background:var(--seren)}
.noo-note-card.t-seren{background:linear-gradient(90deg,rgba(74,222,128,.03),transparent 40%)}
.noo-note-card.peer{background:linear-gradient(180deg,var(--panel),var(--panel))}
.noo-note-header{
  display:flex;justify-content:space-between;
  margin-bottom:8px;align-items:center;gap:8px;
}
.noo-note-type{
  font-size:10px;font-weight:700;padding:2px 6px;
  border-radius:4px;letter-spacing:.5px;white-space:nowrap;
}
.t-local .noo-note-type{background:var(--brand-glow);color:var(--brand)}
.t-world .noo-note-type{background:var(--world-glow);color:var(--world)}
.t-seren .noo-note-type{background:var(--seren-glow);color:var(--seren)}
.noo-note-score{font-family:monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.noo-note-content{
  font-size:14px;white-space:pre-wrap;word-wrap:break-word;
  overflow-wrap:anywhere;line-height:1.55;
}
.noo-note-content mark{
  background:var(--brand-glow);color:var(--brand);
  padding:0 2px;border-radius:3px;font-weight:600;
}
.noo-note-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;gap:8px;flex-wrap:wrap;
}
.noo-note-hint{font-size:11px;color:var(--muted);font-style:italic;opacity:.8}
.noo-note-actions{
  display:flex;gap:4px;flex-wrap:wrap;
  opacity:.55;transition:.2s;margin-left:auto;
}
.noo-note-card:hover .noo-note-actions{opacity:1}
.noo-note-act{
  font-size:11px;font-weight:600;color:var(--muted);
  padding:4px 9px;border-radius:6px;
  border:1px solid var(--br);transition:.15s;
  display:inline-flex;align-items:center;gap:5px;
  white-space:nowrap;cursor:pointer;background:none;font-family:inherit;
}
.noo-note-act:hover{color:var(--text);border-color:var(--brand);background:var(--item-bg)}
.noo-note-act.danger:hover{color:var(--err);border-color:var(--err)}

/* Empty state */
.noo-empty-state{
  padding:40px 20px;text-align:center;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.noo-empty-state svg{width:48px;height:48px;opacity:.2}
.noo-empty-state .btn{flex:0}
.noo-spinner{
  width:28px;height:28px;
  border:3px solid var(--br);border-top-color:var(--world);
  border-radius:50%;animation:noo-spin .8s linear infinite;
}
@keyframes noo-spin{to{transform:rotate(360deg)}}

/* Base (history) stats */
.noo-base-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.noo-stat{
  background:var(--panel);border:1px solid var(--br);
  border-radius:10px;padding:8px 12px;flex:1;min-width:80px;
}
.noo-stat .num{font-size:18px;font-weight:700}
.noo-stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.noo-base-controls{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.noo-base-search{
  flex:1;background:var(--panel);border:1px solid var(--br);
  padding:9px 12px;border-radius:8px;transition:.2s;
  color:inherit;font-family:inherit;font-size:14px;
}
.noo-base-search:focus{border-color:var(--brand);outline:none}
.noo-base-sort{
  background:var(--panel);border:1px solid var(--br);
  padding:9px 10px;border-radius:8px;font-size:12px;
  color:inherit;font-family:inherit;
}
.noo-base-sort option{background:var(--panel);color:var(--text)}

/* Modal form fields (for settings) */
.form-group{margin-bottom:16px}
.form-label{
  display:block;font-size:11px;text-transform:uppercase;
  font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;
}
.val-display{
  float:right;font-family:monospace;color:var(--brand);
  font-weight:bold;font-size:12px;
}
.form-range{width:100%;accent-color:var(--brand)}

/* Scrollbar for cards */
.noo-note-content::-webkit-scrollbar{width:6px}
.noo-note-content::-webkit-scrollbar-thumb{background:var(--br);border-radius:6px}
</style>
</head>

      return new Promise(function(res, rej){

  var peerListeners = [];
  var started = false;
  function notifyPeers(){

    for (var i = 0; i < peerListeners.length; i++){

          var floor = cfg.get("threshold", 0.30) - cfg.get("serendipity", 0.15);

      }

        var eTag = null;
        for (var i = 0; i < ev.tags.length; i++){

        }
        if (eTag && eTag === queryId){
          var d;
          try { d = JSON.parse(ev.content); } catch(_){ return; }

                peer: ev.pubkey.slice(0, 6),

        }

        } catch(e){ if (log) log.warn("subscribe failed", String(e)); }

        startHeartbeat();

        throw err;
      });
    },
    send: function(vector){
      if (!pool || !nostrMod) return;
      var now = Date.now();

      if (now - lastQueryTime < rate) return;
      lastQueryTime = now;
      answers.length = 0;
      try {
        var ev = nostrMod.finalizeEvent({
          kind: cfg.get("kQuery", 21000),
          created_at: Math.floor(Date.now() / 1000),
          tags: [["t", cfg.get("room", "noosphere-core")]],
          content: JSON.stringify({ vector: vector })
        }, sk);
        queryId = ev.id;
        pool.publish(cfg.get("relays", []), ev);
        if (typeof onUpdate === "function") onUpdate();
      } catch(e){ if (log) log.warn("publish failed", String(e)); }
    },

      var out = [];
      for (var i = 0; i < answers.length; i++){

    },

    }
  };
}

    else typeLabel = item.shared ? "МОЁ · ОБЩЕЕ" : "МОЁ · ЛИЧНОЕ";
    var scoreRender;
    if (typeof item.score === "number") scoreRender = (item.score * 100).toFixed(1) + "%";
    else if (item.createdAt) scoreRender = new Date(item.createdAt).toLocaleDateString("ru-RU");
    else scoreRender = "";
    var foot;

      foot = '<div class="noo-note-foot"><span class="noo-note-hint">прочитать · понять · написать своё</span></div>';
    } else {
      foot = '<div class="noo-note-foot"><div class="noo-note-actions">' +

  function isBaseView(){ return currentView === "base"; }

  function switchToStream(){
    currentView = "stream";
    var tabs = document.querySelectorAll(".noo-tab");
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
    var streamTab = document.querySelector('.noo-tab[data-view="stream"]');
    if (streamTab) streamTab.classList.add("active");
    var views = document.querySelectorAll(".noo-view-layer");
    for (var i = 0; i < views.length; i++) views[i].classList.remove("active");
    var streamView = document.querySelector("#noo-view-stream");
    if (streamView) streamView.classList.add("active");
  }

  function executeSearch(force){
    var text = Editor.getValue();
    Renderer.clearRegistry();

    if (!text || !AI.ready()){
      ['local','world','seren'].forEach(function(k){
        var el = document.querySelector('#noo-list-' + k);
        if (el) el.innerHTML = '';
        FilterTabs.setCount(k, 0);
      });
      var msg = AI.ready() ? 'Начните печатать' : 'ИИ прогревается…';
      Renderer.empty('noo-list-local', msg, { loading: !AI.ready() });
      return Promise.resolve();
    }

    return AI.embed(text).then(function(queryVector){
      if (!queryVector) return;
      if (!lastVector || AI.cosine(queryVector, lastVector) < 0.98 || force){
        lastVector = queryVector;
        lastQueryAt = Date.now();
        Net.send(queryVector);
      }
      return DB.all().then(function(dbNotes){
        var localScored = [];
        for (var i = 0; i < dbNotes.length; i++){
          var n = dbNotes[i];
          if (n && n.vector) localScored.push(Object.assign({}, n, { score: AI.cosine(queryVector, n.vector) }));
        }
        var worldAnswers = Net.activeAnswers();
        var worldScored = [];
        for (var i = 0; i < worldAnswers.length; i++){
          worldScored.push(Object.assign({}, worldAnswers[i], { score: AI.cosine(queryVector, worldAnswers[i].vector) }));
        }
        var TH = cfg.get('threshold', 0.30);
        var SD = cfg.get('serendipity', 0.15);
        var localExact = localScored.filter(function(n){ return n.score >= TH; }).sort(function(a,b){ return b.score - a.score; });
        var worldExact = worldScored.filter(function(n){ return n.score >= TH; }).sort(function(a,b){ return b.score - a.score; });
        var serenAll = localScored.concat(worldScored)
          .filter(function(n){ return n.score >= (TH - SD) && n.score < TH; })
          .sort(function(a,b){ return b.score - a.score; });
        Renderer.clearRegistry();
        if (localExact.length === 0) Renderer.empty('noo-list-local', 'В вашей базе нет точных совпадений.', {});
        else Renderer.render('noo-list-local', localExact, 't-local', text);
        var waiting = (Date.now() - lastQueryAt < 6000) && worldExact.length === 0;
        if (waiting) Renderer.empty('noo-list-world', 'Слушаю резонанс в комнате…', { loading: true });
        else if (worldExact.length === 0) Renderer.empty('noo-list-world', 'Пока никто в комнате не думает так же.', {});
        else Renderer.render('noo-list-world', worldExact, 't-world', text);
        if (serenAll.length === 0) Renderer.empty('noo-list-seren', 'Близких мыслей не найдено.', {});
        else Renderer.render('noo-list-seren', serenAll, 't-seren', text);
        FilterTabs.setCount('local', localExact.length);
        FilterTabs.setCount('world', worldExact.length);
        FilterTabs.setCount('seren', serenAll.length);
      });
    });
  }

  function renderMyBase(){
    return DB.all().then(function(all){
      var btc = document.querySelector('#noo-baseTabCount');
      if (btc) btc.textContent = String(all.length);
      var shared = 0;
      for (var i = 0; i < all.length; i++) if (all[i] && all[i].shared) shared++;
      var stats = document.querySelector('#noo-baseStats');
      if (stats){
        stats.innerHTML =
          '<div class="noo-stat"><div class="num">' + all.length + '</div><div class="lbl">Мыслей</div></div>' +
          '<div class="noo-stat"><div class="num">' + shared + '</div><div class="lbl">Общих</div></div>' +
          '<div class="noo-stat"><div class="num">' + (all.length - shared) + '</div><div class="lbl">Личных</div></div>';
      }
      if (all.length === 0){
        Renderer.empty('noo-list-base', 'Ваша база знаний пуста.', { actionLabel: 'Загрузить примеры', actionId: 'seed' });
        return;
      }
      var fEl = document.querySelector('#noo-baseFilter');
      var sEl = document.querySelector('#noo-baseSort');
      var q = fEl ? fEl.value.trim().toLowerCase() : '';
      var sort = sEl ? sEl.value : 'new';
      var list = all.slice();
      if (q) list = list.filter(function(n){ return n.text && n.text.toLowerCase().indexOf(q) >= 0; });
      if (sort === 'old') list.sort(function(a,b){ return (a.createdAt || 0) - (b.createdAt || 0); });
      else if (sort === 'az') list.sort(function(a,b){ return (a.text || '').localeCompare(b.text || '', 'ru'); });
      else list.sort(function(a,b){ return (b.createdAt || 0) - (a.createdAt || 0); });
      Renderer.clearRegistry();
      if (list.length === 0){
        Renderer.empty('noo-list-base', 'Под фильтр ничего не подошло.', {});
        return;
      }
      Renderer.render('noo-list-base', list, 't-local', q || null);
    });
  }

  function refreshCurrent(){
    if (isBaseView()) return renderMyBase();
    return executeSearch();
  }

  function sanitizeNote(raw){
    if (!raw || typeof raw !== 'object') return null;
    if (typeof raw.text !== 'string' || raw.text.length === 0 || raw.text.length > 10000) return null;
    return {
      id: typeof raw.id === 'string' && raw.id ? raw.id : ('i' + Math.random().toString(36).slice(2, 10)),
      text: raw.text.trim(),
      vector: Array.isArray(raw.vector) ? raw.vector : null,
      shared: !!raw.shared,
      createdAt: typeof raw.createdAt === 'number' ? raw.createdAt : Date.now()
    };
  }

  function seedSamples(){
    if (!AI.ready()){ toast('ИИ ещё не готов.', 'err'); return Promise.resolve(); }
    toast(tr('noo.toast.seedLoading', 'Вкладываю смысл…'), 'info');
    var notes = [];
    function step(i){
      if (i >= SAMPLES.length){
        return DB.bulkPut(notes).then(function(){
          toast(tr('noo.toast.seedDone', 'Загружено {n} примеров.').replace('{n}', String(notes.length)), 'ok');
          return refreshCurrent();
        });
      }
      return AI.embed(SAMPLES[i]).then(function(v){
        notes.push({
          id: 's' + Math.random().toString(36).slice(2, 10),
          text: SAMPLES[i],
          vector: v,
          shared: true,
          createdAt: Date.now() - Math.floor(Math.random() * 1e7)
        });
        return step(i + 1);
      });
    }
    return step(0);
  }

  function exportData(){
    DB.all().then(function(notes){
      if (!notes || notes.length === 0){ toast('Базе нечего экспортировать.', 'err'); return; }
      var capsule = {
        app: 'noosphere', format: 'capsul', version: 1,
        model: cfg.get('model'), dim: cfg.get('dim'),
        exportedAt: Date.now(), notes: notes
      };
      var blob = new Blob([JSON.stringify(capsule, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'noosphere-' + new Date().toISOString().slice(0, 10) + '.' + cfg.get('capsuleExt', 'capsul');
      document.body.appendChild(a); a.click();
      URL.revokeObjectURL(url); a.remove();
      toast('Экспортировано ' + U.word('thoughts', notes.length) + ' в капсулу.', 'ok');
    });
  }

  function importData(file){
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var data = JSON.parse(String(reader.result || '{}'));
        var notes = Array.isArray(data) ? data : (data.notes || []);
        if (!Array.isArray(notes)) throw new Error('bad format');
        var clean = [];
        for (var i = 0; i < notes.length; i++){
          var s = sanitizeNote(notes[i]);
          if (s) clean.push(s);
        }
        function embedStep(j){
          if (j >= clean.length) return Promise.resolve();
          if (AI.ready() && !clean[j].vector){
            return AI.embed(clean[j].text).then(function(v){
              clean[j].vector = v;
              return embedStep(j + 1);
            }).catch(function(){ return embedStep(j + 1); });
          }
          return embedStep(j + 1);
        }
        embedStep(0).then(function(){
          return DB.bulkPut(clean);
        }).then(function(){
          toast('Импортировано ' + U.word('thoughts', clean.length) + '.', 'ok');
          refreshCurrent();
        });
      } catch(e){
        toast('Импорт не удался: ' + (e && e.message || 'неверный файл'), 'err');
      }
    };
    reader.readAsText(file);
  }

  function handleCardAction(act, el){
    if (act === 'seed'){ seedSamples(); return; }
    var id = el.getAttribute('data-id');
    var item = id ? Renderer.lookup(id) : null;
    if (!item) return;
    if (act === 'find'){
      Editor.setValue(item.text);
      switchToStream();
      executeSearch(true);
    } else if (act === 'copy'){
      try {
        navigator.clipboard.writeText(item.text).then(
          function(){ toast(tr('noo.toast.copied', 'Скопировано.'), 'ok'); },
          function(){ toast('Не удалось скопировать.', 'err'); }
        );
      } catch(e){ toast('Не удалось скопировать.', 'err'); }
    } else if (act === 'del'){
      if (!confirm('Удалить эту мысль навсегда?')) return;
      DB.del(id).then(function(){
        toast(tr('noo.toast.deleted', 'Мысль удалена.'), 'info');
        refreshCurrent();
      });
    } else if (act === 'toggle'){
      DB.get(id).then(function(rec){
        if (!rec) return;
        rec.shared = !rec.shared;
        return DB.put(rec).then(function(){
          toast(rec.shared ? tr('noo.toast.nowShared', 'Теперь видно узлам.') : tr('noo.toast.nowPrivate', 'Теперь это личное.'), 'ok');
          refreshCurrent();
        });
      });
    }
  }

  function handleSave(isShared){
    var text = Editor.getValue();
    if (!text){ toast(tr('noo.toast.empty', 'Нечего сохранять.'), 'err'); return; }
    if (!AI.ready()){ toast(tr('noo.toast.aiNotReady', 'ИИ ещё не готов.'), 'err'); return; }
    AI.embed(text).then(function(vector){
      return DB.put({
        id: Math.random().toString(36).slice(2, 10),
        text: text,
        vector: vector,
        shared: !!isShared,
        createdAt: Date.now()
      });
    }).then(function(){
      Editor.clear();
      lastVector = null;
      toast(isShared ? tr('noo.toast.savedShared', 'Сохранено и видно узлам.') : tr('noo.toast.savedPrivate', 'Сохранено лично.'), 'ok');
      executeSearch();
      if (isBaseView()) renderMyBase();
    }).catch(function(e){ toast('Ошибка: ' + (e && e.message || e), 'err'); });
  }

  function registerPaletteCommands(){
    if (!Palette || !Palette.register) return;
    Palette.register({ id: 'noo.resonate', title: 'Noosphere: Resonate', group: 'App', action: function(){ executeSearch(true); } });
    Palette.register({ id: 'noo.seed', title: 'Noosphere: Load samples', group: 'App', action: seedSamples });
    Palette.register({ id: 'noo.export', title: 'Noosphere: Export capsule', group: 'App', action: exportData });
  }

  function bind(root){
    if (bound) return;
    bound = true;
    Status.mount(root);
    Drawers.mount(root);
    var editorHost = root.querySelector('#noo-editor-host');
    if (editorHost && Editor && Editor.render) Editor.render(editorHost);
    var filterHost = root.querySelector('#noo-filter-host');
    if (filterHost && FilterTabs && FilterTabs.render) FilterTabs.render(filterHost);
    if (Editor && Editor.onInput){
      Editor.onInput(function(){
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(function(){ executeSearch(); }, cfg.get('debounce', 800));
      });
    }
    if (FilterTabs && FilterTabs.onSelect){
      FilterTabs.onSelect(function(filter){
        currentFilter = filter;
        var lists = root.querySelectorAll('.noo-node-list');
        for (var i = 0; i < lists.length; i++) lists[i].classList.remove('active');
        var target = root.querySelector('#noo-list-' + filter);
        if (target) target.classList.add('active');
      });
    }
    var tabs = root.querySelectorAll('.noo-tab');
    for (var i = 0; i < tabs.length; i++){
      tabs[i].onclick = function(e){
        var t = e.currentTarget;
        var ts = root.querySelectorAll('.noo-tab');
        for (var j = 0; j < ts.length; j++) ts[j].classList.remove('active');
        var vs = root.querySelectorAll('.noo-view-layer');
        for (var j = 0; j < vs.length; j++) vs[j].classList.remove('active');
        t.classList.add('active');
        currentView = t.getAttribute('data-view');
        var v = root.querySelector('#noo-view-' + currentView);
        if (v) v.classList.add('active');
        if (currentView === 'base') renderMyBase();
      };
    }
    var ws = root.querySelector('.noo-workspace');
    if (ws) ws.addEventListener('click', function(e){
      var el = e.target.closest('[data-act]');
      if (el) handleCardAction(el.getAttribute('data-act'), el);
    });
    var bf = root.querySelector('#noo-baseFilter');
    if (bf) bf.addEventListener('input', function(){
      if (baseTimer) clearTimeout(baseTimer);
      baseTimer = setTimeout(function(){ renderMyBase(); }, 200);
    });
    var bsrt = root.querySelector('#noo-baseSort');
    if (bsrt) bsrt.onchange = function(){ renderMyBase(); };
    var btnSavePrivate = root.querySelector('#noo-save-private');
    if (btnSavePrivate) btnSavePrivate.onclick = function(){ handleSave(false); };
    var btnSaveShared = root.querySelector('#noo-save-shared');
    if (btnSaveShared) btnSaveShared.onclick = function(){ handleSave(true); };
    keyHandler = function(e){
      if (e.key === 'Escape') Drawers.close();
      var input = root.querySelector('#noo-input');
      if (e.key === '/' && document.activeElement && !/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName)){
        e.preventDefault();
        switchToStream();
        if (input) input.focus();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
        e.preventDefault();
        if (document.activeElement === input) handleSave(e.shiftKey);
      }
    };
    document.addEventListener('keydown', keyHandler);
    AI.onProgress(function(pct){
      Status.renderAI('Загрузка модели ' + Math.round(pct) + '%', 'busy');
    });
    Net.onPeers(function(n){
      Status.renderNetwork(n, true);
      if (!isBaseView()) executeSearch();
    });
    if (Topbar && Topbar.addButton){
      Topbar.addButton({
        id: 'noo-help',
        text: '?',
        title: tr('noo.navbar.help', 'Как это работает'),
        ariaLabel: tr('noo.navbar.help', 'Как это работает'),
        order: 90,
        onClick: function(){ Drawers.open('help'); }
      });
      Topbar.addButton({
        id: 'noo-settings',
        text: '⚙',
        title: tr('noo.navbar.settings', 'Настройки'),
        ariaLabel: tr('noo.navbar.settings', 'Настройки'),
        order: 85,
        onClick: function(){
          Drawers.bindSettings(
            function(){ location.reload(); },
            function(){
              if (!confirm('Внимание: это навсегда удалит все ваши мысли. Продолжить?')) return;
              DB.reset().then(function(){
                toast('База стёрта.', 'info');
                setTimeout(function(){ location.reload(); }, 500);
              });
            },
            seedSamples
          );
        }
      });
    }
    registerPaletteCommands();
  }

  function boot(root){
    DB.all().then(function(all){

    }
