<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noosphere</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; min-height: 80px; padding: 0.75rem; border-radius: 12px; border: 1px solid #ccc; }
    button { margin-top: 0.5rem; padding: 0.5rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: 0.5; }
    .card { border: 1px solid #e2e8f0; padding: 1rem; border-radius: 12px; margin: 0.5rem 0; background: #fff; }
    .status { font-size: 0.85rem; color: #64748b; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <h1>🌍 Noosphere</h1>
  <textarea id="input" placeholder="Поделитесь мыслью..."></textarea>
  <div class="status" id="status">Готов</div>
  <button id="sendBtn">Отправить в мир</button>
  <div id="results"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
