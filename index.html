<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noosphere</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #f8fafc; color: #0f172a; }
    textarea { width: 100%; min-height: 80px; padding: 0.75rem; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 1rem; }
    button { margin-top: 0.5rem; padding: 0.6rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .card { border: 1px solid #e2e8f0; padding: 1rem; border-radius: 12px; margin: 0.5rem 0; background: white; }
    .status { font-size: 0.85rem; color: #64748b; margin: 0.5rem 0; min-height: 1.2em; }
    .results { margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>🌍 Noosphere</h1>
  <textarea id="thought-input" placeholder="Поделитесь мыслью..."></textarea>
  <div class="status" id="status">Загрузка...</div>
  <button id="send-btn" disabled>Отправить в мир</button>
  <div class="results" id="results"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
