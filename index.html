<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Noosphere Core (Flat Graph + Real Network ACK)</title>

  <style>
    :root {
      --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --accent: #4f46e5; --accent-hover: #4338ca;
      --danger: #ef4444; --ok: #16a34a; --warn: #f59e0b;
      --r: 16px;
    }
    body.dark {
      --bg: #0b1220; --surface: #111c2f; --text: #f1f5f9; --muted: #94a3b8;
      --border: #1e293b; --accent: #6366f1; --accent-hover: #4f46e5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 12px; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 12px; }

    /* Header & Tabs */
    .header { display: flex; justify-content: space-between; align-items: center; }
    .tabs { display: flex; gap: 8px; }
    .tab { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .gear { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 38px; height: 38px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

    /* Input Box */
    .box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
    textarea { width: 100%; min-height: 90px; border: none; background: transparent; color: var(--text); font-size: 16px; outline: none; resize: none; }
    textarea::placeholder { color: var(--muted); }
    .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 10px; }
    .status-bar { display: flex; gap: 6px; flex-wrap: wrap; font-size: 12px; font-weight: bold; }
    .pill { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: var(--bg); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); } .dot.bad { background: var(--danger); }
    
    .btns { display: flex; gap: 8px; }
    .btn { background: var(--accent); color: #fff; border: none; padding: 10px 14px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn.danger { background: transparent; color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

    /* Feed Sections */
    .section-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 16px 0 8px 4px; }
    .feed { display: flex; flex-direction: column; gap: 8px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
    .card .text { font-size: 15px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .card .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; color: var(--muted); }
    .score-badge { background: rgba(79,70,229,0.1); color: var(--accent); padding: 2px 8px; border-radius: 999px; font-weight: 800; }
    .state-badge { padding: 2px 8px; border-radius: 999px; font-weight: 800; border: 1px solid var(--border); }
    .state-badge.pending { color: var(--warn); border-color: rgba(245,158,11,0.3); }
    .state-badge.world { color: var(--ok); border-color: rgba(22,163,74,0.3); }
    .empty { text-align: center; color: var(--muted); font-style: italic; padding: 16px; border: 1px dashed var(--border); border-radius: var(--r); }

    /* Settings Panel */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10; display: none; }
    .overlay.open { display: block; }
    .panel { position: fixed; top: 0; right: 0; width: 400px; max-width: 90vw; height: 100%; background: var(--surface); z-index: 11; padding: 20px; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); overflow-y: auto; box-shadow: -5px 0 30px rgba(0,0,0,0.1); }
    .panel.open { transform: translateX(0); }
    .panel h2 { margin-bottom: 20px; color: var(--text); }
    .setting { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .setting label { font-size: 13px; font-weight: bold; color: var(--muted); }
    .setting select, .setting textarea, .setting input[type="text"] { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; font-family: inherit; }
    .setting textarea { min-height: 80px; resize: vertical; }
    
    .view { display: none; }
    .view.active { display: block; }
  </style>

  <!-- Gun & Tools -->
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/rindexed.js"></script>
  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // --- 1. CORE UTILS ---
    const $ = (s) => document.querySelector(s);
    const esc = (s) => { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; };
    const uuid = () => crypto.randomUUID();
    const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };
    
    // --- 2. VECTORS ---
    const Vec = {
      dot: (a,b) => { let d=0; for(let i=0;i<a.length;i++) d+=a[i]*b[i]; return d; },
      pack: (f32) => {
        let s=0; for(let i=0;i<f32.length;i++) s+=f32[i]*f32[i]; const m=Math.sqrt(s)||1;
        const i8=new Int8Array(f32.length);
        for(let i=0;i<f32.length;i++) i8[i]=Math.max(-127, Math.min(127, Math.round((f32[i]/m)*127)));
        let str=''; const u8=new Uint8Array(i8.buffer);
        for(let i=0;i<u8.length;i+=1000) str+=String.fromCharCode(...u8.subarray(i, i+1000));
        return btoa(str);
      },
      unpack: (b64) => {
        const bin=atob(b64); const u8=new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
        const i8=new Int8Array(u8.buffer); const f32=new Float32Array(i8.length);
        for(let i=0;i<i8.length;i++) f32[i]=i8[i]/127;
        let s=0; for(let i=0;i<f32.length;i++) s+=f32[i]*f32[i]; const m=Math.sqrt(s)||1;
        for(let i=0;i<f32.length;i++) f32[i]/=m;
        return f32;
      }
    };

    // --- 3. INDEXED DB (LOCAL STORAGE ONLY) ---
    const DB = (() => {
      const NAME = 'noosphere_db_v2';
      let db = null;

      const init = () => new Promise((res, rej) => {
        const req = indexedDB.open(NAME, 1);
        req.onupgradeneeded = () => {
          const d = req.result;
          if (!d.objectStoreNames.contains('kv')) d.createObjectStore('kv');
          if (!d.objectStoreNames.contains('notes')) d.createObjectStore('notes', { keyPath: 'id' });
        };
        req.onsuccess = () => { db = req.result; res(); };
        req.onerror = () => rej(req.error);
      });

      const kvGet = (k) => new Promise(res => { const r = db.transaction('kv').objectStore('kv').get(k); r.onsuccess = () => res(r.result); r.onerror = () => res(null); });
      const kvSet = (k, v) => new Promise(res => { const r = db.transaction('kv','readwrite').objectStore('kv').put(v,k); r.onsuccess = () => res(true); });
      
      const notesPut = (n) => new Promise(res => { const r = db.transaction('notes','readwrite').objectStore('notes').put(n); r.onsuccess = () => res(true); });
      const notesDel = (id) => new Promise(res => { const r = db.transaction('notes','readwrite').objectStore('notes').delete(id); r.onsuccess = () => res(true); });
      const notesAll = () => new Promise(res => { const r = db.transaction('notes').objectStore('notes').getAll(); r.onsuccess = () => res(r.result||[]); });

      return { init, kvGet, kvSet, notesPut, notesDel, notesAll };
    })();

    // --- 4. STATE MANAGER ---
    const State = {
      deviceId: null,
      modelReady: false,
      netActive: false,
      settings: {
        theme: 'auto',
        peers: 'https://relay.peer.ooo/gun',
        threshold: 0.25,
        serDelta: 0.15
      },
      localNotes: [],
      worldNotes: new Map() // Flat map of Gun data
    };

    // --- 5. INITIALIZATION ---
    async function boot() {
      await DB.init();
      
      // Device ID
      State.deviceId = await DB.kvGet('deviceId');
      if (!State.deviceId) { State.deviceId = uuid(); await DB.kvSet('deviceId', State.deviceId); }
      
      // Load Settings
      const savedSet = await DB.kvGet('settings');
      if (savedSet) State.settings = { ...State.settings, ...savedSet };
      syncSettingsToUI();
      applyTheme();

      // Load Local Notes
      State.localNotes = await DB.notesAll();
      State.localNotes.sort((a,b) => b.createdAt - a.createdAt);

      renderApp();
      initNetwork();
      initModel();
      startPublisherDaemon();
    }

    // --- 6. NETWORK (GUN) ---
    let gun;
    function initNetwork() {
      const peers = State.settings.peers.split('\n').map(s=>s.trim()).filter(Boolean);
      gun = Gun({ peers, localStorage: false }); // pure network/rindexed, no localstorage fallback

      // Monitor actual websocket connections!
      let activeConnections = new Set();
      gun.on('hi', peer => { activeConnections.add(peer.url); State.netActive = true; renderApp(); });
      gun.on('bye', peer => { activeConnections.delete(peer.url); if(activeConnections.size === 0) State.netActive = false; renderApp(); });

      // The flat world map!
      // This solves the link-resolution issue.
      const worldNode = gun.get('noosphere_world_flat_v1');
      
      worldNode.map().on((data, id) => {
        if (!data || data.deleted || typeof data.text !== 'string') {
          if (State.worldNotes.has(id)) { State.worldNotes.delete(id); renderApp(); }
          return;
        }
        State.worldNotes.set(id, {
          id: data.id,
          text: data.text,
          author: data.author,
          vPacked: data.vPacked,
          createdAt: data.createdAt
        });
        renderApp(); // re-render on sync
      });
    }

    // --- 7. MODEL ---
    let embedder = null;
    async function initModel() {
      try {
        embedder = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', { quantized: true });
        State.modelReady = true;
        renderApp();
        backgroundIndex();
      } catch (e) {
        console.error("Model failed", e);
      }
    }
    async function getEmbed(text) {
      if (!State.modelReady) return null;
      const { data, dims } = await embedder([text]);
      const tokens=dims[1], hidden=dims[2];
      const emb = new Float32Array(hidden);
      for(let t=0;t<tokens;t++){ for(let h=0;h<hidden;h++) emb[h]+=data[t*hidden+h]; }
      for(let h=0;h<hidden;h++) emb[h]/=tokens;
      return emb;
    }

    // --- 8. CORE ACTIONS ---
    async function saveNote(publishToWorld = false) {
      const text = $('#thought').value.trim();
      if (!text) return;

      const note = {
        id: uuid(),
        text,
        createdAt: Date.now(),
        publishState: publishToWorld ? 'pending' : 'none',
        vPacked: null
      };

      // Disable UI during save
      $('#thought').value = '';
      $('#save').disabled = true;
      $('#sendWorld').disabled = true;

      try {
        // Sync vector if model ready
        if (State.modelReady) {
          const v = await getEmbed(text);
          note.vPacked = Vec.pack(v);
        }
        
        // Save Local
        State.localNotes.unshift(note);
        await DB.notesPut(note);
        
        renderApp();

        // If publish -> trigger daemon
        if (publishToWorld) tryPublish(note);

      } finally {
        $('#save').disabled = false;
        $('#sendWorld').disabled = !State.modelReady;
      }
    }

    // Publish single note. Promise resolves ONLY on network ACK!
    async function tryPublish(note) {
      if (note.publishState === 'published') return;
      if (!note.vPacked && State.modelReady) {
        const v = await getEmbed(note.text);
        note.vPacked = Vec.pack(v);
        await DB.notesPut(note);
      }
      if (!note.vPacked) return; // cannot publish without vector

      // Write to Gun Flat Node
      gun.get('noosphere_world_flat_v1').get(note.id).put({
        id: note.id,
        text: note.text,
        author: State.deviceId,
        vPacked: note.vPacked,
        createdAt: note.createdAt,
        deleted: false
      }, async (ack) => {
        // This callback ONLY fires when a network peer acknowledges the write, 
        // OR if Gun decides it's permanently offline (err).
        if (ack.err) return; 
        
        // Success!
        const local = State.localNotes.find(n => n.id === note.id);
        if (local && local.publishState !== 'published') {
          local.publishState = 'published';
          await DB.notesPut(local);
          renderApp();
        }
      });
    }

    // Daemon retries pending notes every 5s
    function startPublisherDaemon() {
      setInterval(() => {
        if (!State.netActive) return; // pause if offline
        const pending = State.localNotes.filter(n => n.publishState === 'pending');
        for (const n of pending) tryPublish(n);
      }, 5000);
    }

    async function backgroundIndex() {
      if (!State.modelReady) return;
      for (const n of State.localNotes) {
        if (!n.vPacked) {
          const v = await getEmbed(n.text);
          n.vPacked = Vec.pack(v);
          await DB.notesPut(n);
        }
      }
      renderApp();
    }

    async function deleteLocal(id) {
      if(!confirm("Удалить заметку?")) return;
      State.localNotes = State.localNotes.filter(n => n.id !== id);
      await DB.notesDel(id);
      renderApp();
    }

    // --- 9. SEARCH ENGINE ---
    const Search = {
      cache: new Map(),
      getV: (id, packed) => {
        if (!packed) return null;
        if (Search.cache.has(id)) return Search.cache.get(id);
        const v = Vec.unpack(packed); Search.cache.set(id, v); return v;
      },
      run: async (q) => {
        if (!q) return { q:'', local:[], world:[], ser:[] };
        if (!State.modelReady) return { q, loading: true };

        const qVec = await getEmbed(q);
        const thr = State.settings.threshold;
        const low = Math.max(0, thr - State.settings.serDelta);

        // Score Local
        const lHits = [];
        for (const n of State.localNotes) {
          const v = Search.getV(n.id, n.vPacked);
          if (!v) continue;
          const score = Vec.dot(qVec, v);
          if (score >= thr) lHits.push({...n, score});
        }
        
        // Score World
        const wHits = [], sHits = [];
        for (const [id, w] of State.worldNotes) {
          if (w.author === State.deviceId) continue; // Hide my own notes from World feed
          const v = Search.getV(id, w.vPacked);
          if (!v) continue;
          const score = Vec.dot(qVec, v);
          if (score >= thr) wHits.push({...w, score});
          else if (score >= low) sHits.push({...w, score});
        }

        const max = 5;
        return {
          q,
          local: lHits.sort((a,b)=>b.score-a.score).slice(0,max),
          world: wHits.sort((a,b)=>b.score-a.score).slice(0,max),
          ser: sHits.sort((a,b)=>b.score-a.score).slice(0,max)
        };
      }
    };

    // --- 10. UI RENDERING ---
    let currentSearch = null;

    async function renderApp() {
      // 1. Status Bar
      const pendCount = State.localNotes.filter(n=>n.publishState==='pending').length;
      const worldCount = Array.from(State.worldNotes.values()).filter(n=>n.author !== State.deviceId).length;
      
      const pills = [
        `<div class="pill"><div class="dot ok"></div>IDB</div>`,
        `<div class="pill"><div class="dot ${State.netActive?'ok':'bad'}"></div>net:${State.netActive?'1':'0'}</div>`,
        `<div class="pill"><div class="dot ${State.modelReady?'ok':'warn'}"></div>mdl</div>`,
        `<div class="pill">local:${State.localNotes.length}</div>`,
        pendCount > 0 ? `<div class="pill" style="border-color:var(--warn); color:var(--warn);">pend:${pendCount}</div>` : '',
        `<div class="pill">world:${worldCount}</div>`
      ];
      $('#status').innerHTML = pills.join('');

      $('#sendWorld').disabled = !State.modelReady;

      // 2. Flow View (Search results)
      const q = $('#thought').value.trim();
      currentSearch = await Search.run(q);
      
      if (!currentSearch.q) {
        renderList('#localList', [], "Начните вводить текст...");
        renderList('#worldList', [], "Начните вводить текст...");
        renderList('#serList', [], "Начните вводить текст...");
      } else if (currentSearch.loading) {
        renderList('#localList', [], "Модель загружается...");
        renderList('#worldList', [], "Модель загружается...");
        renderList('#serList', [], "Модель загружается...");
      } else {
        renderList('#localList', currentSearch.local, "Нет совпадений.");
        renderList('#worldList', currentSearch.world, "В мире пусто.");
        renderList('#serList', currentSearch.ser, "Смежных нет.");
      }

      // 3. History View
      renderHistory();
    }

    function renderList(selector, items, emptyMsg) {
      const el = $(selector);
      if (!items.length) { el.innerHTML = `<div class="empty">${esc(emptyMsg)}</div>`; return; }
      
      el.innerHTML = items.map(it => `
        <div class="card">
          <div class="text">${esc(it.text)}</div>
          <div class="meta">
            <span class="score-badge">${(it.score||0).toFixed(2)}</span>
            ${it.author ? `<span>${esc(it.author.slice(0,6))}</span>` : `<span>${new Date(it.createdAt).toLocaleDateString()}</span>`}
          </div>
        </div>
      `).join('');
    }

    function renderHistory() {
      const q = $('#historySearch').value.trim().toLowerCase();
      let list = State.localNotes;
      if (q) list = list.filter(n => n.text.toLowerCase().includes(q));

      const el = $('#historyList');
      if (!list.length) { el.innerHTML = `<div class="empty">Нет заметок</div>`; return; }

      el.innerHTML = list.map(n => {
        const d = new Date(n.createdAt);
        const stateBadge = n.publishState === 'pending' ? `<span class="state-badge pending">отправка...</span>` : 
                           n.publishState === 'published' ? `<span class="state-badge world">в мире</span>` : '';
        return `
          <div class="card">
            <div class="text">${esc(n.text)}</div>
            <div class="meta">
              <span>${d.toLocaleDateString()} ${d.toLocaleTimeString().slice(0,5)}</span>
              ${stateBadge}
              <button class="btn danger" onclick="window.deleteNote('${n.id}')" style="padding:4px 8px; font-size:11px;">Удалить</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Exported for inline onclick
    window.deleteNote = deleteLocal;

    // --- 11. BINDINGS ---
    $('#thought').addEventListener('input', debounce(renderApp, 250));
    $('#save').addEventListener('click', () => saveNote(false));
    $('#sendWorld').addEventListener('click', () => saveNote(true));
    $('#historySearch').addEventListener('input', renderApp);

    // Tabs
    $('#tabFlow').onclick = () => { $('#tabFlow').classList.add('active'); $('#tabHistory').classList.remove('active'); $('#flowView').classList.add('active'); $('#historyView').classList.remove('active'); };
    $('#tabHistory').onclick = () => { $('#tabHistory').classList.add('active'); $('#tabFlow').classList.remove('active'); $('#historyView').classList.add('active'); $('#flowView').classList.remove('active'); renderApp(); };

    // Settings
    $('#openSettings').onclick = () => { $('#overlay').classList.add('open'); $('#panel').classList.add('open'); };
    $('#overlay').onclick = () => { $('#overlay').classList.remove('open'); $('#panel').classList.remove('open'); };

    function syncSettingsToUI() {
      $('#theme').value = State.settings.theme;
      $('#threshold').value = State.settings.threshold;
      $('#thresholdV').textContent = State.settings.threshold.toFixed(2);
      $('#serDelta').value = State.settings.serDelta;
      $('#serDeltaV').textContent = State.settings.serDelta.toFixed(2);
      $('#peersText').value = State.settings.peers;
    }

    async function applySettings() {
      State.settings = {
        theme: $('#theme').value,
        threshold: Number($('#threshold').value),
        serDelta: Number($('#serDelta').value),
        peers: $('#peersText').value
      };
      await DB.kvSet('settings', State.settings);
      applyTheme();
      Search.cache.clear();
      renderApp();
      location.reload(); // Hard reload required to re-init Gun with new peers
    }

    $('#theme').onchange = applySettings;
    $('#threshold').onchange = () => { $('#thresholdV').textContent = $('#threshold').value; };
    $('#threshold').onchange = applySettings;
    $('#serDelta').oninput = () => { $('#serDeltaV').textContent = $('#serDelta').value; };
    $('#serDelta').onchange = applySettings;
    $('#peersText').onchange = applySettings;

    function applyTheme() {
      const dark = State.settings.theme === 'dark' || (State.settings.theme === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
      document.body.classList.toggle('dark', !!dark);
    }

    // Start!
    boot();

  </script>
</body>
</html>
