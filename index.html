<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOOmium</title>

<!-- ============================================ -->
<!-- LAYER 1: UI STYLES -->
<!-- ============================================ -->
<style>
:root {
  --bg: #0a0a0a; --fg: #ededed; --dim: #666; --line: #1f1f1f;
  --accent: #7c5cff; --ok: #4ade80; --err: #ef4444;
  --mono: ui-monospace, monospace;
  --sans: system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100dvh; background: var(--bg); color: var(--fg); font: 14px/1.5 var(--sans); }
body { display: flex; flex-direction: column; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font: inherit; color: inherit; background: none; border: none; outline: none; }

.topbar { display: flex; padding: 10px 14px; border-bottom: 1px solid var(--line); }
.brand { font: 600 14px var(--mono); }
.status { display: flex; gap: 10px; padding: 6px 14px; border-bottom: 1px solid var(--line); font: 11px var(--mono); color: var(--dim); }
.status.ok { color: var(--ok); }
.status.err { color: var(--err); }

.work { flex: 1; overflow-y: auto; padding: 14px; }
.btn { padding: 10px 14px; border: 1px solid var(--line); border-radius: 6px; font: 13px var(--sans); }
.btn-primary { background: var(--fg); color: var(--bg); }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--fg); color: var(--bg); padding: 10px 20px; border-radius: 4px; font: 12px var(--mono); z-index: 1000; transition: .25s; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ============================================ -->
<!-- LAYER 2: UI MARKUP -->
<!-- ============================================ -->
<header class="topbar">
  <div class="brand">NOOmium</div>
</header>

<div class="status">
  <span id="stDB">DB</span>
  <span id="stAI">AI</span>
  <span id="stNet">P2P</span>
</div>

<main class="work">
  <textarea id="input" placeholder="Ввод..."></textarea>
  <button class="btn btn-primary" id="btnSave">Сохранить</button>
  <div id="list"></div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
// ============================================
// CONTRACT: NOO-framework v1.0
// ============================================

// === LAYER: BOOT | MODULE: GlobalHandlers ===
// [MANIFEST] provides: глобальные обработчики
// [RULE] подавляет шумные ошибки
window.addEventListener('error', e => console.error('Error:', e.error));
window.addEventListener('unhandledrejection', e => {
  if (e.reason?.message?.includes('connection')) {
    e.preventDefault();
    return;
  }
  console.error('Rejection:', e.reason);
});

// === LAYER: CORE | MODULE: Config ===
// [MANIFEST] provides: C
// [RULE] единый источник правды
const C = {
  DB: 'noomium_v1',
  STORE: 'notes',
  DEBOUNCE: 800,
  state: {}
};

// === LAYER: CORE | MODULE: Utils ===
// [MANIFEST] provides: uuid, esc, toast, setStatus
// [RULE] чистые функции
const uuid = () => crypto.randomUUID();
const esc = (s) => String(s).replace(/[&<>]/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

let toastTimer;
const toast = (msg, type = '') => {
  const el = document.getElementById('toast');
  if (!el) return;
  el.className = `toast show ${type}`;
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', 2500);
};

const setStatus = (id, text, cls = '') => {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `status ${cls}`;
  el.textContent = text;
};

// === LAYER: CORE | MODULE: Storage ===
// [MANIFEST] provides: put, get, del, all, reset
// [RULE] IndexedDB wrapper
const Storage = (() => {
  let db = null;

  const open = () => new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(C.DB, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(C.STORE)) {
        d.createObjectStore(C.STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });

  const tx = async (mode, fn) => {
    const d = await open();
    return new Promise((res, rej) => {
      const t = d.transaction(C.STORE, mode);
      const s = t.objectStore(C.STORE);
      const r = fn(s);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  };

  return {
    put: (item) => tx('readwrite', s => s.put(item)),
    get: (id) => tx('readonly', s => s.get(id)),
    del: (id) => tx('readwrite', s => s.delete(id)),
    all: () => tx('readonly', s => s.getAll()),
    reset: async () => {
      if (db) { db.close(); db = null; }
      await new Promise(r => {
        const req = indexedDB.deleteDatabase(C.DB);
        req.onsuccess = req.onerror = req.onblocked = () => r();
      });
    }
  };
})();

// === LAYER: CORE | MODULE: AI ===
// [MANIFEST] provides: embed
// [RULE] embeddings (опционально)
const embed = async (text) => {
  return null;
};

// === LAYER: CORE | MODULE: Network ===
// [MANIFEST] provides: publish, subscribe
// [RULE] P2P/WebSocket (опционально)
const publish = async (payload) => {
  return false;
};

const subscribe = (fn) => {
  // заглушка
};

// === LAYER: UI | MODULE: Renderer ===
// [MANIFEST] provides: render, empty
// [RULE] чистый рендер
const UI = {
  render: (id, items) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (!items.length) {
      el.innerHTML = '<div class="empty">пусто</div>';
      return;
    }
    el.innerHTML = items.map(i =>
      `<div class="card">${esc(i.text)}</div>`
    ).join('');
  }
};

// === LAYER: ENGINE | MODULE: BusinessLogic ===
// [MANIFEST] provides: save, search
// [RULE] оркестрация слоёв ниже
const save = async () => {
  const text = document.getElementById('input').value.trim();
  if (!text) { toast('пусто', 'err'); return; }
  await Storage.put({
    id: uuid(),
    text,
    createdAt: Date.now()
  });
  document.getElementById('input').value = '';
  toast('сохранено', 'ok');
  await search();
};

const search = async () => {
  const all = await Storage.all();
  all.sort((a, b) => b.createdAt - a.createdAt);
  UI.render('list', all);
};

// === LAYER: UI | MODULE: EventHandlers ===
// [MANIFEST] provides: bind
// [RULE] только навешивание обработчиков
const bind = () => {
  document.getElementById('btnSave').onclick = save;
};

// === LAYER: BOOT | MODULE: Bootstrap ===
// [MANIFEST] инициализация всех модулей
// [RULE] параллельный запуск, изоляция ошибок
const boot = async () => {
  bind();

  await Promise.allSettled([
    Storage.all()
      .then(() => setStatus('stDB', 'DB', 'ok'))
      .catch(() => setStatus('stDB', 'DB', 'err'))
  ]);

  await search();
  console.log('App ready');
};

boot();
</script>
</body>
</html>
