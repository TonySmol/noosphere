<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https: wss:; worker-src 'self' blob:; connect-src 'self' https: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
<title>Серендипити</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌌</text></svg>">
<style>
:root{
  --bg:#0a0a14;--surface:#151525;--surface-2:#1e1e35;--surface-3:#2a2a48;
  --text:#f0f0ff;--muted:#8888aa;--dim:#55556e;
  --border:#2a2a4c;--border-subtle:#1e1e38;
  --local:#a78bfa;--local-glow:rgba(167,139,250,.15);--local-soft:rgba(167,139,250,.08);
  --world:#22d3ee;--world-glow:rgba(34,211,238,.15);--world-soft:rgba(34,211,238,.08);
  --seren:#34d399;--seren-glow:rgba(52,211,153,.15);--seren-soft:rgba(52,211,153,.08);
  --danger:#f87171;--warning:#fbbf24;--success:#4ade80;
  --r:14px;--r-sm:10px;--r-lg:20px;
  --sh:0 4px 24px rgba(0,0,0,.4);--sh-lg:0 12px 40px rgba(0,0,0,.5);
  --ease:cubic-bezier(.4,0,.2,1);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --btab-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
  -webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;outline:none}
button:active{transform:scale(.97)}
#app-root{height:100%;display:none;flex-direction:column}
body.show-app #app-root{display:flex}
body.show-app #loom-root{display:none}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
  padding-top:calc(10px + var(--safe-top));background:var(--surface);
  border-bottom:1px solid var(--border-subtle);flex-shrink:0;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px}
.logo-ic{font-size:22px}
.hdr-acts{display:flex;gap:4px}
.ib{width:38px;height:38px;border-radius:var(--r-sm);display:flex;align-items:center;
  justify-content:center;font-size:18px;background:var(--surface-2);transition:background .15s}
.ib:hover{background:var(--surface-3)}

/* STATUS */
.status{display:flex;gap:6px;padding:8px 16px;background:var(--surface);
  border-bottom:1px solid var(--border-subtle);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.status::-webkit-scrollbar{display:none}
.stb{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;
  font-size:11px;font-weight:500;background:var(--surface-2);border:1px solid var(--border-subtle);
  white-space:nowrap;color:var(--muted)}
.stb-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.stb.ok{color:var(--success)}
.stb.warn{color:var(--warning)}
.stb.err{color:var(--danger)}
.stb.load{color:var(--local)}
.stb.load .stb-dot{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{50%{opacity:.3}}

/* WORKSPACE */
.ws{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#ws-stream{padding-bottom:calc(var(--btab-h) + var(--safe-bottom))}

/* EDITOR */
.ed{background:var(--surface);margin:12px 16px 0;border:1px solid var(--border-subtle);
  border-radius:var(--r);padding:14px;flex-shrink:0;transition:border-color .2s,box-shadow .2s}
.ed:focus-within{border-color:var(--local);box-shadow:0 0 0 3px var(--local-glow)}
.ed-ta{width:100%;min-height:64px;max-height:140px;background:transparent;border:none;
  outline:none;resize:none;font:inherit;color:var(--text);line-height:1.55}
.ed-ta::placeholder{color:var(--dim)}
.ed-foot{display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border-subtle);gap:8px;flex-wrap:wrap}
.ed-cnt{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.ed-acts{display:flex;gap:6px}
.btn{padding:8px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:500;
  display:inline-flex;align-items:center;gap:5px;transition:all .15s;border:1px solid transparent}
.btn-p{background:var(--local);color:#0a0a14}
.btn-p:hover{filter:brightness(1.1);box-shadow:0 4px 12px var(--local-glow)}
.btn-s{background:var(--surface-2);color:var(--text);border-color:var(--border-subtle)}
.btn-s:hover{background:var(--surface-3)}
.btn-g{color:var(--muted)}
.btn-g:hover{background:var(--surface-2);color:var(--text)}
.btn-d{background:rgba(248,113,113,.1);color:var(--danger);border-color:rgba(248,113,113,.3)}
.btn-d:hover{background:var(--danger);color:#fff}

/* SEGMENTS */
.seg{display:flex;gap:4px;margin:12px 16px 0;padding:4px;background:var(--surface);
  border:1px solid var(--border-subtle);border-radius:var(--r);flex-shrink:0}
.seg-b{flex:1;padding:9px 8px;border-radius:var(--r-sm);font-size:13px;font-weight:500;
  color:var(--muted);display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .2s;position:relative}
.seg-b .cnt{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--surface-2);
  font-weight:600;min-width:18px;text-align:center}
.seg-b.on{background:var(--surface-3);color:var(--text)}
.seg-b[data-k="local"].on{color:var(--local)}
.seg-b[data-k="local"].on .cnt{background:var(--local-glow);color:var(--local)}
.seg-b[data-k="world"].on{color:var(--world)}
.seg-b[data-k="world"].on .cnt{background:var(--world-glow);color:var(--world)}
.seg-b[data-k="seren"].on{color:var(--seren)}
.seg-b[data-k="seren"].on .cnt{background:var(--seren-glow);color:var(--seren)}

/* DECK */
.deck{flex:1;position:relative;margin:12px 16px 16px;overflow:visible;min-height:220px}
.deck-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:20px;color:var(--muted)}
.deck-empty-ic{font-size:56px;opacity:.4;margin-bottom:14px}
.deck-empty-t{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.deck-empty-d{font-size:13px;max-width:280px;line-height:1.5}
.spin{width:32px;height:32px;border:3px solid var(--surface-3);border-top-color:var(--local);
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
/* stacked depth hint */
.deck-stack{position:absolute;left:0;right:0;top:0;bottom:0;border-radius:var(--r-lg);
  background:var(--surface);border:1px solid var(--border-subtle);pointer-events:none}
.deck-stack.s1{transform:scale(.965) translateY(10px);opacity:.5}
.deck-stack.s2{transform:scale(.93) translateY(20px);opacity:.28}

/* CARD */
.card{position:absolute;inset:0;background:var(--surface);border:1px solid var(--border-subtle);
  border-radius:var(--r-lg);padding:20px;display:flex;flex-direction:column;
  box-shadow:var(--sh);overflow:hidden;transition:transform .3s var(--ease),opacity .3s;
  touch-action:pan-y;will-change:transform;z-index:2}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.card.t-local{color:var(--local)}
.card.t-local::before{background:var(--local)}
.card.t-world{color:var(--world)}
.card.t-world::before{background:var(--world)}
.card.t-seren{color:var(--seren)}
.card.t-seren::before{background:var(--seren)}
.card.t-local{background:linear-gradient(135deg,var(--surface),rgba(167,139,250,.04))}
.card.t-world{background:linear-gradient(135deg,var(--surface),rgba(34,211,238,.04))}
.card.t-seren{background:linear-gradient(135deg,var(--surface),rgba(52,211,153,.04))}
.card-h{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;gap:10px;flex-shrink:0}
.card-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
  background:currentColor;border-radius:20px;font-size:11px;font-weight:700;
  color:var(--surface);text-transform:uppercase;letter-spacing:.5px}
.card-pos{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
/* proximity / resonance visualization */
.card-reso{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-shrink:0}
.card-reso-bar{flex:1;height:6px;border-radius:3px;background:var(--surface-2);overflow:hidden}
.card-reso-fill{height:100%;border-radius:3px;background:currentColor;
  transition:width .45s var(--ease);box-shadow:0 0 8px currentColor}
.card-reso-val{font-size:12px;font-weight:700;color:currentColor;font-variant-numeric:tabular-nums;min-width:38px;text-align:right}
.card-body{flex:1;overflow-y:auto;font-size:17px;line-height:1.6;white-space:pre-wrap;
  word-wrap:break-word;color:var(--text);padding:4px 2px;scrollbar-width:thin;
  scrollbar-color:var(--border) transparent}
.card-body::-webkit-scrollbar{width:4px}
.card-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card-body mark{background:var(--local-glow);color:var(--local);padding:0 3px;
  border-radius:3px;font-weight:600}
.card-foot{display:flex;gap:8px;margin-top:16px;flex-shrink:0;flex-wrap:wrap}
.card-act{flex:1;min-width:100px;padding:10px 12px;background:var(--surface-2);
  border:1px solid var(--border-subtle);border-radius:var(--r-sm);font-size:12px;
  font-weight:500;color:var(--muted);display:inline-flex;align-items:center;
  justify-content:center;gap:5px;transition:all .15s}
.card-act:hover{background:var(--surface-3);color:var(--text)}
.card-act.primary{background:currentColor;color:var(--surface);border-color:transparent;opacity:.92}
.card-act.primary:hover{opacity:1}
.card-act.danger:hover{background:rgba(248,113,113,.1);color:var(--danger);border-color:var(--danger)}
.card-hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;
  color:var(--dim);pointer-events:none;opacity:.7}
/* SWIPE FEEDBACK */
.card.swiping{transition:none}
.card-gone-right{transform:translateX(150%) rotate(20deg)!important;opacity:0!important}
.card-gone-left{transform:translateX(-150%) rotate(-20deg)!important;opacity:0!important}

/* BASE VIEW */
.base{flex:1;display:flex;flex-direction:column;overflow:hidden}
.base-h{padding:12px 16px 0;flex-shrink:0}
.base-stats{display:flex;gap:8px;margin-bottom:10px}
.stat{flex:1;background:var(--surface);border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);padding:10px;text-align:center}
.stat-v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.base-ctrls{display:flex;gap:8px;margin-bottom:4px}
.base-search{flex:1;background:var(--surface);border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);padding:9px 12px;font:inherit;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.base-search:focus{border-color:var(--local);box-shadow:0 0 0 3px var(--local-glow)}
.base-search::placeholder{color:var(--dim)}
.base-sort{background:var(--surface);border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);padding:9px 10px;font:inherit;color:var(--text);outline:none;cursor:pointer}
.base-sort option{background:var(--surface);color:var(--text)}
.base-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding-bottom:calc(12px + var(--safe-bottom) + var(--btab-h))}
.base-list::-webkit-scrollbar{width:4px}
.base-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.base-item{background:var(--surface);border:1px solid var(--border-subtle);
  border-radius:var(--r);padding:14px;position:relative;overflow:hidden;
  transition:border-color .15s,transform .15s}
.base-item:hover{border-color:var(--border)}
.base-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--local)}
.base-item.shared::before{background:var(--world)}
.base-item-t{font-size:14px;line-height:1.55;color:var(--text);margin-bottom:10px;
  white-space:pre-wrap;word-wrap:break-word}
.base-item-f{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.base-item-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim)}
.base-item-tag{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;
  background:var(--local-soft);color:var(--local)}
.base-item.shared .base-item-tag{background:var(--world-soft);color:var(--world)}
.base-item-acts{display:flex;gap:4px}
.base-item-act{padding:6px 10px;background:var(--surface-2);border:1px solid var(--border-subtle);
  border-radius:8px;font-size:11px;color:var(--muted);transition:all .15s}
.base-item-act:hover{color:var(--text);background:var(--surface-3)}
.base-item-act.danger:hover{color:var(--danger);border-color:var(--danger)}

/* BOTTOM TABS */
.btab{position:fixed;left:0;right:0;bottom:0;display:flex;background:var(--surface);
  border-top:1px solid var(--border-subtle);padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));
  z-index:50}
.btab-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:6px;color:var(--muted);font-size:10px;font-weight:500;transition:color .15s}
.btab-b.on{color:var(--local)}
.btab-ic{font-size:20px}
.btab-lbl{font-size:10px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;
  animation:fade .2s}
.mo.on{display:flex}
@keyframes fade{from{opacity:0}}
.md{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  max-width:520px;width:100%;max-height:85vh;display:flex;flex-direction:column;
  box-shadow:var(--sh-lg);animation:mdIn .3s var(--ease)}
@keyframes mdIn{from{opacity:0;transform:translateY(20px) scale(.95)}}
.md-h{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  border-bottom:1px solid var(--border-subtle);flex-shrink:0}
.md-t{font-size:17px;font-weight:600}
.md-x{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:22px;color:var(--muted);transition:all .15s}
.md-x:hover{background:var(--surface-2);color:var(--text)}
.md-b{flex:1;overflow-y:auto;padding:18px 20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.md-b::-webkit-scrollbar{width:4px}
.md-b::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.md-f{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;
  border-top:1px solid var(--border-subtle);flex-shrink:0}

/* FORM */
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.fi,.fs{width:100%;background:var(--surface-2);border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);padding:10px 12px;font:inherit;color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s}
.fi:focus,.fs:focus{border-color:var(--local);box-shadow:0 0 0 3px var(--local-glow)}
.fi::placeholder{color:var(--dim)}
.ft{width:100%;min-height:90px;background:var(--surface-2);border:1px solid var(--border-subtle);
  border-radius:var(--r-sm);padding:10px 12px;font:12px 'SF Mono',Monaco,Consolas,monospace;
  color:var(--text);outline:none;resize:vertical;transition:border-color .2s,box-shadow .2s}
.ft:focus{border-color:var(--local);box-shadow:0 0 0 3px var(--local-glow)}
.ft::placeholder{color:var(--dim)}
.fh{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.4}
.fr{width:100%;height:6px;border-radius:3px;background:var(--surface-2);outline:none;
  -webkit-appearance:none;appearance:none;cursor:pointer}
.fr::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--local);cursor:pointer;border:2px solid var(--surface);
  box-shadow:0 2px 6px rgba(0,0,0,.3)}
.fr::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--local);
  cursor:pointer;border:2px solid var(--surface);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.rv{float:right;font-size:13px;font-weight:700;color:var(--local);font-variant-numeric:tabular-nums}

/* TOAST */
.tc{position:fixed;top:calc(20px + var(--safe-top));left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:90vw}
.tt{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 14px;box-shadow:var(--sh-lg);display:flex;align-items:center;gap:10px;
  min-width:240px;max-width:420px;animation:ttIn .3s var(--ease);pointer-events:auto}
@keyframes ttIn{from{opacity:0;transform:translateY(-15px)}}
.tt-ic{font-size:16px;flex-shrink:0}
.tt-msg{flex:1;font-size:13px;color:var(--text)}
.tt.ok{border-left:3px solid var(--success)}.tt.ok .tt-ic{color:var(--success)}
.tt.err{border-left:3px solid var(--danger)}.tt.err .tt-ic{color:var(--danger)}
.tt.warn{border-left:3px solid var(--warning)}.tt.warn .tt-ic{color:var(--warning)}
.tt.info{border-left:3px solid var(--local)}.tt.info .tt-ic{color:var(--local)}

/* ONBOARDING */
.ob{text-align:center}
.ob-ic{font-size:64px;margin-bottom:14px}
.ob-t{font-size:22px;font-weight:700;margin-bottom:10px}
.ob-d{color:var(--muted);font-size:14px;line-height:1.55;margin-bottom:22px}
.ob-feats{text-align:left;margin-bottom:20px}
.ob-f{display:flex;gap:12px;padding:11px;background:var(--surface-2);
  border-radius:var(--r-sm);margin-bottom:7px}
.ob-f-ic{font-size:22px;flex-shrink:0}
.ob-f-t{font-weight:600;margin-bottom:3px;font-size:13px}
.ob-f-d{font-size:12px;color:var(--muted);line-height:1.45}

/* HELP */
.help-sec{margin-bottom:16px}
.help-st{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.help-sd{font-size:13px;color:var(--muted);line-height:1.55}
.help-box{padding:12px;background:var(--surface-2);border-radius:var(--r-sm);
  margin-top:12px;font-size:13px;line-height:1.55;color:var(--muted)}
.help-keys{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--muted);margin-top:6px}
kbd{padding:2px 6px;background:var(--surface-3);border:1px solid var(--border);
  border-radius:4px;font-size:10px;font-family:monospace}

/* AI PROGRESS */
.aip{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;z-index:9998;padding:20px;animation:fade .3s}
.aip-c{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:28px;max-width:360px;width:100%;text-align:center;box-shadow:var(--sh-lg)}
.aip-ic{font-size:44px;margin-bottom:14px;animation:float 3s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-8px)}}
.aip-t{font-size:17px;font-weight:600;margin-bottom:6px}
.aip-d{color:var(--muted);font-size:13px;margin-bottom:18px;line-height:1.5}
.aip-bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-bottom:8px}
.aip-fill{height:100%;background:linear-gradient(90deg,var(--local),#c4b5fd);border-radius:3px;
  transition:width .3s;position:relative;overflow:hidden}
.aip-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shim 1.5s infinite}
@keyframes shim{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.aip-pct{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

<script type="text/loom-module" data-role="code">
function Module(){
  function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];});}
  function escRe(s){return String(s==null?"":s).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}

  var words={

<!-- LOOM:BEGIN_MODULE name="Core.NooDB" -->
<script type="application/json" data-role="manifest">
{"name":"Core.NooDB","type":"core","version":"1.0.0","dependsOn":["Core.NooConfig","Core.Logger"],"exports":["put","get","del","all","bulkPut","reset"]}
</script>
<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg=ctx.require("Core.NooConfig");var log=ctx.require("Core.Logger");
  var db=null,mem=null;
  function dn(){return cfg.get("dbName","seren_v4");}
  function sn(){return cfg.get("storeName","notes");}
  function open(){
    return new Promise(function(res){
      if(db)return res(db);
      if(mem)return res(null);
      if(!window.indexedDB){mem=new Map();return res(null);}
      try{
        var req=indexedDB.open(dn(),1);
        req.onupgradeneeded=function(e){var d=e.target.result;var s=sn();if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});};
        req.onsuccess=function(e){db=e.target.result;res(db);};
        req.onerror=function(){if(log)log.warn("IDB open error",String(req.error));mem=new Map();res(null);};
        req.onblocked=function(){mem=new Map();res(null);};
      }catch(err){if(log)log.warn("IDB unsupported",String(err));mem=new Map();res(null);}
    });
  }
  function tx(mode,fn){
    return open().then(function(d){
      return new Promise(function(res,rej){
        try{
          if(!d){
            var s={
              get:function(k){return{result:mem.get(k)};},
              put:function(v){mem.set(v.id,v);return{};},
              delete:function(k){mem.delete(k);return{};},
              getAll:function(){return{result:Array.from(mem.values())};}
            };
            var r=fn(s);res(r&&("result" in r)?r.result:undefined);return;
          }
          var st=sn();var t=d.transaction(st,mode);var os=t.objectStore(st);var r=fn(os);
          r.onsuccess=function(){res(r.result);};
          r.onerror=function(){if(log)log.warn("DB op error",String(r.error));rej(r.error);};
        }catch(err){if(log)log.warn("DB tx error",String(err));rej(err);}
      });
    });
  }
  return{
    put:function(n){return tx("readwrite",function(s){return s.put(n);});},
    get:function(id){return tx("readonly",function(s){return s.get(id);});},
    del:function(id){return tx("readwrite",function(s){return s.delete(id);});},
    all:function(){return tx("readonly",function(s){return s.getAll();});},
    bulkPut:function(notes){
      return open().then(function(d){
        return new Promise(function(res,rej){
          try{
            if(!d){for(var i=0;i<notes.length;i++)mem.set(notes[i].id,notes[i]);return res(notes.length);}
            var t=d.transaction(sn(),"readwrite");var s=t.objectStore(sn());
            for(var i=0;i<notes.length;i++)s.put(notes[i]);
            t.oncomplete=function(){res(notes.length);};
            t.onerror=function(){rej(t.error);};
          }catch(err){rej(err);}
        });
      });
    },
    reset:function(){
      if(db){try{db.close();}catch(_){}db=null;}
      if(mem)mem.clear();
      return new Promise(function(r){
        try{var req=indexedDB.deleteDatabase(dn());req.onsuccess=req.onerror=req.onblocked=function(){r();};}catch(_){r();}
      });
    }
  };
}
</script>

<script type="application/json" data-role="manifest">
{"name":"Core.NooAI","type":"core","version":"1.0.0","dependsOn":["Core.NooConfig","Core.Logger","Core.Bus"],"exports":["load","embed","cosine","ready","getMode","onProgress"]}
</script>
<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg=ctx.require("Core.NooConfig");var log=ctx.require("Core.Logger");var bus=ctx.require("Core.Bus");
  var ext=null,mode="loading",cache=Object.create(null),progFns=[],loadP=null;
  function hashEmbed(text){
    var DIM=cfg.get("dim",384);var v=new Float32Array(DIM);
    var tokens=(text||"").toLowerCase().match(/[a-zа-яё0-9]+/gi)||[];
    for(var t=0;t<tokens.length;t++){
      var tok=tokens[t],h=2166136261;
      for(var i=0;i<tok.length;i++){h^=tok.charCodeAt(i);h=Math.imul(h,16777619);}
      v[Math.abs(h)%DIM]+=1;
      var h2=Math.imul(h^0x9e3779b9,2654435761);
      v[Math.abs(h2)%DIM]+=0.5;
    }
    var n=0;for(var i=0;i<DIM;i++)n+=v[i]*v[i];n=Math.sqrt(n)||1;
    for(var i=0;i<DIM;i++)v[i]/=n;
    return Array.from(v);
  }
  function doLoad(onProgress){
    var MODEL=cfg.get("model","Xenova/all-MiniLM-L6-v2");
    return import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2").then(function(mod){
      if(mod.env){mod.env.allowLocalModels=false;mod.env.useBrowserCache=true;}
      return mod.pipeline("feature-extraction",MODEL,{quantized:true,progress_callback:function(p){
        if(p.status==="progress"&&p.total>0){
          var pct=p.loaded/p.total*100;
          if(typeof onProgress==="function")onProgress(pct);
          for(var i=0;i<progFns.length;i++)try{progFns[i](pct);}catch(_){}
          if(bus&&bus.emit)bus.emit("ai:progress",{pct:pct});
        }
      }});
    }).then(function(pipe){ext=pipe;mode="model";if(log)log.info("AI loaded: "+MODEL);}).catch(function(err){
      if(log)log.warn("AI load failed, hash mode",String(err&&err.message||err));
      mode="demo";
    });
  }
  return{
    ready:function(){return ext!==null||mode==="demo";},
    getMode:function(){return mode;},
    onProgress:function(fn){if(typeof fn==="function")progFns.push(fn);},
    load:function(onProgress){
      if(ext||mode==="demo")return Promise.resolve();
      if(loadP)return loadP;
      loadP=doLoad(onProgress).catch(function(){mode="demo";loadP=null;return Promise.resolve();});
      return loadP;
    },
    embed:function(text){
      var t=(text||"").trim();if(!t)return Promise.resolve(null);
      if(cache[t])return Promise.resolve(cache[t]);
      var p;
      if(ext){
        p=Promise.resolve().then(function(){return ext(t,{pooling:"mean",normalize:true});}).then(function(out){return Array.from(out.data);}).catch(function(err){
          if(log)log.warn("embed fail, hash",String(err&&err.message||err));
          return hashEmbed(t);
        });
      }else{p=Promise.resolve(hashEmbed(t));}
      return p.then(function(v){cache[t]=v;return v;});
    },
    cosine:function(a,b){
      if(!a||!b||a.length!==b.length)return 0;
      var s=0;for(var i=0;i<a.length;i++)s+=a[i]*b[i];
      return Math.abs(s)<1e-8?0:s;
    }
  };
}
</script>
<!-- LOOM:END_MODULE -->

<!-- LOOM:BEGIN_MODULE name="Core.NooNet" -->
<script type="application/json" data-role="manifest">
{"name":"Core.NooNet","type":"core","version":"1.0.0","dependsOn":["Core.NooConfig","Core.NooDB","Core.NooAI","Core.Logger","Core.Bus"],"exports":["init","send","activeAnswers","peerCount","stop","onPeers","restart"]}
</script>
<script type="text/loom-module" data-role="code">
function Module(ctx){
  var cfg=ctx.require("Core.NooConfig");var DB=ctx.require("Core.NooDB");var AI=ctx.require("Core.NooAI");
  var log=ctx.require("Core.Logger");var bus=ctx.require("Core.Bus");
  var pool=null,sk=null,pk=null,queryId=null,peers=new Map(),answers=[];
  var onUpdate=null,hbTimer=null,lastQ=0,nostr=null,sub=null,peerLs=[],started=false,seen=new Map();
  function notifyPeers(){var n=peers.size;for(var i=0;i<peerLs.length;i++)try{peerLs[i](n);}catch(_){}if(bus&&bus.emit)bus.emit("net:peers",{count:n});}
  function valid(ev){
    if(!ev||typeof ev!=="object")return false;
    if(typeof ev.id!=="string"||ev.id.length!==64)return false;
    if(typeof ev.pubkey!=="string"||ev.pubkey.length!==64)return false;
    if(typeof ev.kind!=="number")return false;
    if(!Array.isArray(ev.tags))return false;
    return true;
  }
  function seenDup(ev){
    var k=ev.id+"@"+ev.created_at;
    if(seen.has(k))return true;
    seen.set(k,Date.now());
    if(seen.size>300){var cut=Date.now()-300000;seen.forEach(function(v,key){if(v<cut)seen.delete(key);});}
    return false;
  }
  function onEvent(ev){
    try{
      if(!valid(ev)||seenDup(ev))return;
      if(ev.pubkey===pk)return;
      var had=peers.has(ev.pubkey);peers.set(ev.pubkey,Date.now());
      if(!had)notifyPeers();
      var KQ=cfg.get("kQuery",21000),KA=cfg.get("kAnswer",21001),room=cfg.get("room","serendipity-main");
      if(ev.kind===KQ){
        var q;try{q=JSON.parse(ev.content);}catch(_){return;}
        if(!q||!q.vector||!Array.isArray(q.vector))return;
        DB.all().then(function(all){
          var floor=cfg.get("threshold",0.30)-cfg.get("serendipity",0.15);
          var toSend=[];
          for(var i=0;i<all.length;i++){var n=all[i];if(!n||!n.shared||!n.vector)continue;if(AI.cosine(q.vector,n.vector)>=floor)toSend.push(n);}
          for(var j=0;j<toSend.length;j++){
            try{
              var ans=nostr.finalizeEvent({kind:KA,created_at:Math.floor(Date.now()/1000),tags:[["t",room],["e",ev.id]],content:JSON.stringify({text:toSend[j].text,vector:toSend[j].vector})},sk);
              pool.publish(cfg.get("relays",[]),ans);
            }catch(e){if(log)log.warn("answer pub fail",String(e));}
          }
        }).catch(function(e){if(log)log.warn("DB.all fail",String(e));});
      }
      if(ev.kind===KA){
        var eTag=null;for(var i=0;i<ev.tags.length;i++)if(ev.tags[i]&&ev.tags[i][0]==="e"){eTag=ev.tags[i][1];break;}
        if(eTag&&eTag===queryId){
          var d;try{d=JSON.parse(ev.content);}catch(_){return;}
          if(d&&d.text&&d.vector){
            var exists=false;for(var j=0;j<answers.length;j++)if(answers[j].id===ev.id){exists=true;break;}
            if(!exists){answers.push({id:ev.id,text:d.text,vector:d.vector,peer:ev.pubkey.slice(0,6),fullPubkey:ev.pubkey,createdAt:Date.now()});if(typeof onUpdate==="function")onUpdate();}
          }

      }
    }catch(err){if(log)log.warn("onEvent",String(err&&err.message||err));}
  }
  function startHB(){
    if(hbTimer)clearInterval(hbTimer);
    var hb=cfg.get("heartbeat",30000),ttl=cfg.get("peerTTL",60000);
    hbTimer=setInterval(function(){
      var now=Date.now(),rem=0;
      peers.forEach(function(ts,key){if(now-ts>ttl){peers.delete(key);rem++;}});
      if(rem>0){notifyPeers();if(typeof onUpdate==="function")onUpdate();}
      var cut=now-300000;for(var i=answers.length-1;i>=0;i--)if(!peers.has(answers[i].fullPubkey)||answers[i].createdAt<cut)answers.splice(i,1);
    },hb);
  }
  return{
    onPeers:function(fn){if(typeof fn==="function")peerLs.push(fn);},
    init:function(cb){
      if(started)return Promise.resolve();
      onUpdate=cb;
      return Promise.resolve().then(function(){return import("https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/+esm");}).then(function(mod){
        nostr=mod;
        var KEY="seren:sk",kh=null;
        try{kh=localStorage.getItem(KEY);}catch(_){}
        if(!kh){var raw=mod.generateSecretKey();kh=Array.from(raw).map(function(b){return b.toString(16).padStart(2,"0");}).join("");try{localStorage.setItem(KEY,kh);}catch(_){}}
        sk=new Uint8Array(kh.match(/.{1,2}/g).map(function(b){return parseInt(b,16);}));
        pk=mod.getPublicKey(sk);
        pool=new mod.SimplePool();
        var now=Math.floor(Date.now()/1000),room=cfg.get("room","serendipity-main"),KQ=cfg.get("kQuery",21000),KA=cfg.get("kAnswer",21001),sw=cfg.get("subWindow",300);
        try{sub=pool.subscribeMany(cfg.get("relays",[]),[{kinds:[KQ,KA],"#t":[room],since:now-sw}],{onevent:onEvent});}catch(e){if(log)log.warn("sub fail",String(e));}
        started=true;startHB();notifyPeers();if(log)log.info("net started, room="+room);
      }).catch(function(err){if(log)log.error("nostr load fail",String(err&&err.message||err));throw err;});
    },
    send:function(vector){
      if(!pool||!nostr||AI.getMode()==="demo")return;
      var now=Date.now(),rate=cfg.get("queryRateLimit",2000);
      if(now-lastQ<rate)return;
      lastQ=now;answers.length=0;
      try{
        var ev=nostr.finalizeEvent({kind:cfg.get("kQuery",21000),created_at:Math.floor(Date.now()/1000),tags:[["t",cfg.get("room","serendipity-main")]],content:JSON.stringify({vector:vector})},sk);
        queryId=ev.id;pool.publish(cfg.get("relays",[]),ev);
        if(typeof onUpdate==="function")onUpdate();
      }catch(e){if(log)log.warn("pub fail",String(e));}
    },
    activeAnswers:function(){var out=[];for(var i=0;i<answers.length;i++)if(peers.has(answers[i].fullPubkey))out.push(answers[i]);return out;},
    peerCount:function(){return peers.size;},
    stop:function(){
      if(hbTimer){clearInterval(hbTimer);hbTimer=null;}
      if(sub&&sub.close)try{sub.close();}catch(_){}
      if(pool&&pool.close)try{pool.close();}catch(_){}
      pool=null;sub=null;started=false;queryId=null;
      peers.clear();answers.length=0;seen.clear();
      notifyPeers();
    },
    restart:function(cb){this.stop();onUpdate=cb;return this.init(cb);}
  };
}
</script>

        '<div class="ob-f"><div class="ob-f-ic">🌍</div><div><div class="ob-f-t">Делитесь с миром</div><div class="ob-f-d">Открытые мысли могут найти отклик у других</div></div></div>'+
        '<div class="ob-f"><div class="ob-f-ic">✨</div><div><div class="ob-f-t">Открывайте новое</div><div class="ob-f-d">Система покажет близкие, но неожиданные мысли</div></div></div>'+
      '</div>';
    open({title:"",body:b,buttons:[{text:"Начать",primary:true,onClick:function(){close();if(onDone)onDone();}}]});
  }
  return{open:open,close:close,onboarding:onboarding};
}
</script>

<script type="text/loom-module" data-role="code">
function Module(){

    var cls=type==="ok"?"ok":type==="err"?"err":type==="warn"?"warn":"info";
    var el=document.createElement("div");el.className="tt "+cls;
    var ic=document.createElement("div");ic.className="tt-ic";ic.textContent=ico[cls]||ico.info;
    var m=document.createElement("div");m.className="tt-msg";m.textContent=String(msg||"");
    el.appendChild(ic);el.appendChild(m);c.appendChild(el);
    while(c.childElementCount>LIM)try{c.firstElementChild.remove();}catch(_){break;}
    setTimeout(function(){el.style.animation="ttIn .3s ease reverse";setTimeout(function(){try{el.remove();}catch(_){}},280);},ms||3500);
  }
  return{show:show};
}
</script>

<script type="application/json" data-role="manifest">
{"name":"App.Seren","type":"app","version":"4.0.0","dependsOn":["Core.Logger","Core.Bus","Core.NooConfig","Core.NooUtils","Core.NooDB","Core.NooAI","Core.NooNet","UI.Modal","UI.Toast","UI.Progress","App.Host"],"exports":["mount"]}
</script>
<script type="text/loom-module" data-role="code">
function Module(ctx){
  var log=ctx.require("Core.Logger"),cfg=ctx.require("Core.NooConfig"),U=ctx.require("Core.NooUtils"),
      DB=ctx.require("Core.NooDB"),AI=ctx.require("Core.NooAI"),Net=ctx.require("Core.NooNet"),
      Modal=ctx.require("UI.Modal"),Toast=ctx.require("UI.Toast"),Prog=ctx.require("UI.Progress"),
      Host=ctx.require("App.Host");
  var lastVec=null,sTimer=null,view="stream",seg="local";
  var deck={local:[],world:[],seren:[],idx:{local:0,world:0,seren:0}};
  var drag=null; // active drag state {onMove,onUp}
  var SAMPLES=['Сознание — это, возможно, то, как информация ощущается изнутри.','Мозг — машина предсказаний, постоянно минимизирующая удивление.','Города ведут себя как живые организмы со своим обменом веществ.','Сложный процент — самая мощная сила для терпеливых.','Письмо — это мышление, ставшее видимым: пишешь и понимаешь, что знаешь.','Энтропия всегда растёт, но жизнь строит локальные островки порядка.','Хороший дизайн убирает решения, а не добавляет опции.','Случайные открытия любят блуждающий, хорошо связанный ум.'];

  function toast(m,t){if(Toast&&Toast.show)Toast.show(t||"info",m);}

  function markup(){
    return '<div class="hdr"><div class="logo"><span class="logo-ic">🌌</span><span>Серендипити</span></div><div class="hdr-acts">'+
      '<button class="ib" id="btn-help" title="Как это работает" aria-label="Справка">?</button>'+
      '<button class="ib" id="btn-set" title="Настройки" aria-label="Настройки">⚙️</button></div></div>'+
      '<div class="status"><div class="stb load" id="st-net"><div class="stb-dot"></div><span>Сеть</span></div>'+
      '<div class="stb load" id="st-ai"><div class="stb-dot"></div><span>ИИ грузится</span></div></div>'+
      '<div class="ws" id="ws-stream">'+
        '<div class="ed"><textarea id="ed-ta" class="ed-ta" placeholder="О чём думаешь? Напиши мысль — найдём ей созвучие…"></textarea>'+
        '<div class="ed-foot"><span id="ed-cnt" class="ed-cnt">0 символов</span>'+
        '<div class="ed-acts"><button class="btn btn-s" id="btn-priv">🔒 Лично</button><button class="btn btn-p" id="btn-pub">🌍 Открыть</button></div></div></div>'+
        '<div class="seg"><button class="seg-b on" data-k="local">🏠 Моё <span class="cnt" id="c-local">0</span></button>'+
        '<button class="seg-b" data-k="world">🌍 Мир <span class="cnt" id="c-world">0</span></button>'+
        '<button class="seg-b" data-k="seren">✨ Озарения <span class="cnt" id="c-seren">0</span></button></div>'+
        '<div class="deck" id="deck"></div>'+
      '</div>'+
      '<div class="ws base" id="ws-base" style="display:none">'+
        '<div class="base-h"><div class="base-stats" id="base-stats"></div>'+
        '<div class="base-ctrls"><input type="text" class="base-search" id="base-q" placeholder="🔍 Поиск по базе…" />'+
        '<select class="base-sort" id="base-sort"><option value="new">Сначала новые</option><option value="old">Сначала старые</option><option value="az">А-Я</option></select></div></div>'+
        '<div class="base-list" id="base-list"></div>'+
      '</div>'+
      '<div class="btab"><button class="btab-b on" data-v="stream"><span class="btab-ic">💭</span><span class="btab-lbl">Поток</span></button>'+
      '<button class="btab-b" data-v="base"><span class="btab-ic">📚</span><span class="btab-lbl">База</span></button></div>';
  }

  function setSt(id,txt,cls){var el=document.getElementById(id);if(!el)return;el.className="stb "+cls;el.innerHTML='<div class="stb-dot"></div><span>'+U.esc(txt)+'</span>';}

  function switchView(v){
    view=v;
    document.querySelectorAll(".btab-b").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-v")===v);});
    var s=document.getElementById("ws-stream"),b=document.getElementById("ws-base");
    s.style.display=v==="stream"?"flex":"none";
    b.style.display=v==="base"?"flex":"none";
    if(v==="base")renderBase();
  }

  function setSeg(k){
    seg=k;
    document.querySelectorAll(".seg-b").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-k")===k);});
    renderDeck();
  }

  function highlight(text,q){
    if(!q)return U.esc(text);
    var out=U.esc(text),words=q.toLowerCase().split(/\s+/).filter(function(w){return w.length>2;});
    for(var i=0;i<words.length;i++){var re=new RegExp("("+U.escRe(words[i])+")","gi");out=out.replace(re,'<mark>$1</mark>');}
    return out;
  }

  function primaryActFor(k){return k==="world"?"adopt":k==="seren"?"develop":"skip";}

  function cardHTML(item){
    if(!item)return '';
    var type=seg;
    var isPeer=!!item.peer;
    var typeLabel=isPeer?("🌍 Узел "+item.peer):(item.shared?"🌍 Открыто миру":"🔒 Личное");
    var hasScore=typeof item.score==="number";
    var pctNum=hasScore?Math.max(0,Math.min(100,Math.round(item.score*100))):0;
    var pos=(deck.idx[seg]+1)+" / "+deck[seg].length;
    var q=document.getElementById("ed-ta")?document.getElementById("ed-ta").value:"";
    var reso=hasScore?('<div class="card-reso"><div class="card-reso-bar"><div class="card-reso-fill" style="width:'+pctNum+'%"></div></div><span class="card-reso-val">'+pctNum+'%</span></div>'):'';
    var acts,hint;
    if(isPeer){
      acts='<button class="card-act primary" data-act="adopt">✨ Взять в базу</button>'+
           '<button class="card-act" data-act="skip">Пропустить</button>';
      hint="Свайп вправо — взять · влево — пропустить";
    }else if(seg==="seren"){
      acts='<button class="card-act primary" data-act="develop">📝 Развить</button>'+
           '<button class="card-act" data-act="skip">Пропустить</button>';
      hint="Свайп вправо — развить · влево — пропустить";
    }else{
      acts='<button class="card-act" data-act="toggle">'+(item.shared?"🔒 Сделать личным":"🌍 Открыть миру")+'</button>'+
           '<button class="card-act" data-act="copy">📋 Копировать</button>'+
           '<button class="card-act danger" data-act="del">🗑 Удалить</button>';
      hint="Свайп — листать колоду";
    }
    return '<div class="card t-'+type+'" data-id="'+U.esc(item.id)+'">'+
      '<div class="card-h"><span class="card-badge">'+U.esc(typeLabel)+'</span><span class="card-pos">'+U.esc(pos)+'</span></div>'+
      reso+
      '<div class="card-body">'+highlight(item.text,q)+'</div>'+
      '<div class="card-foot">'+acts+'</div>'+
      '<div class="card-hint">'+U.esc(hint)+'</div></div>';
  }

  function renderDeck(){
    var d=document.getElementById("deck");if(!d)return;
    var list=deck[seg],idx=deck.idx[seg];
    if(!list||list.length===0){
      var msgs={
        local:{i:"💭",t:"Пока нет совпадений",d:"Начните печатать в поле выше — найдём похожие мысли в вашей базе"},
        world:{i:"🌍",t:"Никто не думает так же",d:"Когда кто-то откроет похожую мысль — она появится здесь"},
        seren:{i:"✨",t:"Озарений нет",d:"Попробуйте другую формулировку, чтобы найти неожиданные связи"}
      };
      var m=msgs[seg];
      d.innerHTML='<div class="deck-empty"><div class="deck-empty-ic">'+m.i+'</div><div class="deck-empty-t">'+m.t+'</div><div class="deck-empty-d">'+m.d+'</div></div>';
      return;
    }
    if(idx>=list.length){deck.idx[seg]=list.length-1;idx=deck.idx[seg];}
    if(idx<0){deck.idx[seg]=0;idx=0;}
    var remaining=list.length-idx;
    var stack='';
    if(remaining>2)stack+='<div class="deck-stack s2"></div>';
    if(remaining>1)stack+='<div class="deck-stack s1"></div>';
    d.innerHTML=stack+cardHTML(list[idx]);
    bindCardSwipe();
  }

  function advance(step){
    var list=deck[seg];if(!list||list.length===0)return;
    deck.idx[seg]=Math.max(0,Math.min(list.length-1,deck.idx[seg]+step));
    renderDeck();
  }

  function commitSwipe(dir,card){
    card.classList.add(dir>0?"card-gone-right":"card-gone-left");
    setTimeout(function(){
      if(dir>0)handleCardAction(primaryActFor(seg),card);
      else advance(1);
    },280);
  }

  function bindCardSwipe(){
    var d=document.getElementById("deck");if(!d)return;
    var card=d.querySelector(".card");if(!card)return;
    var TH=80,sx=0,sy=0,cx=0,active=false;
    function move(x){cx=x;var rot=cx*0.05;card.style.transform="translateX("+cx+"px) rotate("+rot+"deg)";card.style.opacity=Math.max(0.4,1-Math.abs(cx)/400);}
    function reset(){card.style.transform="";card.style.opacity="";}
    // touch
    card.addEventListener("touchstart",function(e){if(e.target.closest(".card-act"))return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;active=true;cx=0;card.classList.add("swiping");},{passive:true});
    card.addEventListener("touchmove",function(e){
      if(!active)return;
      var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
      if(Math.abs(dx)>Math.abs(dy)){e.preventDefault();move(dx);}
    },{passive:false});
    card.addEventListener("touchend",function(){
      if(!active)return;active=false;card.classList.remove("swiping");
      if(Math.abs(cx)>TH)commitSwipe(cx>0?1:-1,card);else reset();
    },{passive:true});
    // mouse (desktop) — listeners attached only during drag, removed on up (no leak)
    card.addEventListener("mousedown",function(e){
      if(e.target.closest(".card-act"))return;
      e.preventDefault();sx=e.clientX;cx=0;active=true;card.classList.add("swiping");
      drag={};
      drag.onMove=function(ev){if(!active)return;move(ev.clientX-sx);};
      drag.onUp=function(){
        if(!active)return;active=false;card.classList.remove("swiping");
        document.removeEventListener("mousemove",drag.onMove);
        document.removeEventListener("mouseup",drag.onUp);
        drag=null;
        if(Math.abs(cx)>TH)commitSwipe(cx>0?1:-1,card);else reset();
      };
      document.addEventListener("mousemove",drag.onMove);
      document.addEventListener("mouseup",drag.onUp);
    });
  }

  function findInDeck(id){var list=deck[seg];for(var i=0;i<list.length;i++)if(list[i].id===id)return list[i];return null;}

  function handleCardAction(act,el){
    var id=el?el.getAttribute("data-id"):null;
    var item=id?findInDeck(id):null;
    if(act==="adopt"){
      if(!item||!item.peer){advance(1);return;}
      if(!AI.ready()){toast("ИИ не готов","err");return;}
      AI.embed(item.text).then(function(v){
        return DB.put({id:Math.random().toString(36).slice(2,10),text:item.text,vector:v,shared:false,createdAt:Date.now()});
      }).then(function(){
        toast("Добавлено в вашу базу","ok");
        advance(1);
      }).catch(function(e){toast("Ошибка: "+(e&&e.message||e),"err");});
    }else if(act==="develop"){
      if(item){var ta=document.getElementById("ed-ta");if(ta){ta.value=item.text;updateCounter();ta.focus();}}
      advance(1);
    }else if(act==="skip"){
      advance(1);
    }else if(act==="copy"&&item){
      try{navigator.clipboard.writeText(item.text).then(function(){toast("Скопировано","ok");},function(){toast("Не удалось","err");});}
      catch(e){toast("Не удалось","err");}
    }else if(act==="del"&&id){
      if(!confirm("Удалить эту мысль навсегда?"))return;
      DB.del(id).then(function(){
        toast("Удалено","info");
        deck[seg]=deck[seg].filter(function(n){return n.id!==id;});
        if(deck.idx[seg]>=deck[seg].length)deck.idx[seg]=Math.max(0,deck[seg].length-1);
        updateCounts();renderDeck();renderBase();
      });
    }else if(act==="toggle"&&id){
      DB.get(id).then(function(r){
        if(!r)return;r.shared=!r.shared;
        return DB.put(r).then(function(){
          if(item)item.shared=r.shared;
          toast(r.shared?"Открыто миру":"Сделано личным","ok");
          renderDeck();renderBase();
        });
      });
    }
  }

  function updateCounter(){
    var ta=document.getElementById("ed-ta"),c=document.getElementById("ed-cnt");
    if(ta&&c)c.textContent=U.word("symbols",ta.value.length);
  }

  function executeSearch(force){
    var ta=document.getElementById("ed-ta");if(!ta)return Promise.resolve();
    var text=ta.value;
    if(!text||!AI.ready()){
      deck={local:[],world:[],seren:[],idx:{local:0,world:0,seren:0}};
      updateCounts();renderDeck();
      return Promise.resolve();
    }
    return AI.embed(text).then(function(vec){
      if(!vec)return;
      if(!lastVec||AI.cosine(vec,lastVec)<0.98||force){
        lastVec=vec;
        if(AI.getMode()==="model")Net.send(vec);
      }
      return DB.all().then(function(notes){
        var localScored=[];
        for(var i=0;i<notes.length;i++){var n=notes[i];if(n&&n.vector)localScored.push(Object.assign({},n,{score:AI.cosine(vec,n.vector)}));}
        var worldAns=Net.activeAnswers(),worldScored=[];
        for(var i=0;i<worldAns.length;i++)worldScored.push(Object.assign({},worldAns[i],{score:AI.cosine(vec,worldAns[i].vector)}));
        var TH=cfg.get("threshold",0.30),SD=cfg.get("serendipity",0.15);
        deck.local=localScored.filter(function(n){return n.score>=TH;}).sort(function(a,b){return b.score-a.score;});
        deck.world=worldScored.filter(function(n){return n.score>=TH;}).sort(function(a,b){return b.score-a.score;});
        deck.seren=localScored.concat(worldScored).filter(function(n){return n.score>=(TH-SD)&&n.score<TH;}).sort(function(a,b){return b.score-a.score;});
        deck.idx={local:0,world:0,seren:0};
        updateCounts();renderDeck();
      });
    });
  }

  function updateCounts(){
    ["local","world","seren"].forEach(function(k){
      var el=document.getElementById("c-"+k);if(el)el.textContent=deck[k].length;
    });
  }

  function renderBase(){
    return DB.all().then(function(all){
      var stats=document.getElementById("base-stats");
      if(stats){
        var sh=0;for(var i=0;i<all.length;i++)if(all[i]&&all[i].shared)sh++;
        stats.innerHTML='<div class="stat"><div class="stat-v">'+all.length+'</div><div class="stat-l">Мыслей</div></div>'+
          '<div class="stat"><div class="stat-v">'+sh+'</div><div class="stat-l">Открытых</div></div>'+
          '<div class="stat"><div class="stat-v">'+(all.length-sh)+'</div><div class="stat-l">Личных</div></div>';
      }
      var q=document.getElementById("base-q"),s=document.getElementById("base-sort");
      var qv=q?q.value.trim().toLowerCase():"",sv=s?s.value:"new";
      var list=all.slice();
      if(qv)list=list.filter(function(n){return n.text&&n.text.toLowerCase().indexOf(qv)>=0;});
      if(sv==="old")list.sort(function(a,b){return(a.createdAt||0)-(b.createdAt||0);});
      else if(sv==="az")list.sort(function(a,b){return(a.text||"").localeCompare(b.text||"","ru");});
      else list.sort(function(a,b){return(b.createdAt||0)-(a.createdAt||0);});
      var c=document.getElementById("base-list");if(!c)return;
      if(list.length===0){
        c.innerHTML='<div class="deck-empty"><div class="deck-empty-ic">📚</div><div class="deck-empty-t">'+(all.length===0?"База пуста":"Ничего не найдено")+'</div>'+
          '<div class="deck-empty-d">'+(all.length===0?"Запишите первую мысль в потоке":"Под фильтр ничего не подошло")+'</div>'+
          (all.length===0?'<button class="btn btn-p" id="btn-seed" style="margin-top:16px">🌱 Загрузить примеры</button>':'')+'</div>';
        var sb=document.getElementById("btn-seed");if(sb)sb.onclick=seedSamples;
        return;
      }
      c.innerHTML=list.map(function(n){
        var d=new Date(n.createdAt||Date.now());
        var ds=d.toLocaleDateString("ru-RU",{day:"numeric",month:"short"});
        return '<div class="base-item '+(n.shared?"shared":"")+'" data-id="'+U.esc(n.id)+'">'+
          '<div class="base-item-t">'+U.esc(n.text)+'</div>'+
          '<div class="base-item-f"><div class="base-item-meta"><span class="base-item-tag">'+(n.shared?"Открыто":"Личное")+'</span><span>'+U.esc(ds)+'</span></div>'+
          '<div class="base-item-acts">'+
            '<button class="base-item-act" data-act="toggle" data-id="'+U.esc(n.id)+'">'+(n.shared?"🔒":"🌍")+'</button>'+
            '<button class="base-item-act" data-act="copy" data-id="'+U.esc(n.id)+'">📋</button>'+
            '<button class="base-item-act danger" data-act="del" data-id="'+U.esc(n.id)+'">🗑</button>'+
          '</div></div></div>';
      }).join("");
    });
  }

  function handleBaseAction(act,id){
    if(!id)return;
    if(act==="copy"){
      DB.get(id).then(function(r){if(!r)return;try{navigator.clipboard.writeText(r.text).then(function(){toast("Скопировано","ok");},function(){toast("Не удалось","err");});}catch(e){toast("Не удалось","err");}});
    }else if(act==="del"){
      if(!confirm("Удалить эту мысль навсегда?"))return;
      DB.del(id).then(function(){toast("Удалено","info");renderBase();lastVec=null;});
    }else if(act==="toggle"){
      DB.get(id).then(function(r){if(!r)return;r.shared=!r.shared;return DB.put(r).then(function(){toast(r.shared?"Открыто миру":"Сделано личным","ok");renderBase();});});
    }
  }

  function handleSave(shared){
    var ta=document.getElementById("ed-ta");if(!ta)return;
    var text=ta.value.trim();
    if(!text){toast("Напишите что-нибудь","err");return;}
    if(!AI.ready()){toast("ИИ ещё не готов","err");return;}
    AI.embed(text).then(function(v){
      return DB.put({id:Math.random().toString(36).slice(2,10),text:text,vector:v,shared:!!shared,createdAt:Date.now()});
    }).then(function(){
      ta.value="";updateCounter();lastVec=null;
      toast(shared?"Открыто миру":"Сохранено лично","ok");
      executeSearch();
    }).catch(function(e){toast("Ошибка: "+(e&&e.message||e),"err");});
  }

  function seedSamples(){
    if(!AI.ready()){toast("ИИ не готов","err");return Promise.resolve();}
    toast("Загружаем примеры…","info");
    var notes=[];
    function step(i){
      if(i>=SAMPLES.length){
        return DB.bulkPut(notes).then(function(){toast("Загружено "+notes.length+" примеров","ok");executeSearch();if(view==="base")renderBase();});
      }
      return AI.embed(SAMPLES[i]).then(function(v){
        notes.push({id:"s"+Math.random().toString(36).slice(2,10),text:SAMPLES[i],vector:v,shared:true,createdAt:Date.now()-Math.floor(Math.random()*1e7)});
        return step(i+1);
      });
    }
    return step(0);
  }

  function openSettings(){
    var b=document.createElement("div");
    var rInp=document.createElement("input");rInp.type="text";rInp.className="fi";rInp.value=cfg.get("room","serendipity-main");
    var thInp=document.createElement("input");thInp.type="range";thInp.className="fr";thInp.min="0.1";thInp.max="0.7";thInp.step="0.05";thInp.value=cfg.get("threshold",0.30);
    var thVal=document.createElement("span");thVal.className="rv";thVal.textContent=Number(cfg.get("threshold",0.30)).toFixed(2);
    var seInp=document.createElement("input");seInp.type="range";seInp.className="fr";seInp.min="0.05";seInp.max="0.3";seInp.step="0.01";seInp.value=cfg.get("serendipity",0.15);
    var seVal=document.createElement("span");seVal.className="rv";seVal.textContent=Number(cfg.get("serendipity",0.15)).toFixed(2);
    thInp.oninput=function(e){thVal.textContent=parseFloat(e.target.value).toFixed(2);};
    seInp.oninput=function(e){seVal.textContent=parseFloat(e.target.value).toFixed(2);};
    var rlInp=document.createElement("textarea");rlInp.className="ft";rlInp.value=cfg.get("relays",[]).join("\n");
    var seedBtn=document.createElement("button");seedBtn.className="btn btn-s";seedBtn.style.width="100%";seedBtn.style.marginBottom="8px";seedBtn.textContent="🌱 Загрузить примеры";
    seedBtn.onclick=function(){Modal.close();seedSamples();};
    var wipeBtn=document.createElement("button");wipeBtn.className="btn btn-d";wipeBtn.style.width="100%";wipeBtn.textContent="🗑 Стереть всю базу";
    wipeBtn.onclick=function(){if(!confirm("Удалить все ваши мысли навсегда?"))return;DB.reset().then(function(){toast("База стёрта","info");setTimeout(function(){location.reload();},500);});};
    function addF(lbl,el,hint){
      var g=document.createElement("div");g.className="fg";
      var l=document.createElement("label");l.className="fl";l.textContent=lbl;
      g.appendChild(l);g.appendChild(el);
      if(hint){var h=document.createElement("div");h.className="fh";h.textContent=hint;g.appendChild(h);}
      b.appendChild(g);
    }
    var thW=document.createElement("div");thW.appendChild(thInp);thW.appendChild(thVal);
    var seW=document.createElement("div");seW.appendChild(seInp);seW.appendChild(seVal);
    addF("Комната (топик Nostr)",rInp,"Уникальное имя вашей группы");
    addF("Порог совпадения",thW,"Выше = строже поиск");
    addF("Дельта озарений",seW,"Ширина поиска неожиданных мыслей");
    addF("Адреса реле",rlInp,"Один адрес на строку");
    var acts=document.createElement("div");acts.style.marginTop="20px";acts.appendChild(seedBtn);acts.appendChild(wipeBtn);
    b.appendChild(acts);
    Modal.open({title:"⚙️ Настройки",body:b,buttons:[
      {text:"Отмена",onClick:function(){Modal.close();}},
      {text:"Сохранить",primary:true,onClick:function(){
        cfg.set("room",rInp.value.trim()||"serendipity-main");
        cfg.set("threshold",parseFloat(thInp.value));
        cfg.set("serendipity",parseFloat(seInp.value));
        var rt=rlInp.value.trim();
        var rl=rt?rt.split(/[\n,]+/).map(function(r){return r.trim();}).filter(function(r){return r&&/^wss?:\/\//.test(r);}):cfg.defaults().relays;
        if(rl.length===0)rl=cfg.defaults().relays;
        cfg.set("relays",rl);cfg.save();
        Modal.close();
        lastVec=null;
        toast("Перезапуск соединения…","info");
        setTimeout(function(){if(Net&&Net.restart)Net.restart(function(){if(view==="stream")executeSearch();}).then(function(){setSt("st-net",Net.peerCount()>0?"В сети · "+U.word("peers",Net.peerCount()):"Слушаю комнату",Net.peerCount()>0?"ok":"load");}).catch(function(){setSt("st-net","Нет соединения","err");});},300);
      }}
    ]});
  }

  function openHelp(){
    var b=document.createElement("div");
    b.innerHTML='<div style="text-align:center;margin-bottom:20px"><div style="font-size:48px;margin-bottom:10px">🌌</div>'+
      '<div style="font-size:18px;font-weight:600;margin-bottom:6px">Как это работает</div>'+
      '<div style="color:var(--muted);font-size:13px;line-height:1.55">Серендипити превращает ваши мысли в смысловые векторы и ищет им созвучие в вашей базе и среди открытых мыслей других людей.</div></div>'+
      '<div class="help-sec"><div class="help-st">🏠 Моё</div><div class="help-sd">Сильные совпадения в вашей личной базе</div></div>'+

      '<div class="help-box"><b>💡 Свайпайте карточки:</b> вправо — принять/развить, влево — пропустить. На десктопе можно тянуть мышью или листать стрелками <kbd>←</kbd> <kbd>→</kbd>.</div>'+
      '<div class="help-box"><b>🌐 Философия:</b> чужие мысли нельзя присвоить — их можно прочитать, понять и написать своё. Так рождается синтез, а не склад чужого.</div>'+

  function bind(){
    var ta=document.getElementById("ed-ta");
    if(ta){
      ta.addEventListener("input",function(){
        updateCounter();
        if(sTimer)clearTimeout(sTimer);
        sTimer=setTimeout(function(){executeSearch();},cfg.get("debounce",800));
      });
    }
    var bp=document.getElementById("btn-priv");if(bp)bp.onclick=function(){handleSave(false);};
    var bpub=document.getElementById("btn-pub");if(bpub)bpub.onclick=function(){handleSave(true);};
    document.querySelectorAll(".seg-b").forEach(function(b){b.onclick=function(){setSeg(b.getAttribute("data-k"));};});
    document.querySelectorAll(".btab-b").forEach(function(b){b.onclick=function(){switchView(b.getAttribute("data-v"));};});
    var ws=document.getElementById("ws-stream");
    if(ws)ws.addEventListener("click",function(e){var el=e.target.closest("[data-act]");if(el)handleCardAction(el.getAttribute("data-act"),el);});
    var wb=document.getElementById("ws-base");
    if(wb)wb.addEventListener("click",function(e){var el=e.target.closest("[data-act]");if(el)handleBaseAction(el.getAttribute("data-act"),el.getAttribute("data-id"));});
    var bq=document.getElementById("base-q");if(bq)bq.addEventListener("input",function(){if(sTimer)clearTimeout(sTimer);sTimer=setTimeout(renderBase,200);});
    var bs=document.getElementById("base-sort");if(bs)bs.onchange=renderBase;
    var bh=document.getElementById("btn-help");if(bh)bh.onclick=openHelp;
    var bset=document.getElementById("btn-set");if(bset)bset.onclick=openSettings;
    document.addEventListener("keydown",function(e){
      if(e.key==="Escape"){Modal.close();return;}
      var inField=document.activeElement&&/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
      if(e.key==="/"&&!inField){e.preventDefault();if(ta){switchView("stream");ta.focus();}return;}
      if((e.ctrlKey||e.metaKey)&&e.key==="Enter"&&document.activeElement===ta){e.preventDefault();handleSave(e.shiftKey);return;}
      if(!inField&&view==="stream"){
        if(e.key==="ArrowRight"){e.preventDefault();advance(1);}
        else if(e.key==="ArrowLeft"){e.preventDefault();advance(-1);}
      }
    });
    AI.onProgress(function(p){
      Prog.show();Prog.update(p);
      setSt("st-ai","ИИ "+Math.round(p)+"%","load");
    });
    Net.onPeers(function(n){
      setSt("st-net",n>0?"В сети · "+U.word("peers",n):"Слушаю комнату",n>0?"ok":"load");
      if(view==="stream")executeSearch();
    });
  }

  function boot(){
    setSt("st-net","Сеть","load");
    setSt("st-ai","ИИ грузится","load");
    AI.load().then(function(){
      Prog.hide();
      var isModel=AI.getMode()==="model";
      setSt("st-ai",isModel?"ИИ активен":"ИИ: лексический",isModel?"ok":"warn");
      if(!cfg.get("onboarded",false)){
        setTimeout(function(){
          Modal.onboarding(function(){
            cfg.set("onboarded",true);cfg.save();
            seedSamples();
          });
        },400);
      }
    }).catch(function(e){
      Prog.hide();
      if(log)log.error("AI",String(e&&e.message||e));
      setSt("st-ai","ИИ: лексический","warn");
      toast("ИИ недоступен — используем упрощённый режим","info");
    });
    Net.init(function(){if(view==="stream")executeSearch();}).then(function(){
      setSt("st-net",Net.peerCount()>0?"В сети · "+U.word("peers",Net.peerCount()):"Слушаю комнату",Net.peerCount()>0?"ok":"load");
    }).catch(function(e){
      if(log)log.error("Net",String(e&&e.message||e));
      setSt("st-net","Нет соединения","err");
    });
  }

  return{
    mount:function(){
      Host.mount();
      var r=document.getElementById("app-root");if(!r)return;
      r.innerHTML=markup();
      bind();
      renderDeck();
      boot();
      if(log)log.info("App.Seren mounted");
    }
  };
}
</script>
