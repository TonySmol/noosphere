<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Noosphere – коллективная память</title>
  <style>
    :root {
      --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
      --text-secondary: #64748b; --border: #e2e8f0; --accent: #4f46e5;
      --accent-hover: #4338ca; --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      --radius: 20px; --danger: #ef4444;
    }
    .dark { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155; --accent: #818cf8; --shadow: 0 10px 25px -5px rgba(0,0,0,0.4); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      display: flex; justify-content: center; padding: 1rem;
    }
    .app { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 1.25rem; }

    .logo {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center; margin-bottom: 0.25rem;
    }

    .tabs { display: flex; gap: 0.5rem; justify-content: center; }
    .tab-btn {
      padding: 0.5rem 1.5rem; border-radius: 12px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary); cursor: pointer;
      font-weight: 500; transition: 0.2s;
    }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .view { display: none; }
    .view.active { display: block; }

    .thought-input {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
      box-shadow: var(--shadow); transition: 0.3s;
    }
    .thought-input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(79,70,229,0.15); }
    textarea {
      width: 100%; border: none; background: transparent;
      font-size: 1.15rem; font-family: inherit; resize: none;
      outline: none; color: var(--text); min-height: 80px;
    }
    textarea::placeholder { color: var(--text-secondary); opacity: 0.7; }
    .input-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 0.75rem; gap: 0.5rem; flex-wrap: wrap;
    }
    .share-toggle {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.9rem; color: var(--text-secondary); cursor: pointer;
      user-select: none;
    }
    .share-toggle input[type="checkbox"] { width: 1.2rem; height: 1.2rem; accent-color: var(--accent); }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 14px; font-weight: 600;
      border: none; cursor: pointer; transition: 0.2s;
      background: var(--accent); color: white; font-size: 0.9rem;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface); }

    .feed-section { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.25rem; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .section-label {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-secondary);
    }
    .collapse-icon { font-size: 1.2rem; color: var(--text-secondary); transition: 0.2s; }
    .section-body { overflow: hidden; transition: max-height 0.3s ease; }
    .section-body.collapsed { max-height: 0; }

    .cards-row {
      display: flex; overflow-x: auto; gap: 0.75rem;
      padding-bottom: 0.5rem; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .cards-row::-webkit-scrollbar { height: 6px; }
    .cards-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .card {
      min-width: 240px; max-width: 300px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1rem;
      box-shadow: var(--shadow); scroll-snap-align: start;
      transition: 0.2s; animation: fadeInUp 0.4s ease both;
      display: flex; flex-direction: column;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); }
    .card-text { font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.75rem; white-space: pre-wrap; word-break: break-word; flex: 1; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.75rem; color: var(--text-secondary); gap: 0.5rem;
    }
    .score-badge {
      background: rgba(79,70,229,0.1); color: var(--accent);
      padding: 2px 8px; border-radius: 12px; font-weight: 600;
    }
    .vote-group { display: flex; align-items: center; gap: 0.2rem; }
    .vote-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 50%; width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.85rem; cursor: pointer; color: var(--text-secondary);
      transition: 0.2s;
    }
    .vote-btn:hover { background: var(--bg); color: var(--text); }
    .vote-count { font-weight: 600; min-width: 1.8rem; text-align: center; }
    .empty-message { text-align: center; color: var(--text-secondary); font-style: italic; padding: 1rem; width: 100%; }

    .history-input { margin-bottom: 1rem; }
    .day-group { margin-bottom: 1.5rem; }
    .day-title {
      font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 0.5rem; padding-left: 0.25rem;
    }
    .archive-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.75rem 1rem; box-shadow: var(--shadow);
      margin-bottom: 0.5rem; transition: 0.2s;
    }
    .archive-item:hover { border-color: var(--accent); }
    .archive-item .meta {
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.3rem;
    }
    .archive-item .text { font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
    .archive-item .actions { display: flex; gap: 0.3rem; margin-top: 0.5rem; }
    .archive-item .actions button {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.3rem 0.7rem; font-size: 0.8rem; cursor: pointer; color: var(--text-secondary);
    }
    .archive-item .actions button:hover { background: var(--bg); }

    .burger-btn {
      position: fixed; top: 1rem; right: 1rem;
      width: 44px; height: 44px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: var(--shadow); z-index: 5;
      font-size: 1.5rem; color: var(--text);
    }
    .settings-panel {
      position: fixed; top: 0; right: 0; width: 340px; max-width: 85vw;
      height: 100%; background: var(--surface); box-shadow: -5px 0 25px rgba(0,0,0,0.15);
      z-index: 10; padding: 1.5rem; overflow-y: auto;
      transform: translateX(100%); transition: transform 0.3s ease;
    }
    .settings-panel.open { transform: translateX(0); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 9; display: none; }
    .overlay.open { display: block; }

    .setting-row {
      display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 1rem;
    }
    .setting-row label { font-size: 0.85rem; color: var(--text-secondary); }
    .range-display { display: flex; align-items: center; gap: 0.5rem; }
    .range-display span { min-width: 3rem; font-weight: 600; color: var(--accent); }
    .settings-actions { display: flex; flex-direction: column; gap: 0.75rem; margin: 1rem 0; }
    .settings-actions .btn { width: 100%; justify-content: center; }
  </style>
</head>
<body>
<div class="app">
  <h1 class="logo">🌐 Noosphere</h1>

  <div class="tabs">
    <button class="tab-btn active" data-view="flow">Поток</button>
    <button class="tab-btn" data-view="history">История</button>
  </div>

  <!-- Поток -->
  <div class="view active" id="flowView">
    <div class="thought-input">
      <textarea id="thoughtInput" placeholder="Поделитесь мыслью..."></textarea>
      <div class="input-actions">
        <label class="share-toggle">
          <input type="checkbox" id="shareCheckbox"> <span id="shareToggleText">В общий поток</span>
        </label>
        <button id="saveBtn" class="btn" disabled>Отправить</button>
      </div>
    </div>

    <div id="personalSection" class="feed-section" style="display:none;">
      <div class="section-header" data-section="personalBody">
        <span class="section-label" id="personalFeedLabel">🧠 Мои похожие мысли</span>
        <span class="collapse-icon">▼</span>
      </div>
      <div class="section-body" id="personalBody">
        <div id="personalCards" class="cards-row"></div>
      </div>
    </div>

    <div id="relevantSection" class="feed-section" style="display:none;">
      <div class="section-header" data-section="relevantBody">
        <span class="section-label" id="relevantFeedLabel">🌍 Релевантные идеи мира</span>
        <span class="collapse-icon">▼</span>
      </div>
      <div class="section-body" id="relevantBody">
        <div id="relevantCards" class="cards-row"></div>
      </div>
    </div>

    <div id="serendipitySection" class="feed-section" style="display:none;">
      <div class="section-header" data-section="serendipityBody">
        <span class="section-label" id="serendipityFeedLabel">🌀 Смежные (неожиданные)</span>
        <span class="collapse-icon">▼</span>
      </div>
      <div class="section-body" id="serendipityBody">
        <div id="serendipityCards" class="cards-row"></div>
      </div>
    </div>
  </div>

  <!-- История -->
  <div class="view" id="historyView">
    <div class="history-input">
      <input type="text" id="historySearchInput" placeholder="Поиск по истории..." style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:14px; background:var(--surface); color:var(--text);">
    </div>
    <div id="historyContent"></div>
  </div>
</div>

<!-- Настройки (бургер) -->
<div class="burger-btn" id="settingsTrigger">☰</div>
<div class="overlay" id="overlay"></div>
<div class="settings-panel" id="settingsPanel">
  <h2 style="margin-bottom:1.5rem;">Настройки</h2>
  <div class="setting-row">
    <label>Язык / Language</label>
    <select id="langSelect"><option value="ru">Русский</option><option value="en">English</option></select>
  </div>
  <div class="setting-row">
    <label>Тема</label>
    <select id="themeSelect">
      <option value="auto">Авто</option><option value="light">День</option><option value="dark">Ночь</option>
    </select>
  </div>
  <div class="setting-row">
    <label>Порог релевантности</label>
    <div class="range-display">
      <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.15">
      <span id="thresholdValue">0.15</span>
    </div>
  </div>
  <div class="setting-row">
    <label>Дельта смежности</label>
    <div class="range-display">
      <input type="range" id="serendipitySlider" min="0" max="0.5" step="0.01" value="0.10">
      <span id="serendipityValue">0.10</span>
    </div>
  </div>
  <div class="setting-row">
    <label>Мин. рейтинг</label>
    <select id="minRatingSelect"><option value="0">0</option><option value="1" selected>1</option><option value="3">3</option><option value="5">5</option></select>
  </div>
  <div class="setting-row">
    <label>Макс. карточек</label>
    <select id="maxResultsSelect"><option value="3">3</option><option value="5" selected>5</option><option value="10">10</option></select>
  </div>
  <div class="settings-actions">
    <button id="exportCapsuleBtn" class="btn btn-ghost">Скачать капсулу</button>
    <button id="importCapsuleBtn" class="btn btn-ghost">Импортировать капсулу</button>
    <input type="file" id="importFileInput" accept=".capsule,.json" style="display:none;">
    <button id="rebuildVectorsBtn" class="btn btn-ghost">Пересоздать векторы</button>
  </div>
  <div style="display:flex; gap:0.5rem; margin:1rem 0;">
    <button id="resetSettingsBtn" class="btn btn-ghost" style="flex:1;">Сбросить всё</button>
    <button id="applySettingsBtn" class="btn" style="flex:1;">Применить</button>
  </div>
  <p style="font-size:0.75rem;color:var(--text-secondary);">Модель: MiniLM (25 МБ)</p>
</div>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

// ---------- Локализация ----------
const translations = {
  ru: {
    personalFeed: '🧠 Мои похожие мысли',
    relevantFeed: '🌍 Релевантные идеи мира',
    serendipityFeed: '🌀 Смежные (неожиданные)',
    emptyPersonal: 'Нет похожих мыслей',
    emptyWorld: 'Ничего не найдено',
    edit: 'ред.', save: 'сохр.', cancel: 'отм.', delete: 'удал.',
    noteEdited: '(изм.)', today: 'Сегодня', yesterday: 'Вчера',
    confirmDelete: 'Удалить заметку?',
    shareToggle: 'В общий поток',
    saveBtn: 'Отправить'
  },
  en: {
    personalFeed: '🧠 My related thoughts',
    relevantFeed: '🌍 Relevant world ideas',
    serendipityFeed: '🌀 Serendipity',
    emptyPersonal: 'No related thoughts',
    emptyWorld: 'Nothing found',
    edit: 'edit', save: 'save', cancel: 'cancel', delete: 'delete',
    noteEdited: '(edited)', today: 'Today', yesterday: 'Yesterday',
    confirmDelete: 'Delete note?',
    shareToggle: 'Share to world',
    saveBtn: 'Send'
  }
};

let currentLang = 'ru';
function t(key) { return translations[currentLang]?.[key] || translations['ru'][key] || key; }

// Обновление всех видимых текстов на странице
function updateUILanguage() {
  // Заголовки секций
  document.getElementById('personalFeedLabel').textContent = t('personalFeed');
  document.getElementById('relevantFeedLabel').textContent = t('relevantFeed');
  document.getElementById('serendipityFeedLabel').textContent = t('serendipityFeed');
  document.getElementById('shareToggleText').textContent = t('shareToggle');
  document.getElementById('saveBtn').textContent = t('saveBtn');
  // Кнопки в настройках (если нужно, но они обычно статичны)
  // Кнопки в истории перерисовываются при renderHistory()
  // Перерисовать историю, чтобы кнопки «ред.» и «удал.» обновились
  if (document.getElementById('historyView').classList.contains('active')) {
    renderHistory();
  }
}

// ---------- Тема ----------
function applyTheme(mode) {
  document.body.classList.remove('dark');
  if (mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.body.classList.add('dark');
  }
}

// ---------- Настройки ----------
const DEFAULT_SETTINGS = {
  threshold: 0.15, serendipityDelta: 0.10, minRating: 1,
  maxResults: 5, theme: 'auto', lang: 'ru'
};

const Settings = { ...DEFAULT_SETTINGS };
Settings.load = function() {
  try { Object.assign(this, DEFAULT_SETTINGS, JSON.parse(localStorage.getItem('noosphere_settings') || '{}')); }
  catch(e) { Object.assign(this, DEFAULT_SETTINGS); }
};
Settings.save = function() {
  localStorage.setItem('noosphere_settings', JSON.stringify({
    threshold: this.threshold, serendipityDelta: this.serendipityDelta,
    minRating: this.minRating, maxResults: this.maxResults,
    theme: this.theme, lang: this.lang
  }));
};

// ---------- Векторы ----------
const Vec = {
  normalize(v) {
    const mag = Math.sqrt(v.reduce((s,x)=>s+x*x,0));
    return mag ? new Float32Array(v.map(x=>x/mag)) : new Float32Array(v.length);
  },
  cosine(a, b) { let d=0; for(let i=0;i<a.length;i++) d+=a[i]*b[i]; return d; }
};

// ---------- Хранилища ----------
const MyNotes = {
  data: [],
  load() { try { this.data = JSON.parse(localStorage.getItem('noosphere_mynotes')||'[]'); } catch(e) {} },
  save() { localStorage.setItem('noosphere_mynotes', JSON.stringify(this.data)); },
  add(text, id, date, editedAt) {
    const note = { id: id || 'l_'+crypto.randomUUID(), text, date: date || new Date().toISOString(), editedAt: editedAt || null };
    this.data.unshift(note); this.save(); return note;
  },
  update(id, newText) {
    const note = this.data.find(n=>n.id===id);
    if (note) { note.text = newText; note.editedAt = new Date().toISOString(); this.save(); }
  },
  remove(id) { this.data = this.data.filter(n=>n.id!==id); this.save(); },
  clear() { this.data = []; this.save(); }
};

const World = {
  notes: [],
  load() { try { this.notes = JSON.parse(localStorage.getItem('noosphere_world')||'[]'); } catch(e) {} },
  save() { localStorage.setItem('noosphere_world', JSON.stringify(this.notes)); },
  add(vectorArray, text) {
    const note = { id:'g_'+crypto.randomUUID(), vec:vectorArray, up:0, down:0, excerpt:text.slice(0,150) };
    this.notes.unshift(note); this.save();
  },
  vote(id, up) { const n=this.notes.find(n=>n.id===id); if(n) { up?n.up++:n.down++; this.save(); } }
};

// ---------- Движок ----------
const Engine = {
  model: null, cache: new Map(),
  async init() {
    this.model = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', { quantized: true });
    await this.reindex();
  },
  async embed(text) {
    const out = await this.model([text]);
    const { data, dims } = out;
    const [_, tokens, hidden] = dims;
    if (!tokens || !hidden) return Vec.normalize(data);
    const emb = new Float32Array(hidden);
    for (let t=0; t<tokens; t++) for (let h=0; h<hidden; h++) emb[h] += data[t*hidden+h];
    for (let h=0; h<hidden; h++) emb[h] /= tokens;
    return Vec.normalize(emb);
  },
  async reindex() {
    this.cache.clear();
    for (const n of MyNotes.data) try { await this.cacheNote(n.id, n.text); } catch(e) {}
  },
  async cacheNote(id, text) { if (!this.cache.has(id)) this.cache.set(id, await this.embed(text)); },
  async searchLocal(qVec) {
    const res = [];
    for (const n of MyNotes.data) {
      const v = this.cache.get(n.id); if (!v) continue;
      const s = Vec.cosine(qVec, v);
      if (s > Settings.threshold) res.push({...n, score:s});
    }
    return res.sort((a,b)=>b.score-a.score).slice(0, Settings.maxResults);
  },
  async searchWorld(qVec) {
    const rel=[], ser=[], low=Settings.threshold - Settings.serendipityDelta;
    for (const n of World.notes) {
      if ((n.up - n.down) < Settings.minRating) continue;
      const v = new Float32Array(n.vec);
      const s = Vec.cosine(qVec, v);
      if (s >= Settings.threshold) rel.push({...n, score:s});
      else if (s >= low) ser.push({...n, score:s});
    }
    return {
      rel: rel.sort((a,b)=>b.score-a.score).slice(0, Settings.maxResults),
      ser: ser.sort((a,b)=>b.score-a.score).slice(0, Settings.maxResults)
    };
  }
};

// ---------- UI-элементы ----------
const D = {
  input: document.getElementById('thoughtInput'),
  saveBtn: document.getElementById('saveBtn'),
  shareChk: document.getElementById('shareCheckbox'),
  personalSection: document.getElementById('personalSection'),
  personalCards: document.getElementById('personalCards'),
  relevantSection: document.getElementById('relevantSection'),
  relevantCards: document.getElementById('relevantCards'),
  serendipitySection: document.getElementById('serendipitySection'),
  serendipityCards: document.getElementById('serendipityCards'),
  historySearch: document.getElementById('historySearchInput'),
  historyContent: document.getElementById('historyContent'),
  settingsTrigger: document.getElementById('settingsTrigger'),
  overlay: document.getElementById('overlay'),
  panel: document.getElementById('settingsPanel'),
  thresholdSl: document.getElementById('thresholdSlider'),
  thresholdVal: document.getElementById('thresholdValue'),
  serendipitySl: document.getElementById('serendipitySlider'),
  serendipityVal: document.getElementById('serendipityValue'),
  minRatingSel: document.getElementById('minRatingSelect'),
  maxResSel: document.getElementById('maxResultsSelect'),
  langSelect: document.getElementById('langSelect'),
  themeSelect: document.getElementById('themeSelect'),
  applyBtn: document.getElementById('applySettingsBtn'),
  resetBtn: document.getElementById('resetSettingsBtn'),
  rebuildBtn: document.getElementById('rebuildVectorsBtn'),
  exportBtn: document.getElementById('exportCapsuleBtn'),
  importBtn: document.getElementById('importCapsuleBtn'),
  importFile: document.getElementById('importFileInput')
};

// ---------- Вкладки ----------
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(btn.dataset.view + 'View').classList.add('active');
    if (btn.dataset.view === 'history') renderHistory();
  });
});

// ---------- Сворачивание секций ----------
document.querySelectorAll('.section-header').forEach(header => {
  header.addEventListener('click', () => {
    const body = document.getElementById(header.dataset.section);
    const icon = header.querySelector('.collapse-icon');
    body.classList.toggle('collapsed');
    icon.textContent = body.classList.contains('collapsed') ? '▶' : '▼';
  });
});

// ---------- Рендеринг карточек ----------
function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function showCards(container, items, isWorld=false) {
  if (!items.length) {
    container.innerHTML = `<div class="empty-message">${isWorld ? t('emptyWorld') : t('emptyPersonal')}</div>`;
    return;
  }
  container.innerHTML = items.map(item => {
    const text = isWorld ? (item.excerpt || 'мысль') : item.text;
    const footer = isWorld
      ? `<div class="vote-group"><button class="vote-btn" data-id="${item.id}" data-vote="up">👍</button><span class="vote-count">${item.up - item.down}</span><button class="vote-btn" data-id="${item.id}" data-vote="down">👎</button></div>`
      : `<span>${new Date(item.date).toLocaleDateString()}</span>`;
    return `<div class="card"><div class="card-text">${esc(text)}</div><div class="card-footer"><span class="score-badge">${item.score.toFixed(2)}</span>${footer}</div></div>`;
  }).join('');
}

// ---------- История ----------
function formatDate(iso) {
  const d = new Date(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  if (d >= today) return t('today');
  if (d >= yesterday) return t('yesterday');
  return d.toLocaleDateString();
}

function renderHistory(filteredNotes = null) {
  const notes = filteredNotes || MyNotes.data;
  if (!notes.length) {
    D.historyContent.innerHTML = '<div class="empty-message">Нет заметок</div>';
    return;
  }
  const groups = new Map();
  notes.forEach(n => {
    const day = new Date(n.date).toLocaleDateString();
    if (!groups.has(day)) groups.set(day, []);
    groups.get(day).push(n);
  });
  let html = '';
  for (const [day, dayNotes] of groups) {
    html += `<div class="day-group"><div class="day-title">${formatDate(dayNotes[0].date)}</div>`;
    dayNotes.forEach(note => {
      const time = new Date(note.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      const edited = note.editedAt ? `<span>${t('noteEdited')} ${new Date(note.editedAt).toLocaleString()}</span>` : '';
      html += `<div class="archive-item" data-id="${note.id}">
        <div class="meta"><span>${time}</span>${edited}</div>
        <div class="text">${esc(note.text)}</div>
        <div class="actions">
          <button class="edit-btn" data-id="${note.id}">${t('edit')}</button>
          <button class="delete-btn" data-id="${note.id}">${t('delete')}</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  D.historyContent.innerHTML = html;
}

async function searchHistory() {
  const query = D.historySearch.value.trim();
  if (!query) { renderHistory(); return; }
  const qVec = await Engine.embed(query);
  const scored = MyNotes.data.map(note => {
    const v = Engine.cache.get(note.id);
    if (!v) return null;
    return { ...note, score: Vec.cosine(qVec, v) };
  }).filter(n => n && n.score > Settings.threshold)
    .sort((a,b) => b.score - a.score);
  renderHistory(scored);
}

// ---------- Редактирование в истории ----------
function enableEditMode(itemDiv) {
  const noteId = itemDiv.dataset.id;
  const note = MyNotes.data.find(n => n.id === noteId);
  if (!note) return;
  const textDiv = itemDiv.querySelector('.text');
  textDiv.innerHTML = `<textarea class="edit-textarea" style="width:100%;min-height:60px;border:1px solid var(--border);border-radius:8px;padding:0.5rem;background:var(--bg);color:var(--text);">${esc(note.text)}</textarea>`;
  const actions = itemDiv.querySelector('.actions');
  actions.innerHTML = `<button class="save-edit-btn" data-id="${noteId}">${t('save')}</button><button class="cancel-edit-btn" data-id="${noteId}">${t('cancel')}</button>`;
}
function disableEditMode(itemDiv) {
  const noteId = itemDiv.dataset.id;
  const note = MyNotes.data.find(n => n.id === noteId);
  if (note) {
    itemDiv.querySelector('.text').textContent = note.text;
    const actions = itemDiv.querySelector('.actions');
    actions.innerHTML = `<button class="edit-btn" data-id="${noteId}">${t('edit')}</button><button class="delete-btn" data-id="${noteId}">${t('delete')}</button>`;
  }
}

document.addEventListener('click', async (e) => {
  const editBtn = e.target.closest('.edit-btn');
  const saveBtn = e.target.closest('.save-edit-btn');
  const cancelBtn = e.target.closest('.cancel-edit-btn');
  const deleteBtn = e.target.closest('.delete-btn');
  if (editBtn) { enableEditMode(editBtn.closest('.archive-item')); return; }
  if (saveBtn) {
    const itemDiv = saveBtn.closest('.archive-item');
    const textarea = itemDiv.querySelector('.edit-textarea');
    if (textarea && textarea.value.trim()) {
      MyNotes.update(saveBtn.dataset.id, textarea.value.trim());
      Engine.cache.set(saveBtn.dataset.id, await Engine.embed(textarea.value.trim()));
    }
    disableEditMode(itemDiv);
    renderHistory();
    return;
  }
  if (cancelBtn) { disableEditMode(cancelBtn.closest('.archive-item')); return; }
  if (deleteBtn) {
    if (confirm(t('confirmDelete'))) {
      MyNotes.remove(deleteBtn.dataset.id);
      Engine.cache.delete(deleteBtn.dataset.id);
      renderHistory();
      handleInput();
    }
    return;
  }
});

// ---------- Поиск в потоке ----------
async function handleInput() {
  const q = D.input.value.trim();
  if (!q) {
    D.personalSection.style.display = 'none';
    D.relevantSection.style.display = 'none';
    D.serendipitySection.style.display = 'none';
    return;
  }
  const qVec = await Engine.embed(q);
  const [local, world] = await Promise.all([Engine.searchLocal(qVec), Engine.searchWorld(qVec)]);

  D.personalSection.style.display = local.length ? 'flex' : 'none';
  showCards(D.personalCards, local);

  D.relevantSection.style.display = world.rel.length ? 'flex' : 'none';
  showCards(D.relevantCards, world.rel, true);

  D.serendipitySection.style.display = world.ser.length ? 'flex' : 'none';
  showCards(D.serendipityCards, world.ser, true);
}

async function saveThought() {
  const text = D.input.value.trim(); if (!text) return;
  const share = D.shareChk.checked;
  const note = MyNotes.add(text);
  await Engine.cacheNote(note.id, text);
  if (share) { const vec = await Engine.embed(text); World.add(Array.from(vec), text); }
  D.input.value = ''; D.shareChk.checked = false;
  handleInput();
}

// ---------- Капсулы ----------
function exportCapsule() {
  const capsule = { version:1, notes: MyNotes.data.map(n=>({id:n.id,text:n.text,date:n.date,editedAt:n.editedAt})) };
  const blob = new Blob([JSON.stringify(capsule)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'noosphere.capsule'; a.click();
}
async function importCapsule(file) {
  try {
    const text = await file.text();
    const capsule = JSON.parse(text);
    const existingIds = new Set(MyNotes.data.map(n=>n.id));
    const newNotes = capsule.notes.filter(n=>!existingIds.has(n.id));
    for (const n of newNotes) MyNotes.add(n.text, n.id, n.date, n.editedAt);
    for (const n of newNotes) await Engine.cacheNote(n.id, n.text);
    renderHistory(); handleInput();
    alert(`Импортировано ${newNotes.length} заметок.`);
  } catch(e) { alert('Ошибка: '+e.message); }
}

// ---------- Настройки ----------
function applySettings(skipReindex=true) {
  Settings.threshold = +D.thresholdSl.value;
  Settings.serendipityDelta = +D.serendipitySl.value;
  Settings.minRating = +D.minRatingSel.value;
  Settings.maxResults = +D.maxResSel.value;
  Settings.theme = D.themeSelect.value;
  Settings.lang = D.langSelect.value;
  Settings.save();
  D.thresholdVal.textContent = Settings.threshold.toFixed(2);
  D.serendipityVal.textContent = Settings.serendipityDelta.toFixed(2);
  if (currentLang !== Settings.lang) {
    currentLang = Settings.lang;
    updateUILanguage();
  }
  applyTheme(Settings.theme);
  if (!skipReindex) handleInput();
}

function resetAllData() {
  // Сброс заметок
  MyNotes.clear();
  Engine.cache.clear();
  // Сброс настроек
  Object.assign(Settings, DEFAULT_SETTINGS);
  Settings.save();
  // Обновить UI
  D.thresholdSl.value = Settings.threshold; D.thresholdVal.textContent = Settings.threshold.toFixed(2);
  D.serendipitySl.value = Settings.serendipityDelta; D.serendipityVal.textContent = Settings.serendipityDelta.toFixed(2);
  D.minRatingSel.value = Settings.minRating; D.maxResSel.value = Settings.maxResults;
  D.langSelect.value = Settings.lang; D.themeSelect.value = Settings.theme;
  currentLang = Settings.lang;
  updateUILanguage();
  applyTheme(Settings.theme);
  // Очистить поле ввода и скрыть секции
  D.input.value = '';
  handleInput();
  renderHistory();
}

async function rebuildVectors() {
  D.rebuildBtn.disabled = true; D.rebuildBtn.textContent = '⏳';
  await Engine.reindex();
  D.rebuildBtn.textContent = 'Пересоздать векторы';
  D.rebuildBtn.disabled = false;
  D.overlay.classList.remove('open'); D.panel.classList.remove('open');
  alert('Векторы пересозданы');
}

// ---------- Старт ----------
(async () => {
  Settings.load(); MyNotes.load(); World.load();
  currentLang = Settings.lang;
  updateUILanguage();
  applyTheme(Settings.theme);
  D.thresholdSl.value = Settings.threshold; D.thresholdVal.textContent = Settings.threshold.toFixed(2);
  D.serendipitySl.value = Settings.serendipityDelta; D.serendipityVal.textContent = Settings.serendipityDelta.toFixed(2);
  D.minRatingSel.value = Settings.minRating; D.maxResSel.value = Settings.maxResults;
  D.langSelect.value = Settings.lang; D.themeSelect.value = Settings.theme;

  D.saveBtn.disabled = true;
  try { await Engine.init(); D.saveBtn.disabled = false; } catch(e) {}

  D.input.addEventListener('input', debounce(handleInput, 400));
  D.saveBtn.addEventListener('click', saveThought);
  D.input.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); saveThought(); } });

  D.settingsTrigger.addEventListener('click', () => { D.overlay.classList.add('open'); D.panel.classList.add('open'); });
  D.overlay.addEventListener('click', () => { D.overlay.classList.remove('open'); D.panel.classList.remove('open'); });

  D.thresholdSl.addEventListener('input', () => D.thresholdVal.textContent = parseFloat(D.thresholdSl.value).toFixed(2));
  D.serendipitySl.addEventListener('input', () => D.serendipityVal.textContent = parseFloat(D.serendipitySl.value).toFixed(2));

  D.applyBtn.addEventListener('click', () => { applySettings(false); D.overlay.classList.remove('open'); D.panel.classList.remove('open'); });
  D.resetBtn.addEventListener('click', () => {
    if (confirm('Сбросить все заметки и настройки?')) {
      resetAllData();
      D.overlay.classList.remove('open');
      D.panel.classList.remove('open');
    }
  });
  D.rebuildBtn.addEventListener('click', rebuildVectors);
  D.exportBtn.addEventListener('click', exportCapsule);
  D.importBtn.addEventListener('click', () => D.importFile.click());
  D.importFile.addEventListener('change', (e) => { if (e.target.files[0]) { importCapsule(e.target.files[0]); e.target.value = ''; } });

  D.thresholdSl.addEventListener('change', () => applySettings(false));
  D.serendipitySl.addEventListener('change', () => applySettings(false));
  D.minRatingSel.addEventListener('change', () => applySettings(false));
  D.maxResSel.addEventListener('change', () => applySettings(false));
  D.langSelect.addEventListener('change', () => applySettings(false));
  D.themeSelect.addEventListener('change', () => applySettings(false));

  D.historySearch.addEventListener('input', debounce(searchHistory, 300));

  document.body.addEventListener('click', e => {
    const btn = e.target.closest('.vote-btn');
    if (!btn) return;
    World.vote(btn.dataset.id, btn.dataset.vote==='up');
    handleInput();
  });
})();

function debounce(fn, ms) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }
</script>
</body>
