<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Локальная структура Transformers.js</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold;}
        button:hover { background: #0056b3; }
        #status { margin: 20px 0; font-weight: bold; color: #333; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 14px; border: 1px solid #ddd; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>Эмбеддинги по архитектуре Web Worker</h2>
    <p>Проект разделен на 3 локальных файла. Потоки изолированы.</p>
    
    <button id="run-btn">Сгенерировать вектор</button>
    <div id="status">Статус: Ожидание нажатия кнопки...</div>
    <pre id="output">Результат появится здесь...</pre>

    <script type="module">
        const runBtn = document.getElementById('run-btn');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');

        // Создаем фоновый рабочий процесс из нашего локального файла worker.js
        const worker = new Worker('./worker.js', { type: 'module' });

        runBtn.addEventListener('click', () => {
            statusDiv.innerText = "Статус: Запрос отправлен в воркер...";
            statusDiv.style.color = "orange";
            outputDiv.innerText = "";
            
            // Передаем текст для анализа в фоновый поток
            worker.postMessage({ text: "Привет, этот код работает правильно!" });
        });

        // Ловим сообщения, которые воркер присылает обратно
        worker.onmessage = (event) => {
            const { status, message, data } = event.data;

            if (status === 'progress' || status === 'ready') {
                statusDiv.innerText = `Статус: ${message}`;
            } else if (status === 'complete') {
                statusDiv.innerText = "Статус: Успешно выполнено!";
                statusDiv.style.color = "green";
                
                outputDiv.innerText = `Размерность полученного эмбеддинга: ${data.length} чисел.\n\nПервые 10 значений:\n${JSON.stringify(data.slice(0, 10), null, 2)}`;
            } else if (status === 'error') {
                statusDiv.innerText = "Статус: Критическая ошибка в воркере!";
                statusDiv.style.color = "red";
                outputDiv.innerText = `Ошибка: ${message}`;
            }
        };
    </script>
</body>
</html>
