<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noosphere</title>
<style>
:root{--bg:#f8fafc;--surface:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--accent:#4f46e5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:1rem}
.app{max-width:720px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem;margin-bottom:.5rem}
textarea{width:100%;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:12px;padding:.75rem;font:inherit;min-height:80px;outline:none}
button{padding:.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font:inherit}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button:disabled{opacity:.5;cursor:not-allowed}
.row{display:flex;gap:.5rem;align-items:center}
.row-between{display:flex;justify-content:space-between;align-items:center}
.meta{font-size:.75rem;color:var(--muted);margin-bottom:.25rem}
.score{background:rgba(79,70,229,.1);color:var(--accent);padding:2px 6px;border-radius:6px;font-weight:600}
.section-title{font-size:.75rem;text-transform:uppercase;color:var(--muted);font-weight:600;margin:.75rem 0 .25rem}
.carousel{display:flex;overflow-x:auto;gap:.5rem}
.carousel .card{min-width:260px;flex:0 0 auto}
.status{font-size:.75rem;color:var(--muted)}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="status">Загрузка...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js"></script>

<script>
const CONFIG = {
  modelName: 'Xenova/paraphrase-multilingual-MiniLM-L12-v2',
  threshold: 0.25,
  maxResults: 5
};

const Storage = {
  get myNotes() {
    try { return JSON.parse(localStorage.getItem('myNotes') || '[]'); }
    catch { return []; }
  },
  set myNotes(v) { localStorage.setItem('myNotes', JSON.stringify(v)); },
  
  get world() {
    try { return JSON.parse(localStorage.getItem('world') || '[]'); }
    catch { return []; }
  },
  set world(v) { localStorage.setItem('world', JSON.stringify(v)); }
};

const Model = {
  extractor: null,
  
  async load() {
    if (!window.transformers) throw new Error('Transformers.js не загружен');
    this.extractor = await window.transformers.pipeline('feature-extraction', CONFIG.modelName, { quantized: true });
  },
  
  async embed(text) {
    const out = await this.extractor([text], { pooling: 'mean', normalize: true });
    return Array.from(out.data);
  },
  
  cosine(a, b) {
    let dot = 0;
    for (let i = 0; i < a.length; i++) dot += a[i] * b[i];
    return dot;
  }
};

const Engine = {
  cache: new Map(),
  
  async embed(text, id) {
    if (this.cache.has(id)) return this.cache.get(id);
    const vec = await Model.embed(text);
    this.cache.set(id, vec);
    return vec;
  },
  
  async search(query) {
    const qVec = await Model.embed(query);
    const results = [];
    
    for (const note of Storage.myNotes) {
      const vec = this.cache.get(note.id);
      if (!vec) continue;
      const score = Model.cosine(qVec, vec);
      if (score >= CONFIG.threshold) {
        results.push({ ...note, score });
      }
    }
    
    return results.sort((a, b) => b.score - a.score).slice(0, CONFIG.maxResults);
  }
};

const UI = {
  render() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="card">
        <textarea id="input" placeholder="Поделитесь мыслью..."></textarea>
        <div class="row-between" style="margin-top:.5rem">
          <span class="status" id="status">Готово</span>
          <button id="send" disabled>Отправить</button>
        </div>
      </div>
      <div id="results"></div>
    `;
    
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const status = document.getElementById('status');
    
    input.addEventListener('input', () => {
      this.search(this.debounce(() => this.doSearch(input.value, status), 300));
    });
    
    send.addEventListener('click', async () => {
      const text = input.value.trim();
      if (!text) return;
      
      const note = {
        id: 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2),
        text: text,
        date: new Date().toISOString()
      };
      
      Storage.myNotes = [note, ...Storage.myNotes];
      await Engine.embed(text, note.id);
      
      input.value = '';
      this.doSearch('', status);
    });
    
    Model.load().then(() => {
      send.disabled = false;
      status.textContent = 'Модель загружена';
    }).catch(err => {
      status.textContent = 'Ошибка: ' + err.message;
    });
  },
  
  debounce(fn, ms) {
    let t;
    return () => {
      clearTimeout(t);
      t = setTimeout(fn, ms);
    };
  },
  
  async doSearch(query, status) {
    const results = document.getElementById('results');
    
    if (!query.trim()) {
      results.innerHTML = '';
      return;
    }
    
    status.textContent = 'Поиск...';
    
    try {
      const matches = await Engine.search(query);
      
      if (!matches.length) {
        results.innerHTML = '<div class="status">Ничего не найдено</div>';
        status.textContent = 'Готово';
        return;
      }
      
      results.innerHTML = '<div class="section-title">Похожие мысли</div><div class="carousel"></div>';
      const carousel = results.querySelector('.carousel');
      
      for (const note of matches) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="meta"><span class="score">${note.score.toFixed(2)}</span> ${new Date(note.date).toLocaleDateString()}</div>
          <div>${note.text}</div>
        `;
        carousel.appendChild(card);
      }
      
      status.textContent = 'Готово';
    } catch (err) {
      status.textContent = 'Ошибка: ' + err.message;
    }
  }
};

UI.render();
</script>
</body>
</html>
